<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      line-height: 1.5;
      overflow: hidden;
    }

    .content-wrap { overflow-x: hidden; }
   
    .page-wrapper {
      padding: 5px 10px 15px 10px;
      max-width: 100%; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    .page-title-block { margin-bottom: 10px; flex-shrink: 0; }
    .page-titl { font-size: 18px; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; line-height: 1.2; }
    .page-subtitle { font-size: 12px; color: #0f172a; margin-top: 5px; margin-bottom: 7px; }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; flex-wrap: wrap; gap: 8px; flex-shrink: 0;
    }
    .header-left { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 0; flex-wrap: wrap; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .stat-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 100px;
      font-size: 12px; font-weight: 600; border: 1px solid transparent; white-space: nowrap;
      cursor: pointer; transition: all .15s; user-select: none;
    }
    .stat-chip svg { width: 12px; height: 12px; flex-shrink: 0; }
    .stat-chip.green  { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .stat-chip.green:hover { background: #dcfce7; border-color: #86efac; }
    .stat-chip.slate  { background: #f8fafc; color: #475569; border-color: #e2e8f0; cursor: default; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px; border: 1.5px solid;
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-primary  { background: #2563eb; border-color: #2563eb; color: #fff; }
    .btn-primary:hover  { background: #1d4ed8; border-color: #1d4ed8; }
    .btn-secondary { background: #fff; border-color: #e2e8f0; color: #475569; }
    .btn-secondary:hover { border-color: #94a3b8; color: #0f172a; }
    .btn-danger   { background: #fff; border-color: #fecaca; color: #dc2626; }
    .btn-danger:hover   { background: #fee2e2; border-color: #fca5a5; }
    .btn-danger.confirming { background: #dc2626; border-color: #dc2626; color: #fff; animation: deletePulse .4s ease; }
    .btn-danger.deleting   { background: #dc2626; border-color: #dc2626; color: #fff; opacity: .7; pointer-events: none; }
    @keyframes deletePulse { 0%{transform:scale(1)} 40%{transform:scale(1.05)} 100%{transform:scale(1)} }
    .btn-amber { background: #f59e0b; border-color: #f59e0b; color: #fff; }
    .btn-amber:hover { background: #d97706; border-color: #d97706; }

    .search-wrap { position: relative; min-width: 160px; max-width: 260px; flex: 1; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 14px; height: 14px; pointer-events: none; }
    .search-input { width: 100%; padding: 7px 10px 7px 32px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; background: #fff; color: #0f172a; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: #2563eb; }

    .kanban-wrapper { flex: 1; display: flex; gap: 10px; min-height: 0; overflow: hidden; }
    .kanban-column  { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; height: 100%; }
    .kanban-col-header { flex-shrink: 0; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #f1f5f9; background: #fafbfc; }
    .kanban-col-title  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; gap: 7px; }
    .kanban-col-title .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .kanban-col-count  { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; background: #f1f5f9; color: #64748b; }
    .kanban-col-body   { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .kanban-col-body::-webkit-scrollbar { width: 4px; }
    .kanban-col-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .kanban-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: box-shadow .12s, border-color .12s; animation: cardIn .18s ease both; user-select: none; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .kanban-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #bfdbfe; }
    .kanban-card.card-updated { animation: cardFlash .6s ease; }
    @keyframes cardFlash { 0%{background:#fff7ed;border-color:#fdba74} 100%{background:#fff;border-color:#e2e8f0} }
    .kanban-card.card-deleting { animation: cardDelete .4s ease forwards; }
    @keyframes cardDelete { 0%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.95)} 100%{opacity:0;transform:scale(.9);max-height:0;padding:0;margin:0;border:none} }
    .kc-label    { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 2px; line-height: 1.3; }
    .kc-brandline{ font-size: 11px; color: #64748b; margin-bottom: 3px; }
    .kc-asin     { font-size: 10px; color: #94a3b8; font-family: 'SF Mono','Fira Code',monospace; margin-bottom: 6px; }
    .kc-stats    { display: flex; gap: 12px; margin-bottom: 7px; }
    .kc-stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: #94a3b8; }
    .kc-stat-val   { font-size: 12px; font-weight: 700; color: #0f172a; }
    .kc-chips    { display: flex; gap: 4px; flex-wrap: wrap; padding-top: 6px; border-top: 1px solid #f1f5f9; }
    .chip { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 100px; font-size: 10px; font-weight: 700; }
    .chip.yes  { background: #dcfce7; color: #15803d; }
    .chip.no   { background: #f1f5f9; color: #94a3b8; }
    .chip.unset{ background: #fef3c7; color: #92400e; }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: #94a3b8; gap: 10px; flex: 1; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .65s linear infinite; }
    .spinner.sm { width: 13px; height: 13px; border-width: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; color: #94a3b8; gap: 6px; text-align: center; }
    .empty-state p { font-size: 13px; font-weight: 600; color: #64748b; }

    .bool-toggle-group { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid #e2e8f0; }
    .bool-toggle-btn {
      flex: 1; padding: 7px 12px; font-size: 12px; font-weight: 700; font-family: inherit;
      border: none; cursor: pointer; transition: all .15s;
      background: #fff; color: #94a3b8; text-align: center;
    }
    .bool-toggle-btn:not(:last-child) { border-right: 1.5px solid #e2e8f0; }
    .bool-toggle-btn:hover { background: #f8fafc; }
    .bool-toggle-btn.active-yes { background: #f0fdf4; color: #15803d; }
    .bool-toggle-btn.active-no  { background: #fef2f2; color: #dc2626; }
    .bool-toggle-btn.active-unset { background: #fefce8; color: #a16207; }

    .form-bool-toggle-group { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid #e2e8f0; }
    .form-bool-toggle-group .bool-toggle-btn { flex: 1; }

    .drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 1150; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(2px); }
    .drawer-overlay.visible { opacity: 1; pointer-events: all; }
    .drawer { position: fixed; top: 0; right: 0; width: 580px; max-width: 97vw; height: 100vh; background: #fff; box-shadow: -8px 0 40px rgba(0,0,0,.13); z-index: 1200; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); overflow: hidden; }
    .drawer.open { transform: translateX(0); }
    .drawer-hero { padding: 14px 20px 12px; background: linear-gradient(135deg,#1e293b 0%,#0f172a 100%); position: relative; overflow: hidden; flex-shrink: 0; }
    .drawer-hero::before { content:''; position:absolute; top:-50px; right:-50px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.03); }
    .drawer-hero::after  { content:''; position:absolute; bottom:-25px; left:30px; width:100px; height:100px; border-radius:50%; background:rgba(37,99,235,.1); }
    .drawer-hero-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); transition: background .15s; z-index: 1; }
    .drawer-hero-close:hover { background: rgba(255,255,255,.2); color: #fff; }
    .drawer-bucket-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; margin-bottom: 4px; font-size: 11px; font-weight: 700; letter-spacing: .2px; position: relative; z-index: 1; }
    .dbb-digital   { background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.3); color: #60a5fa; }
    .dbb-warehouse { background: rgba(251,191,36,.15); border: 1px solid rgba(251,191,36,.3); color: #fbbf24; }
    .dbb-completed { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }
    .drawer-product-line { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); margin-bottom: 2px; position: relative; z-index: 1; }
    .drawer-title    { font-size: 17px; font-weight: 700; color: #fff; padding-right: 40px; line-height: 1.3; margin-bottom: 2px; position: relative; z-index: 1; }
    .drawer-subtitle { font-size: 11px; color: rgba(255,255,255,.5); margin-bottom: 10px; position: relative; z-index: 1; font-family: monospace; }
    .drawer-kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; position: relative; z-index: 1; }
    .drawer-kpi { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); border-radius: 9px; padding: 7px 9px; }
    .drawer-kpi-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: rgba(255,255,255,.4); margin-bottom: 2px; }
    .drawer-kpi-val   { font-size: 14px; font-weight: 700; color: #fff; line-height: 1; }
    .drawer-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    .drawer-tabs::-webkit-scrollbar { display: none; }
    .drawer-tab { padding: 9px 14px; font-size: 12px; font-weight: 700; font-family: inherit; color: #64748b; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .drawer-tab svg { width: 13px; height: 13px; }
    .drawer-tab:hover { color: #334155; }
    .drawer-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #fafcff; }
    .drawer-tab.disabled { color: #cbd5e1; cursor: not-allowed; pointer-events: none; opacity: .5; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 14px 20px; min-height: 0; }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .drawer-section { margin-bottom: 20px; }
    .section-label  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-grid.full { grid-template-columns: 1fr; }
    .info-card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 10px 13px; transition: border-color .15s; }
    .info-card:focus-within { border-color: #93c5fd; background: #fafcff; }
    .info-card.readonly { background: #f8fafc; opacity: .6; pointer-events: none; }
    .info-card label { display: block; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #94a3b8; margin-bottom: 7px; }
    .edit-input, .edit-select, .edit-textarea {
      width: 100%; padding: 6px 10px; border: 1.5px solid #e2e8f0; border-radius: 7px;
      font-size: 13px; font-family: inherit; color: #0f172a; background: #fff;
      outline: none; transition: border-color .15s;
    }
    .edit-input:focus, .edit-select:focus, .edit-textarea:focus { border-color: #2563eb; }
    .edit-textarea { resize: vertical; min-height: 64px; }

    .drawer-footer { padding: 7px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; align-items: center; flex-shrink: 0; background: #fafafa; }

    .btn-save {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 9px; border: 1.5px solid #2563eb;
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .15s; white-space: nowrap;
      background: #2563eb; color: #fff; margin-left: auto;
    }
    .btn-save:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .btn-save:disabled { opacity: .5; cursor: default; }
    .btn-save.saved { background: #15803d; border-color: #15803d; }
    .btn-save svg { width: 13px; height: 13px; }

    .toast-container { position: fixed; top: 65px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
    .toast { display: flex; align-items: center; gap: 9px; padding: 10px 14px; background: #0f172a; color: #fff; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.18); animation: toastIn .2s ease; max-width: 300px; pointer-events: auto; }
    .toast.success { background: #15803d; }
    .toast.error   { background: #dc2626; }
    .toast.info    { background: #1e40af; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); z-index: 1100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(3px); }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal { background: #fff; border-radius: 16px; box-shadow: 0 25px 60px rgba(0,0,0,.2); width: 92vw; max-width: 800px; height: 75vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-sm { max-width: 500px; height: auto; max-height: 90vh; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-header h2 { font-size: 16px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px; }
    .modal-count { font-size: 12px; font-weight: 700; background: #f1f5f9; color: #64748b; padding: 2px 10px; border-radius: 100px; }
    .modal-close { width: 32px; height: 32px; border: none; border-radius: 8px; background: #f1f5f9; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b; transition: all .15s; }
    .modal-close:hover { background: #e2e8f0; color: #0f172a; }
    .modal-body { flex: 1; overflow: auto; min-height: 0; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
    .new-form { padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .form-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; }
    .form-group input, .form-group textarea { padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; transition: border-color .15s; }
    .form-group input:focus, .form-group textarea:focus { border-color: #2563eb; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group.has-error input, .form-group.has-error textarea { border-color: #dc2626; background: #fef2f2; }
    .form-group.has-error .form-bool-toggle-group { border-color: #dc2626; }
    .form-group .field-error { font-size: 10px; color: #dc2626; font-weight: 600; margin-top: 2px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table thead { position: sticky; top: 0; z-index: 2; }
    .data-table th { background: #f8fafc; padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    .data-table td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; white-space: nowrap; }
    .data-table tr { transition: background .1s; cursor: pointer; }
    .data-table tbody tr:hover td { background: #fafbff; }

    .modal-toolbar { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
    .modal-toolbar .search-wrap { max-width: 300px; }

    .aw-notice { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .aw-notice.found { background: #f0fdf4; border: 1.5px solid #bbf7d0; color: #15803d; }
    .aw-notice.not-found { background: #fef2f2; border: 1.5px solid #fecaca; color: #dc2626; }
    .aw-notice svg { width: 16px; height: 16px; flex-shrink: 0; }

    .form-group input.auto-filled { background: #f0fdf4; border-color: #86efac; color: #15803d; }
    .form-group textarea.auto-filled { background: #f0fdf4; border-color: #86efac; color: #15803d; }

    /* ── FILE UPLOAD ── */
    .file-upload-area {
      border: 2px dashed #e2e8f0; border-radius: 10px; padding: 18px 14px;
      text-align: center; cursor: pointer; transition: all .15s; background: #fafbfc;
    }
    .file-upload-area:hover { border-color: #93c5fd; background: #f0f9ff; }
    .file-upload-area.has-file { border-color: #86efac; background: #f0fdf4; border-style: solid; }
    .file-upload-area input[type="file"] { display: none; }
    .file-upload-label { font-size: 12px; color: #64748b; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none; }
    .file-upload-label svg { width: 22px; height: 22px; color: #94a3b8; }
    .file-upload-label span.sub { font-size: 10px; color: #94a3b8; font-weight: 500; }
    .upload-status-txt { font-size: 11px; font-weight: 600; margin-top: 4px; display: block; min-height: 16px; }

    /* ── IMAGE PREVIEW (in form) ── */
    .img-preview-wrap { border-radius: 9px; overflow: hidden; border: 1.5px solid #e2e8f0; margin-top: 8px; background: #f8fafc; }
    .img-preview-wrap img { width: 100%; max-height: 200px; object-fit: contain; display: block; cursor: pointer; }
    .img-preview-actions { display: flex; gap: 6px; padding: 8px; justify-content: flex-end; background: rgba(0,0,0,.03); border-top: 1px solid #f1f5f9; flex-wrap: wrap; }

    /* ── LABEL ENTRY ROWS (Add Work) ── */
    .entries-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .entries-section-label::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }
    .label-entries-wrap { display: flex; flex-direction: column; gap: 7px; }
    .label-entry-row {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 10px 12px; background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 10px; transition: border-color .15s;
    }
    .label-entry-row.matched { border-color: #86efac; background: #f0fdf4; }
    .label-entry-row.no-match { border-color: #fca5a5; background: #fef2f2; }
    .label-entry-inputs { flex: 1; display: grid; grid-template-columns: 1fr 90px; gap: 6px; }
    .label-entry-inputs input { padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; transition: border-color .15s; width: 100%; }
    .label-entry-inputs input:focus { border-color: #2563eb; }
    .label-entry-status { font-size: 10px; font-weight: 700; margin-top: 4px; }
    .label-entry-status.ok  { color: #15803d; }

<!-- HIDDEN FILE INPUT FOR DRAWER IMAGE UPLOADS -->
<input type="file" id="drawerFileInput" accept="image/*" style="display:none" onchange="onDrawerFileInputChange(this)">


<script>
(function () {
'use strict';

/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyy6zBP4LduRhK-Fz_aK5H3bDH_cvT8HEj2g81aKgEQVIHsQze3AgJQaBr4Cq1FPs3P/exec';


/* ══════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════ */
const BOOL_FIELDS = new Set([
  'Bundle', 'DG Label', 'Poly Bag', 'Warning Label', 'Barcode', 'Box',
  'Veeqo Stock Adjusted', 'UPS Collected'
]);

const COLUMNS = [
  { key: 'warehouse',   title: 'Warehouse',   dotColor: '#d97706' },
  { key: 'digital_ops', title: 'Digital Ops', dotColor: '#2563eb' },
];


/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let fbaData       = [];
let warehouseData = [];
let filtered      = [];
let activeTab     = 'info';
let deletePendingTimer = null;

let drawerDirtyFields = {};
let drawerCurrentId   = null;
let drawerSource      = null;
let isSaving          = false;

// New Product form
let newBarcodeFileUrl = '';

// Add Work form
let awEntries = [{ labelCode: '', unitsRequired: '', matched: null }];
let awGroupingImageUrl = '';
let awMatchedProduct = null;
const awDebounceTimers = {};

// Drawer file upload
let pendingUploadField = null;


/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ea(s) {
  return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadFileToApi(base64, mimeType, filename) {
  return callApi({ action: 'uploadFile', base64, mimeType, filename });
}


/* ══════════════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════════════ */
function openLightbox(imgUrl, viewUrl) {
  document.getElementById('lightboxImg').src = imgUrl || '';
  const linkEl = document.getElementById('lightboxOpenLink');
  linkEl.href = viewUrl || imgUrl || '#';
  document.getElementById('imgLightbox').classList.add('visible');
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('imgLightbox')) return;
  document.getElementById('imgLightbox').classList.remove('visible');
}


/* ══════════════════════════════════════════════════
   NEW PRODUCT — BARCODE FILE
══════════════════════════════════════════════════ */
async function onNewBarcodeFileSelected(input) {
  const file = input.files[0];
  if (!file) return;

  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('nBarcodePreview').src = e.target.result;
    document.getElementById('nBarcodePreviewWrap').style.display = 'block';
    document.getElementById('nBarcodeUploadArea').classList.add('has-file');
  };
  reader.readAsDataURL(file);

  document.getElementById('nBarcodeUploadStatus').innerHTML =
    '<span class="spinner sm" style="margin-right:5px;vertical-align:middle"></span> Uploading to Drive…';

  const base64 = await readFileAsBase64(file);
  const result = await uploadFileToApi(base64, file.type, file.name);

  if (result && result.success) {
    newBarcodeFileUrl = result.imgUrl;
    document.getElementById('nBarcodeUploadStatus').innerHTML =
      '<span style="color:#15803d;font-weight:700">✓ Uploaded successfully</span>';
  } else {
    document.getElementById('nBarcodeUploadStatus').innerHTML =
      '<span style="color:#dc2626;font-weight:700">✗ Upload failed — check Drive permissions</span>';
    newBarcodeFileUrl = '';
  }
}

function clearNewBarcodeFile() {
  newBarcodeFileUrl = '';
  document.getElementById('nBarcodePreviewWrap').style.display = 'none';
  document.getElementById('nBarcodePreview').src = '';
  document.getElementById('nBarcodeUploadArea').classList.remove('has-file');
  document.getElementById('nBarcodeUploadStatus').innerHTML = '';
  document.getElementById('nBarcodeFileInput').value = '';
}


/* ══════════════════════════════════════════════════
   ADD WORK — GROUPING IMAGE
══════════════════════════════════════════════════ */
async function onGroupingImageSelected(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('awGroupingPreview').src = e.target.result;
    document.getElementById('awGroupingPreviewWrap').style.display = 'block';
    document.getElementById('awGroupingUploadArea').classList.add('has-file');
  };
  reader.readAsDataURL(file);

  document.getElementById('awGroupingImageStatus').innerHTML =
    '<span class="spinner sm" style="margin-right:5px;vertical-align:middle"></span> Uploading…';

  const base64 = await readFileAsBase64(file);
  const result = await uploadFileToApi(base64, file.type, file.name);

  if (result && result.success) {
    awGroupingImageUrl = result.imgUrl;
    document.getElementById('awGroupingImageStatus').innerHTML =
      '<span style="color:#15803d;font-weight:700">✓ Uploaded</span>';
    document.getElementById('awGroupingImageLabel').textContent = file.name;
  } else {
    document.getElementById('awGroupingImageStatus').innerHTML =
      '<span style="color:#dc2626;font-weight:700">✗ Upload failed</span>';
    awGroupingImageUrl = '';
  }
}

function clearGroupingImage() {
  awGroupingImageUrl = '';
  document.getElementById('awGroupingPreviewWrap').style.display = 'none';
  document.getElementById('awGroupingPreview').src = '';
  document.getElementById('awGroupingUploadArea').classList.remove('has-file');
  document.getElementById('awGroupingImageStatus').innerHTML = '';
  document.getElementById('awGroupingImageInput').value = '';
  document.getElementById('awGroupingImageLabel').textContent = 'Upload image';
}


/* ══════════════════════════════════════════════════
   DRAWER — IMAGE UPLOAD
══════════════════════════════════════════════════ */
function triggerDrawerImageUpload(field) {
  pendingUploadField = field;
  document.getElementById('drawerFileInput').click();
}

async function onDrawerFileInputChange(input) {
  const file = input.files[0];
  if (!file || !pendingUploadField) return;

  showToast('Uploading image…', 'info');
  const base64 = await readFileAsBase64(file);
  const result = await uploadFileToApi(base64, file.type, file.name);

  if (result && result.success) {
    markDirty(pendingUploadField, result.imgUrl);
    // Update in-memory for immediate display
    const dataSource = drawerSource === 'fba' ? fbaData : warehouseData;
    const row = dataSource.find(r => String(r['ID']) === String(drawerCurrentId));
    if (row) {
      row[pendingUploadField] = result.imgUrl;
      renderDrawer(row);
    }
    showToast('Image uploaded', 'success');
  } else {
    showToast('Upload failed', 'error');
  }

  input.value = '';
  pendingUploadField = null;
}


/* ══════════════════════════════════════════════════
   ADD WORK — LABEL CODE ROWS
══════════════════════════════════════════════════ */
function addLabelCodeRow() {
  awEntries.push({ labelCode: '', unitsRequired: '', matched: null });
  renderAddWorkEntries();
}

function removeLabelCodeRow(idx) {
  if (awEntries.length <= 1) return;
  awEntries.splice(idx, 1);
  renderAddWorkEntries();
}

function onLabelCodeRowInput(idx, value) {
  awEntries[idx].labelCode = value;
  awEntries[idx].matched = null;

  clearTimeout(awDebounceTimers[idx]);
  awDebounceTimers[idx] = setTimeout(() => {
    if (!value.trim()) {
      renderAddWorkEntries();
      return;
    }
    const match = fbaData.find(r =>
      String(r['Label Code'] || '').trim().toLowerCase() === value.trim().toLowerCase()
    );
    awEntries[idx].matched = match || null;
    renderAddWorkEntries();
  }, 300);
}

function renderAddWorkEntries() {
  const container = document.getElementById('awEntriesContainer');
  let html = '';

  awEntries.forEach((entry, idx) => {
    const statusClass = entry.matched ? 'matched' : (entry.labelCode.trim() && !entry.matched ? 'no-match' : '');
    const statusText  = entry.matched
      ? '✓ Found: ' + esc(entry.matched['Product Line'] || entry.matched['Brand'] || entry.labelCode)
      : (entry.labelCode.trim() ? '✗ Not found in FBA products' : '');
    const statusCls = entry.matched ? 'ok' : 'err';

    html += '<div class="label-entry-row ' + statusClass + '">';
    html += '<div style="flex:1">';
    html += '<div class="label-entry-inputs">';
    html += '<input type="text" value="' + ea(entry.labelCode) + '" placeholder="Label Code (e.g. FBA-LC-001)" oninput="onLabelCodeRowInput(' + idx + ',this.value)">';
    html += '<input type="number" value="' + ea(String(entry.unitsRequired)) + '" placeholder="Units" min="1" step="1" oninput="awEntries[' + idx + '].unitsRequired=this.value" style="width:100%">';
    html += '</div>';
    if (statusText) {
      html += '<div class="label-entry-status ' + statusCls + '" style="margin-top:5px;font-size:10px">' + statusText + '</div>';
    }
    html += '</div>';
    if (awEntries.length > 1) {
      html += '<button type="button" class="label-entry-remove" onclick="removeLabelCodeRow(' + idx + ')">×</button>';
    }
    html += '</div>';
  });

  container.innerHTML = html;

  // Show auto-populated fields for first matched entry
  const firstMatch = awEntries.find(e => e.matched);
  if (firstMatch) {
    awMatchedProduct = firstMatch.matched;
    document.getElementById('awBrand').value           = awMatchedProduct['Brand']            || '';
    document.getElementById('awProductLine').value     = awMatchedProduct['Product Line']     || '';
    document.getElementById('awAsin').value            = awMatchedProduct['ASIN']             || '';
    document.getElementById('awPrepInstructions').value = awMatchedProduct['Prep Instructions'] || '';
    document.getElementById('awBundle').value          = awMatchedProduct['Bundle']           || '';
    document.getElementById('awDgLabel').value         = awMatchedProduct['DG Label']         || '';
    document.getElementById('awPolyBag').value         = awMatchedProduct['Poly Bag']         || '';
    document.getElementById('awWarningLabel').value    = awMatchedProduct['Warning Label']    || '';
    document.getElementById('awBarcode').value         = awMatchedProduct['Barcode']          || '';
    document.getElementById('awBox').value             = awMatchedProduct['Box']              || '';
    document.getElementById('awAutoFields').style.display = 'block';

    // Barcode image
    const barcodeImgUrl = awMatchedProduct['Barcode File'] || '';
    if (barcodeImgUrl) {
      document.getElementById('awBarcodeImg').src = barcodeImgUrl;
      document.getElementById('awBarcodeViewLink').href = barcodeImgUrl;
      document.getElementById('awBarcodeImageSection').style.display = 'block';
    } else {
      document.getElementById('awBarcodeImageSection').style.display = 'none';
    }
  } else {
    awMatchedProduct = null;
    document.getElementById('awAutoFields').style.display = 'none';
  }
}


/* ══════════════════════════════════════════════════
   BUCKET LOGIC
══════════════════════════════════════════════════ */
function getBucket(row) {
  const unitsCompleted = String(row['Units Completed'] ?? '').trim();
  const upsCollected   = String(row['UPS Collected']   ?? '').trim().toLowerCase();
  if ((!unitsCompleted || unitsCompleted === '0') && (!upsCollected || upsCollected === '' || upsCollected === '—')) {
    return 'warehouse';
  }
  const veeqo = String(row['Veeqo Stock Adjusted'] ?? '').trim().toLowerCase();
  if (veeqo !== 'yes') return 'digital_ops';
  return 'completed';
}


/* ══════════════════════════════════════════════════
   DATA — LOAD
══════════════════════════════════════════════════ */
async function loadData() {
  try {
    const [fbaRes, whRes] = await Promise.all([
      fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({ action: 'getFBA' }) }),
      fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({ action: 'getWarehouse' }) })
    ]);

    const fbaJson = await fbaRes.json();
    const whJson  = await whRes.json();

    if (!fbaJson.success) throw new Error(fbaJson.message || 'FBA API error');

    const fbaHeaders = fbaJson.headers || [];
    fbaData = (fbaJson.rows || []).map(row => {
      const obj = {};
      fbaHeaders.forEach((h, i) => { obj[h] = row[i] ?? ''; });
      return obj;
    });

    if (whJson.success) {
      const whHeaders = whJson.headers || [];
      warehouseData = (whJson.rows || []).map(row => {
        const obj = {};
        whHeaders.forEach((h, i) => { obj[h] = row[i] ?? ''; });
        return obj;
      });
    } else {
      warehouseData = [];
    }

    applyFilters();
    showToast('Loaded ' + fbaData.length + ' products, ' + warehouseData.length + ' work items', 'success');
  } catch (err) {
    console.error(err);
    document.getElementById('kanbanWrapper').innerHTML =
      '<div class="loading-state" style="width:100%">'
      + '<p style="color:#dc2626;font-weight:600;text-align:center;line-height:1.7">'
      + 'Failed to load data.<br>'
      + '<span style="font-size:12px;color:#94a3b8;font-weight:500">Check your Apps Script has both <code>getFBA</code> and <code>getWarehouse</code> actions.</span>'
      + '</p></div>';
    showToast('Failed to load data', 'error');
  }
}


/* ══════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════ */
function updateStats() {
  const total     = warehouseData.length;
  const completed = warehouseData.filter(r => getBucket(r) === 'completed').length;
  setChip('statTotal',     total     + ' Total');
  setChip('statCompleted', completed + ' Completed');
}

function setChip(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + text + '</span>';
}


/* ══════════════════════════════════════════════════
   FILTERS + SEARCH
══════════════════════════════════════════════════ */
function applyFilters() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  filtered = warehouseData.filter(row => {
    if (!q) return true;
    return (
      String(row['Label Code']   || '').toLowerCase().includes(q) ||
      String(row['Brand']        || '').toLowerCase().includes(q) ||
      String(row['Product Line'] || '').toLowerCase().includes(q) ||
      String(row['ASIN']         || '').toLowerCase().includes(q)
    );
  });
  updateStats();
  renderKanban();
}


/* ══════════════════════════════════════════════════
   KANBAN
══════════════════════════════════════════════════ */
function renderKanban() {
  const wrapper = document.getElementById('kanbanWrapper');
  const groups  = { warehouse: [], digital_ops: [] };
  filtered.forEach(row => {
    const b = getBucket(row);
    if (groups[b]) groups[b].push(row);
  });

  wrapper.innerHTML = '';

  COLUMNS.forEach(col => {
    const items = groups[col.key] || [];
    const colEl = document.createElement('div');
    colEl.className = 'kanban-column';

    colEl.innerHTML =
      '<div class="kanban-col-header">'
      + '<div class="kanban-col-title"><span class="col-dot" style="background:' + col.dotColor + '"></span>' + esc(col.title) + '</div>'
      + '<span class="kanban-col-count">' + items.length + '</span>'
      + '</div>';

    const body = document.createElement('div');
    body.className = 'kanban-col-body';

    if (!items.length) {
      body.innerHTML = '<div class="empty-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No records</p></div>';
    } else {
      items.forEach(row => body.appendChild(buildCard(row)));
    }

    colEl.appendChild(body);
    wrapper.appendChild(colEl);
  });
}


/* ══════════════════════════════════════════════════
   CARD
══════════════════════════════════════════════════ */
function buildCard(row) {
  const id   = String(row['ID'] || '');
  const card = document.createElement('div');
  card.className  = 'kanban-card';
  card.dataset.id = id;
  card.innerHTML  = cardHTML(row);
  card.addEventListener('click', () => openDrawer(id, 'warehouse'));
  return card;
}

function cardHTML(row) {
  const labelCode   = row['Label Code']   || '—';
  const brand       = row['Brand']        || '';
  const productLine = row['Product Line'] || '';
  const asin        = row['ASIN']         || '';
  const unitsReq    = row['Units Required'];
  const brandLine   = [brand, productLine].filter(Boolean).join(' · ');

  const chipDefs = [
    { key: 'DG Label',      label: 'DG'      },
    { key: 'Poly Bag',      label: 'Poly'    },
    { key: 'Warning Label', label: 'Warn'    },
    { key: 'Barcode',       label: 'Barcode' },
    { key: 'Box',           label: 'Box'     },
  ];

  const chips = chipDefs.map(c => {
    const v = String(row[c.key] || '').trim().toLowerCase();
    if (v === 'yes') return '<span class="chip yes">'   + c.label + '</span>';
    if (v === 'no')  return '<span class="chip no">'    + c.label + '</span>';
    return               '<span class="chip unset">' + c.label + '</span>';
  }).join('');

  return ''
    + '<div class="kc-label">'     + esc(labelCode) + '</div>'
    + (brandLine ? '<div class="kc-brandline">' + esc(brandLine) + '</div>' : '')
    + (asin      ? '<div class="kc-asin">'      + esc(asin)     + '</div>' : '')
    + '<div class="kc-stats"><div class="kc-stat">'
      + '<div class="kc-stat-label">Units Req.</div>'
      + '<div class="kc-stat-val">' + esc(String(unitsReq || '—')) + '</div>'
    + '</div></div>'
    + '<div class="kc-chips">' + chips + '</div>';
}


/* ══════════════════════════════════════════════════
   DRAWER — OPEN / CLOSE
══════════════════════════════════════════════════ */
function openDrawer(id, source) {
  source = source || 'warehouse';
  const dataSource = source === 'fba' ? fbaData : warehouseData;
  const row = dataSource.find(r => String(r['ID']) === String(id));
  if (!row) return;

  drawerDirtyFields = {};
  drawerCurrentId = id;
  drawerSource = source;
  isSaving = false;

  const drawer = document.getElementById('detailDrawer');
  drawer.dataset.currentId = id;

  if (source === 'warehouse') {
    const bucket = getBucket(row);
    activeTab = bucket === 'warehouse' ? 'warehouse' : 'info';
  } else {
    activeTab = 'info';
  }

  renderDrawer(row);
  drawer.classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
}

function closeDrawer() {
  if (Object.keys(drawerDirtyFields).length > 0) {
    if (!confirm('You have unsaved changes. Save before closing?')) {
      document.getElementById('detailDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('visible');
      drawerDirtyFields = {};
      drawerCurrentId = null;
      drawerSource = null;
      applyFilters();
    } else {
      saveAllChanges().then(() => {
        document.getElementById('detailDrawer').classList.remove('open');
        document.getElementById('drawerOverlay').classList.remove('visible');
        drawerDirtyFields = {};
        drawerCurrentId = null;
        drawerSource = null;
        applyFilters();
      });
    }
    return;
  }
  document.getElementById('detailDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('visible');
  drawerDirtyFields = {};
  drawerCurrentId = null;
  drawerSource = null;
  applyFilters();
}


/* ══════════════════════════════════════════════════
   DRAWER — RENDER
══════════════════════════════════════════════════ */
function renderDrawer(row) {
  const id     = String(row['ID'] || '');
  const source = drawerSource || 'warehouse';
  const bucket = source === 'warehouse' ? getBucket(row) : 'fba';
  const isWarehouseBucket  = (source === 'warehouse' && bucket === 'warehouse');
  const isDigitalOpsBucket = (source === 'warehouse' && bucket === 'digital_ops');

  const badgeHTML = {
    digital_ops: '<span class="drawer-bucket-badge dbb-digital">Digital Ops</span>',
    warehouse:   '<span class="drawer-bucket-badge dbb-warehouse">Warehouse</span>',
    completed:   '<span class="drawer-bucket-badge dbb-completed">Completed</span>',
    fba:         '<span class="drawer-bucket-badge" style="background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#818cf8">FBA Product</span>',
  }[bucket] || '';

  const productLine = row['Product Line'] || '';
  const brand       = row['Brand'] || '';
  const labelCode   = row['Label Code'] || '';
  const subtitle    = [brand, labelCode].filter(Boolean).join(' — ');
  const unitsReq    = row['Units Required']  || '—';
  const unitsDone   = row['Units Completed'] || '—';
  const upsCol      = row['UPS Collected']   || '—';

  document.getElementById('drawerHeader').innerHTML =
    '<div class="drawer-hero">'
    + '<button class="drawer-hero-close" onclick="closeDrawer()">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    + '</button>'
    + badgeHTML
    + (productLine ? '<div class="drawer-product-line">' + esc(productLine) + '</div>' : '')
    + '<div class="drawer-title"></div>'
    + (subtitle ? '<div class="drawer-subtitle">' + esc(subtitle) + '</div>' : '')
    + '<div class="drawer-kpi-row">'
      + kpiBox('Units Required',  esc(String(unitsReq)))
      + kpiBox('Units Completed', esc(String(unitsDone)))
      + kpiBox('UPS Collected',   esc(String(upsCol)))
    + '</div>'
    + '</div>';

  let tabsHTML = '';
  if (source === 'fba') {
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info')
      + dTab('prep', id, svgPackage(), 'Prep')
      + dTab('warehouse', id, svgWarehouse(), 'Warehouse');
  } else if (isWarehouseBucket) {
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info', true)
      + dTab('prep', id, svgPackage(), 'Prep', true)
      + dTab('warehouse', id, svgWarehouse(), 'Warehouse');
  } else if (isDigitalOpsBucket) {
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info')
      + dTab('prep', id, svgPackage(), 'Prep');
  } else {
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info')
      + dTab('prep', id, svgPackage(), 'Prep')
      + dTab('warehouse', id, svgWarehouse(), 'Warehouse');
  }
  document.getElementById('drawerTabs').innerHTML = tabsHTML;

  let body = '';
  const ro = isWarehouseBucket;

  if (activeTab === 'info') {
    body += sec('Product Info') + '<div class="info-grid">'
      + eCard(id, 'Label Code',    row['Label Code']   || '', 'text', ro)
      + eCard(id, 'Brand',         row['Brand']        || '', 'text', ro)
      + eCard(id, 'Product Line',  row['Product Line'] || '', 'text', ro)
      + eCard(id, 'Amazon / ASIN', row['ASIN']         || '', 'text', ro)
      + '</div></div>'
      + sec('Quantities') + '<div class="info-grid">'
      + eCard(id, 'Units Required', row['Units Required'] || '', 'number', ro)
      + bCard(id, 'Veeqo Stock Adjusted', row['Veeqo Stock Adjusted'], ro)
      + '</div></div>';

    // ── BARCODE IMAGE ──
    const barcodeFileUrl = String(row['Barcode File'] || '').trim();
    if (barcodeFileUrl) {
      body += sec('Barcode Image')
        + '<div class="info-grid full">'
        + '<div class="drawer-img-card">'
        + '<label>Barcode File</label>'
        + '<img src="' + ea(barcodeFileUrl) + '" alt="Barcode" onclick="openLightbox(\'' + ea(barcodeFileUrl) + '\',\'' + ea(barcodeFileUrl) + '\')">'
        + '<div class="img-card-actions">'
        + '<a href__="' + ea(barcodeFileUrl) + '" target="_blank" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">Open Full</a>'
        + (!ro ? '<button class="btn btn-secondary" style="font-size:11px;padding:4px 10px" onclick="triggerDrawerImageUpload(\'Barcode File\')">Replace</button>' : '')
        + '</div></div>'
        + '</div></div>';
    } else if (!ro) {
      body += sec('Barcode Image')
        + '<div class="info-grid full">'
        + '<div class="drawer-img-placeholder" onclick="triggerDrawerImageUpload(\'Barcode File\')">'
        + '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:6px"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>'
        + '<div>Upload Barcode Image</div></div>'
        + '</div></div>';
    }

    // ── ADDITIONAL INFO (Warehouse items only) ──
    if (source === 'warehouse') {
      body += sec('Additional Info') + '<div class="info-grid">'
        + eCard(id, 'Grouping Link',    row['Grouping Link']    || '', 'text', ro)
        + dateCard(id, 'Collection Booked', row['Collection Booked'] || '', ro)
        + '</div>';

      const groupingImgUrl = String(row['Grouping Image'] || '').trim();
      if (groupingImgUrl) {
        body += '<div class="info-grid full" style="margin-top:8px">'
          + '<div class="drawer-img-card">'
          + '<label>Grouping Image</label>'
          + '<img src="' + ea(groupingImgUrl) + '" alt="Grouping Image" onclick="openLightbox(\'' + ea(groupingImgUrl) + '\',\'' + ea(groupingImgUrl) + '\')">'
          + '<div class="img-card-actions">'
          + '<a href__="' + ea(groupingImgUrl) + '" target="_blank" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">Open Full</a>'
          + (!ro ? '<button class="btn btn-secondary" style="font-size:11px;padding:4px 10px" onclick="triggerDrawerImageUpload(\'Grouping Image\')">Replace</button>' : '')
          + '</div></div>'
          + '</div>';
      } else if (!ro) {
        body += '<div class="info-grid full" style="margin-top:8px">'
          + '<div class="drawer-img-placeholder" onclick="triggerDrawerImageUpload(\'Grouping Image\')">'
          + '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:6px"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>'
          + '<div>Upload Grouping Image</div></div>'
          + '</div>';
      }

      body += '</div>'; // close Additional Info section
    }
  }

  if (activeTab === 'prep') {
    body += sec('Instructions') + '<div class="info-grid full">'
      + taCard(id, 'Prep Instructions', row['Prep Instructions'] || '', ro)
      + '</div></div>'
      + sec('Packaging') + '<div class="info-grid">'
      + bCard(id, 'Bundle',        row['Bundle'], ro)
      + bCard(id, 'DG Label',      row['DG Label'], ro)
      + bCard(id, 'Poly Bag',      row['Poly Bag'], ro)
      + bCard(id, 'Warning Label', row['Warning Label'], ro)
      + bCard(id, 'Barcode',       row['Barcode'], ro)
      + bCard(id, 'Box',           row['Box'], ro)
      + '</div></div>';
  }

  if (activeTab === 'warehouse') {
    body += sec('Completion') + '<div class="info-grid">'
      + bCard(id, 'UPS Collected',   row['UPS Collected'])
      + eCard(id, 'Units Completed', row['Units Completed'] || '', 'number')
      + '</div></div>';
  }

  document.getElementById('drawerBody').innerHTML = body;

  const hasDirty = Object.keys(drawerDirtyFields).length > 0;
  let footerHTML = '';
  if (source === 'warehouse') {
    footerHTML = '<button id="deleteBtn" class="btn btn-danger" onclick="deleteRecord(\'' + ea(id) + '\')">'
      + svgTrash() + 'Delete</button>'
      + '<button id="saveBtn" class="btn-save"' + (hasDirty ? '' : ' disabled') + ' onclick="saveAllChanges()">'
      + svgCheck() + (hasDirty ? 'Save Changes' : 'All Saved') + '</button>';
  } else {
    footerHTML = '<button id="deleteBtn" class="btn btn-danger" onclick="deleteFBAProduct(\'' + ea(id) + '\')">'
      + svgTrash() + 'Delete</button>'
      + '<button id="saveBtn" class="btn-save"' + (hasDirty ? '' : ' disabled') + ' onclick="saveAllChanges()">'
      + svgCheck() + (hasDirty ? 'Save Changes' : 'All Saved') + '</button>';
  }
  document.getElementById('drawerFooter').innerHTML = footerHTML;
}


/* ── Drawer component helpers ── */
function kpiBox(label, val) {
  return '<div class="drawer-kpi"><div class="drawer-kpi-label">' + label + '</div><div class="drawer-kpi-val">' + val + '</div></div>';
}
function dTab(t, id, icon, label, disabled) {
  return '<button class="drawer-tab' + (activeTab === t ? ' active' : '') + (disabled ? ' disabled' : '') + '" onclick="switchTab(\'' + t + '\',\'' + ea(id) + '\')">' + icon + label + '</button>';
}
function switchTab(t, id) {
  activeTab = t;
  const dataSource = drawerSource === 'fba' ? fbaData : warehouseData;
  const row = dataSource.find(r => String(r['ID']) === String(id));
  if (row) renderDrawer(row);
}
function sec(label) {
  return '<div class="drawer-section"><div class="section-label">' + esc(label) + '</div>';
}
function eCard(id, label, value, type, readonly) {
  const displayVal = drawerDirtyFields.hasOwnProperty(label) ? drawerDirtyFields[label] : value;
  let inp;
  if (type === 'number') {
    const n = parseFloat(displayVal);
    inp = '<input type="number" class="edit-input" value="' + (isNaN(n) ? '' : n) + '" step="1" min="0"'
        + (readonly ? ' readonly style="background:#f8fafc;opacity:.6;pointer-events:none"' : '')
        + ' oninput="markDirty(\'' + ea(label) + '\',this.value)">';
  } else {
    inp = '<input type="text" class="edit-input" value="' + ea(String(displayVal)) + '"'
        + (readonly ? ' readonly style="background:#f8fafc;opacity:.6;pointer-events:none"' : '')
        + ' oninput="markDirty(\'' + ea(label) + '\',this.value)">';
  }
  return '<div class="info-card' + (readonly ? ' readonly' : '') + '"><label>' + esc(label) + '</label>' + inp + '</div>';
}
function taCard(id, label, value, readonly) {
  const displayVal = drawerDirtyFields.hasOwnProperty(label) ? drawerDirtyFields[label] : value;
  return '<div class="info-card' + (readonly ? ' readonly' : '') + '"><label>' + esc(label) + '</label>'
    + '<textarea class="edit-textarea"' + (readonly ? ' readonly style="background:#f8fafc;opacity:.6;pointer-events:none"' : '')
    + ' oninput="markDirty(\'' + ea(label) + '\',this.value)">'
    + esc(displayVal) + '</textarea></div>';
}
function dateCard(id, label, value, readonly) {
  const displayVal = drawerDirtyFields.hasOwnProperty(label) ? drawerDirtyFields[label] : value;
  return '<div class="info-card' + (readonly ? ' readonly' : '') + '"><label>' + esc(label) + '</label>'
    + '<input type="date" class="edit-input" value="' + ea(String(displayVal)) + '"'
    + (readonly ? ' readonly style="background:#f8fafc;opacity:.6;pointer-events:none"' : '')
    + ' onchange="markDirty(\'' + ea(label) + '\',this.value)">'
    + '</div>';
}
function bCard(id, label, value, readonly) {
  const v   = drawerDirtyFields.hasOwnProperty(label) ? drawerDirtyFields[label] : String(value ?? '').trim();
  const low = v.toLowerCase();
  if (readonly) {
    return '<div class="info-card readonly"><label>' + esc(label) + '</label>'
      + '<div class="bool-toggle-group" style="opacity:.6;pointer-events:none">'
      + '<button type="button" class="bool-toggle-btn' + (low === 'yes' ? ' active-yes' : '') + '">Yes</button>'
      + '<button type="button" class="bool-toggle-btn' + (low === 'no'  ? ' active-no'  : '') + '">No</button>'
      + '<button type="button" class="bool-toggle-btn' + (low !== 'yes' && low !== 'no' ? ' active-unset' : '') + '">—</button>'
      + '</div></div>';
  }
  return '<div class="info-card"><label>' + esc(label) + '</label>'
    + '<div class="bool-toggle-group">'
    + '<button type="button" class="bool-toggle-btn' + (low === 'yes' ? ' active-yes' : '') + '" onclick="markBool(\'' + ea(label) + '\',\'Yes\',this)">Yes</button>'
    + '<button type="button" class="bool-toggle-btn' + (low === 'no'  ? ' active-no'  : '') + '" onclick="markBool(\'' + ea(label) + '\',\'No\',this)">No</button>'
    + '<button type="button" class="bool-toggle-btn' + (low !== 'yes' && low !== 'no' ? ' active-unset' : '') + '" onclick="markBool(\'' + ea(label) + '\',\'\',this)">—</button>'
    + '</div></div>';
}

function markDirty(field, value) {
  drawerDirtyFields[field] = value;
  updateSaveButton();
}
function markBool(field, value, btnEl) {
  drawerDirtyFields[field] = value;
  const group = btnEl.parentElement;
  group.querySelectorAll('.bool-toggle-btn').forEach(b => { b.className = 'bool-toggle-btn'; });
  const low = value.toLowerCase();
  if (low === 'yes') btnEl.classList.add('active-yes');
  else if (low === 'no') btnEl.classList.add('active-no');
  else btnEl.classList.add('active-unset');
  updateSaveButton();
}
function updateSaveButton() {
  const btn = document.getElementById('saveBtn');
  if (!btn) return;
  const hasDirty = Object.keys(drawerDirtyFields).length > 0;
  btn.disabled = !hasDirty;
  btn.classList.remove('saved');
  btn.innerHTML = svgCheck() + (hasDirty ? 'Save Changes' : 'All Saved');
}


/* ══════════════════════════════════════════════════
   SAVE ALL CHANGES
══════════════════════════════════════════════════ */
async function saveAllChanges() {
  if (isSaving || !drawerCurrentId) return;
  const dirtyKeys = Object.keys(drawerDirtyFields);
  if (dirtyKeys.length === 0) return;

  isSaving = true;

  const dataSource = drawerSource === 'fba' ? fbaData : warehouseData;
  const idx = dataSource.findIndex(r => String(r['ID']) === String(drawerCurrentId));
  if (idx < 0) { isSaving = false; return; }

  dirtyKeys.forEach(field => { dataSource[idx][field] = drawerDirtyFields[field]; });
  drawerDirtyFields = {};
  updateStats();
  applyFilters();

  const btn = document.getElementById('saveBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = svgCheck() + 'All Saved';
    btn.classList.add('saved');
    setTimeout(() => btn.classList.remove('saved'), 1500);
  }

  const row = dataSource[idx];
  if (row && document.getElementById('detailDrawer').classList.contains('open')) {
    renderDrawer(row);
  }

  const action = drawerSource === 'fba' ? 'saveFBA' : 'saveWarehouse';
  return callApi({ action, data: rowToApiData(row) }).then(result => {
    isSaving = false;
    if (!result || !result.success) {
      showToast('Sync error — changes may not have saved', 'error');
    }
  });
}


/* ══════════════════════════════════════════════════
   DELETE RECORD (Warehouse)
══════════════════════════════════════════════════ */
async function deleteRecord(id) {
  const btn = document.getElementById('deleteBtn');
  if (!btn) return;

  if (!btn.classList.contains('confirming')) {
    btn.classList.add('confirming');
    btn.innerHTML = svgWarning() + 'Confirm?';
    deletePendingTimer = setTimeout(() => {
      btn.classList.remove('confirming');
      btn.innerHTML = svgTrash() + 'Delete';
    }, 3000);
    return;
  }

  clearTimeout(deletePendingTimer);
  btn.classList.remove('confirming');
  btn.classList.add('deleting');
  btn.innerHTML = '<span class="spinner sm"></span>Deleting…';

  const card = document.querySelector('.kanban-card[data-id="' + id + '"]');
  if (card) card.classList.add('card-deleting');

  const result = await callApi({ action: 'deleteWarehouse', id });

  if (result && result.success) {
    const idx = warehouseData.findIndex(r => String(r['ID']) === String(id));
    if (idx > -1) warehouseData.splice(idx, 1);
    setTimeout(() => {
      drawerDirtyFields = {};
      drawerCurrentId = null;
      drawerSource = null;
      document.getElementById('detailDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('visible');
      applyFilters();
      showToast('Record deleted', 'success');
    }, 420);
  } else {
    if (card) card.classList.remove('card-deleting');
    btn.classList.remove('deleting');
    btn.innerHTML = svgTrash() + 'Delete';
    showToast('Error deleting record', 'error');
  }
}


/* ══════════════════════════════════════════════════
   DELETE FBA PRODUCT
══════════════════════════════════════════════════ */
async function deleteFBAProduct(id) {
  const btn = document.getElementById('deleteBtn');
  if (!btn) return;

  if (!btn.classList.contains('confirming')) {
    btn.classList.add('confirming');
    btn.innerHTML = svgWarning() + 'Confirm?';
    deletePendingTimer = setTimeout(() => {
      btn.classList.remove('confirming');
      btn.innerHTML = svgTrash() + 'Delete';
    }, 3000);
    return;
  }

  clearTimeout(deletePendingTimer);
  btn.classList.remove('confirming');
  btn.classList.add('deleting');
  btn.innerHTML = '<span class="spinner sm"></span>Deleting…';

  const result = await callApi({ action: 'deleteFBA', id });

  if (result && result.success) {
    const idx = fbaData.findIndex(r => String(r['ID']) === String(id));
    if (idx > -1) fbaData.splice(idx, 1);
    setTimeout(() => {
      drawerDirtyFields = {};
      drawerCurrentId = null;
      drawerSource = null;
      document.getElementById('detailDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('visible');

      showToast('Product deleted', 'success');
    }, 420);
  } else {
    btn.classList.remove('deleting');
    btn.innerHTML = svgTrash() + 'Delete';
    showToast('Error deleting product', 'error');
  }
}


/* ══════════════════════════════════════════════════
   PRODUCTS TABLE MODAL
══════════════════════════════════════════════════ */
function openProductsModal() {
  document.getElementById('productsSearchInput').value = '';
  renderProductsTable();
  document.getElementById('productsModalOverlay').classList.add('visible');
}

function closeProductsModal(e) {
  if (e && e.target !== document.getElementById('productsModalOverlay')) return;
  document.getElementById('productsModalOverlay').classList.remove('visible');
}

function renderProductsTable() {
  const q = (document.getElementById('productsSearchInput').value || '').toLowerCase().trim();
  const data = fbaData.filter(row => {
    if (!q) return true;
    return (
      String(row['Label Code']   || '').toLowerCase().includes(q) ||
      String(row['Brand']        || '').toLowerCase().includes(q) ||
      String(row['Product Line'] || '').toLowerCase().includes(q) ||
      String(row['ASIN']         || '').toLowerCase().includes(q)
    );
  });

  document.getElementById('productsModalCount').textContent = data.length;
  const cols = ['Label Code', 'Brand', 'Product Line', 'ASIN', 'Prep Instructions'];

  let html = '<table class="data-table"><thead><tr>'
    + cols.map(c => '<th>' + esc(c) + '</th>').join('')
    + '</tr></thead><tbody>';

  if (!data.length) {
    html += '<tr><td colspan="' + cols.length + '" style="text-align:center;padding:32px;color:#94a3b8;font-weight:600">No products found</td></tr>';
  } else {
    data.forEach(row => {
      const rid = ea(String(row['ID'] || ''));
      html += '<tr onclick="openDrawerFromProductsTable(\'' + rid + '\')">'
        + cols.map(c => {
          let val = String(row[c] ?? '—');
          if (c === 'Prep Instructions' && val.length > 50) val = val.substring(0, 50) + '…';
          return '<td>' + esc(val) + '</td>';
        }).join('')
        + '</tr>';
    });
  }

  html += '</tbody></table>';
  document.getElementById('productsModalBody').innerHTML = html;
}

function openDrawerFromProductsTable(id) {
  openDrawer(id, 'fba');
}

function setFormBool(fieldId, value, btnEl) {
  document.getElementById(fieldId).value = value;

async function createRecord() {
  const fields = [
    { id: 'nLabelCode',        fg: 'fg-nLabelCode',        label: 'Label Code' },
    { id: 'nBrand',            fg: 'fg-nBrand',            label: 'Brand' },
    { id: 'nProductLine',      fg: 'fg-nProductLine',      label: 'Product Line' },
    { id: 'nAsin',             fg: 'fg-nAsin',             label: 'ASIN' },
    { id: 'nPrepInstructions', fg: 'fg-nPrepInstructions', label: 'Prep Instructions' },
    { id: 'nPolyBag',          fg: 'fg-nPolyBag',          label: 'Poly Bag' },
    { id: 'nWarningLabel',     fg: 'fg-nWarningLabel',     label: 'Warning Label' },
    { id: 'nBarcode',          fg: 'fg-nBarcode',          label: 'Barcode' },
    { id: 'nBox',              fg: 'fg-nBox',              label: 'Box' },
  ];

  let hasError = false;
  document.querySelectorAll('#newProductForm .form-group').forEach(g => g.classList.remove('has-error'));
  document.querySelectorAll('#newProductForm .field-error').forEach(e => e.remove());

  fields.forEach(f => {
    if (!document.getElementById(f.id).value.trim()) {
      hasError = true;
      const fg = document.getElementById(f.fg);
      if (fg) {
        fg.classList.add('has-error');
        const errSpan = document.createElement('span');
        errSpan.className = 'field-error';
        errSpan.textContent = f.label + ' is required';
        fg.appendChild(errSpan);
      }
    }
  });

  if (hasError) { showToast('Please fill in all required fields', 'error'); return; }

  const data = {
    id: '',
    labelCode:        document.getElementById('nLabelCode').value.trim(),
    brand:            document.getElementById('nBrand').value.trim(),
    productLine:      document.getElementById('nProductLine').value.trim(),
    asin:             document.getElementById('nAsin').value.trim(),
    prepInstructions: document.getElementById('nPrepInstructions').value.trim(),
    bundle:           '',
    dgLabel:          '',
    polyBag:          document.getElementById('nPolyBag').value.trim(),
    warningLabel:     document.getElementById('nWarningLabel').value.trim(),
    barcode:          document.getElementById('nBarcode').value.trim(),
    box:              document.getElementById('nBox').value.trim(),
    unitsRequired:    0,
    veeqoAdjusted:    '',
    unitsCompleted:   0,
    upsCollected:     '',
    barcodeFile:      newBarcodeFileUrl
  };

  const tempId = 'TEMP-' + Date.now();
  const newRow = {
    'ID': tempId,
    'Label Code': data.labelCode, 'Brand': data.brand,
    'Product Line': data.productLine, 'ASIN': data.asin,
    'Prep Instructions': data.prepInstructions,
    'Bundle': data.bundle, 'DG Label': data.dgLabel,
    'Poly Bag': data.polyBag, 'Warning Label': data.warningLabel,
    'Barcode': data.barcode, 'Box': data.box,
    'Units Required': 0, 'Veeqo Stock Adjusted': '',
    'Units Completed': 0, 'UPS Collected': '',
    'Barcode File': data.barcodeFile
  };
  fbaData.push(newRow);
  closeNewModal();
  renderProductsTable();
  showToast('Product created', 'success');

  const result = await callApi({ action: 'saveFBA', data });
  if (result && result.success && result.id) {
    const idx = fbaData.findIndex(r => r['ID'] === tempId);
    if (idx > -1) fbaData[idx]['ID'] = result.id;
    renderProductsTable();
  } else if (!result || !result.success) {
    fbaData = fbaData.filter(r => r['ID'] !== tempId);
    renderProductsTable();
    showToast('Error creating product', 'error');
  }
}

function openAddWorkModal() {

async function submitAddWork() {
  // Validate entries
  const validEntries = [];
  let hasError = false;

  awEntries.forEach(entry => {
    if (!entry.labelCode.trim()) return; // skip empty rows
    if (!entry.matched) { hasError = true; return; }
    const units = Number(entry.unitsRequired);
    if (!units || units <= 0) { hasError = true; return; }
    validEntries.push(entry);
  });

  if (hasError) {
    showToast('Some entries have errors — check label codes and units', 'error');
    return;
  }
  if (!validEntries.length) {
    showToast('Add at least one valid Label Code with Units Required', 'error');
    return;
  }

  const btn = document.getElementById('addWorkSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>Adding…';

  const groupingLink    = document.getElementById('awGroupingLink').value.trim();
  const collectionBooked = document.getElementById('awCollectionBooked').value;
  const groupingImageUrl = awGroupingImageUrl;

  const tempIds = [];

  validEntries.forEach(entry => {
    const tempId = 'TEMP-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    tempIds.push(tempId);

    warehouseData.push({
      'ID': tempId,
      'Label Code':    entry.labelCode,
      'Brand':         entry.matched['Brand']            || '',
      'Product Line':  entry.matched['Product Line']     || '',
      'ASIN':          entry.matched['ASIN']             || '',
      'Prep Instructions': entry.matched['Prep Instructions'] || '',
      'Bundle':        entry.matched['Bundle']           || '',
      'DG Label':      entry.matched['DG Label']         || '',
      'Poly Bag':      entry.matched['Poly Bag']         || '',
      'Warning Label': entry.matched['Warning Label']    || '',
      'Barcode':       entry.matched['Barcode']          || '',
      'Box':           entry.matched['Box']              || '',
      'Units Required': Number(entry.unitsRequired) || 0,
      'Veeqo Stock Adjusted': '',
      'Units Completed': 0,
      'UPS Collected': '',
      'Barcode File':    entry.matched['Barcode File']  || '',
      'Grouping Link':   groupingLink,
      'Grouping Image':  groupingImageUrl,
      'Collection Booked': collectionBooked
    });
  });

  closeAddWorkModal();
  applyFilters();
  showToast(validEntries.length + ' work item' + (validEntries.length > 1 ? 's' : '') + ' added', 'success');

  btn.disabled = false;
  btn.innerHTML = 'Add Work';

  for (let i = 0; i < validEntries.length; i++) {
    const entry = validEntries[i];
    const data = {
      id: '',
      labelCode:        entry.labelCode,
      brand:            entry.matched['Brand']            || '',
      productLine:      entry.matched['Product Line']     || '',
      asin:             entry.matched['ASIN']             || '',
      prepInstructions: entry.matched['Prep Instructions']|| '',
      bundle:           entry.matched['Bundle']           || '',
      dgLabel:          entry.matched['DG Label']         || '',
      polyBag:          entry.matched['Poly Bag']         || '',
      warningLabel:     entry.matched['Warning Label']    || '',
      barcode:          entry.matched['Barcode']          || '',
      box:              entry.matched['Box']              || '',
      unitsRequired:    Number(entry.unitsRequired) || 0,
      veeqoAdjusted:    '',
      unitsCompleted:   0,
      upsCollected:     '',
      barcodeFile:      entry.matched['Barcode File']     || '',
      groupingLink:     groupingLink,
      groupingImage:    groupingImageUrl,
      collectionBooked: collectionBooked
    };

    const result = await callApi({ action: 'saveWarehouse', data });
    if (result && result.success && result.id) {
      const idx = warehouseData.findIndex(r => r['ID'] === tempIds[i]);
      if (idx > -1) warehouseData[idx]['ID'] = result.id;
      applyFilters();
    } else if (!result || !result.success) {
      warehouseData = warehouseData.filter(r => r['ID'] !== tempIds[i]);
      applyFilters();
      showToast('Error saving ' + entry.labelCode, 'error');
    }
  }
}


/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
function showCompletedModal() {
  const completed = warehouseData.filter(r => getBucket(r) === 'completed');
  document.getElementById('completedModalCount').textContent = completed.length;

  const cols = ['Label Code', 'Brand', 'Product Line', 'ASIN', 'Units Required'];
  let html = '<table class="data-table"><thead><tr>'
    + cols.map(c => '<th>' + esc(c) + '</th>').join('')
    + '</tr></thead><tbody>';

  if (!completed.length) {
    html += '<tr><td colspan="' + cols.length + '" style="text-align:center;padding:32px;color:#94a3b8;font-weight:600">No completed records yet</td></tr>';
  } else {
    completed.forEach(row => {
      const rid = ea(String(row['ID'] || ''));
      html += '<tr onclick="closeCompletedModal(); openDrawer(\'' + rid + '\',\'warehouse\')">'
        + cols.map(c => '<td>' + esc(String(row[c] ?? '—')) + '</td>').join('')
        + '</tr>';
    });
  }

  html += '</tbody></table>';
  document.getElementById('completedModalBody').innerHTML = html;
  document.getElementById('completedModalOverlay').classList.add('visible');
}

function closeCompletedModal(e) {
  if (e && e.target !== document.getElementById('completedModalOverlay')) return;
  document.getElementById('completedModalOverlay').classList.remove('visible');
}


/* ══════════════════════════════════════════════════
   API HELPERS
══════════════════════════════════════════════════ */
async function callApi(body) {
  try {
    const res = await fetch(API_URL, {
      method : 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body   : JSON.stringify(body)
    });
    return await res.json();
  } catch (err) {
    console.error('API error:', err);
    return null;
  }
}

    warningLabel:     String(row['Warning Label']         ?? ''),
    barcode:          String(row['Barcode']               ?? ''),

    unitsRequired:    Number(row['Units Required'])       || 0,

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  if (type === 'success' || type === 'error') {
    c.querySelectorAll('.toast.info').forEach(t => t.remove());
  }
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<span class="spinner sm"></span>'
  };
  t.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), type === 'info' ? 10000 : 2500);
}
