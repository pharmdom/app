      <input type="text" id="searchInput" class="search-input" placeholder="Search products…">
    </div>
    <button class="filter-toggle-btn" id="filterToggleBtn" onclick="toggleFilters()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
      Filters
      <span class="filter-dot" id="filterDot" style="display:none"></span>
    </button>
  </div>
  <div class="filter-bar">
    <div class="filter-pills" id="filterPills">
      <select class="filter-select" id="fWarehouse" onchange="applyFilters()">
        <option value="">Warehouse: All</option>
        <option value="yes">Warehouse: Yes</option>
        <option value="no">Warehouse: No</option>
      </select>
      <select class="filter-select" id="fArrived" onchange="applyFilters()">
        <option value="">Arrived: All</option>
        <option value="yes">Arrived: Yes</option>
        <option value="no">Arrived: No</option>
      </select>
      <select class="filter-select" id="fMerged" onchange="applyFilters()">
        <option value="">Merged: All</option>
        <option value="yes">Merged: Yes</option>
        <option value="no">Merged: No</option>
      </select>
      <select class="filter-select" id="fBundled" onchange="applyFilters()">
        <option value="">Bundled: All</option>
        <option value="yes">Bundled: Yes</option>
        <option value="no">Bundled: No</option>
      </select>
      <select class="filter-select" id="fDatePreset" onchange="onDatePresetChange()">
        <option value="">Date: All time</option>
        <option value="today">Today</option>
        <option value="7">Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="custom">Custom range…</option>
      </select>
      <div class="filter-date-wrap" id="customDateWrap" style="display:none">
        <span class="filter-date-label">From</span>
        <input type="date" class="filter-date-input" id="fDateFrom" onchange="applyFilters()">
        <span class="filter-date-sep">→</span>
        <input type="date" class="filter-date-input" id="fDateTo" onchange="applyFilters()">
      </div>
      <button class="filter-clear-btn" id="filterClearBtn" onclick="clearFilters()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Clear
      </button>
    </div>
  </div>
  <div class="kanban-wrapper" id="kanbanWrapper">
    <div class="loading-state" id="loadingState">
      <span class="spinner"></span>
      <span style="font-size:13px;font-weight:600;">Loading products…</span>
    </div>

</div>

<script>
(function () {

const API_URL = window.API_URL;

  ebay: '<svg viewBox="0 0 2500 1000" xmlns="http://www.w3.org/2000/svg" width="26" height="11"><path d="M100 500c0-220 150-360 370-360 180 0 320 90 360 270H670c-30-100-100-150-200-150-150 0-240 110-240 240s90 240 240 240c110 0 185-55 215-165h160c-40 195-180 285-375 285C250 860 100 720 100 500z" fill="#E53238"/><path d="M870 260h155v80c50-65 120-100 215-100 170 0 275 110 275 300s-105 320-275 320c-90 0-160-35-210-95v280H870V260zm350 470c110 0 175-80 175-200s-65-195-175-195c-115 0-180 80-180 195s65 200 180 200z" fill="#0064D2"/><path d="M1620 580c5 120 80 170 210 170 80 0 150-30 175-90h155c-45 145-175 200-335 200-220 0-355-140-355-320s135-320 345-320c230 0 350 155 340 360h-335zm340-110c-10-100-75-150-185-150-105 0-155 55-165 150h350z" fill="#F5AF02"/><path d="M2235 260h170l-250 590c-60 140-115 190-260 190h-90v-120h70c80 0 105-35 130-95l-285-565h180l195 400 140-400z" fill="#86B817"/></svg>',
  tiktok: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.8.1V9.01a6.22 6.22 0 0 0-.8-.05 6.27 6.27 0 0 0-6.27 6.27A6.27 6.27 0 0 0 9.49 21.5a6.27 6.27 0 0 0 6.27-6.27V8.99a8.22 8.22 0 0 0 4.83 1.55V7.1a4.83 4.83 0 0 1-1-.41z" fill="#ffffff"/></svg>',
  amazon_sm: '<svg viewBox="0 0 603 183" xmlns="http://www.w3.org/2000/svg" width="14" height="5"><path d="M373 143c-32 22-77 34-116 34-55 0-104-20-141-53-3-3 0-6 3-4 40 23 89 37 140 37 34 0 72-7 107-22 5-2 9 3 7 8z" fill="#FF9900"/><path d="M346 20V7c0-2 1-3 3-3h55c2 0 3 1 3 3v11c0 2-1 4-3 7l-28 40c11 0 22 1 31 7 2 1 3 3 3 5v14c0 2-2 4-4 3-17-9-40-10-58 0-2 1-4-1-4-3V78c0-2 1-5 3-7l33-47h-28c-2 0-3-1-3-3v-1zM456 5c21 0 33 18 33 41 0 22-13 40-33 40-21 0-32-18-32-41 0-23 11-40 32-40zm0 15c-11 0-11 14-11 23s0 29 11 29c11 0 12-16 12-25 0-6 0-14-2-19-2-5-5-8-10-8z" fill="#221F1F"/></svg>',
  ebay_sm: '<svg viewBox="0 0 2500 1000" xmlns="http://www.w3.org/2000/svg" width="18" height="7"><path d="M100 500c0-220 150-360 370-360 180 0 320 90 360 270H670c-30-100-100-150-200-150-150 0-240 110-240 240s90 240 240 240c110 0 185-55 215-165h160c-40 195-180 285-375 285C250 860 100 720 100 500z" fill="#E53238"/><path d="M870 260h155v80c50-65 120-100 215-100 170 0 275 110 275 300s-105 320-275 320c-90 0-160-35-210-95v280H870V260zm350 470c110 0 175-80 175-200s-65-195-175-195c-115 0-180 80-180 195s65 200 180 200z" fill="#0064D2"/><path d="M1620 580c5 120 80 170 210 170 80 0 150-30 175-90h155c-45 145-175 200-335 200-220 0-355-140-355-320s135-320 345-320c230 0 350 155 340 360h-335zm340-110c-10-100-75-150-185-150-105 0-155 55-165 150h350z" fill="#F5AF02"/><path d="M2235 260h170l-250 590c-60 140-115 190-260 190h-90v-120h70c80 0 105-35 130-95l-285-565h180l195 400 140-400z" fill="#86B817"/></svg>',
  tiktok_sm: '<svg viewBox="0 0 24 24" width="11" height="11" fill="none"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.8.1V9.01a6.22 6.22 0 0 0-.8-.05 6.27 6.27 0 0 0-6.27 6.27A6.27 6.27 0 0 0 9.49 21.5a6.27 6.27 0 0 0 6.27-6.27V8.99a8.22 8.22 0 0 0 4.83 1.55V7.1a4.83 4.83 0 0 1-1-.41z" fill="#ffffff"/></svg>'
};

let allData = [], filtered = [];
let activeDrawerTab = 'overview';
let dragSrcId = null;

const COLUMNS = [
  { key: 'listing', title: 'Needs Listing',     dotColor: '#fbbf24' },
  { key: 'veeqo',   title: 'Need Veeqo',        dotColor: '#60a5fa' },
  { key: 'ready',   title: 'Awaiting Delivery',  dotColor: '#4ade80' },
];

const STAGE_FIELDS = {
  listing: { 'Warehouse': 'No',  'Arrived': 'No'  },
  veeqo:   { 'Warehouse': 'Yes', 'Arrived': 'No'  },
  ready:   { 'Warehouse': 'No',  'Arrived': 'No'  },
};

function parseRowDate(row) {
  const raw = row['Date']; if (!raw) return null;
  const d = new Date(raw); return isNaN(d.getTime()) ? null : d;
}
function daysAgo(date) { if (!date) return null; return Math.floor((Date.now() - date.getTime()) / 86400000); }
function fmtDate(date) { if (!date) return ''; return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
function daysAgoLabel(d) { if (d === null) return ''; if (d === 0) return 'Today'; if (d === 1) return '1 day ago'; return d + ' days ago'; }

function getStage(row) {
  const w = toBool(row['Warehouse']), a = toBool(row['Arrived']);
  if (w && a)  return 'listed';
  if (w && !a) return 'veeqo';
  return 'listing';
}

function applyAutoFields(row) {
  row['Advertising Campaigns'] = 'Yes';
  const sales = parseFloat(row['Sales']) || 0;
  const qty   = parseFloat(row['QTY Purchased']) || 0;
  if (qty > 0 && sales > 0) {
    row['List eBay']   = sales > qty ? 'No' : 'Yes';
    row['List TikTok'] = sales > qty ? 'No' : 'Yes';
  }
}

async function init() { await loadData(); }

async function loadData() {
  if (!API_URL) {
    document.getElementById('loadingState').innerHTML = '<p style="color:#dc2626;font-weight:600;">Set window.API_URL at the top of this file.</p>';
    return;
  }
  showToast('Loading products…', 'info');
  try {
    const res  = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'getListing' }) });
    const data = await res.json();
    allData = Array.isArray(data) ? data : (data.data || []);
    allData.forEach(applyAutoFields);
    applyFilters();
    updateStats(allData);
    showToast('Products loaded', 'success');
  } catch (err) {
    console.error(err);
    document.getElementById('loadingState').innerHTML = '<p style="color:#dc2626;font-weight:600;">Failed to load. Check API_URL and CORS.</p>';
    showToast('Failed to load data', 'error');
  }
}

function updateStats(ds) {
  setChip('statTotal',   ds.length + ' Products');
  setChip('statListed',  ds.filter(p => toBool(p['Warehouse']) && toBool(p['Arrived'])).length + ' Listed');
  setChip('statArrived', ds.filter(p => toBool(p['Arrived'])).length + ' Arrived');
  setChip('statMerged',  ds.filter(p => toBool(p['Merged'])).length  + ' Merged');
  setChip('statBundled', ds.filter(p => toBool(p['Bundled'])).length + ' Bundled');
}
function setChip(id, text) {
  const el = document.getElementById(id); if (!el) return;
  el.innerHTML = el.querySelector('svg').outerHTML + '<span>' + text + '</span>';
}

function showListedTable() {
  const listed = (filtered.length ? filtered : allData).filter(p => toBool(p['Warehouse']) && toBool(p['Arrived']));
  document.getElementById('tableModalTitle').innerHTML = 'Listed Products <span class="modal-count">' + listed.length + '</span>';
  const cols = ['Listing Name','ASINs','Unit Cost','ASIN Cost','Sale Quantity','Sales','QTY Purchased','Warehouse','Arrived','COGs','Merged','Bundled','List eBay','List TikTok'];
  let html = '<table class="data-table"><thead><tr>' + cols.map(c => '<th>' + esc(c) + '</th>').join('') + '</tr></thead><tbody>';
  if (!listed.length) {
    html += '<tr><td colspan="' + cols.length + '" style="text-align:center;padding:30px;color:#94a3b8;">No listed products</td></tr>';
  } else {
    listed.forEach(row => {
      html += '<tr>' + cols.map(c => {
        const v = row[c];
        const boolCols = ['Warehouse','Arrived','Merged','Bundled','List eBay','List TikTok'];
        if (boolCols.includes(c)) { const b = toBool(v); return '<td class="' + (b?'bool-yes':'bool-no') + '">' + (b?'Yes':'No') + '</td>'; }
        if (['Unit Cost','ASIN Cost','COGs'].includes(c)) { const n = parseFloat(v); return '<td>' + (!isNaN(n)?'£'+n.toFixed(2):'—') + '</td>'; }
        if (c === 'Sales') { const n = parseFloat(v); return '<td>' + (!isNaN(n)?'£'+n.toFixed(0):'—') + '</td>'; }
        return '<td>' + esc(v||'—') + '</td>';
      }).join('') + '</tr>';
    });
  }
  html += '</tbody></table>';
  document.getElementById('tableModalBody').innerHTML = html;
  document.getElementById('tableModalOverlay').classList.add('visible');
}
function closeTableModal(e) {
  if (e && e.target !== document.getElementById('tableModalOverlay')) return;
  document.getElementById('tableModalOverlay').classList.remove('visible');
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
function onDatePresetChange() {
  document.getElementById('customDateWrap').style.display = document.getElementById('fDatePreset').value === 'custom' ? 'flex' : 'none';
  applyFilters();
}
function toggleFilters() {
  const p = document.getElementById('filterPills'), b = document.getElementById('filterToggleBtn');
  const open = p.classList.toggle('open'); b.classList.toggle('active', open);
}
function getDateRange() {
  const preset = document.getElementById('fDatePreset').value, now = new Date();
  if (!preset) return { from: null, to: null };
  if (preset === 'today') { const s=new Date(now); s.setHours(0,0,0,0); const e=new Date(now); e.setHours(23,59,59,999); return {from:s,to:e}; }
  if (preset === 'custom') { const fv=document.getElementById('fDateFrom').value, tv=document.getElementById('fDateTo').value; return {from:fv?new Date(fv+'T00:00:00'):null,to:tv?new Date(tv+'T23:59:59'):null}; }
  return { from: new Date(now - parseInt(preset)*86400000), to: null };
}
function applyFilters() {
  const q=document.getElementById('searchInput').value.toLowerCase(),
        fW=document.getElementById('fWarehouse').value, fA=document.getElementById('fArrived').value,
        fM=document.getElementById('fMerged').value,    fB=document.getElementById('fBundled').value,
        fDP=document.getElementById('fDatePreset').value, {from:df,to:dt}=getDateRange();
  filtered = allData.filter(p => {
    if (q && !((p['Listing Name']||'').toLowerCase().includes(q)||(p['ASINs']||'').toLowerCase().includes(q))) return false;
    if (fW==='yes'&&!toBool(p['Warehouse'])) return false; if (fW==='no'&&toBool(p['Warehouse'])) return false;
    if (fA==='yes'&&!toBool(p['Arrived']))   return false; if (fA==='no'&&toBool(p['Arrived']))   return false;
    if (fM==='yes'&&!toBool(p['Merged']))    return false; if (fM==='no'&&toBool(p['Merged']))    return false;
    if (fB==='yes'&&!toBool(p['Bundled']))   return false; if (fB==='no'&&toBool(p['Bundled']))   return false;
    if (df||dt) { const d=parseRowDate(p); if (!d) return false; if (df&&d<df) return false; if (dt&&d>dt) return false; }
    return true;
  });
  filtered.sort((a,b) => { const da=parseRowDate(a),db=parseRowDate(b); if (!da&&!db) return 0; if (!da) return 1; if (!db) return -1; return db-da; });
  const any = fW||fA||fM||fB||fDP;
  document.getElementById('filterDot').style.display = any ? 'inline-block' : 'none';
  document.getElementById('filterClearBtn').classList.toggle('visible', !!any);
  ['fWarehouse','fArrived','fMerged','fBundled','fDatePreset'].forEach(id => { const el=document.getElementById(id); if(el) el.classList.toggle('active',!!el.value); });
  ['fDateFrom','fDateTo'].forEach(id => { const el=document.getElementById(id); if(el) el.classList.toggle('active',!!el.value); });
  updateStats(fDP ? filtered : allData);
  renderKanban();
}
function clearFilters() {
  ['fWarehouse','fArrived','fMerged','fBundled','fDatePreset','fDateFrom','fDateTo'].forEach(id => { const el=document.getElementById(id); if(el){el.value='';el.classList.remove('active');} });
  document.getElementById('customDateWrap').style.display='none';
  document.getElementById('filterDot').style.display='none';
  document.getElementById('filterClearBtn').classList.remove('visible');
  applyFilters();
}

function renderKanban() {
  const wrapper = document.getElementById('kanbanWrapper');
  const groups = {}; COLUMNS.forEach(c => groups[c.key]=[]);
  filtered.forEach(row => { const s=getStage(row); if(groups[s]) groups[s].push(row); });
  wrapper.innerHTML = '';
  COLUMNS.forEach(col => {
    const items = groups[col.key];
    const colEl = document.createElement('div'); colEl.className='kanban-column';
    const hdr = document.createElement('div'); hdr.className='kanban-col-header';
    hdr.innerHTML='<div class="kanban-col-title"><span class="col-dot" style="background:'+col.dotColor+'"></span>'+col.title+'</div><span class="kanban-col-count">'+items.length+'</span>';
    colEl.appendChild(hdr);
    const body = document.createElement('div'); body.className='kanban-col-body'; body.dataset.col=col.key;
    body.addEventListener('dragover', e=>{e.preventDefault();body.classList.add('drag-over');});
    body.addEventListener('dragleave', ()=>body.classList.remove('drag-over'));
    body.addEventListener('drop', e=>{e.preventDefault();body.classList.remove('drag-over');if(dragSrcId===null)return;moveCardToStage(dragSrcId,body.dataset.col);dragSrcId=null;});
    if (!items.length) {
      body.innerHTML='<div class="empty-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No products</p></div>';
    } else {
      items.forEach(row => {
        const id=row['Opportunity ID']||'';
        const card=document.createElement('div'); card.className='kanban-card'; card.draggable=true; card.dataset.id=id;
        const rowDate=parseRowDate(row), dateStr=rowDate?fmtDate(rowDate):'';
        card.innerHTML='<div class="kanban-card-name">'+esc(row['Listing Name']||'—')+'</div>'
          +'<div class="kanban-card-meta"><span class="kanban-card-asin">'+esc(row['ASINs']||'')+'</span>'+(dateStr?'<span class="kanban-card-date-dot"></span><span class="kanban-card-date">'+esc(dateStr)+'</span>':'')+'</div>'
          +'<div class="kanban-card-stats"><div><div class="kc-stat-label">Unit Cost</div><div class="kc-stat-val">£'+fmt(row['Unit Cost'])+'</div></div><div><div class="kc-stat-label">Sales</div><div class="kc-stat-val">£'+fmt(row['Sales'])+'</div></div><div><div class="kc-stat-label">Qty</div><div class="kc-stat-val">'+(row['Sale Quantity']||'—')+'</div></div></div>'
          +'<div class="kanban-card-platforms">'+renderCardPlatforms(row)+'</div>';
        card.addEventListener('click', ()=>openDrawer(id));
        card.addEventListener('dragstart', e=>{dragSrcId=id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
        card.addEventListener('dragend', ()=>{dragSrcId=null;card.classList.remove('dragging');document.querySelectorAll('.kanban-col-body').forEach(b=>b.classList.remove('drag-over'));});
        body.appendChild(card);
      });
    }
    colEl.appendChild(body); wrapper.appendChild(colEl);
  });
}

async function moveCardToStage(id, targetStage) {
  const idx = allData.findIndex(p=>(p['Opportunity ID']||'')===id); if(idx<0) return;
  if (getStage(allData[idx])===targetStage) return;
  const fields = STAGE_FIELDS[targetStage];
  Object.assign(allData[idx], fields); applyAutoFields(allData[idx]); applyFilters(); updateStats(allData);
  if (API_URL) {
    for (const [field,value] of Object.entries(fields)) {
      try { await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateListingField',opportunityId:id,field,value}),headers:{'Content-Type':'text/plain'}}); } catch(e){console.error(e);}
    }
  }
  showToast('Moved to '+COLUMNS.find(c=>c.key===targetStage).title,'success');
}

function renderCardPlatforms(row) {
  return [
    {sheetCol:'Advertising Campaigns',cls:'amz', icon:ICONS.amazon_sm},
    {sheetCol:'List eBay',             cls:'ebay',icon:ICONS.ebay_sm},
    {sheetCol:'List TikTok',           cls:'tt',  icon:ICONS.tiktok_sm},
  ].map(p=>'<div class="kc-plat-icon '+p.cls+(toBool(row[p.sheetCol])?'':' off')+'">'+p.icon+'</div>').join('');
}

function openDrawer(id) {
  const row=allData.find(p=>(p['Opportunity ID']||'')===id); if(!row) return;
  activeDrawerTab='overview'; renderDrawer(row);
  document.getElementById('detailDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
}
function closeDrawer() {
  document.getElementById('detailDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('visible');
}

function renderDrawer(row) {
  const id=row['Opportunity ID']||'', stage=getStage(row);
  const stageBadge = {
    listing:'<span class="drawer-stage-badge dsb-listing">Need Listing</span>',
    veeqo:  '<span class="drawer-stage-badge dsb-veeqo">Need Veeqo</span>',
    ready:  '<span class="drawer-stage-badge dsb-ready">Awaiting Delivery</span>',
    listed: '<span class="drawer-stage-badge dsb-ready">Listed</span>',

  const unitCost=parseFloat(row['Unit Cost']), asinCost=parseFloat(row['ASIN Cost']);
  const sales=parseFloat(row['Sales']), rowDate=parseRowDate(row), dAgo=daysAgo(rowDate), dateStr=rowDate?fmtDate(rowDate):'';

  document.getElementById('drawerHeader').innerHTML =
    '<div class="drawer-hero">'
    +'<button class="drawer-hero-close" onclick="closeDrawer()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
    +stageBadge
    +'<div class="drawer-product-name">'+esc(row['Listing Name']||'—')+'</div>'
    +'<div class="drawer-meta-row"><span class="drawer-product-asin">'+esc(row['ASINs']||'')+'</span>'
    +(dateStr?'<span class="drawer-meta-sep"></span><span class="drawer-product-date">'+esc(dateStr)+'</span>'+(dAgo!==null?'<span class="drawer-date-ago">'+daysAgoLabel(dAgo)+'</span>':''):'')
    +'</div>'
    +'<div class="drawer-kpi-row">'
    +kpi('#ff9900','<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>','Unit Cost',!isNaN(unitCost)?'£'+unitCost.toFixed(2):'—')
    +kpi('#60a5fa','<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>','ASIN Cost',!isNaN(asinCost)?'£'+asinCost.toFixed(2):'—')
    +kpi('#4ade80','<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>','Sale Qty',row['Sale Quantity']||'—')
    +kpi('#f87171','<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>','Sales',!isNaN(sales)?'£'+sales.toFixed(0):'—')
    +'</div></div>';

  document.getElementById('drawerTabs').innerHTML =
    tab('overview',  id, '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>', 'Overview')
   +tab('platforms', id, '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>', 'Platforms')
   +tab('ebay',      id, '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>', 'eBay & TikTok')
   +tab('checklist', id, '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>', 'Marketing');

  const listEbay=toBool(row['List eBay']), listTT=toBool(row['List TikTok']);
  let body = '';

  if (activeDrawerTab === 'overview') {
    body += sec('Listing Info') + '<div class="info-grid">'
      +readCard('Opportunity ID', row['Opportunity ID']||'—')
      +readCard('Date', dateStr||'—')
      +editCard(id,'Listing Name',row['Listing Name']||'','text','Listing Name')
      +editCard(id,'ASINs',row['ASINs']||'','text','ASINs')
      +'</div>'
      +sec('Financials')+'<div class="info-grid">'
      +editCard(id,'Unit Cost',row['Unit Cost']||'','number','Unit Cost')
      +editCard(id,'ASIN Cost',row['ASIN Cost']||'','number','ASIN Cost')
      +editCard(id,'Sale Quantity',row['Sale Quantity']||'','number','Sale Quantity')
      +editCard(id,'Sales',row['Sales']||'','number','Sales')
      +editCard(id,'QTY Purchased',row['QTY Purchased']||'','number','QTY Purchased')
      +editCard(id,'COGs',row['COGs']||'','number','COGs')
      +'</div>'
      +sec('Warehouse & Delivery')+'<div class="info-grid">'
      +editCard(id,'Warehouse Notified',toBoolLabel(row['Warehouse']),'select:Yes,No','Warehouse')
      +editCard(id,'Delivery Received',toBoolLabel(row['Arrived']),'select:Yes,No','Arrived')
      +'</div>';
  }

  if (activeDrawerTab === 'platforms') {
    const amzOn=toBool(row['Advertising Campaigns']);
    body += sec('Marketplace Status')+'<div class="platform-grid">'
      +'<div class="plat-toggle-card auto-managed '+(amzOn?'on':'')+'"><div class="plat-icon-sm amz">'+ICONS.amazon+'</div><div class="plat-toggle-name">Amazon</div><div class="plat-toggle-status">'+cbHtml(amzOn,true)+'</div></div>'
      +'<div class="plat-toggle-card auto-managed '+(listEbay?'on':'')+'"><div class="plat-icon-sm ebay">'+ICONS.ebay+'</div><div class="plat-toggle-name">eBay</div><div class="plat-toggle-status">'+cbHtml(listEbay,true)+'</div></div>'
      +'<div class="plat-toggle-card auto-managed '+(listTT?'on':'')+'"><div class="plat-icon-sm tt">'+ICONS.tiktok+'</div><div class="plat-toggle-name">TikTok</div><div class="plat-toggle-status">'+cbHtml(listTT,true)+'</div></div>'
      +'</div>'
      +sec('Advertising')+'<div class="info-grid">'
      +boolCard(id,'Advertising Campaigns',row['Advertising Campaigns'],'Advertising Campaigns')
      +boolCard(id,'Seller Toolkit (STK)',row['Seller Toolkit (STK)'],'Seller Toolkit (STK)')
      +'</div>';
  }

  if (activeDrawerTab === 'ebay') {
    const eg=!listEbay?' grayed-out':'', tg=!listTT?' grayed-out':'';
    body += sec('eBay Details')+'<div class="info-grid'+eg+'">'
      +editCard(id,'eBay Pack Size',row['eBay Pack Size']||'','number','eBay Pack Size')
      +editCard(id,'eBay Listing Price',row['eBay Listing Price']||'','number','eBay Listing Price')
      +boolCard(id,'eBay Multi-buy',row['eBay Multi-buy'],'eBay Multi-buy')
      +boolCard(id,'eBay Ads',row['eBay Ads'],'eBay Ads')
      +'</div>'
      +sec('TikTok Details')+'<div class="info-grid'+tg+'">'
      +editCard(id,'TikTok Pack Size',row['TikTok Pack Size']||'','number','TikTok Pack Size')
      +editCard(id,'TikTok Listing Price',row['TikTok Listing Price']||'','number','TikTok Listing Price')
      +'</div>';
  }

  if (activeDrawerTab === 'checklist') {
    body += sec('Veeqo Checklist')+'<div class="info-grid">'
      +boolCard(id,'Title Clear',row['Title Clear'],'Title Clear')
      +boolCard(id,'Weight Correct',row['Weight Correct'],'Weight Correct')
      +boolCard(id,'Dimensions Set',row['Dimensions Set'],'Dimensions Set')
      +boolCard(id,'Merged',row['Merged'],'Merged')
      +boolCard(id,'Bundled',row['Bundled'],'Bundled')
      +'</div>'
      +sec('Amazon Marketing')+'<div class="info-grid">'
      +boolCard(id,'Consumer Multi-buy',row['Consumer Multi-buy'],'Consumer Multi-buy')
      +boolCard(id,'B2B Multi-buy',row['B2B Multi-buy'],'B2B Multi-buy')
      +boolCard(id,'B2B Pricing',row['B2B Pricing'],'B2B Pricing')
      +'</div>';
  }

  document.getElementById('drawerBody').innerHTML = body;
  document.getElementById('drawerFooter').innerHTML = '<span style="font-size:11px;color:#94a3b8;">Changes auto-save</span>';
}

function sec(label) { return '<div class="drawer-section"><div class="section-label">'+label+'</div>'; }
function cbHtml(on, sm) { return '<span class="bool-checkbox'+(sm?' bool-checkbox-sm':'')+' '+(on?'checked':'unchecked')+'"></span>'; }
function boolCard(id, label, value, key) {
  const on=toBool(value);
  return '<div class="info-card" style="cursor:pointer" onclick="toggleBool(\''+ea(id)+'\',\''+ea(key)+'\','+ !on +')">'
    +'<label>'+esc(label)+'</label>'
    +'<div style="display:flex;align-items:center;gap:6px;padding:4px 0">'
    +'<span class="bool-checkbox '+(on?'checked':'unchecked')+'"></span>'
    +'<span style="font-size:12px;font-weight:600;color:'+(on?'#16a34a':'#ef4444')+'">'+(on?'Yes':'No')+'</span>'
    +'</div></div>';
}
function kpi(color, svgPath, label, val) {
  return '<div class="drawer-kpi"><div class="drawer-kpi-top"><div class="drawer-kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">'+svgPath+'</svg></div><div class="drawer-kpi-label">'+label+'</div></div><div class="drawer-kpi-val">'+val+'</div></div>';
}
function tab(t, id, icon, label) {
  return '<button class="drawer-tab'+(activeDrawerTab===t?' active':'')+'" onclick="switchTab(\''+t+'\',\''+ea(id)+'\')">'+icon+label+'</button>';
}
function switchTab(t, id) { activeDrawerTab=t; const row=allData.find(p=>(p['Opportunity ID']||'')===id); if(row) renderDrawer(row); }
function editCard(id, label, value, type, key) {
  const disp=(value===undefined||value===null)?'':String(value).trim();
  let inp;
  if (type.startsWith('select:')) {
    const opts=type.replace('select:','').split(',').map(o=>'<option value="'+ea(o)+'"'+(o.toLowerCase()===disp.toLowerCase()?' selected':'')+'>'+esc(o)+'</option>').join('');
    inp='<select class="edit-select" onchange="saveField(\''+ea(id)+'\',\''+ea(key)+'\',this.value)"><option value="">—</option>'+opts+'</select>';
  } else if (type==='number') {
    const n=parseFloat(value);
    inp='<input type="number" class="edit-input" value="'+(isNaN(n)?'':n)+'" step="0.01" onblur="saveField(\''+ea(id)+'\',\''+ea(key)+'\',this.value)">';
  } else {
    inp='<input type="text" class="edit-input" value="'+ea(disp)+'" onblur="saveField(\''+ea(id)+'\',\''+ea(key)+'\',this.value)">';
  }
  return '<div class="info-card"><label>'+esc(label)+'</label>'+inp+'</div>';
}
function readCard(label, value) {
  return '<div class="info-card"><label>'+esc(label)+'</label><div style="font-size:13px;font-weight:600;color:#0f172a;padding:5px 0">'+esc(String(value))+'</div></div>';
}

async function toggleBool(id, key, newVal) {
  const idx=allData.findIndex(p=>(p['Opportunity ID']||'')===id); if(idx<0) return;
  const v=newVal?'Yes':'No'; allData[idx][key]=v; applyAutoFields(allData[idx]);
  showToast('Saving…','info');
  if (API_URL) {
    try {
      const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateListingField',opportunityId:id,field:key,value:v}),headers:{'Content-Type':'text/plain'}});
      const d=await res.json(); if(d.success===false) throw new Error(d.message);
      showToast('Saved','success');
    } catch(e){ console.error(e); showToast('Error saving','error'); }
  } else { showToast('Saved','success'); }
  renderDrawer(allData[idx]); applyFilters();
}

async function saveField(id, field, value) {
  const idx=allData.findIndex(p=>(p['Opportunity ID']||'')===id); if(idx<0) return;
  allData[idx][field]=value; applyAutoFields(allData[idx]);
  showToast('Saving…','info');
  if (API_URL) {
    try {
      const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'updateListingField',opportunityId:id,field,value}),headers:{'Content-Type':'text/plain'}});
      const d=await res.json(); if(d.success===false) throw new Error(d.message);
      showToast('Saved','success');
    } catch(e){ console.error(e); showToast('Error saving','error'); }
  } else { showToast('Saved','success'); }
  if (document.getElementById('detailDrawer').classList.contains('open')) renderDrawer(allData[idx]);
  updateStats(allData); applyFilters();
}

function toBool(v)      { return v===true||v==='true'||v==='Yes'||v==='yes'||v===1||v==='TRUE'; }
function toBoolLabel(v) { return toBool(v)?'Yes':'No'; }
function fmt(v)         { const n=parseFloat(v); return isNaN(n)?'—':n.toFixed(2); }
function esc(s)         { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s)          { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function showToast(msg, type) {
  const c=document.getElementById('toastContainer');
  if (type==='success'||type==='error') c.querySelectorAll('.toast.info').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast '+(type||'');
  const icons={success:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',error:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',info:'<span class="spinner sm"></span>'};
  t.innerHTML=(icons[type]||'')+esc(msg); c.appendChild(t);
  setTimeout(()=>t.remove(), type==='info'?10000:2500);
}

window.toggleFilters=toggleFilters; window.applyFilters=applyFilters; window.clearFilters=clearFilters;
window.onDatePresetChange=onDatePresetChange; window.closeDrawer=closeDrawer; window.switchTab=switchTab;
window.saveField=saveField; window.toggleBool=toggleBool;
window.showListedTable=showListedTable; window.closeTableModal=closeTableModal;

init();
})();
</script>
</body>
