<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px; color: #0f172a; background: #f8fafc;
  line-height: 1.5; height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased;
}

.planner-page {
  padding: 5px 10px 1px 10px;
  height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ─── HEADER ── */
.planner-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; flex-shrink: 0; margin-bottom: 8px; }
.planner-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.planner-title h1 { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 2px; }
.planner-title p { font-size: 12px; color: #64748b; }
.planner-nav { display: flex; align-items: center; gap: 1px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 9px; padding: 1px; }
.planner-nav button { padding: 7px; background: none; border: none; cursor: pointer; border-radius: 7px; transition: background .15s; display: flex; align-items: center; justify-content: center; }
.planner-nav button:hover { background: #f1f5f9; }
.planner-nav button svg { width: 14px; height: 14px; color: #475569; }
.planner-date-label { padding: 0 12px; font-size: 12px; font-weight: 600; color: #0f172a; white-space: nowrap; }
.planner-view-select { padding: 7px 12px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 12px; font-family: inherit; background: #fff; color: #0f172a; cursor: pointer; outline: none; transition: border-color .15s; }
.planner-view-select:focus { border-color: #2563eb; }
.planner-add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: #0f172a; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .15s; white-space: nowrap; }
.planner-add-btn:hover { background: #1e293b; }
.planner-add-btn svg { width: 13px; height: 13px; }

/* ─── LEGEND ── */
.planner-legend { display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; margin-bottom: 8px; }
.legend-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; border: 1px solid #e2e8f0; background: #fff; color: #475569; white-space: nowrap; }
.legend-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ─── GRID CARD ── */
.planner-grid-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; flex: 1; display: flex; flex-direction: column; min-height: 0; }
.planner-grid-scroll { flex: 1; overflow: auto; min-height: 0; }
.planner-grid-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
.planner-grid-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.planner-grid-inner { min-width: 1000px; }
.planner-grid-header { display: flex; border-bottom: 2px solid #e2e8f0; background: #f8fafc; position: sticky; top: 0; z-index: 10; }
.planner-header-emp { width: 180px; padding: 11px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-right: 1px solid #e2e8f0; flex-shrink: 0; }
.planner-header-dates { display: flex; flex: 1; }
.planner-header-col { flex: 1; padding: 8px 6px; text-align: center; border-right: 1px solid #e2e8f0; }
.planner-header-col:last-child { border-right: none; }
.planner-header-col-day { font-size: 10px; color: #94a3b8; }
.planner-header-col-date { font-size: 13px; font-weight: 700; color: #334155; }
.planner-header-col-times { display: flex; gap: 4px; justify-content: center; margin-top: 4px; font-size: 8px; color: #cbd5e1; flex-wrap: wrap; }
.planner-grid-row { display: flex; border-bottom: 1px solid #f1f5f9; }
.planner-grid-row:nth-child(even) { background: #fafafa; }
.planner-grid-row:hover { background: #f8fbff; }
.planner-row-emp { width: 180px; padding: 10px 14px; border-right: 1px solid #e2e8f0; flex-shrink: 0; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.planner-emp-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; }
.planner-emp-info { min-width: 0; flex: 1; }
.planner-emp-name { font-size: 13px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.planner-emp-dept { font-size: 10px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.planner-row-dates { display: flex; flex: 1; }
.planner-day-cell { flex: 1; border-right: 1px solid #e2e8f0; position: relative; height: 64px; cursor: pointer; }
.planner-day-cell:last-child { border-right: none; }
.planner-day-cell:hover .planner-add-overlay { opacity: 1; }
.planner-add-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; pointer-events: none; }
.planner-add-overlay-btn { background: #eff6ff; color: #2563eb; padding: 4px 8px; border-radius: 7px; font-size: 11px; font-weight: 700; }
.planner-shift-block { position: absolute; top: 4px; bottom: 4px; border-radius: 7px; border: 1.5px solid; overflow: hidden; cursor: pointer; transition: all .15s; }
.planner-shift-block:hover { transform: scale(1.02); box-shadow: 0 4px 6px -1px rgba(0,0,0,.1); z-index: 5; }
.planner-shift-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.planner-shift-content { padding: 6px 8px 6px 12px; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; }
.planner-shift-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.planner-shift-time { font-size: 9px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.planner-shift-del { position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; background: #fee2e2; border-radius: 4px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; cursor: pointer; }
.planner-shift-block:hover .planner-shift-del { opacity: 1; }
.planner-shift-del:hover { background: #fecaca; }
.planner-shift-del svg { width: 10px; height: 10px; color: #dc2626; }

/* ─── MODAL ── */
.planner-modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1050; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .22s; backdrop-filter: blur(3px); }
.planner-modal-overlay.visible { opacity: 1; pointer-events: all; }
.planner-modal { background: #fff; border-radius: 18px; box-shadow: 0 25px 60px rgba(0,0,0,.22); width: 480px; max-width: 96vw; max-height: 80vh; display: flex; flex-direction: column; transform: translateY(12px); transition: transform .22s; }
.planner-modal-overlay.visible .planner-modal { transform: translateY(0); }
.planner-modal-hero { padding: 16px 22px 14px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 18px 18px 0 0; position: relative; overflow: hidden; flex-shrink: 0; }
.planner-modal-hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,.03); }
.planner-modal-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); transition: background .15s; z-index: 1; }
.planner-modal-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.planner-modal-close svg { width: 13px; height: 13px; }
.planner-modal-title { font-size: 16px; font-weight: 800; color: #fff; position: relative; z-index: 1; }
.planner-modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; min-height: 0; }
.planner-modal-body::-webkit-scrollbar { width: 4px; }
.planner-modal-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.planner-type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.planner-type-btn { flex: 1; padding: 8px; border: 1.5px solid #e2e8f0; border-radius: 9px; background: #fff; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
.planner-type-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
.planner-type-btn svg { width: 13px; height: 13px; }
.planner-field { margin-bottom: 14px; }
.planner-field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: 6px; }
.planner-field input, .planner-field select { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; transition: border-color .15s; }
.planner-field input:focus, .planner-field select:focus { border-color: #2563eb; }
.planner-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.planner-modal-footer { padding: 12px 22px; border-top: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: flex-end; gap: 8px; background: #fafafa; border-radius: 0 0 18px 18px; flex-shrink: 0; }
.planner-cancel-btn { padding: 8px 16px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; color: #64748b; background: #fff; cursor: pointer; transition: all .15s; }
.planner-cancel-btn:hover { border-color: #94a3b8; }
.planner-save-btn { padding: 8px 16px; background: #0f172a; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 6px; }
.planner-save-btn:hover { background: #1e293b; }
.planner-save-btn svg { width: 13px; height: 13px; }

/* ─── DRAWER ── */
.planner-drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 900; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(2px); }
.planner-drawer-overlay.visible { opacity: 1; pointer-events: all; }
.planner-drawer { position: fixed; top: 0; right: 0; width: 420px; max-width: 97vw; height: 100vh; background: #fff; box-shadow: -8px 0 40px rgba(0,0,0,.13); z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); overflow: hidden; }
.planner-drawer.open { transform: translateX(0); }
.planner-drawer-hero { padding: 16px 20px 14px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); position: relative; overflow: hidden; flex-shrink: 0; }
.planner-drawer-hero::before { content: ''; position: absolute; top: -50px; right: -50px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,.03); }
.planner-drawer-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); transition: background .15s; z-index: 1; }
.planner-drawer-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.planner-drawer-close svg { width: 13px; height: 13px; }
.planner-drawer-emp { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; position: relative; z-index: 1; }
.planner-drawer-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0; }
.planner-drawer-name { font-size: 17px; font-weight: 800; color: #fff; }
.planner-drawer-dept { font-size: 12px; color: rgba(255,255,255,.6); }
.planner-drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 0; }
.planner-drawer-body::-webkit-scrollbar { width: 4px; }
.planner-drawer-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.planner-day-section { margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
.planner-day-header { padding: 10px 14px; background: #f8fafc; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background .15s; }
.planner-day-header:hover { background: #f1f5f9; }
.planner-day-title { font-size: 13px; font-weight: 700; color: #0f172a; }
.planner-day-hours { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; background: #e0e7ff; color: #3730a3; font-size: 10px; font-weight: 700; margin-left: 6px; }
.planner-day-toggle { width: 16px; height: 16px; color: #64748b; transition: transform .15s; }
.planner-day-toggle.open { transform: rotate(180deg); }
.planner-day-shifts { padding: 8px; background: #fff; display: none; }
.planner-day-shifts.open { display: block; }
.planner-shift-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1.5px solid; margin-bottom: 6px; }
.planner-shift-item:last-child { margin-bottom: 0; }
.planner-shift-bar { width: 4px; height: 32px; border-radius: 10px; flex-shrink: 0; }
.planner-shift-details { flex: 1; min-width: 0; }
.planner-shift-label { font-size: 12px; font-weight: 700; }
.planner-shift-meta { font-size: 10px; color: #64748b; }
.planner-shift-dur { font-size: 10px; font-weight: 700; color: #64748b; white-space: nowrap; }

/* ─── TOAST ── */
.planner-toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
.planner-toast { display: flex; align-items: center; gap: 9px; padding: 10px 14px; background: #0f172a; color: #fff; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.18); animation: toastIn .2s ease; max-width: 300px; pointer-events: auto; }
.planner-toast.success { background: #15803d; }
.planner-toast.error   { background: #dc2626; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .65s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 1200px) { .planner-header-col-times { display: none; } }
@media (max-width: 768px) {
  .planner-header-emp, .planner-row-emp { width: 140px; }
  .planner-emp-dept { display: none; }
  .planner-drawer { width: 100%; max-width: 100%; }
}
</style>
</head>
<body>
<div class="planner-page">
  <div class="planner-header">
    <div class="planner-header-left">
      <div class="planner-title">
        <h1>Weekly Planner</h1>
        <p>Schedule staff and manage shifts</p>
      </div>
    </div>
    <div class="planner-header-left">
      <div class="planner-nav">
        <button onclick="navigateDate(-1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="planner-date-label" id="dateLabel">Loading…</span>
        <button onclick="navigateDate(1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <select class="planner-view-select" id="viewSelect" onchange="changeView()">
        <option value="day">Day</option>
        <option value="week">Week</option>
        <option value="2weeks">2 Weeks</option>
      </select>
      <button class="planner-add-btn" onclick="openShiftModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Shift
      </button>
    </div>
  </div>

  <div class="planner-legend" id="legend"></div>

  <div class="planner-grid-card">
    <div class="planner-grid-scroll">
      <div class="planner-grid-inner" id="gridContent">
        <div style="padding:60px;text-align:center"><span class="spinner"></span><p style="margin-top:12px;color:#64748b;font-size:13px">Loading data…</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Shift Modal -->
<div class="planner-modal-overlay" id="shiftModal" onclick="handleModalClick(event)">
  <div class="planner-modal" onclick="event.stopPropagation()">
    <div class="planner-modal-hero">
      <button class="planner-modal-close" onclick="closeShiftModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="planner-modal-title" id="modalTitle">Add Shift</div>
    </div>
    <div class="planner-modal-body">
      <div class="planner-type-toggle">
        <button class="planner-type-btn active" id="btnTask" onclick="switchType('task')">Task</button>
        <button class="planner-type-btn" id="btnBreak" onclick="switchType('break')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          Break
        </button>
      </div>
      <div class="planner-field">
        <label>Employee</label>
        <select id="empSelect"></select>
      </div>
      <div class="planner-field" id="taskField">
        <label>Task</label>
        <select id="taskSelect"></select>
      </div>
      <div class="planner-field">
        <label>Date</label>
        <input type="date" id="dateInput">
      </div>
      <div class="planner-field-row">
        <div class="planner-field">
          <label>Start Time</label>
          <input type="time" id="startInput" step="1800">
        </div>
        <div class="planner-field">
          <label>End Time</label>
          <input type="time" id="endInput" step="1800">
        </div>
      </div>
      <div class="planner-field" id="notesField">
        <label>Notes (optional)</label>
        <input type="text" id="notesInput" placeholder="Add notes…">
      </div>
    </div>
    <div class="planner-modal-footer">
      <button class="planner-cancel-btn" onclick="closeShiftModal()">Cancel</button>
      <button class="planner-save-btn" onclick="saveShift()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Save
      </button>
    </div>
  </div>
</div>

<!-- Employee Drawer -->
<div class="planner-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="planner-drawer" id="empDrawer">
  <div class="planner-drawer-hero">
    <button class="planner-drawer-close" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="planner-drawer-emp" id="drawerEmp"></div>
  </div>
  <div class="planner-drawer-body" id="drawerBody"></div>
</div>

<div class="planner-toast-container" id="toastContainer"></div>

<script>
(function() {

const API_URL = window.API_URL || 'YOUR_APPS_SCRIPT_URL_HERE';

let employees = [];
let tasks = [];
let schedule = [];
let workingDays = [1,2,3,4,5];
let currentDate = new Date().toISOString().split('T')[0];
let currentView = 'day';
let shiftType = 'task';
let editingShift = null;
let selectedEmployee = null;
let expandedDays = {};

const TIME_SLOTS = Array.from({length: 20}, (_,i) => {
  const h = Math.floor(i/2)+8;
  const m = i%2===0?'00':'30';
  return `${String(h).padStart(2,'0')}:${m}`;
});

async function loadData() {
  if (!API_URL || API_URL.includes('YOUR_APPS')) {
    showToast('Please set window.API_URL','error');
    document.getElementById('gridContent').innerHTML = '<div style="padding:60px;text-align:center"><p style="color:#64748b;font-size:13px">Set window.API_URL to your Apps Script URL</p></div>';
    return;
  }
  try {
    const res = await fetch(`${API_URL}?action=getData`);
    const data = await res.json();
    employees = data.employees || [];
    tasks = data.tasks || [];
    schedule = data.schedule || [];
    workingDays = data.workingDays || [1,2,3,4,5];
    renderLegend();
    renderGrid();
    updateDateLabel();
  } catch(e) {
    showToast('Failed to load data','error');
    document.getElementById('gridContent').innerHTML = '<div style="padding:60px;text-align:center"><p style="color:#dc2626;font-size:13px">Failed to load. Check API_URL and CORS.</p></div>';
  }
}

function renderLegend() {
  document.getElementById('legend').innerHTML = tasks.map(t =>
    `<div class="legend-chip"><div class="legend-chip-dot" style="background:${t.color}"></div>${esc(t.name)}</div>`
  ).join('');
}

function getDatesForView() {
  const d = new Date(currentDate);
  const dates = [];
  if (currentView === 'day') {
    dates.push(currentDate);
  } else if (currentView === 'week') {
    const start = new Date(d);
    start.setDate(d.getDate() - d.getDay() + 1);
    for (let i=0; i<7; i++) {
      const day = new Date(start);
      day.setDate(start.getDate() + i);
      if (workingDays.includes(day.getDay())) dates.push(day.toISOString().split('T')[0]);
    }
  } else if (currentView === '2weeks') {
    const start = new Date(d);
    start.setDate(d.getDate() - d.getDay() + 1);
    for (let i=0; i<14; i++) {
      const day = new Date(start);
      day.setDate(start.getDate() + i);
      if (workingDays.includes(day.getDay())) dates.push(day.toISOString().split('T')[0]);
    }
  }
  return dates;
}

function renderGrid() {
  const dates = getDatesForView();
  let html = '<div class="planner-grid-header">';
  html += '<div class="planner-header-emp">EMPLOYEE</div>';
  html += '<div class="planner-header-dates">';
  dates.forEach(date => {
    const d = new Date(date);
    html += `<div class="planner-header-col">
      <div class="planner-header-col-day">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="planner-header-col-date">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      <div class="planner-header-col-times">${TIME_SLOTS.filter((_,i)=>i%4===0).map(t=>`<span>${t}</span>`).join('')}</div>
    </div>`;
  });
  html += '</div></div>';

  employees.forEach(emp => {
    html += `<div class="planner-grid-row">`;
    html += `<div class="planner-row-emp" onclick="openDrawer('${emp.id}')">
      <div class="planner-emp-avatar" style="background:${emp.avatar}">${esc(emp.initials)}</div>
      <div class="planner-emp-info">
        <div class="planner-emp-name">${esc(emp.name)}</div>
        <div class="planner-emp-dept">${esc(emp.department)}</div>
      </div>
    </div>`;
    html += '<div class="planner-row-dates">';
    dates.forEach(date => {
      const dayShifts = schedule.filter(s => s.employeeId===emp.id && s.date===date);
      html += `<div class="planner-day-cell" onclick="openShiftModal('${emp.id}','${date}')">`;
      dayShifts.forEach(shift => {
        const task = tasks.find(t => t.id===shift.taskId);
        const isBreak = shift.type==='break';
        const left = timeToPercent(shift.start);
        const width = timeToPercent(shift.end) - left;
        const bg = isBreak ? '#f1f5f9' : (task?.lightColor || '#f8fafc');
        const border = isBreak ? '#94a3b8' : (task?.color || '#cbd5e1');
        html += `<div class="planner-shift-block" style="left:${left}%;width:${width}%;background:${bg};border-color:${border}" onclick="event.stopPropagation();editShift('${shift.id}')">
          <div class="planner-shift-accent" style="background:${isBreak?'#64748b':(task?.color||'#94a3b8')}"></div>
          <div class="planner-shift-content">
            <div class="planner-shift-name">${isBreak?'☕ Break':esc(task?.name||'Task')}</div>
            <div class="planner-shift-time">${shift.start}–${shift.end}</div>
            <div class="planner-shift-del" onclick="event.stopPropagation();deleteShift('${shift.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </div>
          </div>
        </div>`;
      });
      html += '<div class="planner-add-overlay"><div class="planner-add-overlay-btn">+</div></div></div>';
    });
    html += '</div></div>';
  });

  document.getElementById('gridContent').innerHTML = html;
}

function timeToPercent(time) {
  const [h,m] = time.split(':').map(Number);
  const min = (h-8)*60 + m;
  return (min/(10*60))*100;
}

function navigateDate(dir) {
  const d = new Date(currentDate);
  if (currentView==='day') d.setDate(d.getDate()+dir);
  else if (currentView==='week') d.setDate(d.getDate()+(dir*7));
  else if (currentView==='2weeks') d.setDate(d.getDate()+(dir*14));
  currentDate = d.toISOString().split('T')[0];
  updateDateLabel();
  renderGrid();
}

function changeView() {
  currentView = document.getElementById('viewSelect').value;
  updateDateLabel();
  renderGrid();
}

function updateDateLabel() {
  const d = new Date(currentDate);
  let label = '';
  if (currentView==='day') {
    label = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  } else {
    const dates = getDatesForView();
    if (dates.length) {
      const start = new Date(dates[0]);
      const end = new Date(dates[dates.length-1]);
      label = `${start.toLocaleDateString('en-US',{month:'short',day:'numeric'})} - ${end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
    }
  }
  document.getElementById('dateLabel').textContent = label;
}

function openShiftModal(empId, date) {
  editingShift = null;
  shiftType = 'task';
  document.getElementById('empSelect').innerHTML = employees.map(e => `<option value="${e.id}"${e.id===empId?' selected':''}>${esc(e.name)}</option>`).join('');
  document.getElementById('taskSelect').innerHTML = tasks.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
  document.getElementById('dateInput').value = date || currentDate;
  document.getElementById('startInput').value = '08:00';
  document.getElementById('endInput').value = '10:00';
  document.getElementById('notesInput').value = '';
  document.getElementById('modalTitle').textContent = 'Add Shift';
  switchType('task');
  document.getElementById('shiftModal').classList.add('visible');
}

function closeShiftModal() {
  document.getElementById('shiftModal').classList.remove('visible');
}

function handleModalClick(e) {
  if (e.target.id === 'shiftModal') closeShiftModal();
}

function switchType(type) {
  shiftType = type;
  document.getElementById('btnTask').classList.toggle('active', type==='task');
  document.getElementById('btnBreak').classList.toggle('active', type==='break');
  document.getElementById('taskField').style.display = type==='task'?'block':'none';
  document.getElementById('notesField').style.display = type==='task'?'block':'none';
}

function editShift(id) {
  const shift = schedule.find(s => s.id===id);
  if (!shift) return;
  editingShift = shift;
  shiftType = shift.type || 'task';
  document.getElementById('empSelect').innerHTML = employees.map(e => `<option value="${e.id}"${e.id===shift.employeeId?' selected':''}>${esc(e.name)}</option>`).join('');
  document.getElementById('taskSelect').innerHTML = tasks.map(t => `<option value="${t.id}"${t.id===shift.taskId?' selected':''}>${esc(t.name)}</option>`).join('');
  document.getElementById('dateInput').value = shift.date;
  document.getElementById('startInput').value = shift.start;
  document.getElementById('endInput').value = shift.end;
  document.getElementById('notesInput').value = shift.notes || '';
  document.getElementById('modalTitle').textContent = 'Edit Shift';
  switchType(shiftType);
  document.getElementById('shiftModal').classList.add('visible');
}

async function saveShift() {
  const payload = {
    id: editingShift?.id || `s${Date.now()}`,
    employeeId: document.getElementById('empSelect').value,
    taskId: shiftType==='task' ? document.getElementById('taskSelect').value : '',
    date: document.getElementById('dateInput').value,
    start: document.getElementById('startInput').value,
    end: document.getElementById('endInput').value,
    notes: document.getElementById('notesInput').value,
    type: shiftType
  };
  if (!payload.employeeId || (shiftType==='task' && !payload.taskId)) {
    showToast('Please fill all required fields','error');
    return;
  }
  try {
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'saveShift',data:payload})
    });
    if (res.ok) {
      await loadData();
      closeShiftModal();
      showToast('Shift saved','success');
    }
  } catch(e) {
    showToast('Failed to save shift','error');
  }
}

async function deleteShift(id) {
  if (!confirm('Delete this shift?')) return;
  try {
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'deleteShift',id})
    });
    if (res.ok) {
      await loadData();
      showToast('Shift deleted','success');
    }
  } catch(e) {
    showToast('Failed to delete shift','error');
  }
}

function openDrawer(empId) {
  const emp = employees.find(e => e.id===empId);
  if (!emp) return;
  selectedEmployee = emp;
  expandedDays = {};
  document.getElementById('drawerEmp').innerHTML =
    `<div class="planner-drawer-avatar" style="background:${emp.avatar}">${esc(emp.initials)}</div>
     <div><div class="planner-drawer-name">${esc(emp.name)}</div><div class="planner-drawer-dept">${esc(emp.department)}</div></div>`;
  
  const dates = getDatesForView();
  let body = '';
  if (currentView==='day') {
    const dayShifts = schedule.filter(s => s.employeeId===empId && s.date===currentDate).sort((a,b)=>a.start.localeCompare(b.start));
    body = dayShifts.map(s => {
      const task = tasks.find(t => t.id===s.taskId);
      const isBreak = s.type==='break';
      const dur = getDuration(s.start,s.end);
      const bg = isBreak?'#f1f5f9':(task?.lightColor||'#f8fafc');
      const border = isBreak?'#94a3b8':(task?.color||'#cbd5e1');
      const color = isBreak?'#64748b':(task?.color||'#475569');
      return `<div class="planner-shift-item" style="background:${bg};border-color:${border}">
        <div class="planner-shift-bar" style="background:${color}"></div>
        <div class="planner-shift-details">
          <div class="planner-shift-label" style="color:${color}">${isBreak?'☕ Break':esc(task?.name||'Task')}</div>
          <div class="planner-shift-meta">${s.start} – ${s.end}</div>
        </div>
        <div class="planner-shift-dur">${dur}h</div>
      </div>`;
    }).join('');
  } else {
    body = dates.map(date => {
      const dayShifts = schedule.filter(s => s.employeeId===empId && s.date===date).sort((a,b)=>a.start.localeCompare(b.start));
      if (!dayShifts.length) return '';
      const d = new Date(date);
      const total = dayShifts.reduce((acc,s)=>acc+getDuration(s.start,s.end),0);
      const exp = expandedDays[date];
      return `<div class="planner-day-section">
        <div class="planner-day-header" onclick="toggleDay('${date}')">
          <div><span class="planner-day-title">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span><span class="planner-day-hours">${total.toFixed(1)}h</span></div>
          <svg class="planner-day-toggle${exp?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="planner-day-shifts${exp?' open':''}">
          ${dayShifts.map(s => {
            const task = tasks.find(t => t.id===s.taskId);
            const isBreak = s.type==='break';
            const dur = getDuration(s.start,s.end);
            const bg = isBreak?'#f1f5f9':(task?.lightColor||'#f8fafc');
            const border = isBreak?'#94a3b8':(task?.color||'#cbd5e1');
            const color = isBreak?'#64748b':(task?.color||'#475569');
            return `<div class="planner-shift-item" style="background:${bg};border-color:${border}">
              <div class="planner-shift-bar" style="background:${color}"></div>
              <div class="planner-shift-details">
                <div class="planner-shift-label" style="color:${color}">${isBreak?'☕ Break':esc(task?.name||'Task')}</div>
                <div class="planner-shift-meta">${s.start}–${s.end}</div>
              </div>
              <div class="planner-shift-dur">${dur.toFixed(1)}h</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('drawerBody').innerHTML = body || '<p style="color:#94a3b8;font-size:13px;padding:20px;text-align:center">No shifts scheduled</p>';
  document.getElementById('empDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
}

function closeDrawer() {
  document.getElementById('empDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('visible');
}

function toggleDay(date) {
  expandedDays[date] = !expandedDays[date];
  openDrawer(selectedEmployee.id);
}

function getDuration(start,end) {
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  return (eh*60+em-sh*60-sm)/60;
}

function showToast(msg,type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'planner-toast ' + (type||'');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
  };
  t.innerHTML = (icons[type]||'') + esc(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.loadData = loadData;
window.navigateDate = navigateDate;
window.changeView = changeView;
window.openShiftModal = openShiftModal;
window.closeShiftModal = closeShiftModal;
window.handleModalClick = handleModalClick;
window.switchType = switchType;
window.editShift = editShift;
window.saveShift = saveShift;
window.deleteShift = deleteShift;
window.openDrawer = openDrawer;
window.closeDrawer = closeDrawer;
window.toggleDay = toggleDay;

loadData();
})();
</script>
</body>
</html>
