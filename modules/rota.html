<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px; color: #0f172a; background: #f8fafc;
  line-height: 1.5; height: 100%; -webkit-font-smoothing: antialiased;
}
body { overflow: hidden; }

.planner-page {
  padding: 5px 10px 4px 10px;
  height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ── HEADER ── */
.planner-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; flex-shrink: 0; margin-bottom: 8px; }
.planner-title h1 { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 2px; }
.planner-title p { font-size: 12px; color: #64748b; }
.planner-header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.planner-nav { display: flex; align-items: center; gap: 1px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 9px; padding: 1px; }
.planner-nav button { padding: 7px; background: none; border: none; cursor: pointer; border-radius: 7px; transition: background .15s; display: flex; align-items: center; justify-content: center; }
.planner-nav button:hover { background: #f1f5f9; }
.planner-date-label { padding: 0 10px; font-size: 12px; font-weight: 600; color: #0f172a; white-space: nowrap; cursor: pointer; border-radius: 6px; transition: background .15s; }
.planner-date-label:hover { background: #f1f5f9; }
.planner-view-select { padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 12px; font-family: inherit; background: #fff; color: #0f172a; cursor: pointer; outline: none; }
.planner-add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: #0f172a; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
.planner-add-btn:hover { background: #1e293b; }
.planner-team-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: #fff; color: #0f172a; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; }
.planner-team-btn:hover { border-color: #94a3b8; background: #f8fafc; }

/* ── GRID CARD ── */
.planner-grid-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; flex: 1; display: flex; flex-direction: column; min-height: 0; }
.planner-grid-scroll { flex: 1; overflow: auto; min-height: 0; }
.planner-grid-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
.planner-grid-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

/* ── GRID TABLE ── */
.planner-table { width: 100%; border-collapse: collapse; }
.planner-table thead tr { background: #f8fafc; position: sticky; top: 0; z-index: 10; }
.planner-th-emp { width: 180px; min-width: 140px; padding: 11px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-right: 1px solid #e2e8f0; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
.planner-th-day { border-right: 1px solid #e2e8f0; border-bottom: 2px solid #e2e8f0; vertical-align: top; }
.planner-th-day:last-child { border-right: none; }

.day-col-header { padding: 6px 6px 0; }
.day-col-header .day-name { font-size: 10px; color: #94a3b8; text-align: center; }
.day-col-header .day-date { font-size: 12px; font-weight: 700; color: #334155; text-align: center; margin-bottom: 4px; }

.time-header-row { display: flex; height: 28px; border-top: 1px solid #f1f5f9; overflow: hidden; }
.time-header-slot { flex: 1; position: relative; border-right: 1px solid #e2e8f0; font-size: 8.5px; color: #94a3b8; font-weight: 600; }
.time-header-slot.hour { border-right-color: #cbd5e1; }
.time-header-slot:last-child { border-right: none; }
.time-header-slot span { position: absolute; top: 6px; left: 3px; white-space: nowrap; }

/* ── ROWS ── */
.planner-table tbody tr { border-bottom: 1px solid #f1f5f9; }
.planner-table tbody tr:nth-child(even) { background: #fafafa; }
.planner-table tbody tr:hover { background: #f8fbff; }
.planner-table tbody tr:last-child { border-bottom: none; }

.planner-td-emp { width: 180px; min-width: 140px; padding: 10px 14px; border-right: 1px solid #e2e8f0; cursor: pointer; vertical-align: middle; }
.emp-row { display: flex; align-items: center; gap: 10px; }
.emp-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; }
.emp-name { font-size: 13px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-dept { font-size: 10px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── DAY CELL ── */
.planner-td-day { border-right: 1px solid #e2e8f0; vertical-align: top; padding: 0; }
.planner-td-day:last-child { border-right: none; }
.day-cell-inner { position: relative; height: 64px; }
.time-col-grid { display: flex; position: absolute; inset: 0; }
.time-col { flex: 1; border-right: 1px solid #e2e8f0; cursor: pointer; position: relative; }
.time-col.hour { border-right-color: #cbd5e1; }
.time-col:last-child { border-right: none; }
.time-col:hover::after { content: '+'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(239,246,255,.85); color: #2563eb; font-size: 16px; font-weight: 700; border-radius: 4px; }

/* ── SHIFT BLOCK ── */
.shift-block { position: absolute; top: 4px; bottom: 4px; border-radius: 7px; border: 1.5px solid; overflow: hidden; cursor: pointer; z-index: 3; transition: transform .12s, box-shadow .12s, opacity .3s; }
.shift-block:hover { transform: scale(1.025); box-shadow: 0 4px 12px rgba(0,0,0,.12); z-index: 6; }
.shift-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.shift-content { padding: 5px 22px 5px 10px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
.shift-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shift-time { font-size: 9px; color: #64748b; white-space: nowrap; }
.shift-del { position: absolute; top: 3px; right: 3px; width: 16px; height: 16px; background: #fee2e2; border-radius: 4px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .12s; cursor: pointer; z-index: 10; border: none; }
.shift-block:hover .shift-del { opacity: 1; }
.shift-del:hover { background: #fecaca !important; }
.shift-del svg { width: 9px; height: 9px; color: #dc2626; pointer-events: none; }

/* ── WEEK CELL ── */
.planner-td-week { border-right: 1px solid #e2e8f0; vertical-align: top; padding: 0; }
.planner-td-week:last-child { border-right: none; }
.week-cell-inner { padding: 4px; cursor: pointer; position: relative; min-height: 36px; }
.week-cell-inner:hover { background: rgba(37,99,235,.03); }
.week-cell-empty { min-height: 36px; cursor: pointer; }
.week-cell-empty:hover { background: rgba(37,99,235,.03); }

/* Week shift pill */
.week-shift-pill { border-radius: 5px; padding: 3px 24px 3px 8px; margin-bottom: 3px; font-size: 10px; font-weight: 700; border-left: 3px solid; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; position: relative; display: block; transition: opacity .15s; }
.week-shift-pill:hover { opacity: .85; }
.week-shift-pill:hover .pill-del { opacity: 1; }
.pill-del { position: absolute; top: 1px; right: 2px; width: 14px; height: 14px; background: #fee2e2; border-radius: 3px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .12s; cursor: pointer; z-index: 5; border: none; }
.pill-del:hover { background: #fecaca !important; }
.pill-del svg { width: 8px; height: 8px; color: #dc2626; pointer-events: none; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1050; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(3px); padding: 16px; }
.modal-overlay.visible { opacity: 1; pointer-events: all; }
.modal-box { background: #fff; border-radius: 18px; box-shadow: 0 25px 60px rgba(0,0,0,.22); width: 420px; max-width: 100%; max-height: calc(100vh - 32px); display: flex; flex-direction: column; transform: translateY(10px); transition: transform .2s; }
.modal-overlay.visible .modal-box { transform: translateY(0); }
.modal-hero { padding: 14px 20px 12px; background: linear-gradient(135deg,#1e293b 0%,#0f172a 100%); border-radius: 18px 18px 0 0; position: relative; flex-shrink: 0; }
.modal-close { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; border: none; border-radius: 6px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); }
.modal-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.modal-title { font-size: 15px; font-weight: 800; color: #fff; }
.modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 0; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.modal-footer { padding: 10px 20px; border-top: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: flex-end; gap: 8px; background: #fafafa; border-radius: 0 0 18px 18px; flex-shrink: 0; }

.type-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
.type-btn { flex: 1; padding: 7px 6px; border: 1.5px solid #e2e8f0; border-radius: 9px; background: #fff; color: #475569; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 4px; }
.type-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
.type-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: 5px; }
.field input, .field select { width: 100%; padding: 8px 11px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; transition: border-color .15s; }
.field input:focus, .field select:focus { border-color: #2563eb; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-cancel { padding: 7px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; color: #64748b; background: #fff; cursor: pointer; }
.btn-cancel:hover { border-color: #94a3b8; }
.btn-save { padding: 7px 14px; background: #0f172a; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.btn-save:hover { background: #1e293b; }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }
.btn-save svg { width: 12px; height: 12px; }

/* ── DRAWER ── */
.drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 900; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(2px); }
.drawer-overlay.visible { opacity: 1; pointer-events: all; }
.planner-drawer { position: fixed; top: 0; right: 0; width: 400px; max-width: 97vw; height: 100vh; background: #fff; box-shadow: -8px 0 40px rgba(0,0,0,.13); z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); }
.planner-drawer.open { transform: translateX(0); }
.drawer-hero { padding: 16px 20px 14px; background: linear-gradient(135deg,#1e293b 0%,#0f172a 100%); flex-shrink: 0; position: relative; }
.drawer-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); }
.drawer-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.drawer-emp-row { display: flex; align-items: center; gap: 12px; }
.drawer-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0; }
.drawer-emp-name { font-size: 17px; font-weight: 800; color: #fff; }
.drawer-emp-dept { font-size: 12px; color: rgba(255,255,255,.55); }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 0; }
.drawer-body::-webkit-scrollbar { width: 4px; }
.drawer-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.day-section { margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
.day-section-hdr { padding: 9px 13px; background: #f8fafc; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.day-section-hdr:hover { background: #f1f5f9; }
.day-section-title { font-size: 13px; font-weight: 700; color: #0f172a; }
.day-hours-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; background: #e0e7ff; color: #3730a3; font-size: 10px; font-weight: 700; margin-left: 6px; }
.day-toggle-icon { transition: transform .15s; }
.day-toggle-icon.open { transform: rotate(180deg); }
.day-shifts { padding: 8px; background: #fff; display: none; }
.day-shifts.open { display: block; }
.shift-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1.5px solid; margin-bottom: 5px; }
.shift-item:last-child { margin-bottom: 0; }
.shift-bar { width: 4px; height: 30px; border-radius: 10px; flex-shrink: 0; }
.shift-item-name { font-size: 12px; font-weight: 700; }
.shift-item-meta { font-size: 10px; color: #64748b; }
.shift-item-dur { font-size: 10px; font-weight: 700; color: #64748b; white-space: nowrap; margin-left: auto; }

/* ── TEAM MODAL ── */
.team-modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1060; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(3px); padding: 16px; }
.team-modal-overlay.visible { opacity: 1; pointer-events: all; }
.team-modal-box { background: #fff; border-radius: 16px; box-shadow: 0 25px 60px rgba(0,0,0,.22); width: 460px; max-width: 100%; max-height: calc(100vh - 32px); display: flex; flex-direction: column; transform: translateY(10px); transition: transform .2s; }
.team-modal-overlay.visible .team-modal-box { transform: translateY(0); }
.team-modal-header { padding: 14px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.team-modal-title { font-size: 15px; font-weight: 800; color: #0f172a; }
.team-modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 0; }
.teammate-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 8px; background: #fafafa; }
.teammate-row:last-child { margin-bottom: 0; }
.team-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; }
.teammate-name { font-size: 13px; font-weight: 700; color: #0f172a; }
.teammate-dept { font-size: 11px; color: #94a3b8; }
.remove-teammate-btn { margin-left: auto; padding: 5px 10px; border: 1.5px solid #fecdd3; border-radius: 7px; background: #fff1f2; color: #be123c; font-size: 11.5px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .15s; flex-shrink: 0; }
.remove-teammate-btn:hover { background: #fee2e2; }
.add-teammate-form { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 14px; }
.add-teammate-form h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: 10px; }
.add-teammate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.add-teammate-grid input, .add-teammate-grid select { padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; width: 100%; }
.add-teammate-grid input:focus, .add-teammate-grid select:focus { border-color: #2563eb; }
.avatar-color-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.avatar-color-row label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; white-space: nowrap; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .1s; flex-shrink: 0; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #0f172a; }
.btn-add-teammate { width: 100%; padding: 8px; background: #0f172a; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-add-teammate:hover { background: #1e293b; }

/* ── CALENDAR PICKER ── */
.cal-popup { position: fixed; z-index: 2000; background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.18); padding: 16px; width: 280px; opacity: 0; transform: translateY(-8px); transition: opacity .18s, transform .18s; pointer-events: none; }
.cal-popup.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-month-label { font-size: 13px; font-weight: 800; color: #0f172a; }
.cal-nav-btn { width: 28px; height: 28px; border: 1.5px solid #e2e8f0; border-radius: 7px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cal-nav-btn:hover { background: #f1f5f9; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { font-size: 9px; font-weight: 700; color: #94a3b8; text-align: center; padding: 4px 0; text-transform: uppercase; }
.cal-day { font-size: 12px; font-weight: 500; text-align: center; padding: 6px 2px; border-radius: 7px; cursor: pointer; color: #0f172a; transition: background .12s, color .12s; }
.cal-day:hover { background: #f1f5f9; }
.cal-day.today { background: #eff6ff; color: #2563eb; font-weight: 700; }
.cal-day.selected { background: #0f172a; color: #fff; font-weight: 700; }
.cal-day.other-month { color: #cbd5e1; }
.cal-day.empty { cursor: default; }

/* ── CONFIRM DIALOG ── */
.confirm-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 2100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .18s; backdrop-filter: blur(3px); padding: 16px; }
.confirm-overlay.visible { opacity: 1; pointer-events: all; }
.confirm-box { background: #fff; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,.2); width: 340px; max-width: 100%; padding: 24px; transform: translateY(8px); transition: transform .18s; text-align: center; }
.confirm-overlay.visible .confirm-box { transform: translateY(0); }
.confirm-icon { width: 44px; height: 44px; border-radius: 50%; background: #fef2f2; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
.confirm-title { font-size: 15px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
.confirm-msg { font-size: 13px; color: #64748b; margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 8px; justify-content: center; }
.confirm-btn-cancel { padding: 8px 20px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; color: #64748b; background: #fff; cursor: pointer; }
.confirm-btn-cancel:hover { border-color: #94a3b8; }
.confirm-btn-danger { padding: 8px 20px; background: #dc2626; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.confirm-btn-danger:hover { background: #b91c1c; }

/* ── TOAST ── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
.toast { display: flex; align-items: center; gap: 9px; padding: 10px 14px; background: #0f172a; color: #fff; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.18); animation: toastIn .25s cubic-bezier(.34,1.56,.64,1); max-width: 300px; pointer-events: auto; }
.toast.success { background: #15803d; }
.toast.error   { background: #dc2626; }
.toast.info    { background: #2563eb; }
@keyframes toastIn { from { opacity: 0; transform: translateY(12px) scale(.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(6px) scale(.95); } }

/* Shimmer loading */
.shimmer { background: linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .65s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */

<script>
(function () {
'use strict';

const API = window.API_URL ||
  'https://script.google.com/macros/s/AKfycbwS9c4pGnAiXNAlhdttTKZeKNOP8b_tSONjY7S-D_DOgiicflimtvrNVaRReuX7EN3hHg/exec';

const H_START = 8, H_END = 18;
const TOTAL_MINS = (H_END - H_START) * 60;
const SLOTS = [];
for (let h = H_START; h < H_END; h++) {
  SLOTS.push(pad(h) + ':00');
  SLOTS.push(pad(h) + ':30');
}

function pad(n) { return String(n).padStart(2, '0'); }
function pct(t) {
  const [h, m] = t.split(':').map(Number);
  return Math.max(0, Math.min(100, ((h - H_START) * 60 + m) / TOTAL_MINS * 100));
}
function dur(s, e) {
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  return ((eh * 60 + em) - (sh * 60 + sm)) / 60;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d, opts) {
  return new Date(d + 'T00:00').toLocaleDateString('en-GB', opts);
}
function isoDate(d) {
  return d.toISOString().split('T')[0];
}

/* ══ STATE ══════════════════════════════════════════════════════════════════ */
const S = {
  employees: [], tasks: [], schedule: [], workingDays: [1,2,3,4,5],
  currentDate: isoDate(new Date()),
  view: 'day', loaded: false,
  editingId: null, shiftType: 'task',
  drawerEmpId: null, expandedDays: {},
  pending: new Set(),
};

/* ══ BOOT ═══════════════════════════════════════════════════════════════════ */
async function init() {
  const grid = document.getElementById('gridContent');
  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'getData' }),
      headers: { 'Content-Type': 'text/plain' }
    });
    if (!res.ok) throw new Error(res.status);
    const d = await res.json();

    S.employees   = (d.employees   || []).map(e => ({...e, id: String(e.id)}));
    S.tasks       = (d.tasks       || []).map(t => ({...t, id: String(t.id)}));
    S.schedule    = (d.schedule    || []).map(normalizeShift);
    S.workingDays = d.workingDays  || [1,2,3,4,5];

    S.loaded = true;
    renderAll();
  } catch (e) {
    grid.innerHTML = '<p style="color:#dc2626;font-size:13px;padding:40px;text-align:center">Failed to load data. Please check your connection.</p>';
  }
}

function normalizeShift(s) {
  return {
    ...s,
    id: String(s.id),
    employeeId: String(s.employeeId),
    taskId: String(s.taskId || ''),
    date: String(s.date),
    start: normalizeTime(s.start),
    end: normalizeTime(s.end),
    type: s.type || 'task',
  };
}

function normalizeTime(t) {
  if (!t) return '00:00';
  const s = String(t).trim();
  // handles "8:00", "08:00", "8:00:00"
  const parts = s.split(':');
  return pad(parseInt(parts[0], 10)) + ':' + (parts[1] || '00').slice(0, 2);
}

/* ══ DATES ══════════════════════════════════════════════════════════════════ */
function getDates() {
  const d = new Date(S.currentDate + 'T00:00');
  if (S.view === 'day') return [S.currentDate];
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  const count = S.view === '2weeks' ? 14 : 7;
  const out = [];
  for (let i = 0; i < count; i++) {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    if (S.workingDays.includes(day.getDay()))
      out.push(isoDate(day));
  }
  return out;
}

/* ══ RENDER ALL ═════════════════════════════════════════════════════════════ */
function renderAll() {
  updateDateLabel();
  renderGrid();
}

function updateDateLabel() {
  const dates = getDates();
  let label;
  if (S.view === 'day') {
    label = fmtDate(S.currentDate, { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  } else {
    label = fmtDate(dates[0], { month:'short', day:'numeric' }) +
            ' – ' +
            fmtDate(dates[dates.length - 1], { month:'short', day:'numeric', year:'numeric' });
  }
  document.getElementById('dateLabel').textContent = label;
}

/* ══ GRID ═══════════════════════════════════════════════════════════════════ */
function buildTaskMap() {
  const m = {};
  S.tasks.forEach(t => { m[String(t.id)] = t; });
  return m;
}

function renderGrid() {
  if (!S.loaded) return;
  const dates = getDates();
  const tm = buildTaskMap();
  const isDayView = S.view === 'day';
  const f = [];

  f.push('<table class="planner-table"><thead><tr>');
  f.push('<th class="planner-th-emp">EMPLOYEE</th>');

  dates.forEach(date => {
    f.push('<th class="planner-th-day">');
    if (!isDayView) {
      f.push(`<div class="day-col-header">
        <div class="day-name">${fmtDate(date, { weekday:'short' })}</div>
        <div class="day-date">${fmtDate(date, { month:'short', day:'numeric' })}</div>
      </div>`);
    } else {
      f.push('<div class="time-header-row">');
      SLOTS.forEach((s, i) => {
        const isHour = i % 2 === 0;
        f.push(`<div class="time-header-slot${isHour ? ' hour' : ''}">${isHour ? `<span>${s}</span>` : ''}</div>`);
      });
      f.push('</div>');
    }
    f.push('</th>');
  });

  f.push('</tr></thead><tbody>');

  S.employees.forEach(emp => {
    f.push(`<tr>
      <td class="planner-td-emp" onclick="openDrawer('${esc(emp.id)}')">
        <div class="emp-row">
          <div class="emp-avatar" style="background:${esc(emp.avatar)}">${esc(emp.initials)}</div>
          <div>
            <div class="emp-name">${esc(emp.name)}</div>
            <div class="emp-dept">${esc(emp.department)}</div>
          </div>
        </div>
      </td>`);

    dates.forEach(date => {
      const dayShifts = S.schedule.filter(
        s => s.employeeId === String(emp.id) && s.date === date
      );

      if (isDayView) {
        f.push('<td class="planner-td-day"><div class="day-cell-inner">');
        f.push('<div class="time-col-grid">');
        SLOTS.forEach((slot, i) => {
          const isHour = i % 2 === 0;
          f.push(`<div class="time-col${isHour ? ' hour' : ''}" onclick="openShiftModal('${esc(emp.id)}','${date}','${slot}')"></div>`);
        });
        f.push('</div>');
        dayShifts.forEach(shift => {
          const task = tm[shift.taskId];
          const isBreak = shift.type === 'break';
          const left = pct(shift.start);
          const width = Math.max(pct(shift.end) - left, 1);
          const bg = isBreak ? '#f1f5f9' : (task?.lightColor || '#f8fafc');
          const border = isBreak ? '#94a3b8' : (task?.color || '#cbd5e1');
          const accent = isBreak ? '#64748b' : (task?.color || '#94a3b8');
          const label = isBreak ? '☕ Break' : esc(task?.name || 'Task');
          const opacity = S.pending.has(shift.id) ? '.5' : '1';
          f.push(`<div class="shift-block" style="left:${left}%;width:${width}%;background:${bg};border-color:${border};opacity:${opacity}"
            onclick="event.stopPropagation();editShift('${esc(shift.id)}')">
            <div class="shift-accent" style="background:${accent}"></div>
            <div class="shift-content">
              <div class="shift-name" style="color:${accent}">${label}</div>
              <div class="shift-time">${shift.start}–${shift.end}</div>
            </div>
            <button class="shift-del" onclick="event.stopPropagation();deleteShift('${esc(shift.id)}')">
              ${trashIcon()}
            </button>
          </div>`);
        });
        f.push('</div></td>');
      } else {
        // Week/2-week: only render cell if there are shifts
        if (dayShifts.length > 0) {
          f.push(`<td class="planner-td-week"><div class="week-cell-inner" onclick="openShiftModal('${esc(emp.id)}','${date}','08:00')">`);
          dayShifts.forEach(shift => {
            const task = tm[shift.taskId];
            const isBreak = shift.type === 'break';
            const color = isBreak ? '#64748b' : (task?.color || '#64748b');
            const bg = isBreak ? '#f1f5f9' : (task?.lightColor || '#f8fafc');
            f.push(`<div class="week-shift-pill" style="color:${color};background:${bg};border-left-color:${color}"
              onclick="event.stopPropagation();editShift('${esc(shift.id)}')">
              ${isBreak ? '☕' : esc(task?.name || '')} ${shift.start}–${shift.end}
              <button class="pill-del" onclick="event.stopPropagation();deleteShift('${esc(shift.id)}')">
                ${trashIcon(8)}
              </button>
            </div>`);
          });
          f.push('</div></td>');
        } else {
          // Empty cell — still clickable to add, but minimal
          f.push(`<td class="planner-td-week"><div class="week-cell-empty" onclick="openShiftModal('${esc(emp.id)}','${date}','08:00')"></div></td>`);
        }
      }
    });

    f.push('</tr>');
  });

  f.push('</tbody></table>');
  document.getElementById('gridContent').innerHTML = f.join('');
}

function trashIcon(size = 9) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`;
}

/* ══ NAVIGATION ═════════════════════════════════════════════════════════════ */
function navigate(dir) {
  const d = new Date(S.currentDate + 'T00:00');
  const delta = S.view === 'day' ? 1 : S.view === 'week' ? 7 : 14;
  d.setDate(d.getDate() + dir * delta);
  S.currentDate = isoDate(d);
  updateDateLabel();
  renderGrid();
}

function changeView() {
  S.view = document.getElementById('viewSelect').value;
  updateDateLabel();
  renderGrid();
}

/* ══ CALENDAR POPUP ═════════════════════════════════════════════════════════ */
let calViewDate = new Date();
let calOpen = false;

function toggleCalendar(e) {
  e.stopPropagation();
  if (calOpen) { closeCalendar(); return; }
  calViewDate = new Date(S.currentDate + 'T00:00');
  renderCalendar();
  const popup = document.getElementById('calPopup');
  const rect = document.getElementById('dateLabel').getBoundingClientRect();
  popup.style.top = (rect.bottom + 8) + 'px';
  popup.style.left = Math.max(8, rect.left - 80) + 'px';
  popup.classList.add('visible');
  calOpen = true;
}

function closeCalendar() {
  document.getElementById('calPopup').classList.remove('visible');
  calOpen = false;
}

function calNav(dir) {
  calViewDate.setMonth(calViewDate.getMonth() + dir);
  renderCalendar();
}

function renderCalendar() {
  const DAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const y = calViewDate.getFullYear();
  const m = calViewDate.getMonth();
  document.getElementById('calMonthLabel').textContent =
    new Date(y, m, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m + 1, 0);
  // Monday-based offset
  const startOffset = (firstDay.getDay() + 6) % 7;
  const todayStr = isoDate(new Date());

  let html = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < startOffset; i++) html += '<div class="cal-day empty"></div>';

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const dateStr = `${y}-${pad(m + 1)}-${pad(day)}`;
    let cls = 'cal-day';
    if (dateStr === todayStr) cls += ' today';
    if (dateStr === S.currentDate) cls += ' selected';
    html += `<div class="${cls}" onclick="calSelectDate('${dateStr}')">${day}</div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

function calSelectDate(dateStr) {
  S.currentDate = dateStr;
  closeCalendar();
  updateDateLabel();
  renderGrid();
}

// Close calendar on outside click
document.addEventListener('click', function(e) {
  if (calOpen && !document.getElementById('calPopup').contains(e.target)) {
    closeCalendar();
  }
});

/* ══ SHIFT MODAL ════════════════════════════════════════════════════════════ */
function openShiftModal(empId, date, time) {
  S.editingId = null;
  S.shiftType = 'task';
  const st = time || '08:00';
  const [h] = st.split(':').map(Number);
  const et = pad(Math.min(h + 2, 17)) + ':' + st.split(':')[1];

  document.getElementById('empSelect').innerHTML =
    S.employees.map(e => `<option value="${esc(e.id)}"${String(e.id) === String(empId) ? ' selected' : ''}>${esc(e.name)}</option>`).join('');
  document.getElementById('taskSelect').innerHTML =
    S.tasks.map(t => `<option value="${esc(t.id)}">${esc(t.name)}</option>`).join('');
  document.getElementById('dateInput').value  = date || S.currentDate;
  document.getElementById('startInput').value = st;
  document.getElementById('endInput').value   = et;
  document.getElementById('notesInput').value = '';
  document.getElementById('modalTitle').textContent = 'Add Shift';
  setSaveState(false);
  switchType('task');
  document.getElementById('shiftModal').classList.add('visible');
}

function editShift(id) {
  const shift = S.schedule.find(s => s.id === String(id));
  if (!shift) return;
  S.editingId = id;
  document.getElementById('empSelect').innerHTML =
    S.employees.map(e => `<option value="${esc(e.id)}"${String(e.id) === String(shift.employeeId) ? ' selected' : ''}>${esc(e.name)}</option>`).join('');
  document.getElementById('taskSelect').innerHTML =
    S.tasks.map(t => `<option value="${esc(t.id)}"${String(t.id) === String(shift.taskId) ? ' selected' : ''}>${esc(t.name)}</option>`).join('');
  document.getElementById('dateInput').value  = shift.date;
  document.getElementById('startInput').value = shift.start;
  document.getElementById('endInput').value   = shift.end;
  document.getElementById('notesInput').value = shift.notes || '';
  document.getElementById('modalTitle').textContent = 'Edit Shift';
  setSaveState(false);
  switchType(shift.type || 'task');
  document.getElementById('shiftModal').classList.add('visible');
}

function closeShiftModal() {
  document.getElementById('shiftModal').classList.remove('visible');
}

function switchType(type) {
  S.shiftType = type;
  document.getElementById('btnTask').classList.toggle('active', type === 'task');
  document.getElementById('btnBreak').classList.toggle('active', type === 'break');
  document.getElementById('taskFieldWrap').style.display  = type === 'task' ? 'block' : 'none';
  document.getElementById('notesFieldWrap').style.display = type === 'task' ? 'block' : 'none';
}

function setSaveState(loading) {
  const btn = document.getElementById('saveShiftBtn');
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span> Saving…'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg> Save';
}

async function saveShift() {
  const payload = {
    id:         S.editingId || ('s' + Date.now()),
    employeeId: document.getElementById('empSelect').value,
    taskId:     S.shiftType === 'task' ? document.getElementById('taskSelect').value : '',
    date:       document.getElementById('dateInput').value,
    start:      document.getElementById('startInput').value,
    end:        document.getElementById('endInput').value,
    notes:      document.getElementById('notesInput').value,
    type:       S.shiftType,
  };

  if (!payload.employeeId || !payload.date || !payload.start || !payload.end) {
    showToast('Please fill all required fields', 'error'); return;
  }
  if (payload.start >= payload.end) {
    showToast('End time must be after start time', 'error'); return;
  }

  const isEdit = !!S.editingId;
  const prev = [...S.schedule];

  if (isEdit) {
    const i = S.schedule.findIndex(s => s.id === String(payload.id));
    if (i > -1) S.schedule[i] = normalizeShift(payload);
  } else {
    S.schedule.push(normalizeShift(payload));
    S.pending.add(payload.id);
  }

  closeShiftModal();
  renderGrid();
  if (S.drawerEmpId) renderDrawerBody();
  setSaveState(true);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveShift', data: payload }),
    });
    if (!res.ok) throw new Error(res.status);
    const result = await res.json().catch(() => ({}));
    if (result.id && result.id !== payload.id) {
      const i = S.schedule.findIndex(s => s.id === payload.id);
      if (i > -1) S.schedule[i].id = String(result.id);
    }
    S.pending.delete(payload.id);
    renderGrid();
    if (S.drawerEmpId) renderDrawerBody();
    showToast(isEdit ? 'Shift updated ✓' : 'Shift saved ✓', 'success');
  } catch (err) {
    S.schedule = prev;
    S.pending.delete(payload.id);
    renderGrid();
    if (S.drawerEmpId) renderDrawerBody();
    showToast('Failed to save — reverted', 'error');
  } finally {
    setSaveState(false);
  }
}

/* ══ DELETE WITH CONFIRM DIALOG ═════════════════════════════════════════════ */
let _confirmResolve = null;

function showConfirm(title, msg) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOkBtn').onclick = () => { closeConfirm(); resolve(true); };
    document.getElementById('confirmOverlay').classList.add('visible');
  });
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('visible');
  if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
}

async function deleteShift(id) {
  const ok = await showConfirm('Delete this shift?', 'This action cannot be undone.');
  if (!ok) return;

  const prev = [...S.schedule];
  S.schedule = S.schedule.filter(s => s.id !== String(id));
  renderGrid();
  if (S.drawerEmpId) renderDrawerBody();
  showToast('Deleting shift…', 'info');

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'deleteShift', id }),
    });
    if (!res.ok) throw new Error(res.status);
    showToast('Shift deleted', 'success');
  } catch (err) {
    S.schedule = prev;
    renderGrid();
    if (S.drawerEmpId) renderDrawerBody();
    showToast('Failed to delete — reverted', 'error');
  }
}

async function removeEmployee(id) {
  const emp = S.employees.find(e => e.id === id);
  if (!emp) return;
  const ok = await showConfirm(`Remove ${emp.name}?`, 'Their shifts will remain in the data.');
  if (!ok) return;
  S.employees = S.employees.filter(e => e.id !== id);
  renderGrid();
  renderTeamModal();
  showToast(emp.name + ' removed', 'success');
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'deleteEmployee', id }),
  }).catch(() => {});
}

document.getElementById('shiftModal').addEventListener('click', function (e) {
  if (e.target === this) closeShiftModal();
});
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

/* ══ DRAWER ═════════════════════════════════════════════════════════════════ */
function openDrawer(empId) {
  const emp = S.employees.find(e => String(e.id) === String(empId));
  if (!emp) return;
  S.drawerEmpId = String(empId);
  S.expandedDays = {};
  document.getElementById('drawerEmpInfo').innerHTML =
    `<div class="drawer-emp-row">
      <div class="drawer-avatar" style="background:${esc(emp.avatar)}">${esc(emp.initials)}</div>
      <div>
        <div class="drawer-emp-name">${esc(emp.name)}</div>
        <div class="drawer-emp-dept">${esc(emp.department)}</div>
      </div>
    </div>`;
  renderDrawerBody();
  document.getElementById('empDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
}

function renderDrawerBody() {
  const empId = S.drawerEmpId;
  if (!empId) return;
  const tm = buildTaskMap();
  const dates = getDates();
  const empShifts = S.schedule.filter(s => String(s.employeeId) === String(empId));
  const f = [];

  if (S.view === 'day') {
    const dayShifts = empShifts.filter(s => s.date === S.currentDate)
      .sort((a, b) => a.start.localeCompare(b.start));
    if (!dayShifts.length) {
      f.push('<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px 0">No shifts scheduled today</p>');
    } else {
      dayShifts.forEach(s => f.push(shiftItemHTML(s, tm)));
    }
  } else {
    let any = false;
    dates.forEach(date => {
      const ds = empShifts.filter(s => s.date === date).sort((a, b) => a.start.localeCompare(b.start));
      if (!ds.length) return;
      any = true;
      const total = ds.reduce((acc, s) => acc + dur(s.start, s.end), 0);
      const exp = S.expandedDays[date];
      f.push(`<div class="day-section">
        <div class="day-section-hdr" onclick="toggleDay('${date}')">
          <div>
            <span class="day-section-title">${fmtDate(date, { weekday:'short', month:'short', day:'numeric' })}</span>
            <span class="day-hours-badge">${total.toFixed(1)}h</span>
          </div>
          <svg class="day-toggle-icon${exp ? ' open' : ''}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="day-shifts${exp ? ' open' : ''}">${ds.map(s => shiftItemHTML(s, tm)).join('')}</div>
      </div>`);
    });
    if (!any) f.push('<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px 0">No shifts scheduled this period</p>');
  }
  document.getElementById('drawerBody').innerHTML = f.join('');
}

function shiftItemHTML(s, tm) {
  const task = tm[String(s.taskId)];
  const isBreak = s.type === 'break';
  const d = dur(s.start, s.end);
  const bg = isBreak ? '#f1f5f9' : (task?.lightColor || '#f8fafc');
  const border = isBreak ? '#94a3b8' : (task?.color || '#cbd5e1');
  const color = isBreak ? '#64748b' : (task?.color || '#475569');
  return `<div class="shift-item" style="background:${bg};border-color:${border}">
    <div class="shift-bar" style="background:${color}"></div>
    <div style="flex:1;min-width:0">
      <div class="shift-item-name" style="color:${color}">${isBreak ? '☕ Break' : esc(task?.name || 'Task')}</div>
      <div class="shift-item-meta">${s.start} – ${s.end}</div>
    </div>
    <div class="shift-item-dur">${d.toFixed(1)}h</div>
  </div>`;
}

function closeDrawer() {
  document.getElementById('empDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('visible');
  S.drawerEmpId = null;
}

function toggleDay(date) {
  S.expandedDays[date] = !S.expandedDays[date];
  renderDrawerBody();
}

/* ══ TEAM MODAL ═════════════════════════════════════════════════════════════ */
const AVATAR_COLORS = ['#6366f1','#ef4444','#10b981','#f59e0b','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16'];
let selectedAvatarColor = AVATAR_COLORS[0];

function openTeamModal() {
  renderTeamModal();
  document.getElementById('teamModal').classList.add('visible');
}

function closeTeamModal() {
  document.getElementById('teamModal').classList.remove('visible');
}

function renderTeamModal() {
  const swatches = AVATAR_COLORS.map(c =>
    `<div class="color-swatch${c === selectedAvatarColor ? ' selected' : ''}" style="background:${c}" onclick="selectAvatarColor('${c}')"></div>`
  ).join('');

  document.getElementById('teamModalBody').innerHTML =
    `<div style="margin-bottom:4px">
      ${S.employees.map(emp => `
        <div class="teammate-row">
          <div class="team-avatar" style="background:${esc(emp.avatar)}">${esc(emp.initials)}</div>
          <div>
            <div class="teammate-name">${esc(emp.name)}</div>
            <div class="teammate-dept">${esc(emp.department)}</div>
          </div>
          <button class="remove-teammate-btn" onclick="removeEmployee('${esc(emp.id)}')">Remove</button>
        </div>
      `).join('')}
    </div>
    <div class="add-teammate-form">
      <h4>Add Teammate</h4>
      <div class="add-teammate-grid">
        <input type="text" id="newEmpName" placeholder="Full name *">
        <input type="text" id="newEmpDept" placeholder="Department">
      </div>
      <div class="avatar-color-row">
        <label>Avatar colour</label>
        ${swatches}
      </div>
      <button class="btn-add-teammate" onclick="addEmployee()">Add Teammate</button>
    </div>`;
}

function selectAvatarColor(color) {
  selectedAvatarColor = color;
  renderTeamModal();
}

function addEmployee() {
  const nameEl = document.getElementById('newEmpName');
  const deptEl = document.getElementById('newEmpDept');
  const name = nameEl.value.trim();
  if (!name) { showToast('Name is required', 'error'); nameEl.focus(); return; }
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const emp = {
    id: 'e' + Date.now(),
    name,
    initials,
    department: deptEl.value.trim() || '',
    avatar: selectedAvatarColor,
  };
  S.employees.push(emp);
  renderGrid();
  renderTeamModal();
  showToast(name + ' added ✓', 'success');
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'saveEmployee', data: emp }),
  }).catch(() => showToast('Could not sync to server', 'error'));
}

document.getElementById('teamModal').addEventListener('click', function (e) {
  if (e.target === this) closeTeamModal();
});

/* ══ TOAST ══════════════════════════════════════════════════════════════════ */
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  };
  el.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toastOut .2s ease forwards';
    setTimeout(() => el.remove(), 200);
  }, 3000);
}
