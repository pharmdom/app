
<style>

    .kc-label    { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 2px; line-height: 1.3; }

    .edit-input, .edit-select, .edit-textarea {
      width: 100%; padding: 6px 10px; border: 1.5px solid #e2e8f0; border-radius: 7px;

    /* ── Save Button ── */

      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 9px; border: 1.5px solid #2563eb;
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .15s; white-space: nowrap;

    .btn-save.saved { background: #15803d; border-color: #15803d; }

    /* ── Toast ── */
    .toast-container { position: fixed; top: 65px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }

    /* ── Product table search ── */
    .modal-toolbar { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
    .modal-toolbar .search-wrap { max-width: 300px; }

    /* ── Add Work notice ── */

    /* Auto-populated field indicator */

    .form-group textarea.auto-filled { background: #f0fdf4; border-color: #86efac; color: #15803d; }

<div class="page-wrapper">
  <!-- Title block -->

    <div class="page-titl">FBA Prep Tracker</div>
    <div class="page-subtitle">Track and manage product preparation for Amazon FBA shipments</div>

  <!-- Header row: counter + search + action -->
  <div class="page-header">
    <div class="header-left">
      <div class="stat-chip slate" id="statTotal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>

<script>
(function () {
'use strict';


/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyy6zBP4LduRhK-Fz_aK5H3bDH_cvT8HEj2g81aKgEQVIHsQze3AgJQaBr4Cq1FPs3P/exec';


/* ══════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════ */
const BOOL_FIELDS = new Set([
  'Bundle', 'DG Label', 'Poly Bag', 'Warning Label', 'Barcode', 'Box',
  'Veeqo Stock Adjusted', 'UPS Collected'
]);

const COLUMNS = [
  { key: 'warehouse',   title: 'Warehouse',   dotColor: '#d97706' },
  { key: 'digital_ops', title: 'Digital Ops', dotColor: '#2563eb' },
];


/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let fbaData       = [];   // FBA sheet (backend product database)
let warehouseData = [];   // FBA >> Warehouse sheet (work items for kanban)
let filtered      = [];
let activeTab     = 'info';
let deletePendingTimer = null;

// Dirty tracking for explicit save
let drawerDirtyFields = {};
let drawerCurrentId   = null;
let drawerSource      = null; // 'warehouse' or 'fba'
let isSaving          = false;

// Add Work - matched product
let awMatchedProduct = null;


/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ea(s) {
  return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}


/* ══════════════════════════════════════════════════
   BUCKET LOGIC (for Warehouse items only)
══════════════════════════════════════════════════ */
function getBucket(row) {
  const unitsCompleted = String(row['Units Completed'] ?? '').trim();
  const upsCollected   = String(row['UPS Collected'] ?? '').trim().toLowerCase();

  // Warehouse bucket: both Units Completed and UPS Collected are blank
  if ((!unitsCompleted || unitsCompleted === '0') && (!upsCollected || upsCollected === '' || upsCollected === '—')) {
    return 'warehouse';
  }

  // Digital Ops bucket: Veeqo Stock Adjusted is No or blank
  const veeqo = String(row['Veeqo Stock Adjusted'] ?? '').trim().toLowerCase();
  if (veeqo !== 'yes') {
    return 'digital_ops';
  }

  // Completed
  return 'completed';
}


/* ══════════════════════════════════════════════════
   DATA — LOAD
══════════════════════════════════════════════════ */
async function loadData() {
  try {
    // Load both FBA and FBA >> Warehouse sheets
    const [fbaRes, whRes] = await Promise.all([
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'getFBA' })
      }),
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'getWarehouse' })
      })
    ]);

    const fbaJson = await fbaRes.json();
    const whJson  = await whRes.json();

    if (!fbaJson.success) throw new Error(fbaJson.message || 'FBA API error');

    // Parse FBA data
    const fbaHeaders = fbaJson.headers || [];
    fbaData = (fbaJson.rows || []).map(row => {
      const obj = {};
      fbaHeaders.forEach((h, i) => { obj[h] = row[i] ?? ''; });
      return obj;
    });

    // Parse Warehouse data
    if (whJson.success) {
      const whHeaders = whJson.headers || [];
      warehouseData = (whJson.rows || []).map(row => {
        const obj = {};
        whHeaders.forEach((h, i) => { obj[h] = row[i] ?? ''; });
        return obj;
      });
    } else {
      warehouseData = [];
    }

    applyFilters();
    showToast('Loaded ' + fbaData.length + ' products, ' + warehouseData.length + ' work items', 'success');
  } catch (err) {
    console.error(err);
    document.getElementById('kanbanWrapper').innerHTML =
      '<div class="loading-state" style="width:100%">'
      + '<p style="color:#dc2626;font-weight:600;text-align:center;line-height:1.7">'
      + 'Failed to load data.<br>'
      + '<span style="font-size:12px;color:#94a3b8;font-weight:500">Make sure your Apps Script handles both <code>getFBA</code> and <code>getWarehouse</code> actions.</span>'
      + '</p></div>';
    showToast('Failed to load data', 'error');
  }
}


/* ══════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════ */
function updateStats() {
  const total     = warehouseData.length;
  const completed = warehouseData.filter(r => getBucket(r) === 'completed').length;
  setChip('statTotal',     total     + ' Total');
  setChip('statCompleted', completed + ' Completed');
}

function setChip(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + text + '</span>';
}


/* ══════════════════════════════════════════════════
   FILTERS + SEARCH (on warehouse data)
══════════════════════════════════════════════════ */
function applyFilters() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  filtered = warehouseData.filter(row => {
    if (!q) return true;
    return (
      String(row['Label Code']   || '').toLowerCase().includes(q) ||
      String(row['Brand']        || '').toLowerCase().includes(q) ||
      String(row['Product Line'] || '').toLowerCase().includes(q) ||
      String(row['ASIN']         || '').toLowerCase().includes(q)
    );
  });
  updateStats();
  renderKanban();
}


/* ══════════════════════════════════════════════════
   KANBAN RENDER (from Warehouse data only)
══════════════════════════════════════════════════ */
function renderKanban() {
  const wrapper = document.getElementById('kanbanWrapper');
  const groups = { warehouse: [], digital_ops: [] };
  filtered.forEach(row => {
    const b = getBucket(row);
    if (groups[b]) groups[b].push(row);
  });

  wrapper.innerHTML = '';

  COLUMNS.forEach(col => {
    const items  = groups[col.key] || [];
    const colEl  = document.createElement('div');
    colEl.className = 'kanban-column';

    const hdr = document.createElement('div');
    hdr.className = 'kanban-col-header';
    hdr.innerHTML =
      '<div class="kanban-col-title">'
      + '<span class="col-dot" style="background:' + col.dotColor + '"></span>'
      + esc(col.title) + '</div>'
      + '<span class="kanban-col-count">' + items.length + '</span>';
    colEl.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'kanban-col-body';

    if (!items.length) {
      body.innerHTML =
        '<div class="empty-state">'
        + '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
        + '<p>No records</p></div>';
    } else {
      items.forEach(row => body.appendChild(buildCard(row, col.key)));
    }

    colEl.appendChild(body);
    wrapper.appendChild(colEl);
  });
}


/* ══════════════════════════════════════════════════
   CARD
══════════════════════════════════════════════════ */
function buildCard(row, bucket) {
  const id   = String(row['ID'] || '');
  const card = document.createElement('div');
  card.className  = 'kanban-card';
  card.dataset.id = id;
  card.innerHTML  = cardHTML(row);
  card.addEventListener('click', () => openDrawer(id, 'warehouse'));
  return card;
}

function cardHTML(row) {
  const labelCode   = row['Label Code']   || '—';
  const brand       = row['Brand']        || '';
  const productLine = row['Product Line'] || '';
  const asin        = row['ASIN']         || '';
  const unitsReq    = row['Units Required'];
  const brandLine   = [brand, productLine].filter(Boolean).join(' · ');

  const chipDefs = [
    { key: 'DG Label',      label: 'DG'      },
    { key: 'Poly Bag',      label: 'Poly'    },
    { key: 'Warning Label', label: 'Warn'    },
    { key: 'Barcode',       label: 'Barcode' },
    { key: 'Box',           label: 'Box'     },
  ];

  const chips = chipDefs.map(c => {
    const v = String(row[c.key] || '').trim().toLowerCase();
    if (v === 'yes')  return '<span class="chip yes">'   + c.label + '</span>';
    if (v === 'no')   return '<span class="chip no">'    + c.label + '</span>';
    return             '<span class="chip unset">' + c.label + '</span>';
  }).join('');

  return ''
    + '<div class="kc-label">'     + esc(labelCode) + '</div>'
    + (brandLine ? '<div class="kc-brandline">' + esc(brandLine) + '</div>' : '')
    + (asin      ? '<div class="kc-asin">'      + esc(asin)     + '</div>' : '')
    + '<div class="kc-stats"><div class="kc-stat">'
      + '<div class="kc-stat-label">Units Req.</div>'
      + '<div class="kc-stat-val">' + esc(String(unitsReq || '—')) + '</div>'
    + '</div></div>'
    + '<div class="kc-chips">' + chips + '</div>';
}


/* ══════════════════════════════════════════════════
   DRAWER — OPEN / CLOSE
══════════════════════════════════════════════════ */
function openDrawer(id, source) {
  source = source || 'warehouse';
  const dataSource = source === 'fba' ? fbaData : warehouseData;
  const row = dataSource.find(r => String(r['ID']) === String(id));
  if (!row) return;

  drawerDirtyFields = {};
  drawerCurrentId = id;
  drawerSource = source;
  isSaving = false;

  const drawer = document.getElementById('detailDrawer');
  drawer.dataset.currentId = id;

  // For warehouse bucket items, default to warehouse tab
  if (source === 'warehouse') {
    const bucket = getBucket(row);
    activeTab = bucket === 'warehouse' ? 'warehouse' : 'info';
  } else {
    activeTab = 'info';
  }

  renderDrawer(row);
  drawer.classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
}

function closeDrawer() {
  if (Object.keys(drawerDirtyFields).length > 0 && drawerCurrentId) {
    saveAllChanges();
  }
  document.getElementById('detailDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('visible');
  drawerDirtyFields = {};
  drawerCurrentId = null;
  drawerSource = null;
  applyFilters();
}


/* ══════════════════════════════════════════════════
   DRAWER — RENDER
══════════════════════════════════════════════════ */
function renderDrawer(row) {
  const id     = String(row['ID'] || '');
  const source = drawerSource || 'warehouse';
  const bucket = source === 'warehouse' ? getBucket(row) : 'fba';
  const isWarehouseBucket = (source === 'warehouse' && bucket === 'warehouse');
  const isDigitalOpsBucket = (source === 'warehouse' && bucket === 'digital_ops');

  const badgeHTML = {
    digital_ops: '<span class="drawer-bucket-badge dbb-digital">Digital Ops</span>',
    warehouse:   '<span class="drawer-bucket-badge dbb-warehouse">Warehouse</span>',
    completed:   '<span class="drawer-bucket-badge dbb-completed">Completed</span>',
    fba:         '<span class="drawer-bucket-badge" style="background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#818cf8">FBA Product</span>',
  }[bucket] || '';

  const productLine = row['Product Line'] || '';
  const brand       = row['Brand'] || '';
  const labelCode   = row['Label Code'] || '';
  const subtitle    = [brand, labelCode].filter(Boolean).join(' — ');
  const unitsReq    = row['Units Required']  || '—';
  const unitsDone   = row['Units Completed'] || '—';
  const upsCol      = row['UPS Collected']   || '—';

  document.getElementById('drawerHeader').innerHTML =
    '<div class="drawer-hero">'
    + '<button class="drawer-hero-close" onclick="closeDrawer()">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    + '</button>'
    + badgeHTML
    + (productLine ? '<div class="drawer-product-line">' + esc(productLine) + '</div>' : '')
    + '<div class="drawer-title">' + '</div>'
    + (subtitle ? '<div class="drawer-subtitle">' + esc(subtitle) + '</div>' : '')
    + '<div class="drawer-kpi-row">'
      + kpiBox('Units Required',  esc(String(unitsReq)))
      + kpiBox('Units Completed', esc(String(unitsDone)))
      + kpiBox('UPS Collected',   esc(String(upsCol)))
    + '</div>'
    + '</div>';

  // Tabs logic
  let tabsHTML = '';
  if (source === 'fba') {
    // FBA product drawer: show all tabs, all editable
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info')
      + dTab('prep', id, svgPackage(), 'Prep')
      + dTab('warehouse', id, svgWarehouse(), 'Warehouse');
  } else if (isWarehouseBucket) {
    // Warehouse bucket: Product Info and Prep greyed out, Warehouse active
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info', true)
      + dTab('prep', id, svgPackage(), 'Prep', true)
      + dTab('warehouse', id, svgWarehouse(), 'Warehouse');
  } else if (isDigitalOpsBucket) {
    // Digital Ops: hide Warehouse tab
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info')
      + dTab('prep', id, svgPackage(), 'Prep');
  } else {
    // Completed
    tabsHTML = dTab('info', id, svgGrid(), 'Product Info')
      + dTab('prep', id, svgPackage(), 'Prep')
      + dTab('warehouse', id, svgWarehouse(), 'Warehouse');
  }
  document.getElementById('drawerTabs').innerHTML = tabsHTML;

  let body = '';
  const ro = isWarehouseBucket; // readonly for info & prep when in warehouse bucket

  if (activeTab === 'info') {
    body += sec('Product Info') + '<div class="info-grid">'
      + eCard(id, 'Label Code',   row['Label Code']   || '', 'text', ro)
      + eCard(id, 'Brand',        row['Brand']        || '', 'text', ro)
      + eCard(id, 'Product Line', row['Product Line'] || '', 'text', ro)
      + eCard(id, 'Amazon / ASIN',         row['ASIN']         || '', 'text', ro)
      + '</div></div>'
      + sec('Quantities') + '<div class="info-grid">'
      + eCard(id, 'Units Required',  row['Units Required']  || '', 'number', ro)
      + bCard(id, 'Veeqo Stock Adjusted', row['Veeqo Stock Adjusted'], ro)
      + '</div></div>';
  }

  if (activeTab === 'prep') {
    body += sec('Instructions') + '<div class="info-grid full">'
      + taCard(id, 'Prep Instructions', row['Prep Instructions'] || '', ro)
      + '</div></div>'
      + sec('Packaging') + '<div class="info-grid">'
      + bCard(id, 'Bundle',        row['Bundle'], ro)
      + bCard(id, 'DG Label',      row['DG Label'], ro)
      + bCard(id, 'Poly Bag',      row['Poly Bag'], ro)
      + bCard(id, 'Warning Label', row['Warning Label'], ro)
      + bCard(id, 'Barcode',       row['Barcode'], ro)
      + bCard(id, 'Box',           row['Box'], ro)
      + '</div></div>';
  }

  if (activeTab === 'warehouse') {
    body += sec('Completion') + '<div class="info-grid">'
      + bCard(id, 'UPS Collected',        row['UPS Collected'])
      + eCard(id, 'Units Completed', row['Units Completed'] || '', 'number')
      + '</div></div>';
  }

  document.getElementById('drawerBody').innerHTML = body;

  const hasDirty = Object.keys(drawerDirtyFields).length > 0;
  let footerHTML = '';
  if (source === 'warehouse') {
    footerHTML = '<button id="deleteBtn" class="btn btn-danger" onclick="deleteRecord(\'' + ea(id) + '\')">'
      + svgTrash() + 'Delete</button>'
      + '<button id="saveBtn" class="btn-save' + (hasDirty ? '' : '" disabled="disabled') + '" onclick="saveAllChanges()">'
      + svgCheck() + (hasDirty ? 'Save Changes' : 'All Saved') + '</button>';
  } else {
    // FBA product drawer: save goes to FBA sheet
    footerHTML = '<button id="deleteBtn" class="btn btn-danger" onclick="deleteFBAProduct(\'' + ea(id) + '\')">'
      + svgTrash() + 'Delete</button>'
      + '<button id="saveBtn" class="btn-save' + (hasDirty ? '' : '" disabled="disabled') + '" onclick="saveAllChanges()">'
      + svgCheck() + (hasDirty ? 'Save Changes' : 'All Saved') + '</button>';
  }
  document.getElementById('drawerFooter').innerHTML = footerHTML;
}


/* ── Drawer component helpers ── */
function kpiBox(label, val) {
  return '<div class="drawer-kpi"><div class="drawer-kpi-label">' + label + '</div><div class="drawer-kpi-val">' + val + '</div></div>';
}
function dTab(t, id, icon, label, disabled) {
  return '<button class="drawer-tab' + (activeTab === t ? ' active' : '') + (disabled ? ' disabled' : '') + '" onclick="switchTab(\'' + t + '\',\'' + ea(id) + '\')">' + icon + label + '</button>';
}
function switchTab(t, id) {
  activeTab = t;
  const dataSource = drawerSource === 'fba' ? fbaData : warehouseData;
  const row = dataSource.find(r => String(r['ID']) === String(id));
  if (row) renderDrawer(row);
}
function sec(label) {
  return '<div class="drawer-section"><div class="section-label">' + esc(label) + '</div>';
}
function eCard(id, label, value, type, readonly) {
  const displayVal = drawerDirtyFields.hasOwnProperty(label) ? drawerDirtyFields[label] : value;
  let inp;
  if (type === 'number') {
    const n = parseFloat(displayVal);
    inp = '<input type="number" class="edit-input" value="' + (isNaN(n) ? '' : n) + '" step="1" min="0"'
        + (readonly ? ' readonly style="background:#f8fafc;opacity:.6;pointer-events:none"' : '')
        + ' oninput="markDirty(\'' + ea(label) + '\',this.value)">';
  } else {
    inp = '<input type="text" class="edit-input" value="' + ea(String(displayVal)) + '"'
        + (readonly ? ' readonly style="background:#f8fafc;opacity:.6;pointer-events:none"' : '')
        + ' oninput="markDirty(\'' + ea(label) + '\',this.value)">';
  }
  return '<div class="info-card' + (readonly ? ' readonly' : '') + '"><label>' + esc(label) + '</label>' + inp + '</div>';
}
function taCard(id, label, value, readonly) {
  const displayVal = drawerDirtyFields.hasOwnProperty(label) ? drawerDirtyFields[label] : value;
  return '<div class="info-card' + (readonly ? ' readonly' : '') + '"><label>' + esc(label) + '</label>'
    + '<textarea class="edit-textarea"' + (readonly ? ' readonly style="background:#f8fafc;opacity:.6;pointer-events:none"' : '')
    + ' oninput="markDirty(\'' + ea(label) + '\',this.value)">'
    + esc(displayVal) + '</textarea></div>';
}
function bCard(id, label, value, readonly) {
  const v   = drawerDirtyFields.hasOwnProperty(label) ? drawerDirtyFields[label] : String(value ?? '').trim();
  const low = v.toLowerCase();
  if (readonly) {
    return '<div class="info-card readonly"><label>' + esc(label) + '</label>'
      + '<div class="bool-toggle-group" style="opacity:.6;pointer-events:none">'
      + '<button type="button" class="bool-toggle-btn' + (low === 'yes' ? ' active-yes' : '') + '">Yes</button>'
      + '<button type="button" class="bool-toggle-btn' + (low === 'no' ? ' active-no' : '') + '">No</button>'
      + '<button type="button" class="bool-toggle-btn' + (low !== 'yes' && low !== 'no' ? ' active-unset' : '') + '">—</button>'
      + '</div></div>';
  }
  return '<div class="info-card"><label>' + esc(label) + '</label>'
    + '<div class="bool-toggle-group">'
    + '<button type="button" class="bool-toggle-btn' + (low === 'yes' ? ' active-yes' : '') + '" onclick="markBool(\'' + ea(label) + '\',\'Yes\',this)">Yes</button>'
    + '<button type="button" class="bool-toggle-btn' + (low === 'no' ? ' active-no' : '') + '" onclick="markBool(\'' + ea(label) + '\',\'No\',this)">No</button>'
    + '<button type="button" class="bool-toggle-btn' + (low !== 'yes' && low !== 'no' ? ' active-unset' : '') + '" onclick="markBool(\'' + ea(label) + '\',\'\',this)">—</button>'
    + '</div></div>';
}


/* Mark field dirty */
function markDirty(field, value) {
  drawerDirtyFields[field] = value;
  updateSaveButton();
}

function markBool(field, value, btnEl) {
  drawerDirtyFields[field] = value;
  const group = btnEl.parentElement;
  group.querySelectorAll('.bool-toggle-btn').forEach(b => {
    b.className = 'bool-toggle-btn';
  });
  const low = value.toLowerCase();
  if (low === 'yes') btnEl.classList.add('active-yes');
  else if (low === 'no') btnEl.classList.add('active-no');
  else btnEl.classList.add('active-unset');
  updateSaveButton();
}

function updateSaveButton() {
  const btn = document.getElementById('saveBtn');
  if (!btn) return;
  const hasDirty = Object.keys(drawerDirtyFields).length > 0;
  btn.disabled = !hasDirty;
  btn.classList.remove('saved');
  btn.innerHTML = svgCheck() + (hasDirty ? 'Save Changes' : 'All Saved');
}


/* ══════════════════════════════════════════════════
   SAVE — ALL CHANGES AT ONCE
══════════════════════════════════════════════════ */
async function saveAllChanges() {
  if (isSaving || !drawerCurrentId) return;
  const dirtyKeys = Object.keys(drawerDirtyFields);
  if (dirtyKeys.length === 0) return;

  isSaving = true;
  const btn = document.getElementById('saveBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner sm"></span> Saving…';
  }

  const dataSource = drawerSource === 'fba' ? fbaData : warehouseData;
  const idx = dataSource.findIndex(r => String(r['ID']) === String(drawerCurrentId));
  if (idx < 0) { isSaving = false; return; }

  dirtyKeys.forEach(field => {
    dataSource[idx][field] = drawerDirtyFields[field];
  });

  const action = drawerSource === 'fba' ? 'saveFBA' : 'saveWarehouse';
  const result = await callApi({ action: action, data: rowToApiData(dataSource[idx]) });

  isSaving = false;

  if (result && result.success) {
    drawerDirtyFields = {};
    showToast('Saved successfully', 'success');
    updateStats();
    if (btn) {
      btn.innerHTML = svgCheck() + 'All Saved';
      btn.classList.add('saved');
      setTimeout(() => btn.classList.remove('saved'), 1500);
    }
    const row = dataSource.find(r => String(r['ID']) === String(drawerCurrentId));
    if (row && document.getElementById('detailDrawer').classList.contains('open')) {
      renderDrawer(row);
    }
  } else {
    showToast('Error saving', 'error');
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = svgCheck() + 'Save Changes';
    }
  }
}


/* ══════════════════════════════════════════════════
   DELETE RECORD (Warehouse)
══════════════════════════════════════════════════ */
async function deleteRecord(id) {
  const btn = document.getElementById('deleteBtn');
  if (!btn) return;

  if (!btn.classList.contains('confirming')) {
    btn.classList.add('confirming');
    btn.innerHTML = svgWarning() + 'Confirm?';
    deletePendingTimer = setTimeout(() => {
      btn.classList.remove('confirming');
      btn.innerHTML = svgTrash() + 'Delete';
    }, 3000);
    return;
  }

  clearTimeout(deletePendingTimer);
  btn.classList.remove('confirming');
  btn.classList.add('deleting');
  btn.innerHTML = '<span class="spinner sm"></span>Deleting…';

  const card = document.querySelector('.kanban-card[data-id="' + id + '"]');
  if (card) card.classList.add('card-deleting');

  const result = await callApi({ action: 'deleteWarehouse', id });

  if (result && result.success) {
    const idx = warehouseData.findIndex(r => String(r['ID']) === String(id));
    if (idx > -1) warehouseData.splice(idx, 1);
    setTimeout(() => {
      drawerDirtyFields = {};
      drawerCurrentId = null;
      drawerSource = null;
      document.getElementById('detailDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('visible');
      applyFilters();
      showToast('Record deleted', 'success');
    }, 420);
  } else {
    if (card) card.classList.remove('card-deleting');
    btn.classList.remove('deleting');
    btn.innerHTML = svgTrash() + 'Delete';
    showToast('Error deleting record', 'error');
  }
}

/* ══════════════════════════════════════════════════
   PRODUCTS TABLE MODAL (was "New Product" button)
══════════════════════════════════════════════════ */
function openProductsModal() {
  document.getElementById('productsSearchInput').value = '';
  renderProductsTable();
  document.getElementById('productsModalOverlay').classList.add('visible');
}

function closeProductsModal(e) {
  if (e && e.target !== document.getElementById('productsModalOverlay')) return;
  document.getElementById('productsModalOverlay').classList.remove('visible');
}

function renderProductsTable() {
  const q = (document.getElementById('productsSearchInput').value || '').toLowerCase().trim();
  const data = fbaData.filter(row => {
    if (!q) return true;
    return (
      String(row['Label Code']   || '').toLowerCase().includes(q) ||
      String(row['Brand']        || '').toLowerCase().includes(q) ||
      String(row['Product Line'] || '').toLowerCase().includes(q) ||
      String(row['ASIN']         || '').toLowerCase().includes(q)
    );
  });

  document.getElementById('productsModalCount').textContent = data.length;
  const cols = ['Label Code', 'Brand', 'Product Line', 'ASIN', 'Prep Instructions'];

  let html = '<table class="data-table"><thead><tr>'
    + cols.map(c => '<th>' + esc(c) + '</th>').join('')
    + '</tr></thead><tbody>';

  if (!data.length) {
    html += '<tr><td colspan="' + cols.length + '" style="text-align:center;padding:32px;color:#94a3b8;font-weight:600">No products found</td></tr>';
  } else {
    data.forEach(row => {
      const rid = ea(String(row['ID'] || ''));
      html += '<tr onclick="openDrawerFromProductsTable(\'' + rid + '\')">'
        + cols.map(c => {
          let val = String(row[c] ?? '—');
          if (c === 'Prep Instructions' && val.length > 50) val = val.substring(0, 50) + '…';
          return '<td>' + esc(val) + '</td>';
        }).join('')
        + '</tr>';
    });
  }

  html += '</tbody></table>';
  document.getElementById('productsModalBody').innerHTML = html;
}

function openDrawerFromProductsTable(id) {
  // Open drawer for this FBA product — keep products modal open
  openDrawer(id, 'fba');
}

function setFormBool(fieldId, value, btnEl) {

  if (fg) { fg.classList.remove('has-error'); const err = fg.querySelector('.field-error'); if (err) err.remove(); }

async function createRecord() {
  // Validate all fields
  const fields = [
    { id: 'nLabelCode', fg: 'fg-nLabelCode', label: 'Label Code' },
    { id: 'nBrand', fg: 'fg-nBrand', label: 'Brand' },
    { id: 'nProductLine', fg: 'fg-nProductLine', label: 'Product Line' },
    { id: 'nAsin', fg: 'fg-nAsin', label: 'ASIN' },
    { id: 'nPrepInstructions', fg: 'fg-nPrepInstructions', label: 'Prep Instructions' },
    { id: 'nPolyBag', fg: 'fg-nPolyBag', label: 'Poly Bag' },
    { id: 'nWarningLabel', fg: 'fg-nWarningLabel', label: 'Warning Label' },
    { id: 'nBarcode', fg: 'fg-nBarcode', label: 'Barcode' },
    { id: 'nBox', fg: 'fg-nBox', label: 'Box' },
  ];

  let hasError = false;
  // Clear previous errors
  document.querySelectorAll('#newProductForm .form-group').forEach(g => g.classList.remove('has-error'));
  document.querySelectorAll('#newProductForm .field-error').forEach(e => e.remove());

  fields.forEach(f => {
    const val = document.getElementById(f.id).value.trim();
    if (!val) {
      hasError = true;
      const fg = document.getElementById(f.fg);
      if (fg) {
        fg.classList.add('has-error');
        const errSpan = document.createElement('span');
        errSpan.className = 'field-error';
        errSpan.textContent = f.label + ' is required';
        fg.appendChild(errSpan);
      }
    }
  });

  if (hasError) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  const btn = document.getElementById('newSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>Creating…';

  const data = {
    id:               '',
    labelCode:        document.getElementById('nLabelCode').value.trim(),
    brand:            document.getElementById('nBrand').value.trim(),
    productLine:      document.getElementById('nProductLine').value.trim(),
    asin:             document.getElementById('nAsin').value.trim(),
    prepInstructions: document.getElementById('nPrepInstructions').value.trim(),
    bundle:           '',
    dgLabel:          '',
    polyBag:          document.getElementById('nPolyBag').value.trim(),
    warningLabel:     document.getElementById('nWarningLabel').value.trim(),
    barcode:          document.getElementById('nBarcode').value.trim(),
    box:              document.getElementById('nBox').value.trim(),
    unitsRequired:    0,
    veeqoAdjusted:    '',
    unitsCompleted:   0,
    upsCollected:     ''
  };

  const result = await callApi({ action: 'saveFBA', data });

  btn.disabled = false;
  btn.innerHTML = 'Create Product';

  if (result && result.success) {
    closeNewModal();
    // Reload FBA data
    const fbaRes = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getFBA' })
    });
    const fbaJson = await fbaRes.json();
    if (fbaJson.success) {
      const fbaHeaders = fbaJson.headers || [];
      fbaData = (fbaJson.rows || []).map(row => {
        const obj = {};
        fbaHeaders.forEach((h, i) => { obj[h] = row[i] ?? ''; });
        return obj;
      });
    }
    renderProductsTable();
    showToast('Product created', 'success');
    if (result.id) openDrawer(result.id, 'fba');
  } else {
    showToast('Error creating product', 'error');
  }
}

  setTimeout(() => document.getElementById('awLabelCode').focus(), 80);
}

function closeAddWorkModal(e) {
  if (e && e.target !== document.getElementById('addWorkModalOverlay')) return;
  document.getElementById('addWorkModalOverlay').classList.remove('visible');
  awMatchedProduct = null;
}

let awDebounceTimer = null;
function onAddWorkLabelCodeInput() {
  clearTimeout(awDebounceTimer);
  awDebounceTimer = setTimeout(() => {
    const code = document.getElementById('awLabelCode').value.trim();
    if (!code) {
      document.getElementById('awNotice').innerHTML = '';
      document.getElementById('awAutoFields').style.display = 'none';
      awMatchedProduct = null;
      return;
    }

    // Search in fbaData
    const match = fbaData.find(r => String(r['Label Code'] || '').trim().toLowerCase() === code.toLowerCase());

    if (match) {
      awMatchedProduct = match;
      document.getElementById('awNotice').innerHTML =
        '<div class="aw-notice found">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
        + 'Product found: <strong>' + esc(match['Product Line'] || match['Brand'] || code) + '</strong>'
        + '</div>';
      // Fill auto fields
      document.getElementById('awBrand').value = match['Brand'] || '';
      document.getElementById('awProductLine').value = match['Product Line'] || '';
      document.getElementById('awAsin').value = match['ASIN'] || '';
      document.getElementById('awPrepInstructions').value = match['Prep Instructions'] || '';
      document.getElementById('awBundle').value = match['Bundle'] || '';
      document.getElementById('awDgLabel').value = match['DG Label'] || '';
      document.getElementById('awPolyBag').value = match['Poly Bag'] || '';
      document.getElementById('awWarningLabel').value = match['Warning Label'] || '';
      document.getElementById('awBarcode').value = match['Barcode'] || '';
      document.getElementById('awBox').value = match['Box'] || '';
      document.getElementById('awAutoFields').style.display = 'block';
      // Clear label code error
      document.getElementById('fg-awLabelCode').classList.remove('has-error');
      const err = document.getElementById('fg-awLabelCode').querySelector('.field-error');
      if (err) err.remove();
    } else {
      awMatchedProduct = null;
      document.getElementById('awNotice').innerHTML =
        '<div class="aw-notice not-found">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
        + 'No product found with label code <strong>' + esc(code) + '</strong>. Please check and try again.'
        + '</div>';
      document.getElementById('awAutoFields').style.display = 'none';
    }
  }, 300);
}

async function submitAddWork() {
  // Clear previous errors
  document.querySelectorAll('#addWorkForm .form-group').forEach(g => g.classList.remove('has-error'));
  document.querySelectorAll('#addWorkForm .field-error').forEach(e => e.remove());

  let hasError = false;
  const labelCode = document.getElementById('awLabelCode').value.trim();
  const unitsReq  = document.getElementById('awUnitsRequired').value.trim();

  if (!labelCode) {
    hasError = true;
    const fg = document.getElementById('fg-awLabelCode');
    fg.classList.add('has-error');
    const errSpan = document.createElement('span');
    errSpan.className = 'field-error';
    errSpan.textContent = 'Label Code is required';
    fg.appendChild(errSpan);
  }

  if (!unitsReq || Number(unitsReq) <= 0) {
    hasError = true;
    const fg = document.getElementById('fg-awUnitsRequired');
    fg.classList.add('has-error');
    const errSpan = document.createElement('span');
    errSpan.className = 'field-error';
    errSpan.textContent = 'Units Required must be greater than 0';
    fg.appendChild(errSpan);
  }

  if (!awMatchedProduct) {
    hasError = true;
    if (labelCode) {
      const fg = document.getElementById('fg-awLabelCode');
      fg.classList.add('has-error');
      const errSpan = document.createElement('span');
      errSpan.className = 'field-error';
      errSpan.textContent = 'Label Code not found in FBA products';
      fg.appendChild(errSpan);
    }
  }

  if (hasError) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  const btn = document.getElementById('addWorkSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>Adding…';

  const data = {
    id:               '',
    labelCode:        labelCode,
    brand:            awMatchedProduct['Brand'] || '',
    productLine:      awMatchedProduct['Product Line'] || '',
    asin:             awMatchedProduct['ASIN'] || '',
    prepInstructions: awMatchedProduct['Prep Instructions'] || '',
    bundle:           awMatchedProduct['Bundle'] || '',
    dgLabel:          awMatchedProduct['DG Label'] || '',
    polyBag:          awMatchedProduct['Poly Bag'] || '',
    warningLabel:     awMatchedProduct['Warning Label'] || '',
    barcode:          awMatchedProduct['Barcode'] || '',
    box:              awMatchedProduct['Box'] || '',
    unitsRequired:    Number(unitsReq) || 0,
    veeqoAdjusted:    '',
    unitsCompleted:   0,
    upsCollected:     ''
  };

  const result = await callApi({ action: 'saveWarehouse', data });

  btn.disabled = false;
  btn.innerHTML = 'Add Work';

  if (result && result.success) {
    closeAddWorkModal();
    // Reload warehouse data
    const whRes = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getWarehouse' })
    });
    const whJson = await whRes.json();
    if (whJson.success) {
      const whHeaders = whJson.headers || [];
      warehouseData = (whJson.rows || []).map(row => {
        const obj = {};
        whHeaders.forEach((h, i) => { obj[h] = row[i] ?? ''; });
        return obj;
      });
    }
    applyFilters();
    showToast('Work added to Warehouse', 'success');
    if (result.id) openDrawer(result.id, 'warehouse');
  } else {
    showToast('Error adding work', 'error');
  }
}


/* ══════════════════════════════════════════════════
   COMPLETED RECORDS MODAL (from Warehouse data)
══════════════════════════════════════════════════ */
function showCompletedModal() {
  const completed = warehouseData.filter(r => getBucket(r) === 'completed');
  document.getElementById('completedModalCount').textContent = completed.length;

  const cols = ['Label Code', 'Brand', 'Product Line', 'ASIN', 'Units Required'];

  let html = '<table class="data-table"><thead><tr>'
    + cols.map(c => '<th>' + esc(c) + '</th>').join('')
    + '</tr></thead><tbody>';

  if (!completed.length) {
    html += '<tr><td colspan="' + cols.length + '" style="text-align:center;padding:32px;color:#94a3b8;font-weight:600">No completed records yet</td></tr>';
  } else {
    completed.forEach(row => {
      const rid = ea(String(row['ID'] || ''));
      html += '<tr onclick="closeCompletedModal(); openDrawer(\'' + rid + '\',\'warehouse\')">'
        + cols.map(c => '<td>' + esc(String(row[c] ?? '—')) + '</td>').join('')
        + '</tr>';
    });
  }

  html += '</tbody></table>';
  document.getElementById('completedModalBody').innerHTML = html;
  document.getElementById('completedModalOverlay').classList.add('visible');
}

function closeCompletedModal(e) {
  if (e && e.target !== document.getElementById('completedModalOverlay')) return;
  document.getElementById('completedModalOverlay').classList.remove('visible');
}


/* ══════════════════════════════════════════════════
   API HELPERS
══════════════════════════════════════════════════ */
async function callApi(body) {
  try {
    const res = await fetch(API_URL, {
      method : 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body   : JSON.stringify(body)
    });
    return await res.json();
  } catch (err) {
    console.error('API error:', err);
    return null;
  }
}

function rowToApiData(row) {
  return {
    id:               String(row['ID'] || ''),
    labelCode:        String(row['Label Code']            ?? ''),
    brand:            String(row['Brand']                 ?? ''),
    productLine:      String(row['Product Line']          ?? ''),
    asin:             String(row['ASIN']                  ?? ''),
    prepInstructions: String(row['Prep Instructions']     ?? ''),
    bundle:           String(row['Bundle']                ?? ''),
    dgLabel:          String(row['DG Label']              ?? ''),
    polyBag:          String(row['Poly Bag']              ?? ''),
    warningLabel:     String(row['Warning Label']         ?? ''),
    barcode:          String(row['Barcode']               ?? ''),
    box:              String(row['Box']                   ?? ''),
    unitsRequired:    Number(row['Units Required'])       || 0,
    veeqoAdjusted:    String(row['Veeqo Stock Adjusted']  ?? ''),
    unitsCompleted:   Number(row['Units Completed'])      || 0,
    upsCollected:     String(row['UPS Collected']         ?? '')
  };
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  if (type === 'success' || type === 'error') {
    c.querySelectorAll('.toast.info').forEach(t => t.remove());
  }
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<span class="spinner sm"></span>'
  };
  t.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), type === 'info' ? 10000 : 2500);
}
