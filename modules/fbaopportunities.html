
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef1f8;
  --surface:#ffffff;
  --surface2:#f5f7fc;
  --border:#e2e8f5;
  --border2:#ecf0f9;
  --text:#0c1526;
  --text2:#2a3a54;
  --text3:#64748b;
  --text4:#98a7bc;
  --accent:#1847d4;
  --accent-l:#2a5eed;
  --accent-bg:#eef2fd;
  --accent-bd:#c4d3f9;
  --green:#0c7a42;
  --green-bg:#ecfdf5;
  --green-bd:#86efac;
  --red:#b91c1c;
  --red-bg:#fef2f2;
  --red-bd:#fecaca;
  --amber:#92400e;
  --amber-bg:#fffbeb;
  --amber-bd:#fcd34d;
  --navy:#0c1526;
  --navy2:#141d2e;
  --r:10px;--r-sm:7px;--r-lg:14px;--r-xl:18px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sh-sm:0 1px 3px rgba(12,21,38,.06),0 1px 2px rgba(12,21,38,.04);
  --sh:0 4px 16px rgba(12,21,38,.08),0 2px 6px rgba(12,21,38,.04);
  --sh-lg:0 20px 50px rgba(12,21,38,.14),0 6px 16px rgba(12,21,38,.07);
}
html,body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;height:100%;}
body{overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

.fba-app{
  display:flex;flex-direction:column;height:100vh;max-height:100vh;overflow:hidden;position:relative;
  background:radial-gradient(ellipse at 20% 0%,rgba(24,71,212,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(24,71,212,.03) 0%,transparent 60%),var(--bg);
}

/* TOPNAV */
.topnav{display:flex;align-items:center;gap:10px;padding:8px 18px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.tnav-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tnav-chips{display:flex;align-items:center;gap:6px}
.tnav-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:11.5px;font-weight:600;white-space:nowrap;}
.tnav-chip svg{width:11px;height:11px;flex-shrink:0}
.tnav-chip.accent{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent);}
.tnav-chip.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.tnav-chip.red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}
.tnav-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-btn svg{width:13px;height:13px;flex-shrink:0}
.nav-btn:hover{background:var(--border);color:var(--text)}
.nav-btn:disabled{opacity:.5;cursor:default}
.nav-btn.icon-btn{padding:6px 8px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:9px 18px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.tb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.search-box{position:relative;min-width:160px;max-width:260px;flex:1}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);width:14px;height:14px;pointer-events:none;}
.search-box input{width:100%;padding:7px 10px 7px 33px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none;transition:all .15s;}
.search-box input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(24,71,212,.07)}
.sel-wrap{position:relative;display:inline-flex;align-items:center}
.sel-wrap svg.sel-arr{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--text4);pointer-events:none;}
.fsel{padding:6px 26px 6px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:var(--font);background:var(--surface2);color:var(--text2);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:border-color .15s;max-width:160px;}
.fsel:focus{border-color:var(--accent)}

/* VIEW TOGGLE */
.view-toggle{display:flex;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--surface2);}
.view-btn{display:flex;align-items:center;justify-content:center;padding:5px 9px;border:none;background:none;cursor:pointer;color:var(--text4);transition:all .15s;}
.view-btn:hover{color:var(--text2);background:var(--border2)}
.view-btn.active{background:var(--accent);color:#fff;}
.view-btn svg{width:14px;height:14px}

/* CONTENT */
.fba-content{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;position:relative}
.grid-outer{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 18px}
.fba-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* LIST VIEW */
.fba-list{display:flex;flex-direction:column;gap:6px;}
.fba-list-item{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--r);padding:11px 16px;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .12s;
  display:flex;align-items:center;gap:14px;
  animation:fadeUp .18s ease both;box-shadow:var(--sh-sm);
}
.fba-list-item:hover{box-shadow:var(--sh);border-color:var(--accent-bd);transform:translateX(2px)}
.fba-list-item.profitable{border-left-color:var(--green)}
.fba-list-item.approved{border-left-color:var(--green)}
.fba-list-item.rejected{border-left-color:var(--red)}
.fba-list-item.pending{border-left-color:#d1d9e6;border-left-width:1px}
.fba-list-name{font-size:13px;font-weight:700;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fba-list-asin{font-family:var(--mono);font-size:10px;color:var(--text4);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fba-list-date{font-size:11px;color:var(--text4);width:90px;flex-shrink:0}
.fba-list-stat{display:flex;flex-direction:column;gap:1px;width:60px;flex-shrink:0}
.fba-list-stat-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text4)}
.fba-list-stat-val{font-size:12px;font-weight:700;color:var(--text2)}
.fba-list-badges{display:flex;gap:5px;flex-shrink:0}

/* FBA CARD */
.fba-card{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .12s;
  display:flex;flex-direction:column;gap:8px;
  animation:fadeUp .18s ease both;box-shadow:var(--sh-sm);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fba-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);border-left-color:var(--accent);transform:translateY(-1px)}
.fba-card.profitable{border-left-color:var(--green)}
.fba-card.approved{border-left-color:var(--green)}
.fba-card.rejected{border-left-color:var(--red)}
.fba-card.pending{border-left-color:#d1d9e6;border-left-width:1px}
.fba-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.fba-card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.fba-status-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.fba-status-badge.approved{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.fba-status-badge.rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.fba-status-badge.pending{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.fba-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fba-card-asin{font-family:var(--mono);font-size:10px;color:var(--text4)}
.fba-card-date{font-size:10px;color:var(--text4)}
.fba-card-sep{width:3px;height:3px;border-radius:50%;background:var(--text4);flex-shrink:0}
.fba-card-stats{display:flex;gap:14px}
.fba-stat{display:flex;flex-direction:column;gap:1px}
.fba-stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text4)}
.fba-stat-val{font-size:12.5px;font-weight:700;color:var(--text2)}
.fba-card-flags{display:flex;gap:5px;flex-wrap:wrap;padding-top:6px;border-top:1px solid var(--border2)}
.fba-flag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:9.5px;font-weight:700}
.fba-flag.yes{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.fba-flag.no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.fba-flag.na{background:var(--surface2);color:var(--text4);border:1px solid var(--border)}

/* STATES */
.state-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center;flex:1;}
.state-wrap .icon{width:52px;height:52px;border-radius:14px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text4);}
.state-wrap .icon svg{width:24px;height:24px}
.state-wrap p{font-size:14px;font-weight:700;color:var(--text2)}
.state-wrap span{font-size:12px;color:var(--text4)}
.spinner{display:inline-block;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;}
.spin-sm{width:16px;height:16px}
.spin-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROGRESS BAR */
.pbar{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#4f80f7);z-index:50;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;opacity:0;}
.pbar.active{opacity:1}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,21,38,.35);z-index:1250;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px);}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;width:560px;max-width:97vw;height:100vh;background:var(--surface);box-shadow:-12px 0 50px rgba(12,21,38,.15);z-index:1300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.drawer.open{transform:translateX(0)}
.drawer-hero{padding:16px 20px 14px;background:linear-gradient(140deg,var(--navy2) 0%,#0d1631 100%);position:relative;overflow:hidden;flex-shrink:0;}
.drawer-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03);}
.drawer-hero::after{content:'';position:absolute;bottom:-25px;left:30px;width:100px;height:100px;border-radius:50%;background:rgba(24,71,212,.1);}
.drw-close{width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:all .15s;z-index:2;flex-shrink:0;}
.drw-close:hover{background:rgba(255,255,255,.2);color:#fff}
.drw-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;position:relative;z-index:2;}
.drw-topbar-left{display:flex;align-items:center;gap:6px;}
.drw-nav-counter{font-size:10px;font-weight:600;color:rgba(255,255,255,.45);white-space:nowrap;}

/* DRAWER NAV */
.drw-nav{display:flex;align-items:center;gap:5px;z-index:2;}
.drw-nav-btn{width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:all .15s;}
.drw-nav-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.drw-nav-btn:disabled{opacity:.3;cursor:default}
.drw-nav-btn svg{width:13px;height:13px}

.drw-stage-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;margin-bottom:6px;margin-top:2px;font-size:10px;font-weight:700;letter-spacing:.2px;position:relative;z-index:1;}
.drw-stage-badge.pending{background:rgba(24,71,212,.2);border:1px solid rgba(96,165,250,.3);color:#60a5fa;}
.drw-stage-badge.approved{background:rgba(12,122,66,.25);border:1px solid rgba(134,239,172,.35);color:#4ade80;}
.drw-stage-badge.rejected{background:rgba(185,28,28,.25);border:1px solid rgba(252,165,165,.3);color:#f87171;}
.drw-name{font-size:16px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:3px;padding-left:0;padding-right:48px;position:relative;z-index:1;}
.drw-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;position:relative;z-index:1;flex-wrap:wrap}
.drw-asin{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.38)}
.drw-date{font-size:10px;color:rgba(255,255,255,.45)}
.drw-meta-sep{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.drw-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.drw-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 10px;}
.drw-kpi-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.38);margin-bottom:2px}
.drw-kpi-val{font-size:15px;font-weight:800;color:#fff}

/* DRAWER TABS */
.drawer-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.drawer-tabs::-webkit-scrollbar{display:none}
.drawer-tab{padding:9px 14px;font-size:12px;font-weight:700;font-family:var(--font);color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.drawer-tab svg{width:13px;height:13px}
.drawer-tab:hover{color:var(--text2)}
.drawer-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-bg);}

/* DRAWER BODY */
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.drawer-section{margin-bottom:20px}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text4);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border2)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;transition:border-color .15s;}
.info-card:focus-within{border-color:var(--accent-bd);background:#fff}
.info-card label{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:5px;}
.info-card label svg{width:11px;height:11px;flex-shrink:0}
.info-card .read-val{font-size:13px;font-weight:600;color:var(--text2);padding:3px 0}

/* INPUT STYLES in info-card */
.info-card select,.info-card input[type="number"]{
  width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;
  font-size:13px;font-weight:600;font-family:var(--font);
  background:var(--surface);color:var(--text2);
  outline:none;cursor:pointer;transition:all .15s;
  -webkit-appearance:none;appearance:none;
}
.info-card select:focus,.info-card input[type="number"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,71,212,.07)}
.info-card .select-wrap{position:relative}
.info-card .select-wrap svg.sel-ico{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--text4);pointer-events:none;}
.info-card select.val-yes{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.info-card select.val-no{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.info-card select.val-empty{background:var(--surface);color:var(--text3)}
.pound-wrap{position:relative}
.pound-wrap span{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;color:var(--text3);pointer-events:none;}
.pound-wrap input{padding-left:22px!important;}

/* RECOMMENDATIONS SECTION */
.rec-field{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transform:translateY(-6px);
  transition:max-height .38s cubic-bezier(.4,0,.2,1), opacity .3s ease, transform .3s ease, margin .3s ease;
  margin-bottom:0;
}
.rec-field.visible{
  max-height:200px;
  opacity:1;
  transform:translateY(0);
  margin-bottom:8px;
}
.rec-field-inner{
  background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;
  transition:border-color .15s;
}
.rec-field-inner:focus-within{border-color:var(--accent-bd);background:#fff}
.rec-field-inner label{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:5px;}
.rec-field-inner label svg{width:11px;height:11px;flex-shrink:0}
.rec-field-inner select,.rec-field-inner input[type="number"]{
  width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;
  font-size:13px;font-weight:600;font-family:var(--font);
  background:var(--surface);color:var(--text2);
  outline:none;transition:all .15s;
  -webkit-appearance:none;appearance:none;
}
.rec-field-inner select:focus,.rec-field-inner input[type="number"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,71,212,.07)}
.rec-field-inner .select-wrap{position:relative}
.rec-field-inner .select-wrap svg.sel-ico{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--text4);pointer-events:none;}
.rec-field-inner select.val-yes{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.rec-field-inner select.val-no{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}

/* STATUS RESULT CARD */
.status-result{
  overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);
  transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .35s ease,transform .35s ease,margin .3s ease;
  margin-bottom:0;
}
.status-result.visible{max-height:160px;opacity:1;transform:translateY(0);margin-bottom:8px;}
.status-result-inner{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-radius:12px;border:1.5px solid;
}
.status-result-inner.approved{background:var(--green-bg);border-color:var(--green-bd)}
.status-result-inner.rejected{background:var(--red-bg);border-color:var(--red-bd)}
.status-result-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.status-result-inner.approved .status-result-icon{background:#dcfce7}
.status-result-inner.rejected .status-result-icon{background:#fee2e2}
.status-result-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.status-result-inner.approved .status-result-label{color:var(--green)}
.status-result-inner.rejected .status-result-label{color:var(--red)}
.status-result-val{font-size:17px;font-weight:800;}
.status-result-inner.approved .status-result-val{color:var(--green)}
.status-result-inner.rejected .status-result-val{color:var(--red)}
.status-result-sub{font-size:11px;margin-top:2px}
.status-result-inner.approved .status-result-sub{color:#166534}
.status-result-inner.rejected .status-result-sub{color:#991b1b}

/* EDIT LINK */
.rec-edit-row{display:flex;justify-content:flex-end;margin-bottom:10px;}
.rec-edit-btn{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--accent);background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:5px;transition:background .15s;}
.rec-edit-btn:hover{background:var(--accent-bg)}
.rec-edit-btn svg{width:11px;height:11px}

/* DRAWER FOOTER */
.drawer-foot{padding:11px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;justify-content:space-between;background:var(--surface2);flex-shrink:0;}
.drw-del-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-sm);background:var(--red-bg);border:1.5px solid var(--red-bd);color:var(--red);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;}
.drw-del-btn:hover{background:var(--red-bd);color:#7f1d1d}
.drw-del-btn svg{width:13px;height:13px}
.drw-save-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-sm);background:var(--accent);border:1.5px solid var(--accent);color:#fff;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;}
.drw-save-btn:hover{background:var(--accent-l)}
.drw-save-btn svg{width:13px;height:13px}

/* DELETE CONFIRM */
.del-confirm{display:flex;align-items:center;gap:8px;flex:1}
.del-confirm span{font-size:12px;color:var(--text3);font-weight:600}
.del-yes{padding:5px 12px;border-radius:6px;background:var(--red);color:#fff;border:none;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .15s;}
.del-yes:hover{background:#991b1b}
.del-no{padding:5px 12px;border-radius:6px;background:var(--surface);color:var(--text3);border:1.5px solid var(--border);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;}
.del-no:hover{background:var(--border2)}

/* TOAST */
.toasts{position:fixed;top:16px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--navy2);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--sh-lg);animation:toastIn .22s ease;max-width:320px;pointer-events:auto;border-left:3px solid rgba(255,255,255,.15);}
.toast.success{background:#14532d;border-left-color:var(--green)}
.toast.error{background:#7f1d1d;border-left-color:var(--red)}
.toast.info{background:#1e3a8a;border-left-color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* RESPONSIVE */
@media(max-width:768px){
  .fba-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .toolbar{padding:8px 12px}
  .topnav{padding:7px 12px}
  .grid-outer{padding:12px}
  .tnav-chips{gap:4px}
  .fba-list-date,.fba-list-asin{display:none}
}
@media(max-width:600px){
  .drawer{width:100%;max-width:100%}
  .drw-kpis{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .fba-grid{grid-template-columns:1fr}
  .tnav-chips{display:none}
}


.tnav-chip.chip-active{outline:2px solid currentColor;outline-offset:1px;}
</style>
</head>
<body>

<div class="pbar" id="pbar"></div>
<div class="toasts" id="toasts"></div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <div id="drawerHero"></div>
  <div class="drawer-tabs" id="drawerTabs"></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</div>

<div class="fba-app">
  <nav class="topnav">
    <div class="tnav-left">
      <div class="tnav-chips">
        <div class="tnav-chip accent" id="chipTotal" onclick="filterByStatus('')" style="cursor:pointer" title="Show all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>—</span>
        </div>
        <div class="tnav-chip green" id="chipApproved" onclick="filterByStatus('approved')" style="cursor:pointer" title="Filter approved">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>—</span>
        </div>
        <div class="tnav-chip red" id="chipRejected" onclick="filterByStatus('rejected')" style="cursor:pointer" title="Filter rejected">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <span>—</span>
        </div>
      </div>
    </div>
    <div class="tnav-actions">
      <button class="nav-btn" id="refreshBtn" onclick="refreshData()">
        <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </nav>

  <div class="toolbar">
    <div class="tb-left">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search product, ASIN, supplier…" oninput="renderView()">
      </div>      
    </div>
    <div class="tb-right">
      <span id="filterCount" style="font-size:12px;color:var(--text4);font-weight:600"></span>
      <div class="view-toggle">
        <button class="view-btn active" id="viewGrid" onclick="setView('grid')" title="Grid view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="viewList" onclick="setView('list')" title="List view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="fba-content" id="fbaContent">
    <div class="state-wrap">
      <span class="spinner spin-md"></span>
      <p>Loading FBA opportunities…</p>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

var API_URL = 'https://script.google.com/macros/s/AKfycby-t4NbfPTv39Rv4KxfYpnx9YInPazJbzw_4PYaFlevCydoFHPeQJ-BuEHpdPYgnkDTDw/exec';

var allData = [];
var activeTab = 'overview';
var _openId = '';
var _viewMode = 'grid'; // 'grid' or 'list'
var _filteredIds = []; // for prev/next nav
var _delConfirm = false;
var _statusFilter = '';
var _saveTimer = null;

/* ════════════════ PROGRESS BAR ════════════════ */
var _pv=0,_pt=null;
function pStart(){var b=document.getElementById('pbar');clearInterval(_pt);_pv=0.1;b.style.transform='scaleX(0.1)';b.classList.add('active');_pt=setInterval(function(){_pv=Math.min(_pv+(1-_pv)*0.07,0.92);b.style.transform='scaleX('+_pv+')';},250);}
function pDone(){clearInterval(_pt);var b=document.getElementById('pbar');b.style.transform='scaleX(1)';setTimeout(function(){b.classList.remove('active');b.style.transform='scaleX(0)';},380);}

/* ════════════════ HELPERS ════════════════ */
function esc(s){return String(s!=null?s:'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toBool(v){return v===true||v==='true'||v==='Yes'||v==='yes'||v===1||v==='TRUE';}
function toBoolLabel(v){return toBool(v)?'Yes':'No';}
function fmt(v){var n=parseFloat(v);return isNaN(n)?'—':'£'+n.toFixed(2);}
function fmtNum(v){var n=parseFloat(v);return isNaN(n)?'—':String(Math.round(n));}
function fmtDate(v){if(!v)return '—';try{var d=new Date(v);return isNaN(d)?String(v):d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return String(v);}}

/* ════════════════ STATUS CALCULATION ════════════════ */
function calculateStatus(row) {
  var dg = String(row['DG']||'').trim().toLowerCase();
  var profit = parseFloat(row['Profit (DG)']);
  var standardPack = String(row['Standard Pack Size']||'').trim().toLowerCase();
  var underOneKg = String(row['<=1kg per sale']||'').trim().toLowerCase();
  var competition = parseInt(row['Competition']);
  var asinSales = parseFloat(row['ASIN Sales']);

  // If any key field is missing/empty, status is pending
  if (!dg || isNaN(profit) || !standardPack || !underOneKg || isNaN(competition) || isNaN(asinSales)) {
    return 'pending';
  }

  var profitOk = false;
  if (dg === 'yes' && profit >= 45) profitOk = true;
  if (dg === 'no' && profit >= 35) profitOk = true;

  var packOk = standardPack === 'yes';
  var kgOk = underOneKg === 'yes';

  var compOk = false;
  if ((competition === 1 || competition === 2) && asinSales >= 75) compOk = true;
  if (competition === 0 && asinSales >= 10) compOk = true;

  return (profitOk && packOk && kgOk && compOk) ? 'approved' : 'rejected';
}

function getRowStatus(row) {
  var s = String(row['Status']||'').trim().toLowerCase();
  if (s === 'approved') return 'approved';
  if (s === 'rejected') return 'rejected';
  return calculateStatus(row);
}

/* ════════════════ API ════════════════ */
async function api(body){
  var r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return r.json();
}

/* ════════════════ LOAD ════════════════ */
async function loadData(){
  pStart();
  try{
    var r=await api({action:'getFbaOpportunities'});
    if(r&&r.success){
      allData=r.data||[];
      renderView();
      updateChips();
      toast('Loaded '+allData.length+' opportunities','success');
    }else{
      showEmpty('Failed to load','Check your API connection');
      toast('Failed to load data','error');
    }
  }catch(e){
    showEmpty('Network error','Could not reach the API');
    toast('Network error','error');
  }finally{pDone();}
}

async function refreshData(){
  var ic=document.getElementById('refreshIcon');var btn=document.getElementById('refreshBtn');
  btn.disabled=true;ic.style.animation='spin .7s linear infinite';
  await loadData();
  ic.style.animation='';btn.disabled=false;
}

/* ════════════════ VIEW TOGGLE ════════════════ */
function setView(mode){
  _viewMode=mode;
  document.getElementById('viewGrid').classList.toggle('active',mode==='grid');
  document.getElementById('viewList').classList.toggle('active',mode==='list');
  renderView();
}


function filterByStatus(status){
  _statusFilter = (_statusFilter === status && status !== '') ? '' : status;
  updateChipActiveState();
  renderView();
}

function updateChipActiveState(){
  ['chipTotal','chipApproved','chipRejected'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.classList.remove('chip-active');
  });
  if(_statusFilter===''){
    // no filter — highlight Total chip only when explicitly showing all
  } else {
    var activeChip=_statusFilter==='approved'?'chipApproved':'chipRejected';
    var el=document.getElementById(activeChip);
    if(el)el.classList.add('chip-active');
  }
}
  

/* ════════════════ CHIPS ════════════════ */
function updateChips(){
  var total=allData.length;
  var approved=allData.filter(function(r){return getRowStatus(r)==='approved';}).length;
  var rejected=allData.filter(function(r){return getRowStatus(r)==='rejected';}).length;
  setChip('chipTotal',total+' FBA Products');
  setChip('chipApproved',approved+' Approved');
  setChip('chipRejected',rejected+' Rejected');
  updateChipActiveState();
}
  
function setChip(id,txt){
  var el=document.getElementById(id);if(!el)return;
  var svg=el.querySelector('svg');
  el.innerHTML=(svg?svg.outerHTML:'')+'<span>'+esc(txt)+'</span>';
}

/* ════════════════ FILTER ════════════════ */
function getFiltered(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  return allData.filter(function(r){
    if(q){
      var s=(String(r['Listing Name']||'')+' '+String(r['ASINs']||'')+' '+String(r['Supplier Name']||'')).toLowerCase();
      if(!s.includes(q))return false;
    }
    if(_statusFilter){
      var st=getRowStatus(r);
      if(_statusFilter!==st)return false;
    }
    return true;
  });
}

/* ════════════════ RENDER ════════════════ */
function renderView(){
  var data=getFiltered();
  _filteredIds=data.map(function(r){return String(r['Opportunity ID']||'');});
  var area=document.getElementById('fbaContent');
  var fc=document.getElementById('filterCount');
  if(fc)fc.textContent=data.length!==allData.length?data.length+' of '+allData.length:'';
  if(!data.length&&!allData.length){return;}
  if(!data.length){showEmpty('No results','Try adjusting your search or filters');return;}
  area.className='fba-content';area.innerHTML='';
  var outer=document.createElement('div');outer.className='grid-outer';

  if(_viewMode==='grid'){
    var grid=document.createElement('div');grid.className='fba-grid';
    data.forEach(function(r,i){
      var card=buildCard(r);
      card.style.animationDelay=(i*0.02)+'s';
      grid.appendChild(card);
    });
    outer.appendChild(grid);
  } else {
    var list=document.createElement('div');list.className='fba-list';
    data.forEach(function(r,i){
      var item=buildListItem(r);
      item.style.animationDelay=(i*0.015)+'s';
      list.appendChild(item);
    });
    outer.appendChild(list);
  }

  area.appendChild(outer);
}

function getStatusBadgeClass(row){
  var s=getRowStatus(row);
  if(s==='approved')return 'approved';
  if(s==='rejected')return 'rejected';
  return 'pending';
}
function getStatusBadgeText(row){
  var s=getRowStatus(row);
  if(s==='approved')return 'Approved';
  if(s==='rejected')return 'Rejected';
  return 'Pending';
}

function buildCard(r){
  var card=document.createElement('div');
  var dg=toBool(r['DG']);
  var status=getRowStatus(r);
  var badgeClass=getStatusBadgeClass(r);
  var badgeText=getStatusBadgeText(r);
  card.className='fba-card '+status;
  var dateStr=fmtDate(r['Date']);
  var html='';
  html+='<div class="fba-card-top">';
  html+='<div class="fba-card-name">'+esc(r['Listing Name']||'—')+'</div>';
  html+='<span class="fba-status-badge '+badgeClass+'">'+esc(badgeText)+'</span>';
  html+='</div>';
  html+='<div class="fba-card-meta">';
  html+='<span class="fba-card-asin">'+esc(r['ASINs']||'')+'</span>';
  if(r['ASINs']&&dateStr!=='—')html+='<span class="fba-card-sep"></span>';
  if(dateStr!=='—')html+='<span class="fba-card-date">'+esc(dateStr)+'</span>';
  html+='</div>';
  html+='<div class="fba-card-stats">';
  html+='<div class="fba-stat"><div class="fba-stat-label">QTY</div><div class="fba-stat-val">'+esc(String(r['QTY Purchased']||'—'))+'</div></div>';
  html+='<div class="fba-stat"><div class="fba-stat-label">Sales</div><div class="fba-stat-val">'+esc(fmtNum(r['Sales']))+'</div></div>';
  html+='<div class="fba-stat"><div class="fba-stat-label">FBA Fees</div><div class="fba-stat-val">'+esc(fmt(r['FBA Fees']))+'</div></div>';
  html+='</div>';
  html+='<div class="fba-card-flags">';
  if(r['DG']!==undefined&&r['DG']!=='')html+='<span class="fba-flag '+(dg?'yes':'no')+'">DG: '+esc(toBoolLabel(r['DG']))+'</span>';
  if(r['Competition']!==undefined&&r['Competition']!=='')html+='<span class="fba-flag na">Competition: '+esc(String(r['Competition']))+'</span>';
  html+='</div>';
  card.innerHTML=html;
  card.addEventListener('click',function(){openDrawer(String(r['Opportunity ID']||''));});
  return card;
}

function buildListItem(r){
  var item=document.createElement('div');
  var dg=toBool(r['DG']);
  var status=getRowStatus(r);
  var badgeClass=getStatusBadgeClass(r);
  var badgeText=getStatusBadgeText(r);
  item.className='fba-list-item '+status;
  var dateStr=fmtDate(r['Date']);
  item.innerHTML=
    '<div class="fba-list-name">'+esc(r['Listing Name']||'—')+'</div>'
    +'<div class="fba-list-asin">'+esc(r['ASINs']||'—')+'</div>'
    +'<div class="fba-list-date">'+esc(dateStr)+'</div>'
    +'<div class="fba-list-stat"><div class="fba-list-stat-lbl">QTY</div><div class="fba-list-stat-val">'+esc(String(r['QTY Purchased']||'—'))+'</div></div>'
    +'<div class="fba-list-stat"><div class="fba-list-stat-lbl">Sales</div><div class="fba-list-stat-val">'+esc(fmtNum(r['Sales']))+'</div></div>'
    +'<div class="fba-list-badges">'
    +'<span class="fba-status-badge '+badgeClass+'">'+esc(badgeText)+'</span>'
    +(r['DG']!==undefined&&r['DG']!==''?'<span class="fba-flag '+(dg?'yes':'no')+'">DG: '+esc(toBoolLabel(r['DG']))+'</span>':'')
    +'</div>';
  item.addEventListener('click',function(){openDrawer(String(r['Opportunity ID']||''));});
  return item;
}

function showEmpty(title,sub){
  document.getElementById('fbaContent').innerHTML='<div class="state-wrap"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><p>'+esc(title)+'</p><span>'+esc(sub)+'</span></div>';
}

/* ════════════════ DRAWER ════════════════ */
function openDrawer(id){
  var row=allData.find(function(r){return String(r['Opportunity ID']||'')===id;});
  if(!row)return;
  _openId=id;activeTab='overview';_delConfirm=false;
  renderDrawer(row);
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('detailDrawer').classList.add('open');
  // Silently refresh this row's data from the sheet in the background
  refreshOpenRow(id);
}

async function refreshOpenRow(id){
  try{
    var r=await api({action:'getFbaOpportunities'});
    if(r&&r.success&&r.data){
      var fresh=r.data.find(function(r){return String(r['Opportunity ID']||'')===id;});
      if(fresh&&_openId===id){
        // Merge fresh data into allData
        var idx=allData.findIndex(function(r){return String(r['Opportunity ID']||'')===id;});
        if(idx!==-1)allData[idx]=fresh;
        // Re-render drawer silently only if no pending save
        if(!_saveTimer)renderDrawer(fresh);
      }
    }
  }catch(e){/* silent fail — user still sees cached data */}
}

function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('detailDrawer').classList.remove('open');
  _openId='';_delConfirm=false;
}

function switchTab(t){
  activeTab=t;
  var row=allData.find(function(r){return String(r['Opportunity ID']||'')===_openId;});
  if(row)renderDrawer(row);
}

function navDrawer(dir){
  var idx=_filteredIds.indexOf(_openId);
  if(idx===-1)return;
  var next=idx+dir;
  if(next<0||next>=_filteredIds.length)return;
  openDrawer(_filteredIds[next]);
}

function renderDrawer(row){
  var id=String(row['Opportunity ID']||'');
  var name=String(row['Listing Name']||'—');
  var dateStr=fmtDate(row['Date']);
  var qty=String(row['QTY Purchased']||'—');
  var unitCost=fmt(row['Unit Cost']);
  var fbaFees=fmt(row['FBA Fees']);
  var status=getRowStatus(row);
  var idx=_filteredIds.indexOf(id);
  var total=_filteredIds.length;

  // HERO
  var badgeClass=status==='approved'?'approved':status==='rejected'?'rejected':'pending';
  var badgeLabel=status==='approved'?'Approved':status==='rejected'?'Rejected':'FBA Opportunity';
  var badgeIcon=status==='approved'
    ?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    :status==='rejected'
    ?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    :'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';

document.getElementById('drawerHero').innerHTML=
    '<div class="drawer-hero">'
    +'<div class="drw-topbar">'

/* ════════════════ RECOMMENDATIONS LOGIC ════════════════ */
function show(id){
  var el=document.getElementById(id);
  if(el&&!el.classList.contains('visible'))el.classList.add('visible');
}
function hide(id){
  var el=document.getElementById(id);
  if(el&&el.classList.contains('visible'))el.classList.remove('visible');
}
function showResult(status){
  var wrap=document.getElementById('rec-status-result');
  var inner=document.getElementById('rec-status-inner');
  var icon=document.getElementById('rec-status-icon');
  var lbl=document.getElementById('rec-status-label');
  var val=document.getElementById('rec-status-val');
  var sub=document.getElementById('rec-status-sub');
  if(!wrap)return;
  inner.className='status-result-inner '+(status==='approved'?'approved':'rejected');
  icon.innerHTML=status==='approved'
    ?'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0c7a42" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    :'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b91c1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  lbl.textContent='Decision';
  val.textContent=status==='approved'?'✓ Approved':'✗ Rejected';
  sub.textContent=status==='approved'?'All conditions met — ready for FBA.':'This is not a good opportunity.';
  wrap.classList.add('visible');
}

function updateSelectColour(el){
  el.classList.remove('val-yes','val-no','val-empty');
  if(el.value==='Yes')el.classList.add('val-yes');
  else if(el.value==='No')el.classList.add('val-no');
  else el.classList.add('val-empty');
}

function getRecValues(){
  return {
    parcelWeight: parseFloat(document.getElementById('rec-parcel-weight-val')&&document.getElementById('rec-parcel-weight-val').value) || null,
    standardPack: (document.getElementById('rec-standard-pack-val')&&document.getElementById('rec-standard-pack-val').value) || '',
    underOneKg: (document.getElementById('rec-under-1kg-val')&&document.getElementById('rec-under-1kg-val').value) || '',
    asinSales: parseFloat(document.getElementById('rec-asin-sales-val')&&document.getElementById('rec-asin-sales-val').value) || null,
    profitDg: parseFloat(document.getElementById('rec-profit-dg-val')&&document.getElementById('rec-profit-dg-val').value) || null
  };
}

function onRecChange(){
  ['rec-standard-pack-val','rec-under-1kg-val'].forEach(function(id){
    var el=document.getElementById(id);if(el)updateSelectColour(el);
  });
  saveRecFields();
  var row=allData.find(function(r){return String(r['Opportunity ID']||'')===_openId;});
  if(!row)return;
  evaluateRec(row);
}

function evaluateRec(row){
  // Read current DG from fba form if available
  var dgEl=document.getElementById('fba-dg');
  var dgVal=dgEl?dgEl.value:String(row['DG']||'');

  var v=getRecValues();

  // Always show parcel weight
  show('rec-parcel-weight');

  // Step 1: parcel weight filled → show standard pack size
  if(v.parcelWeight!==null && !isNaN(v.parcelWeight)){
    show('rec-standard-pack');
  } else {
    hide('rec-standard-pack');
    hide('rec-under-1kg');
    hide('rec-asin-sales');
    hide('rec-profit-dg');
    hide('rec-status-result');
    return;
  }

  // Standard pack size filled
  if(!v.standardPack){
    hide('rec-under-1kg');hide('rec-asin-sales');hide('rec-profit-dg');hide('rec-status-result');return;
  }
  if(v.standardPack==='No'){
    hide('rec-under-1kg');hide('rec-asin-sales');hide('rec-profit-dg');
    showResult('rejected');return;
  }

  // show under 1kg
  show('rec-under-1kg');
  if(!v.underOneKg){hide('rec-asin-sales');hide('rec-profit-dg');hide('rec-status-result');return;}
  if(v.underOneKg==='No'){
    hide('rec-asin-sales');hide('rec-profit-dg');
    showResult('rejected');return;
  }

  // show ASIN sales
  show('rec-asin-sales');
  if(v.asinSales===null){hide('rec-profit-dg');hide('rec-status-result');return;}

  // check competition condition
  var comp=parseInt(row['Competition'])||0;
  var compOk=false;
  if((comp===1||comp===2)&&v.asinSales>=75)compOk=true;
  if(comp===0&&v.asinSales>=10)compOk=true;
  if(!compOk){
    hide('rec-profit-dg');
    showResult('rejected');return;
  }

  // show profit DG
  show('rec-profit-dg');
  if(v.profitDg===null){hide('rec-status-result');return;}

  // check profit condition
  var dg=String(dgVal||'').trim().toLowerCase();
  var profitOk=false;
  if(dg==='yes'&&v.profitDg>=45)profitOk=true;
  if(dg==='no'&&v.profitDg>=35)profitOk=true;

  showResult(profitOk?'approved':'rejected');
}

function evaluateRecFromRow(row){
  evaluateRec(row);
}

function saveRecFields(){
  var row=allData.find(function(r){return String(r['Opportunity ID']||'')===_openId;});
  if(!row)return;

  // Collect only the fields currently visible/editable
  var changes={};
  var fields=[
    {el:'rec-parcel-weight-val', key:'Parcel Weight'},
    {el:'rec-standard-pack-val', key:'Standard Pack Size'},
    {el:'rec-under-1kg-val',     key:'<=1kg per sale'},
    {el:'rec-asin-sales-val',    key:'ASIN Sales'},
    {el:'rec-profit-dg-val',     key:'Profit (DG)'},
    {el:'fba-profitable',        key:'Profitable'},
    {el:'fba-fees',              key:'FBA Fees'},
    {el:'fba-dg',                key:'DG'}
  ];
  fields.forEach(function(f){
    var el=document.getElementById(f.el);
    if(el){
      changes[f.key]=el.value;
      row[f.key]=el.value; // update in-memory immediately
    }
  });

  updateChips();

  // Debounce sheet save
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    persistRow(row['Opportunity ID'], changes);
  }, 1200);
}

  
async function persistRow(opportunityId, changes){
  var ind=document.getElementById('save-indicator');
  if(ind){ind.textContent='Saving…';ind.style.color='var(--text4)';}
  // Always include the ID so Apps Script can find the row
  changes['Opportunity ID']=opportunityId;
  try{
    var r=await api({action:'saveRow', data: changes});
    if(r&&r.success){
      if(ind){ind.textContent='Saved ✓';ind.style.color='var(--green)';}
      setTimeout(function(){if(ind)ind.textContent='';},2500);
    } else {
      if(ind){ind.textContent='Save failed';ind.style.color='var(--red)';}
      toast('Save failed: '+(r&&r.message?r.message:'unknown error'),'error');
    }
  }catch(e){
    if(ind){ind.textContent='Save failed';ind.style.color='var(--red)';}
    toast('Network error while saving','error');
  }
}

  return '<div class="info-card"><label>'+(iconSvg||'')+esc(label)+'</label>'
    +'<div class="select-wrap">'
    +'<select id="'+fieldId+'" class="'+cls+'" onchange="this.className=\'val-\'+(this.value===\'Yes\'?\'yes\':this.value===\'No\'?\'no\':\'empty\'); onRecChange();">'
    +'<option value="">Select…</option>'
    +'<option value="Yes"'+(toBool(cur)?' selected':'')+'>Yes</option>'
    +'<option value="No"'+(cur&&!toBool(cur)?' selected':'')+'>No</option>'
    +'</select>'
    +'<svg class="sel-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>'
    +'</div>'
    +'</div>';
}

function inputAmountCard(fieldId, label, currentVal, iconSvg){
  var cur=parseFloat(currentVal);
  return '<div class="info-card"><label>'+(iconSvg||'')+esc(label)+'</label>'
    +'<div class="pound-wrap">'
    +'<span>£</span>'
    +'<input type="number" id="'+fieldId+'" step="0.01" min="0" placeholder="0.00"'+(isNaN(cur)?'':' value="'+cur.toFixed(2)+'"')+' oninput="onRecChange()">'
    +'</div>'
    +'</div>';
}

/* ════════════════ TOAST ════════════════ */
function toast(msg,type){
  var c=document.getElementById('toasts');
  var t=document.createElement('div');t.className='toast '+(type||'');
  var icons={
    success:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  t.innerHTML=(icons[type]||'')+esc(msg);c.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove();},3200);
}

/* ════════════════ KEYBOARD ════════════════ */
document.addEventListener('keydown',function(e){
  if(document.getElementById('detailDrawer').classList.contains('open')){
    if(e.key==='Escape')closeDrawer();
    if(e.key==='ArrowLeft')navDrawer(-1);
    if(e.key==='ArrowRight')navDrawer(1);
  }
});

/* ════════════════ GLOBALS ════════════════ */
window.closeDrawer=closeDrawer;
window.switchTab=switchTab;
window.refreshData=refreshData;
window.renderView=renderView;
window.setView=setView;
window.navDrawer=navDrawer;
window.onRecChange=onRecChange;
window.filterByStatus=filterByStatus;
window.updateChipActiveState=updateChipActiveState;
window.startDelete=startDelete;
window.cancelDelete=cancelDelete;
window.confirmDelete=confirmDelete;
window.refreshOpenRow=refreshOpenRow;

  
/* ════════════════ INIT ════════════════ */
loadData();

})();
</script>
