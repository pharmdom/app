
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c1526;
  --navy2:#141d2e;
  --navy3:#1e2d42;
  --surface:#ffffff;
  --surface2:#f7f9fc;
  --surface3:#f0f4fa;
  --border:#e3eaf5;
  --border2:#edf1f9;
  --text:#0c1526;
  --text2:#2d3f5c;
  --text3:#5a6f8c;
  --text4:#96a8c0;
  --accent:#1847d4;
  --accent2:#2a5eed;
  --accent-bg:#eef2fd;
  --accent-bd:#c4d3f9;
  --green:#0b7a42;
  --green-bg:#eafaf1;
  --green-bd:#6ee7a8;
  --red:#c0192c;
  --red-bg:#fef1f2;
  --red-bd:#fca5a5;
  --amber:#b45309;
  --amber-bg:#fffbeb;
  --amber-bd:#fde68a;
  --r:10px;--r-sm:7px;--r-lg:14px;--r-xl:20px;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --sh-xs:0 1px 3px rgba(12,21,38,.06);
  --sh-sm:0 2px 8px rgba(12,21,38,.08),0 1px 3px rgba(12,21,38,.04);
  --sh:0 6px 24px rgba(12,21,38,.1),0 2px 8px rgba(12,21,38,.05);
  --sh-lg:0 20px 56px rgba(12,21,38,.15),0 6px 18px rgba(12,21,38,.08);
  --left-w:310px;
  --T:.22s cubic-bezier(.4,0,.2,1);
}
html,body{
  font-family:var(--font);font-size:14px;color:var(--text);
  background:var(--surface3);-webkit-font-smoothing:antialiased;
  height:100%;overflow:hidden;
}

/* ══ ROOT ══ */
.sc-root{
  display:flex;height:100vh;max-height:100vh;overflow:hidden;
  background:var(--surface3);position:relative;
}
#tdcontent .sc-root,.td-content .sc-root{height:100%;max-height:100%;}

/* ══ LEFT PANEL ══ */
.sc-left{
  width:var(--left-w);min-width:var(--left-w);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--navy);overflow:hidden;position:relative;
}
.sc-left::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 10% 0%,rgba(24,71,212,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 90% 100%,rgba(24,71,212,.10) 0%,transparent 55%);
}
.sc-left-inner{display:flex;flex-direction:column;height:100%;position:relative;z-index:1;min-height:0;}

/* Supplier picker */
.sc-left-top{padding:12px 14px 8px;flex-shrink:0;}
.sc-sup-filter{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r);padding:9px 12px;cursor:pointer;
  transition:background var(--T);position:relative;
}
.sc-sup-filter:hover{background:rgba(255,255,255,.11)}
.sc-sup-filter-icon{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sc-sup-filter-icon svg{width:13px;height:13px;color:rgba(255,255,255,.7)}
.sc-sup-filter-text{flex:1;min-width:0}
.sc-sup-filter-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.35);margin-bottom:1px;}
.sc-sup-filter-value{font-size:12px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sc-sup-filter-caret{width:14px;height:14px;color:rgba(255,255,255,.3);flex-shrink:0;transition:transform .2s;}
.sc-sup-filter.open .sc-sup-filter-caret{transform:rotate(180deg)}

/* Dropdown */
.sc-sup-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--navy2);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r-lg);box-shadow:var(--sh-lg);
  z-index:300;overflow:hidden;
  opacity:0;pointer-events:none;transform:translateY(-6px);
  transition:opacity .18s,transform .18s;
  max-height:260px;display:flex;flex-direction:column;
}
.sc-sup-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0)}
.sc-sup-dd-search{padding:9px 10px 5px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.sc-sup-dd-search input{
  width:100%;padding:5px 9px;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);
  font-size:12px;font-family:var(--font);color:#fff;outline:none;
  transition:border-color .15s;
}
.sc-sup-dd-search input::placeholder{color:rgba(255,255,255,.28)}
.sc-sup-dd-search input:focus{border-color:rgba(99,130,249,.6)}
.sc-sup-dd-list{overflow-y:auto;flex:1;padding:5px;}
.sc-sup-dd-list::-webkit-scrollbar{width:3px}
.sc-sup-dd-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.sc-sup-opt{
  display:flex;align-items:center;gap:8px;padding:7px 9px;
  border-radius:var(--r-sm);cursor:pointer;transition:background .12s;
}
.sc-sup-opt:hover{background:rgba(255,255,255,.07)}
.sc-sup-opt.active{background:rgba(24,71,212,.35);border:1px solid rgba(99,130,249,.25)}
.sc-sup-opt-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.sc-sup-opt-name{font-size:12px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sc-sup-opt-meta{font-size:10px;color:rgba(255,255,255,.35)}

/* Supplier card scroll area */
.sc-sup-card{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:10px 14px 14px;min-height:0;
}
.sc-sup-card::-webkit-scrollbar{width:3px}
.sc-sup-card::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* Hero */
.sc-sup-hero{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  animation:fadeUp .28s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.sc-sup-av-lg{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.sc-sup-hero-name{font-size:14px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sc-sup-hero-id{font-size:10px;color:rgba(255,255,255,.3);font-family:var(--mono)}

/* Edit button */
.sc-edit-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:var(--r-sm);
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);
  color:rgba(255,255,255,.7);font-size:11px;font-weight:700;
  font-family:var(--font);cursor:pointer;transition:all .15s;margin-top:5px;
}
.sc-edit-btn svg{width:11px;height:11px;flex-shrink:0}
.sc-edit-btn:hover{background:rgba(255,255,255,.15);color:#fff}

/* KPI grid */
.sc-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;animation:fadeUp .28s .04s ease both;}
.sc-kpi{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:9px 11px;transition:background .15s;}
.sc-kpi:hover{background:rgba(255,255,255,.09)}
.sc-kpi-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.3);margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.sc-kpi-label svg{width:9px;height:9px;flex-shrink:0}
.sc-kpi-val{font-size:13px;font-weight:700;color:#fff;line-height:1}
.sc-kpi-val.sm{font-size:11px}

/* Detail rows */
.sc-det-sec{margin-bottom:12px;animation:fadeUp .28s .08s ease both;}
.sc-det-head{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.22);margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.sc-det-head::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.sc-det-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.sc-det-row:last-child{border-bottom:none}
.sc-det-key{font-size:11px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:5px;flex-shrink:0;}
.sc-det-key svg{width:10px;height:10px;flex-shrink:0;opacity:.6}
.sc-det-val{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.8);text-align:right;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:155px;}

/* Badges */
.sc-b{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:700;}
.sc-b.green{background:rgba(16,185,129,.18);color:#34d399;border:1px solid rgba(16,185,129,.22)}
.sc-b.red{background:rgba(239,68,68,.13);color:#f87171;border:1px solid rgba(239,68,68,.18)}
.sc-b.blue{background:rgba(99,130,249,.18);color:#8fa8ff;border:1px solid rgba(99,130,249,.22)}
.sc-days{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:700;}
.sc-days.recent{background:rgba(16,185,129,.18);color:#34d399}
.sc-days.warn{background:rgba(251,191,36,.13);color:#fbbf24}
.sc-days.overdue{background:rgba(239,68,68,.13);color:#f87171}

/* Notes in panel */
.sc-notes-sec{margin-top:12px;animation:fadeUp .28s .12s ease both;}
.sc-note-pill{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:9px 11px;margin-bottom:6px;}
.sc-note-meta{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.sc-note-av{width:18px;height:18px;border-radius:50%;background:rgba(99,130,249,.25);color:#8fa8ff;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;flex-shrink:0;}
.sc-note-author{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.55)}
.sc-note-date{font-size:9.5px;color:rgba(255,255,255,.22);margin-left:auto}
.sc-note-text{font-size:11px;color:rgba(255,255,255,.45);line-height:1.5}

/* Empty */
.sc-left-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 18px;gap:9px;text-align:center;}
.sc-left-empty svg{opacity:.18}
.sc-left-empty p{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.3)}
.sc-left-empty span{font-size:11px;color:rgba(255,255,255,.2)}

/* ══ DIVIDER ══ */
.sc-divider{width:1px;background:var(--border);flex-shrink:0;}

/* ══ RIGHT PANEL ══ */
.sc-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--surface3);}
.sc-right-top{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
.sc-right-title{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.sc-right-title-icon{width:30px;height:30px;border-radius:8px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sc-right-title-icon svg{width:14px;height:14px;color:var(--accent)}
.sc-right-title-text{font-size:13px;font-weight:800;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sc-cat-count{font-size:11px;font-weight:700;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd);padding:2px 8px;border-radius:100px;flex-shrink:0;display:none;}

/* Refresh btn */
.sc-refresh-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:var(--r-sm);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:12px;font-weight:600;
  font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;
  flex-shrink:0;
}
.sc-refresh-btn svg{width:12px;height:12px;flex-shrink:0}
.sc-refresh-btn:hover{background:var(--border);color:var(--text)}
.sc-refresh-btn:disabled{opacity:.5;cursor:default}

/* Toolbar */
.sc-cat-toolbar{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
.sc-search-wrap{position:relative;flex:1;min-width:130px;max-width:260px}
.sc-search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--text4);pointer-events:none;}
.sc-search-input{width:100%;padding:6px 9px 6px 28px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none;transition:all .15s;}
.sc-search-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(24,71,212,.07)}
.sc-cat-filter-wrap{position:relative;display:inline-flex;align-items:center}
.sc-cat-filter-wrap svg.arr{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:10px;height:10px;color:var(--text4);pointer-events:none;}
.sc-cat-select{padding:6px 24px 6px 9px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:var(--font);background:var(--surface2);color:var(--text2);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:border-color .15s;max-width:140px;}
.sc-cat-select:focus{border-color:var(--accent)}
.sc-view-btns{display:flex;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--surface2);}
.sc-vbtn{display:flex;align-items:center;justify-content:center;width:29px;height:27px;border:none;background:transparent;cursor:pointer;color:var(--text4);transition:all .15s;}
.sc-vbtn+.sc-vbtn{border-left:1px solid var(--border)}
.sc-vbtn:hover{color:var(--text2);background:var(--surface)}
.sc-vbtn.active{color:var(--accent);background:var(--accent-bg)}
.sc-vbtn svg{width:12px;height:12px}

/* Catalog content */
.sc-cat-content{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;}

/* Table */
.sc-tbl-outer{flex:1;overflow:auto;min-height:0;}
.sc-tbl-outer::-webkit-scrollbar{width:4px;height:4px}
.sc-tbl-outer::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sc-cat-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:680px;}
.sc-cat-table thead{position:sticky;top:0;z-index:2}
.sc-cat-table th{background:var(--surface);padding:8px 13px;text-align:left;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.55px;color:var(--text4);border-bottom:2px solid var(--border);white-space:nowrap;}
.sc-cat-table td{padding:8px 13px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:middle;}
.sc-cat-table tbody tr{cursor:pointer;transition:background .1s;animation:rowIn .2s ease both;}
@keyframes rowIn{from{opacity:0;transform:translateX(-3px)}to{opacity:1;transform:translateX(0)}}
.sc-cat-table tbody tr:hover td{background:var(--accent-bg)}
.sc-cat-table tbody tr:last-child td{border-bottom:none}
.cat-thumb{width:32px;height:32px;border-radius:7px;object-fit:cover;border:1px solid var(--border);display:block;}
.cat-thumb-ph{width:32px;height:32px;border-radius:7px;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--text4);}
.ean-link{font-family:var(--mono);font-size:10.5px;color:var(--text3);text-decoration:none;transition:color .12s;}
.ean-link:hover{color:var(--accent);text-decoration:underline}
.cat-cost{display:inline-flex;font-size:11.5px;font-weight:800;color:var(--green);background:var(--green-bg);border:1px solid var(--green-bd);padding:2px 8px;border-radius:100px;}
.cat-cost.empty{background:transparent;border-color:transparent;color:var(--text4);font-weight:500;font-size:11px;}
.cat-badge{display:inline-flex;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:700;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd);}

/* Grid */
.sc-cat-grid-outer{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px;min-height:0;}
.sc-cat-grid-outer::-webkit-scrollbar{width:4px}
.sc-cat-grid-outer::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sc-cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px;}
.sc-cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .12s;animation:fadeUp .2s ease both;}
.sc-cat-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);transform:translateY(-1px)}
.sc-cat-card-img{height:74px;background:var(--surface3);overflow:hidden;position:relative;}
.sc-cat-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .22s;}
.sc-cat-card:hover .sc-cat-card-img img{transform:scale(1.05)}
.sc-cat-card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text4);}
.sc-cat-card-body{padding:9px 11px}
.sc-cat-card-name{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;}
.sc-cat-card-ean{font-family:var(--mono);font-size:9.5px;color:var(--text4);margin-bottom:6px;}
.sc-cat-card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border2);}

/* Product drawer */
.sc-prod-overlay{position:fixed;inset:0;background:rgba(12,21,38,.35);z-index:800;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px);}
.sc-prod-overlay.open{opacity:1;pointer-events:all}
.sc-prod-drawer{position:fixed;top:0;right:0;width:460px;max-width:96vw;height:100vh;background:var(--surface);box-shadow:-12px 0 50px rgba(12,21,38,.15);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.sc-prod-drawer.open{transform:translateX(0)}
.sc-prod-hero{padding:14px 18px 12px;background:linear-gradient(140deg,var(--navy2) 0%,#0d1631 100%);position:relative;overflow:hidden;flex-shrink:0;}
.sc-prod-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.03);pointer-events:none;}
.sc-prod-close{position:absolute;top:11px;right:11px;width:27px;height:27px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:all .15s;z-index:2;}
.sc-prod-close:hover{background:rgba(255,255,255,.2);color:#fff}
.sc-prod-close svg{width:12px;height:12px}
.sc-prod-img-thumb{position:absolute;top:13px;right:48px;width:50px;height:50px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.14);background:#1e2a42;z-index:2;cursor:zoom-in;}
.sc-prod-img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.sc-prod-sup{font-size:10px;color:rgba(255,255,255,.38);margin-bottom:2px;position:relative;z-index:1;}
.sc-prod-name{font-size:14px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:2px;padding-right:62px;position:relative;z-index:1;}
.sc-prod-ean{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.32);margin-bottom:11px;position:relative;z-index:1;}
.sc-prod-ean a{color:rgba(255,255,255,.38);text-decoration:none}
.sc-prod-ean a:hover{color:rgba(255,255,255,.7)}
.sc-prod-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;position:relative;z-index:1;}
.sc-prod-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:7px 9px;}
.sc-prod-kpi-lbl{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.32);margin-bottom:2px}
.sc-prod-kpi-val{font-size:13px;font-weight:800;color:#fff}
.sc-prod-body{flex:1;overflow-y:auto;padding:14px 18px;min-height:0;}
.sc-prod-body::-webkit-scrollbar{width:4px}
.sc-prod-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

        <p>Select a supplier</p><span>Catalog will appear here</span>

</div>

<script>
(function(){
'use strict';

const API_URL = 'https://script.google.com/macros/s/AKfycbyUakRDM0bBv2QzdA_WO-xzvmQ9B6kWu-wPc0yRuKE2dZjG8-UID3bI1ZEYaSoFMjhC0A/exec';

/* ── STATE ── */
let allSuppliers = [];
let allCatalog    = []; // full catalog loaded once at init
let catalogData  = [];
let currentSupId = null;
let currentView  = 'table';
let ddOpen       = false;
let editingSupId = null;
let _tn          = 0;

/* ════════════════════════
   INTELLIGENT SUPPLIER MATCHING
   Handles: exact, abbreviation expansion (CVT=Clear Value Trading),
   partial/substring, word token overlap, initials detection.
════════════════════════ */
const ABBREV_MAP = {
  'cvt':        'clear value trading',
  'wholesave':  'wholesale trading supplies',
  'wholesale':  'wholesale trading supplies',
  'intamarque': 'intamarque',
  'palmolive':  'palmolive',
  'nivea':      'nivea',
  'nivea sun':  'nivea sun',
};
function normSup(s){
  return (s||'')
    .toLowerCase()
    .replace(/\bltd\.?\b|\bplc\.?\b|\binc\.?\b|\bco\.?\b|\bcorp\.?\b|\bgroup\b|\buk\b|\btrading\b|\bsupplies\b|\bsupply\b/g,' ')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function expandAbbrev(s){
  const lower=s.toLowerCase().trim();
  return ABBREV_MAP[lower]||s;
}
function supplierNamesMatch(supName,rowSupName){
  if(!supName||!rowSupName)return false;
  const aRaw=supName.toLowerCase().trim();
  const bRaw=rowSupName.toLowerCase().trim();
  if(aRaw===bRaw)return true;
  const aExp=expandAbbrev(aRaw);
  const bExp=expandAbbrev(bRaw);
  if(aExp===bExp)return true;
  const a=normSup(aExp);
  const b=normSup(bExp);
  if(!a||!b)return false;
  if(a===b)return true;
  if(a.includes(b)||b.includes(a))return true;
  const wa=a.split(' ').filter(w=>w.length>2);
  const wb=b.split(' ').filter(w=>w.length>2);
  if(wa.length&&wb.length){
    const setA=new Set(wa);
    for(const w of wb){if(setA.has(w))return true;}
  }
  if(/^[A-Z]{2,5}$/.test(supName.trim())){
    const rowWords=rowSupName.trim().split(/\s+/).filter(w=>w.length>2);
    const rowIni=rowWords.map(w=>w[0].toUpperCase()).join('');
    if(rowIni===supName.trim().toUpperCase())return true;
    const normWords=normSup(rowSupName).split(' ').filter(w=>w.length>0);
    const normIni=normWords.map(w=>w[0].toUpperCase()).join('');
    if(normIni===supName.trim().toUpperCase())return true;
  }
  return false;
}
function catalogForSupplier(supplierName){
  return allCatalog.filter(row=>supplierNamesMatch(supplierName,row['Supplier Name']||row['Supplier']||''));
}

/* ════════════════════════
   AVATAR
════════════════════════ */
const PAL=[
  ['#dbeafe','#1d4ed8'],['#dcfce7','#166534'],['#fce7f3','#9d174d'],
  ['#fef9c3','#854d0e'],['#ede9fe','#6d28d9'],['#ffedd5','#c2410c'],
  ['#e0f2fe','#0369a1'],['#fdf4ff','#7e22ce'],['#f0fdf4','#15803d'],['#fff7ed','#9a3412'],
];
function avC(name){return PAL[(name||'?').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%PAL.length]}
function ini(name){const p=(name||'?').trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();}
function avDiv(name,sz,radius){
  const[bg,fg]=avC(name);const r=radius||'50%';
  return`<div style="width:${sz}px;height:${sz}px;border-radius:${r};background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(sz*.33)}px;font-weight:800;flex-shrink:0">${esc(ini(name))}</div>`;
}

/* ════════════════════════
   PROGRESS BAR
════════════════════════ */
let _pv=0,_pt=null;
function pStart(){const b=el('scPbar');clearInterval(_pt);_pv=.1;b.style.transform='scaleX(.1)';b.classList.add('active');_pt=setInterval(()=>{_pv=Math.min(_pv+(1-_pv)*.07,.92);b.style.transform=`scaleX(${_pv})`;},250);}
function pDone(){clearInterval(_pt);const b=el('scPbar');b.style.transform='scaleX(1)';setTimeout(()=>{b.classList.remove('active');b.style.transform='scaleX(0)';},380);}

/* ════════════════════════
   TOASTS
════════════════════════ */
function toast(msg,type,dur){
  const c=el('scToasts');const id='t'+(++_tn);
  const t=document.createElement('div');t.className='sc-toast '+(type||'info');t.id=id;
  const icons={success:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',error:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',loading:'<span class="sc-spin sc-spin-sm" style="flex-shrink:0"></span>',info:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'};
  t.innerHTML=(icons[type]||'')+`<span>${esc(msg)}</span>`;
  c.appendChild(t);
  const ms=dur===undefined?3000:dur;if(ms>0)setTimeout(()=>t.remove(),ms);return id;
}
function rmToast(id){const e=document.getElementById(id);if(e)e.remove();}

/* ════════════════════════
   API
════════════════════════ */
async function api(body){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return r.json();
}

/* ════════════════════════
   LOAD
════════════════════════ */
async function initLoad(){
  pStart();
  try{
    /* Load suppliers and ALL catalog in parallel */
    const[supRes,catRes]=await Promise.all([
      api({action:'getSuppliers'}),
      api({action:'getCatalog'})
    ]);
    if(!supRes.success)throw new Error(supRes.message||'Suppliers failed');
    allSuppliers=supRes.suppliers||[];
    catalogData=(catRes.rows||[]);
    renderSupDropdown();
    if(currentSupId){
      const s=allSuppliers.find(x=>x['Supplier ID']===currentSupId);
      if(s){renderSupplierCard(s);renderCatalog();}
    }
  }catch(e){
    toast('Failed to load: '+e.message,'error');
  }
  pDone();
}

/* Refresh button */
async function handleRefresh(){
  const btn=el('scRefreshBtn');
  btn.disabled=true;
  const ic=document.querySelector('#scRefreshBtn svg');
  if(ic)ic.style.animation='spin .7s linear infinite';
  const tid=toast('Refreshing…','loading',0);
  try{
    const [supRes,catRes]=await Promise.all([
      api({action:'getSuppliers'}),
      api({action:'getCatalog'})
    ]);
    if(!supRes.success)throw new Error(supRes.message||'Suppliers failed');
    allSuppliers=supRes.suppliers||[];
    allCatalog=catRes.success?(catRes.rows||[]):[];
    renderSupDropdown();
    if(currentSupId){
      const s=allSuppliers.find(x=>x['Supplier ID']===currentSupId);
      if(s){renderSupplierCard(s);applySupplierCatalog(s);}
    }
    removeToast(tid);
    toast('Refreshed','success');
  }catch(e){
    removeToast(tid);
    toast('Refresh failed','error');
  }
  if(ic)ic.style.animation='';
  btn.disabled=false;
}


/* ════════════════════════
   SUPPLIER DROPDOWN
════════════════════════ */
function renderSupDropdown(filter){
  const list=el('scSupDdList');
  const q=(filter||'').toLowerCase();
  const vis=allSuppliers.filter(s=>(s['Supplier Name']||'').toLowerCase().includes(q));
  if(!vis.length){list.innerHTML='<div style="padding:14px;text-align:center;font-size:11.5px;color:rgba(255,255,255,.28)">No suppliers found</div>';return;}
  list.innerHTML=vis.map(s=>{
    const nm=s['Supplier Name']||'?';const sid=s['Supplier ID']||'';
    const[bg,fg]=avC(nm);const active=sid===currentSupId;
    return`<div class="sc-sup-opt${active?' active':''}" onclick="selectSupplier('${esc(sid)}')">
      <div class="sc-sup-opt-av" style="background:${bg};color:${fg}">${esc(ini(nm))}</div>
      <div style="flex:1;min-width:0">
        <div class="sc-sup-opt-name">${esc(nm)}</div>
        <div class="sc-sup-opt-meta">${esc(sid)}</div>
      </div>
      ${active?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#8fa8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}
    </div>`;
  }).join('');
}
function toggleSupDropdown(){
  ddOpen=!ddOpen;
  el('scSupDropdown').classList.toggle('open',ddOpen);
  el('scSupFilter').classList.toggle('open',ddOpen);
  if(ddOpen){el('scSupDdSearch').value='';renderSupDropdown();setTimeout(()=>el('scSupDdSearch').focus(),70);}
}
function closeDd(){
  if(!ddOpen)return;ddOpen=false;
  el('scSupDropdown').classList.remove('open');el('scSupFilter').classList.remove('open');
}
function filterSupDropdown(){renderSupDropdown(el('scSupDdSearch').value);}

function selectSupplier(sid){
  closeDd();
  currentSupId=sid;
  const s=allSuppliers.find(x=>x['Supplier ID']===sid);
  if(!s)return;
  el('scSupFilterVal').textContent=s['Supplier Name']||'Unknown';
  el('scCatTitle').textContent=(s['Supplier Name']||'Supplier')+' — Catalog';
  renderSupplierCard(s);
  applySupplierCatalog(s); // instant
  renderSupDropdown();
}

/* Apply catalog from preloaded allCatalog — instant, no API call */
function applySupplierCatalog(s){
  catalogData=catalogForSupplier(s['Supplier Name']||'');
  populateCategoryFilter(catalogData);
  renderCatalog();
  const cnt=el('scCatCount');
  cnt.style.display='';
  cnt.textContent=catalogData.length+' product'+(catalogData.length!==1?'s':'');
}

/* ════════════════════════
   SUPPLIER CARD
════════════════════════ */
function renderSupplierCard(s){
  const nm=s['Supplier Name']||'Unknown';
  const[bg,fg]=avC(nm);
  const days=daysSince(s['Last Completion']);
  const notes=parseJ(s['Notes'],[]);
  const card=el('scSupCard');
  card.innerHTML='';

  /* Hero */
  const hero=mkEl('div','sc-sup-hero');
  hero.innerHTML=`
    <div class="sc-sup-av-lg" style="background:${bg};color:${fg}">${esc(ini(nm))}</div>
    <div style="flex:1;min-width:0">
      <div class="sc-sup-hero-name">${esc(nm)}</div>
      <div class="sc-sup-hero-id">${esc(s['Supplier ID']||'')}</div>
      <button class="sc-edit-btn" onclick="openEditModal('${esc(s['Supplier ID']||'')}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
    </div>`;
  card.appendChild(hero);

  /* KPIs */
  const kg=mkEl('div','sc-kpi-grid');
  kg.innerHTML=
    kpi('Rank',s['Rank']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>')
    +kpi('MOQ',s['MOQ']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>')
    +kpi('Payment',s['Payment Terms']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>','sm')
    +kpi('Credit',s['Credit Account']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>','sm');
  card.appendChild(kg);

  /* Details */
  const det=mkEl('div','sc-det-sec');
  det.innerHTML=`<div class="sc-det-head">Details</div>
    ${dr('Price & Relationship',s['Price & Relationship']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>')}
    ${drRaw('Card',cardBadge(s['Card']),'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>')}
    ${dr('Contact',s['Contact']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>')}
    ${dr('WhatsApp',s['WhatsApp']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>')}`;
  card.appendChild(det);

  /* Activity */
  const act=mkEl('div','sc-det-sec');
  act.innerHTML=`<div class="sc-det-head">Activity</div>
    ${dr('Last Completion',fmtDate(s['Last Completion'])||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>')}
    ${drRaw('Days Since',daysBadge(days),'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>')}`;
  card.appendChild(act);

  /* Notes */
  if(notes.length){
    const ns=mkEl('div','sc-notes-sec');
    ns.innerHTML=`<div class="sc-det-head">Notes (${notes.length})</div>`
      +notes.slice().reverse().map(n=>`
        <div class="sc-note-pill">
          <div class="sc-note-meta">
            <div class="sc-note-av">${esc(ini(n.name||'?'))}</div>
            <span class="sc-note-author">${esc(n.name||'')}</span>
            <span class="sc-note-date">${esc(n.date||'')}</span>
          </div>
          <div class="sc-note-text">${esc(n.text||'')}</div>
        </div>`).join('');
    card.appendChild(ns);
  }

  /* Update count */
  const matched=catalogForSupplier(nm);
  const cnt=el('scCatCount');
  cnt.style.display='';
  cnt.textContent=matched.length+' product'+(matched.length!==1?'s':'');
}

function kpi(label,val,icon,sz){return`<div class="sc-kpi"><div class="sc-kpi-label">${icon}${esc(label)}</div><div class="sc-kpi-val${sz?' '+sz:''}">${esc(String(val))}</div></div>`;}
function dr(label,val,icon){return`<div class="sc-det-row"><span class="sc-det-key">${icon}${esc(label)}</span><span class="sc-det-val">${esc(String(val))}</span></div>`;}
function drRaw(label,valHtml,icon){return`<div class="sc-det-row"><span class="sc-det-key">${icon}${esc(label)}</span><span>${valHtml}</span></div>`;}
function cardBadge(v){
  if(!v||v==='—')return'<span style="color:rgba(255,255,255,.28);font-size:11px">—</span>';
  const yes=v==='Yes';
  return`<span class="sc-b ${yes?'green':'red'}">${yes?'✓ Yes':'✗ No'}</span>`;
}
function daysBadge(d){
  if(d===null)return'<span style="color:rgba(255,255,255,.28);font-size:11px">—</span>';
  const cls=d<=7?'recent':d<=30?'warn':'overdue';
  const lbl=d===0?'Today':d===1?'1 day ago':`${d} days ago`;
  return`<span class="sc-days ${cls}">${lbl}</span>`;
}

/* ════════════════════════
   EDIT SUPPLIER MODAL
════════════════════════ */
function openEditModal(sid){
  const s=allSuppliers.find(x=>x['Supplier ID']===sid);if(!s)return;
  editingSupId=sid;
  el('scEditModalTitle').textContent='Editing: '+(s['Supplier Name']||sid);
  const flds={'SupplierName':'Supplier Name','Rank':'Rank','PriceRelationship':'Price & Relationship','PaymentTerms':'Payment Terms','MOQ':'MOQ','CreditAccount':'Credit Account','Contact':'Contact','WhatsApp':'WhatsApp'};
  Object.entries(flds).forEach(([id,key])=>{const e=el('ef_'+id);if(e)e.value=s[key]||'';});
  /* Date */
  const lc=el('ef_LastCompletion');if(lc)lc.value=toInputDate(s['Last Completion']||'');
  /* Card */
  const card=el('ef_Card');if(card){card.value=s['Card']||'';applyCardColor('ef_Card');}
  el('scEditOverlay').classList.add('open');
}
function closeEditModal(){el('scEditOverlay').classList.remove('open');editingSupId=null;}
function handleEditOverlayClick(e){if(e.target===el('scEditOverlay'))closeEditModal();}
function applyCardColor(id){const sel=el(id);if(!sel)return;sel.className=sel.value==='Yes'?'yes':sel.value==='No'?'no':'';}

async function saveEditSupplier(){
  if(!editingSupId)return;
  const s=allSuppliers.find(x=>x['Supplier ID']===editingSupId);if(!s)return;
  const btn=el('scEditSaveBtn');
  btn.disabled=true;btn.innerHTML='<span class="sc-spin sc-spin-sm"></span> Saving…';
  const payload={
    action:'saveSupplier',supplierId:editingSupId,
    'Supplier Name':    el('ef_SupplierName').value,
    'Rank':             el('ef_Rank').value,
    'Price & Relationship': el('ef_PriceRelationship').value,
    'Payment Terms':    el('ef_PaymentTerms').value,
    'MOQ':              el('ef_MOQ').value,
    'Credit Account':   el('ef_CreditAccount').value,
    'Card':             el('ef_Card').value,
    'Last Completion':  el('ef_LastCompletion').value,
    'Contact':          el('ef_Contact').value,
    'WhatsApp':         el('ef_WhatsApp').value,
  };
  const tid=toast('Saving…','loading',0);
  try{
    const r=await api(payload);
    if(!r.success)throw new Error(r.message||'Save failed');
    /* Update local state */
    Object.assign(s,{
      'Supplier Name':    payload['Supplier Name'],
      'Rank':             payload['Rank'],
      'Price & Relationship':payload['Price & Relationship'],
      'Payment Terms':    payload['Payment Terms'],
      'MOQ':              payload['MOQ'],
      'Credit Account':   payload['Credit Account'],
      'Card':             payload['Card'],
      'Last Completion':  payload['Last Completion'],
      'Contact':          payload['Contact'],
      'WhatsApp':         payload['WhatsApp'],
    });
    closeEditModal();
    /* Refresh supplier card & title */
    el('scSupFilterVal').textContent=s['Supplier Name']||'Unknown';
    el('scCatTitle').textContent=(s['Supplier Name']||'Supplier')+' — Catalog';
    renderSupplierCard(s);
    renderSupDropdown();
    rmToast(tid);toast('Supplier updated','success');
  }catch(e){rmToast(tid);toast('Save failed: '+e.message,'error');}
  finally{btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="20 6 9 17 4 12"/></svg> Save Changes';}
}

/* ════════════════════════
   CATALOG
════════════════════════ */
function populateCategoryFilter(rows){
  const sel=el('scCatCategoryFilter');const prev=sel.value;
  const cats=[...new Set(rows.map(r=>r['Category']||'').filter(Boolean))].sort();
  sel.innerHTML='<option value="">All Categories</option>'+cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  if(prev)sel.value=prev;
}

function getFilteredCatalog(){
  if(!currentSupId)return[];
  const s=allSuppliers.find(x=>x['Supplier ID']===currentSupId);
  if(!s)return[];
  const q=(el('scCatSearch').value||'').toLowerCase().trim();
  const cat=el('scCatCategoryFilter').value;
  return catalogForSupplier(s['Supplier Name']||'').filter(r=>{
    if(q){const str=(String(r['EAN']||'')+' '+String(r['Product Name']||'')+' '+String(r['Code']||'')).toLowerCase();if(!str.includes(q))return false;}
    if(cat&&(r['Category']||'')!==cat)return false;
    return true;
  });
}

function renderCatalog(){
  const s=currentSupId?allSuppliers.find(x=>x['Supplier ID']===currentSupId):null;
  if(s){
    const matched=catalogForSupplier(s['Supplier Name']||'');
    populateCategoryFilter(matched);
  }
  const data=getFilteredCatalog();
  const cc=el('scCatContent');
  if(!currentSupId){
    cc.innerHTML='<div class="sc-state"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><p>Select a supplier</p><span>Catalog will appear here</span></div>';
    return;
  }
  if(!data.length){
    cc.innerHTML='<div class="sc-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><p>No products found</p><span>Try adjusting your search or filters</span></div>';
    return;
  }
  if(currentView==='grid')renderGrid(data,cc);
  else renderTable(data,cc);
}

function renderTable(data,cc){
  cc.innerHTML='';
  const outer=mkEl('div','sc-tbl-outer');
  let html=`<table class="sc-cat-table"><thead><tr>
    <th>EAN</th><th>Product Name</th>
    <th>Code</th><th>Case</th><th>Category</th><th>Cost</th>
  </tr></thead><tbody>`;
  data.forEach((r,i)=>{
    const img=resolveImg(r['Product Image']||'');
    const ean=r['EAN']||'';const cost=r['Cost']||'';const id=esc(String(r['ID']||''));
    html+=`<tr onclick="openProdDrawer('${id}')" style="animation-delay:${Math.min(i,20)*.018}s">
      <td><a class="ean-link" href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(ean)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(ean||'—')}</a></td>
      <td style="font-weight:600;max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r['Product Name']||'')}">${esc(r['Product Name']||'—')}</td>
      <td style="font-family:var(--mono);font-size:10.5px;color:var(--text3)">${esc(r['Code']||'—')}</td>
      <td>${esc(r['Case']||'—')}</td>
      <td>${r['Category']?`<span class="cat-badge">${esc(r['Category'])}</span>`:'<span style="color:var(--text4);font-size:11px">—</span>'}</td>
      <td><span class="cat-cost${!cost?' empty':''}">${cost?'£'+parseFloat(cost).toFixed(2):'—'}</span></td>
    </tr>`;
  });
  html+='</tbody></table>';
  outer.innerHTML=html;cc.appendChild(outer);
}

function renderGrid(data,cc){
  cc.innerHTML='';
  const outer=mkEl('div','sc-cat-grid-outer');
  const grid=mkEl('div','sc-cat-grid');
  data.forEach((r,i)=>{
    const img=resolveImg(r['Product Image']||'');const cost=r['Cost']||'';
    const card=mkEl('div','sc-cat-card');
    card.style.animationDelay=Math.min(i,20)*.022+'s';
    card.innerHTML=`
      <div class="sc-cat-card-img">
        ${img?`<img src="${esc(img)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=sc-cat-card-img-ph>${esc((r['Product Name']||'?').slice(0,2).toUpperCase())}</div>'">`:`<div class="sc-cat-card-img-ph">${esc((r['Product Name']||'?').slice(0,2).toUpperCase())}</div>`}
      </div>
      <div class="sc-cat-card-body">
        <div class="sc-cat-card-name">${esc(r['Product Name']||'—')}</div>
        <div class="sc-cat-card-ean">${esc(r['EAN']||'—')}</div>
        <div class="sc-cat-card-foot">
          <span class="cat-cost${!cost?' empty':''}">${cost?'£'+parseFloat(cost).toFixed(2):'—'}</span>
          <span style="font-size:10px;color:var(--text4)">${esc(fmtDateSh(r['Date'])||'—')}</span>
        </div>
      </div>`;
    card.onclick=()=>openProdDrawer(String(r['ID']||''));
    grid.appendChild(card);
  });
  outer.appendChild(grid);cc.appendChild(outer);
}

function setView(v){
  currentView=v;
  el('scVbtnTable').classList.toggle('active',v==='table');
  el('scVbtnGrid').classList.toggle('active',v==='grid');
  renderCatalog();
}

/* ════════════════════════
   PRODUCT DRAWER
════════════════════════ */
function openProdDrawer(id){
  const row=catalogData.find(r=>String(r['ID']||'')===id);if(!row)return;
  renderProdDrawer(row);
  el('scProdOverlay').classList.add('open');el('scProdDrawer').classList.add('open');
}
function closeProdDrawer(){el('scProdOverlay').classList.remove('open');el('scProdDrawer').classList.remove('open');}
function renderProdDrawer(row){
  const name=row['Product Name']||'—';const ean=row['EAN']||'—';
  const sup=row['Supplier Name']||'';const cost=row['Cost']||'';
  const img=resolveImg(row['Product Image']||'');const id=String(row['ID']||'');
  const imgHtml=img?`<div class="sc-prod-img-thumb" onclick="openLightbox('${esc(img)}')" title="View full image"><img src="${esc(img)}" alt="" onerror="this.parentElement.style.display='none'"></div>`:'';
  el('scProdHero').innerHTML=`<div class="sc-prod-hero">
    <button class="sc-prod-close" onclick="closeProdDrawer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    ${imgHtml}
    ${sup?`<div class="sc-prod-sup">${esc(sup)}</div>`:''}
    <div class="sc-prod-name">${esc(name)}</div>
    <div class="sc-prod-ean">EAN: <a href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(ean)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(ean)}</a></div>
    <div class="sc-prod-kpis">
      ${pk('Cost',cost?'£'+parseFloat(cost).toFixed(2):'—')}
      ${pk('Case',row['Case']||'—')}
      ${pk('Date',fmtDateSh(row['Date'])||'—')}
    </div>
  </div>`;
  const skip=new Set(['ID','EAN','Product Name','Supplier Name','Cost','Product Image','Date','Case']);
  let body=`<div><div class="sc-prod-sec">Product Details</div><div class="sc-prod-grid">`;
  if(row['Code'])    body+=pf('SKU / Code',row['Code']);
  if(row['Barcode']) body+=pf('Barcode',row['Barcode']);
  if(row['Category'])body+=pf('Category',row['Category']);
  if(row['Supplier Email'])body+=pf('Supplier Email',row['Supplier Email']);
  if(row['Email Subject'])body+=pf('Email Subject',row['Email Subject']);
  Object.keys(row).forEach(k=>{if(!skip.has(k)&&String(row[k]||'').trim()&&!body.includes(`>${esc(k)}<`))body+=pf(k,String(row[k]));});
  body+='</div></div>';
  el('scProdBody').innerHTML=body;
  el('scProdFoot').innerHTML=`
    <button class="sc-btn sc-btn-danger sc-btn-sm" onclick="confirmDelProd('${esc(id)}','${esc(name)}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Delete
    </button>
    <span style="font-size:11px;color:var(--text4);margin-left:auto">Added ${esc(fmtDateSh(row['Date'])||'—')}</span>`;
}
function pk(l,v){return`<div class="sc-prod-kpi"><div class="sc-prod-kpi-lbl">${esc(l)}</div><div class="sc-prod-kpi-val">${esc(String(v))}</div></div>`;}
function pf(label,val){return`<div class="sc-prod-field"><label>${esc(label)}</label><div class="fval${val?'':' empty'}">${esc(val||'—')}</div></div>`;}

/* ════════════════════════
   DELETE PRODUCT
════════════════════════ */
function confirmDelProd(id,name){
  el('scConfirmDesc').textContent=`"${name}" will be permanently removed from the Catalog.`;
  el('scConfirmOk').onclick=()=>doDelProd(id);
  el('scConfirmOverlay').classList.add('open');
}
function closeConfirm(){el('scConfirmOverlay').classList.remove('open');}
async function doDelProd(id){
  closeConfirm();closeProdDrawer();
  const tid=toast('Deleting…','loading',0);
  try{
    const r=await api({action:'deleteCatalog',id});
    if(!r.success)throw new Error(r.message);
    allCatalog=allCatalog.filter(x=>String(x['ID']||'')!==id);
    catalogData=catalogData.filter(x=>String(x['ID']||'')!==id);
    renderCatalog();
    /* Update count */
    const s=currentSupId?allSuppliers.find(x=>x['Supplier ID']===currentSupId):null;
    if(s){const cnt=el('scCatCount');const m=catalogForSupplier(s['Supplier Name']||'');cnt.textContent=m.length+' product'+(m.length!==1?'s':'');}
    rmToast(tid);toast('Product deleted','success');
  }catch(e){rmToast(tid);toast('Delete failed','error');}
}

/* ════════════════════════
   LIGHTBOX
════════════════════════ */
function openLightbox(url){el('scLbImg').src=url;el('scLightbox').classList.add('open');}
function closeLightbox(){el('scLightbox').classList.remove('open');el('scLbImg').src='';}

/* ════════════════════════
   HELPERS
════════════════════════ */
function resolveImg(raw){
  if(!raw)return'';raw=String(raw).trim();
  if(!raw||raw==='[object Object]')return'';
  const m1=raw.match(/\/d\/([a-zA-Z0-9_-]{15,})/);if(m1)return`https://drive.google.com/thumbnail?id=${m1[1]}&sz=w400`;
  const m2=raw.match(/[?&]id=([a-zA-Z0-9_-]{15,})/);if(m2)return`https://drive.google.com/thumbnail?id=${m2[1]}&sz=w400`;
  if(/^[a-zA-Z0-9_-]{25,44}$/.test(raw))return`https://drive.google.com/thumbnail?id=${raw}&sz=w400`;
  if(raw.startsWith('http'))return raw;return'';
}
function daysSince(v){
  if(!v)return null;const d=v instanceof Date?v:new Date(v);if(isNaN(d))return null;
  const t=new Date();t.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.max(0,Math.floor((t-d)/86400000));
}
function fmtDate(v){if(!v)return'';const d=new Date(v);if(isNaN(d))return String(v);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function fmtDateSh(v){if(!v)return'';const d=new Date(v);if(isNaN(d))return String(v);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function toInputDate(v){if(!v)return'';const d=new Date(v);if(isNaN(d))return'';return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseJ(v,fb){try{return JSON.parse(v);}catch(e){return fb;}}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function el(id){return document.getElementById(id);}
function mkEl(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}

/* ════════════════════════
   KEYBOARD
════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(el('scLightbox').classList.contains('open')){closeLightbox();return;}
    if(el('scConfirmOverlay').classList.contains('open')){closeConfirm();return;}
    if(el('scProdDrawer').classList.contains('open')){closeProdDrawer();return;}
    if(el('scEditOverlay').classList.contains('open')){closeEditModal();return;}
    if(ddOpen){closeDd();return;}
  }
});
document.addEventListener('click',e=>{
  if(ddOpen&&!el('scSupFilter').contains(e.target)&&!el('scSupDropdown').contains(e.target))closeDd();
});

/* ════════════════════════
   SHELL HEIGHT
════════════════════════ */
(function(){
  const shell=document.getElementById('tdcontent')||document.querySelector('.td-content');
  if(shell){
    document.body.style.overflow='hidden';document.body.style.height='100%';
    const r=el('scRoot');if(r)r.style.height='100%';
  }
})();

/* ════════════════════════
   GLOBALS
════════════════════════ */
window.toggleSupDropdown=toggleSupDropdown;
window.filterSupDropdown=filterSupDropdown;
window.selectSupplier=selectSupplier;
window.setView=setView;
window.renderCatalog=renderCatalog;
window.openProdDrawer=openProdDrawer;
window.closeProdDrawer=closeProdDrawer;
window.openEditModal=openEditModal;
window.closeEditModal=closeEditModal;
window.handleEditOverlayClick=handleEditOverlayClick;
window.saveEditSupplier=saveEditSupplier;
window.applyCardColor=applyCardColor;
window.openLightbox=openLightbox;
window.closeLightbox=closeLightbox;
window.closeConfirm=closeConfirm;
window.refreshAll=refreshAll;

/* ════════════════════════
   INIT
════════════════════════ */
initLoad();

})();
</script>
