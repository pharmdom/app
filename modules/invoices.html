<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Builder — Pharm & Domestic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; color: #0f172a; background: #f8fafc; line-height: 1.5; }

/* ── Layout ── */
.page-wrapper { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.page-title-block { padding: 12px 16px 0; flex-shrink: 0; }
.page-titl { font-size: 18px; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; }
.page-subtitle { font-size: 12px; color: #64748b; margin-top: 3px; }
.page-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
.header-left { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 0; flex-wrap: wrap; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.main-content { flex: 1; display: flex; gap: 0; min-height: 0; overflow: hidden; }
.panel-left { width: 420px; min-width: 320px; max-width: 50vw; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; background: #fff; overflow: hidden; flex-shrink: 0; }
.panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f1f5f9; }

/* ── Stat Chips ── */
.stat-chip { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; border: 1px solid transparent; white-space: nowrap; cursor: default; user-select: none; }
.stat-chip svg { width: 12px; height: 12px; flex-shrink: 0; }
.stat-chip.slate { background: #f8fafc; color: #475569; border-color: #e2e8f0; }
.stat-chip.blue { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 9px; border: 1.5px solid; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
.btn-secondary { background: #fff; border-color: #e2e8f0; color: #475569; }
.btn-secondary:hover { border-color: #94a3b8; color: #0f172a; }
.btn-danger { background: #fff; border-color: #fecaca; color: #dc2626; }
.btn-danger:hover { background: #fee2e2; border-color: #fca5a5; }
.btn-danger.confirming { background: #dc2626; border-color: #dc2626; color: #fff; }
.btn-success { background: #15803d; border-color: #15803d; color: #fff; }
.btn-success:hover { background: #166534; border-color: #166534; }
.btn-amber { background: #f59e0b; border-color: #f59e0b; color: #fff; }
.btn-amber:hover { background: #d97706; border-color: #d97706; }
.btn:disabled { opacity: .5; cursor: default; pointer-events: none; }

/* ── Search ── */
.search-wrap { position: relative; min-width: 140px; max-width: 220px; flex: 1; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 14px; height: 14px; pointer-events: none; }
.search-input { width: 100%; padding: 7px 10px 7px 32px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; background: #fff; color: #0f172a; outline: none; transition: border-color .15s; }
.search-input:focus { border-color: #2563eb; }

/* ── Invoice List Table ── */
.invoice-list-wrap { flex: 1; overflow-y: auto; min-height: 0; }
.invoice-list-wrap::-webkit-scrollbar { width: 4px; }
.invoice-list-wrap::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table thead { position: sticky; top: 0; z-index: 2; }
.data-table th { background: #f8fafc; padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
.data-table td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; white-space: nowrap; }
.data-table tr { transition: background .1s; cursor: pointer; }
.data-table tbody tr:hover td { background: #fafbff; }
.data-table tbody tr.active td { background: #eff6ff; }
.td-amount { font-weight: 700; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; color: #94a3b8; gap: 8px; text-align: center; flex: 1; }
.empty-state p { font-size: 13px; font-weight: 600; color: #64748b; }
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: #94a3b8; gap: 10px; flex: 1; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .65s linear infinite; }
.spinner.sm { width: 13px; height: 13px; border-width: 2px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Preview Panel ── */
.preview-toolbar { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; gap: 8px; flex-wrap: wrap; }
.preview-toolbar-left { display: flex; gap: 8px; align-items: center; }
.preview-toolbar-right { display: flex; gap: 8px; align-items: center; }
.preview-scroll { flex: 1; overflow-y: auto; padding: 24px; display: flex; justify-content: center; min-height: 0; }
.preview-scroll::-webkit-scrollbar { width: 6px; }
.preview-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

/* ── Invoice Paper ── */
.invoice-paper { background: #fff; width: 100%; max-width: 800px; box-shadow: 0 4px 24px rgba(0,0,0,.08); border-radius: 2px; padding: 40px 48px; font-size: 13px; color: #1e293b; line-height: 1.5; min-height: 900px; position: relative; }
.invoice-paper * { font-family: 'Inter', system-ui, sans-serif; }

.inv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 2px solid #0f172a; }
.inv-logo img { height: 52px; object-fit: contain; }
.inv-title-block { text-align: right; }
.inv-title { font-size: 28px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; text-transform: uppercase; }
.inv-number { font-size: 12px; color: #64748b; font-weight: 600; margin-top: 2px; }
.inv-date { font-size: 12px; color: #64748b; margin-top: 2px; }

.inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 28px; }
.inv-party-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 6px; }
.inv-party-name { font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 2px; }
.inv-party-detail { font-size: 12px; color: #475569; line-height: 1.6; }

.inv-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
.inv-table th { background: #0f172a; color: #fff; padding: 10px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; text-align: left; }
.inv-table th:last-child, .inv-table td:last-child { text-align: right; }
.inv-table th:nth-child(3), .inv-table td:nth-child(3),
.inv-table th:nth-child(4), .inv-table td:nth-child(4),
.inv-table th:nth-child(5), .inv-table td:nth-child(5) { text-align: right; }
.inv-table td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; font-size: 12px; color: #334155; vertical-align: top; }
.inv-table tbody tr:nth-child(even) td { background: #fafbfc; }

.inv-totals { display: flex; justify-content: flex-end; margin-bottom: 28px; }
.inv-totals-table { width: 280px; }
.inv-totals-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; color: #475569; }
.inv-totals-row.grand { border-top: 2px solid #0f172a; padding-top: 10px; margin-top: 6px; font-size: 16px; font-weight: 800; color: #0f172a; }

.inv-notes { margin-bottom: 28px; padding: 14px 16px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
.inv-notes-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 4px; }
.inv-notes-text { font-size: 12px; color: #475569; white-space: pre-wrap; }

.inv-footer { border-top: 1px solid #e2e8f0; padding-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.inv-footer-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 4px; }
.inv-footer-text { font-size: 11px; color: #475569; line-height: 1.6; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); z-index: 1100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(3px); }
.modal-overlay.visible { opacity: 1; pointer-events: all; }
.modal { background: #fff; border-radius: 16px; box-shadow: 0 25px 60px rgba(0,0,0,.2); width: 92vw; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; animation: modalIn .2s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(.97) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-header h2 { font-size: 16px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px; }
.modal-close { width: 32px; height: 32px; border: none; border-radius: 8px; background: #f1f5f9; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b; transition: all .15s; }
.modal-close:hover { background: #e2e8f0; color: #0f172a; }
.modal-body { flex: 1; overflow-y: auto; padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

/* ── Form ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; }
.form-group input, .form-group textarea, .form-group select { padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; transition: border-color .15s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #2563eb; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group .field-hint { font-size: 10px; color: #94a3b8; }

/* ── Line items in form ── */
.line-items-header { display: grid; grid-template-columns: 2fr 60px 100px 70px 60px 80px 40px; gap: 6px; padding: 8px 0; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
.line-item-row { display: grid; grid-template-columns: 2fr 60px 100px 70px 60px 80px 40px; gap: 6px; padding: 6px 0; align-items: center; border-bottom: 1px solid #f1f5f9; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.line-item-row input { padding: 6px 8px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 12px; font-family: inherit; color: #0f172a; outline: none; transition: border-color .15s; width: 100%; }
.line-item-row input:focus { border-color: #2563eb; }
.line-item-row input[readonly] { background: #f8fafc; color: #64748b; cursor: default; }
.line-item-remove { width: 28px; height: 28px; border: none; border-radius: 6px; background: #fef2f2; color: #dc2626; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.line-item-remove:hover { background: #fee2e2; }

/* ── Email modal extras ── */
.email-recipient-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
.email-recipient-row input { flex: 1; }
.email-recipient-remove { width: 28px; height: 28px; border: none; border-radius: 6px; background: #fef2f2; color: #dc2626; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
.email-recipient-remove:hover { background: #fee2e2; }

.section-divider { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin: 14px 0 8px; display: flex; align-items: center; gap: 8px; }
.section-divider::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }

/* ── Toast ── */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
.toast { display: flex; align-items: center; gap: 9px; padding: 10px 16px; background: #0f172a; color: #fff; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.18); animation: toastIn .25s ease; max-width: 340px; pointer-events: auto; }
.toast.success { background: #15803d; }
.toast.error { background: #dc2626; }
.toast.info { background: #1e40af; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-8px) scale(.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* ── Responsive ── */
@media (max-width: 900px) {
  .main-content { flex-direction: column; }
  .panel-left { width: 100%; max-width: 100%; height: 45vh; min-height: 200px; border-right: none; border-bottom: 1px solid #e2e8f0; }
  .panel-right { min-height: 300px; }
  .invoice-paper { padding: 24px; min-height: auto; }
  .inv-parties { grid-template-columns: 1fr; gap: 16px; }
  .inv-footer { grid-template-columns: 1fr; gap: 12px; }
  .inv-header { flex-direction: column; gap: 12px; }
  .inv-title-block { text-align: left; }
  .preview-scroll { padding: 12px; }
}
@media (max-width: 640px) {
  html, body { overflow: auto; height: auto; }
  .page-wrapper { height: auto; overflow: visible; }
  .main-content { flex-direction: column; }
  .panel-left { width: 100%; max-width: 100%; height: auto; max-height: 50vh; min-height: 200px; }
  .panel-right { min-height: 400px; }
  .page-header { flex-direction: column; align-items: stretch; }
  .header-left { flex-wrap: wrap; }
  .header-actions { width: 100%; justify-content: flex-end; }
  .search-wrap { max-width: 100%; min-width: 0; }
  .preview-toolbar { flex-direction: column; align-items: stretch; }
  .preview-toolbar-left, .preview-toolbar-right { justify-content: center; flex-wrap: wrap; }
  .form-row { grid-template-columns: 1fr; }
  .line-items-header, .line-item-row { grid-template-columns: 1fr; gap: 4px; }
  .line-items-header { display: none; }
  .line-item-row { padding: 10px 0; gap: 6px; }
  .line-item-row input::placeholder { font-size: 10px; }
  .invoice-paper { font-size: 11px; padding: 16px; }
  .inv-table th, .inv-table td { padding: 6px 8px; font-size: 10px; }
  .stat-chip span { display: none; }
  .stat-chip { padding: 5px 8px; }
}

/* ── Print Styles ── */
@media print {
  body { background: #fff; }
  .page-wrapper, .panel-left, .page-header, .page-title-block, .preview-toolbar, .toast-container, .modal-overlay { display: none !important; }
  .panel-right { display: block !important; }
  .preview-scroll { padding: 0; overflow: visible; }
  .invoice-paper { box-shadow: none; max-width: 100%; padding: 20px; }
}
</style>
</head>
<body>

<div class="page-wrapper">
  <!-- Title Block -->
  <div class="page-title-block">
    <div class="page-titl">Invoice Builder</div>
    <div class="page-subtitle">Create, preview and send professional invoices</div>
  </div>

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <div class="stat-chip slate" id="statTotal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>Loading…</span>
      </div>
      <div class="stat-chip blue" id="statValue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span>—</span>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search invoices…" oninput="filterInvoices()">
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="newInvoice()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Invoice
      </button>
    </div>
  </div>

  <!-- Main Content: Left list + Right preview -->
  <div class="main-content">
    <!-- Left Panel: Invoice List -->
    <div class="panel-left">
      <div class="invoice-list-wrap" id="invoiceListWrap">
        <div class="loading-state" id="listLoading">
          <span class="spinner"></span>
          <span style="font-size:13px;font-weight:600">Loading invoices…</span>
        </div>
      </div>
    </div>

    <!-- Right Panel: Invoice Preview -->
    <div class="panel-right">
      <div class="preview-toolbar" id="previewToolbar" style="display:none">
        <div class="preview-toolbar-left">
          <button class="btn btn-secondary" onclick="editCurrentInvoice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="btn btn-danger" id="deleteInvBtn" onclick="deleteInvoice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Delete
          </button>
        </div>
        <div class="preview-toolbar-right">
          <button class="btn btn-success" onclick="openEmailModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Email
          </button>
          <button class="btn btn-primary" onclick="downloadPDF()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PDF
          </button>
        </div>
      </div>
      <div class="preview-scroll" id="previewScroll">
        <div id="invoicePreview">
          <div class="empty-state">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>Select an invoice or create a new one</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Create/Edit Invoice Modal -->
<div class="modal-overlay" id="invoiceModalOverlay" onclick="closeInvoiceModal(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:680px;max-height:92vh">
    <div class="modal-header">
      <h2 id="invoiceModalTitle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Invoice
      </h2>
      <button class="modal-close" onclick="closeInvoiceModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

<!-- jsPDF via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
(function () {
'use strict';

/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyy6zBP4LduRhK-Fz_aK5H3bDH_cvT8HEj2g81aKgEQVIHsQze3AgJQaBr4Cq1FPs3P/exec';
const LOGO_URL = 'https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png';

const COMPANY = {
  name: 'TOUSIF LTD',
  tradingAs: 'PHARM & DOMESTIC',
  vat: '455602104GB',
  companyNo: '13865809',
  address: 'Unit A, 82 James Carter Road, IP28 7DE, Ipswich, United Kingdom',
  email: 'info@pharm-supplies.co.uk',
  bankName: 'TOUSIF LTD',
  bankAccount: '19356984',
  bankSortCode: '04-06-05'
};

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let invoicesData = [];
let filteredInvoices = [];
let selectedInvoiceId = null;
let editingInvoiceId = null; // null = new, string = editing
let deletePendingTimer = null;

// Preload logo as base64 for PDF
let logoBase64 = null;
(function preloadLogo() {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    logoBase64 = canvas.toDataURL('image/png');
  };
  img.src = LOGO_URL;
})();

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return Number(n || 0).toFixed(2); }
function fmtGBP(n) { return '£' + fmt(n); }
function generateInvNumber() {
  let max = 0;
  invoicesData.forEach(inv => {
    const num = parseInt(String(inv['Invoice Number'] || '').replace('INV-',''), 10);
    if (num > max) max = num;
  });
  return 'INV-' + String(max + 1).padStart(4, '0');
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  if (isNaN(date)) return String(d);
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

/* ══════════════════════════════════════════════════
   API
══════════════════════════════════════════════════ */
async function callApi(body) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (err) {
    console.error('API error:', err);
    return null;
  }
}

/* ══════════════════════════════════════════════════
   LOAD INVOICES
══════════════════════════════════════════════════ */
async function loadInvoices() {
  try {
    const res = await callApi({ action: 'getInvoices' });
    if (!res || !res.success) throw new Error(res?.message || 'API error');

    const headers = res.headers || [];
    invoicesData = (res.rows || []).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
      // Parse items JSON
      if (typeof obj['Items'] === 'string' && obj['Items']) {
        try { obj['_items'] = JSON.parse(obj['Items']); } catch(e) { obj['_items'] = []; }
      } else { obj['_items'] = []; }
      return obj;
    });

    filterInvoices();
    showToast('Loaded ' + invoicesData.length + ' invoices', 'success');
  } catch (err) {
    console.error(err);
    document.getElementById('invoiceListWrap').innerHTML =
      '<div class="empty-state"><p style="color:#dc2626">Failed to load invoices</p></div>';
    showToast('Failed to load invoices', 'error');
  }
}

/* ══════════════════════════════════════════════════
   FILTER + RENDER LIST
══════════════════════════════════════════════════ */
function filterInvoices() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  filteredInvoices = invoicesData.filter(inv => {
    if (!q) return true;
    return (
      String(inv['Invoice Number'] || '').toLowerCase().includes(q) ||
      String(inv['Full Name'] || '').toLowerCase().includes(q) ||
      String(inv['Address'] || '').toLowerCase().includes(q)
    );
  });
  // Sort by date descending
  filteredInvoices.sort((a, b) => new Date(b['Date'] || 0) - new Date(a['Date'] || 0));
  updateStats();
  renderInvoiceList();
}

function updateStats() {
  const total = invoicesData.length;
  const totalValue = invoicesData.reduce((sum, inv) => sum + (Number(inv['Grand Total']) || 0), 0);
  setChip('statTotal', total + ' Invoice' + (total !== 1 ? 's' : ''));
  setChip('statValue', fmtGBP(totalValue) + ' Total');
}

function setChip(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + text + '</span>';
}

function renderInvoiceList() {
  const wrap = document.getElementById('invoiceListWrap');

  if (!filteredInvoices.length) {
    wrap.innerHTML = '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No invoices found</p></div>';
    return;
  }

  let html = '<table class="data-table"><thead><tr>'
    + '<th>Invoice #</th><th>Date</th><th>Customer</th><th style="text-align:right">Total</th>'
    + '</tr></thead><tbody>';

  filteredInvoices.forEach(inv => {
    const id = esc(String(inv['ID'] || ''));
    const isActive = id === selectedInvoiceId;
    html += '<tr class="' + (isActive ? 'active' : '') + '" onclick="selectInvoice(\'' + id + '\')">'
      + '<td style="font-weight:700;color:#2563eb">' + esc(inv['Invoice Number'] || '—') + '</td>'
      + '<td>' + esc(formatDate(inv['Date'])) + '</td>'
      + '<td>' + esc(inv['Full Name'] || '—') + '</td>'
      + '<td class="td-amount" style="text-align:right">' + fmtGBP(inv['Grand Total'] || 0) + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

/* ══════════════════════════════════════════════════
   SELECT INVOICE + RENDER PREVIEW
══════════════════════════════════════════════════ */
function selectInvoice(id) {
  selectedInvoiceId = id;
  renderInvoiceList();
  const inv = invoicesData.find(r => String(r['ID']) === id);
  if (inv) renderPreview(inv);
  document.getElementById('previewToolbar').style.display = 'flex';
  // Reset delete button
  const btn = document.getElementById('deleteInvBtn');
  if (btn) { btn.classList.remove('confirming'); btn.innerHTML = svgTrash() + 'Delete'; }
}

function renderPreview(inv) {
  const items = inv['_items'] || [];
  const subtotal = Number(inv['Subtotal']) || 0;
  const totalVAT = Number(inv['Total VAT']) || 0;
  const grandTotal = Number(inv['Grand Total']) || 0;

    itemsHTML += '<tr>'

      + '<td style="text-align:right">' + fmtGBP(item.preVat || 0) + '</td>'
      + '<td style="text-align:right">' + (item.vatRate || 20) + '%</td>'
      + '<td style="text-align:right">' + fmtGBP(item.vat || 0) + '</td>'
      + '<td style="text-align:right">' + fmtGBP(item.lineTotal || 0) + '</td>'
      + '</tr>';

  const html = `
    <div class="invoice-paper" id="invoicePaper">
      <div class="inv-header">
        <div class="inv-logo"><img src="${LOGO_URL}" alt="Pharm & Domestic" crossorigin="anonymous"></div>
        <div class="inv-title-block">
          <div class="inv-title">Invoice</div>
          <div class="inv-number">${esc(inv['Invoice Number'] || '')}</div>
          <div class="inv-date">${esc(formatDate(inv['Date']))}</div>
        </div>
      </div>

      <div class="inv-parties">
        <div>
          <div class="inv-party-label">From</div>
          <div class="inv-party-name">${esc(COMPANY.tradingAs)}</div>
          <div class="inv-party-detail">
            ${esc(COMPANY.name)}<br>
            ${esc(COMPANY.address)}<br>
            ${esc(COMPANY.email)}<br>
            VAT: ${esc(COMPANY.vat)} · Co: ${esc(COMPANY.companyNo)}
          </div>
        </div>
        <div>
          <div class="inv-party-label">Bill To</div>
          <div class="inv-party-name">${esc(inv['Full Name'] || '')}</div>
          <div class="inv-party-detail">${esc(inv['Address'] || '').replace(/\n/g, '<br>')}</div>
        </div>
      </div>

      <table class="inv-table">
        <thead>
          <tr>
            <th>Item & Description</th>
            <th style="text-align:right">Qty</th>
            <th style="text-align:right">Pre-VAT</th>
            <th style="text-align:right">VAT Rate</th>
            <th style="text-align:right">VAT</th>
            <th style="text-align:right">Line Total</th>
          </tr>
        </thead>
        <tbody>
          ${itemsHTML || '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px">No items</td></tr>'}
        </tbody>
      </table>

      <div class="inv-totals">
        <div class="inv-totals-table">
          <div class="inv-totals-row"><span>Subtotal (excl. VAT)</span><span>${fmtGBP(subtotal)}</span></div>
          <div class="inv-totals-row"><span>Total VAT</span><span>${fmtGBP(totalVAT)}</span></div>
          <div class="inv-totals-row grand"><span>Grand Total</span><span>${fmtGBP(grandTotal)}</span></div>
        </div>
      </div>

      ${notes ? `
      <div class="inv-notes">
        <div class="inv-notes-label">Order Notes</div>
        <div class="inv-notes-text">${esc(notes)}</div>
      </div>` : ''}

      <div class="inv-footer">
        <div>
          <div class="inv-footer-label">Bank Details</div>
          <div class="inv-footer-text">
            <strong>${esc(COMPANY.bankName)}</strong><br>
            Account: ${esc(COMPANY.bankAccount)}<br>
            Sort Code: ${esc(COMPANY.bankSortCode)}
          </div>
        </div>
        <div>
          <div class="inv-footer-label">Company Details</div>
          <div class="inv-footer-text">
            ${esc(COMPANY.name)}<br>
            VAT: ${esc(COMPANY.vat)}<br>
            Company No: ${esc(COMPANY.companyNo)}<br>
            ${esc(COMPANY.email)}
          </div>
        </div>

    </div>
  `;

  document.getElementById('invoicePreview').innerHTML = html;
}

/* ══════════════════════════════════════════════════
   NEW / EDIT INVOICE FORM
══════════════════════════════════════════════════ */
function newInvoice() {
  editingInvoiceId = null;
  document.getElementById('invoiceModalTitle').innerHTML =
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Invoice';
  renderInvoiceForm({
    'Invoice Number': generateInvNumber(),
    'Date': todayStr(),
    'Full Name': '',
    'Address': '',
    'Order Notes': '',
    '_items': [{ description: '', qty: 1, preVat: 0, vatRate: 20, vat: 0, lineTotal: 0 }]
  });
  document.getElementById('invoiceModalOverlay').classList.add('visible');
}

function editCurrentInvoice() {
  if (!selectedInvoiceId) return;
  const inv = invoicesData.find(r => String(r['ID']) === selectedInvoiceId);
  if (!inv) return;
  editingInvoiceId = selectedInvoiceId;
  document.getElementById('invoiceModalTitle').innerHTML =
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit Invoice';
  renderInvoiceForm(inv);
  document.getElementById('invoiceModalOverlay').classList.add('visible');
}

function renderInvoiceForm(inv) {
  const items = inv['_items'] || [];

  let html = `
    <div class="form-row">
      <div class="form-group">
        <label>Invoice Number</label>
        <input type="text" id="fInvNumber" value="${esc(inv['Invoice Number'] || '')}" readonly style="background:#f8fafc;color:#64748b">
        <span class="field-hint">Auto-generated</span>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="fDate" value="${esc(inv['Date'] || todayStr())}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name <span style="color:#dc2626">*</span></label>
        <input type="text" id="fFullName" value="${esc(inv['Full Name'] || '')}" placeholder="Customer full name">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="fAddress" value="${esc(inv['Address'] || '')}" placeholder="Customer address">
      </div>
    </div>

    <div class="section-divider">Line Items</div>
    <div id="lineItemsContainer">
      <div class="line-items-header">
        <span>Item & Description</span>
        <span style="text-align:right">Qty</span>
        <span style="text-align:right">Pre-VAT (£)</span>
        <span style="text-align:right">VAT %</span>
        <span style="text-align:right">VAT (£)</span>
        <span style="text-align:right">Total (£)</span>
        <span></span>
      </div>
      <div id="lineItemsRows"></div>
    </div>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="addLineItem()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Line
    </button>

    <div class="section-divider" style="margin-top:16px">Totals</div>
    <div class="form-row">
      <div class="form-group">
        <label>Subtotal (excl. VAT)</label>
        <input type="text" id="fSubtotal" value="£0.00" readonly style="background:#f8fafc;font-weight:700">
      </div>
      <div class="form-group">
        <label>Total VAT</label>
        <input type="text" id="fTotalVAT" value="£0.00" readonly style="background:#f8fafc;font-weight:700">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Grand Total</label>
        <input type="text" id="fGrandTotal" value="£0.00" readonly style="background:#f0fdf4;font-weight:800;font-size:16px;color:#15803d;border-color:#86efac">
      </div>
    </div>

    <div class="section-divider">Notes</div>
    <div class="form-row">
      <div class="form-group full">
        <label>Order Notes</label>
        <textarea id="fOrderNotes" placeholder="Optional notes for this invoice">${esc(inv['Order Notes'] || '')}</textarea>
      </div>
    </div>
  `;

  document.getElementById('invoiceFormBody').innerHTML = html;

  // Render line item rows
  const rowsEl = document.getElementById('lineItemsRows');
  rowsEl.innerHTML = '';
  if (items.length === 0) items.push({ description: '', qty: 1, preVat: 0, vatRate: 20, vat: 0, lineTotal: 0 });
  items.forEach((item, i) => addLineItemRow(item, i));
  recalcTotals();
}

function addLineItem() {
  const rows = document.getElementById('lineItemsRows');
  const idx = rows.children.length;
  addLineItemRow({ description: '', qty: 1, preVat: 0, vatRate: 20, vat: 0, lineTotal: 0 }, idx);
}

function addLineItemRow(item, idx) {
  const rows = document.getElementById('lineItemsRows');
  const row = document.createElement('div');
  row.className = 'line-item-row';
  row.dataset.idx = idx;
  row.innerHTML = `
    <input type="text" placeholder="Description" value="${esc(item.description || '')}" data-field="description" oninput="onLineItemChange(this)">
    <input type="number" placeholder="Qty" value="${item.qty || 1}" min="1" step="1" data-field="qty" oninput="onLineItemChange(this)">
    <input type="number" placeholder="0.00" value="${item.preVat || 0}" min="0" step="0.01" data-field="preVat" oninput="onLineItemChange(this)">
    <input type="number" placeholder="20" value="${item.vatRate ?? 20}" min="0" step="0.1" data-field="vatRate" oninput="onLineItemChange(this)">
    <input type="text" value="${fmt(item.vat || 0)}" readonly data-field="vat">
    <input type="text" value="${fmt(item.lineTotal || 0)}" readonly data-field="lineTotal" style="font-weight:700">
    <button class="line-item-remove" onclick="removeLineItem(this)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  `;
  rows.appendChild(row);
}

function onLineItemChange(inputEl) {
  const row = inputEl.closest('.line-item-row');
  const qty = Number(row.querySelector('[data-field="qty"]').value) || 0;
  const preVat = Number(row.querySelector('[data-field="preVat"]').value) || 0;
  const vatRate = Number(row.querySelector('[data-field="vatRate"]').value) || 0;

  const linePreVat = qty * preVat;
  const vat = linePreVat * (vatRate / 100);
  const lineTotal = linePreVat + vat;

  row.querySelector('[data-field="vat"]').value = fmt(vat);
  row.querySelector('[data-field="lineTotal"]').value = fmt(lineTotal);

  recalcTotals();
}

function removeLineItem(btn) {
  const row = btn.closest('.line-item-row');
  row.style.animation = 'none';
  row.style.opacity = '0';
  row.style.transform = 'translateX(20px)';
  row.style.transition = 'all .2s ease';
  setTimeout(() => { row.remove(); recalcTotals(); }, 200);
}

function recalcTotals() {
  let subtotal = 0, totalVAT = 0;
  document.querySelectorAll('#lineItemsRows .line-item-row').forEach(row => {
    const qty = Number(row.querySelector('[data-field="qty"]').value) || 0;
    const preVat = Number(row.querySelector('[data-field="preVat"]').value) || 0;
    const vatRate = Number(row.querySelector('[data-field="vatRate"]').value) || 0;
    const linePreVat = qty * preVat;
    const vat = linePreVat * (vatRate / 100);
    subtotal += linePreVat;
    totalVAT += vat;
  });
  const grand = subtotal + totalVAT;
  const fSub = document.getElementById('fSubtotal');
  const fVAT = document.getElementById('fTotalVAT');
  const fGrand = document.getElementById('fGrandTotal');
  if (fSub) fSub.value = fmtGBP(subtotal);
  if (fVAT) fVAT.value = fmtGBP(totalVAT);
  if (fGrand) fGrand.value = fmtGBP(grand);
}

function collectFormData() {
  const items = [];
  document.querySelectorAll('#lineItemsRows .line-item-row').forEach(row => {
    const desc = row.querySelector('[data-field="description"]').value.trim();
    const qty = Number(row.querySelector('[data-field="qty"]').value) || 0;
    const preVat = Number(row.querySelector('[data-field="preVat"]').value) || 0;
    const vatRate = Number(row.querySelector('[data-field="vatRate"]').value) || 0;
    const linePreVat = qty * preVat;
    const vat = linePreVat * (vatRate / 100);
    const lineTotal = linePreVat + vat;
    items.push({ description: desc, qty, preVat, vatRate, vat: Math.round(vat * 100) / 100, lineTotal: Math.round(lineTotal * 100) / 100 });
  });

  let subtotal = 0, totalVAT = 0;
  items.forEach(item => { subtotal += item.qty * item.preVat; totalVAT += item.vat; });
  const grandTotal = subtotal + totalVAT;

  return {
    invoiceNumber: document.getElementById('fInvNumber').value.trim(),
    date: document.getElementById('fDate').value,
    fullName: document.getElementById('fFullName').value.trim(),
    address: document.getElementById('fAddress').value.trim(),
    items: JSON.stringify(items),
    orderNotes: document.getElementById('fOrderNotes').value.trim(),
    subtotal: Math.round(subtotal * 100) / 100,
    totalVAT: Math.round(totalVAT * 100) / 100,
    grandTotal: Math.round(grandTotal * 100) / 100,
    id: editingInvoiceId || ''
  };
}

/* ══════════════════════════════════════════════════
   SAVE INVOICE
══════════════════════════════════════════════════ */
async function saveInvoice() {
  const data = collectFormData();

  if (!data.fullName) {
    showToast('Please enter a customer name', 'error');
    return;
  }

  const btn = document.getElementById('invoiceSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span> Saving…';

  // Optimistic local update
  const tempId = editingInvoiceId || ('TEMP-' + Date.now());
  const localRow = {
    'ID': tempId,
    'Invoice Number': data.invoiceNumber,
    'Date': data.date,
    'Full Name': data.fullName,
    'Address': data.address,
    'Items': data.items,
    'Order Notes': data.orderNotes,
    'Subtotal': data.subtotal,
    'Total VAT': data.totalVAT,
    'Grand Total': data.grandTotal,
    '_items': JSON.parse(data.items)
  };

  if (editingInvoiceId) {
    const idx = invoicesData.findIndex(r => String(r['ID']) === editingInvoiceId);
    if (idx > -1) invoicesData[idx] = { ...invoicesData[idx], ...localRow };
  } else {
    invoicesData.push(localRow);
  }

  selectedInvoiceId = tempId;
  closeInvoiceModal();
  filterInvoices();
  selectInvoice(tempId);
  showToast(editingInvoiceId ? 'Invoice updated' : 'Invoice created', 'success');

  // Background sync
  const result = await callApi({ action: 'saveInvoice', data });
  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Save Invoice';

  if (result && result.success && result.id) {
    // Replace temp ID
    const idx = invoicesData.findIndex(r => String(r['ID']) === tempId);
    if (idx > -1) invoicesData[idx]['ID'] = result.id;
    selectedInvoiceId = result.id;
    filterInvoices();
    selectInvoice(result.id);
  } else if (!result || !result.success) {
    if (!editingInvoiceId) {
      invoicesData = invoicesData.filter(r => r['ID'] !== tempId);
    }
    filterInvoices();
    showToast('Error saving invoice', 'error');
  }
}

/* ══════════════════════════════════════════════════
   DELETE INVOICE
══════════════════════════════════════════════════ */
async function deleteInvoice() {
  if (!selectedInvoiceId) return;
  const btn = document.getElementById('deleteInvBtn');

  if (!btn.classList.contains('confirming')) {
    btn.classList.add('confirming');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Confirm?';
    clearTimeout(deletePendingTimer);
    deletePendingTimer = setTimeout(() => {
      btn.classList.remove('confirming');
      btn.innerHTML = svgTrash() + 'Delete';
    }, 3000);
    return;
  }

  clearTimeout(deletePendingTimer);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span> Deleting…';

  const id = selectedInvoiceId;
  const result = await callApi({ action: 'deleteInvoice', id });

  if (result && result.success) {
    invoicesData = invoicesData.filter(r => String(r['ID']) !== id);
    selectedInvoiceId = null;
    document.getElementById('previewToolbar').style.display = 'none';
    document.getElementById('invoicePreview').innerHTML = '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Select an invoice or create a new one</p></div>';
    filterInvoices();
    showToast('Invoice deleted', 'success');
  } else {
    showToast('Error deleting invoice', 'error');
  }

  btn.disabled = false;
  btn.classList.remove('confirming');
  btn.innerHTML = svgTrash() + 'Delete';
}

/* ══════════════════════════════════════════════════
   DOWNLOAD PDF
══════════════════════════════════════════════════ */
async function downloadPDF() {
  if (!selectedInvoiceId) return;
  const inv = invoicesData.find(r => String(r['ID']) === selectedInvoiceId);
  if (!inv) return;

  showToast('Generating PDF…', 'info');

  const paper = document.getElementById('invoicePaper');
  if (!paper) return;

  // Ensure images are loaded
  const images = paper.querySelectorAll('img');
  await Promise.all(Array.from(images).map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve;
    });
  }));

  try {
    const canvas = await html2canvas(paper, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');

    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = canvas.width;
    const imgHeight = canvas.height;
    const ratio = Math.min(pdfWidth / imgWidth, pdfHeight / imgHeight);
    const w = imgWidth * ratio;
    const h = imgHeight * ratio;

    pdf.addImage(imgData, 'PNG', 0, 0, w, h);
    pdf.save((inv['Invoice Number'] || 'invoice') + '.pdf');
    showToast('PDF downloaded', 'success');
  } catch (err) {
    console.error(err);
    showToast('Error generating PDF', 'error');
  }
}

    </button>

async function sendEmail() {
  const toInputs = document.querySelectorAll('.email-to-input');
  const ccInputs = document.querySelectorAll('.email-cc-input');
  const subject = document.getElementById('emailSubject').value.trim();
  const body = document.getElementById('emailBody').value.trim();

  const toEmails = Array.from(toInputs).map(i => i.value.trim()).filter(Boolean);
  const ccEmails = Array.from(ccInputs).map(i => i.value.trim()).filter(Boolean);

  if (!toEmails.length) {
    showToast('Please add at least one recipient', 'error');
    return;
  }

  const btn = document.getElementById('emailSendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span> Sending…';

  const result = await callApi({
    action: 'sendInvoiceEmail',
    data: {
      invoiceId: selectedInvoiceId,
      to: toEmails,
      cc: ccEmails,
      subject: subject,
      body: body
    }
  });

  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Email';

  if (result && result.success) {
    closeEmailModal();
    showToast('Invoice emailed successfully', 'success');
  } else {
    showToast(result?.message || 'Error sending email', 'error');
  }
}

function svgTrash() { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>'; }

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  if (type === 'success' || type === 'error') {
    c.querySelectorAll('.toast.info').forEach(t => t.remove());
  }
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info: '<span class="spinner sm"></span>'
  };
  t.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-8px)'; t.style.transition = 'all .2s'; setTimeout(() => t.remove(), 200); }, type === 'info' ? 10000 : 2800);
}
