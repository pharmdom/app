
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --border:    #e2e8f0;
  --border2:   #f1f5f9;
  --text:      #0f172a;
  --text2:     #334155;
  --text3:     #64748b;
  --text4:     #94a3b8;
  --blue:      #2563eb;
  --blue-d:    #1d4ed8;
  --blue-bg:   #eff6ff;
  --blue-bd:   #bfdbfe;
  --green:     #15803d;
  --green-bg:  #f0fdf4;
  --green-bd:  #bbf7d0;
  --amber:     #f59e0b;
  --amber-d:   #d97706;
  --amber-bg:  #fffbeb;
  --amber-bd:  #fde68a;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --red-bd:    #fecaca;
  --navy:      #0f172a;
  --navy2:     #1e293b;
}

html,body{font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}

/* ── Layout ── */
.page-wrapper{padding:5px 10px 10px 10px;max-width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;flex-shrink:0}
.header-left{display:flex;gap:8px;align-items:center;flex:1;min-width:0;flex-wrap:wrap}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

.stat-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap;cursor:default}
.stat-chip svg{width:12px;height:12px;flex-shrink:0}
.stat-chip.slate{background:#f8fafc;color:#475569;border-color:#e2e8f0}
.stat-chip.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1.5px solid;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:#2563eb;border-color:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8;border-color:#1d4ed8}
.btn-secondary{background:#fff;border-color:var(--border);color:var(--text3)}
.btn-secondary:hover{border-color:#94a3b8;color:var(--text)}
.btn-amber{background:#f59e0b;border-color:#f59e0b;color:#fff}
.btn-amber:hover{background:#d97706;border-color:#d97706}
.btn-danger{background:#fff;border-color:var(--red-bd);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-ghost{background:#f1f5f9;border-color:#f1f5f9;color:#475569}
.btn-ghost:hover{background:#e2e8f0}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}

/* ── Search ── */
.search-wrap{position:relative;min-width:160px;max-width:300px;flex:1}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);width:14px;height:14px;pointer-events:none}
.search-input{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:#2563eb}

/* ── Filter select ── */
.filter-select{padding:6px 28px 6px 10px;border:1.5px solid var(--border);border-radius:9px;font-size:12px;font-weight:600;font-family:inherit;background:#fff;color:var(--text2);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:border-color .15s}
.filter-select:focus{border-color:#2563eb}
.filter-select-wrap{position:relative;display:inline-flex;align-items:center}
.filter-select-wrap svg{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--text4);pointer-events:none}

/* ── View toggle ── */
.view-toggle{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;background:#fff}
.view-toggle-btn{display:flex;align-items:center;justify-content:center;width:32px;height:30px;border:none;background:transparent;cursor:pointer;color:var(--text4);transition:all .15s}
.view-toggle-btn:hover{color:var(--text2);background:#f8fafc}
.view-toggle-btn.active{color:#2563eb;background:var(--blue-bg)}
.view-toggle-btn svg{width:14px;height:14px}
.view-toggle-btn+.view-toggle-btn{border-left:1px solid var(--border)}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.toolbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* ══════════════════════════════════════
   OFFERS CARD GRID
══════════════════════════════════════ */
.offers-grid-wrapper{flex:1;overflow-y:auto;min-height:0;padding-bottom:8px}
.offers-grid-wrapper::-webkit-scrollbar{width:4px}
.offers-grid-wrapper::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.offers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:2px 0}

.offer-card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .12s;display:flex;flex-direction:column;animation:cardIn .18s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.offer-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.09);border-color:#bfdbfe;transform:translateY(-1px)}

.oc-img-wrap{position:relative;width:100%;height:110px;background:#f1f5f9;overflow:hidden;flex-shrink:0}
.oc-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.offer-card:hover .oc-img-wrap img{transform:scale(1.03)}
.oc-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f8fafc}
.oc-img-placeholder svg{width:28px;height:28px;color:#cbd5e1}
.oc-img-zoom{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(15,23,42,.55);border:none;border-radius:6px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;backdrop-filter:blur(4px)}
.offer-card:hover .oc-img-zoom{opacity:1}
.oc-img-zoom svg{width:11px;height:11px}

.oc-body{padding:10px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
.oc-name{font-size:12.5px;font-weight:700;color:#0f172a;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.oc-supplier{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:4px}
.oc-supplier svg{width:9px;height:9px;flex-shrink:0}
.oc-ean{font-family:monospace;font-size:10px;color:var(--text4);margin-top:1px}
.oc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:3px;padding-top:7px;border-top:1px solid var(--border2)}
.oc-cost{font-size:14px;font-weight:800;color:#0f172a}
.oc-meta-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.oc-margin{font-size:10.5px;font-weight:700;color:var(--green)}
.oc-date{font-size:9.5px;color:var(--text4)}

/* ══════════════════════════════════════
   TABLE VIEW
══════════════════════════════════════ */
.offers-table-wrap{width:100%}
.offers-table{width:100%;border-collapse:collapse}
.offers-table thead th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
.offers-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#334155;font-size:13px;vertical-align:middle}
.offers-table tbody tr{cursor:pointer;transition:background .1s}
.offers-table tbody tr:hover td{background:#f8faff}
.ot-thumb{width:36px;height:36px;border-radius:7px;object-fit:cover;border:1px solid var(--border);display:block}
.ot-thumb-ph{width:36px;height:36px;border-radius:7px;background:#f1f5f9;display:flex;align-items:center;justify-content:center}
.ot-thumb-ph svg{width:16px;height:16px;color:#cbd5e1}

/* ══════════════════════════════════════
   KANBAN VIEW
══════════════════════════════════════ */
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;flex:1;min-height:0;align-items:flex-start}
.kanban-board::-webkit-scrollbar{height:4px}
.kanban-board::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.kanban-col{min-width:240px;max-width:300px;flex:0 0 240px;background:#f8fafc;border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:100%}
.kanban-col-hdr{padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kanban-col-count{font-size:10px;font-weight:700;background:#e2e8f0;color:#475569;padding:1px 7px;border-radius:100px}
.kanban-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.kanban-col-body::-webkit-scrollbar{width:3px}
.kanban-col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.kanban-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.kanban-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#bfdbfe}
.kc-img{width:100%;height:70px;border-radius:7px;object-fit:cover;margin-bottom:8px;display:block}
.kc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kc-sup{font-size:10px;color:var(--text3);margin-bottom:6px}
.kc-bottom{display:flex;justify-content:space-between;align-items:center}
.kc-cost{font-size:13px;font-weight:800;color:var(--text)}
.kc-date{font-size:9px;color:var(--text4)}

/* ── Empty / Loading ── */
.state-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text4);gap:10px;text-align:center}
.state-center p{font-size:13px;font-weight:600;color:var(--text3)}
.state-center span{font-size:12px;color:var(--text4)}
.spinner{display:inline-block;border:2.5px solid var(--border);border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite}
.spinner-sm{width:16px;height:16px}
.spinner-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Skeleton ── */
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:400% 0}100%{background-position:-400% 0}}
.skeleton-card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden}
.skeleton-card-img{height:110px;background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:400% 100%;animation:shimmer 1.4s infinite}
.skeleton-card-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* ── Progress bar ── */
.progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:#2563eb;z-index:9998;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;opacity:0}
.progress-bar.active{opacity:1}

/* ══════════════════════════════════════
   DRAWER
══════════════════════════════════════ */
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:1100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;width:540px;max-width:97vw;height:100vh;background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.13);z-index:1200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.drawer.open{transform:translateX(0)}

.drawer-hero{padding:14px 20px 12px;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);position:relative;overflow:hidden;flex-shrink:0}
.drawer-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03)}
.drawer-hero::after{content:'';position:absolute;bottom:-25px;left:30px;width:100px;height:100px;border-radius:50%;background:rgba(37,99,235,.1)}
.drawer-hero-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.65);transition:background .15s;z-index:2}
.drawer-hero-close:hover{background:rgba(255,255,255,.2);color:#fff}

.dh-supplier{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:3px;position:relative;z-index:1}
.dh-name{font-size:17px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:2px;padding-right:68px;position:relative;z-index:1}
.dh-ean{font-size:11px;color:rgba(255,255,255,.4);font-family:monospace;margin-bottom:12px;position:relative;z-index:1}

.dh-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.dh-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:7px 9px}
.dh-kpi-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);margin-bottom:2px}
.dh-kpi-val{font-size:14px;font-weight:700;color:#fff;line-height:1}

.dh-product-img{position:absolute;top:14px;right:50px;width:50px;height:50px;border-radius:9px;overflow:hidden;border:2px solid rgba(255,255,255,.15);background:#1e293b;z-index:2;cursor:zoom-in}
.dh-product-img img{width:100%;height:100%;object-fit:cover;display:block}
.dh-product-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.dh-product-img-placeholder svg{width:18px;height:18px;color:rgba(255,255,255,.2)}

.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:#f1f5f9}
.sec{margin-bottom:20px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-card{background:#f8fafc;border:1px solid #f1f5f9;border-radius:10px;padding:10px 13px}
.info-card label{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:5px}
.info-card label svg{width:10px;height:10px;flex-shrink:0}
.info-card .val{font-size:13.5px;font-weight:500;color:#1e293b}
.info-card .val.empty{color:var(--text4);font-weight:400;font-style:italic}

.drawer-footer{padding:10px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px;align-items:center;background:#fafafa;flex-shrink:0}

/* ══════════════════════════════════════
   INBOUND MODAL
══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1050;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.18);width:100%;max-width:920px;max-height:calc(100vh - 40px);display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h2{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.modal-count{font-size:11px;font-weight:700;background:var(--bg);color:var(--text3);padding:2px 9px;border-radius:100px;border:1px solid var(--border)}
.modal-close{width:30px;height:30px;border:none;border-radius:8px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-toolbar{padding:10px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;min-height:0;position:relative}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* Modal top loading bar */
.modal-load-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2563eb,#60a5fa,#2563eb);background-size:200% 100%;z-index:5;opacity:0;transition:opacity .2s}
.modal-load-bar.active{opacity:1;animation:mloadslide 1.2s linear infinite}
@keyframes mloadslide{0%{background-position:200% 0}100%{background-position:-200% 0}}

.ib-table{width:100%;border-collapse:collapse;table-layout:fixed}
.ib-table thead{position:sticky;top:0;z-index:2}
.ib-table th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;border-bottom:2px solid var(--border);white-space:nowrap}
.ib-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#334155;font-size:13px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib-table tbody tr{transition:background .1s;cursor:pointer}
.ib-table tbody tr:hover td{background:#f8faff}
.ib-table tbody tr.marked td{background:#f0fdf4}
col.ibc-img{width:50px}col.ibc-ean{width:125px}col.ibc-name{width:auto}col.ibc-sup{width:120px}col.ibc-cost{width:78px}col.ibc-date{width:105px}col.ibc-act{width:95px}

.ib-thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;border:1px solid var(--border);display:block;cursor:zoom-in}
.ib-thumb-ph{width:34px;height:34px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center}
.ib-thumb-ph svg{width:15px;height:15px;color:#cbd5e1}

.ib-mark-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--text3);cursor:pointer;transition:all .18s;white-space:nowrap;font-family:inherit}
.ib-mark-btn:hover{border-color:var(--green-bd);background:var(--green-bg);color:var(--green)}
.ib-mark-btn.marked{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}

/* ── Inbound detail panel ── */
.ib-detail{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);padding:20px}
.ib-detail.open{opacity:1;pointer-events:all}
.ib-panel{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.25);width:100%;max-width:540px;max-height:calc(100vh - 60px);display:flex;flex-direction:column;overflow:hidden}

/* Top bar: nav + mark + close */
.ib-topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border2);flex-shrink:0;gap:8px}
.ib-topbar-nav{display:flex;align-items:center;gap:5px}
.ib-topbar-actions{display:flex;align-items:center;gap:6px}
.ib-nav-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;color:var(--text3);transition:all .15s}
.ib-nav-btn:hover:not(:disabled){border-color:#94a3b8;color:var(--text);background:#f8fafc}
.ib-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.ib-nav-btn svg{width:13px;height:13px}
.ib-nav-counter{font-size:11px;font-weight:600;color:var(--text4);padding:0 6px;white-space:nowrap;min-width:40px;text-align:center}
.ib-mark-top{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit}
.ib-mark-top:hover{border-color:var(--green-bd);background:var(--green-bg);color:var(--green)}
.ib-mark-top.marked{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.ib-mark-top svg{width:12px;height:12px}
.ib-close-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;color:var(--text3);transition:all .15s}

.unsaved-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1450;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(3px)}

/* ── Toast ── */
.toast-wrap{position:fixed;top:16px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:10px 14px;background:#0f172a;color:#fff;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.18);animation:toastIn .2s ease;max-width:320px;pointer-events:auto}
.toast.success{background:#15803d}
.toast.error{background:#dc2626}
.toast.info{background:#1d4ed8}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Confirm dialog ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(3px)}

/* ── Lightbox ── */

<script>
(function(){
'use strict';

/* ════════════════════════════
   CONFIG — update your URL here
════════════════════════════ */
var API_URL = 'https://script.google.com/macros/s/AKfycbwt1sg2sgDxCuwZ6KOFONX6IHany8CcOZyJMLjIkHn08e3d-cVsLOhGpIW0Hj3XYigB/exec';

/* ════════════════════════════
   STATE
════════════════════════════ */
var offersData          = [];
var inboundData         = [];
var filteredInboundData = [];
var markedIds           = new Set();
var drawerId            = null;
var ibDetailId          = null;
var confirmFn           = null;
var currentView         = 'card';

/* ════════════════════════════
   IMAGE URL RESOLVER
   Handles Google Drive links, raw IDs, and direct URLs
════════════════════════════ */
function resolveImg(raw) {
  if (!raw) return '';
  raw = String(raw).trim();
  if (!raw) return '';
  // Google Drive /d/ID format
  var m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
  // Google Drive ?id= or &id=
  var m2 = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1] + '=s600';
  // Already a URL
  if (raw.startsWith('http://') || raw.startsWith('https://')) return raw;
  // Bare Drive file ID (20+ alphanumeric chars)
  if (/^[a-zA-Z0-9_-]{20,}$/.test(raw)) return 'https://lh3.googleusercontent.com/d/' + raw + '=s600';
  return raw;
}

/* ════════════════════════════
   SORT helpers
════════════════════════════ */
function sortDesc(arr) {
  return arr.slice().sort(function(a,b){
    var da = new Date(a['Date']||a['date']||0);
    var db = new Date(b['Date']||b['date']||0);
    if(isNaN(da)) da=new Date(0);
    if(isNaN(db)) db=new Date(0);
    return db-da;
  });
}

/* ════════════════════════════
   PROGRESS BAR
════════════════════════════ */
var _pv=0,_pt=null;
function pStart(){
  var b=document.getElementById('progressBar');
  _pv=0.1; b.style.transform='scaleX(0.1)'; b.classList.add('active');
  _pt=setInterval(function(){_pv=Math.min(_pv+(1-_pv)*0.08,0.92);b.style.transform='scaleX('+_pv+')';},200);
}
function pDone(){
  clearInterval(_pt);
  var b=document.getElementById('progressBar');
  b.style.transform='scaleX(1)';
  setTimeout(function(){b.classList.remove('active');b.style.transform='scaleX(0)';},350);
}

/* ════════════════════════════
   API
════════════════════════════ */
async function api(body){
  var r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return r.json();
}

/* ════════════════════════════
   DATE UTILS
════════════════════════════ */
function fmtDate(v){
  if(!v) return '—';
  try{ var d=new Date(v); if(isNaN(d)) return String(v); return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }catch(e){return String(v);}
}
function fmtDateSh(v){
  if(!v) return '—';
  try{ var d=new Date(v); if(isNaN(d)) return String(v); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }catch(e){return String(v);}
}
function toISO(v){
  if(!v) return '';
  try{ var d=new Date(v); if(isNaN(d)) return ''; return d.toISOString().split('T')[0]; }catch(e){return '';}
}

/* ════════════════════════════
   LIGHTBOX
════════════════════════════ */
function openLightbox(url){ document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightboxImg').src=''; }

/* ════════════════════════════
   LOAD DATA
════════════════════════════ */
async function loadOffers(){
  pStart();
  try{
    var r=await api({action:'getOffers'});
    if(r&&r.success){
      var h=r.headers||[];
      offersData=sortDesc((r.rows||[]).map(function(row){
        var o={};h.forEach(function(k,i){o[k]=row[i]!=null?row[i]:'';});return o;
      }));
      populateOffersFilters();
      renderOffersView();
      updateStats();
    }
  }catch(e){ toast('Failed to load offers','error'); }
  finally{ pDone(); }
}

async function loadInbound(){
  var lb=document.getElementById('inboundLoadBar');
  if(lb) lb.classList.add('active');
  document.getElementById('inboundBody').innerHTML=
    '<div class="modal-load-bar active" id="inboundLoadBar"></div>'
    +'<div class="state-center"><span class="spinner spinner-md"></span><p>Loading&hellip;</p></div>';
  try{
    var r=await api({action:'getInbound'});
    if(r&&r.success){
      var h=r.headers||[];
      inboundData=sortDesc((r.rows||[]).map(function(row){
        var o={};h.forEach(function(k,i){o[k]=row[i]!=null?row[i]:'';});return o;
      }));
      populateInboundFilters();
      renderInboundTable();
      document.getElementById('inboundCount').textContent=inboundData.length;
    }
  }catch(e){
    toast('Failed to load inbound','error');
    document.getElementById('inboundBody').innerHTML='<div class="state-center"><p style="color:var(--red)">Failed to load — check API</p></div>';
  }
}

   VIEW SWITCHING
════════════════════════════ */
function switchView(v){
  currentView=v;
  document.querySelectorAll('.view-toggle-btn').forEach(function(b){
    b.classList.toggle('active',b.getAttribute('data-view')===v);
  });

/* ════════════════════════════
   FILTER HELPERS
════════════════════════════ */
function getFilteredOffers(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  var sup=document.getElementById('offersSupplierFilter').value;
  var dt=document.getElementById('offersDateFilter').value;
  return offersData.filter(function(r){
    if(q){
      var s=( String(r['EAN']||r['Ean']||'')+' '+String(r['Product Name']||r['Name']||'')+' '+String(r['Supplier Name']||r['Supplier']||'')).toLowerCase();
      if(!s.includes(q)) return false;
    }
    if(sup&&(r['Supplier Name']||r['Supplier']||'')!==sup) return false;
    if(dt&&toISO(r['Date']||r['date']||'')!==dt) return false;
    return true;
  });
}
function getFilteredInbound(){
  var q=(document.getElementById('inboundSearch').value||'').toLowerCase().trim();
  var sup=document.getElementById('inboundSupplierFilter').value;
  var dt=document.getElementById('inboundDateFilter').value;
  return inboundData.filter(function(r){
    if(q){
      var s=(String(r['EAN']||r['Ean']||'')+' '+String(r['Product Name']||r['Name']||'')+' '+String(r['Supplier Name']||r['Supplier']||'')).toLowerCase();
      if(!s.includes(q)) return false;
    }
    if(sup&&(r['Supplier Name']||r['Supplier']||'')!==sup) return false;
    if(dt&&toISO(r['Date']||r['date']||'')!==dt) return false;
    return true;
  });
}

/* ════════════════════════════
   RENDER OFFERS (card / table / kanban)
════════════════════════════ */
function renderOffersView(){
  var data=getFilteredOffers();
  var grid=document.getElementById('offersGrid');
  var wrapper=document.getElementById('offersWrapper');

  // handle empty states
  if(!data.length&&!offersData.length){
    grid.className='offers-grid';
    grid.style.display='grid';
    grid.innerHTML='<div class="state-center" style="grid-column:1/-1"><span class="spinner spinner-sm"></span><p>Loading offers&hellip;</p></div>';
    return;
  }
  if(!data.length){
    grid.className='offers-grid';
    grid.style.display='grid';
    grid.innerHTML='<div class="state-center" style="grid-column:1/-1"><p>No offers found</p><span>Try a different search or filter</span></div>';
    return;
  }

  if(currentView==='card'){
    grid.className='offers-grid';
    grid.style.display='grid';
    wrapper.style.overflow='';
    grid.innerHTML=data.map(cardHTML).join('');
  } else if(currentView==='table'){
    grid.className='';
    grid.style.display='block';
    wrapper.style.overflow='auto';
    grid.innerHTML=tableHTML(data);
  } else if(currentView==='kanban'){
    grid.className='';
    grid.style.display='block';
    wrapper.style.overflow='hidden';
    wrapper.style.display='flex';
    wrapper.style.flexDirection='column';
    grid.innerHTML=kanbanHTML(data);
  }
  updateStats();
}

function openDrawer(id,src){

  if(!row) return;

}
function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('detailDrawer').classList.remove('open');
  drawerId=null;
}

function renderDrawer(row,src){
  var ean=String(row['EAN']||row['Ean']||'—');
  var name=String(row['Product Name']||row['Name']||'—');
  var sup=String(row['Supplier Name']||row['Supplier']||'');
  var cost=row['Cost']||row['cost']||'';
  var cFmt=cost?'£'+parseFloat(cost).toFixed(2):'—';
  var id=String(row['ID']||'');
  var rrp=row['RRP']||row['rrp']||'';
  var margin=row['Margin']||row['margin']||'';
  var roi=row['ROI']||row['roi']||'';
  var img=resolveImg(row['Product Image']||row['product_image']||'');
  var date=fmtDate(row['Date']||row['date']||'');

  var heroImg=img
    ?'<div class="dh-product-img" onclick="openLightbox(\''+esc(img)+'\')" title="Click to zoom"><img src="'+esc(img)+'" alt=""></div>'
    :'<div class="dh-product-img"><div class="dh-product-img-placeholder">'+svgImg()+'</div></div>';

  document.getElementById('drawerHero').innerHTML=
    '<div class="drawer-hero">'
    +'<button class="drawer-hero-close" onclick="closeDrawer()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
    +heroImg
    +(sup?'<div class="dh-supplier">'+esc(sup)+'</div>':'')
    +'<div class="dh-name">'+esc(name)+'</div>'
    +'<div class="dh-ean">EAN: '+esc(ean)+'</div>'
    +'<div class="dh-kpis">'
    +kpi('Cost',cFmt)
    +kpi('RRP',rrp?'£'+parseFloat(rrp).toFixed(2):'—')
    +kpi('Margin',margin?String(margin)+(String(margin).includes('%')?'':'%'):'—')
    +'</div>'
    +'</div>';

  var skip=new Set(['ID','EAN','Ean','Product Name','Name','Supplier Name','Supplier','Cost','cost','RRP','rrp','Margin','margin','ROI','roi','Product Image','product_image','Date','date']);
  var extra=Object.keys(row).filter(function(k){return !skip.has(k)&&row[k]!=='';});

  var body='<div class="sec"><div class="sec-label">Additional Details</div><div class="info-grid">';
  if(rrp) body+=ic('RRP','£'+parseFloat(rrp).toFixed(2),'',svgMoney());
  if(margin) body+=ic('Margin',String(margin)+(String(margin).includes('%')?'':'%'),'',svgChart());
  if(roi) body+=ic('ROI',String(roi),'',svgPct());
  if(date&&date!=='—') body+=ic('Date',date,'',svgCal());
  extra.forEach(function(k){body+=ic(k,String(row[k])||'—','',svgDot());});
  body+='</div></div>';

  document.getElementById('drawerBody').innerHTML=body;

  var isMarked=markedIds.has(id);
  document.getElementById('drawerFooter').innerHTML= src==='offer'
    ?'<button class="btn btn-danger btn-sm" onclick="confirmDeleteOffer(\''+esc(id)+'\')">'+svgTrash()+'Delete</button>'
    :'<button class="btn btn-secondary btn-sm" onclick="closeDrawer()">Close</button>'
     +'<button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="toggleMarkFromDrawer(\''+esc(id)+'\')">'+(isMarked?'✓ Marked for Offers':'+ Mark for Offers')+'</button>';
}

function kpi(lbl,val){return '<div class="dh-kpi"><div class="dh-kpi-label">'+lbl+'</div><div class="dh-kpi-val">'+esc(String(val))+'</div></div>';}
function ic(lbl,val,cls,icon){return '<div class="info-card"><label>'+(icon||'')+esc(lbl)+'</label><div class="val '+(cls||'')+'">'+esc(String(val))+'</div></div>';}

function toggleMark(id,e){
  if(e) e.stopPropagation();
  if(markedIds.has(id)) markedIds.delete(id); else markedIds.add(id);
  // update row visuals without full re-render
  var rows=document.querySelectorAll('#inboundBody tbody tr');
  rows.forEach(function(tr){
    var btn=tr.querySelector('.ib-mark-btn');
    if(!btn) return;
    var m=btn.getAttribute('onclick')?btn.getAttribute('onclick').match(/'([^']+)'/):null;
    var rid=m?m[1]:null;
    if(rid!==id) return;
    var now=markedIds.has(id);
    tr.classList.toggle('marked',now);
    btn.classList.toggle('marked',now);
    btn.innerHTML=now?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked':'+ Mark';
  });
  updateMarkedUI();
}

function toggleMarkFromDrawer(id){
  if(markedIds.has(id)) markedIds.delete(id); else markedIds.add(id);
  var row=inboundData.find(function(r){return String(r['ID'])===String(id);});
  if(row) renderDrawer(row,'inbound');
  updateMarkedUI();
}

function updateMarkedUI(){
  var el=document.getElementById('markedCount');
  var btn=document.getElementById('moveToOffersBtn');
  if(markedIds.size>0){
    el.textContent=markedIds.size+' marked';
    el.style.display='inline';
    btn.style.display='inline-flex';
  } else {
    el.style.display='none';
    btn.style.display='none';
  }
}

function ibNav(dir){
  if(!ibDetailId) return;
  var list=filteredInboundData.length?filteredInboundData:inboundData;
  var idx=list.findIndex(function(r){return String(r['ID'])===String(ibDetailId);});
  if(idx<0) return;
  var ni=idx+dir;
  if(ni<0||ni>=list.length) return;
  ibDetailId=String(list[ni]['ID']);
  renderIbDetail(list[ni]);
}

function renderIbDetail(row){
  var ean=String(row['EAN']||row['Ean']||'—');
  var name=String(row['Product Name']||row['Name']||'—');
  var sup=String(row['Supplier Name']||row['Supplier']||'');
  var cost=row['Cost']||row['cost']||'';
  var cFmt=cost?'£'+parseFloat(cost).toFixed(2):'—';
  var id=String(row['ID']||'');
  var rrp=row['RRP']||row['rrp']||'';
  var margin=row['Margin']||row['margin']||'';
  var roi=row['ROI']||row['roi']||'';
  var date=fmtDate(row['Date']||row['date']||'');
  var img=resolveImg(row['Product Image']||row['product_image']||'');

  var list=filteredInboundData.length?filteredInboundData:inboundData;
  var idx=list.findIndex(function(r){return String(r['ID'])===String(id);});
  var isMarked=markedIds.has(id);

  // ── Top bar: prev/next | counter | mark | close ──
  document.getElementById('ibTopbar').innerHTML=
    '<div class="ib-topbar-nav">'
    +'<button class="ib-nav-btn" onclick="ibNav(-1)" title="Previous"'+(idx<=0?' disabled':'')+'>'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>'
    +'</button>'
    +(list.length>1?'<span class="ib-nav-counter">'+(idx+1)+' / '+list.length+'</span>':'<span class="ib-nav-counter"></span>')
    +'<button class="ib-nav-btn" onclick="ibNav(1)" title="Next"'+(idx>=list.length-1?' disabled':'')+'>'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'
    +'</button>'
    +'</div>'
    +'<div class="ib-topbar-actions">'
    +'<button class="ib-mark-top'+(isMarked?' marked':'')+'" onclick="toggleMarkFromPanel(\''+esc(id)+'\')">'
      +(isMarked
        ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked'
        :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Mark')
    +'</button>'
    +'<button class="ib-close-btn" onclick="closeIbDetail()" title="Close">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    +'</button>'
    +'</div>';

  // ── Hero (dark header) ──
  var heroImg=img
    ?'<div class="dh-product-img" onclick="openLightbox(\''+esc(img)+'\')" title="Click to zoom" style="cursor:zoom-in"><img src="'+esc(img)+'" alt=""></div>'
    :'<div class="dh-product-img"><div class="dh-product-img-placeholder">'+svgImg()+'</div></div>';

  document.getElementById('ibPanelHero').innerHTML=
    '<div class="drawer-hero">'
    +heroImg
    +'<div style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fbbf24;margin-bottom:4px;position:relative;z-index:1">&#8595; Inbound</div>'
    +(sup?'<div class="dh-supplier">'+esc(sup)+'</div>':'')
    +'<div class="dh-name" style="padding-right:60px">'+esc(name)+'</div>'
    +'<div class="dh-ean">EAN: '+esc(ean)+'</div>'
    +'<div class="dh-kpis">'+kpi('Cost',cFmt)+kpi('RRP',rrp?'£'+parseFloat(rrp).toFixed(2):'—')+kpi('Margin',margin?String(margin)+(String(margin).includes('%')?'':'%'):'—')+'</div>'
    +'</div>';

  // ── Body: Additional Details only (no Product Details section) ──
  var skip=new Set(['ID','EAN','Ean','Product Name','Name','Supplier Name','Supplier','Cost','cost','RRP','rrp','Margin','margin','ROI','roi','Product Image','product_image','Date','date']);
  var extra=Object.keys(row).filter(function(k){return !skip.has(k)&&row[k]!=='';});

  var body='<div class="sec"><div class="sec-label">Additional Details</div><div class="info-grid">';
  if(rrp) body+=ic('RRP','£'+parseFloat(rrp).toFixed(2),'',svgMoney());
  if(margin) body+=ic('Margin',String(margin)+(String(margin).includes('%')?'':'%'),'',svgChart());
  if(roi) body+=ic('ROI',String(roi),'',svgPct());
  if(date&&date!=='—') body+=ic('Date',date,'',svgCal());
  extra.forEach(function(k){body+=ic(k,String(row[k])||'—','',svgDot());});
  body+='</div></div>';
  document.getElementById('ibPanelBody').innerHTML=body;
}

function toggleMarkFromPanel(id){
  if(markedIds.has(id)) markedIds.delete(id); else markedIds.add(id);
  var row=inboundData.find(function(r){return String(r['ID'])===String(id);});
  if(row) renderIbDetail(row);
  // sync table row
  var rows=document.querySelectorAll('#inboundBody tbody tr');
  rows.forEach(function(tr){
    var btn=tr.querySelector('.ib-mark-btn');
    if(!btn) return;
    var m=btn.getAttribute('onclick')?btn.getAttribute('onclick').match(/'([^']+)'/):null;
    var rid=m?m[1]:null;
    if(rid!==id) return;
    var now=markedIds.has(id);
    tr.classList.toggle('marked',now);
    btn.classList.toggle('marked',now);
    btn.innerHTML=now?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked':'+ Mark';
  });
  updateMarkedUI();
}

/* ════════════════════════════
   MOVE TO OFFERS
════════════════════════════ */
async function moveMarkedToOffers(){
  if(!markedIds.size) return;
  var ids=Array.from(markedIds);
  var btn=document.getElementById('moveToOffersBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner spinner-sm" style="border-top-color:#fff"></span> Moving…';
  pStart();
  try{
    var r=await api({action:'moveToOffers',ids:ids});
    if(r&&r.success){
      var moved=inboundData.filter(function(x){return ids.includes(String(x['ID']));});
      inboundData=inboundData.filter(function(x){return !ids.includes(String(x['ID']));});
      moved.forEach(function(x){offersData.push(x);});
      offersData=sortDesc(offersData);
      markedIds.clear();
      populateInboundFilters(); renderInboundTable();
      populateOffersFilters(); renderOffersView(); updateStats();
      document.getElementById('inboundCount').textContent=inboundData.length;
      toast(ids.length+' product'+(ids.length>1?'s':'')+' moved to Offers ✓','success');
    } else { toast((r&&r.message)||'Failed to move products','error'); }
  }catch(e){ toast('Error: '+e.message,'error'); }
  finally{
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Move to Offers';
    pDone(); updateMarkedUI();
  }
}

/* ════════════════════════════
   ARCHIVE ALL
════════════════════════════ */
function confirmArchive(){
  var rem=inboundData.length-markedIds.size;
  if(!inboundData.length){toast('No products to archive','error');return;}
  openConfirm('Archive All Remaining?',
    'This will permanently delete '+rem+' remaining inbound product'+(rem!==1?'s':'')+' that are not marked for Offers. This cannot be undone.',
    doArchive,'Archive '+rem);
}
async function doArchive(){
  var ids=inboundData.filter(function(r){return !markedIds.has(String(r['ID']));}).map(function(r){return String(r['ID']);});
  if(!ids.length){toast('Nothing to archive','error');return;}
  closeConfirm(); pStart();
  try{
    var r=await api({action:'archiveInbound',ids:ids});
    if(r&&r.success){
      inboundData=inboundData.filter(function(x){return markedIds.has(String(x['ID']));});
      populateInboundFilters(); renderInboundTable();
      document.getElementById('inboundCount').textContent=inboundData.length;
      toast(ids.length+' products archived','success');
    } else { toast((r&&r.message)||'Archive failed','error'); }
  }catch(e){toast('Error: '+e.message,'error');}
  finally{pDone();}
}

/* ════════════════════════════
   DELETE OFFER
════════════════════════════ */
function confirmDeleteOffer(id){
  openConfirm('Delete Offer?','This will permanently delete this product from the Offers sheet.',function(){doDeleteOffer(id);},'Delete');
}
async function doDeleteOffer(id){
  closeConfirm(); closeDrawer(); pStart();
  try{
    var r=await api({action:'deleteOffer',id:id});
    if(r&&r.success){
      offersData=offersData.filter(function(x){return String(x['ID'])!==String(id);});
      populateOffersFilters(); renderOffersView(); updateStats();
      toast('Offer deleted','success');
    } else { toast('Failed to delete','error'); }
  }catch(e){toast('Error: '+e.message,'error');}
  finally{pDone();}
}

/* ════════════════════════════
   CONFIRM DIALOG
════════════════════════════ */
function openConfirm(title,msg,fn,lbl){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmOkBtn').textContent=lbl||'Confirm';
  confirmFn=fn;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirmOverlay').classList.remove('open'); confirmFn=null; }
function doConfirm(){ if(confirmFn) confirmFn(); }

/* ════════════════════════════
   TOAST
════════════════════════════ */
function toast(msg,type){
  var c=document.getElementById('toastWrap');
  var t=document.createElement('div');
  t.className='toast '+(type||'');
  var icons={
    success:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  t.innerHTML=(icons[type]||'')+esc(msg);
  c.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove();},3200);
}

/* ════════════════════════════
   ESCAPE
════════════════════════════ */
function esc(s){
  return String(s!=null?s:'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════
   KEYBOARD
════════════════════════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.getElementById('lightbox').classList.contains('open')){closeLightbox();return;}
    if(document.getElementById('confirmOverlay').classList.contains('open')){closeConfirm();return;}
    if(document.getElementById('unsavedOverlay').classList.contains('open')){closeUnsavedOverlay();return;}
    if(document.getElementById('ibDetail').classList.contains('open')){closeIbDetail();return;}
    if(document.getElementById('detailDrawer').classList.contains('open')){closeDrawer();return;}
  }
  if(document.getElementById('ibDetail').classList.contains('open')){
    if(e.key==='ArrowLeft') ibNav(-1);
    if(e.key==='ArrowRight') ibNav(1);
  }
});
