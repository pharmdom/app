<style>

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── PAGE WRAPPER ── */
.page-wrapper {
  padding: 0 10px 32px;
  max-width: 100%;
  display: flex;
  flex-direction: column;
}

/* ── HERO BANNER ── */
.hero {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-radius: 16px;
  padding: 24px 28px 20px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 60px;
  width: 130px; height: 130px;
  border-radius: 50%;
  background: rgba(37,99,235,0.12);
}

.hero-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
  flex-wrap: wrap;
}

.hero-title-group {}
.hero-eyebrow {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 5px;
}

.hero-title {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.4px;
  margin-bottom: 3px;
}

.hero-sub {
  font-size: 12.5px;
  color: rgba(255,255,255,0.4);
}

/* Marketplace pills */
.marketplace-pills {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.mp-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 13px;
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 700;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.2px;
  transition: all .15s;
}

.mp-pill:hover { background: rgba(255,255,255,0.12); color: #fff; }

.mp-pill-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Pipeline stats */
.hero-pipeline {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  position: relative;
  z-index: 1;
}

.pipeline-step {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background .15s;
  cursor: pointer;
}

.pipeline-step:hover { background: rgba(255,255,255,0.1); }
.pipeline-step.active-filter { background: rgba(37,99,235,0.25); border-color: rgba(37,99,235,0.5); }

.pipeline-step-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.pipeline-step-icon svg { width: 17px; height: 17px; }

.step-listing  .pipeline-step-icon { background: rgba(251,191,36,0.15); color: #fbbf24; }
.step-veeqo    .pipeline-step-icon { background: rgba(96,165,250,0.15); color: #60a5fa; }
.step-ready    .pipeline-step-icon { background: rgba(74,222,128,0.15); color: #4ade80; }

.pipeline-step-info { flex: 1; min-width: 0; }

.pipeline-step-num {
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
  letter-spacing: -0.5px;
}

.pipeline-step-label {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* Progress line */
.pipeline-progress {
  position: relative;
  z-index: 1;
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 100px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
}

.progress-fill.listing { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
.progress-fill.veeqo   { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
.progress-fill.ready   { background: linear-gradient(90deg, #4ade80, #16a34a); }

.progress-label {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  min-width: 28px;
  text-align: right;
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 300px;
}

.search-wrap svg {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  width: 14px; height: 14px;
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 8px 12px 8px 33px;
  border: 1.5px solid #e2e8f0;
  border-radius: 9px;
  font-size: 13px;
  font-family: inherit;
  background: #fff;
  color: #0f172a;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

.search-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.08); }

.toolbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  flex-wrap: wrap;
}

.filter-select {
  padding: 8px 10px;
  border: 1.5px solid #e2e8f0;
  border-radius: 9px;
  font-size: 12.5px;
  font-family: inherit;
  background: #fff;
  color: #374151;
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
}

.filter-select:focus { border-color: #2563eb; }
.filter-select.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; font-weight: 600; }

.results-tag {
  font-size: 12px;
  color: #64748b;
  font-weight: 500;
  white-space: nowrap;
  padding: 7px 11px;
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 9px;
}

/* ── PRODUCT GRID ── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

/* ── PRODUCT CARD ── */
.product-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.4,0,.2,1), box-shadow .18s, border-color .15s;
  animation: cardIn .2s ease both;
  display: flex;
  flex-direction: column;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.product-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  border-color: #bfdbfe;
}

/* Card stage stripe */
.card-stripe {
  height: 3px;
  width: 100%;
}

.stripe-listing { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
.stripe-veeqo   { background: linear-gradient(90deg, #60a5fa, #2563eb); }
.stripe-ready   { background: linear-gradient(90deg, #4ade80, #16a34a); }

/* Card body */
.card-body {
  padding: 14px 16px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 5px;
}

.card-name {
  font-size: 13.5px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.35;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-stage-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 100px;
  font-size: 10.5px;
  font-weight: 700;
  flex-shrink: 0;
  border: 1px solid transparent;
}

.badge-listing { background: #fffbeb; color: #d97706; border-color: #fde68a; }
.badge-veeqo   { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
.badge-ready   { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }

.card-asin {
  font-size: 11px;
  color: #94a3b8;
  font-family: 'SF Mono', 'Fira Code', monospace;
  margin-bottom: 12px;
  letter-spacing: 0.3px;
}

/* Stats row */
.card-stats {
  display: flex;
  gap: 14px;
  margin-bottom: 12px;
}

.card-stat { display: flex; flex-direction: column; gap: 1px; }
.card-stat-label {
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #94a3b8;
}
.card-stat-val {
  font-size: 13.5px;
  font-weight: 700;
  color: #0f172a;
}

/* Platform row */
.card-platforms {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid #f1f5f9;
}

.plat-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 100px;
  font-size: 10.5px;
  font-weight: 700;
  border: 1.5px solid #e2e8f0;
  color: #64748b;
  transition: all .12s;
}

.plat-chip.live {
  border-color: transparent;
}

.plat-chip.amz-live   { background: #fff8ed; color: #c05e00; border-color: #fed7aa; }
.plat-chip.ebay-live  { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.plat-chip.tt-live    { background: #0f0f0f; color: #fff; border-color: #0f0f0f; }
.plat-chip.prime-live { background: #232f3e; color: #ff9900; border-color: #232f3e; }

.plat-logo {
  font-size: 9px;
  font-weight: 900;
  line-height: 1;
}

/* ── EMPTY STATE ── */
.empty-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 70px 20px;
  color: #94a3b8;
  gap: 10px;
  text-align: center;
}

.empty-state svg { opacity: 0.35; }
.empty-state p { font-size: 14px; font-weight: 600; color: #64748b; }
.empty-state small { font-size: 12.5px; }

/* ── PAGINATION ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 0;
}

.page-info { font-size: 12.5px; color: #64748b; }
.page-btns { display: flex; gap: 5px; }

.page-btn {
  padding: 6px 13px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  background: #fff;
  font-size: 12.5px;
  font-weight: 600;
  font-family: inherit;
  color: #374151;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; gap: 4px;
}

.page-btn:hover:not(:disabled) { border-color: #2563eb; color: #2563eb; }
.page-btn:disabled { opacity: .4; cursor: default; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.3);
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(2px);
}

.drawer-overlay.visible { opacity: 1; pointer-events: all; }

/* ── DRAWER ── */
.drawer {
  position: fixed;
  top: 0; right: 0;
  width: 560px;
  max-width: 97vw;
  height: 100%;
  background: #fff;
  box-shadow: -8px 0 40px rgba(0,0,0,.13);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}

.drawer.open { transform: translateX(0); }

/* Drawer hero */
.drawer-hero {
  padding: 20px 22px 18px;
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.drawer-hero::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}

.drawer-hero::after {
  content: '';
  position: absolute;
  bottom: -25px; left: 30px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(37,99,235,0.1);
}

.drawer-hero-close {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px;
  border: none; border-radius: 7px;
  background: rgba(255,255,255,.1);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.65);
  transition: background .15s;
  z-index: 1;
}

.drawer-hero-close:hover { background: rgba(255,255,255,.2); color: #fff; }

.drawer-stage-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 11px;
  border-radius: 100px;
  margin-bottom: 9px;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: .2px;
  position: relative; z-index: 1;
}

.dsb-listing { background: rgba(251,191,36,.15); border: 1px solid rgba(251,191,36,.3); color: #fbbf24; }
.dsb-veeqo   { background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.3); color: #60a5fa; }
.dsb-ready   { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }

.drawer-product-name {
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  padding-right: 42px;
  line-height: 1.3;
  margin-bottom: 3px;
  position: relative; z-index: 1;
}

.drawer-product-asin {
  font-size: 12px;
  color: rgba(255,255,255,.35);
  font-family: 'SF Mono', monospace;
  margin-bottom: 16px;
  position: relative; z-index: 1;
}

.drawer-kpi-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  position: relative; z-index: 1;
}

.drawer-kpi {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  padding: 10px 12px;
}

.drawer-kpi-label {
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: rgba(255,255,255,.4);
  margin-bottom: 4px;
}

.drawer-kpi-val {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}

/* Drawer tabs */
.drawer-tabs {
  display: flex;
  border-bottom: 1px solid #e2e8f0;
  background: #fff;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.drawer-tabs::-webkit-scrollbar { display: none; }

.drawer-tab {
  padding: 11px 16px;
  font-size: 12.5px;
  font-weight: 700;
  font-family: inherit;
  color: #64748b;
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
}

.drawer-tab svg { width: 13px; height: 13px; }
.drawer-tab:hover { color: #334155; }
.drawer-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #fafcff; }

/* Drawer body */
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 22px;
}

.drawer-body::-webkit-scrollbar { width: 5px; }
.drawer-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

/* Sections */
.drawer-section { margin-bottom: 20px; }

.section-label {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: #94a3b8;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}

.section-label::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }

/* Info grid */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

.info-card {
  background: #f8fafc;
  border: 1px solid #f1f5f9;
  border-radius: 10px;
  padding: 10px 13px;
  transition: border-color .15s;
}

.info-card:focus-within { border-color: #bfdbfe; background: #fafcff; }

.info-card label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: #94a3b8;
  margin-bottom: 5px;
}

.edit-input, .edit-select {
  width: 100%;
  padding: 5px 8px;
  border: 1.5px solid #bfdbfe;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  color: #0f172a;
  background: #fff;
  outline: none;
  transition: border-color .15s;
}

.edit-input:focus, .edit-select:focus { border-color: #2563eb; }

/* Platform cards */
.platform-section-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.platform-toggle-card {
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 11px;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  cursor: default;
  transition: all .15s;
}

.platform-toggle-card.on {
  border-color: #bbf7d0;
  background: #f0fdf4;
}

.plat-icon-box {
  width: 34px; height: 34px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900;
  font-size: 11px;
  color: #fff;
}

.plat-amz   { background: #ff9900; color: #0f1111; }
.plat-ebay  { background: linear-gradient(135deg, #0064d2, #0064d2); }
.plat-tt    { background: #010101; }
.plat-prime { background: #232f3e; }

.plat-name {
  font-size: 10.5px;
  font-weight: 700;
  color: #64748b;
  text-align: center;
}

.plat-status {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 100px;
}

.platform-toggle-card.on .plat-status {
  background: #f0fdf4;
  color: #16a34a;
  border: 1px solid #bbf7d0;
}

.platform-toggle-card:not(.on) .plat-status {
  background: #f1f5f9;
  color: #94a3b8;
}

/* Drawer footer */
.drawer-footer {
  padding: 10px 22px;
  border-top: 1px solid #f1f5f9;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
  background: #fafafa;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border: none; border-radius: 9px;
  font-size: 13px; font-weight: 700; font-family: inherit;
  cursor: pointer;
  transition: background .15s, transform .1s;
  white-space: nowrap;
}

.btn:active { transform: scale(.97); }
.btn-ghost { background: #f1f5f9; color: #475569; }
.btn-ghost:hover { background: #e2e8f0; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 7px; }

/* Save indicator */
.save-ind {
  font-size: 12px;
  font-weight: 600;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border-radius: 7px;
  opacity: 0;
  transition: opacity .2s;
}

.save-ind.saving { background: #eff6ff; color: #2563eb; opacity: 1; }
.save-ind.saved  { background: #f0fdf4; color: #16a34a; opacity: 1; }
.save-ind.error  { background: #fef2f2; color: #dc2626; opacity: 1; }

/* ── SPINNER ── */
.spinner {
  display: inline-block;
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  vertical-align: middle;
}

.spinner.sm {
  width: 11px; height: 11px;
  border-width: 2px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
.toast-container {
  position: fixed;
  bottom: 22px; right: 22px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.toast {
  display: flex; align-items: center; gap: 9px;
  padding: 11px 16px;
  background: #0f172a;
  color: #fff;
  border-radius: 10px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 28px rgba(0,0,0,.2);
  max-width: 320px;
  animation: toastIn .22s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px) scale(.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.toast.success { background: #15803d; }
.toast.error   { background: #dc2626; }

/* ── PROGRESS INDICATOR ── */
.top-bar {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, #2563eb, #60a5fa);
  border-radius: 0 3px 3px 0;
  z-index: 9999;
  transition: width .3s ease;
}

.top-bar.done {
  width: 100% !important;
  opacity: 0;
  transition: width .2s ease, opacity .4s ease .2s;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .hero-pipeline { grid-template-columns: repeat(3, 1fr); }
  .product-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
  .platform-section-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  .page-wrapper { padding: 0 8px 24px; }
  .hero { padding: 18px 16px 16px; border-radius: 12px; }
  .hero-pipeline { grid-template-columns: 1fr; gap: 7px; }
  .marketplace-pills { gap: 6px; }
  .mp-pill span { display: none; }
  .product-grid { grid-template-columns: 1fr; }
  .drawer { width: 100%; max-width: 100%; }
  .drawer-kpi-row { grid-template-columns: repeat(3, 1fr); }
  .info-grid { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-wrap { max-width: 100%; }
  .toolbar-right { justify-content: space-between; }
}
</style>

<!-- ══════════════════════════════════════════════ -->

<div class="top-bar" id="topBar"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="page-wrapper">

        </div>

        </div>
        <div class="mp-pill">
          <div class="mp-pill-dot" style="background:#6366f1;"></div>

        <div class="pipeline-step-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div class="pipeline-step-info">
          <div class="pipeline-step-num" id="numListing">—</div>

        </div>
        <div class="pipeline-step-info">

    <!-- Progress bars -->
    <div class="pipeline-progress">

      <div class="progress-track" style="flex:1">
        <div class="progress-fill veeqo" id="barVeeqo" style="width:0%"></div>
      </div>
      <div class="progress-track" style="flex:1">
        <div class="progress-fill ready" id="barReady" style="width:0%"></div>

  </div>

  <!-- ── TOOLBAR ── -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search products, ASINs…">
    </div>
    <div class="toolbar-right">
      <select class="filter-select" id="filterPlatform" onchange="applyFilters()">
        <option value="">All Platforms</option>
        <option value="amazon">Amazon</option>
        <option value="ebay">eBay & TT</option>
        <option value="tiktok">TikTok</option>
        <option value="prime">Prime</option>
      </select>
      <span class="results-tag" id="resultsTag">— products</span>
    </div>
  </div>

  <!-- ── PRODUCT GRID ── -->
  <div class="product-grid" id="productGrid"></div>

  <!-- ── PAGINATION ── -->
  <div class="pagination" id="pagination">

      <button class="page-btn" id="btnPrev" onclick="prevPage()" disabled>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Prev
      </button>
      <button class="page-btn" id="btnNext" onclick="nextPage()" disabled>
        Next
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

<!-- ── OVERLAY ── -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ── DRAWER ── -->
<div class="drawer" id="drawer">
  <div id="drawerHero" class="drawer-hero"></div>
  <div class="drawer-tabs" id="drawerTabs"></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">
    <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">Close</button>
    <div class="save-ind" id="saveInd"></div>
  </div>
</div>

<script>
(function () {

/* ══ STATE ══ */
let allData = [], filteredData = [];
let currentPage = 1;
const perPage = 24;
let activeStageFilter = '';
let activeTab = 'details';
let openRow = null;

/* ══ PROGRESS BAR ══ */
function pbStart() {
  const b = document.getElementById('topBar');
  b.style.width = '55%'; b.classList.remove('done');
}
function pbDone() {
  const b = document.getElementById('topBar');
  b.style.width = '100%';
  setTimeout(() => b.classList.add('done'), 200);
  setTimeout(() => { b.classList.remove('done'); b.style.width = '0%'; }, 700);
}

/* ══ TOAST ══ */
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/></svg>',
  };
  t.innerHTML = (icons[type] || '') + escHtml(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

/* ══ SAVE INDICATOR ══ */
let saveTimer;
function showSave(state) {
  const el = document.getElementById('saveInd');
  const map = {
    saving: ['saving', '<span class="spinner sm"></span> Saving…'],
    saved:  ['saved',  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Saved'],
    error:  ['error',  'Error saving'],
  };
  const [cls, html] = map[state] || ['', ''];
  el.className = 'save-ind ' + cls;
  el.innerHTML = html;
  clearTimeout(saveTimer);
  if (state !== 'saving') saveTimer = setTimeout(() => { el.className = 'save-ind'; el.innerHTML = ''; }, 2500);
}

/* ══ GET STATUS ══ */
function getStatus(row) {
  if (row['Warehouse'] !== 'Yes') return 'listing';
  if (row['Arrived'] !== 'Yes')   return 'veeqo';
  return 'ready';
}

/* ══ LOAD ══ */
async function loadListing() {
  pbStart();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getListing' })
    });
    allData = await res.json();
    filteredData = [...allData];
    updateStats();
    renderGrid();
  } catch (e) {
    showToast('Failed to load data', 'error');
  }
  pbDone();
}

/* ══ STATS ══ */
function updateStats() {
  const total   = allData.length || 1;
  const listing = allData.filter(r => getStatus(r) === 'listing').length;
  const veeqo   = allData.filter(r => getStatus(r) === 'veeqo').length;
  const ready   = allData.filter(r => getStatus(r) === 'ready').length;

  animNum('numListing', listing);
  animNum('numVeeqo',   veeqo);
  animNum('numReady',   ready);

  setTimeout(() => {
    document.getElementById('barListing').style.width = Math.round(listing / total * 100) + '%';
    document.getElementById('barVeeqo').style.width   = Math.round(veeqo   / total * 100) + '%';
    document.getElementById('barReady').style.width   = Math.round(ready   / total * 100) + '%';
  }, 100);

  document.getElementById('progressPct').textContent = Math.round(ready / total * 100) + '%';
}

function animNum(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = parseInt(el.textContent) || 0;
  const steps = 16;
  let i = 0;
  const t = setInterval(() => {
    i++;
    el.textContent = Math.round(start + (target - start) * (i / steps));
    if (i >= steps) clearInterval(t);
  }, 20);
}

/* ══ PIPELINE FILTER ══ */
window.togglePipeFilter = function(stage) {
  activeStageFilter = activeStageFilter === stage ? '' : stage;
  ['pipeList','pipeVeeqo','pipeReady'].forEach(id => document.getElementById(id).classList.remove('active-filter'));
  if (activeStageFilter === 'listing') document.getElementById('pipeList').classList.add('active-filter');
  if (activeStageFilter === 'veeqo')   document.getElementById('pipeVeeqo').classList.add('active-filter');
  if (activeStageFilter === 'ready')   document.getElementById('pipeReady').classList.add('active-filter');
  applyFilters();
};

/* ══ SEARCH & FILTERS ══ */
document.getElementById('searchInput').addEventListener('input', applyFilters);
window.applyFilters = applyFilters;

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const plat = document.getElementById('filterPlatform').value;

  document.getElementById('filterPlatform').classList.toggle('active', !!plat);

  filteredData = allData.filter(r => {
    if (q && !(
      (r['Listing Name'] || '').toLowerCase().includes(q) ||
      (r['ASINs'] || '').toLowerCase().includes(q)
    )) return false;
    if (activeStageFilter && getStatus(r) !== activeStageFilter) return false;
    if (plat === 'amazon' && r['Amazon'] !== 'Yes')   return false;
    if (plat === 'ebay'   && r['eBay & TT'] !== 'Yes') return false;
    if (plat === 'tiktok' && r['TikTok'] !== 'Yes')   return false;
    if (plat === 'prime'  && r['Prime'] !== 'Yes')    return false;
    return true;
  });

  document.getElementById('resultsTag').textContent = filteredData.length + ' products';
  currentPage = 1;
  renderGrid();
}

/* ══ RENDER GRID ══ */
function renderGrid() {
  const grid = document.getElementById('productGrid');
  const start = (currentPage - 1) * perPage;
  const page  = filteredData.slice(start, start + perPage);

  if (!page.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No products found</p>
        <small>Try adjusting your search or filters</small>
      </div>`;
    document.getElementById('pageInfo').textContent = '0 results';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    return;
  }

  grid.innerHTML = page.map((row, i) => {
    const status = getStatus(row);
    const stageCls = { listing: 'badge-listing', veeqo: 'badge-veeqo', ready: 'badge-ready' }[status];
    const stageLabel = { listing: 'Need Listing', veeqo: 'Need Veeqo', ready: 'Ready' }[status];

    const platforms = [
      row['Amazon']    === 'Yes' ? `<span class="plat-chip amz-live live"><span class="plat-logo">A</span>Amazon</span>` : `<span class="plat-chip"><span class="plat-logo" style="color:#94a3b8">A</span>Amazon</span>`,
      row['eBay & TT'] === 'Yes' ? `<span class="plat-chip ebay-live live"><span class="plat-logo">e</span>eBay</span>` : '',
      row['TikTok']    === 'Yes' ? `<span class="plat-chip tt-live live"><span class="plat-logo">T</span>TikTok</span>` : '',
      row['Prime']     === 'Yes' ? `<span class="plat-chip prime-live live"><span class="plat-logo">P</span>Prime</span>` : '',
    ].filter(Boolean).join('');

    return `
      <div class="product-card" onclick="openDrawer('${escAttr(row['Opportunity ID'])}')" style="animation-delay:${i * 0.025}s">
        <div class="card-stripe stripe-${status}"></div>
        <div class="card-body">
          <div class="card-head">
            <div class="card-name">${escHtml(row['Listing Name'] || '—')}</div>
            <span class="card-stage-badge ${stageCls}">${stageLabel}</span>
          </div>
          <div class="card-asin">${escHtml(row['ASINs'] || '—')}</div>
          <div class="card-stats">
            ${row['Unit Cost'] ? `<div class="card-stat"><div class="card-stat-label">Cost</div><div class="card-stat-val">£${escHtml(String(row['Unit Cost']))}</div></div>` : ''}
            ${row['Sales']     ? `<div class="card-stat"><div class="card-stat-label">Sales</div><div class="card-stat-val">${escHtml(String(row['Sales']))}</div></div>` : ''}
            ${row['P.Size eBay & TT'] ? `<div class="card-stat"><div class="card-stat-label">Pack</div><div class="card-stat-val">${escHtml(String(row['P.Size eBay & TT']))}</div></div>` : ''}
          </div>
          <div class="card-platforms">${platforms}</div>
        </div>
      </div>`;
  }).join('');

  const total = filteredData.length;
  document.getElementById('pageInfo').textContent = `${start + 1}–${Math.min(start + perPage, total)} of ${total}`;
  document.getElementById('btnPrev').disabled = currentPage === 1;
  document.getElementById('btnNext').disabled = currentPage >= Math.ceil(total / perPage);
}

window.nextPage = function() { if (currentPage * perPage < filteredData.length) { currentPage++; renderGrid(); } };
window.prevPage = function() { if (currentPage > 1) { currentPage--; renderGrid(); } };

/* ══ DRAWER ══ */
window.openDrawer = function(id) {
  openRow = allData.find(r => r['Opportunity ID'] === id);
  if (!openRow) return;
  activeTab = 'details';
  renderDrawerFull(openRow);
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
};

window.closeDrawer = function() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('visible');
  openRow = null;
};

window.switchTab = function(tab) {
  activeTab = tab;
  if (openRow) renderDrawerFull(openRow);
};

function renderDrawerFull(row) {
  const status = getStatus(row);
  const stageCls   = { listing: 'dsb-listing', veeqo: 'dsb-veeqo', ready: 'dsb-ready' }[status];
  const stageLabel = { listing: 'Need Listing', veeqo: 'Need Veeqo Setup', ready: 'Ready to Publish' }[status];

  /* Hero */
  document.getElementById('drawerHero').innerHTML = `
    <button class="drawer-hero-close" onclick="closeDrawer()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="drawer-stage-badge ${stageCls}">
      <span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;flex-shrink:0;"></span>
      ${stageLabel}
    </div>
    <div class="drawer-product-name">${escHtml(row['Listing Name'] || 'Product')}</div>
    <div class="drawer-product-asin">${escHtml(row['ASINs'] || '—')}</div>
    <div class="drawer-kpi-row">
      <div class="drawer-kpi">
        <div class="drawer-kpi-label">Unit Cost</div>
        <div class="drawer-kpi-val">${row['Unit Cost'] ? '£' + escHtml(String(row['Unit Cost'])) : '—'}</div>
      </div>
      <div class="drawer-kpi">
        <div class="drawer-kpi-label">Sales</div>
        <div class="drawer-kpi-val">${escHtml(String(row['Sales'] || '—'))}</div>
      </div>
      <div class="drawer-kpi">
        <div class="drawer-kpi-label">Pack Size</div>
        <div class="drawer-kpi-val">${escHtml(String(row['P.Size eBay & TT'] || '—'))}</div>
      </div>
    </div>
  `;

  /* Tabs */
  document.getElementById('drawerTabs').innerHTML = [
    tabBtn('details', 'Details', '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'),
    tabBtn('platforms', 'Platforms', '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'),
    tabBtn('fulfilment', 'Fulfilment', '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'),
  ].join('');

  /* Body */
  const id = row['Opportunity ID'];
  let body = '';

  if (activeTab === 'details') {
    body = section('Product Info',
      infoGrid([
        editCard(id, 'Listing Name', row['Listing Name'], 'text'),
        editCard(id, 'ASINs',        row['ASINs'],        'text'),
        editCard(id, 'Unit Cost',    row['Unit Cost'],    'number'),
        editCard(id, 'Sales',        row['Sales'],        'number'),
        editCard(id, 'P.Size eBay & TT', row['P.Size eBay & TT'], 'text'),
      ])
    );
  }

  if (activeTab === 'platforms') {
    body = section('Platform Status',
      `<div class="platform-section-grid">
        ${platCard('Amazon',    row['Amazon'],    'plat-amz',   'AMZ')}
        ${platCard('eBay & TT', row['eBay & TT'], 'plat-ebay',  'eBay')}
        ${platCard('TikTok',    row['TikTok'],    'plat-tt',    'TT')}
        ${platCard('Prime',     row['Prime'],     'plat-prime', '★')}
      </div>`
    ) + section('Update Platforms',
      infoGrid([
        editCard(id, 'Amazon',    row['Amazon'],    'select:Yes,No'),
        editCard(id, 'eBay & TT', row['eBay & TT'], 'select:Yes,No'),
        editCard(id, 'TikTok',    row['TikTok'],    'select:Yes,No'),
        editCard(id, 'Prime',     row['Prime'],     'select:Yes,No'),
      ])
    );
  }

  if (activeTab === 'fulfilment') {
    body = section('Fulfilment Status',
      infoGrid([
        editCard(id, 'Warehouse', row['Warehouse'], 'select:Yes,No'),
        editCard(id, 'Arrived',   row['Arrived'],   'select:Yes,No'),
      ])
    );
  }

  document.getElementById('drawerBody').innerHTML = body;
}

function tabBtn(key, label, icon) {
  return `<button class="drawer-tab ${activeTab === key ? 'active' : ''}" onclick="switchTab('${key}')">${icon}${label}</button>`;
}

function section(title, content) {
  return `<div class="drawer-section"><div class="section-label">${title}</div>${content}</div>`;
}

function infoGrid(cards) {
  return `<div class="info-grid">${cards.join('')}</div>`;
}

function editCard(id, field, value, type) {
  const disp = value === undefined || value === null ? '' : String(value).trim();
  let inp;

  if (type.startsWith('select:')) {
    const opts = type.replace('select:', '').split(',');
    const options = opts.map(o => `<option value="${escAttr(o)}" ${o.toLowerCase() === disp.toLowerCase() ? 'selected' : ''}>${escHtml(o)}</option>`).join('');
    inp = `<select class="edit-select" onchange="saveField('${escAttr(id)}','${escAttr(field)}',this.value)"><option value="">—</option>${options}</select>`;
  } else if (type === 'number') {
    inp = `<input type="number" class="edit-input" value="${escAttr(disp)}" step="0.01" onblur="saveField('${escAttr(id)}','${escAttr(field)}',this.value)">`;
  } else {
    inp = `<input type="text" class="edit-input" value="${escAttr(disp)}" onblur="saveField('${escAttr(id)}','${escAttr(field)}',this.value)">`;
  }

  return `<div class="info-card"><label>${escHtml(field)}</label>${inp}</div>`;
}

function platCard(name, val, colorCls, logo) {
  const on = val === 'Yes';
  return `
    <div class="platform-toggle-card ${on ? 'on' : ''}">
      <div class="plat-icon-box ${colorCls}">${escHtml(logo)}</div>
      <div class="plat-name">${escHtml(name)}</div>
      <div class="plat-status">${on ? '✓ Live' : 'Not set'}</div>
    </div>`;
}

/* ══ SAVE FIELD ══ */
window.saveField = async function(id, field, value) {
  showSave('saving');
  await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'updateListingField', opportunityId: id, field, value })
  });

  const idx = allData.findIndex(r => r['Opportunity ID'] === id);
  if (idx > -1) {
    allData[idx][field] = value;
    if (openRow && openRow['Opportunity ID'] === id) {
      openRow = allData[idx];
      renderDrawerFull(openRow);
    }
  }

  showSave('saved');
  updateStats();
  applyFilters();
};

/* ══ HELPERS ══ */
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ══ INIT ══ */
loadListing();

})();
</script>
