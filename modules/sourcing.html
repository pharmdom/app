<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Sourcing</title>
<link rel="preconnect" href__="https://fonts.googleapis.com">
<link rel="preconnect" href__="https://fonts.gstatic.com" crossorigin>
<link href__="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

/* ───────────────────────────── RESET & BASE ───────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  line-height: 1.5;
}

/* ───────────────────────────── PAGE LAYOUT ───────────────────────────── */
.page-wrapper {
  padding: 28px 32px;
  max-width: 1600px;
  margin: 0 auto;
}

/* ───────────────────────────── HEADER ───────────────────────────── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}

.page-title {
  font-size: 22px;
  font-weight: 700;
  color: #0f172a;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.page-title svg { color: #2563eb; }

/* ───────────────────────────── STATS CHIPS ───────────────────────────── */
.stats-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid transparent;
}

.stat-chip.orange {
  background: #fff7ed;
  color: #c2410c;
  border-color: #fed7aa;
}

.stat-chip.blue {
  background: #eff6ff;
  color: #1d4ed8;
  border-color: #bfdbfe;
}

.stat-chip.green {
  background: #f0fdf4;
  color: #15803d;
  border-color: #bbf7d0;
}

.stat-chip svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ───────────────────────────── TOOLBAR ───────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 340px;
}

.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  width: 16px;
  height: 16px;
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 13.5px;
  font-family: inherit;
  background: #fff;
  color: #0f172a;
  outline: none;
  transition: border-color .15s;
}

.search-input:focus { border-color: #2563eb; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border: none;
  border-radius: 10px;
  font-size: 13.5px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s, transform .1s, box-shadow .15s;
  white-space: nowrap;
}

.btn:active { transform: scale(.97); }

.btn-primary {
  background: #2563eb;
  color: #fff;
  box-shadow: 0 1px 4px rgba(37,99,235,.25);
}

.btn-primary:hover { background: #1d4ed8; }

.btn-ghost {
  background: #f1f5f9;
  color: #475569;
}

.btn-ghost:hover { background: #e2e8f0; }

.btn-sm {
  padding: 6px 12px;
  font-size: 12.5px;
  border-radius: 8px;
}

.btn-danger { background: #fef2f2; color: #dc2626; }
.btn-danger:hover { background: #fee2e2; }

.btn-success { background: #f0fdf4; color: #15803d; }
.btn-success:hover { background: #dcfce7; }

/* ───────────────────────────── TABLE CARD ───────────────────────────── */
.table-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e2e8f0;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}

.table-scroll { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

thead tr {
  background: #f8fafc;
  border-bottom: 2px solid #e2e8f0;
}

th {
  padding: 12px 16px;
  text-align: left;
  font-size: 11.5px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .6px;
  white-space: nowrap;
  user-select: none;
}

th.sortable { cursor: pointer; }
th.sortable:hover { color: #2563eb; }

tbody tr {
  border-bottom: 1px solid #f1f5f9;
  transition: background .1s;
  cursor: pointer;
}

tbody tr:hover { background: #f8fafc; }
tbody tr:last-child { border-bottom: none; }

td {
  padding: 13px 16px;
  font-size: 13.5px;
  color: #1e293b;
  white-space: nowrap;
}

td.muted { color: #94a3b8; }

/* ───────────────────────────── BADGES ───────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
}

.badge-green { background: #dcfce7; color: #15803d; }
.badge-red   { background: #fee2e2; color: #dc2626; }
.badge-gray  { background: #f1f5f9; color: #64748b; }
.badge-blue  { background: #dbeafe; color: #1d4ed8; }
.badge-orange{ background: #fff7ed; color: #c2410c; }

/* ───────────────────────────── PAGINATION ───────────────────────────── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid #f1f5f9;
  flex-wrap: wrap;
  gap: 10px;
}

.page-info {
  font-size: 13px;
  color: #64748b;
}

.page-btns { display: flex; gap: 6px; }

.page-btn {
  padding: 6px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  background: #fff;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  color: #374151;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.page-btn:hover:not(:disabled) { border-color: #2563eb; color: #2563eb; }
.page-btn:disabled { opacity: .4; cursor: default; }

/* ───────────────────────────── DRAWER ───────────────────────────── */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.35);
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(2px);
}

.drawer-overlay.visible {
  opacity: 1;
  pointer-events: all;
}

.drawer {
  position: fixed;
  top: 0;
  right: -560px;
  width: 560px;
  max-width: 96vw;
  height: 100%;
  background: #fff;
  box-shadow: -8px 0 40px rgba(0,0,0,.12);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  transition: right .28s cubic-bezier(.4,0,.2,1);
}

.drawer.open { right: 0; }

.drawer-header {
  padding: 22px 26px 18px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}

.drawer-title {
  font-size: 16px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.3;
}

.drawer-subtitle {
  font-size: 12.5px;
  color: #94a3b8;
  margin-top: 3px;
}

.drawer-close {
  width: 32px;
  height: 32px;
  border: none;
  background: #f1f5f9;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #64748b;
  flex-shrink: 0;
  transition: background .15s;
}

.drawer-close:hover { background: #e2e8f0; color: #0f172a; }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 22px 26px;
}

.drawer-footer {
  padding: 16px 26px;
  border-top: 1px solid #e2e8f0;
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

/* ───────────────────────────── DRAWER SECTIONS ───────────────────────────── */
.section {
  margin-bottom: 24px;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: #94a3b8;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #f1f5f9;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.info-item label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 4px;
}

.info-item .value {
  font-size: 14px;
  color: #1e293b;
  font-weight: 500;
}

.info-item .value.big {
  font-size: 18px;
  font-weight: 700;
  color: #0f172a;
}

.info-item .value.profit { color: #15803d; }
.info-item .value.loss   { color: #dc2626; }

/* ───────────────────────────── NOTES ───────────────────────────── */
.notes-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

.note-item {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 10px 14px;
}

.note-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}

.note-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #dbeafe;
  color: #1d4ed8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.note-author { font-size: 12.5px; font-weight: 600; color: #334155; }
.note-date   { font-size: 11.5px; color: #94a3b8; margin-left: auto; }
.note-text   { font-size: 13px; color: #475569; line-height: 1.5; }

.add-note-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.add-note-input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  resize: none;
  transition: border-color .15s;
  min-height: 36px;
  max-height: 80px;
}

.add-note-input:focus { border-color: #2563eb; }

/* ───────────────────────────── APPROVALS ───────────────────────────── */
.approval-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

.approval-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 10px;
}

.approval-item svg { color: #15803d; flex-shrink: 0; }
.approval-name { font-size: 13px; font-weight: 600; color: #15803d; }
.approval-date { font-size: 11.5px; color: #4ade80; margin-left: auto; }

/* ───────────────────────────── MODAL ───────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  padding: 20px;
  backdrop-filter: blur(3px);
}

.modal-overlay.open { display: flex; }

.modal-box {
  background: #fff;
  border-radius: 18px;
  width: 680px;
  max-width: 100%;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,.18);
  animation: modalIn .2s ease;
}

@keyframes modalIn {
  from { opacity:0; transform: scale(.96) translateY(8px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: 22px 26px 18px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.modal-header h3 {
  font-size: 17px;
  font-weight: 700;
  color: #0f172a;
}

.modal-timer {
  font-size: 13px;
  font-weight: 600;
  color: #2563eb;
  background: #eff6ff;
  padding: 4px 12px;
  border-radius: 100px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 22px 26px;
}

.modal-footer {
  padding: 16px 26px;
  border-top: 1px solid #e2e8f0;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ───────────────────────────── FORM ───────────────────────────── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-grid .full { grid-column: 1 / -1; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

.form-group label {
  font-size: 11.5px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.form-control {
  padding: 9px 12px;
  border: 1.5px solid #e2e8f0;
  border-radius: 9px;
  font-size: 13.5px;
  font-family: inherit;
  color: #0f172a;
  background: #fff;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  width: 100%;
}

.form-control:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}

select.form-control { cursor: pointer; }

.form-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: #94a3b8;
  margin: 18px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #f1f5f9;
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ───────────────────────────── EMPTY STATE ───────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: #94a3b8;
  gap: 10px;
}

.empty-state svg { color: #cbd5e1; }
.empty-state p { font-size: 14px; }

/* ───────────────────────────── LOADING ───────────────────────────── */
.loading-row td {
  padding: 40px;
  text-align: center;
  color: #94a3b8;
}

.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2.5px solid #e2e8f0;
  border-top-color: #2563eb;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ───────────────────────────── TOAST ───────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  background: #0f172a;
  color: #fff;
  border-radius: 12px;
  font-size: 13.5px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
  animation: toastIn .25s ease;
  max-width: 340px;
}

.toast.success { background: #15803d; }
.toast.error   { background: #dc2626; }

@keyframes toastIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ───────────────────────────── MISC ───────────────────────────── */
.roi-positive { color: #15803d; font-weight: 600; }
.roi-negative { color: #dc2626; font-weight: 600; }

.divider { height: 1px; background: #f1f5f9; margin: 16px 0; }

@media (max-width: 640px) {
  .page-wrapper { padding: 16px; }
  .form-grid { grid-template-columns: 1fr; }
  .info-grid  { grid-template-columns: 1fr; }
  .drawer { width: 100%; max-width: 100%; }
}

</style>

<!-- ═══════════════════════════ HTML ═══════════════════════════ -->

<div class="page-wrapper">

  <!-- Header -->
  <div class="page-header">
    <div class="page-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Product Sourcing
    </div>
    <div class="stats-row">
      <div class="stat-chip orange" id="statApproval">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>Loading…</span>
      </div>
      <div class="stat-chip blue" id="statPurchase">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>Loading…</span>
      </div>
      <div class="stat-chip green" id="statTotal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Loading…</span>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search products…">
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Product
    </button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-scroll">
      <table id="sourcingTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Product Name</th>
            <th>Supplier</th>
            <th>Net Profit</th>
            <th>ROI</th>
            <th>Approvals</th>
            <th>Purchase</th>
            <th>Agent</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row"><td colspan="8"><span class="spinner"></span> Loading products…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="page-info" id="pageInfo">–</span>
      <div class="page-btns">
        <button class="page-btn" id="btnPrev" onclick="prevPage()" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Prev
        </button>
        <button class="page-btn" id="btnNext" onclick="nextPage()" disabled>
          Next
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

</div><!-- /page-wrapper -->

<!-- ═══ DRAWER OVERLAY ═══ -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ═══ DRAWER ═══ -->
<div class="drawer" id="detailDrawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawerTitle">Product Details</div>
      <div class="drawer-subtitle" id="drawerSubtitle"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<!-- ═══ ADD MODAL ═══ -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px;margin-right:6px;color:#2563eb"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add New Product
      </h3>
      <div class="modal-timer" id="timerDisplay">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="timerText">00:00</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="form-grid" id="addForm"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Save Product
      </button>
    </div>
  </div>
</div>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ════════════════════════════════ SCRIPT ════════════════════════════════ -->
<script>
/* ─── CONFIG ─── */
// API_URL is declared in the parent shell HTML
// const API_URL = "https://script.google.com/...";

let allData     = [];
let filtered    = [];
let users       = [];
let suppliers   = [];
let currentPage = 1;
const perPage   = 25;
let startTime, timerInterval;
let currentDrawerRow = null;

/* ─── INIT ─── */
async function init() {
  await Promise.all([loadData(), loadUsers(), loadSuppliers()]);
}

/* ─── LOAD DATA ─── */
async function loadData() {
  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"getSourcing"}), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();
    allData  = data.data || [];
    filtered = allData;
    updateStats();
    renderTable();
  } catch(e) {
    showToast("Failed to load data","error");
    document.getElementById("tableBody").innerHTML =
      `<tr class="loading-row"><td colspan="8" style="color:#dc2626">Failed to load. Check your connection.</td></tr>`;
  }
}

async function loadUsers() {
  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"getUsers"}), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();
    users = (data.users || []).map(u => ({ id: u.userId, name: `${u.firstName} ${u.lastName}`.trim() }));
  } catch(e) {}
}

async function loadSuppliers() {
  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"getSuppliers"}), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();
    suppliers = data.suppliers || [];
  } catch(e) {}
}

/* ─── STATS ─── */
function updateStats() {
  const needsApproval = allData.filter(p => !p["Approved"]).length;
  const needsPurchase = allData.filter(p => !p["Purchased"]).length;
  document.getElementById("statApproval").innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>${needsApproval} Need Approval</span>`;
  document.getElementById("statPurchase").innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span>${needsPurchase} To Purchase</span>`;
  document.getElementById("statTotal").innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>${allData.length} Total Products</span>`;
}

/* ─── SEARCH ─── */
document.getElementById("searchInput").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  filtered = allData.filter(p =>
    (p["Product Name"]||"").toLowerCase().includes(q) ||
    (p["Supplier Name"]||"").toLowerCase().includes(q) ||
    (p["Agent"]||"").toLowerCase().includes(q)
  );
  currentPage = 1;
  renderTable();
});

/* ─── TABLE ─── */
function renderTable() {
  const tbody = document.getElementById("tableBody");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      <p>No products found</p>
    </div></td></tr>`;
    document.getElementById("pageInfo").textContent = "0 results";
    document.getElementById("btnPrev").disabled = true;
    document.getElementById("btnNext").disabled = true;
    return;
  }

  const start    = (currentPage - 1) * perPage;
  const pageData = filtered.slice(start, start + perPage);

  tbody.innerHTML = pageData.map(row => {
    const date      = row["Created At"] ? new Date(row["Created At"]).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
    const profit    = row["Net Profit"] ? `<span class="${parseFloat(row["Net Profit"]) >= 0 ? 'roi-positive' : 'roi-negative'}">£${parseFloat(row["Net Profit"]).toFixed(2)}</span>` : '<span class="muted">—</span>';
    const roi       = row["ROI"] ? `<span class="${parseFloat(row["ROI"]) >= 0 ? 'roi-positive' : 'roi-negative'}">${(parseFloat(row["ROI"])*100).toFixed(1)}%</span>` : '<span class="muted">—</span>';
    const approved  = row["Approved"] ? `<span class="badge badge-green">✓ Yes</span>` : `<span class="badge badge-orange">Pending</span>`;
    const purchased = row["Purchased"] ? `<span class="badge badge-blue">✓ Yes</span>` : `<span class="badge badge-gray">No</span>`;
    const agent     = row["Agent"] || "—";
    const supplier  = row["Supplier Name"] || "—";
    const product   = row["Product Name"] || "—";

    return `<tr onclick="openDrawer('${row["Opportunity ID"]}')">
      <td class="muted">${date}</td>
      <td><strong>${product}</strong></td>
      <td>${supplier}</td>
      <td>${profit}</td>
      <td>${roi}</td>
      <td>${approved}</td>
      <td>${purchased}</td>
      <td>${agent}</td>
    </tr>`;
  }).join("");

  const total = filtered.length;
  const pages = Math.ceil(total / perPage);
  document.getElementById("pageInfo").textContent = `Showing ${start+1}–${Math.min(start+perPage, total)} of ${total}`;
  document.getElementById("btnPrev").disabled = currentPage === 1;
  document.getElementById("btnNext").disabled = currentPage >= pages;
}

function nextPage() { if (currentPage * perPage < filtered.length) { currentPage++; renderTable(); } }
function prevPage() { if (currentPage > 1) { currentPage--; renderTable(); } }

/* ─── DRAWER ─── */
function openDrawer(id) {
  const row = allData.find(p => p["Opportunity ID"] === id);
  if (!row) return;
  currentDrawerRow = row;

  const loggedUser = getLoggedUser();
  const approvals  = parseJSON(row["Approvals"], []);
  const notes      = parseJSON(row["Notes"], []);
  const alreadyApproved = approvals.some(a => a.name === loggedUser);

  document.getElementById("drawerTitle").textContent   = row["Product Name"] || "Product Details";
  document.getElementById("drawerSubtitle").textContent = `${row["Opportunity ID"]} · Added ${row["Created At"] ? new Date(row["Created At"]).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : ""}`;

  /* ─ Build sections ─ */
  let html = "";

  // Core Info
  html += section("Core Information", `
    <div class="info-grid">
      ${infoItem("Product Name", row["Product Name"], true)}
      ${infoItem("Supplier", row["Supplier Name"])}
      ${infoItem("Code / SKU", row["Code"])}
      ${infoItem("ASIN(s)", row["ASIN(s)"] || row["ASINs"] || row["Asins"] || "—")}
      ${infoItem("Agent", row["Agent"])}
      ${infoItem("Primary Fulfillment", badgeHtml(row["Primary Fulfillment"]||"—","gray"))}
    </div>`);

  // Financials
  const profitVal = parseFloat(row["Net Profit"]);
  html += section("Financials", `
    <div class="info-grid">
      ${infoItem("Cost of Unit", fmt(row["Cost of Unit"]))}
      ${infoItem("Cost of Sale", fmt(row["Cost of Sale"]))}
      ${infoItem("Net Profit", `<span class="value big ${profitVal>=0?'profit':'loss'}">${fmt(row["Net Profit"])}</span>`)}
      ${infoItem("ROI", `<span class="value big ${profitVal>=0?'profit':'loss'}">${row["ROI"]?(parseFloat(row["ROI"])*100).toFixed(1)+"%":"—"}</span>`)}
      ${infoItem("Unit Quantity", row["Unit Quantity"]||"—")}
      ${infoItem("Total Cost", fmt(row["Total Cost"]||row["Cost"]))}
      ${infoItem("Amount ROI", fmt(row["Amt. ROI"]||row["Amount ROI"]))}
      ${infoItem("After Pack", fmt(row["After Pack"]))}
      ${infoItem("% ROI", row["Percentage ROI"]?(parseFloat(row["Percentage ROI"])*100).toFixed(1)+"%":"—")}
    </div>`);

  // Product Details
  html += section("Product Details", `
    <div class="info-grid">
      ${infoItem("Packing", badgeHtml(row["Packing"]||"—","gray"))}
      ${infoItem("Seasonality", badgeHtml(row["Seasonality"]||"—", row["Seasonality"]==="Yes"?"orange":"gray"))}
      ${infoItem("Competition", badgeHtml(row["Competition"]||"—", row["Competition"]==="High"?"red":row["Competition"]==="Medium"?"orange":"green"))}
      ${infoItem("Supplier Stock", badgeHtml(row["Supplier Stock"]||"—", row["Supplier Stock"]==="Low"?"red":row["Supplier Stock"]==="Medium"?"orange":"green"))}
      ${infoItem("Supplier Cheapest", badgeHtml(row["Supplier Cheapest"]||"—", row["Supplier Cheapest"]==="Yes"?"green":"gray"))}
      ${infoItem("Keepa", row["Keepa"]||"—")}
    </div>`);

  // Approvals
  const approvalItems = approvals.length
    ? approvals.map(a => `<div class="approval-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="approval-name">${a.name}</span>
        <span class="approval-date">${a.date||""}</span>
      </div>`).join("")
    : `<p style="font-size:13px;color:#94a3b8;">No approvals yet.</p>`;

  html += section("Approvals", `
    <div class="approval-list">${approvalItems}</div>
    ${!alreadyApproved ? `<button class="btn btn-success btn-sm" onclick="approveProduct('${id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Approve
    </button>` : `<span class="badge badge-green" style="font-size:12px;">You approved this</span>`}`);

  // Notes
  const noteItems = notes.length
    ? notes.map(n => `<div class="note-item">
        <div class="note-meta">
          <div class="note-avatar">${getInitials(n.name)}</div>
          <span class="note-author">${n.name}</span>
          <span class="note-date">${n.date||""}</span>
        </div>
        <div class="note-text">${escHtml(n.text)}</div>
      </div>`).join("")
    : `<p style="font-size:13px;color:#94a3b8;margin-bottom:10px;">No notes yet.</p>`;

  html += section("Notes", `
    <div class="notes-list">${noteItems}</div>
    <div class="add-note-row">
      <textarea class="add-note-input" id="noteInput" placeholder="Add a note…" rows="1"></textarea>
      <button class="btn btn-primary btn-sm" onclick="addNote('${id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Post
      </button>
    </div>`);

  document.getElementById("drawerBody").innerHTML = html;
  document.getElementById("drawerFooter").innerHTML = `
    <button class="btn btn-ghost" onclick="closeDrawer()" style="flex:1">Close</button>`;

  document.getElementById("detailDrawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("visible");
}

function closeDrawer() {
  document.getElementById("detailDrawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("visible");
  currentDrawerRow = null;
}

/* ─── APPROVE ─── */
async function approveProduct(id) {
  const row         = allData.find(p => p["Opportunity ID"] === id);
  const loggedUser  = getLoggedUser();
  const approvals   = parseJSON(row["Approvals"], []);

  if (approvals.some(a => a.name === loggedUser)) {
    showToast("You already approved this product","error"); return;
  }

  approvals.push({ name: loggedUser, date: new Date().toLocaleDateString("en-GB") });
  const payload = {
    action: "updateSourcing",
    opportunityId: id,
    field: "Approvals",
    value: JSON.stringify(approvals),
    approvedBy: approvals.map(a=>a.name).join(", "),
    approved: approvals.length > 0
  };

  await fetch(API_URL, { method:"POST", body:JSON.stringify(payload), headers:{"Content-Type":"text/plain"} });
  showToast("Approved successfully","success");
  await loadData();
  openDrawer(id);
}

/* ─── ADD NOTE ─── */
async function addNote(id) {
  const noteInput  = document.getElementById("noteInput");
  const text       = noteInput.value.trim();
  if (!text) return;

  const row       = allData.find(p => p["Opportunity ID"] === id);
  const loggedUser= getLoggedUser();
  const notes     = parseJSON(row["Notes"], []);

  notes.push({ name: loggedUser, text, date: new Date().toLocaleDateString("en-GB") });

  await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({ action:"updateSourcing", opportunityId:id, field:"Notes", value:JSON.stringify(notes) }),
    headers:{"Content-Type":"text/plain"}
  });
  showToast("Note added","success");
  await loadData();
  openDrawer(id);
}

/* ─── ADD MODAL ─── */
function openAddModal() {
  document.getElementById("addModal").classList.add("open");
  startTime = Date.now();
  startTimer();
  buildAddForm();
}

function closeModal() {
  document.getElementById("addModal").classList.remove("open");
  clearInterval(timerInterval);
}

function startTimer() {
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timerText").textContent = formatTime(s);
  }, 1000);
}

function formatTime(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

async function saveProduct() {
  const productName = document.getElementById("f_productName").value.trim();
  if (!productName) { showToast("Product name is required","error"); return; }

  const loggedUser = getLoggedUser();
  const notesText  = document.getElementById("f_notes").value.trim();
  const notesArr   = notesText ? JSON.stringify([{ name:loggedUser, text:notesText, date: new Date().toLocaleDateString("en-GB") }]) : "[]";

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.innerHTML = `<span class="spinner" style="width:13px;height:13px;border-width:2px;margin-right:6px"></span> Saving…`;

  const seconds = Math.floor((Date.now() - startTime) / 1000);

  const payload = {
    action:             "saveSourcing",
    agent:              document.getElementById("f_agent").value,
    supplierName:       document.getElementById("f_supplierName").value,
    code:               document.getElementById("f_code").value,
    productName,
    asins:              document.getElementById("f_asins").value,
    costOfUnit:         document.getElementById("f_costOfUnit").value,
    costOfSale:         document.getElementById("f_costOfSale").value,
    netProfit:          document.getElementById("f_netProfit").value,
    keepa:              document.getElementById("f_keepa").value,
    primaryFulfillment: document.getElementById("f_primaryFulfillment").value,
    supplierCheapest:   document.getElementById("f_supplierCheapest").value,
    notes:              notesArr,
    unitQuantity:       document.getElementById("f_unitQuantity").value,
    packing:            document.getElementById("f_packing").value,
    seasonality:        document.getElementById("f_seasonality").value,
    competition:        document.getElementById("f_competition").value,
    supplierStock:      document.getElementById("f_supplierStock").value,
    purchased:          document.getElementById("f_purchased").value === "Yes",
    approved:           false,
    approvedBy:         "",
    approvals:          "[]"
  };

  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify(payload), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();

    if (data.opportunityId) {
      await fetch(API_URL, {
        method:"POST",
        body: JSON.stringify({ action:"logSourcingTime", opportunityId:data.opportunityId, agent:payload.agent, supplierName:payload.supplierName, productName:payload.productName, seconds, formatted:formatTime(seconds) }),
        headers:{"Content-Type":"text/plain"}
      });
    }

    showToast("Product saved successfully","success");
    closeModal();
    await loadData();
  } catch(e) {
    showToast("Failed to save product","error");
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Save Product`;
  }
}

/* ─── HELPERS ─── */
function getLoggedUser() {
  try { return JSON.parse(localStorage.getItem("user") || "{}").firstName + " " + JSON.parse(localStorage.getItem("user") || "{}").lastName; }
  catch(e) { return "Unknown"; }
}

function parseJSON(val, fallback) {
  if (!val || val === "" || val === "false") return fallback;
  try { return JSON.parse(val); } catch(e) { return fallback; }
}

function fmt(val) {
  const n = parseFloat(val);
  return isNaN(n) ? "—" : `£${n.toFixed(2)}`;
}

function getInitials(name) {
  return (name||"?").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
}

function escHtml(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function escAttr(str) {
  return String(str||"").replace(/"/g,"&quot;");
}

function badgeHtml(val, color) {
  const map = { green:"badge-green", red:"badge-red", gray:"badge-gray", blue:"badge-blue", orange:"badge-orange" };
  return `<span class="badge ${map[color]||"badge-gray"}">${escHtml(val)}</span>`;
}

function section(title, content) {
  return `<div class="section">
    <div class="section-title">${escHtml(title)}</div>
    ${content}
  </div>`;
}

function infoItem(label, value, big) {
  const disp = (value === undefined || value === null || value === "") ? "—" : value;
  return `<div class="info-item">
    <label>${escHtml(label)}</label>
    <div class="value${big?" big":""}">
      ${typeof disp === "string" && disp.startsWith("<") ? disp : escHtml(String(disp))}
    </div>
  </div>`;
}

function showToast(msg, type) {
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className = `toast ${type||""}`;
  const icons = {
    success: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    error:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    "":      `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
  };
  t.innerHTML = (icons[type||""]||"") + escHtml(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

/* ─── START ─── */
init();

</script>
