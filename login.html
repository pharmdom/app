<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Pharm & Dom</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png">
  <link rel="preconnect" href__="https://fonts.googleapis.com">
  <link rel="preconnect" href__="https://fonts.gstatic.com" crossorigin>
  <link href__="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #060912;
      --text: #f0f4ff;
      --text-dim: rgba(240, 244, 255, 0.55);
      --text-muted: rgba(240, 244, 255, 0.3);
      --blue: #3b6ef8;
      --blue-glow: rgba(59, 110, 248, 0.35);
      --blue-soft: rgba(59, 110, 248, 0.12);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --success: #22c55e;
      --error: #f87171;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--ink);
      color: var(--text);
      display: flex;
      align-items: stretch;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
.panel-left { 
  flex: 1;
  display: flex; 
  flex-direction: column; 
  justify-content: flex-start; 
  padding: 40px 40px 80px 40px; 
}

    @media (min-width: 900px) {
      .panel-left { display: flex; flex-direction: column; justify-content: space-between; padding: 40px; }
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 50%, rgba(59, 110, 248, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 20%, rgba(99, 60, 240, 0.12) 0%, transparent 70%),
        linear-gradient(160deg, #0b0f1e 0%, #060912 100%);
    }

    .mesh {
      position: absolute;
      inset: 0;
      opacity: 0.4;
      background-image:
        linear-gradient(rgba(59,110,248,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,110,248,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      animation: drift 18s ease-in-out infinite;
    }

    .orb-1 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(59,110,248,0.3), transparent 70%);
      top: -80px; left: -80px;
    }

    .orb-2 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(99,60,240,0.2), transparent 70%);
      bottom: 10%; right: 10%;
      animation-delay: -9s;
    }

    .orb-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(14,165,233,0.15), transparent 70%);
      top: 45%; left: 40%;
      animation-delay: -4s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -25px); }
      66% { transform: translate(-20px, 20px); }
    }

    .left-content { position: relative; z-index: 2; }

    .left-logo { display: flex; align-items: center; gap: 14px; }

    .left-logo img {
      width: 44px; height: 44px;
      object-fit: contain;
      filter: brightness(1.1);
    }

    .left-logo-text { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }

    .left-logo-text span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .left-bottom { 
      position: relative; 
      z-index: 2; 
      position: relative;
      z-index: 2;
      margin-top: auto;
      margin-bottom: 80px;
                 }

    .left-headline {
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 300;
      line-height: 1.25;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 40px;
    }

    .left-headline strong {
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, rgba(59,110,248,0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

.left-subtext {
  font-size: 15px;
  color: var(--text-dim);
  white-space: nowrap;
}

    .left-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
    }

    .pill {
      padding: 9px 18px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 9px;
      transition: all 0.3s ease;
    }

    .pill:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      color: var(--text);
    }

    .pill-icon {
      font-size: 15px;
      line-height: 1;
    }

    /* Amazon orange dot */
    .pill-amazon .pill-dot { background: #ff9900; box-shadow: 0 0 8px rgba(255,153,0,0.7); }
    /* eBay multicolor — use red as representative */
    .pill-ebay .pill-dot { background: #e53238; box-shadow: 0 0 8px rgba(229,50,56,0.7); }
    /* TikTok cyan/pink — use teal */
    .pill-tiktok .pill-dot { background: #69c9d0; box-shadow: 0 0 8px rgba(105,201,208,0.7); }

    .pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .divider {
      display: none;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
    }

    @media (min-width: 900px) { .divider { display: block; } }

    /* ── RIGHT PANEL ── */
    .panel-right {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      background: rgba(255,255,255,0.01);
    }
    
@media (min-width: 900px) {
  .panel-right {
    flex: 0 0 620px;   /* Fixed width */
    max-width: 620px;
    padding: 70px 70px;
  }
}

    /* Mobile brand */
    .mobile-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }

    @media (min-width: 900px) { .mobile-brand { display: none; } }

    .mobile-brand img {
      width: 60px; height: 60px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    .mobile-brand h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }

    .mobile-brand p {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }

    /* Form area */
    .form-area {
      width: 100%;
      max-width: 380px;
      opacity: 0;
      transform: translateY(24px);
      animation: riseIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
    }

    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .form-header { margin-bottom: 36px; }

    .form-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-eyebrow::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--blue-soft), transparent);
    }

    .form-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.2;
      color: #fff;
    }

    .form-subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* Fields */
    .field { margin-bottom: 20px; }

    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .field-label label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(240,244,255,0.75);
      letter-spacing: 0.2px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg.icon-left {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .field:focus-within .input-wrap svg.icon-left { color: var(--blue); }
    .field:focus-within .field-label label { color: var(--text); }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 15px 46px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-appearance: none;
    }

    input::placeholder { color: var(--text-muted); }

    input:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    input:focus {
      outline: none;
      background: rgba(59,110,248,0.06);
      border-color: rgba(59,110,248,0.5);
      box-shadow: 0 0 0 3px rgba(59,110,248,0.1), inset 0 1px 2px rgba(0,0,0,0.2);
    }

    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px #0d1628 inset;
      -webkit-text-fill-color: #f0f4ff;
      caret-color: #f0f4ff;
      border-color: var(--border);
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .eye-btn:hover { color: var(--text-dim); background: rgba(255,255,255,0.05); }

    .field.has-error input {
      border-color: rgba(248, 113, 113, 0.5);
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 45%, 75% { transform: translateX(-5px); }
      30%, 60%, 90% { transform: translateX(5px); }
    }

    .field-error-msg {
      display: none;
      font-size: 12px;
      color: var(--error);
      margin-top: 6px;
      padding-left: 4px;
    }

    .field.has-error .field-error-msg { display: block; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      margin-top: 28px;
      padding: 17px;
      border: none;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: -0.2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(59,110,248,0.28), 0 1px 0 rgba(255,255,255,0.1) inset;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    }

    .btn-submit:hover {
      background: #4c7df9;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59,110,248,0.42);
    }

    .btn-submit:active { transform: translateY(0); }

    .btn-inner {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 22px;
    }

    .btn-label { transition: all 0.3s ease; }

    .btn-loader {
      position: absolute;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.3s ease;
    }

    .btn-check {
      position: absolute;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-submit.is-loading { pointer-events: none; background: rgba(59,110,248,0.7); }
    .btn-submit.is-loading .btn-label { opacity: 0; transform: scale(0.8); }
    .btn-submit.is-loading .btn-loader { opacity: 1; transform: scale(1); animation: spin 0.75s linear infinite; }

    .btn-submit.is-success { background: var(--success); pointer-events: none; box-shadow: 0 4px 20px rgba(34,197,94,0.3); }
    .btn-submit.is-success .btn-label,
    .btn-submit.is-success .btn-loader { opacity: 0; transform: scale(0.5); }
    .btn-submit.is-success .btn-check { opacity: 1; transform: scale(1); }

    @keyframes spin { to { transform: rotate(360deg); } }

    .form-footer {
      margin-top: 28px;
      text-align: center;
    }

    .form-footer p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ── TOAST ── */
    .toast-stack {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 10px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(20px);
      max-width: 380px;
    }

    .toast.is-visible { opacity: 1; transform: translateY(0) scale(1); }
    .toast.is-hiding { opacity: 0; transform: translateY(8px) scale(0.94); transition: all 0.35s ease; }

    .toast-error {
      background: rgba(30, 10, 10, 0.92);
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: #fecaca;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .toast-success {
      background: rgba(5, 25, 15, 0.92);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #bbf7d0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .toast-icon-wrap {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toast-error .toast-icon-wrap { background: rgba(248,113,113,0.15); }
    .toast-success .toast-icon-wrap { background: rgba(34,197,94,0.15); }

    @media (max-width: 899px) {
      .panel-right { min-height: 100vh; }
      .toast-stack { bottom: 20px; left: 16px; right: 16px; transform: none; }
      .toast { max-width: none; white-space: normal; }
    }
  </style>
</head>

<body>

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="left-content">
      <div class="left-logo">
        <img src="https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png" alt="Pharm & Dom">
        <div>
          <div class="left-logo-text">Pharm & Dom </div>
        </div>
      </div>
    </div>

    <div class="left-bottom">
      <h2 class="left-headline">Everything ops,<br><strong>all in one place.</strong></h2>
      <p class="left-subtext">Manage, track, and move fast — for the Pharm & Dom team.</p>
      <div class="left-pills">
        <div class="pill pill-amazon">
          <span class="pill-dot"></span>
          <span class="pill-icon"></span> Amazon
        </div>
        <div class="pill pill-ebay">
          <span class="pill-dot"></span>
          <span class="pill-icon"></span> eBay
        </div>
        <div class="pill pill-tiktok">
          <span class="pill-dot"></span>
          <span class="pill-icon"></span> TikTok
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">

    <div class="mobile-brand">
      <img src="https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png" alt="Pharm & Dom">
      <h2>Pharm & Dom</h2>
      <p>Operations System</p>
    </div>

    <div class="form-area">
      <div class="form-header">
        <h1 class="form-title">Welcome back 👋</h1>
        <p class="form-subtitle">Sign in to your account to continue</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

        <div class="field" id="fieldEmail">
          <div class="field-label">
            <label for="email">Email address</label>
          </div>
          <div class="input-wrap">
            <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="email" placeholder="you@pharmdom.com" autocomplete="email">
          </div>
          <div class="field-error-msg" id="emailErr">Please enter a valid email address</div>
        </div>

        <div class="field" id="fieldPassword">
          <div class="field-label">
            <label for="password">Password</label>
          </div>
          <div class="input-wrap">
            <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="eye-btn" onclick="togglePwd()" aria-label="Show/hide password">
              <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-error-msg" id="passwordErr">Password is required</div>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">
          <div class="btn-inner">
            <span class="btn-label">Sign In</span>
            <div class="btn-loader"></div>
            <svg class="btn-check" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </button>

      </form>

      <div class="form-footer">
      </div>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxN7boYXLeNiwUj63BH1XOd-MhNRaAc0LIxoTuQK2ml-GCkePbPV2iCKceFGVjDxh26/exec";

    const session = sessionStorage.getItem("user");
    if (session) routeByRole(JSON.parse(session).role);

    function routeByRole(role) {
      const map = {
        "Admin": "admin",
        "Digital Ops": "digital-ops",
        "Warehouse": "warehouse"
      };
      window.location.href = map[role] || "login";
    }

    function togglePwd() {
      const inp = document.getElementById("password");
      const icon = document.getElementById("eyeIcon");
      const isHidden = inp.type === "password";
      inp.type = isHidden ? "text" : "password";
      icon.innerHTML = isHidden
        ? `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>`
        : `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>`;
    }

    function toast(msg, type = "error") {
      const stack = document.getElementById("toastStack");
      const el = document.createElement("div");
      const isErr = type === "error";
      el.className = `toast toast-${type}`;
      el.innerHTML = `
        <div class="toast-icon-wrap">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            ${isErr
              ? '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'
              : '<polyline points="20 6 9 17 4 12"/>'}
          </svg>
        </div>
        <span>${msg}</span>`;
      stack.appendChild(el);
      requestAnimationFrame(() => el.classList.add("is-visible"));
      setTimeout(() => {
        el.classList.add("is-hiding");
        setTimeout(() => el.remove(), 350);
      }, 4200);
    }

    function setError(fieldId, errId, message) {
      const f = document.getElementById(fieldId);
      const e = document.getElementById(errId);
      f.classList.add("has-error");
      e.textContent = message;
      f.querySelector("input").addEventListener("input", () => f.classList.remove("has-error"), { once: true });
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("loginBtn");

      ["fieldEmail", "fieldPassword"].forEach(id => document.getElementById(id).classList.remove("has-error"));

      let valid = true;
      if (!email) { setError("fieldEmail", "emailErr", "Email address is required"); valid = false; }
      else if (!/\S+@\S+\.\S+/.test(email)) { setError("fieldEmail", "emailErr", "Please enter a valid email"); valid = false; }
      if (!password) { setError("fieldPassword", "passwordErr", "Password is required"); valid = false; }
      if (!valid) return;

      btn.classList.add("is-loading");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "login", email, password }),
          headers: { "Content-Type": "text/plain" }
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem("user", JSON.stringify(data.user));
          btn.classList.remove("is-loading");
          btn.classList.add("is-success");
          toast("Access granted. Redirecting…", "success");
          setTimeout(() => routeByRole(data.user.role), 1100);
        } else {
          btn.classList.remove("is-loading");
          setError("fieldEmail", "emailErr", " ");
          setError("fieldPassword", "passwordErr", " ");
          toast(data.message || "Invalid credentials. Please try again.");
        }
      } catch {
        btn.classList.remove("is-loading");
        toast("Connection error. Please try again.");
      }
    }
  </script>
</body>
</html>
