<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Sourcing</title>
<link rel="preconnect" href__="https://fonts.googleapis.com">
<link rel="preconnect" href__="https://fonts.gstatic.com" crossorigin>
<link href__="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  line-height: 1.5;
  overflow-x: hidden;
}

.page-wrapper {
  padding: 24px 28px;
  max-width: 100%;
}

/* ── HEADER ── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.stats-row { display: flex; gap: 8px; flex-wrap: wrap; }

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 12.5px;
  font-weight: 600;
  border: 1px solid transparent;
}
.stat-chip.orange { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }
.stat-chip.blue   { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
.stat-chip.green  { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
.stat-chip svg { width:13px; height:13px; flex-shrink:0; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.search-wrap { position:relative; flex:1; min-width:180px; max-width:300px; }
.search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#94a3b8; width:15px; height:15px; pointer-events:none; }
.search-input {
  width:100%; padding:8px 10px 8px 33px;
  border:1.5px solid #e2e8f0; border-radius:9px;
  font-size:13px; font-family:inherit; background:#fff; color:#0f172a; outline:none;
  transition:border-color .15s;
}
.search-input:focus { border-color:#2563eb; }

/* ── FILTERS ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.filter-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1.5px solid #e2e8f0;
  border-radius: 9px;
  background: #fff;
  font-size: 12.5px;
  font-weight: 600;
  font-family: inherit;
  color: #64748b;
  cursor: pointer;
  transition: all .15s;
}
.filter-toggle-btn:hover { border-color: #2563eb; color: #2563eb; }
.filter-toggle-btn.active { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
.filter-toggle-btn svg { width:13px; height:13px; }
.filter-toggle-btn .dot {
  width: 6px; height: 6px; border-radius: 50%; background: #2563eb;
}

.filter-pills {
  display: none;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-pills.open { display: flex; }

.filter-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  background: #fff;
  font-size: 12px;
  font-family: inherit;
  color: #475569;
  cursor: pointer;
  transition: all .15s;
  font-weight: 500;
  white-space: nowrap;
}
.filter-pill:hover { border-color: #94a3b8; }
.filter-pill.has-value { border-color: #2563eb; color: #1d4ed8; background: #eff6ff; }

.filter-select {
  padding: 5px 8px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 12px;
  font-family: inherit;
  color: #0f172a;
  background: #fff;
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
  max-width: 130px;
}
.filter-select:focus { border-color: #2563eb; }
.filter-select.has-value { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; font-weight: 600; }

.filter-clear-btn {
  display: none;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border: none;
  border-radius: 8px;
  background: #fee2e2;
  color: #dc2626;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
}
.filter-clear-btn.visible { display: inline-flex; }
.filter-clear-btn:hover { background: #fecaca; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; border: none; border-radius: 9px;
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background .15s, transform .1s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary { background:#2563eb; color:#fff; box-shadow:0 1px 4px rgba(37,99,235,.25); }
.btn-primary:hover { background:#1d4ed8; }
.btn-ghost { background:#f1f5f9; color:#475569; }
.btn-ghost:hover { background:#e2e8f0; }
.btn-sm { padding:5px 11px; font-size:12px; border-radius:7px; }
.btn-success { background:#f0fdf4; color:#15803d; border:1.5px solid #bbf7d0; }
.btn-success:hover { background:#dcfce7; }
.btn-outline { background:#fff; color:#374151; border:1.5px solid #e2e8f0; }
.btn-outline:hover { border-color:#94a3b8; }

/* ── TABLE ── */
.table-card {
  background:#fff; border-radius:14px; border:1px solid #e2e8f0;
  overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,.05);
}

table { width:100%; border-collapse:collapse; table-layout:fixed; }

thead tr { background:#f8fafc; border-bottom:2px solid #e2e8f0; }

th {
  padding:11px 14px; text-align:left;
  font-size:11px; font-weight:700; color:#64748b;
  text-transform:uppercase; letter-spacing:.6px;
  white-space:nowrap; user-select:none; overflow:hidden; text-overflow:ellipsis;
}

tbody tr { border-bottom:1px solid #f1f5f9; transition:background .1s; cursor:pointer; }
tbody tr:hover { background:#f8fafc; }
tbody tr:last-child { border-bottom:none; }

td { padding:12px 14px; font-size:13px; color:#1e293b; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
td.muted { color:#94a3b8; }

/* Column widths */
table colgroup col:nth-child(1) { width: 100px; }
table colgroup col:nth-child(2) { width: 28%; }
table colgroup col:nth-child(3) { width: 18%; }
table colgroup col:nth-child(4) { width: 100px; }
table colgroup col:nth-child(5) { width: 70px; }
table colgroup col:nth-child(6) { width: 90px; }
table colgroup col:nth-child(7) { width: 90px; }
table colgroup col:nth-child(8) { width: 15%; }

/* ── BADGES ── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:100px; font-size:11.5px; font-weight:600; }
.badge-green  { background:#dcfce7; color:#15803d; }
.badge-red    { background:#fee2e2; color:#dc2626; }
.badge-gray   { background:#f1f5f9; color:#64748b; }
.badge-blue   { background:#dbeafe; color:#1d4ed8; }
.badge-orange { background:#fff7ed; color:#c2410c; }
.badge-purple { background:#f3e8ff; color:#7c3aed; }

/* ── PAGINATION ── */
.pagination { display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-top:1px solid #f1f5f9; flex-wrap:wrap; gap:8px; }
.page-info { font-size:12.5px; color:#64748b; }
.page-btns { display:flex; gap:5px; }
.page-btn { padding:5px 12px; border:1.5px solid #e2e8f0; border-radius:7px; background:#fff; font-size:12.5px; font-weight:500; font-family:inherit; color:#374151; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:4px; }
.page-btn:hover:not(:disabled) { border-color:#2563eb; color:#2563eb; }
.page-btn:disabled { opacity:.4; cursor:default; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay { position:fixed; inset:0; background:rgba(15,23,42,.3); z-index:900; opacity:0; pointer-events:none; transition:opacity .25s; backdrop-filter:blur(2px); }
.drawer-overlay.visible { opacity:1; pointer-events:all; }

/* ── DRAWER ── */
.drawer {
  position:fixed; top:0; right:-600px; width:600px; max-width:97vw;
  height:100%; background:#fff; box-shadow:-8px 0 40px rgba(0,0,0,.12);
  z-index:1000; display:flex; flex-direction:column;
  transition:right .28s cubic-bezier(.4,0,.2,1);
}
.drawer.open { right:0; }

.drawer-header {
  padding: 0;
  flex-shrink: 0;
}

.drawer-hero {
  padding: 20px 24px 16px;
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: #fff;
  position: relative;
  overflow: hidden;
}

.drawer-hero::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,.04);
}

.drawer-hero-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 30px; height: 30px;
  border: none; border-radius: 7px;
  background: rgba(255,255,255,.12);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.7);
  transition: background .15s;
}
.drawer-hero-close:hover { background: rgba(255,255,255,.2); color: #fff; }

.drawer-product-name {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  padding-right: 40px;
  line-height: 1.3;
}

.drawer-product-meta {
  font-size: 12px;
  color: rgba(255,255,255,.5);
  margin-bottom: 16px;
}

.drawer-kpi-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.drawer-kpi {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  padding: 10px 12px;
}

.drawer-kpi-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: rgba(255,255,255,.45);
  margin-bottom: 4px;
}

.drawer-kpi-value {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}

.drawer-kpi-value.positive { color: #4ade80; }
.drawer-kpi-value.negative { color: #f87171; }

.drawer-tabs {
  display: flex;
  border-bottom: 1px solid #e2e8f0;
  background: #fff;
  flex-shrink: 0;
  overflow-x: auto;
}

.drawer-tab {
  padding: 12px 18px;
  font-size: 12.5px;
  font-weight: 600;
  font-family: inherit;
  color: #64748b;
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.drawer-tab svg { width: 13px; height: 13px; }
.drawer-tab:hover { color: #0f172a; }
.drawer-tab.active { color: #2563eb; border-bottom-color: #2563eb; }

.drawer-body { flex:1; overflow-y:auto; padding:20px 24px; }
.drawer-footer { padding:14px 24px; border-top:1px solid #e2e8f0; display:flex; gap:8px; flex-shrink:0; }

/* ── TAB PANES ── */
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── SECTION HEADERS ── */
.section { margin-bottom: 22px; }
.section-label {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: #94a3b8;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.section-label::after { content:''; flex:1; height:1px; background:#f1f5f9; }

/* ── INFO GRID ── */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.info-grid.three { grid-template-columns:1fr 1fr 1fr; }

.info-card {
  background: #f8fafc;
  border: 1px solid #f1f5f9;
  border-radius: 10px;
  padding: 11px 13px;
}
.info-card label {
  display: flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 600; color: #94a3b8;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px;
}
.info-card label svg { width:11px; height:11px; flex-shrink:0; }
.info-card .val { font-size:13.5px; color:#1e293b; font-weight:500; }
.info-card .val.editable-field { cursor:pointer; }
.info-card .val.editable-field:hover { color:#2563eb; }

.edit-input, .edit-select {
  width: 100%;
  padding: 5px 8px;
  border: 1.5px solid #2563eb;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  color: #0f172a;
  background: #fff;
  outline: none;
}

/* ── NOTES ── */
.notes-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.note-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:10px 13px; }
.note-meta { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
.note-avatar { width:24px; height:24px; border-radius:50%; background:#dbeafe; color:#1d4ed8; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
.note-author { font-size:12.5px; font-weight:600; color:#334155; }
.note-date   { font-size:11px; color:#94a3b8; margin-left:auto; }
.note-text   { font-size:13px; color:#475569; line-height:1.5; }

.add-note-wrap { margin-top: 10px; }
.add-note-box {
  display: flex; gap: 8px;
  padding: 10px;
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  transition: border-color .15s;
}
.add-note-box:focus-within { border-color: #2563eb; background: #fff; }
.add-note-input {
  flex:1; border:none; background:none; outline:none;
  font-size:13px; font-family:inherit; resize:none;
  min-height:32px; max-height:80px; color:#0f172a;
}

/* ── APPROVALS ── */
.approval-list { display:flex; flex-direction:column; gap:7px; margin-bottom:12px; }
.approval-item { display:flex; align-items:center; gap:10px; padding:10px 13px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; }
.approval-item svg { color:#15803d; flex-shrink:0; }
.approval-name { font-size:13px; font-weight:600; color:#15803d; }
.approval-date { font-size:11px; color:#86efac; margin-left:auto; }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(15,23,42,.5);
  display:none; align-items:center; justify-content:center;
  z-index:2000; padding:16px; backdrop-filter:blur(4px);
}
.modal-overlay.open { display:flex; }

.modal-box {
  background:#fff; border-radius:16px; width:640px; max-width:100%;
  max-height:82vh; display:flex; flex-direction:column;
  box-shadow:0 32px 80px rgba(0,0,0,.22);
  animation:modalIn .2s ease;
}
@keyframes modalIn { from{opacity:0;transform:scale(.96) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }

.modal-header {
  padding:16px 22px 14px;
  border-bottom:1px solid #e2e8f0;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
  background: linear-gradient(to right, #fafbff, #fff);
}

.modal-header-left { display:flex; align-items:center; gap:10px; }
.modal-header-icon {
  width:34px; height:34px; border-radius:9px;
  background:#eff6ff; display:flex; align-items:center; justify-content:center;
  color:#2563eb;
}

.modal-header h3 { font-size:15px; font-weight:700; color:#0f172a; }
.modal-header-sub { font-size:11.5px; color:#94a3b8; margin-top:1px; }

.modal-timer { font-size:12px; font-weight:600; color:#2563eb; background:#eff6ff; padding:4px 11px; border-radius:100px; display:flex; align-items:center; gap:5px; }

.modal-body { flex:1; overflow-y:auto; padding:18px 22px; }
.modal-footer { padding:13px 22px; border-top:1px solid #e2e8f0; display:flex; justify-content:flex-end; gap:8px; flex-shrink:0; }

/* ── FORM ── */
.form-section {
  margin-bottom: 18px;
}
.form-section-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: #94a3b8;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid #f1f5f9;
}
.form-section-title svg { width:12px; height:12px; flex-shrink:0; }

.form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-grid2 .full { grid-column:1/-1; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.5px; }

.form-control {
  padding:8px 11px; border:1.5px solid #e2e8f0; border-radius:8px;
  font-size:13px; font-family:inherit; color:#0f172a; background:#fff; outline:none;
  transition:border-color .15s, box-shadow .15s; width:100%;
}
.form-control:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.08); }
select.form-control { cursor:pointer; }

/* ── EMPTY / LOADING ── */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:50px 20px; color:#94a3b8; gap:8px; }
.loading-row td { padding:40px; text-align:center; color:#94a3b8; }
.spinner { display:inline-block; width:16px; height:16px; border:2.5px solid #e2e8f0; border-top-color:#2563eb; border-radius:50%; animation:spin .65s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── TOAST ── */
.toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:7px; }
.toast { display:flex; align-items:center; gap:9px; padding:11px 16px; background:#0f172a; color:#fff; border-radius:10px; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,.18); animation:toastIn .2s ease; max-width:320px; }
.toast.success { background:#15803d; }
.toast.error   { background:#dc2626; }
@keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.roi-positive { color:#15803d; font-weight:600; }
.roi-negative { color:#dc2626; font-weight:600; }

@media (max-width:640px) {
  .page-wrapper { padding:12px; }
  .form-grid2 { grid-template-columns:1fr; }
  .info-grid  { grid-template-columns:1fr; }
  .drawer { width:100%; max-width:100%; }
  .drawer-kpi-row { grid-template-columns:1fr 1fr; }
}

</style>

<!-- ══════════════ HTML ══════════════ -->

<div class="page-wrapper">

  <!-- Header: stats only -->
  <div class="page-header">
    <div class="stats-row">
      <div class="stat-chip orange" id="statApproval">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>Loading…</span>
      </div>
      <div class="stat-chip blue" id="statPurchase">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>Loading…</span>
      </div>
      <div class="stat-chip green" id="statTotal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Loading…</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Product
    </button>
  </div>

  <!-- Toolbar: search + filters -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search products…">
    </div>
    <button class="filter-toggle-btn" id="filterToggleBtn" onclick="toggleFilters()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
      Filters
      <span class="dot" id="filterDot" style="display:none"></span>
    </button>
  </div>

  <!-- Filter pills row (collapsed by default) -->
  <div class="filter-bar">
    <div class="filter-pills" id="filterPills">
      <select class="filter-select" id="fPurchased" onchange="applyFilters()">
        <option value="">Purchased: All</option>
        <option value="yes">Purchased: Yes</option>
        <option value="no">Purchased: No</option>
      </select>
      <select class="filter-select" id="fApproved" onchange="applyFilters()">
        <option value="">Approved: All</option>
        <option value="yes">Approved: Yes</option>
        <option value="no">Approved: Pending</option>
      </select>
      <select class="filter-select" id="fPacking" onchange="applyFilters()">
        <option value="">Packing: All</option>
        <option>Fast</option>
        <option>Good</option>
        <option>Medium</option>
        <option>Large</option>
      </select>
      <select class="filter-select" id="fSeasonality" onchange="applyFilters()">
        <option value="">Seasonality: All</option>
        <option>Yes</option>
        <option>No</option>
      </select>
      <select class="filter-select" id="fCompetition" onchange="applyFilters()">
        <option value="">Competition: All</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>
      <select class="filter-select" id="fSupplierStock" onchange="applyFilters()">
        <option value="">Stock: All</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>
      <button class="filter-clear-btn" id="filterClearBtn" onclick="clearFilters()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Clear
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table id="sourcingTable">
      <colgroup>
        <col><col><col><col><col><col><col><col>
      </colgroup>
      <thead>
        <tr>
          <th>Date</th>
          <th>Product Name</th>
          <th>Supplier</th>
          <th>Net Profit</th>
          <th>ROI</th>
          <th>Approvals</th>
          <th>Purchase</th>
          <th>Agent</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="loading-row"><td colspan="8"><span class="spinner"></span> Loading products…</td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <span class="page-info" id="pageInfo">–</span>
      <div class="page-btns">
        <button class="page-btn" id="btnPrev" onclick="prevPage()" disabled>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Prev
        </button>
        <button class="page-btn" id="btnNext" onclick="nextPage()" disabled>
          Next
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

</div><!-- /page-wrapper -->

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-header-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div>
          <div class="modal-header h3" style="font-size:15px;font-weight:700;color:#0f172a;">Add New Product</div>
          <div class="modal-header-sub">Fill in the details below</div>
        </div>
      </div>
      <div class="modal-timer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="timerText">00:00</span>
      </div>
    </div>
    <div class="modal-body" id="addForm"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Save Product
      </button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>

  (function() {
 
/* ═══════════════════════════ STATE ═══════════════════════════ */
let allData = [], filtered = [], users = [], suppliers = [];
let currentPage = 1;
const perPage = 25;
let startTime, timerInterval;
let currentDrawerRow = null;
let activeTab = 'overview';

/* ═══════════════════════════ INIT ═══════════════════════════ */
async function init() {
  await Promise.all([loadData(), loadUsers(), loadSuppliers()]);
}

/* ═══════════════════════════ DATA ═══════════════════════════ */
async function loadData() {
  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"getSourcing"}), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();
    allData  = data.data || [];
    applyFilters();
    updateStats();
  } catch(e) {
    showToast("Failed to load data","error");
    document.getElementById("tableBody").innerHTML = `<tr class="loading-row"><td colspan="8" style="color:#dc2626">Failed to load. Check your connection.</td></tr>`;
  }
}

async function loadUsers() {
  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"getUsers"}), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();
    users = (data.users||[]).map(u => ({ id:u.userId, name:`${u.firstName} ${u.lastName}`.trim() }));
  } catch(e) {}
}

async function loadSuppliers() {
  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"getSuppliers"}), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();
    suppliers = data.suppliers || [];
  } catch(e) {}
}

/* ═══════════════════════════ STATS ═══════════════════════════ */
function updateStats() {
  const needsApproval = allData.filter(p => !p["Approved"]).length;
  const needsPurchase = allData.filter(p => !p["Purchased"]).length;
  document.getElementById("statApproval").innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>${needsApproval} Need Approval</span>`;
  document.getElementById("statPurchase").innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span>${needsPurchase} To Purchase</span>`;
  document.getElementById("statTotal").innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>${allData.length} Total</span>`;
}

/* ═══════════════════════════ SEARCH ═══════════════════════════ */
document.getElementById("searchInput").addEventListener("input", function() {
  currentPage = 1;
  applyFilters();
});

/* ═══════════════════════════ FILTERS ═══════════════════════════ */
function toggleFilters() {
  const pills = document.getElementById("filterPills");
  const btn   = document.getElementById("filterToggleBtn");
  const open  = pills.classList.toggle("open");
  btn.classList.toggle("active", open);
}

function applyFilters() {
  const q          = document.getElementById("searchInput").value.toLowerCase();
  const fPurchased = document.getElementById("fPurchased").value;
  const fApproved  = document.getElementById("fApproved").value;
  const fPacking   = document.getElementById("fPacking").value;
  const fSeason    = document.getElementById("fSeasonality").value;
  const fComp      = document.getElementById("fCompetition").value;
  const fStock     = document.getElementById("fSupplierStock").value;

  filtered = allData.filter(p => {
    if (q && !(
      (p["Product Name"]||"").toLowerCase().includes(q) ||
      (p["Supplier Name"]||"").toLowerCase().includes(q) ||
      (p["Agent"]||"").toLowerCase().includes(q)
    )) return false;
    if (fPurchased === "yes" && !p["Purchased"]) return false;
    if (fPurchased === "no"  &&  p["Purchased"]) return false;
    if (fApproved  === "yes" && !p["Approved"])  return false;
    if (fApproved  === "no"  &&  p["Approved"])  return false;
    if (fPacking   && p["Packing"]        !== fPacking)   return false;
    if (fSeason    && p["Seasonality"]    !== fSeason)    return false;
    if (fComp      && p["Competition"]    !== fComp)      return false;
    if (fStock     && p["Supplier Stock"] !== fStock)     return false;
    return true;
  });

  // Highlight active filters
  const anyActive = fPurchased || fApproved || fPacking || fSeason || fComp || fStock;
  document.getElementById("filterDot").style.display = anyActive ? "inline-block" : "none";
  document.getElementById("filterClearBtn").classList.toggle("visible", !!anyActive);

  ["fPurchased","fApproved","fPacking","fSeasonality","fCompetition","fSupplierStock"].forEach(id => {
    const el = document.getElementById(id);
    el.classList.toggle("has-value", !!el.value);
  });

  currentPage = 1;
  renderTable();
}

function clearFilters() {
  ["fPurchased","fApproved","fPacking","fSeasonality","fCompetition","fSupplierStock"].forEach(id => {
    document.getElementById(id).value = "";
    document.getElementById(id).classList.remove("has-value");
  });
  document.getElementById("filterDot").style.display = "none";
  document.getElementById("filterClearBtn").classList.remove("visible");
  applyFilters();
}

/* ═══════════════════════════ TABLE ═══════════════════════════ */
function renderTable() {
  const tbody = document.getElementById("tableBody");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No products match</p></div></td></tr>`;
    document.getElementById("pageInfo").textContent = "0 results";
    document.getElementById("btnPrev").disabled = true;
    document.getElementById("btnNext").disabled = true;
    return;
  }

  const start    = (currentPage - 1) * perPage;
  const pageData = filtered.slice(start, start + perPage);

  tbody.innerHTML = pageData.map(row => {
    const date      = row["Created At"] ? new Date(row["Created At"]).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
    const profitN   = parseFloat(row["Net Profit"]);
    const roiN      = parseFloat(row["ROI"]);
    const profit    = !isNaN(profitN) ? `<span class="${profitN>=0?'roi-positive':'roi-negative'}">£${profitN.toFixed(2)}</span>` : `<span class="muted">—</span>`;
    const roi       = !isNaN(roiN)    ? `<span class="${roiN>=0?'roi-positive':'roi-negative'}">${(roiN*100).toFixed(1)}%</span>`    : `<span class="muted">—</span>`;
    const approved  = row["Approved"]  ? `<span class="badge badge-green">✓ Yes</span>` : `<span class="badge badge-orange">Pending</span>`;
    const purchased = row["Purchased"] ? `<span class="badge badge-blue">✓ Yes</span>`  : `<span class="badge badge-gray">No</span>`;
    return `<tr onclick="openDrawer('${escAttr(row["Opportunity ID"])}')">
      <td class="muted">${date}</td>
      <td><strong>${escHtml(row["Product Name"]||"—")}</strong></td>
      <td>${escHtml(row["Supplier Name"]||"—")}</td>
      <td>${profit}</td>
      <td>${roi}</td>
      <td>${approved}</td>
      <td>${purchased}</td>
      <td>${escHtml(row["Agent"]||"—")}</td>
    </tr>`;
  }).join("");

  const total = filtered.length, pages = Math.ceil(total/perPage);
  document.getElementById("pageInfo").textContent = `Showing ${start+1}–${Math.min(start+perPage,total)} of ${total}`;
  document.getElementById("btnPrev").disabled = currentPage === 1;
  document.getElementById("btnNext").disabled = currentPage >= pages;
}

function nextPage() { if(currentPage*perPage<filtered.length){currentPage++;renderTable();} }
function prevPage() { if(currentPage>1){currentPage--;renderTable();} }

/* ═══════════════════════════ DRAWER ═══════════════════════════ */
function openDrawer(id) {
  const row = allData.find(p => p["Opportunity ID"] === id);
  if (!row) return;
  currentDrawerRow = row;
  activeTab = 'overview';
  renderDrawer(row);
  document.getElementById("detailDrawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("visible");
}

function renderDrawer(row) {
  const id         = row["Opportunity ID"];
  const loggedUser = getLoggedUser();
  const approvals  = parseJSON(row["Approvals"], []);
  const notes      = parseJSON(row["Notes"], []);
  const alreadyApproved = approvals.some(a => a.name === loggedUser);
  const profitN    = parseFloat(row["Net Profit"]);
  const roiN       = parseFloat(row["ROI"]);

  // ── HERO HEADER ──
  document.getElementById("drawerHeader").innerHTML = `
    <div class="drawer-hero">
      <button class="drawer-hero-close" onclick="closeDrawer()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="drawer-product-name">${escHtml(row["Product Name"]||"Product Details")}</div>
      <div class="drawer-product-meta">${escHtml(id)} · ${row["Supplier Name"]||""} · Added ${row["Created At"]?new Date(row["Created At"]).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):""}</div>
      <div class="drawer-kpi-row">
        <div class="drawer-kpi">
          <div class="drawer-kpi-label">Net Profit</div>
          <div class="drawer-kpi-value ${!isNaN(profitN)?(profitN>=0?'positive':'negative'):''}">
            ${!isNaN(profitN)?'£'+profitN.toFixed(2):'—'}
          </div>
        </div>
        <div class="drawer-kpi">
          <div class="drawer-kpi-label">ROI</div>
          <div class="drawer-kpi-value ${!isNaN(roiN)?(roiN>=0?'positive':'negative'):''}">
            ${!isNaN(roiN)?(roiN*100).toFixed(1)+'%':'—'}
          </div>
        </div>
        <div class="drawer-kpi">
          <div class="drawer-kpi-label">Qty</div>
          <div class="drawer-kpi-value">${row["Unit Quantity"]||'—'}</div>
        </div>
      </div>
    </div>
    <div class="drawer-tabs">
      <button class="drawer-tab ${activeTab==='overview'?'active':''}" onclick="switchTab('overview','${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="drawer-tab ${activeTab==='financials'?'active':''}" onclick="switchTab('financials','${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Financials
      </button>
      <button class="drawer-tab ${activeTab==='attributes'?'active':''}" onclick="switchTab('attributes','${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Attributes
      </button>
      <button class="drawer-tab ${activeTab==='notes'?'active':''}" onclick="switchTab('notes','${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Notes ${notes.length?`<span class="badge badge-blue" style="font-size:10px;padding:1px 6px;">${notes.length}</span>`:''}
      </button>
      <button class="drawer-tab ${activeTab==='approvals'?'active':''}" onclick="switchTab('approvals','${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Approvals ${approvals.length?`<span class="badge badge-green" style="font-size:10px;padding:1px 6px;">${approvals.length}</span>`:''}
      </button>
    </div>`;

  // ── BODY ──
  let body = '';

  if (activeTab === 'overview') {
    body = `
      <div class="section">
        <div class="section-label">Product Info</div>
        <div class="info-grid">
          ${editCard(id,"Product Name",row["Product Name"],"text",true)}
          ${editCard(id,"Supplier Name",row["Supplier Name"],"supplier",true)}
          ${editCard(id,"Code",row["Code"],"text",true)}
          ${editCard(id,"ASIN(s)",row["ASIN(s)"]||row["ASINs"]||row["Asins"]||"","text",true,"ASIN(s)")}
          ${editCard(id,"Agent",row["Agent"],"user",true)}
          ${editCard(id,"Primary Fulfillment",row["Primary Fulfillment"],"select:FBM,FBA",true)}
          ${editCard(id,"Purchased",row["Purchased"]?"Yes":"No","select:Yes,No",true)}
        </div>
      </div>
      <div class="section">
        <div class="section-label">Supplier</div>
        <div class="info-grid">
          ${editCard(id,"Supplier Cheapest",row["Supplier Cheapest"],"select:Yes,No",true)}
          ${editCard(id,"Keepa",row["Keepa"]||"","text",true)}
        </div>
      </div>`;
  }

  if (activeTab === 'financials') {
    body = `
      <div class="section">
        <div class="section-label">Inputs</div>
        <div class="info-grid">
          ${editCard(id,"Cost of Unit",fmt(row["Cost of Unit"]),"number",true)}
          ${editCard(id,"Cost of Sale",fmt(row["Cost of Sale"]),"number",true)}
          ${editCard(id,"Net Profit",fmt(row["Net Profit"]),"number",true)}
          ${editCard(id,"Unit Quantity",row["Unit Quantity"]||"","number",true)}
        </div>
      </div>
      <div class="section">
        <div class="section-label">Calculated (auto)</div>
        <div class="info-grid">
          ${staticCard("ROI", !isNaN(roiN)?(roiN*100).toFixed(1)+'%':'—', !isNaN(roiN)&&roiN>=0?'roi-positive':'roi-negative')}
          ${staticCard("Total Cost", fmt(row["Total Cost"]||row["Cost"]))}
          ${staticCard("Amount ROI", fmt(row["Amt. ROI"]||row["Amount ROI"]))}
          ${staticCard("After Pack", fmt(row["After Pack"]))}
          ${staticCard("% ROI", row["Percentage ROI"]?(parseFloat(row["Percentage ROI"])*100).toFixed(1)+'%':'—')}
        </div>
      </div>`;
  }

  if (activeTab === 'attributes') {
    body = `
      <div class="section">
        <div class="section-label">Product Attributes</div>
        <div class="info-grid">
          ${editCard(id,"Packing",row["Packing"],"select:Fast,Good,Medium,Large",true)}
          ${editCard(id,"Seasonality",row["Seasonality"],"select:Yes,No",true)}
          ${editCard(id,"Competition",row["Competition"],"select:Low,Medium,High",true)}
          ${editCard(id,"Supplier Stock",row["Supplier Stock"],"select:Low,Medium,High",true)}
        </div>
      </div>`;
  }

  if (activeTab === 'notes') {
    const noteItems = notes.length
      ? notes.map(n => `<div class="note-item">
          <div class="note-meta">
            <div class="note-avatar">${getInitials(n.name)}</div>
            <span class="note-author">${escHtml(n.name)}</span>
            <span class="note-date">${n.date||""}</span>
          </div>
          <div class="note-text">${escHtml(n.text)}</div>
        </div>`).join("")
      : `<p style="font-size:13px;color:#94a3b8;margin-bottom:12px;">No notes yet. Be the first.</p>`;

    body = `
      <div class="section">
        <div class="section-label">Thread</div>
        <div class="notes-list">${noteItems}</div>
        <div class="add-note-wrap">
          <div class="add-note-box">
            <div class="note-avatar" style="align-self:flex-start;margin-top:2px;flex-shrink:0">${initials(getLoggedUser())}</div>
            <textarea class="add-note-input" id="noteInput" placeholder="Write a note…" rows="2"></textarea>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:8px;">
            <button class="btn btn-primary btn-sm" onclick="addNote('${id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Post Note
            </button>
          </div>
        </div>
      </div>`;
  }

  if (activeTab === 'approvals') {
    const approvalItems = approvals.length
      ? approvals.map(a => `<div class="approval-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <div class="note-avatar" style="background:#d1fae5;color:#15803d;flex-shrink:0">${initials(a.name)}</div>
          <span class="approval-name">${escHtml(a.name)}</span>
          <span class="approval-date">${a.date||""}</span>
        </div>`).join("")
      : `<p style="font-size:13px;color:#94a3b8;margin-bottom:12px;">No approvals yet.</p>`;

    body = `
      <div class="section">

        ${!alreadyApproved
          ? `<button class="btn btn-success" onclick="approveProduct('${id}')">

  document.getElementById("drawerFooter").innerHTML = `<button class="btn btn-outline" onclick="closeDrawer()" style="flex:1">Close</button>`;

/* ─── EDITABLE CARDS ─── */
function editCard(id, field, value, type, editable, sheetKey) {
  const key   = sheetKey || field;
  const disp  = (value === undefined || value === null || value === "") ? "—" : value;
  const safeId = field.replace(/[\s()\/\.]/g,"_");

  let icon = fieldIcon(field);

  if (!editable) return staticCard(field, disp);

  let inputHtml = '';
  if (type === "supplier") {
    const opts = suppliers.map(s => `<option value="${escAttr(s.name)}" ${s.name===value?"selected":""}>${escHtml(s.name)}</option>`).join("");
    inputHtml = `<select class="edit-select" onchange="saveFieldUpdate('${escAttr(id)}','${escAttr(key)}',this.value)"><option value="">—</option>${opts}</select>`;
  } else if (type === "user") {
    const opts = users.map(u => `<option value="${escAttr(u.name)}" ${u.name===value?"selected":""}>${escHtml(u.name)}</option>`).join("");
    inputHtml = `<select class="edit-select" onchange="saveFieldUpdate('${escAttr(id)}','${escAttr(key)}',this.value)"><option value="">—</option>${opts}</select>`;
  } else if (type.startsWith("select:")) {
    const options = type.replace("select:","").split(",");
    const opts = options.map(o => `<option value="${escAttr(o)}" ${o===value?"selected":""}>${escHtml(o)}</option>`).join("");
    inputHtml = `<select class="edit-select" onchange="saveFieldUpdate('${escAttr(id)}','${escAttr(key)}',this.value)"><option value="">—</option>${opts}</select>`;
  } else if (type === "number") {
    const numVal = parseFloat(value);
    inputHtml = `<input type="number" class="edit-input" value="${isNaN(numVal)?'':numVal}" step="0.01" onblur="saveFieldUpdate('${escAttr(id)}','${escAttr(key)}',this.value)">`;
  } else {
    inputHtml = `<input type="text" class="edit-input" value="${escAttr(String(disp==='—'?'':disp))}" onblur="saveFieldUpdate('${escAttr(id)}','${escAttr(key)}',this.value)">`;
  }

  return `<div class="info-card">
    <label>${icon}${escHtml(field)}</label>
    ${inputHtml}
  </div>`;
}

function staticCard(label, value, extraClass) {
  return `<div class="info-card">
    <label>${fieldIcon(label)}${escHtml(label)}</label>
    <div class="val ${extraClass||''}">${escHtml(String(value||"—"))}</div>
  </div>`;
}

async function saveFieldUpdate(opportunityId, field, value) {
  await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({ action:"updateSourcing", opportunityId, field, value }),
    headers:{"Content-Type":"text/plain"}
  });
  // Update local data
  const idx = allData.findIndex(p => p["Opportunity ID"] === opportunityId);
  if (idx > -1) allData[idx][field] = value;
  showToast("Saved","success");
  updateStats();
  renderTable();
}

/* ═══════════════════════════ APPROVE ═══════════════════════════ */
async function approveProduct(id) {
  const row        = allData.find(p => p["Opportunity ID"] === id);
  const loggedUser = getLoggedUser();
  const approvals  = parseJSON(row["Approvals"], []);
  if (approvals.some(a => a.name === loggedUser)) { showToast("Already approved","error"); return; }

  approvals.push({ name: loggedUser, date: new Date().toLocaleDateString("en-GB") });
  const payload = {
    action: "updateSourcing", opportunityId: id,
    field: "Approvals", value: JSON.stringify(approvals),
    approvedBy: approvals.map(a=>a.name).join(", "),
    approved: true
  };
  await fetch(API_URL, { method:"POST", body:JSON.stringify(payload), headers:{"Content-Type":"text/plain"} });
  allData.find(p=>p["Opportunity ID"]===id)["Approvals"] = JSON.stringify(approvals);
  allData.find(p=>p["Opportunity ID"]===id)["Approved"]  = true;
  showToast("Approved successfully","success");
  activeTab = 'approvals';
  renderDrawer(allData.find(p=>p["Opportunity ID"]===id));
  updateStats(); renderTable();
}

/* ═══════════════════════════ NOTES ═══════════════════════════ */
async function addNote(id) {
  const noteInput  = document.getElementById("noteInput");
  const text       = noteInput.value.trim();
  if (!text) { showToast("Please write something","error"); return; }
  const row        = allData.find(p => p["Opportunity ID"] === id);
  const loggedUser = getLoggedUser();
  const notes      = parseJSON(row["Notes"], []);
  notes.push({ name: loggedUser, text, date: new Date().toLocaleDateString("en-GB") });
  await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({ action:"updateSourcing", opportunityId:id, field:"Notes", value:JSON.stringify(notes) }),
    headers:{"Content-Type":"text/plain"}
  });
  allData.find(p=>p["Opportunity ID"]===id)["Notes"] = JSON.stringify(notes);
  showToast("Note added","success");
  activeTab = 'notes';
  renderDrawer(allData.find(p=>p["Opportunity ID"]===id));
}

async function saveProduct() {
  const productName = document.getElementById("f_productName").value.trim();
  if (!productName) { showToast("Product name is required","error"); return; }

  const loggedUser = getLoggedUser();
  const notesText  = document.getElementById("f_notes").value.trim();
  const notesArr   = notesText ? JSON.stringify([{name:loggedUser,text:notesText,date:new Date().toLocaleDateString("en-GB")}]) : "[]";

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.innerHTML = `<span class="spinner" style="width:12px;height:12px;border-width:2px;margin-right:5px"></span> Saving…`;

  const seconds = Math.floor((Date.now()-startTime)/1000);
  const payload = {
    action:"saveSourcing",
    agent: document.getElementById("f_agent").value,
    supplierName: document.getElementById("f_supplierName").value,
    code: document.getElementById("f_code").value,
    productName,
    asins: document.getElementById("f_asins").value,
    costOfUnit: document.getElementById("f_costOfUnit").value,
    costOfSale: document.getElementById("f_costOfSale").value,
    netProfit: document.getElementById("f_netProfit").value,
    keepa: document.getElementById("f_keepa").value,
    primaryFulfillment: document.getElementById("f_primaryFulfillment").value,
    supplierCheapest: document.getElementById("f_supplierCheapest").value,
    notes: notesArr,
    unitQuantity: document.getElementById("f_unitQuantity").value,
    packing: document.getElementById("f_packing").value,
    seasonality: document.getElementById("f_seasonality").value,
    competition: document.getElementById("f_competition").value,
    supplierStock: document.getElementById("f_supplierStock").value,
    purchased: document.getElementById("f_purchased").value === "Yes",
    approved: false, approvedBy: "", approvals: "[]"
  };

  try {
    const res  = await fetch(API_URL, { method:"POST", body:JSON.stringify(payload), headers:{"Content-Type":"text/plain"} });
    const data = await res.json();
    if (data.opportunityId) {
      await fetch(API_URL, { method:"POST", body:JSON.stringify({action:"logSourcingTime",opportunityId:data.opportunityId,agent:payload.agent,supplierName:payload.supplierName,productName:payload.productName,seconds,formatted:formatTime(seconds)}), headers:{"Content-Type":"text/plain"} });
    }
    showToast("Product saved","success");
    closeModal();
    await loadData();
  } catch(e) {
    showToast("Failed to save","error");
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Save Product`;
  }
}

/* ═══════════════════════════ HELPERS ═══════════════════════════ */
function getLoggedUser() {
  try {
    const u = JSON.parse(localStorage.getItem("user")||"{}");
    const name = `${u.firstName||""} ${u.lastName||""}`.trim();
    return name || "Unknown";
  } catch(e) { return "Unknown"; }
}

function parseJSON(val, fallback) {
  if (!val || val === "" || val === "false") return fallback;
  try { return JSON.parse(val); } catch(e) { return fallback; }
}

function fmt(val) {
  const n = parseFloat(val);
  return isNaN(n) ? "—" : `£${n.toFixed(2)}`;
}

function getInitials(name) {
  return (name||"?").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
}

function escHtml(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function escAttr(str) {
  return String(str||"").replace(/"/g,"&quot;");
}

function showToast(msg, type) {
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className = `toast ${type||""}`;
  const icons = {
    success:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    error:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    "":`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>`
  };
  t.innerHTML = (icons[type||""]||"") + escHtml(msg);
  c.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
