<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px; color: #0f172a; background: #f8fafc;
  line-height: 1.5; height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased;
}

.content-wrap { overflow-x: hidden; }

.sup-page {
  padding: 5px 10px 15px 10px;
  max-width: 100%; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ─── HEADER ── */
.sup-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; flex-shrink: 0; }
.sup-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.sup-search-wrap { position: relative; }
.sup-search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 14px; height: 14px; pointer-events: none; }
.sup-search-input { padding: 7px 10px 7px 32px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; background: #fff; color: #0f172a; outline: none; transition: border-color .15s; width: 240px; }
.sup-search-input:focus { border-color: #2563eb; }
.sup-chip { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569; white-space: nowrap; }
.sup-chip svg { width: 12px; height: 12px; flex-shrink: 0; }
.sup-add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: #0f172a; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .15s; white-space: nowrap; }
.sup-add-btn:hover { background: #1e293b; }
.sup-add-btn svg { width: 13px; height: 13px; }

/* ─── TABLE CARD ── */
.sup-table-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; flex: 1; display: flex; flex-direction: column; min-height: 0; }
.sup-table-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0; }
.sup-table-scroll::-webkit-scrollbar { width: 4px; }
.sup-table-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.sup-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
.sup-table thead { position: sticky; top: 0; z-index: 2; }
.sup-table th { background: #f8fafc; padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
.sup-table td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sup-table tbody tr { transition: background .1s; cursor: pointer; }
.sup-table tbody tr:hover td { background: #f8fbff; }
.sup-table tbody tr:last-child td { border-bottom: none; }

.col-avatar   { width: 56px; }
.col-supplier { width: auto; }
.col-rank     { width: 80px; }
.col-price    { width: 140px; }
.col-moq      { width: 120px; }
.col-card     { width: 80px; }
.col-contact  { width: 150px; }
.col-whatsapp { width: 140px; }

/* Avatar */
.sup-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; letter-spacing: .3px; flex-shrink: 0; text-transform: uppercase; }
.sup-name-cell { display: flex; align-items: center; gap: 10px; }
.sup-name-text { font-weight: 700; color: #0f172a; font-size: 13px; }
.sup-code-text { font-size: 10px; color: #94a3b8; font-family: 'SF Mono', monospace; margin-top: 1px; }

.rank-pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.rank-1 { background: #fef9c3; color: #854d0e; }
.rank-2 { background: #e0e7ff; color: #3730a3; }
.rank-3 { background: #fce7f3; color: #9d174d; }
.rank-other { background: #f1f5f9; color: #475569; }

.bool-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 100px; font-size: 11px; font-weight: 700; }
.bool-yes { background: #dcfce7; color: #15803d; }
.bool-no  { background: #fee2e2; color: #dc2626; }

.sup-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 10px; color: #94a3b8; text-align: center; }
.sup-empty svg { opacity: .3; }
.sup-empty p { font-size: 13px; font-weight: 600; color: #64748b; }
.sup-empty span { font-size: 12px; }
.spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .65s linear infinite; }
.spinner.sm { width: 13px; height: 13px; border-width: 2px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── DRAWER OVERLAY ── */
.sup-drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 900; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(2px); }
.sup-drawer-overlay.visible { opacity: 1; pointer-events: all; }

/* ─── DRAWER ── */
.sup-drawer { position: fixed; top: 0; right: 0; width: 580px; max-width: 97vw; height: 100vh; background: #fff; box-shadow: -8px 0 40px rgba(0,0,0,.13); z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); overflow: hidden; }
.sup-drawer.open { transform: translateX(0); }
.sup-drawer-hero { padding: 16px 20px 14px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); position: relative; overflow: hidden; flex-shrink: 0; }
.sup-drawer-hero::before { content: ''; position: absolute; top: -50px; right: -50px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,.03); }
.sup-drawer-hero::after  { content: ''; position: absolute; bottom: -25px; left: 30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(37,99,235,.1); }
.sup-drawer-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); transition: background .15s; z-index: 1; }
.sup-drawer-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.sup-drawer-close svg { width: 13px; height: 13px; }
.sup-hero-avatar-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; position: relative; z-index: 1; padding-right: 40px; }
.sup-hero-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; flex-shrink: 0; }
.sup-hero-name { font-size: 16px; font-weight: 800; color: #fff; line-height: 1.25; }
.sup-hero-code { font-size: 10px; color: rgba(255,255,255,.4); font-family: 'SF Mono', monospace; margin-top: 2px; }
.sup-hero-kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; position: relative; z-index: 1; }
.sup-hero-kpi { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); border-radius: 9px; padding: 8px 10px; }
.sup-hero-kpi-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: rgba(255,255,255,.4); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
.sup-hero-kpi-label svg { width: 10px; height: 10px; flex-shrink: 0; }
.sup-hero-kpi-val { font-size: 14px; font-weight: 700; color: #fff; line-height: 1; }
.sup-drawer-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.sup-drawer-tabs::-webkit-scrollbar { display: none; }
.sup-drawer-tab { padding: 9px 14px; font-size: 12px; font-weight: 700; font-family: inherit; color: #64748b; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.sup-drawer-tab svg { width: 13px; height: 13px; }
.sup-drawer-tab:hover { color: #334155; }
.sup-drawer-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #fafcff; }
.sup-drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 0; }
.sup-drawer-body::-webkit-scrollbar { width: 4px; }
.sup-drawer-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.sup-drawer-footer { padding: 8px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; align-items: center; justify-content: space-between; flex-shrink: 0; background: #fafafa; }
.sup-drawer-footer-hint { font-size: 11px; color: #94a3b8; }

/* ─── SECTIONS ── */
.sup-section { margin-bottom: 20px; }
.sup-sec-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.sup-sec-label::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }

/* ─── FIELD CARDS ── */
.sup-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sup-field { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 10px 13px; transition: border-color .15s; }
.sup-field:focus-within { border-color: #93c5fd; }
.sup-field.span2 { grid-column: span 2; }
.sup-field label { display: flex; align-items: center; gap: 5px; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #94a3b8; margin-bottom: 6px; }
.sup-field label svg { width: 13px; height: 13px; opacity: .7; flex-shrink: 0; color: #94a3b8; }
.sup-field input, .sup-field select, .sup-field textarea { width: 100%; padding: 5px 0; border: none; outline: none; font-size: 13px; font-family: inherit; color: #0f172a; background: transparent; resize: none; }
.sup-field select { appearance: auto; cursor: pointer; }
.sup-field textarea { min-height: 60px; }
.sup-field select.val-yes { color: #15803d; font-weight: 700; }
.sup-field select.val-no  { color: #dc2626; font-weight: 700; }

/* ─── NOTES ── */
.sup-notes-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.sup-note-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 11px 14px; }
.sup-note-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.sup-note-avatar { width: 28px; height: 28px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.sup-note-author { font-size: 12.5px; font-weight: 600; color: #334155; }
.sup-note-date { font-size: 11px; color: #94a3b8; margin-left: auto; }
.sup-note-text { font-size: 13px; color: #475569; line-height: 1.55; }
.sup-note-composer { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; transition: border-color .15s; margin-top: 14px; }
.sup-note-composer:focus-within { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.06); }
.sup-note-composer-top { padding: 10px 14px 6px; }
.sup-note-who { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.sup-note-who-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.sup-note-user-select { flex: 1; padding: 5px 9px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 12.5px; font-family: inherit; color: #0f172a; background: #fff; outline: none; cursor: pointer; transition: border-color .15s; }
.sup-note-user-select:focus { border-color: #2563eb; }
.sup-note-textarea { width: 100%; border: none; outline: none; resize: none; background: transparent; font-size: 13px; font-family: inherit; color: #0f172a; line-height: 1.55; min-height: 56px; max-height: 100px; padding: 0; }
.sup-note-composer-bottom { display: flex; align-items: center; justify-content: flex-end; padding: 8px 14px 10px; border-top: 1px solid #f1f5f9; background: #fafafa; gap: 8px; }
.sup-note-hint { font-size: 11px; color: #cbd5e1; margin-right: auto; }

/* ─── BUTTONS ── */
.sup-del-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1.5px solid #fecdd3; border-radius: 9px; background: #fff1f2; color: #be123c; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; }
.sup-del-btn:hover { background: #ffe4e6; border-color: #f9a8d4; }
.sup-del-btn svg { width: 13px; height: 13px; }
.sup-save-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; background: #0f172a; color: #fff; border: none; border-radius: 9px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .15s; }
.sup-save-btn:hover { background: #1e293b; }
.sup-save-btn.loading { opacity: .65; pointer-events: none; }
.sup-save-btn svg { width: 13px; height: 13px; }
.sup-cancel-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px; background: #fff; color: #64748b; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .15s; }
.sup-cancel-btn:hover { border-color: #94a3b8; color: #334155; }

/* ─── ADD SUPPLIER MODAL ── */
.sup-modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1050; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .22s; backdrop-filter: blur(3px); }
.sup-modal-overlay.visible { opacity: 1; pointer-events: all; }
.sup-modal { background: #fff; border-radius: 18px; box-shadow: 0 25px 60px rgba(0,0,0,.22); width: 620px; max-width: 96vw; max-height: 60vh; display: flex; flex-direction: column; transform: translateY(12px); transition: transform .22s; }
.sup-modal-overlay.visible .sup-modal { transform: translateY(0); }
.sup-modal-hero { padding: 16px 22px 14px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 18px 18px 0 0; position: relative; overflow: hidden; flex-shrink: 0; }
.sup-modal-hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,.03); }
.sup-modal-hero::after  { content: ''; position: absolute; bottom: -20px; left: 24px; width: 80px; height: 80px; border-radius: 50%; background: rgba(37,99,235,.12); }
.sup-modal-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); transition: background .15s; z-index: 1; }
.sup-modal-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.sup-modal-close svg { width: 13px; height: 13px; }
.sup-modal-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; margin-bottom: 6px; font-size: 10px; font-weight: 700; letter-spacing: .3px; background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.3); color: #60a5fa; position: relative; z-index: 1; }
.sup-modal-title { font-size: 16px; font-weight: 800; color: #fff; position: relative; z-index: 1; }
.sup-modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; min-height: 0; }
.sup-modal-body::-webkit-scrollbar { width: 4px; }
.sup-modal-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.sup-modal-footer { padding: 12px 22px; border-top: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: flex-end; gap: 8px; background: #fafafa; border-radius: 0 0 18px 18px; flex-shrink: 0; }

/* ─── DELETE CONFIRM ── */
.sup-confirm-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); z-index: 1100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .18s; backdrop-filter: blur(3px); }
.sup-confirm-overlay.visible { opacity: 1; pointer-events: all; }
.sup-confirm-box { background: #fff; border-radius: 14px; padding: 24px; width: 360px; max-width: 90vw; box-shadow: 0 20px 50px rgba(0,0,0,.15); }
.sup-confirm-icon { width: 44px; height: 44px; border-radius: 12px; background: #fef2f2; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.sup-confirm-icon svg { width: 20px; height: 20px; color: #dc2626; }
.sup-confirm-title { font-size: 15px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
.sup-confirm-desc { font-size: 13px; color: #64748b; margin-bottom: 20px; line-height: 1.5; }
.sup-confirm-btns { display: flex; gap: 8px; justify-content: flex-end; }
.sup-confirm-cancel { padding: 8px 16px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; color: #64748b; background: #fff; cursor: pointer; }
.sup-confirm-del { padding: 8px 16px; background: #dc2626; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
.sup-confirm-del:hover { background: #b91c1c; }

/* ─── TOAST ── */
.sup-toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
.sup-toast { display: flex; align-items: center; gap: 9px; padding: 10px 14px; background: #0f172a; color: #fff; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.18); animation: toastIn .2s ease; max-width: 300px; pointer-events: auto; }
.sup-toast.success { background: #15803d; }
.sup-toast.error   { background: #dc2626; }
.sup-toast.loading { background: #1e40af; }
.sup-toast.info    { background: #1e40af; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 900px) { .sup-drawer { width: 92vw; } }
@media (max-width: 640px) {
  .sup-search-input { width: 160px; }
  .sup-info-grid { grid-template-columns: 1fr; }
  .sup-field.span2 { grid-column: span 1; }
  .sup-drawer { width: 100%; max-width: 100%; }
  .sup-hero-kpi-row { grid-template-columns: repeat(2, 1fr); }
  .sup-modal { border-radius: 12px; }
}
</style>

<div class="sup-page">
  <div class="sup-header">
    <div class="sup-header-left">
      <div class="sup-search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="supSearchInput" class="sup-search-input" placeholder="Search suppliers…" oninput="filterSuppliers()">
      </div>
      <div class="sup-chip" id="supStatTotal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Loading…</span>
      </div>
    </div>
    <button class="sup-add-btn" onclick="openCreateModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Supplier
    </button>
  </div>

  <div class="sup-table-card">
    <div class="sup-table-scroll">
      <div id="suppliersTableWrap"></div>
    </div>
  </div>
</div>

<!-- Drawer Overlay -->
<div class="sup-drawer-overlay" id="supDrawerOverlay" onclick="closeDrawer()"></div>

<!-- Drawer (edit existing only) -->
<div class="sup-drawer" id="supDrawer">
  <div id="supDrawerHeader"></div>
  <div class="sup-drawer-tabs" id="supDrawerTabs"></div>
  <div class="sup-drawer-body" id="supDrawerBody"></div>
  <div class="sup-drawer-footer" id="supDrawerFooter"></div>
</div>

<!-- Add Supplier Modal -->
<div class="sup-modal-overlay" id="supModalOverlay" onclick="handleModalOverlayClick(event)">
  <div class="sup-modal" onclick="event.stopPropagation()">
    <div class="sup-modal-hero">
      <button class="sup-modal-close" onclick="closeCreateModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="sup-modal-badge">New Supplier</div>
      <div class="sup-modal-title">Add Supplier</div>
    </div>
    <div class="sup-modal-body">
      <div class="sup-section">
        <div class="sup-sec-label">Identity</div>
        <div class="sup-info-grid">
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>Supplier Name</label>
            <input type="text" id="m_SupplierName" placeholder="e.g. Acme Ltd">
          </div>
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Supplier Code</label>
            <input type="text" id="m_SupplierCode" placeholder="e.g. ACM001">
          </div>
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Rank</label>
            <input type="text" id="m_Rank" placeholder="e.g. 1">
          </div>
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Price &amp; Relationship</label>
            <input type="text" id="m_PriceRelationship" placeholder="e.g. Best Price">
          </div>
        </div>
      </div>
      <div class="sup-section">
        <div class="sup-sec-label">Commercial</div>
        <div class="sup-info-grid">
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>MOQ</label>
            <input type="text" id="m_MOQ" placeholder="e.g. 100">
          </div>
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Credit Account</label>
            <input type="text" id="m_CreditAccount" placeholder="e.g. NET30">
          </div>
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Card</label>
            <select id="m_Card" onchange="applyModalCardColors()">
              <option value="">— Select —</option>
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>
        </div>
      </div>
      <div class="sup-section" style="margin-bottom:0">
        <div class="sup-sec-label">Contact</div>
        <div class="sup-info-grid">
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Contact</label>
            <input type="text" id="m_Contact" placeholder="Name or email">
          </div>
          <div class="sup-field">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>WhatsApp</label>
            <input type="text" id="m_WhatsApp" placeholder="+44 7700 000000">
          </div>
        </div>
      </div>
    </div>
    <div class="sup-modal-footer">
      <button class="sup-cancel-btn" onclick="closeCreateModal()">Cancel</button>
      <button class="sup-save-btn" id="supModalSaveBtn" onclick="saveNewSupplier()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Save Supplier
      </button>
    </div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="sup-confirm-overlay" id="supConfirmOverlay">
  <div class="sup-confirm-box">
    <div class="sup-confirm-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </div>
    <div class="sup-confirm-title">Delete Supplier?</div>
    <div class="sup-confirm-desc" id="supConfirmDesc">This action cannot be undone.</div>
    <div class="sup-confirm-btns">
      <button class="sup-confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="sup-confirm-del" id="supConfirmDelBtn">Delete</button>
    </div>
  </div>
</div>

<div class="sup-toast-container" id="supToastContainer"></div>

<script>
(function () {

const API_URL = window.API_URL;

let allSuppliers = [];
let users = [];
let activeDrawerTab = 'details';
let currentDrawerId = null;
let pendingDeleteId = null;
let drawerHasChanges = false;
let toastCounter = 0;

/* ─── AVATAR ── */
const AVATAR_PALETTE = [
  ['#dbeafe','#1d4ed8'],['#dcfce7','#15803d'],['#fef9c3','#854d0e'],
  ['#fce7f3','#9d174d'],['#ede9fe','#6d28d9'],['#ffedd5','#c2410c'],
  ['#cffafe','#0e7490'],['#f1f5f9','#475569'],['#fef08a','#713f12'],
  ['#bbf7d0','#065f46']
];
function avatarColors(name) {
  return AVATAR_PALETTE[(name||'A').charCodeAt(0) % AVATAR_PALETTE.length];
}
function getInitials(name) {
  const p = (name||'?').trim().split(/\s+/);
  return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : (name||'?').slice(0,2).toUpperCase();
}
function avatarEl(name, size) {
  const [bg, color] = avatarColors(name);
  return `<div class="sup-avatar" style="width:${size}px;height:${size}px;background:${bg};color:${color};font-size:${Math.floor(size*0.32)}px">${getInitials(name)}</div>`;
}

/* ─── TOAST (with IDs for loading state) ── */
function showToast(msg, type, duration) {
  const c = document.getElementById('supToastContainer');
  const id = 'suptst_' + (++toastCounter);
  const t = document.createElement('div');
  t.className = 'sup-toast ' + (type||'');
  t.id = id;
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    loading: '<span class="spinner sm" style="border-color:rgba(255,255,255,.25);border-top-color:#fff;margin:0"></span>',
    info:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  };
  t.innerHTML = (icons[type]||'') + esc(msg);
  c.appendChild(t);
  const ms = duration === undefined ? 3000 : duration;
  if (ms > 0) setTimeout(() => t.remove(), ms);
  return id;
}
function removeToast(id) {
  const el = document.getElementById(id); if (el) el.remove();
}

/* ─── LOAD ── */
async function loadSuppliers() {
  document.getElementById('suppliersTableWrap').innerHTML =
    '<div class="sup-empty"><span class="spinner"></span><p>Loading suppliers…</p></div>';
  if (!API_URL) {
    document.getElementById('suppliersTableWrap').innerHTML =
      '<div class="sup-empty"><p>Set window.API_URL to load data.</p></div>';
    return;
  }
  try {
    const [supRes, usrRes] = await Promise.all([
      fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getSuppliers'}) }),
      fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getUsers'}) })
    ]);
    const supData = await supRes.json();
    const usrData = await usrRes.json();
    if (!supData.success) throw new Error('Failed to load suppliers');
    allSuppliers = supData.suppliers || [];
    users = (usrData.users || []).map(u => ({ id: u.userId, name: ((u.firstName||'')+' '+(u.lastName||'')).trim() }));
    renderTable(allSuppliers);
    updateStats(allSuppliers);
  } catch(e) {
    document.getElementById('suppliersTableWrap').innerHTML =
      '<div class="sup-empty"><p>Failed to load. Check API_URL and CORS.</p></div>';
    showToast('Failed to load suppliers','error');
  }
}

/* ─── STATS ── */
function updateStats(data) {
  const el = document.getElementById('supStatTotal'); if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + `<span>${data.length} Supplier${data.length!==1?'s':''}</span>`;
}

/* ─── RENDER TABLE ── */
function renderTable(data) {
  if (!data.length) {
    document.getElementById('suppliersTableWrap').innerHTML =
      '<div class="sup-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>No suppliers found</p><span>Add your first supplier to get started</span></div>';
    return;
  }
  let html = `<table class="sup-table">
    <colgroup>
      <col class="col-avatar">
      <col class="col-supplier">
      <col class="col-rank">
      <col class="col-price">
      <col class="col-moq">
      <col class="col-card">
      <col class="col-contact">
      <col class="col-whatsapp">
    </colgroup>
    <thead><tr>
      <th></th>
      <th>Supplier</th>
      <th>Rank</th>
      <th>Relationship</th>
      <th>MOQ</th>
      <th>Card</th>
      <th>Contact</th>
      <th>WhatsApp</th>
    </tr></thead><tbody>`;

  data.forEach(s => {
    const name = s['Supplier Name'] || '';
    const sid  = esc(s['Supplier ID'] || '');
    html += `<tr onclick="openSupplierDrawer('${sid}')">
      <td style="padding:8px 14px">${avatarEl(name, 34)}</td>
      <td>
        <div class="sup-name-cell">
          <div>
            <div class="sup-name-text">${esc(name)}</div>
            <div class="sup-code-text">${esc(s['Supplier Code']||'')}</div>
          </div>
        </div>
      </td>
      <td>${rankPill(s['Rank'])}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis">${esc(s['Price & Relationship']||'—')}</td>
      <td>${esc(s['MOQ']||'—')}</td>
      <td>${boolBadge(s['Card'])}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${esc(s['Contact']||'—')}</td>
      <td>${esc(s['WhatsApp']||'—')}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('suppliersTableWrap').innerHTML = html;
}

function rankPill(rank) {
  if (!rank) return '<span style="color:#94a3b8;font-size:12px;">—</span>';
  const cls = rank==='1'?'rank-1':rank==='2'?'rank-2':rank==='3'?'rank-3':'rank-other';
  return `<span class="rank-pill ${cls}">#${esc(rank)}</span>`;
}
function boolBadge(val) {
  if (!val) return '<span style="color:#94a3b8;font-size:12px;">—</span>';
  return `<span class="bool-badge ${val==='Yes'?'bool-yes':'bool-no'}">${esc(val)}</span>`;
}

/* ─── SEARCH ── */
function filterSuppliers() {
  const q = document.getElementById('supSearchInput').value.toLowerCase();
  const filtered = allSuppliers.filter(s =>
    (s['Supplier Name']||'').toLowerCase().includes(q) ||
    (s['Supplier Code']||'').toLowerCase().includes(q) ||
    (s['Contact']||'').toLowerCase().includes(q)
  );
  renderTable(filtered);
}

/* ─── OPEN DRAWER (existing supplier) ── */
function openSupplierDrawer(id) {
  const s = allSuppliers.find(x => (x['Supplier ID']||'') === id);
  if (!s) return;
  currentDrawerId = id;
  drawerHasChanges = false;
  activeDrawerTab = 'details';
  renderDrawer(s);
  document.getElementById('supDrawer').classList.add('open');
  document.getElementById('supDrawerOverlay').classList.add('visible');
}

/* ─── CLOSE DRAWER (smart: only re-render if changes) ── */
function closeDrawer() {
  document.getElementById('supDrawer').classList.remove('open');
  document.getElementById('supDrawerOverlay').classList.remove('visible');
  if (drawerHasChanges) {
    const q = document.getElementById('supSearchInput').value.toLowerCase();
    if (q) {
      filterSuppliers();
    } else {
      renderTable(allSuppliers);
      updateStats(allSuppliers);
    }
    drawerHasChanges = false;
  }
  currentDrawerId = null;
}

/* ─── ADD SUPPLIER MODAL ── */
function openCreateModal() {
  // Clear all fields
  ['m_SupplierName','m_SupplierCode','m_Rank','m_PriceRelationship',
   'm_MOQ','m_CreditAccount','m_Card','m_Contact','m_WhatsApp'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  applyModalCardColors();
  document.getElementById('supModalOverlay').classList.add('visible');
}
function closeCreateModal() {
  document.getElementById('supModalOverlay').classList.remove('visible');
}
function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('supModalOverlay')) closeCreateModal();
}
function applyModalCardColors() {
  const sel = document.getElementById('m_Card'); if (!sel) return;
  sel.className = sel.value==='Yes'?'val-yes':sel.value==='No'?'val-no':'';
}
function mval(id) { const el = document.getElementById(id); return el ? el.value : ''; }

async function saveNewSupplier() {
  const name = mval('m_SupplierName');
  if (!name.trim()) { showToast('Supplier Name is required','error'); document.getElementById('m_SupplierName').focus(); return; }
  const btn = document.getElementById('supModalSaveBtn');
  if (btn) { btn.classList.add('loading'); btn.innerHTML = '<span class="spinner sm"></span> Saving…'; }
  const payload = {
    action: 'saveSupplier', supplierId: '',
    'Supplier Name':        name,
    'Supplier Code':        mval('m_SupplierCode'),
    'Rank':                 mval('m_Rank'),
    'Price & Relationship': mval('m_PriceRelationship'),
    'MOQ':                  mval('m_MOQ'),
    'Credit Account':       mval('m_CreditAccount'),
    'Card':                 mval('m_Card'),
    'Contact':              mval('m_Contact'),
    'WhatsApp':             mval('m_WhatsApp'),
    'Notes': '[]'
  };
  try {
    const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
    const result = await res.json();
    if (!result.success) throw new Error(result.message||'Save failed');
    closeCreateModal();
    showToast('Supplier created','success');
    await loadSuppliers();
  } catch(e) {
    showToast('Error creating supplier','error');
  } finally {
    if (btn) {
      btn.classList.remove('loading');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><polyline points="20 6 9 17 4 12"/></svg> Save Supplier';
    }
  }
}

/* ─── AUTO-SAVE (fires on blur/change for drawer fields) ── */
async function autoSaveField(sheetKey, value) {
  if (!currentDrawerId) return;
  const s = allSuppliers.find(x => (x['Supplier ID']||'') === currentDrawerId);
  if (!s) return;
  const tid = showToast('Saving…', 'loading', 0);
  try {
    await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'saveSupplier', supplierId: currentDrawerId, ...s, [sheetKey]: value })
    });
    s[sheetKey] = value;
    drawerHasChanges = true;
    // Live-update hero for key fields
    if (['Supplier Name','Supplier Code','Rank','MOQ'].includes(sheetKey)) {
      updateDrawerHero(s);
    }
    removeToast(tid);
    showToast('Saved','success');
  } catch(e) {
    removeToast(tid);
    showToast('Failed to save','error');
  }
}

/* Update drawer hero without full re-render */
function updateDrawerHero(s) {
  const name = s['Supplier Name'] || 'Supplier';
  const code = s['Supplier Code'] || '';
  const [bg, color] = avatarColors(name);
  const av = document.querySelector('.sup-hero-avatar');
  if (av) { av.style.background = bg; av.style.color = color; av.textContent = getInitials(name); }
  const hn = document.querySelector('.sup-hero-name'); if (hn) hn.textContent = name;
  const hc = document.querySelector('.sup-hero-code'); if (hc) hc.textContent = code;
  const kpis = document.querySelectorAll('.sup-hero-kpi-val');
  if (kpis[0]) kpis[0].textContent = s['Rank'] || '—';
  if (kpis[1]) kpis[1].textContent = s['MOQ']  || '—';
}

/* ─── RENDER DRAWER ── */
function renderDrawer(s) {
  const name  = s['Supplier Name'] || 'Supplier';
  const code  = s['Supplier Code'] || '';
  const moq   = s['MOQ']  || '—';
  const rank  = s['Rank'] || '—';
  const notes = parseJSON(s['Notes'], []);
  const [bg, color] = avatarColors(name);

  document.getElementById('supDrawerHeader').innerHTML =
    `<div class="sup-drawer-hero">
      <button class="sup-drawer-close" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="sup-hero-avatar-wrap">
        <div class="sup-hero-avatar" style="background:${bg};color:${color}">${getInitials(name)}</div>
        <div>
          <div class="sup-hero-name">${esc(name)}</div>
          ${code ? `<div class="sup-hero-code">${esc(code)}</div>` : ''}
        </div>
      </div>
      <div class="sup-hero-kpi-row">
        <div class="sup-hero-kpi">
          <div class="sup-hero-kpi-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Rank</div>
          <div class="sup-hero-kpi-val">${esc(rank)}</div>
        </div>
        <div class="sup-hero-kpi">
          <div class="sup-hero-kpi-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>MOQ</div>
          <div class="sup-hero-kpi-val">${esc(moq)}</div>
        </div>
        <div class="sup-hero-kpi">
          <div class="sup-hero-kpi-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Notes</div>
          <div class="sup-hero-kpi-val">${notes.length}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('supDrawerTabs').innerHTML =
    drawerTab('details', 'Details',
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>')
  + drawerTab('notes', `Notes${notes.length ? ` <span style="background:#dbeafe;color:#1d4ed8;border-radius:100px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:2px">${notes.length}</span>` : ''}`,
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>');

  let body = '';

  if (activeDrawerTab === 'details') {
    const id = s['Supplier ID'] || '';
    body =
      `<div class="sup-section">
        <div class="sup-sec-label">Identity</div>
        <div class="sup-info-grid">
          ${field('Supplier Name','SupplierName',s['Supplier Name']||'','text','e.g. Acme Ltd','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>','Supplier Name')}
          ${field('Supplier Code','SupplierCode',s['Supplier Code']||'','text','e.g. ACM001','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>','Supplier Code')}
          ${field('Rank','Rank',s['Rank']||'','text','e.g. 1','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>','Rank')}
          ${field('Price & Relationship','PriceRelationship',s['Price & Relationship']||'','text','e.g. Best Price','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>','Price & Relationship')}
        </div>
      </div>
      <div class="sup-section">
        <div class="sup-sec-label">Commercial</div>
        <div class="sup-info-grid">
          ${field('MOQ','MOQ',s['MOQ']||'','text','e.g. 100','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>','MOQ')}
          ${field('Credit Account','CreditAccount',s['Credit Account']||'','text','e.g. NET30','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>','Credit Account')}
          ${fieldSelect('Card','Card',s['Card']||'',['Yes','No'],'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>','Card')}
        </div>
      </div>
      <div class="sup-section">
        <div class="sup-sec-label">Contact</div>
        <div class="sup-info-grid">
          ${field('Contact','Contact',s['Contact']||'','text','Name or email','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>','Contact')}
          ${field('WhatsApp','WhatsApp',s['WhatsApp']||'','text','+44 7700 000000','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>','WhatsApp')}
        </div>
      </div>`;
  }

  if (activeDrawerTab === 'notes') {
    const usrOpts = users.map(u => `<option value="${esc(u.name)}">${esc(u.name)}</option>`).join('');
    const noteItems = notes.length
      ? notes.map(n =>
          `<div class="sup-note-item">
            <div class="sup-note-meta">
              <div class="sup-note-avatar">${getInitials(n.name)}</div>
              <span class="sup-note-author">${esc(n.name)}</span>
              <span class="sup-note-date">${esc(n.date||'')}</span>
            </div>
            <div class="sup-note-text">${esc(n.text)}</div>
          </div>`).join('')
      : '<p style="font-size:13px;color:#94a3b8;margin-bottom:12px;">No notes yet. Be the first to add one.</p>';

    body = `<div class="sup-section">
      <div class="sup-sec-label">Thread</div>
      <div class="sup-notes-list" id="supNotesList">${noteItems}</div>
      <div class="sup-note-composer">
        <div class="sup-note-composer-top">
          <div class="sup-note-who">
            <span class="sup-note-who-label">From</span>
            <select class="sup-note-user-select" id="supNoteUser">
              <option value="">Select user…</option>${usrOpts}
            </select>
          </div>
          <textarea class="sup-note-textarea" id="supNoteText" placeholder="Write your note here…"></textarea>
        </div>
        <div class="sup-note-composer-bottom">
          <span class="sup-note-hint">Be clear and concise</span>
          <button class="sup-save-btn" id="supAddNoteBtn" onclick="addNote()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Add Note
          </button>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('supDrawerBody').innerHTML = body;
  document.getElementById('supDrawerFooter').innerHTML =
    `<button class="sup-del-btn" onclick="confirmDelete('${esc(s['Supplier ID']||'')}','${esc(name)}')">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
       Delete
     </button>
     <button class="sup-save-btn" id="supSaveBtn" onclick="saveSupplier()">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
       Save Changes
     </button>`;

  applyCardColors();
}

/* ─── FIELD BUILDERS (auto-save on blur/change) ── */
function drawerTab(key, label, icon) {
  return `<button class="sup-drawer-tab${activeDrawerTab===key?' active':''}" onclick="switchTab('${key}')">${icon}${label}</button>`;
}
function switchTab(tab) {
  activeDrawerTab = tab;
  const s = currentDrawerId ? allSuppliers.find(x=>(x['Supplier ID']||'')===currentDrawerId) : null;
  if (s) renderDrawer(s);
}

function field(label, id, value, type, placeholder, iconSvg, sheetKey) {
  const autoSave = sheetKey
    ? `onblur="autoSaveField('${sheetKey.replace(/'/g,"&#39;")}', this.value)"`
    : '';
  return `<div class="sup-field">
    <label>${iconSvg}${esc(label)}</label>
    <input type="${type}" id="${id}" value="${esc(value)}" placeholder="${esc(placeholder||'')}" ${autoSave}>
  </div>`;
}
function fieldSelect(label, id, value, opts, iconSvg, sheetKey) {
  const autoSave = sheetKey
    ? `onchange="autoSaveField('${sheetKey.replace(/'/g,"&#39;")}', this.value);applyCardColors()"`
    : `onchange="applyCardColors()"`;
  const options = opts.map(o => `<option value="${esc(o)}"${o===value?' selected':''}>${esc(o)}</option>`).join('');
  return `<div class="sup-field">
    <label>${iconSvg}${esc(label)}</label>
    <select id="${id}" ${autoSave}>
      <option value="">— Select —</option>${options}
    </select>
  </div>`;
}
function applyCardColors() {
  const sel = document.getElementById('Card'); if (!sel) return;
  sel.className = sel.value==='Yes'?'val-yes':sel.value==='No'?'val-no':'';
}

/* ─── SAVE (manual save button - saves all fields at once) ── */
async function saveSupplier() {
  const btn = document.getElementById('supSaveBtn'); if (!btn) return;
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner sm"></span> Saving…';
  const s = allSuppliers.find(x=>(x['Supplier ID']||'')===currentDrawerId);
  const payload = {
    action: 'saveSupplier', supplierId: currentDrawerId||'',
    'Supplier Name':        val('SupplierName'),
    'Supplier Code':        val('SupplierCode'),
    'Rank':                 val('Rank'),
    'Price & Relationship': val('PriceRelationship'),
    'MOQ':                  val('MOQ'),
    'Credit Account':       val('CreditAccount'),
    'Card':                 val('Card'),
    'Contact':              val('Contact'),
    'WhatsApp':             val('WhatsApp'),
    'Notes':                s ? (s['Notes']||'[]') : '[]'
  };
  try {
    const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
    const result = await res.json();
    if (!result.success) throw new Error(result.message||'Save failed');
    // Update local array
    if (s) Object.assign(s, payload);
    drawerHasChanges = true;
    showToast('Saved','success');
    closeDrawer();
  } catch(e) {
    showToast('Error saving supplier','error');
  } finally {
    if (btn) {
      btn.classList.remove('loading');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><polyline points="20 6 9 17 4 12"/></svg> Save Changes';
    }
  }
}
function val(id) { const el = document.getElementById(id); return el ? el.value : ''; }

/* ─── NOTES ── */
async function addNote() {
  if (!currentDrawerId) { showToast('Save the supplier first','error'); return; }
  const userEl = document.getElementById('supNoteUser');
  const textEl = document.getElementById('supNoteText');
  const user   = userEl ? userEl.value : '';
  const text   = textEl ? textEl.value.trim() : '';
  if (!user) { showToast('Please select a user','error'); return; }
  if (!text) { showToast('Please write something','error'); return; }

  const s = allSuppliers.find(x=>(x['Supplier ID']||'')===currentDrawerId);
  if (!s) return;

  const noteBtn = document.getElementById('supAddNoteBtn');
  if (noteBtn) { noteBtn.classList.add('loading'); noteBtn.innerHTML = '<span class="spinner sm"></span> Saving…'; }

  const notes = parseJSON(s['Notes'], []);
  const newNote = { name: user, text, date: new Date().toLocaleDateString('en-GB') };
  notes.push(newNote);

  const tid = showToast('Adding note…', 'loading', 0);
  try {
    const res = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'saveSupplier', supplierId: currentDrawerId, ...s, 'Notes': JSON.stringify(notes) })
    });
    const result = await res.json();
    if (!result.success) throw new Error('Failed');
    s['Notes'] = JSON.stringify(notes);
    drawerHasChanges = true;
    removeToast(tid);
    showToast('Note added','success');
    activeDrawerTab = 'notes';
    renderDrawer(s);
  } catch(e) {
    notes.pop(); // revert
    removeToast(tid);
    showToast('Error adding note','error');
    if (noteBtn) {
      noteBtn.classList.remove('loading');
      noteBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Add Note';
    }
  }
}

/* ─── DELETE ── */
function confirmDelete(id, name) {
  pendingDeleteId = id;
  document.getElementById('supConfirmDesc').textContent = `"${name}" will be permanently deleted. This action cannot be undone.`;
  document.getElementById('supConfirmOverlay').classList.add('visible');
  document.getElementById('supConfirmDelBtn').onclick = () => executeDelete(id);
}
function closeConfirm() {
  document.getElementById('supConfirmOverlay').classList.remove('visible');
  pendingDeleteId = null;
}
async function executeDelete(id) {
  closeConfirm();
  try {
    await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'deleteSupplier', supplierId: id}) });
    const idx = allSuppliers.findIndex(x=>(x['Supplier ID']||'')===id);
    if (idx > -1) allSuppliers.splice(idx, 1);
    showToast('Supplier deleted','success');
    drawerHasChanges = false; // prevent extra re-render since we handle it here
    document.getElementById('supDrawer').classList.remove('open');
    document.getElementById('supDrawerOverlay').classList.remove('visible');
    currentDrawerId = null;
    renderTable(allSuppliers);
    updateStats(allSuppliers);
  } catch(e) {
    showToast('Error deleting supplier','error');
  }
}

/* ─── HELPERS ── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseJSON(v, fallback) { try { return JSON.parse(v); } catch(e) { return fallback; } }

/* ─── EXPOSE GLOBALS ── */
window.loadSuppliers         = loadSuppliers;
window.filterSuppliers       = filterSuppliers;
window.openCreateModal       = openCreateModal;
window.closeCreateModal      = closeCreateModal;
window.handleModalOverlayClick = handleModalOverlayClick;
window.saveNewSupplier       = saveNewSupplier;
window.applyModalCardColors  = applyModalCardColors;
window.openSupplierDrawer    = openSupplierDrawer;
window.closeDrawer           = closeDrawer;
window.switchTab             = switchTab;
window.autoSaveField         = autoSaveField;
window.saveSupplier          = saveSupplier;
window.addNote               = addNote;
window.confirmDelete         = confirmDelete;
window.closeConfirm          = closeConfirm;
window.applyCardColors       = applyCardColors;

loadSuppliers();
})();
</script>
