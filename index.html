<!DOCTYPE html>
<html>
<head>
  <title>Pharm & Dom | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --sidebar-hover: #1e293b;
      --primary: #2563eb;
      --background: #f4f6f9;
      --card-bg: #ffffff;
      --text-dark: #0f172a;
      --text-light: #64748b;
      --radius: 14px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--background);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .nav-item {
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
    }

    .nav-item.active {
      background: var(--primary);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 70px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .content {
      padding: 30px;
      flex: 1;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s ease;
    }

    .content.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="sidebar" id="sidebar">
    <div class="brand">Pharm & Dom</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div id="pageTitle">Dashboard</div>
      <div id="userName"></div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <script>

    const user = JSON.parse(sessionStorage.getItem("user"));

    if (!user) {
      window.location.href = "login";
    }

    document.getElementById("userName").innerText =
      user.firstName + " " + user.lastName;

    function hasPermission(permission) {
      return user.permissions.includes(permission);
    }

    /* ===============================
       PAGE REGISTRY
    =============================== */

    const pages = {

      dashboard: {
        title: "Dashboard",
        permission: "dashboard",
        render: () => `
          <div class="card">Welcome back, ${user.firstName}.</div>
          <div class="card">System overview coming soon.</div>
        `
      },

      sourcing: {
        title: "Product Sourcing",
        permission: "sourcing",
        render: () => `
          <div class="card">
            <h3>Sourcing Module</h3>
            Manage product opportunities.
          </div>
        `
      },

      inventory: {
        title: "Inventory",
        permission: "inventory",
        render: () => `
          <div class="card">
            <h3>Inventory Module</h3>
            Warehouse tracking interface.
          </div>
        `
      },

      users: {
        title: "User Management",
        permission: "users",
        render: () => `
          <div class="card">
            <h3>User Management</h3>
            Admin only section.
          </div>
        `
      }

    };

    /* ===============================
       SIDEBAR BUILD
    =============================== */

    function buildSidebar() {

      const sidebar = document.getElementById("sidebar");

      let navHTML = `<div class="brand">Pharm & Dom</div>`;

      Object.keys(pages).forEach(key => {

        if (hasPermission(pages[key].permission)) {
          navHTML += `
            <div class="nav-item" onclick="loadPage('${key}')">
              ${pages[key].title}
            </div>
          `;
        }

      });

      navHTML += `
        <div class="nav-item" onclick="logout()">
          Logout
        </div>
      `;

      sidebar.innerHTML = navHTML;
    }

    /* ===============================
       PAGE LOADER
    =============================== */

    function loadPage(pageKey) {

      if (!pages[pageKey]) return;
      if (!hasPermission(pages[pageKey].permission)) return;

      const content = document.getElementById("content");

      content.classList.remove("show");

      setTimeout(() => {
        document.getElementById("pageTitle").innerText = pages[pageKey].title;
        content.innerHTML = pages[pageKey].render();
        content.classList.add("show");
        highlightActive(pageKey);
      }, 150);
    }

    function highlightActive(activeKey) {
      const items = document.querySelectorAll(".nav-item");
      items.forEach(item => item.classList.remove("active"));

      items.forEach(item => {
        if (item.innerText === pages[activeKey].title) {
          item.classList.add("active");
        }
      });
    }

    function logout() {
      sessionStorage.removeItem("user");
      window.location.href = "login";
    }

    /* ===============================
       INIT
    =============================== */

    buildSidebar();

    // Load first permitted page automatically
    const firstPage = Object.keys(pages).find(key =>
      hasPermission(pages[key].permission)
    );

    if (firstPage) {
      loadPage(firstPage);
    }

  </script>

</body>
</html>
