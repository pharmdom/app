

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  line-height: 1.5;
  overflow: hidden;
}

/* ── PAGE LAYOUT ── */
.page-wrapper {
  padding: 5px 10px 10px 10px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.page-title-block { margin-bottom: 10px; flex-shrink: 0; }
.page-titl { font-size: 18px; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; }
.page-subtitle { font-size: 12px; color: #64748b; margin-top: 2px; }

/* ── HEADER ROW ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; flex-wrap: wrap; gap: 8px; flex-shrink: 0;
}
.header-left { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 0; flex-wrap: wrap; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

/* ── STAT CHIP ── */
.stat-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 100px;
  font-size: 12px; font-weight: 600; border: 1px solid transparent; white-space: nowrap;
  cursor: default;
}
.stat-chip svg { width: 12px; height: 12px; flex-shrink: 0; }
.stat-chip.slate { background: #f8fafc; color: #475569; border-color: #e2e8f0; }
.stat-chip.green { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 9px; border: 1.5px solid;
  font-size: 12px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.btn-primary  { background: #2563eb; border-color: #2563eb; color: #fff; }
.btn-primary:hover  { background: #1d4ed8; border-color: #1d4ed8; }
.btn-secondary { background: #fff; border-color: #e2e8f0; color: #475569; }
.btn-secondary:hover { border-color: #94a3b8; color: #0f172a; }
.btn-danger   { background: #fff; border-color: #fecaca; color: #dc2626; }
.btn-danger:hover   { background: #fee2e2; border-color: #fca5a5; }
.btn-danger.confirming { background: #dc2626; border-color: #dc2626; color: #fff; }
.btn-success  { background: #15803d; border-color: #15803d; color: #fff; }
.btn-success:hover  { background: #166534; border-color: #166534; }
.btn-amber { background: #f59e0b; border-color: #f59e0b; color: #fff; }
.btn-amber:hover { background: #d97706; border-color: #d97706; }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* ── SEARCH ── */
.search-wrap { position: relative; min-width: 160px; max-width: 240px; flex: 1; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 14px; height: 14px; pointer-events: none; }
.search-input { width: 100%; padding: 7px 10px 7px 32px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; background: #fff; color: #0f172a; outline: none; transition: border-color .15s; }
.search-input:focus { border-color: #2563eb; }

/* ── MAIN SPLIT ── */
.main-split {
  flex: 1; display: flex; gap: 10px; min-height: 0; overflow: hidden;
}

/* ── LEFT PANEL (Invoice List) ── */
.left-panel {
  width: 380px; min-width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column; min-height: 0;
  background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;
}
.left-panel-header {
  padding: 10px 14px; background: #fafbfc;
  border-bottom: 2px solid #f1f5f9;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.left-panel-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b;
  display: flex; align-items: center; gap: 7px;
}
.count-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; background: #f1f5f9; color: #64748b; }
.left-panel-body { flex: 1; overflow-y: auto; min-height: 0; }
.left-panel-body::-webkit-scrollbar { width: 4px; }
.left-panel-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

/* ── INVOICE LIST ITEMS ── */
.inv-list-item {
  padding: 11px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
  transition: background .12s; animation: cardIn .18s ease both;
  display: flex; align-items: center; gap: 10px;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.inv-list-item:hover { background: #f8fbff; }
.inv-list-item.active { background: #eff6ff; border-left: 3px solid #2563eb; }
.inv-list-item:last-child { border-bottom: none; }
.inv-num-badge {
  width: 38px; height: 38px; border-radius: 9px; background: #eff6ff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: #2563eb; flex-shrink: 0; text-align: center;
  line-height: 1.1;
}
.inv-item-info { flex: 1; min-width: 0; }
.inv-item-name { font-size: 13px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.inv-item-date { font-size: 11px; color: #94a3b8; }
.inv-item-total { font-size: 13px; font-weight: 700; color: #0f172a; text-align: right; flex-shrink: 0; }
.inv-item-total span { display: block; font-size: 10px; font-weight: 500; color: #64748b; }

/* ── RIGHT PANEL (Preview) ── */
.right-panel {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; min-height: 0;
  background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;
}
.right-panel-header {
  padding: 10px 14px; background: #fafbfc;
  border-bottom: 2px solid #f1f5f9;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 8px; flex-wrap: wrap;
}
.right-panel-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; }
.right-panel-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.right-panel-body { flex: 1; overflow-y: auto; padding: 20px; min-height: 0; }
.right-panel-body::-webkit-scrollbar { width: 4px; }
.right-panel-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

/* ── INVOICE FORM / PREVIEW ── */
.inv-paper {
  max-width: 720px; margin: 0 auto;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  padding: 32px 36px; box-shadow: 0 4px 24px rgba(0,0,0,.06);
}

/* Invoice header */
.inv-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 20px; }
.inv-logo { max-height: 56px; max-width: 180px; object-fit: contain; }
.inv-company-block { text-align: right; }
.inv-company-name { font-size: 15px; font-weight: 800; color: #0f172a; }
.inv-company-sub { font-size: 10px; color: #64748b; line-height: 1.6; margin-top: 3px; }

/* Invoice meta */
.inv-meta { display: flex; justify-content: space-between; margin-bottom: 24px; gap: 20px; flex-wrap: wrap; }
.inv-bill-to { flex: 1; min-width: 180px; }
.inv-bill-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 6px; }
.inv-bill-name { font-size: 14px; font-weight: 700; color: #0f172a; }
.inv-bill-addr { font-size: 12px; color: #64748b; line-height: 1.6; margin-top: 2px; }
.inv-details-block { text-align: right; flex-shrink: 0; }
.inv-detail-row { display: flex; justify-content: flex-end; gap: 16px; margin-bottom: 4px; align-items: baseline; }
.inv-detail-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #94a3b8; }
.inv-detail-val { font-size: 13px; font-weight: 700; color: #0f172a; }
.inv-number-val { font-size: 16px; font-weight: 800; color: #2563eb; }

/* Invoice divider */
.inv-divider { height: 2px; background: linear-gradient(90deg, #2563eb 0%, #e2e8f0 100%); border-radius: 2px; margin-bottom: 24px; }

/* Line items table */
.inv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
.inv-table thead tr { background: #0f172a; }
.inv-table th { padding: 9px 12px; text-align: left; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: rgba(255,255,255,.85); white-space: nowrap; }
.inv-table th:last-child { text-align: right; }
.inv-table th.right { text-align: right; }
.inv-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
.inv-table tbody tr:last-child { border-bottom: none; }
.inv-table td { padding: 9px 12px; color: #334155; vertical-align: middle; }
.inv-table td.right { text-align: right; font-weight: 600; }
.inv-table td.mono { font-family: 'SF Mono','Fira Code',monospace; }

/* Totals */
.inv-totals { display: flex; justify-content: flex-end; margin-bottom: 24px; }
.inv-totals-table { width: 260px; }
.inv-totals-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
.inv-totals-row:last-child { border-bottom: none; }
.inv-totals-row.grand { padding: 10px 0 0; border-top: 2px solid #0f172a; border-bottom: none; margin-top: 4px; }
.inv-totals-label { color: #64748b; font-weight: 500; }
.inv-totals-val { font-weight: 700; color: #0f172a; }
.inv-totals-row.grand .inv-totals-label { font-weight: 800; color: #0f172a; font-size: 15px; }
.inv-totals-row.grand .inv-totals-val { font-size: 17px; color: #2563eb; font-weight: 800; }

/* Notes & bank */
.inv-bottom { display: flex; gap: 20px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #f1f5f9; flex-wrap: wrap; }
.inv-notes { flex: 1; min-width: 180px; }
.inv-bank { flex-shrink: 0; min-width: 180px; background: #f8fafc; border-radius: 10px; padding: 12px 16px; border: 1px solid #e2e8f0; }
.inv-section-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 6px; }
.inv-notes-text { font-size: 12px; color: #64748b; line-height: 1.6; }
.inv-bank-row { display: flex; justify-content: space-between; gap: 16px; font-size: 11px; margin-bottom: 4px; }
.inv-bank-key { color: #94a3b8; font-weight: 600; }
.inv-bank-val { color: #0f172a; font-weight: 700; }

/* Invoice footer */
.inv-footer { text-align: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid #f1f5f9; font-size: 10px; color: #94a3b8; line-height: 1.6; }

/* ── FORM INPUTS OVERLAY ON PREVIEW ── */
.inv-editable {
  border: none; background: transparent; font-family: inherit;
  color: inherit; font-weight: inherit; font-size: inherit;
  outline: none; width: 100%; padding: 2px 4px; margin: -2px -4px;
  border-radius: 4px; transition: background .15s, box-shadow .15s;
  resize: none;
}
.inv-editable:focus { background: #f0f7ff; box-shadow: 0 0 0 2px rgba(37,99,235,.2); }
.inv-editable::placeholder { color: #c0cce0; font-weight: 400; }
.inv-editable-select {
  border: none; background: transparent; font-family: inherit;
  color: inherit; font-weight: inherit; font-size: inherit;
  outline: none; cursor: pointer; padding: 2px 4px; border-radius: 4px;
  transition: background .15s;
}
.inv-editable-select:focus { background: #f0f7ff; }
textarea.inv-editable { min-height: 40px; overflow: hidden; }

/* Line item row with delete */
.line-item-row { position: relative; }
.line-item-del {
  position: absolute; right: -28px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; border: none; background: #fee2e2; border-radius: 4px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  opacity: 0; transition: opacity .15s; color: #dc2626;
}
.line-item-row:hover .line-item-del { opacity: 1; }
.add-line-btn {
  display: flex; align-items: center; gap: 6px; padding: 7px 12px;
  border: 1.5px dashed #cbd5e1; border-radius: 8px; background: none;
  font-size: 12px; font-weight: 600; color: #94a3b8; cursor: pointer;
  transition: all .15s; font-family: inherit; width: 100%; justify-content: center;
}
.add-line-btn:hover { border-color: #2563eb; color: #2563eb; background: #f0f7ff; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px; color: #94a3b8; gap: 10px; text-align: center; height: 100%;
}
.empty-state p { font-size: 13px; font-weight: 600; color: #64748b; }
.empty-state .empty-icon { width: 48px; height: 48px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

/* ── LOADING ── */
.spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .65s linear infinite; }
.spinner.sm { width: 13px; height: 13px; border-width: 2px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: #94a3b8; gap: 10px; flex: 1; }

/* ── TOAST ── */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
.toast {
  display: flex; align-items: center; gap: 9px; padding: 10px 14px;
  background: #0f172a; color: #fff; border-radius: 10px; font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,.18); max-width: 320px; pointer-events: auto;
  animation: toastIn .2s cubic-bezier(.34,1.2,.64,1); transition: all .2s;
}
.toast.success { background: #15803d; }
.toast.error   { background: #dc2626; }
.toast.info    { background: #1e40af; }
.toast.warn    { background: #d97706; }
@keyframes toastIn { from { opacity: 0; transform: translateX(20px) scale(.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(.9); } }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1100;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(3px); padding: 16px;
}
.modal-overlay.visible { opacity: 1; pointer-events: all; }
.modal-box {
  background: #fff; border-radius: 18px; box-shadow: 0 25px 60px rgba(0,0,0,.22);
  width: 520px; max-width: 100%; max-height: 90vh; display: flex; flex-direction: column;
  transform: translateY(10px); transition: transform .2s;
}
.modal-overlay.visible .modal-box { transform: translateY(0); }
.modal-hero {
  padding: 16px 22px 14px; background: linear-gradient(135deg,#1e293b 0%,#0f172a 100%);
  border-radius: 18px 18px 0 0; flex-shrink: 0; position: relative;
}
.modal-hero-close {
  position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
  border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65);
}
.modal-hero-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.modal-title { font-size: 15px; font-weight: 800; color: #fff; }
.modal-subtitle { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; }
.modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; min-height: 0; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
.modal-footer { padding: 12px 22px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; justify-content: flex-end; background: #fafafa; border-radius: 0 0 18px 18px; flex-shrink: 0; }

/* Form fields in modal */
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; }
.form-group input, .form-group textarea, .form-group select {
  padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 9px;
  font-size: 13px; font-family: inherit; color: #0f172a; background: #fff;
  outline: none; transition: border-color .15s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #2563eb; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Attachment chip */
.attach-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.attach-chip {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: #f1f5f9; border-radius: 100px; font-size: 11px; font-weight: 600; color: #334155;
}
.attach-chip button { width: 14px; height: 14px; border: none; background: #cbd5e1; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
.attach-chip button:hover { background: #fecaca; color: #dc2626; }

/* ── CONFIRM OVERLAY ── */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .18s; backdrop-filter: blur(3px); padding: 16px;
}
.confirm-overlay.visible { opacity: 1; pointer-events: all; }
.confirm-box {
  background: #fff; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,.2);
  width: 320px; max-width: 100%; padding: 24px;
  transform: translateY(8px); transition: transform .18s; text-align: center;
}
.confirm-overlay.visible .confirm-box { transform: translateY(0); }
.confirm-icon { width: 44px; height: 44px; border-radius: 50%; background: #fef2f2; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.confirm-title { font-size: 15px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
.confirm-msg { font-size: 13px; color: #64748b; margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 8px; justify-content: center; }
.confirm-btn-cancel { padding: 8px 18px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; color: #64748b; background: #fff; cursor: pointer; }
.confirm-btn-danger { padding: 8px 18px; background: #dc2626; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  html, body { overflow: auto; height: auto; }
  .page-wrapper { height: auto; overflow: visible; }
  .main-split { flex-direction: column; overflow: visible; }
  .left-panel { width: 100%; min-width: 0; max-height: 280px; }
  .right-panel { min-height: 600px; }
}
@media (max-width: 640px) {
  .page-wrapper { padding: 8px; }
  .inv-paper { padding: 20px 16px; }
  .inv-header { flex-direction: column; align-items: flex-start; }
  .inv-company-block { text-align: left; }
  .inv-meta { flex-direction: column; }
  .inv-details-block { text-align: left; }
  .inv-detail-row { justify-content: flex-start; }
  .inv-bottom { flex-direction: column; }
  .form-row { grid-template-columns: 1fr; }
  .right-panel-header { flex-direction: column; align-items: flex-start; }
  .right-panel-actions { width: 100%; justify-content: flex-end; }
  .inv-table { font-size: 11px; }
  .inv-table th, .inv-table td { padding: 6px 8px; }

}
</style>

  </div>

  <!-- Header row -->
  <div class="page-header">
    <div class="header-left">

        <span>—</span>
      </div>
      <div class="search-wrap">

        <input type="text" id="searchInput" class="search-input" placeholder="Search invoices…" oninput="filterInvoices()">
      </div>

        New Invoice
      </button>
    </div>
  </div>

  <!-- Main split layout -->
  <div class="main-split">
    <!-- LEFT: Invoice list -->
    <div class="left-panel">
      <div class="left-panel-header">
        <div class="left-panel-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          All Invoices
        </div>
        <span class="count-badge" id="listCount">0</span>

      <div class="left-panel-body" id="invoiceList">

    <!-- RIGHT: Invoice preview + editor -->
    <div class="right-panel">
      <div class="right-panel-header">
        <div class="right-panel-title" id="previewTitle">Invoice Preview</div>
        <div class="right-panel-actions" id="previewActions" style="display:none">
          <button class="btn btn-secondary btn-sm" onclick="openEmailModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Email
          </button>
          <button class="btn btn-secondary btn-sm" onclick="downloadPDF()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PDF
          </button>
          <button class="btn btn-success btn-sm" id="saveBtn" onclick="saveInvoice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save
          </button>
          <button class="btn btn-danger btn-sm" id="deleteInvBtn" onclick="deleteInvoice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            Delete

        </div>
      </div>
      <div class="right-panel-body" id="previewBody">
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <p>Select an invoice or create a new one</p>
          <button class="btn btn-primary" onclick="newInvoice()" style="margin-top:4px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Invoice
          </button>
        </div>
      </div>
    </div>
  </div>
</div>


<!-- EMAIL MODAL -->

      </button>

    <div class="modal-body">
      <div class="form-group">
        <label>To (recipients) <span style="color:#dc2626">*</span></label>

      </div>

      </div>

        <input type="text" id="emailSubject" placeholder="Invoice #INV-0001 from Pharm & Domestic">

        <label>Message Body</label>

        <input type="file" id="emailAttachInput" multiple style="padding:6px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:12px;font-family:inherit;cursor:pointer">
        <div class="attach-list" id="attachList"></div>

      <button class="btn btn-primary" id="sendEmailBtn" onclick="sendEmail()">

        Send Invoice
      </button>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    </div>
    <div class="confirm-title" id="confirmTitle">Confirm</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="confirm-btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-btn-danger" id="confirmOkBtn">Delete</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>


<script>
(function () {
'use strict';

/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyy6zBP4LduRhK-Fz_aK5H3bDH_cvT8HEj2g81aKgEQVIHsQze3AgJQaBr4Cq1FPs3P/exec';
const LOGO_URL = 'https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png';

const COMPANY = {
  name: 'PHARM & DOMESTIC',
  tradingAs: 'TOUSIF LTD',
  vat: '455602104GB',
  companyNo: '13865809',
  address: 'Unit A, 82 James Carter Road\nIP28 7DE, Ipswich, United Kingdom',
  email: 'info@pharm-supplies.co.uk',
  bank: { name: 'TOUSIF LTD', account: '19356984', sortCode: '04-06-05' }
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let invoices = [];
let filtered = [];
let currentInvoice = null; // the invoice being edited/viewed
let isNew = false;
let logoBase64 = null;
let deletePendingTimer = null;
let emailAttachFiles = [];
let _confirmResolve = null;

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return '£' + Number(n || 0).toFixed(2); }
function today() { return new Date().toISOString().split('T')[0]; }
function pad(n, len=4) { return String(n).padStart(len,'0'); }
function uid() { return 'INV-' + pad(Date.now() % 100000, 5); }

/* ══════════════════════════════════════
   LOGO PRELOAD (base64 for PDF)
══════════════════════════════════════ */
async function preloadLogo() {
  try {
    const res = await fetch(LOGO_URL);
    const blob = await res.blob();
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onloadend = () => { logoBase64 = reader.result; resolve(); };
      reader.readAsDataURL(blob);
    });
  } catch {
    // logo might not load due to CORS in some browsers — PDF will still work, just without logo
  }
}

/* ══════════════════════════════════════
   API
══════════════════════════════════════ */
async function callApi(body) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (err) {
    console.error('API error:', err);
    return null;
  }
}

/* ══════════════════════════════════════
   LOAD DATA
══════════════════════════════════════ */
async function loadInvoices() {
  const result = await callApi({ action: 'getInvoices' });
  if (result && result.success) {
    const headers = result.headers || [];
    invoices = (result.rows || []).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
      // Parse line items JSON
      try { obj.lineItems = JSON.parse(obj.lineItems || '[]'); } catch { obj.lineItems = []; }
      if (!obj.lineItems.length) obj.lineItems = [emptyLine()];
      return obj;
    });
    filterInvoices();
    showToast('Loaded ' + invoices.length + ' invoice' + (invoices.length !== 1 ? 's' : ''), 'success');
  } else {
    document.getElementById('invoiceList').innerHTML =
      '<div class="loading-state"><p style="color:#dc2626;font-weight:600;font-size:13px;text-align:center">Failed to load invoices.<br><span style="color:#94a3b8;font-weight:500;font-size:11px">Check your Apps Script has the Invoices sheet and actions.</span></p></div>';
    showToast('Failed to load invoices', 'error');
  }
}

/* ══════════════════════════════════════
   FILTER + RENDER LIST
══════════════════════════════════════ */
function filterInvoices() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  filtered = invoices.filter(inv => {
    if (!q) return true;
    return (
      String(inv.invoiceNumber || '').toLowerCase().includes(q) ||
      String(inv.clientName || '').toLowerCase().includes(q) ||
      String(inv.date || '').toLowerCase().includes(q)
    );
  });
  updateStats();
  renderList();
}

function updateStats() {
  const total = invoices.length;
  const totalVal = invoices.reduce((s, inv) => s + Number(inv.grandTotal || 0), 0);
  setChip('statTotal', total + ' Invoice' + (total !== 1 ? 's' : ''));
  setChip('statValue', fmt(totalVal) + ' Total');
}

function setChip(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + text + '</span>';
}

function renderList() {
  const list = document.getElementById('invoiceList');
  document.getElementById('listCount').textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = '<div class="loading-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p style="font-size:13px;color:#94a3b8">No invoices found</p></div>';
    return;
  }

  list.innerHTML = filtered.map((inv, i) => {
    const isActive = currentInvoice && currentInvoice.invoiceNumber === inv.invoiceNumber;
    const invNum = String(inv.invoiceNumber || '—');
    const short = invNum.replace('INV-','');
    return `<div class="inv-list-item${isActive ? ' active' : ''}" onclick="selectInvoice('${esc(inv.invoiceNumber)}')">
      <div class="inv-num-badge">#${esc(short)}</div>
      <div class="inv-item-info">
        <div class="inv-item-name">${esc(inv.clientName || 'No name')}</div>
        <div class="inv-item-date">${esc(inv.date || '—')}</div>
      </div>
      <div class="inv-item-total">${fmt(inv.grandTotal)}<span>${esc(invNum)}</span></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   SELECT / VIEW INVOICE
══════════════════════════════════════ */
function selectInvoice(invoiceNumber) {
  const inv = invoices.find(i => i.invoiceNumber === invoiceNumber);
  if (!inv) return;
  currentInvoice = JSON.parse(JSON.stringify(inv)); // deep copy
  isNew = false;
  renderPreview();
  renderList(); // refresh active state
}

/* ══════════════════════════════════════
   NEW INVOICE
══════════════════════════════════════ */
function newInvoice() {
  // Auto-generate next invoice number
  let maxNum = 0;
  invoices.forEach(inv => {
    const n = parseInt(String(inv.invoiceNumber || '').replace('INV-', '')) || 0;
    if (n > maxNum) maxNum = n;
  });
  const nextNum = 'INV-' + pad(maxNum + 1);

  currentInvoice = {
    invoiceNumber: nextNum,
    date: today(),
    clientName: '',
    clientAddress: '',
    orderNotes: '',
    lineItems: [emptyLine()],
    subtotal: 0,
    totalVat: 0,
    grandTotal: 0
  };
  isNew = true;
  renderPreview();
  renderList();
  showToast('New invoice ready — fill in the details', 'info');
}

function emptyLine() {
  return { qty: 1, description: '', preVat: 0, vatRate: 20, vat: 0, lineTotal: 0 };
}

/* ══════════════════════════════════════
   RENDER PREVIEW (editable invoice)
══════════════════════════════════════ */
function renderPreview() {
  if (!currentInvoice) return;

  document.getElementById('previewTitle').textContent =
    (isNew ? 'New Invoice — ' : 'Editing — ') + currentInvoice.invoiceNumber;
  document.getElementById('previewActions').style.display = 'flex';

  const inv = currentInvoice;
  const lines = inv.lineItems || [emptyLine()];

  // Build line rows
  const lineRows = lines.map((line, i) => `
    <tr class="line-item-row">
      <td class="mono"><input class="inv-editable" style="width:50px;text-align:right" type="number" min="0" step="1"
        value="${esc(String(line.qty || 1))}"
        oninput="updateLine(${i},'qty',this.value)"></td>
      <td><textarea class="inv-editable" rows="1" placeholder="Item description…"
        oninput="autoResizeTA(this);updateLine(${i},'description',this.value)">${esc(line.description)}</textarea></td>
      <td class="right mono"><input class="inv-editable" style="text-align:right;width:75px" type="number" min="0" step="0.01"
        value="${Number(line.preVat || 0).toFixed(2)}"
        oninput="updateLine(${i},'preVat',this.value)"></td>
      <td class="right">
        <select class="inv-editable-select" onchange="updateLine(${i},'vatRate',this.value)">
          ${[0,5,20].map(r => `<option value="${r}"${Number(line.vatRate) === r ? ' selected' : ''}>${r}%</option>`).join('')}
        </select>
      </td>
      <td class="right mono" id="vat_${i}">${fmt(line.vat)}</td>
      <td class="right mono" id="lt_${i}">${fmt(line.lineTotal)}</td>
      <button class="line-item-del" onclick="removeLine(${i})" title="Remove line">
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </tr>`).join('');

  const logoSrc = logoBase64 || LOGO_URL;

  document.getElementById('previewBody').innerHTML = `
  <div class="inv-paper" id="invoicePaper">
    <!-- INVOICE HEADER -->
    <div class="inv-header">
      <img src="${logoSrc}" alt="Pharm &amp; Domestic" class="inv-logo" onerror="this.style.display='none'">
      <div class="inv-company-block">
        <div class="inv-company-name">${esc(COMPANY.name)}</div>
        <div class="inv-company-sub">
          ${esc(COMPANY.tradingAs)}<br>
          ${esc(COMPANY.address.replace(/\n/g, ', '))}<br>
          ${esc(COMPANY.email)}
        </div>
      </div>
    </div>

    <div class="inv-divider"></div>

    <!-- INVOICE META -->
    <div class="inv-meta">
      <div class="inv-bill-to">
        <div class="inv-bill-label">Bill To</div>
        <div class="inv-bill-name">
          <input class="inv-editable" type="text" placeholder="Client full name…"
            value="${esc(inv.clientName || '')}"
            oninput="updateField('clientName',this.value)"
            style="font-size:14px;font-weight:700">
        </div>
        <div class="inv-bill-addr">
          <textarea class="inv-editable" rows="2" placeholder="Client address…"
            oninput="autoResizeTA(this);updateField('clientAddress',this.value)">${esc(inv.clientAddress || '')}</textarea>
        </div>
      </div>
      <div class="inv-details-block">
        <div class="inv-detail-row">
          <span class="inv-detail-label">Invoice No.</span>
          <span class="inv-number-val">${esc(inv.invoiceNumber)}</span>
        </div>
        <div class="inv-detail-row">
          <span class="inv-detail-label">Date</span>
          <span class="inv-detail-val">
            <input class="inv-editable" type="date" value="${esc(inv.date || today())}"
              onchange="updateField('date',this.value)"
              style="font-size:13px;font-weight:700;width:140px">
          </span>
        </div>
      </div>
    </div>

    <!-- LINE ITEMS -->
    <div style="overflow-x:auto;margin-bottom:6px;position:relative;padding-right:32px">
      <table class="inv-table">
        <thead>
          <tr>
            <th style="width:52px">Qty</th>
            <th>Item &amp; Description</th>
            <th class="right" style="width:90px">Pre-VAT (£)</th>
            <th class="right" style="width:72px">VAT %</th>
            <th class="right" style="width:80px">VAT (£)</th>
            <th class="right" style="width:90px">Total (£)</th>
          </tr>
        </thead>
        <tbody id="lineItemsBody">
          ${lineRows}
        </tbody>
      </table>
    </div>
    <button class="add-line-btn" onclick="addLine()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Line Item
    </button>

    <!-- TOTALS -->
    <div class="inv-totals">
      <div class="inv-totals-table" id="invTotals">
        ${totalsHTML()}
      </div>
    </div>

    <!-- BOTTOM: NOTES + BANK -->
    <div class="inv-bottom">
      <div class="inv-notes">
        <div class="inv-section-label">Order Notes</div>
        <div>
          <textarea class="inv-editable inv-notes-text" rows="3" placeholder="Any order notes or special instructions…"
            oninput="autoResizeTA(this);updateField('orderNotes',this.value)">${esc(inv.orderNotes || '')}</textarea>
        </div>
      </div>
      <div class="inv-bank">
        <div class="inv-section-label">Payment Details</div>
        <div class="inv-bank-row"><span class="inv-bank-key">Account Name</span><span class="inv-bank-val">${esc(COMPANY.bank.name)}</span></div>
        <div class="inv-bank-row"><span class="inv-bank-key">Account No.</span><span class="inv-bank-val">${esc(COMPANY.bank.account)}</span></div>
        <div class="inv-bank-row"><span class="inv-bank-key">Sort Code</span><span class="inv-bank-val">${esc(COMPANY.bank.sortCode)}</span></div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="inv-footer">
      ${esc(COMPANY.name)} · ${esc(COMPANY.tradingAs)} · VAT Reg: ${esc(COMPANY.vat)} · Co. No: ${esc(COMPANY.companyNo)}<br>
      Thank you for your business. Please pay within 30 days of invoice date.
    </div>
  </div>`;

  // Auto-resize all textareas
  document.querySelectorAll('textarea.inv-editable').forEach(ta => autoResizeTA(ta));
}

function totalsHTML() {
  if (!currentInvoice) return '';
  const { subtotal = 0, totalVat = 0, grandTotal = 0 } = currentInvoice;
  return `
    <div class="inv-totals-row"><span class="inv-totals-label">Subtotal</span><span class="inv-totals-val">${fmt(subtotal)}</span></div>
    <div class="inv-totals-row"><span class="inv-totals-label">Total VAT</span><span class="inv-totals-val">${fmt(totalVat)}</span></div>
    <div class="inv-totals-row grand"><span class="inv-totals-label">Grand Total</span><span class="inv-totals-val">${fmt(grandTotal)}</span></div>`;
}

/* ══════════════════════════════════════
   FIELD UPDATE
══════════════════════════════════════ */
function updateField(field, value) {
  if (!currentInvoice) return;
  currentInvoice[field] = value;
}

function updateLine(idx, field, value) {
  if (!currentInvoice) return;
  const line = currentInvoice.lineItems[idx];
  if (!line) return;

  if (field === 'qty') line.qty = Number(value) || 0;
  else if (field === 'preVat') line.preVat = parseFloat(value) || 0;
  else if (field === 'vatRate') line.vatRate = Number(value) || 0;
  else if (field === 'description') line.description = value;

  // Recalc line
  line.vat = parseFloat((line.preVat * (line.vatRate / 100) * line.qty).toFixed(2));
  line.lineTotal = parseFloat((line.preVat * line.qty + line.vat).toFixed(2));

  // Update inline cells
  const vatCell = document.getElementById('vat_' + idx);
  const ltCell  = document.getElementById('lt_' + idx);
  if (vatCell) vatCell.textContent = fmt(line.vat);
  if (ltCell)  ltCell.textContent  = fmt(line.lineTotal);

  recalcTotals();
}

function recalcTotals() {
  if (!currentInvoice) return;
  const lines = currentInvoice.lineItems || [];
  let subtotal = 0, totalVat = 0;
  lines.forEach(l => {
    subtotal += parseFloat(((l.preVat || 0) * (l.qty || 1)).toFixed(2));
    totalVat += parseFloat((l.vat || 0));
  });
  currentInvoice.subtotal   = parseFloat(subtotal.toFixed(2));
  currentInvoice.totalVat   = parseFloat(totalVat.toFixed(2));
  currentInvoice.grandTotal = parseFloat((subtotal + totalVat).toFixed(2));

  const el = document.getElementById('invTotals');
  if (el) el.innerHTML = totalsHTML();

  // Update list item total in real-time
  updateStats();
}

function addLine() {
  if (!currentInvoice) return;
  currentInvoice.lineItems.push(emptyLine());
  renderPreview();
  // Scroll to bottom of invoice
  const body = document.getElementById('previewBody');
  if (body) body.scrollTop = body.scrollHeight;
}

function removeLine(idx) {
  if (!currentInvoice || currentInvoice.lineItems.length <= 1) return;
  currentInvoice.lineItems.splice(idx, 1);
  recalcTotals();
  renderPreview();
}

function autoResizeTA(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

/* ══════════════════════════════════════
   SAVE INVOICE
══════════════════════════════════════ */
async function saveInvoice() {
  if (!currentInvoice) return;
  if (!currentInvoice.clientName.trim()) { showToast('Please enter a client name', 'error'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span> Saving…';

  // Force recalc before save
  recalcTotals();

  const data = {
    invoiceNumber: currentInvoice.invoiceNumber,
    date:          currentInvoice.date,
    clientName:    currentInvoice.clientName,
    clientAddress: currentInvoice.clientAddress,
    orderNotes:    currentInvoice.orderNotes,
    lineItems:     JSON.stringify(currentInvoice.lineItems),
    subtotal:      currentInvoice.subtotal,
    totalVat:      currentInvoice.totalVat,
    grandTotal:    currentInvoice.grandTotal
  };

  const result = await callApi({ action: 'saveInvoice', data });

  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Save';

  if (result && result.success) {
    if (isNew) {
      invoices.unshift({ ...currentInvoice });
      isNew = false;
    } else {
      const idx = invoices.findIndex(i => i.invoiceNumber === currentInvoice.invoiceNumber);
      if (idx > -1) invoices[idx] = { ...currentInvoice };
    }
    filterInvoices();
    showToast('Invoice saved ✓', 'success');
  } else {
    showToast('Failed to save invoice', 'error');
  }
}

/* ══════════════════════════════════════
   DELETE INVOICE
══════════════════════════════════════ */
async function deleteInvoice() {
  if (!currentInvoice) return;

  const ok = await showConfirm(
    'Delete Invoice?',
    `This will permanently delete ${currentInvoice.invoiceNumber}. This action cannot be undone.`
  );
  if (!ok) return;

  const result = await callApi({ action: 'deleteInvoice', id: currentInvoice.invoiceNumber });
  if (result && result.success) {
    invoices = invoices.filter(i => i.invoiceNumber !== currentInvoice.invoiceNumber);
    currentInvoice = null;
    isNew = false;
    document.getElementById('previewBody').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <p>Select an invoice or create a new one</p>
        <button class="btn btn-primary" onclick="newInvoice()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Invoice</button>
      </div>`;
    document.getElementById('previewActions').style.display = 'none';
    document.getElementById('previewTitle').textContent = 'Invoice Preview';
    filterInvoices();
    showToast('Invoice deleted', 'success');
  } else {
    showToast('Failed to delete invoice', 'error');
  }
}

/* ══════════════════════════════════════
   DOWNLOAD PDF
══════════════════════════════════════ */
async function downloadPDF() {
  const paper = document.getElementById('invoicePaper');
  if (!paper || !currentInvoice) return;

  showToast('Generating PDF…', 'info');

  // Temporarily hide editable controls for PDF
  const editables = paper.querySelectorAll('.inv-editable, .inv-editable-select, .add-line-btn, .line-item-del');
  editables.forEach(el => el.style.pointerEvents = 'none');

  try {
    const canvas = await html2canvas(paper, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      imageTimeout: 15000,
      onclone: (doc) => {
        // Replace editable inputs with plain text spans for clean PDF
        doc.querySelectorAll('.inv-editable').forEach(el => {
          const span = doc.createElement(el.tagName === 'TEXTAREA' ? 'p' : 'span');
          span.textContent = el.value || el.textContent;
          span.style.cssText = window.getComputedStyle(el).cssText;
          span.style.border = 'none';
          span.style.background = 'transparent';
          span.style.padding = el.style.padding || '';
          span.style.margin = el.style.margin || '';
          el.parentNode.replaceChild(span, el);
        });
        doc.querySelectorAll('.inv-editable-select').forEach(el => {
          const span = doc.createElement('span');
          span.textContent = el.options[el.selectedIndex]?.text || '';
          span.style.cssText = window.getComputedStyle(el).cssText;
          el.parentNode.replaceChild(span, el);
        });
        doc.querySelectorAll('.add-line-btn, .line-item-del').forEach(el => el.remove());
      }
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW  = pageW - 20;
    const imgH  = (canvas.height * imgW) / canvas.width;

    // If content is taller than a page, scale to fit
    const finalH = imgH > (pageH - 20) ? (pageH - 20) : imgH;
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 10, 10, imgW, finalH);
    pdf.save((currentInvoice.invoiceNumber || 'invoice') + '.pdf');
    showToast('PDF downloaded ✓', 'success');
  } catch (err) {
    console.error(err);
    showToast('PDF generation failed', 'error');
  } finally {
    editables.forEach(el => el.style.pointerEvents = '');
  }
}

/* ══════════════════════════════════════
   EMAIL MODAL
══════════════════════════════════════ */
function openEmailModal() {
  if (!currentInvoice) return;
  emailAttachFiles = [];
  document.getElementById('emailTo').value = currentInvoice.clientEmail || '';
  document.getElementById('emailCc').value = '';
  document.getElementById('emailSubject').value =
    `Invoice ${currentInvoice.invoiceNumber} from Pharm & Domestic`;
  document.getElementById('emailBody').value =
    `Dear ${currentInvoice.clientName || 'Customer'},\n\nPlease find attached your invoice ${currentInvoice.invoiceNumber} for the amount of ${fmt(currentInvoice.grandTotal)}.\n\nFor payment, please use the following bank details:\nAccount Name: ${COMPANY.bank.name}\nAccount No.: ${COMPANY.bank.account}\nSort Code: ${COMPANY.bank.sortCode}\n\nIf you have any questions, please do not hesitate to contact us at ${COMPANY.email}.\n\nKind regards,\nPharm & Domestic — TOUSIF LTD`;
  document.getElementById('emailModalSub').textContent = 'Invoice ' + currentInvoice.invoiceNumber;
  document.getElementById('attachList').innerHTML = '';
  document.getElementById('emailAttachInput').value = '';
  document.getElementById('emailModal').classList.add('visible');
}

function closeEmailModal() {
  document.getElementById('emailModal').classList.remove('visible');
}

document.getElementById('emailAttachInput').addEventListener('change', function () {
  Array.from(this.files).forEach(file => {
    emailAttachFiles.push(file);
    const chip = document.createElement('div');
    chip.className = 'attach-chip';
    chip.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${esc(file.name)}<button onclick="removeAttach(this,'${esc(file.name)}')" title="Remove">✕</button>`;
    document.getElementById('attachList').appendChild(chip);
  });
  this.value = '';
});

function removeAttach(btn, name) {
  emailAttachFiles = emailAttachFiles.filter(f => f.name !== name);
  btn.parentElement.remove();
}

async function sendEmail() {
  const to      = document.getElementById('emailTo').value.trim();
  const cc      = document.getElementById('emailCc').value.trim();
  const subject = document.getElementById('emailSubject').value.trim();
  const body    = document.getElementById('emailBody').value.trim();

  if (!to)      { showToast('Please enter at least one recipient', 'error'); return; }
  if (!subject) { showToast('Please enter a subject', 'error'); return; }

  const btn = document.getElementById('sendEmailBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span> Sending…';

  // Build plain-text invoice summary for email body
  const inv = currentInvoice;
  const linesSummary = (inv.lineItems || []).map(l =>
    `  - ${l.qty}x ${l.description} | Pre-VAT: ${fmt(l.preVat * l.qty)} | VAT (${l.vatRate}%): ${fmt(l.vat)} | Total: ${fmt(l.lineTotal)}`
  ).join('\n');

  const fullBody = `${body}\n\n---\nINVOICE SUMMARY\nInvoice No: ${inv.invoiceNumber}\nDate: ${inv.date}\nClient: ${inv.clientName}\n\nLine Items:\n${linesSummary}\n\nSubtotal: ${fmt(inv.subtotal)}\nTotal VAT: ${fmt(inv.totalVat)}\nGrand Total: ${fmt(inv.grandTotal)}\n\n${COMPANY.name} · ${COMPANY.tradingAs} · VAT: ${COMPANY.vat}`;

  const result = await callApi({
    action: 'emailInvoice',
    to, cc, subject, body: fullBody,
    invoiceNumber: inv.invoiceNumber
  });

  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Invoice';

  if (result && result.success) {
    closeEmailModal();
    showToast('Invoice emailed successfully ✓', 'success');
  } else {
    showToast('Failed to send email — check Apps Script', 'error');
  }
}

/* ══════════════════════════════════════
   CONFIRM DIALOG
══════════════════════════════════════ */
function showConfirm(title, msg) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    const okBtn = document.getElementById('confirmOkBtn');
    const newBtn = okBtn.cloneNode(true);
    okBtn.parentNode.replaceChild(newBtn, okBtn);
    newBtn.addEventListener('click', () => {
      document.getElementById('confirmOverlay').classList.remove('visible');
      _confirmResolve = null;
      resolve(true);
    });
    document.getElementById('confirmOverlay').classList.add('visible');
  });
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('visible');
  if (_confirmResolve) { const r = _confirmResolve; _confirmResolve = null; r(false); }
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
function showToast(msg, type) {
  // Remove existing info toasts when showing success/error
  if (type === 'success' || type === 'error') {
    document.querySelectorAll('.toast.info').forEach(t => t.remove());
  }
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<span class="spinner sm"></span>',
    warn:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  };
  t.innerHTML = (icons[type] || '') + ' ' + esc(msg);
  c.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toastOut .2s ease forwards';
    setTimeout(() => t.remove(), 200);
  }, type === 'info' ? 8000 : 2800);
}
