<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBA Warehouse Management</title>
  <link href__="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px; color: #0f172a; background: #f8fafc;
      line-height: 1.5; height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased;
    }
    .page-wrapper {
      padding: 5px 10px 15px 10px;
      max-width: 100%; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; flex-wrap: wrap; gap: 8px; flex-shrink: 0;
    }
    .stats-row   { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .stat-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 100px;
      font-size: 12px; font-weight: 600; border: 1px solid transparent; white-space: nowrap;
    }
    .stat-chip svg  { width: 12px; height: 12px; flex-shrink: 0; }
    .stat-chip.slate  { background: #f8fafc; color: #475569; border-color: #e2e8f0; }
    .stat-chip.blue   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .stat-chip.amber  { background: #fffbeb; color: #b45309; border-color: #fde68a; }
    .stat-chip.green  { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px; border: 1.5px solid;
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-primary  { background: #0f172a; border-color: #0f172a; color: #fff; }
    .btn-primary:hover  { background: #1e293b; border-color: #1e293b; }
    .btn-secondary { background: #fff; border-color: #e2e8f0; color: #475569; }
    .btn-secondary:hover { border-color: #94a3b8; color: #0f172a; }
    .btn-danger   { background: #fff; border-color: #fecaca; color: #dc2626; }
    .btn-danger:hover   { background: #fee2e2; border-color: #fca5a5; }
    .btn-danger.confirming { background: #dc2626; border-color: #dc2626; color: #fff; animation: deletePulse .4s ease; }
    .btn-danger.deleting   { background: #dc2626; border-color: #dc2626; color: #fff; opacity: .7; pointer-events: none; }
    @keyframes deletePulse { 0%{transform:scale(1)} 40%{transform:scale(1.05)} 100%{transform:scale(1)} }
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; flex-shrink: 0; }
    .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 280px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 14px; height: 14px; pointer-events: none; }
    .search-input { width: 100%; padding: 7px 10px 7px 32px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; background: #fff; color: #0f172a; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: #2563eb; }
    .kanban-wrapper { flex: 1; display: flex; gap: 10px; min-height: 0; overflow: hidden; }
    .kanban-column  { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; height: 100%; }
    .kanban-col-header { flex-shrink: 0; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #f1f5f9; background: #fafbfc; }
    .kanban-col-title  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; gap: 7px; }
    .kanban-col-title .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .kanban-col-count  { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; background: #f1f5f9; color: #64748b; }
    .kanban-col-body   { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .kanban-col-body::-webkit-scrollbar { width: 4px; }
    .kanban-col-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .kanban-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: box-shadow .12s, border-color .12s; animation: cardIn .18s ease both; user-select: none; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .kanban-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #bfdbfe; }
    .kanban-card.card-updated { animation: cardFlash .6s ease; }
    @keyframes cardFlash { 0%{background:#fff7ed;border-color:#fdba74} 100%{background:#fff;border-color:#e2e8f0} }
    .kanban-card.card-deleting { animation: cardDelete .4s ease forwards; }
    @keyframes cardDelete { 0%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.95)} 100%{opacity:0;transform:scale(.9);max-height:0;padding:0;margin:0;border:none} }
    .kc-label    { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 2px; line-height: 1.3; }
    .kc-brandline{ font-size: 11px; color: #64748b; margin-bottom: 3px; }
    .kc-asin     { font-size: 10px; color: #94a3b8; font-family: 'SF Mono','Fira Code',monospace; margin-bottom: 6px; }
    .kc-stats    { display: flex; gap: 12px; margin-bottom: 7px; }
    .kc-stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: #94a3b8; }
    .kc-stat-val   { font-size: 12px; font-weight: 700; color: #0f172a; }
    .kc-chips    { display: flex; gap: 4px; flex-wrap: wrap; padding-top: 6px; border-top: 1px solid #f1f5f9; }
    .chip { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 100px; font-size: 10px; font-weight: 700; }
    .chip.yes  { background: #dcfce7; color: #15803d; }
    .chip.no   { background: #f1f5f9; color: #94a3b8; }
    .chip.unset{ background: #fef3c7; color: #92400e; }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: #94a3b8; gap: 10px; flex: 1; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin .65s linear infinite; }
    .spinner.sm { width: 13px; height: 13px; border-width: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; color: #94a3b8; gap: 6px; text-align: center; }
    .empty-state p { font-size: 13px; font-weight: 600; color: #64748b; }
    .drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 900; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(2px); }
    .drawer-overlay.visible { opacity: 1; pointer-events: all; }
    .drawer { position: fixed; top: 0; right: 0; width: 580px; max-width: 97vw; height: 100vh; background: #fff; box-shadow: -8px 0 40px rgba(0,0,0,.13); z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); overflow: hidden; }
    .drawer.open { transform: translateX(0); }
    .drawer-hero { padding: 14px 20px 12px; background: linear-gradient(135deg,#1e293b 0%,#0f172a 100%); position: relative; overflow: hidden; flex-shrink: 0; }
    .drawer-hero::before { content:''; position:absolute; top:-50px; right:-50px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.03); }
    .drawer-hero::after  { content:''; position:absolute; bottom:-25px; left:30px; width:100px; height:100px; border-radius:50%; background:rgba(37,99,235,.1); }
    .drawer-hero-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border: none; border-radius: 7px; background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.65); transition: background .15s; z-index: 1; }
    .drawer-hero-close:hover { background: rgba(255,255,255,.2); color: #fff; }
    .drawer-bucket-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; margin-bottom: 6px; font-size: 11px; font-weight: 700; letter-spacing: .2px; position: relative; z-index: 1; }
    .dbb-digital   { background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.3); color: #60a5fa; }
    .dbb-warehouse { background: rgba(251,191,36,.15); border: 1px solid rgba(251,191,36,.3); color: #fbbf24; }
    .dbb-completed { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }
    .drawer-title    { font-size: 17px; font-weight: 700; color: #fff; padding-right: 40px; line-height: 1.3; margin-bottom: 2px; position: relative; z-index: 1; }
    .drawer-subtitle { font-size: 11px; color: rgba(255,255,255,.5); margin-bottom: 10px; position: relative; z-index: 1; font-family: monospace; }
    .drawer-kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; position: relative; z-index: 1; }
    .drawer-kpi { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); border-radius: 9px; padding: 7px 9px; }
    .drawer-kpi-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: rgba(255,255,255,.4); margin-bottom: 2px; }
    .drawer-kpi-val   { font-size: 14px; font-weight: 700; color: #fff; line-height: 1; }
    .drawer-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    .drawer-tabs::-webkit-scrollbar { display: none; }
    .drawer-tab { padding: 9px 14px; font-size: 12px; font-weight: 700; font-family: inherit; color: #64748b; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .drawer-tab svg { width: 13px; height: 13px; }
    .drawer-tab:hover { color: #334155; }
    .drawer-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #fafcff; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 14px 20px; min-height: 0; }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .drawer-section { margin-bottom: 20px; }
    .section-label  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-grid.full { grid-template-columns: 1fr; }
    .info-card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 10px 13px; transition: border-color .15s; }
    .info-card:focus-within { border-color: #93c5fd; background: #fafcff; }
    .info-card label { display: block; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #94a3b8; margin-bottom: 7px; }
    .edit-input, .edit-select, .edit-textarea {
      width: 100%; padding: 6px 10px; border: 1.5px solid #e2e8f0; border-radius: 7px;
      font-size: 13px; font-family: inherit; color: #0f172a; background: #fff;
      outline: none; transition: border-color .15s;
    }
    .edit-input:focus, .edit-select:focus, .edit-textarea:focus { border-color: #2563eb; }
    .edit-textarea { resize: vertical; min-height: 64px; }
    .bool-select { width: 100%; padding: 6px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; outline: none; cursor: pointer; transition: all .15s; appearance: auto; }
    .bool-select.yes   { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .bool-select.no    { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
    .bool-select.empty { background: #fff; color: #94a3b8; border-color: #e2e8f0; }
    .drawer-footer { padding: 7px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; align-items: center; flex-shrink: 0; background: #fafafa; }
    .toast-container { position: fixed; top: 65px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
    .toast { display: flex; align-items: center; gap: 9px; padding: 10px 14px; background: #0f172a; color: #fff; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.18); animation: toastIn .2s ease; max-width: 300px; pointer-events: auto; }
    .toast.success { background: #15803d; }
    .toast.error   { background: #dc2626; }
    .toast.info    { background: #1e40af; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); z-index: 1100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(3px); }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal { background: #fff; border-radius: 16px; box-shadow: 0 25px 60px rgba(0,0,0,.2); width: 92vw; max-width: 1100px; height: 75vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-sm { max-width: 500px; height: auto; max-height: 90vh; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-header h2 { font-size: 16px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px; }
    .modal-count { font-size: 12px; font-weight: 700; background: #f1f5f9; color: #64748b; padding: 2px 10px; border-radius: 100px; }
    .modal-close { width: 32px; height: 32px; border: none; border-radius: 8px; background: #f1f5f9; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b; transition: all .15s; }
    .modal-close:hover { background: #e2e8f0; color: #0f172a; }
    .modal-body { flex: 1; overflow: auto; min-height: 0; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
    .new-form { padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .form-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; }
    .form-group input { padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; transition: border-color .15s; }
    .form-group input:focus { border-color: #2563eb; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table thead { position: sticky; top: 0; z-index: 2; }
    .data-table th { background: #f8fafc; padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    .data-table td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; white-space: nowrap; }
    .data-table tr { transition: background .1s; }
    .data-table tr:hover td { background: #fafbff; }
    .bool-yes { color: #15803d; font-weight: 700; }
    .bool-no  { color: #dc2626; font-weight: 700; }
    @media (max-width: 900px) {
      .kanban-wrapper { overflow-x: auto; overflow-y: hidden; }
      .kanban-column  { min-width: 280px; flex-shrink: 0; }
      .drawer { width: 93vw; }
    }
    @media (max-width: 640px) {
      html, body { overflow: auto; height: auto; }
      .page-wrapper { height: auto; overflow: visible; padding: 8px; }
      .kanban-wrapper { overflow-x: auto; flex-direction: row; min-height: 0; height: 68vh; }
      .kanban-column  { min-width: 260px; flex-shrink: 0; height: 100%; }
      .drawer { width: 100%; max-width: 100%; }
      .drawer-kpi-row { grid-template-columns: repeat(2,1fr); }
      .info-grid { grid-template-columns: 1fr !important; }
      .modal { width: 98vw; height: 85vh; border-radius: 10px; }
      .form-row { grid-template-columns: 1fr; }
      .header-actions { width: 100%; justify-content: flex-end; }
      .stats-row .stat-chip span { display: none; }
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="page-header">
    <div class="stats-row">
      <div class="stat-chip slate" id="statTotal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <span>Loading…</span>
      </div>
      <div class="stat-chip blue" id="statDigital">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>—</span>
      </div>
      <div class="stat-chip amber" id="statWarehouse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>—</span>
      </div>
      <div class="stat-chip green" id="statCompleted">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span>—</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="showCleanModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clean Completed
      </button>
      <button class="btn btn-primary" onclick="openNewModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Record
      </button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search label code, brand, ASIN…" oninput="applyFilters()">
    </div>
  </div>

  <div class="kanban-wrapper" id="kanbanWrapper">
    <div class="loading-state" id="loadingState" style="width:100%">
      <span class="spinner"></span>
      <span style="font-size:13px;font-weight:600">Loading FBA records…</span>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <div id="drawerHeader"></div>
  <div class="drawer-tabs" id="drawerTabs"></div>
  <div class="drawer-body"  id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- CLEAN COMPLETED MODAL -->
<div class="modal-overlay" id="cleanModalOverlay" onclick="closeCleanModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Completed Records
        <span class="modal-count" id="cleanModalCount">0</span>
      </h2>
      <button class="modal-close" onclick="closeCleanModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="cleanModalBody"></div>
  </div>
</div>

<!-- NEW RECORD MODAL -->
<div class="modal-overlay" id="newModalOverlay" onclick="closeNewModal(event)">
  <div class="modal modal-sm" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New FBA Record
      </h2>
      <button class="modal-close" onclick="closeNewModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="new-form">
      <div class="form-row">
        <div class="form-group">
          <label>Label Code</label>
          <input type="text" id="nLabelCode" placeholder="e.g. FBA-LC-001">
        </div>
        <div class="form-group">
          <label>Brand</label>
          <input type="text" id="nBrand" placeholder="Brand name">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Product Line</label>
          <input type="text" id="nProductLine" placeholder="Product line">
        </div>
        <div class="form-group">
          <label>ASIN</label>
          <input type="text" id="nAsin" placeholder="B0XXXXXXXXX">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeNewModal()">Cancel</button>
      <button class="btn btn-primary" id="newSubmitBtn" onclick="createRecord()">Create Record</button>
    </div>
  </div>
</div>

<script>
(function () {
'use strict';

/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyC4K9ozRkXE43SoA-lDJkh5CGI5IfEhVx1A5WDpgXDTwOVlpQmvu6aXZuHOtZ3mss1/exec';

/* ══════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════ */

/**
 * BUCKET LOGIC:
 * ─ Digital Ops  → ANY of these fields is missing/empty
 * ─ Warehouse    → all Digital Ops fields filled, but NOT (Units Completed > 0 AND UPS Collected = Yes)
 * ─ Completed    → all Digital Ops fields filled AND Units Completed > 0 AND UPS Collected = Yes
 *                  → hidden from kanban, shown only in "Clean Completed" modal
 */
const DIGITAL_OPS_REQUIRED = [
  'Label Code', 'Brand', 'Product Line', 'ASIN', 'Prep Instructions',
  'Bundle', 'DG Label', 'Poly Bag', 'Warning Label', 'Barcode', 'Box',
  'Units Required', 'Veeqo Stock Adjusted'
];

// Bool fields: considered filled when value is "yes" OR "no" (deliberate choice made)
const BOOL_FIELDS = new Set([
  'Bundle', 'DG Label', 'Poly Bag', 'Warning Label', 'Barcode', 'Box',
  'Veeqo Stock Adjusted', 'UPS Collected'
]);

const COLUMNS = [
  { key: 'digital_ops', title: 'Digital Ops', dotColor: '#2563eb' },
  { key: 'warehouse',   title: 'Warehouse',   dotColor: '#d97706' },
];

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let allData   = [];
let filtered  = [];
let activeTab = 'info';
let deletePendingTimer = null;

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ea(s) {
  return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/**
 * A field is "filled" when:
 *  - Bool fields: value is "yes" or "no" (user made a deliberate choice)
 *  - Units Required: must be a positive number
 *  - All other text fields: any non-empty string
 */
function isFieldFilled(field, value) {
  if (field === 'Units Required') {
    return value !== '' && value !== null && value !== undefined && Number(value) > 0;
  }
  if (BOOL_FIELDS.has(field)) {
    const v = String(value ?? '').trim().toLowerCase();
    return v === 'yes' || v === 'no';
  }
  return String(value ?? '').trim() !== '';
}

/* ══════════════════════════════════════════════════
   BUCKET LOGIC  ← critical
══════════════════════════════════════════════════ */
function getBucket(row) {
  // Check all Digital Ops required fields
  const digitalOpsComplete = DIGITAL_OPS_REQUIRED.every(f => isFieldFilled(f, row[f]));

  // Any missing → Digital Ops
  if (!digitalOpsComplete) return 'digital_ops';

  // Both must be done to exit Warehouse
  const unitsDone = Number(row['Units Completed'] ?? 0) > 0;
  const upsDone   = String(row['UPS Collected'] ?? '').trim().toLowerCase() === 'yes';

  if (unitsDone && upsDone) return 'completed'; // hidden from board

  return 'warehouse';
}

/* ══════════════════════════════════════════════════
   DATA — LOAD  (GET request to bypass CORS)
   Requires doGet in Apps Script that handles action=getFBA
══════════════════════════════════════════════════ */
async function loadData() {
  try {
    // ── Use GET to avoid CORS preflight issues with Google Apps Script ──
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getFBA' })
    });
    const data = await res.json();

    if (!data.success) throw new Error(data.message || 'API error');

    const headers = data.headers || [];
    allData = (data.rows || []).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
      return obj;
    });

    applyFilters();
    showToast('Loaded ' + allData.length + ' records', 'success');

  } catch (err) {
    console.error(err);
    document.getElementById('kanbanWrapper').innerHTML =
      '<div class="loading-state" style="width:100%">'
      + '<p style="color:#dc2626;font-weight:600;text-align:center;line-height:1.7">'
      + 'Failed to load data.<br>'
      + '<span style="font-size:12px;color:#94a3b8;font-weight:500">Make sure your Apps Script has a <code>doGet</code> handler and is deployed as "Anyone".</span>'
      + '</p></div>';
    showToast('Failed to load data', 'error');
  }
}

/* ══════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════ */
function updateStats() {
  const total     = allData.length;
  const digital   = allData.filter(r => getBucket(r) === 'digital_ops').length;
  const warehouse = allData.filter(r => getBucket(r) === 'warehouse').length;
  const completed = allData.filter(r => getBucket(r) === 'completed').length;

  setChip('statTotal',     total     + ' Total');
  setChip('statDigital',   digital   + ' Digital Ops');
  setChip('statWarehouse', warehouse + ' Warehouse');
  setChip('statCompleted', completed + ' Completed');
}

function setChip(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + text + '</span>';
}

/* ══════════════════════════════════════════════════
   FILTERS + SEARCH
══════════════════════════════════════════════════ */
function applyFilters() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  filtered = allData.filter(row => {
    if (!q) return true;
    return (
      String(row['Label Code']   || '').toLowerCase().includes(q) ||
      String(row['Brand']        || '').toLowerCase().includes(q) ||
      String(row['Product Line'] || '').toLowerCase().includes(q) ||
      String(row['ASIN']         || '').toLowerCase().includes(q)
    );
  });
  updateStats();
  renderKanban();
}

/* ══════════════════════════════════════════════════
   KANBAN RENDER
══════════════════════════════════════════════════ */
function renderKanban() {
  const wrapper = document.getElementById('kanbanWrapper');

  // completed items go to modal only — exclude from board
  const groups = { digital_ops: [], warehouse: [] };
  filtered.forEach(row => {
    const b = getBucket(row);
    if (groups[b]) groups[b].push(row);
  });

  wrapper.innerHTML = '';

  COLUMNS.forEach(col => {
    const items  = groups[col.key] || [];
    const colEl  = document.createElement('div');
    colEl.className = 'kanban-column';

    const hdr = document.createElement('div');
    hdr.className = 'kanban-col-header';
    hdr.innerHTML =
      '<div class="kanban-col-title">'
      + '<span class="col-dot" style="background:' + col.dotColor + '"></span>'
      + esc(col.title) + '</div>'
      + '<span class="kanban-col-count">' + items.length + '</span>';
    colEl.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'kanban-col-body';

    if (!items.length) {
      body.innerHTML =
        '<div class="empty-state">'
        + '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
        + '<p>No records</p></div>';
    } else {
      items.forEach(row => body.appendChild(buildCard(row)));
    }

    colEl.appendChild(body);
    wrapper.appendChild(colEl);
  });
}

/* ══════════════════════════════════════════════════
   CARD
══════════════════════════════════════════════════ */
function buildCard(row) {
  const id   = String(row['ID'] || '');
  const card = document.createElement('div');
  card.className  = 'kanban-card';
  card.dataset.id = id;
  card.innerHTML  = cardHTML(row);
  card.addEventListener('click', () => openDrawer(id));
  return card;
}

function cardHTML(row) {
  const labelCode   = row['Label Code']   || '—';
  const brand       = row['Brand']        || '';
  const productLine = row['Product Line'] || '';
  const asin        = row['ASIN']         || '';
  const unitsReq    = row['Units Required'];
  const brandLine   = [brand, productLine].filter(Boolean).join(' · ');

  const chipDefs = [
    { key: 'DG Label',      label: 'DG'      },
    { key: 'Poly Bag',      label: 'Poly'    },
    { key: 'Warning Label', label: 'Warn'    },
    { key: 'Barcode',       label: 'Barcode' },
    { key: 'Box',           label: 'Box'     },
  ];

  const chips = chipDefs.map(c => {
    const v = String(row[c.key] || '').trim().toLowerCase();
    if (v === 'yes')  return '<span class="chip yes">'   + c.label + '</span>';
    if (v === 'no')   return '<span class="chip no">'    + c.label + '</span>';
    return             '<span class="chip unset">' + c.label + '</span>';
  }).join('');

  return ''
    + '<div class="kc-label">'     + esc(labelCode) + '</div>'
    + (brandLine ? '<div class="kc-brandline">' + esc(brandLine) + '</div>' : '')
    + (asin      ? '<div class="kc-asin">'      + esc(asin)     + '</div>' : '')
    + '<div class="kc-stats"><div class="kc-stat">'
      + '<div class="kc-stat-label">Units Req.</div>'
      + '<div class="kc-stat-val">' + esc(String(unitsReq || '—')) + '</div>'
    + '</div></div>'
    + '<div class="kc-chips">' + chips + '</div>';
}

/* ══════════════════════════════════════════════════
   DRAWER — OPEN / CLOSE
══════════════════════════════════════════════════ */
function openDrawer(id) {
  const row = allData.find(r => String(r['ID']) === String(id));
  if (!row) return;
  const drawer = document.getElementById('detailDrawer');
  drawer.dataset.currentId = id;
  activeTab = 'info';
  renderDrawer(row);
  drawer.classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
}

function closeDrawer() {
  document.getElementById('detailDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('visible');
  applyFilters();
}

/* ══════════════════════════════════════════════════
   DRAWER — RENDER
══════════════════════════════════════════════════ */
function renderDrawer(row) {
  const id     = String(row['ID'] || '');
  const bucket = getBucket(row);

  const badgeHTML = {
    digital_ops: '<span class="drawer-bucket-badge dbb-digital">Digital Ops</span>',
    warehouse:   '<span class="drawer-bucket-badge dbb-warehouse">Warehouse</span>',
    completed:   '<span class="drawer-bucket-badge dbb-completed">Completed</span>',
  }[bucket] || '';

  const title     = row['Label Code'] || 'New Record';
  const subtitle  = [row['Brand'], row['Product Line']].filter(Boolean).join(' · ')
                  + (row['ASIN'] ? ' · ' + row['ASIN'] : '');
  const unitsReq  = row['Units Required']  || '—';
  const unitsDone = row['Units Completed'] || '—';
  const upsCol    = row['UPS Collected']   || '—';

  document.getElementById('drawerHeader').innerHTML =
    '<div class="drawer-hero">'
    + '<button class="drawer-hero-close" onclick="closeDrawer()">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    + '</button>'
    + badgeHTML
    + '<div class="drawer-title">'    + esc(title)    + '</div>'
    + '<div class="drawer-subtitle">' + esc(subtitle) + '</div>'
    + '<div class="drawer-kpi-row">'
      + kpiBox('Units Required',  esc(String(unitsReq)))
      + kpiBox('Units Completed', esc(String(unitsDone)))
      + kpiBox('UPS Collected',   esc(String(upsCol)))
    + '</div>'
    + '</div>';

  document.getElementById('drawerTabs').innerHTML =
    dTab('info',      id, svgGrid(),      'Product Info')
    + dTab('prep',    id, svgPackage(),   'Prep')
    + dTab('warehouse', id, svgWarehouse(), 'Warehouse');

  let body = '';

  if (activeTab === 'info') {
    body += sec('Product Info') + '<div class="info-grid">'
      + eCard(id, 'Label Code',   row['Label Code']   || '', 'text')
      + eCard(id, 'Brand',        row['Brand']        || '', 'text')
      + eCard(id, 'Product Line', row['Product Line'] || '', 'text')
      + eCard(id, 'ASIN',         row['ASIN']         || '', 'text')
      + '</div></div>';
  }

  if (activeTab === 'prep') {
    body += sec('Instructions') + '<div class="info-grid full">'
      + taCard(id, 'Prep Instructions', row['Prep Instructions'] || '')
      + '</div></div>'
      + sec('Packaging') + '<div class="info-grid">'
      + bCard(id, 'Bundle',        row['Bundle'])
      + bCard(id, 'DG Label',      row['DG Label'])
      + bCard(id, 'Poly Bag',      row['Poly Bag'])
      + bCard(id, 'Warning Label', row['Warning Label'])
      + bCard(id, 'Barcode',       row['Barcode'])
      + bCard(id, 'Box',           row['Box'])
      + '</div></div>';
  }

  if (activeTab === 'warehouse') {
    body += sec('Quantities') + '<div class="info-grid">'
      + eCard(id, 'Units Required',  row['Units Required']  || '', 'number')
      + eCard(id, 'Units Completed', row['Units Completed'] || '', 'number')
      + '</div></div>'
      + sec('Completion') + '<div class="info-grid">'
      + bCard(id, 'Veeqo Stock Adjusted', row['Veeqo Stock Adjusted'])
      + bCard(id, 'UPS Collected',        row['UPS Collected'])
      + '</div></div>';
  }

  document.getElementById('drawerBody').innerHTML = body;

  document.getElementById('drawerFooter').innerHTML =
    '<span style="font-size:11px;color:#94a3b8">Changes auto-save</span>'
    + '<button id="deleteBtn" class="btn btn-danger" onclick="deleteRecord(\'' + ea(id) + '\')">'
    + svgTrash() + 'Delete</button>';
}

/* ── Drawer component helpers ── */
function kpiBox(label, val) {
  return '<div class="drawer-kpi"><div class="drawer-kpi-label">' + label + '</div><div class="drawer-kpi-val">' + val + '</div></div>';
}
function dTab(t, id, icon, label) {
  return '<button class="drawer-tab' + (activeTab === t ? ' active' : '') + '" onclick="switchTab(\'' + t + '\',\'' + ea(id) + '\')">' + icon + label + '</button>';
}
function switchTab(t, id) {
  activeTab = t;
  const row = allData.find(r => String(r['ID']) === String(id));
  if (row) renderDrawer(row);
}
function sec(label) {
  return '<div class="drawer-section"><div class="section-label">' + esc(label) + '</div>';
}
function eCard(id, label, value, type) {
  let inp;
  if (type === 'number') {
    const n = parseFloat(value);
    inp = '<input type="number" class="edit-input" value="' + (isNaN(n) ? '' : n) + '" step="1" min="0"'
        + ' onblur="saveField(\'' + ea(id) + '\',\'' + ea(label) + '\',this.value)">';
  } else {
    inp = '<input type="text" class="edit-input" value="' + ea(String(value)) + '"'
        + ' onblur="saveField(\'' + ea(id) + '\',\'' + ea(label) + '\',this.value)">';
  }
  return '<div class="info-card"><label>' + esc(label) + '</label>' + inp + '</div>';
}
function taCard(id, label, value) {
  return '<div class="info-card"><label>' + esc(label) + '</label>'
    + '<textarea class="edit-textarea" onblur="saveField(\'' + ea(id) + '\',\'' + ea(label) + '\',this.value)">'
    + esc(value) + '</textarea></div>';
}
function bCard(id, label, value) {
  const v   = String(value ?? '').trim();
  const low = v.toLowerCase();
  const cls = low === 'yes' ? 'yes' : low === 'no' ? 'no' : 'empty';
  return '<div class="info-card"><label>' + esc(label) + '</label>'
    + '<select class="bool-select ' + cls + '" onchange="saveBool(\'' + ea(id) + '\',\'' + ea(label) + '\',this)">'
    + '<option value=""'    + (v === '' ? ' selected' : '') + '>— Not set —</option>'
    + '<option value="Yes"' + (low === 'yes' ? ' selected' : '') + '>Yes</option>'
    + '<option value="No"'  + (low === 'no'  ? ' selected' : '') + '>No</option>'
    + '</select></div>';
}
function svgGrid()      { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>'; }
function svgPackage()   { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'; }
function svgWarehouse() { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'; }
function svgTrash()     { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>'; }

/* ══════════════════════════════════════════════════
   SAVE — FIELD
══════════════════════════════════════════════════ */
async function saveField(id, field, value) {
  const idx = allData.findIndex(r => String(r['ID']) === String(id));
  if (idx < 0) return;

  allData[idx][field] = value;
  showToast('Saving…', 'info');

  const result = await callApi({ action: 'saveFBA', data: rowToApiData(allData[idx]) });

  if (result && result.success) {
    showToast('Saved', 'success');
    updateStats();
    if (document.getElementById('detailDrawer').classList.contains('open')) {
      renderDrawer(allData[idx]);
    }
  } else {
    showToast('Error saving', 'error');
  }
}

async function saveBool(id, field, selectEl) {
  const v = selectEl.value;
  selectEl.className = 'bool-select ' + (v === 'Yes' ? 'yes' : v === 'No' ? 'no' : 'empty');
  await saveField(id, field, v);
}

/* ══════════════════════════════════════════════════
   DELETE RECORD
══════════════════════════════════════════════════ */
async function deleteRecord(id) {
  const btn = document.getElementById('deleteBtn');
  if (!btn) return;

  if (!btn.classList.contains('confirming')) {
    btn.classList.add('confirming');
    btn.innerHTML =
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Confirm?';
    deletePendingTimer = setTimeout(() => {
      btn.classList.remove('confirming');
      btn.innerHTML = svgTrash() + 'Delete';
    }, 3000);
    return;
  }

  clearTimeout(deletePendingTimer);
  btn.classList.remove('confirming');
  btn.classList.add('deleting');
  btn.innerHTML = '<span class="spinner sm"></span>Deleting…';

  const card = document.querySelector('.kanban-card[data-id="' + id + '"]');
  if (card) card.classList.add('card-deleting');

  const result = await callApi({ action: 'deleteFBA', id });

  if (result && result.success) {
    const idx = allData.findIndex(r => String(r['ID']) === String(id));
    if (idx > -1) allData.splice(idx, 1);
    setTimeout(() => {
      document.getElementById('detailDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('visible');
      applyFilters();
      showToast('Record deleted', 'success');
    }, 420);
  } else {
    if (card) card.classList.remove('card-deleting');
    btn.classList.remove('deleting');
    btn.innerHTML = svgTrash() + 'Delete';
    showToast('Error deleting record', 'error');
  }
}

/* ══════════════════════════════════════════════════
   NEW RECORD MODAL
══════════════════════════════════════════════════ */
function openNewModal() {
  ['nLabelCode','nBrand','nProductLine','nAsin'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('newModalOverlay').classList.add('visible');
  setTimeout(() => document.getElementById('nLabelCode').focus(), 80);
}

function closeNewModal(e) {
  if (e && e.target !== document.getElementById('newModalOverlay')) return;
  document.getElementById('newModalOverlay').classList.remove('visible');
}

async function createRecord() {
  const btn = document.getElementById('newSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>Creating…';

  const data = {
    id:               '',
    labelCode:        document.getElementById('nLabelCode').value.trim(),
    brand:            document.getElementById('nBrand').value.trim(),
    productLine:      document.getElementById('nProductLine').value.trim(),
    asin:             document.getElementById('nAsin').value.trim(),
    prepInstructions: '',
    bundle:           '',
    dgLabel:          '',
    polyBag:          '',
    warningLabel:     '',
    barcode:          '',
    box:              '',
    unitsRequired:    0,
    veeqoAdjusted:    '',
    unitsCompleted:   0,
    upsCollected:     ''
  };

  const result = await callApi({ action: 'saveFBA', data });

  btn.disabled = false;
  btn.innerHTML = 'Create Record';

  if (result && result.success) {
    closeNewModal();
    await loadData();
    if (result.id) openDrawer(result.id);
    showToast('Record created', 'success');
  } else {
    showToast('Error creating record', 'error');
  }
}

/* ══════════════════════════════════════════════════
   CLEAN COMPLETED MODAL
══════════════════════════════════════════════════ */
function showCleanModal() {
  const completed = allData.filter(r => getBucket(r) === 'completed');
  document.getElementById('cleanModalCount').textContent = completed.length;

  const cols = [
    'ID', 'Label Code', 'Brand', 'Product Line', 'ASIN',
    'Prep Instructions', 'Bundle', 'DG Label', 'Poly Bag',
    'Warning Label', 'Barcode', 'Box',
    'Units Required', 'Veeqo Stock Adjusted', 'Units Completed', 'UPS Collected'
  ];
  const boolCols = new Set([
    'Bundle','DG Label','Poly Bag','Warning Label','Barcode','Box',
    'Veeqo Stock Adjusted','UPS Collected'
  ]);

  let html = '<table class="data-table"><thead><tr>'
    + cols.map(c => '<th>' + esc(c) + '</th>').join('')
    + '</tr></thead><tbody>';

  if (!completed.length) {
    html += '<tr><td colspan="' + cols.length + '" style="text-align:center;padding:32px;color:#94a3b8;font-weight:600">No completed records yet</td></tr>';
  } else {
    completed.forEach(row => {
      html += '<tr>' + cols.map(c => {
        const v = row[c];
        if (boolCols.has(c)) {
          const yes = String(v || '').toLowerCase() === 'yes';
          return '<td class="' + (yes ? 'bool-yes' : 'bool-no') + '">' + (yes ? 'Yes' : 'No') + '</td>';
        }
        return '<td>' + esc(String(v ?? '—')) + '</td>';
      }).join('') + '</tr>';
    });
  }

  html += '</tbody></table>';
  document.getElementById('cleanModalBody').innerHTML = html;
  document.getElementById('cleanModalOverlay').classList.add('visible');
}

function closeCleanModal(e) {
  if (e && e.target !== document.getElementById('cleanModalOverlay')) return;
  document.getElementById('cleanModalOverlay').classList.remove('visible');
}

/* ══════════════════════════════════════════════════
   API HELPERS
   NOTE: POST is used for write operations (save/delete).
   Google Apps Script handles POST CORS differently per browser/origin;
   if POST saves fail, ensure the script is deployed as "Anyone (even anonymous)".
══════════════════════════════════════════════════ */
async function callApi(body) {
  try {
    const res = await fetch(API_URL, {
      method : 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body   : JSON.stringify(body)
    });
    return await res.json();
  } catch (err) {
    console.error('API error:', err);
    return null;
  }
}

function rowToApiData(row) {
  return {
    id:               String(row['ID'] || ''),
    labelCode:        String(row['Label Code']            ?? ''),
    brand:            String(row['Brand']                 ?? ''),
    productLine:      String(row['Product Line']          ?? ''),
    asin:             String(row['ASIN']                  ?? ''),
    prepInstructions: String(row['Prep Instructions']     ?? ''),
    bundle:           String(row['Bundle']                ?? ''),
    dgLabel:          String(row['DG Label']              ?? ''),
    polyBag:          String(row['Poly Bag']              ?? ''),
    warningLabel:     String(row['Warning Label']         ?? ''),
    barcode:          String(row['Barcode']               ?? ''),
    box:              String(row['Box']                   ?? ''),
    unitsRequired:    Number(row['Units Required'])       || 0,
    veeqoAdjusted:    String(row['Veeqo Stock Adjusted']  ?? ''),
    unitsCompleted:   Number(row['Units Completed'])      || 0,
    upsCollected:     String(row['UPS Collected']         ?? '')
  };
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  if (type === 'success' || type === 'error') {
    c.querySelectorAll('.toast.info').forEach(t => t.remove());
  }
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<span class="spinner sm"></span>'
  };
  t.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), type === 'info' ? 10000 : 2500);
}
