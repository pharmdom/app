

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --border:    #e2e8f0;
  --border2:   #f1f5f9;
  --text:      #0f172a;
  --text2:     #334155;
  --text3:     #64748b;
  --text4:     #94a3b8;
  --blue:      #2563eb;
  --blue-d:    #1d4ed8;
  --blue-bg:   #eff6ff;
  --blue-bd:   #bfdbfe;
  --green:     #15803d;
  --green-bg:  #f0fdf4;
  --green-bd:  #bbf7d0;
  --amber:     #f59e0b;
  --amber-d:   #d97706;
  --amber-bg:  #fffbeb;
  --amber-bd:  #fde68a;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --red-bd:    #fecaca;
  --navy:      #0f172a;
  --navy2:     #1e293b;
}

html,body{font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Top bar — matches FBA page style ── */
.page-wrapper{padding:5px 10px 15px 10px;max-width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;flex-shrink:0}
.header-left{display:flex;gap:8px;align-items:center;flex:1;min-width:0;flex-wrap:wrap}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

.stat-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap;cursor:default}
.stat-chip svg{width:12px;height:12px;flex-shrink:0}
.stat-chip.slate{background:#f8fafc;color:#475569;border-color:#e2e8f0}
.stat-chip.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1.5px solid;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:#2563eb;border-color:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8;border-color:#1d4ed8}
.btn-secondary{background:#fff;border-color:var(--border);color:var(--text3)}
.btn-secondary:hover{border-color:#94a3b8;color:var(--text)}
.btn-amber{background:#f59e0b;border-color:#f59e0b;color:#fff}
.btn-amber:hover{background:#d97706;border-color:#d97706}
.btn-danger{background:#fff;border-color:var(--red-bd);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-ghost{background:#f1f5f9;border-color:#f1f5f9;color:#475569}
.btn-ghost:hover{background:#e2e8f0}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}

/* ── Search ── */
.search-wrap{position:relative;min-width:160px;max-width:260px;flex:1}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);width:14px;height:14px;pointer-events:none}
.search-input{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:#2563eb}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ══════════════════════════════════════
   OFFERS TABLE
══════════════════════════════════════ */
.table-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05);display:flex;flex-direction:column;flex:1;min-height:0}
.table-scroll-wrapper{flex:1;overflow-y:auto;overflow-x:hidden}
.table-scroll-wrapper::-webkit-scrollbar{width:4px}
.table-scroll-wrapper::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.offers-table{width:100%;border-collapse:collapse;table-layout:fixed}
.offers-table thead tr{background:#f8fafc;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:2}
.offers-table th{padding:10px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:visible}
.offers-table tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;cursor:pointer}
.offers-table tbody tr:hover td{background:#f8faff}
.offers-table tbody tr:last-child{border-bottom:none}
.offers-table td{padding:10px 12px;font-size:13px;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}

col.col-img      { width: 60px; }
col.col-ean      { width: 130px; }
col.col-name     { width: auto; }
col.col-supplier { width: 130px; }
col.col-cost     { width: 80px; }
col.col-date     { width: 110px; }
col.col-badge    { width: 80px; }

.product-img-cell{display:flex;align-items:center}
.product-img-thumb{width:38px;height:38px;border-radius:8px;object-fit:cover;border:1.5px solid #e2e8f0;background:#f1f5f9;flex-shrink:0;display:block}
.product-img-placeholder{width:38px;height:38px;border-radius:8px;border:1.5px solid #f1f5f9;background:#f8fafc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.product-img-placeholder svg{width:14px;height:14px;color:#cbd5e1}
.offer-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.cost-cell{font-weight:700;color:#0f172a;font-size:13px}
.ean-cell{font-family:monospace;font-size:11px;color:#64748b}
.name-cell{font-weight:600;color:#0f172a}
.supplier-cell{color:#64748b;font-size:12px}
.date-cell{color:#94a3b8;font-size:12px}

/* ── Empty / Loading states ── */
.state-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text4);gap:10px;text-align:center}
.state-center p{font-size:13px;font-weight:600;color:var(--text3)}
.state-center span{font-size:12px;color:var(--text4)}
.spinner{display:inline-block;border:2.5px solid var(--border);border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite}
.spinner-sm{width:16px;height:16px}
.spinner-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Skeleton loader ── */
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:400% 0}100%{background-position:-400% 0}}

/* ── Progress bar (top) ── */
.progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:#2563eb;z-index:9998;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;opacity:0}
.progress-bar.active{opacity:1}

/* ══════════════════════════════════════
   DRAWER
══════════════════════════════════════ */
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:1100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;width:560px;max-width:97vw;height:100vh;background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.13);z-index:1200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.drawer.open{transform:translateX(0)}

/* Drawer hero — matches FBA sourcing style */
.drawer-hero{padding:14px 20px 12px;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);position:relative;overflow:hidden;flex-shrink:0}
.drawer-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03)}
.drawer-hero::after{content:'';position:absolute;bottom:-25px;left:30px;width:100px;height:100px;border-radius:50%;background:rgba(37,99,235,.1)}
.drawer-hero-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.65);transition:background .15s;z-index:1}
.drawer-hero-close:hover{background:rgba(255,255,255,.2);color:#fff}

.dh-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ade80;margin-bottom:4px;position:relative;z-index:1}
.dh-supplier{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:3px;position:relative;z-index:1}
.dh-name{font-size:17px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:2px;padding-right:36px;position:relative;z-index:1}
.dh-ean{font-size:11px;color:rgba(255,255,255,.4);font-family:monospace;margin-bottom:12px;position:relative;z-index:1}

/* KPI row */
.dh-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.dh-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:7px 9px}
.dh-kpi-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);margin-bottom:2px}
.dh-kpi-val{font-size:14px;font-weight:700;color:#fff;line-height:1}

/* Product image in hero */
.dh-product-img{position:absolute;top:14px;right:50px;width:60px;height:60px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.15);background:#1e293b;z-index:1;flex-shrink:0}
.dh-product-img img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.dh-product-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.dh-product-img-placeholder svg{width:22px;height:22px;color:rgba(255,255,255,.2)}

.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* Drawer sections — FBA sourcing style */
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:#f1f5f9}
.sec{margin-bottom:20px}

/* Info cards */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-grid.full{grid-template-columns:1fr}
.info-card{background:#f8fafc;border:1px solid #f1f5f9;border-radius:10px;padding:10px 13px;transition:border-color .15s}
.info-card label{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:5px}
.info-card label svg{width:10px;height:10px;flex-shrink:0}
.info-card .val{font-size:13.5px;font-weight:500;color:#1e293b}
.info-card .val.mono{font-family:monospace;font-size:12px}
.info-card .val.big{font-size:18px;font-weight:800;color:#0f172a}
.info-card .val.empty{color:var(--text4);font-weight:400;font-style:italic}

/* Product image in drawer body */
.drawer-product-img-block{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;padding:12px;background:#f8fafc;border:1px solid #f1f5f9;border-radius:12px}
.drawer-product-img-block img{width:80px;height:80px;border-radius:9px;object-fit:cover;border:1.5px solid #e2e8f0;cursor:zoom-in;flex-shrink:0;display:block}
.drawer-product-img-block .img-info{flex:1;min-width:0}
.drawer-product-img-block .img-info p{font-size:11px;font-weight:600;color:#64748b;margin-bottom:6px}
.drawer-product-img-block .img-actions{display:flex;gap:6px;flex-wrap:wrap}

.drawer-footer{padding:10px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px;align-items:center;background:#fafafa;flex-shrink:0}

/* ══════════════════════════════════════
   INBOUND MODAL
══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1050;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.18);width:100%;max-width:900px;max-height:calc(100vh - 40px);display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h2{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.modal-count{font-size:11px;font-weight:700;background:var(--bg);color:var(--text3);padding:2px 9px;border-radius:100px;border:1px solid var(--border)}
.modal-close{width:30px;height:30px;border:none;border-radius:8px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-toolbar{padding:12px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;min-height:0}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* ── Inbound table ── */
.ib-table{width:100%;border-collapse:collapse;table-layout:fixed}
.ib-table thead{position:sticky;top:0;z-index:2}
.ib-table th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;border-bottom:2px solid var(--border);white-space:nowrap}
.ib-table td{padding:9px 12px;border-bottom:1px solid #f1f5f9;color:#334155;font-size:13px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib-table tbody tr{transition:background .1s;cursor:pointer}
.ib-table tbody tr:hover td{background:#f8faff}
.ib-table tbody tr.marked td{background:#f0fdf4}

col.ibc-img      { width: 58px; }
col.ibc-ean      { width: 130px; }
col.ibc-name     { width: auto; }
col.ibc-supplier { width: 130px; }
col.ibc-cost     { width: 80px; }
col.ibc-date     { width: 110px; }
col.ibc-action   { width: 100px; }

.ib-mark-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--text3);cursor:pointer;transition:all .18s;white-space:nowrap;font-family:inherit}
.ib-mark-btn:hover{border-color:var(--green-bd);background:var(--green-bg);color:var(--green)}
.ib-mark-btn.marked{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}

/* ── Inbound product detail panel ── */
.ib-detail{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);padding:20px}
.ib-detail.open{opacity:1;pointer-events:all}
.ib-panel{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.2);width:100%;max-width:560px;max-height:calc(100vh - 60px);display:flex;flex-direction:column;overflow:hidden}

/* ── Toast ── */
.toast-wrap{position:fixed;top:16px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:10px 14px;background:#0f172a;color:#fff;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.18);animation:toastIn .2s ease;max-width:320px;pointer-events:auto}
.toast.success{background:#15803d}
.toast.error{background:#dc2626}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Confirm overlay ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(3px)}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:#fff;border-radius:14px;padding:24px;width:360px;max-width:90vw;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
.confirm-box p{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lightbox-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lightbox-close:hover{background:rgba(255,255,255,.25)}

/* ── Responsive ── */
@media(max-width:640px){
  html,body{overflow:auto;height:auto}
  .app{height:auto;overflow:visible}
  .page-wrapper{padding:8px;height:auto}
  .table-card{height:auto}
  .drawer{width:100%;max-width:100%}
  .dh-kpis{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .modal{max-height:calc(100vh - 20px)}
  .modal-toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{max-width:100%;min-width:0}
  .ib-panel{max-height:95vh}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar-left,.toolbar-right{width:100%;justify-content:space-between}
  .dh-product-img{display:none}
}
@media(max-width:480px){
  .ib-table th:nth-child(4),.ib-table td:nth-child(4){display:none}
  .offers-table th:nth-child(4),.offers-table td:nth-child(4){display:none}
  .dh-kpis{grid-template-columns:1fr 1fr}
}


<div class="progress-bar" id="progressBar"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="page-wrapper">

  <!-- Header — matches FBA style -->
  <div class="page-header">
    <div class="header-left">
      <div class="stat-chip slate" id="statTotal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>Loading…</span>
      </div>
      <div class="stat-chip blue" id="statSuppliers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>—</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="refreshBtn" onclick="refreshAll()">
        <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
      <button class="btn btn-amber btn-sm" onclick="openInboundModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Inbound
      </button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search EAN, product, supplier…" oninput="renderOffers()">
      </div>
    </div>
  </div>

  <!-- Offers Table -->
  <div class="table-card">
    <div class="table-scroll-wrapper">
      <table class="offers-table" id="offersTable">
        <colgroup>
          <col class="col-img">
          <col class="col-ean">
          <col class="col-name">
          <col class="col-supplier">
          <col class="col-cost">
          <col class="col-date">
          <col class="col-badge">
        </colgroup>
        <thead>
          <tr>
            <th></th>
            <th>EAN</th>
            <th>Product Name</th>
            <th>Supplier</th>
            <th>Cost</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="offersTableBody">
          <!-- skeletons -->
          <tr><td colspan="7"><div style="padding:12px 12px 0"><div class="skeleton" style="height:38px;border-radius:8px;margin-bottom:8px"></div><div class="skeleton" style="height:38px;border-radius:8px;margin-bottom:8px"></div><div class="skeleton" style="height:38px;border-radius:8px"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ═══ OFFER DETAIL DRAWER ═══ -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <div id="drawerHero"></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<!-- ═══ INBOUND MODAL ═══ -->
<div class="modal-overlay" id="inboundOverlay">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Inbound Products
        <span class="modal-count" id="inboundCount">0</span>
      </h2>
      <button class="modal-close" onclick="closeInboundModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-toolbar">
      <div class="search-wrap" style="flex:1;max-width:320px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="inboundSearch" class="search-input" placeholder="Search products…" oninput="renderInboundTable()">
      </div>
      <div id="markedCount" style="font-size:12px;font-weight:600;color:var(--text3);white-space:nowrap;display:none"></div>
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="btn btn-sm btn-primary" id="moveToOffersBtn" onclick="moveMarkedToOffers()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Move to Offers
        </button>
        <button class="btn btn-sm btn-danger" onclick="confirmArchive()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Archive All
        </button>
      </div>
    </div>
    <div class="modal-body" id="inboundBody">
      <div class="state-center">
        <span class="spinner spinner-md"></span>
        <p>Loading products…</p>
      </div>
    </div>
  </div>
</div>

<!-- ═══ INBOUND PRODUCT DETAIL ═══ -->
<div class="ib-detail" id="ibDetail" onclick="closeIbDetail(event)">
  <div class="ib-panel" onclick="event.stopPropagation()">
    <div id="ibPanelHero"></div>
    <div class="drawer-body" id="ibPanelBody"></div>
    <div class="drawer-footer" id="ibPanelFooter"></div>
  </div>
</div>

<!-- ═══ CONFIRM DIALOG ═══ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmMsg">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirmOkBtn" onclick="executeConfirmAction()">Confirm</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';

/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbwt1sg2sgDxCuwZ6KOFONX6IHany8CcOZyJMLjIkHn08e3d-cVsLOhGpIW0Hj3XYigB/exec';

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let offersData   = [];
let inboundData  = [];
let markedIds    = new Set();
let drawerId     = null;
let drawerSrc    = null;
let ibDetailId   = null;
let confirmFn    = null;
let _dataLoaded  = false;

/* ═══════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════ */
let _pVal = 0, _pTimer = null;
function progressStart() {
  const b = document.getElementById('progressBar');
  _pVal = 0.1;
  b.style.transform = 'scaleX(0.1)';
  b.classList.add('active');
  _pTimer = setInterval(() => {
    _pVal = Math.min(_pVal + (1 - _pVal) * 0.08, 0.92);
    b.style.transform = 'scaleX(' + _pVal + ')';
  }, 200);
}
function progressDone() {
  clearInterval(_pTimer);
  const b = document.getElementById('progressBar');
  b.style.transform = 'scaleX(1)';
  setTimeout(() => { b.classList.remove('active'); b.style.transform = 'scaleX(0)'; }, 350);
}

/* ═══════════════════════════════════════
   API
═══════════════════════════════════════ */
async function callApi(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return res.json();
}

/* ═══════════════════════════════════════
   DATE FORMATTING
═══════════════════════════════════════ */
function fmtDate(val) {
  if (!val) return '—';
  try {
    const d = new Date(val);
    if (isNaN(d)) return String(val);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  } catch(e) { return String(val); }
}

/* ═══════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════ */
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}

/* ═══════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════ */
async function loadOffers() {
  progressStart();
  try {
    const result = await callApi({ action: 'getOffers' });
    if (result && result.success) {
      const h = result.headers || [];
      offersData = (result.rows || []).map(r => {
        const o = {};
        h.forEach((k, i) => { o[k] = r[i] ?? ''; });
        return o;
      });
      renderOffers();
      updateStats();
    }
  } catch(e) {
    toast('Failed to load offers', 'error');
  } finally {
    progressDone();
    _dataLoaded = true;
  }
}

async function loadInbound() {
  document.getElementById('inboundBody').innerHTML =
    '<div class="state-center"><span class="spinner spinner-md"></span><p>Loading…</p></div>';
  try {
    const result = await callApi({ action: 'getInbound' });
    if (result && result.success) {
      const h = result.headers || [];
      inboundData = (result.rows || []).map(r => {
        const o = {};
        h.forEach((k, i) => { o[k] = r[i] ?? ''; });
        return o;
      });
      renderInboundTable();
      document.getElementById('inboundCount').textContent = inboundData.length;
    }
  } catch(e) {
    toast('Failed to load inbound', 'error');
    document.getElementById('inboundBody').innerHTML =
      '<div class="state-center"><p style="color:var(--red)">Failed to load — check API</p></div>';
  }
}

async function refreshAll() {
  const icon = document.getElementById('refreshIcon');
  icon.style.animation = 'spin .7s linear infinite';
  await loadOffers();
  icon.style.animation = '';
}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
function updateStats() {
  const total = offersData.length;
  const suppliers = new Set(offersData.map(r => r['Supplier Name'] || r['Supplier'] || '').filter(Boolean)).size;
  setChipText('statTotal',     total + ' Offer' + (total !== 1 ? 's' : ''));
  setChipText('statSuppliers', suppliers + ' Supplier' + (suppliers !== 1 ? 's' : ''));
}
function setChipText(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + esc(text) + '</span>';
}

/* ═══════════════════════════════════════
   OFFERS TABLE RENDER
═══════════════════════════════════════ */
function renderOffers() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const tbody = document.getElementById('offersTableBody');
  const data = offersData.filter(r => {
    if (!q) return true;
    const ean      = String(r['EAN'] || r['Ean'] || '').toLowerCase();
    const name     = String(r['Product Name'] || r['Name'] || '').toLowerCase();
    const supplier = String(r['Supplier Name'] || r['Supplier'] || '').toLowerCase();
    return ean.includes(q) || name.includes(q) || supplier.includes(q);
  });

  if (!data.length && !offersData.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="state-center"><span class="spinner spinner-sm"></span><p>Loading offers…</p></div></td></tr>';
    return;
  }
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="state-center"><p>No offers found</p><span>Try a different search term</span></div></td></tr>';
    return;
  }

  tbody.innerHTML = data.map(row => offerRowHTML(row)).join('');
  updateStats();
}

function offerRowHTML(row) {
  const id       = esc(String(row['ID'] || ''));
  const ean      = esc(String(row['EAN'] || row['Ean'] || '—'));
  const name     = esc(String(row['Product Name'] || row['Name'] || '—'));
  const supplier = esc(String(row['Supplier Name'] || row['Supplier'] || '—'));
  const cost     = row['Cost'] || row['cost'] || '';
  const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';
  const date     = fmtDate(row['Date'] || row['date'] || '');
  const imgUrl   = row['Product Image'] || row['product_image'] || '';

  const imgCell = imgUrl
    ? '<img class="product-img-thumb" src="' + esc(imgUrl) + '" alt="" onerror="this.parentElement.innerHTML=noImgHTML()" onclick="event.stopPropagation();openLightbox(\'' + esc(imgUrl) + '\')">'
    : '<div class="product-img-placeholder">' + svgImage() + '</div>';

  return '<tr onclick="openDrawer(\'' + id + '\',\'offer\')">'
    + '<td><div class="product-img-cell">' + imgCell + '</div></td>'
    + '<td class="ean-cell">' + ean + '</td>'
    + '<td class="name-cell" title="' + name + '">' + name + '</td>'
    + '<td class="supplier-cell">' + supplier + '</td>'
    + '<td class="cost-cell">' + esc(costFmt) + '</td>'
    + '<td class="date-cell">' + date + '</td>'
    + '<td><span class="offer-badge">✓ Offer</span></td>'
    + '</tr>';
}

function noImgHTML() {
  return '<div class="product-img-placeholder">' + svgImage() + '</div>';
}

/* ═══════════════════════════════════════
   DRAWER
═══════════════════════════════════════ */
function openDrawer(id, src) {
  const data = src === 'offer' ? offersData : inboundData;
  const row  = data.find(r => String(r['ID']) === String(id));
  if (!row) return;
  drawerId  = id;
  drawerSrc = src;
  renderDrawer(row, src);
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('detailDrawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('detailDrawer').classList.remove('open');
  drawerId = null;
}

function renderDrawer(row, src) {
  const ean      = String(row['EAN'] || row['Ean'] || '—');
  const name     = String(row['Product Name'] || row['Name'] || '—');
  const supplier = String(row['Supplier Name'] || row['Supplier'] || '');
  const cost     = row['Cost'] || row['cost'] || '';
  const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';
  const id       = String(row['ID'] || '');
  const rrp      = row['RRP'] || row['rrp'] || '';
  const margin   = row['Margin'] || row['margin'] || '';
  const roi      = row['ROI'] || row['roi'] || '';
  const imgUrl   = row['Product Image'] || row['product_image'] || '';
  const date     = fmtDate(row['Date'] || row['date'] || '');

  // Hero
  const heroImg = imgUrl
    ? '<div class="dh-product-img"><img src="' + esc(imgUrl) + '" alt="Product" onclick="openLightbox(\'' + esc(imgUrl) + '\')"></div>'
    : '<div class="dh-product-img"><div class="dh-product-img-placeholder">' + svgImage() + '</div></div>';

  document.getElementById('drawerHero').innerHTML =
    '<div class="drawer-hero">'
    + '<button class="drawer-hero-close" onclick="closeDrawer()">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    + '</button>'
    + heroImg
    + '<div class="dh-badge">' + (src === 'offer' ? '✓ Offer' : '↓ Inbound') + '</div>'
    + (supplier ? '<div class="dh-supplier">' + esc(supplier) + '</div>' : '')
    + '<div class="dh-name">' + esc(name) + '</div>'
    + '<div class="dh-ean">EAN: ' + esc(ean) + '</div>'
    + '<div class="dh-kpis">'
    + kpiBox('Cost', costFmt)
    + kpiBox('RRP', rrp ? '£' + parseFloat(rrp).toFixed(2) : '—')
    + kpiBox('Margin', margin ? String(margin) + (String(margin).includes('%') ? '' : '%') : '—')
    + '</div>'
    + '</div>';

  // Fields to skip in "Additional Details" since shown above
  const skipKeys = new Set(['ID', 'EAN', 'Ean', 'Product Name', 'Name', 'Supplier Name', 'Supplier',
    'Cost', 'cost', 'RRP', 'rrp', 'Margin', 'margin', 'ROI', 'roi', 'Product Image', 'product_image', 'Date', 'date']);
  const extraKeys = Object.keys(row).filter(k => !skipKeys.has(k) && row[k] !== '');

  // Build body — no Cost/Supplier/EAN fields since shown in hero
  let body = '<div class="sec"><div class="sec-label">Product Details</div>';

  // Product image block in body (large, clickable)
  if (imgUrl) {
    body += '<div class="drawer-product-img-block">'
      + '<img src="' + esc(imgUrl) + '" alt="Product" onclick="openLightbox(\'' + esc(imgUrl) + '\')">'
      + '<div class="img-info">'
      + '<p>Product Image</p>'
      + '<div class="img-actions">'
      + '<a href="' + esc(imgUrl) + '" target="_blank" class="btn btn-secondary btn-sm">Open full size</a>'
      + '</div>'
      + '</div>'
      + '</div>';
  }

  body += '<div class="info-grid">'
    + infoCard('Product Name', name, 'text', svgPackage())
    + (rrp ? infoCard('RRP', '£' + parseFloat(rrp).toFixed(2), '', svgMoney()) : '')
    + (margin ? infoCard('Margin', String(margin) + (String(margin).includes('%') ? '' : '%'), 'green-val', svgChart()) : '')
    + (roi ? infoCard('ROI', String(roi), '', svgPercent()) : '')
    + (date && date !== '—' ? infoCard('Date', date, '', svgCalendar()) : '')
    + '</div></div>';

  if (extraKeys.length) {
    body += '<div class="sec"><div class="sec-label">Additional Details</div><div class="info-grid">';
    extraKeys.forEach(k => {
      const v = String(row[k]);
      body += infoCard(k, v || '—', !v ? 'empty' : '', svgDot());
    });
    body += '</div></div>';
  }

  document.getElementById('drawerBody').innerHTML = body;

  const isMarked = markedIds.has(id);
  document.getElementById('drawerFooter').innerHTML = src === 'offer'
    ? '<button class="btn btn-danger btn-sm" onclick="confirmDeleteOffer(\'' + esc(id) + '\')">'
      + svgTrash() + 'Delete</button>'
    : '<button class="btn btn-secondary btn-sm" onclick="closeDrawer()">Close</button>'
      + '<button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="toggleMarkFromDrawer(\'' + esc(id) + '\')">'
      + (isMarked ? '✓ Marked for Offers' : '+ Mark for Offers')
      + '</button>';
}

function kpiBox(label, val) {
  return '<div class="dh-kpi"><div class="dh-kpi-label">' + label + '</div><div class="dh-kpi-val">' + esc(String(val)) + '</div></div>';
}

function infoCard(label, value, extraClass, iconSvg) {
  return '<div class="info-card"><label>' + (iconSvg || '') + esc(label) + '</label>'
    + '<div class="val ' + (extraClass || '') + '">' + esc(String(value)) + '</div></div>';
}

/* ═══════════════════════════════════════
   INBOUND MODAL
═══════════════════════════════════════ */
function openInboundModal() {
  markedIds.clear();
  updateMarkedCount();
  document.getElementById('inboundOverlay').classList.add('open');
  document.getElementById('inboundSearch').value = '';
  loadInbound();
}

function closeInboundModal() {
  document.getElementById('inboundOverlay').classList.remove('open');
  markedIds.clear();
  updateMarkedCount();
}

function renderInboundTable() {
  const q = (document.getElementById('inboundSearch').value || '').toLowerCase().trim();
  const data = inboundData.filter(r => {
    if (!q) return true;
    const ean      = String(r['EAN'] || r['Ean'] || '').toLowerCase();
    const name     = String(r['Product Name'] || r['Name'] || '').toLowerCase();
    const supplier = String(r['Supplier Name'] || r['Supplier'] || '').toLowerCase();
    return ean.includes(q) || name.includes(q) || supplier.includes(q);
  });

  document.getElementById('inboundCount').textContent = inboundData.length;

  if (!data.length) {
    document.getElementById('inboundBody').innerHTML =
      '<div class="state-center" style="padding:40px 20px"><p>No products found</p></div>';
    return;
  }

  let html = '<table class="ib-table"><colgroup>'
    + '<col class="ibc-img"><col class="ibc-ean"><col class="ibc-name">'
    + '<col class="ibc-supplier"><col class="ibc-cost"><col class="ibc-date"><col class="ibc-action">'
    + '</colgroup>'
    + '<thead><tr><th></th><th>EAN</th><th>Product Name</th><th>Supplier</th><th>Cost</th><th>Date</th><th></th></tr></thead><tbody>';

  data.forEach(row => {
    const id       = esc(String(row['ID'] || ''));
    const ean      = esc(String(row['EAN'] || row['Ean'] || '—'));
    const name     = esc(String(row['Product Name'] || row['Name'] || '—'));
    const supplier = esc(String(row['Supplier Name'] || row['Supplier'] || '—'));
    const cost     = row['Cost'] || row['cost'] || '';
    const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';
    const date     = fmtDate(row['Date'] || row['date'] || '');
    const imgUrl   = row['Product Image'] || row['product_image'] || '';
    const isMarked = markedIds.has(String(row['ID'] || ''));

    const imgCell = imgUrl
      ? '<img class="product-img-thumb" src="' + esc(imgUrl) + '" alt="" onerror="this.outerHTML=\'<div class=\\\"product-img-placeholder\\\">' + svgImageEsc() + '</div>\'" onclick="event.stopPropagation();openLightbox(\'' + esc(imgUrl) + '\')">'
      : '<div class="product-img-placeholder">' + svgImage() + '</div>';

    html += '<tr class="' + (isMarked ? 'marked' : '') + '" onclick="openIbDetail(\'' + id + '\')">'
      + '<td><div class="product-img-cell">' + imgCell + '</div></td>'
      + '<td style="font-family:monospace;font-size:11px;color:#64748b">' + ean + '</td>'
      + '<td style="font-weight:600;max-width:0;overflow:hidden;text-overflow:ellipsis">' + name + '</td>'
      + '<td style="color:#64748b;font-size:12px">' + supplier + '</td>'
      + '<td style="font-weight:700">' + esc(costFmt) + '</td>'
      + '<td style="color:#94a3b8;font-size:12px">' + date + '</td>'
      + '<td onclick="event.stopPropagation()">'
      + '<button class="ib-mark-btn ' + (isMarked ? 'marked' : '') + '" onclick="toggleMark(\'' + id + '\',event)">'
      + (isMarked
        ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked'
        : '+ Mark')
      + '</button>'
      + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('inboundBody').innerHTML = html;
  updateMarkedCount();
}

function toggleMark(id, e) {
  if (e) e.stopPropagation();
  if (markedIds.has(id)) markedIds.delete(id);
  else markedIds.add(id);
  // Instant visual update — just toggle the row without full re-render
  const rows = document.querySelectorAll('#inboundBody tbody tr');
  rows.forEach(tr => {
    const btn = tr.querySelector('.ib-mark-btn');
    if (!btn) return;
    const trId = btn.getAttribute('onclick') ? btn.getAttribute('onclick').match(/'([^']+)'/)?.[1] : null;
    if (trId !== id) return;
    const now = markedIds.has(id);
    tr.classList.toggle('marked', now);
    btn.classList.toggle('marked', now);
    btn.innerHTML = now
      ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked'
      : '+ Mark';
  });
  updateMarkedCount();
}

function toggleMarkFromDrawer(id) {
  if (markedIds.has(id)) markedIds.delete(id);
  else markedIds.add(id);
  const data = drawerSrc === 'offer' ? offersData : inboundData;
  const row  = data.find(r => String(r['ID']) === String(id));
  if (row) renderDrawer(row, drawerSrc);
  updateMarkedCount();
}

function updateMarkedCount() {
  const el  = document.getElementById('markedCount');
  const btn = document.getElementById('moveToOffersBtn');
  if (markedIds.size > 0) {
    el.textContent = markedIds.size + ' marked';
    el.style.display = 'inline';
    btn.style.display = 'inline-flex';
  } else {
    el.style.display = 'none';
    btn.style.display = 'none';
  }
}

/* ═══════════════════════════════════════
   INBOUND DETAIL PANEL
═══════════════════════════════════════ */
function openIbDetail(id) {
  const row = inboundData.find(r => String(r['ID']) === String(id));
  if (!row) return;
  ibDetailId = id;
  renderIbDetail(row);
  document.getElementById('ibDetail').classList.add('open');
}

function closeIbDetail(e) {
  if (e && e.target !== document.getElementById('ibDetail')) return;
  document.getElementById('ibDetail').classList.remove('open');
  ibDetailId = null;
}

function renderIbDetail(row) {
  const ean      = String(row['EAN'] || row['Ean'] || '—');
  const name     = String(row['Product Name'] || row['Name'] || '—');
  const supplier = String(row['Supplier Name'] || row['Supplier'] || '');
  const cost     = row['Cost'] || row['cost'] || '';
  const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';
  const id       = String(row['ID'] || '');
  const rrp      = row['RRP'] || row['rrp'] || '';
  const margin   = row['Margin'] || row['margin'] || '';
  const imgUrl   = row['Product Image'] || row['product_image'] || '';

  const heroImg = imgUrl
    ? '<div class="dh-product-img"><img src="' + esc(imgUrl) + '" alt="Product" onclick="openLightbox(\'' + esc(imgUrl) + '\')"></div>'
    : '<div class="dh-product-img"><div class="dh-product-img-placeholder">' + svgImage() + '</div></div>';

  document.getElementById('ibPanelHero').innerHTML =
    '<div class="drawer-hero">'
    + '<button class="drawer-hero-close" onclick="closeIbDetail()">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    + '</button>'
    + heroImg
    + '<div class="dh-badge" style="background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.3);color:#fbbf24">↓ Inbound</div>'
    + (supplier ? '<div class="dh-supplier">' + esc(supplier) + '</div>' : '')
    + '<div class="dh-name">' + esc(name) + '</div>'
    + '<div class="dh-ean">EAN: ' + esc(ean) + '</div>'
    + '<div class="dh-kpis">'
    + kpiBox('Cost', costFmt)
    + kpiBox('RRP', rrp ? '£' + parseFloat(rrp).toFixed(2) : '—')
    + kpiBox('Margin', margin ? String(margin) + (String(margin).includes('%') ? '' : '%') : '—')
    + '</div>'
    + '</div>';

  const skipKeys = new Set(['ID', 'EAN', 'Ean', 'Product Name', 'Name', 'Supplier Name', 'Supplier',
    'Cost', 'cost', 'RRP', 'rrp', 'Margin', 'margin', 'ROI', 'roi', 'Product Image', 'product_image', 'Date', 'date']);
  const extraKeys = Object.keys(row).filter(k => !skipKeys.has(k) && row[k] !== '');

  let body = '<div class="sec"><div class="sec-label">Product Details</div>';
  if (imgUrl) {
    body += '<div class="drawer-product-img-block">'
      + '<img src="' + esc(imgUrl) + '" alt="Product" onclick="openLightbox(\'' + esc(imgUrl) + '\')">'
      + '<div class="img-info"><p>Product Image</p>'
      + '<div class="img-actions"><a href="' + esc(imgUrl) + '" target="_blank" class="btn btn-secondary btn-sm">Open full size</a></div>'
      + '</div></div>';
  }
  body += '<div class="info-grid">'
    + infoCard('Product Name', name, '', svgPackage())
    + infoCard('EAN', ean, 'mono', svgBarcode())
    + infoCard('Supplier', supplier || '—', '', svgSupplier())
    + infoCard('Cost', costFmt, '', svgMoney())
    + (rrp ? infoCard('RRP', '£' + parseFloat(rrp).toFixed(2), '', svgMoney()) : '')
    + (margin ? infoCard('Margin', String(margin) + (String(margin).includes('%') ? '' : '%'), '', svgChart()) : '')
    + '</div></div>';

  if (extraKeys.length) {
    body += '<div class="sec"><div class="sec-label">Additional Details</div><div class="info-grid">';
    extraKeys.forEach(k => {
      body += infoCard(k, String(row[k]) || '—', '', svgDot());
    });
    body += '</div></div>';
  }

  document.getElementById('ibPanelBody').innerHTML = body;

  const isMarked = markedIds.has(id);
  document.getElementById('ibPanelFooter').innerHTML =
    '<button class="btn btn-secondary btn-sm" onclick="closeIbDetail()">Close</button>'
    + '<button class="btn ' + (isMarked ? 'btn-primary' : 'btn-secondary') + ' btn-sm" style="margin-left:auto" onclick="toggleMarkFromIbPanel(\'' + esc(id) + '\')">'
    + (isMarked
      ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked for Offers'
      : '+ Mark for Offers')
    + '</button>';
}

function toggleMarkFromIbPanel(id) {
  if (markedIds.has(id)) markedIds.delete(id);
  else markedIds.add(id);
  const row = inboundData.find(r => String(r['ID']) === String(id));
  if (row) renderIbDetail(row);
  // Also update the table row instantly
  toggleMark(id, null);
  // But toggleMark already flipped the set, so we need to reconcile:
  // Actually renderInboundTable is safer here for the panel sync
  updateMarkedCount();
}

/* ═══════════════════════════════════════
   MOVE TO OFFERS
═══════════════════════════════════════ */
async function moveMarkedToOffers() {
  if (!markedIds.size) return;
  const ids = Array.from(markedIds);
  const btn = document.getElementById('moveToOffersBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-sm" style="border-top-color:#fff"></span> Moving…';
  progressStart();
  try {
    const result = await callApi({ action: 'moveToOffers', ids });
    if (result && result.success) {
      const moved = inboundData.filter(r => ids.includes(String(r['ID'])));
      inboundData  = inboundData.filter(r => !ids.includes(String(r['ID'])));
      moved.forEach(r => offersData.push(r));
      markedIds.clear();
      renderInboundTable();
      renderOffers();
      updateStats();
      document.getElementById('inboundCount').textContent = inboundData.length;
      toast(ids.length + ' product' + (ids.length > 1 ? 's' : '') + ' moved to Offers ✓', 'success');
    } else {
      toast(result?.message || 'Failed to move products', 'error');
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Move to Offers';
    progressDone();
    updateMarkedCount();
  }
}

/* ═══════════════════════════════════════
   ARCHIVE ALL
═══════════════════════════════════════ */
function confirmArchive() {
  const remaining = inboundData.length - markedIds.size;
  if (!inboundData.length) { toast('No products to archive', 'error'); return; }
  openConfirm(
    'Archive All Remaining?',
    'This will permanently delete ' + remaining + ' remaining inbound product' + (remaining !== 1 ? 's' : '') + ' that are not marked for Offers. This cannot be undone.',
    doArchive,
    'Archive ' + remaining
  );
}

async function doArchive() {
  const idsToDelete = inboundData.filter(r => !markedIds.has(String(r['ID']))).map(r => String(r['ID']));
  if (!idsToDelete.length) { toast('Nothing to archive', 'error'); return; }
  progressStart();
  closeConfirm();
  try {
    const result = await callApi({ action: 'archiveInbound', ids: idsToDelete });
    if (result && result.success) {
      inboundData = inboundData.filter(r => markedIds.has(String(r['ID'])));
      renderInboundTable();
      document.getElementById('inboundCount').textContent = inboundData.length;
      toast(idsToDelete.length + ' products archived', 'success');
    } else {
      toast(result?.message || 'Archive failed', 'error');
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    progressDone();
  }
}

/* ═══════════════════════════════════════
   DELETE OFFER
═══════════════════════════════════════ */
function confirmDeleteOffer(id) {
  openConfirm(
    'Delete Offer?',
    'This will permanently delete this product from the Offers sheet.',
    () => doDeleteOffer(id),
    'Delete'
  );
}

async function doDeleteOffer(id) {
  closeConfirm();
  closeDrawer();
  progressStart();
  try {
    const result = await callApi({ action: 'deleteOffer', id });
    if (result && result.success) {
      offersData = offersData.filter(r => String(r['ID']) !== String(id));
      renderOffers();
      updateStats();
      toast('Offer deleted', 'success');
    } else {
      toast('Failed to delete', 'error');
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    progressDone();
  }
}

/* ═══════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════ */
function openConfirm(title, msg, fn, confirmLabel) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent   = msg;
  document.getElementById('confirmOkBtn').textContent = confirmLabel || 'Confirm';
  confirmFn = fn;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  confirmFn = null;
}
function executeConfirmAction() { if (confirmFn) confirmFn(); }

/* ═══════════════════════════════════════
   TOAST — no info/loading toasts, only success/error
═══════════════════════════════════════ */
function toast(msg, type) {
  if (type !== 'success' && type !== 'error') return; // suppress all info/loading
  const c = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
  };
  t.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ═══════════════════════════════════════
   SVG ICONS
═══════════════════════════════════════ */
function svgImage()   { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'; }
function svgImageEsc(){ return svgImage().replace(/"/g, '\\"'); }
function svgTrash()   { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>'; }
function svgPackage() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'; }
function svgMoney()   { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'; }
function svgChart()   { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>'; }
function svgPercent() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>'; }
function svgCalendar(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'; }
function svgBarcode() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5v14"/><path d="M8 5v14"/><path d="M12 5v14"/><path d="M17 5v14"/><path d="M21 5v14"/></svg>'; }
function svgSupplier(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>'; }
function svgDot()     { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/></svg>'; }

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirmOverlay').classList.contains('open')) { closeConfirm(); return; }
    if (document.getElementById('ibDetail').classList.contains('open')) { closeIbDetail(); return; }
    if (document.getElementById('detailDrawer').classList.contains('open')) { closeDrawer(); return; }
    // Inbound modal NOT closed by Escape — only by X button
  }
});

/* ═══════════════════════════════════════
   INIT — load once, no polling/silent refresh
═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  loadOffers();
});
</script>
