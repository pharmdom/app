<script>
(function () {

const SM_MODULES = ["sourcing","listing","suppliers","rota","intelligence","paycheck","fba"];
let smAllStaff   = [];
let smFilter     = "all";
let smCurrentStaff = null;

// ── VISIBILITY: reload data when tab becomes visible again ──
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && smAllStaff.length === 0) loadStaff();
});
// Also reload when page comes into view inside a SPA iframe
if (typeof IntersectionObserver !== "undefined") {
  const el = document.getElementById("staffApp");
  if (el) {
    new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && smAllStaff.length === 0) loadStaff();
    }, { threshold: 0.1 }).observe(el);
  }
}

// ── INIT ──
loadStaff();
smBuildModuleGrid();

// ─────────────────────────────────────
// TENURE HELPER
// ─────────────────────────────────────
function smTenure(dateStr) {
  if (!dateStr) return null;
  const start = new Date(dateStr);
  if (isNaN(start)) return null;
  const now   = new Date();
  const days  = Math.floor((now - start) / 86400000);
  if (days < 30)  return { label: days + "d",  cls: "sm-tenure-new" };
  const months = Math.floor(days / 30.44);
  if (months < 12) return { label: months + "mo", cls: "sm-tenure-mid" };
  const years  = Math.floor(months / 12);
  const rem    = months % 12;
  return { label: years + "yr" + (rem ? " " + rem + "mo" : ""), cls: "sm-tenure-senior" };
}

// ─────────────────────────────────────
// LOAD
// ─────────────────────────────────────
async function loadStaff() {
  // Spinner on refresh button
  const refreshIcon = document.getElementById("smRefreshIcon");
  if (refreshIcon) refreshIcon.style.animation = "smSpin .6s linear infinite";

  document.getElementById("smLoading").style.display = "block";
  document.getElementById("smGrid").style.display    = "none";
  document.getElementById("smEmpty").style.display   = "none";

  const res  = await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({ action:"getUsers" }) });
  const data = await res.json();

  document.getElementById("smLoading").style.display = "none";
  if (refreshIcon) refreshIcon.style.animation = "";

  if (data.success) {
    smAllStaff = data.users;
    smRenderChips();
    smRenderCards();
  }
}

// STAT CHIPS
// ─────────────────────────────────────
function smRenderChips() {
  const total  = smAllStaff.length;
  const admins = smAllStaff.filter(s => s.role === "Admin").length;
  const dops   = smAllStaff.filter(s => s.role === "Digital Ops").length;
  const wh     = smAllStaff.filter(s => s.role === "Warehouse").length;
  const susp   = smAllStaff.filter(s => s.status === "Suspended").length;

  const chips = [
    { key:"all",         label:"All Staff",  count:total,  cls:"gray"   },
    { key:"Admin",       label:"Admin",       count:admins, cls:"blue"   },
    { key:"Digital Ops", label:"Digital Ops", count:dops,   cls:"purple" },
    { key:"Warehouse",   label:"Warehouse",   count:wh,     cls:"amber"  },
    { key:"Suspended",   label:"Suspended",   count:susp,   cls:"red"    },
  ];

  document.getElementById("smStatChips").innerHTML = chips.map(c => `
    <button class="sm-chip ${c.cls} ${smFilter===c.key?"active":""}" onclick="smSetFilter('${c.key}')">
      ${c.label}
      <span style="background:rgba(255,255,255,0.7);border-radius:100px;padding:1px 6px;font-size:10px;font-weight:700;">${c.count}</span>
    </button>`
  ).join("");
}

function smSetFilter(key) {
  smFilter = key;
  smRenderChips();
  smRenderCards();
}

// ─────────────────────────────────────
// RENDER CARDS
// ─────────────────────────────────────
function smRenderCards() {
  const q    = (document.getElementById("smSearch").value||"").toLowerCase().trim();
  let list   = smAllStaff;

  if (smFilter === "Suspended")  list = list.filter(s => s.status === "Suspended");
  else if (smFilter !== "all")   list = list.filter(s => s.role   === smFilter);
  if (q) list = list.filter(s =>
    (s.firstName+" "+s.lastName).toLowerCase().includes(q) || s.email.toLowerCase().includes(q)
  );

  const grid  = document.getElementById("smGrid");
  const empty = document.getElementById("smEmpty");

  if (!list.length) {
    grid.style.display  = "none";
    empty.style.display = "block";
    document.getElementById("smEmptyTitle").textContent = (q||smFilter!=="all") ? "No staff match your search"  : "No staff members yet";
    document.getElementById("smEmptySub").textContent   = (q||smFilter!=="all") ? "Try adjusting your search or filters" : "Add your first team member to get started";
    return;
  }

  empty.style.display = "none";
  grid.style.display  = "grid";

  grid.innerHTML = list.map((s, i) => {
    const initials = ((s.firstName||"")[0]||"") + ((s.lastName||"")[0]||"");
    const rKey     = smRoleKey(s.role);
    const sKey     = s.status === "Active" ? "active" : "suspended";
    const perms    = (s.permissions||[]).slice(0,3).map(p=>`<span class="sm-perm-pill">${p}</span>`).join("");
    const extra    = (s.permissions||[]).length > 3 ? `<span style="font-size:10px;color:#94a3b8;font-weight:500;">+${s.permissions.length-3}</span>` : "";
    const tenure   = smTenure(s.createdDate || s.created_date || s.joinDate);
    const tenureHtml = tenure ? `<div class="sm-card-tenure"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${tenure.label} with the team</div>` : "";

    return `
      <div class="sm-card" style="animation-delay:${i*0.04}s;" onclick='smOpenDrawer(${JSON.stringify(s).replace(/'/g,"&apos;")})'>
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div class="sm-avatar ${rKey}">${initials.toUpperCase()}</div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#0f172a;">
              ${s.firstName} ${s.lastName}
              <span class="sm-status-dot ${sKey}"></span>
            </div>
            <div style="display:flex;align-items:center;gap:4px;font-size:12px;color:#94a3b8;margin-top:2px;">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.email}</span>
            </div>
          </div>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px;"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:12px;">
          <span class="sm-role-badge ${rKey}">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ${s.role}

          ${perms}${extra}
        </div>
        ${tenureHtml}
      </div>`;
  }).join("");
}

function smCloseModal() {

async function smSaveStaff() {
  const isEdit    = !!document.getElementById("smEditId").value;
  const firstName = document.getElementById("smFN").value.trim();
  const lastName  = document.getElementById("smLN").value.trim();
  const email     = document.getElementById("smEmail").value.trim();
  const password  = document.getElementById("smPwd").value.trim();
  const role      = document.getElementById("smRole").value;
  const status    = document.getElementById("smStatus").value;
  const perms     = Array.from(document.querySelectorAll(".sm-mod-btn.active")).map(b => b.dataset.mod);

  let valid = true;
  [["smFN",firstName],["smLN",lastName],["smEmail",email]].forEach(([id,val]) => {
    if (!val) { document.getElementById(id).classList.add("error"); valid = false; }
    else      { document.getElementById(id).classList.remove("error"); }
  });
  if (!isEdit && !password) { document.getElementById("smPwd").classList.add("error"); valid = false; }
  else document.getElementById("smPwd").classList.remove("error");
  if (!valid) return;

  const btn  = document.getElementById("smSaveBtn");
  const lbl  = document.getElementById("smSaveLbl");
  const orig = lbl.textContent;
  btn.disabled = true;
  lbl.innerHTML = `<span class="pd-spinner"></span> ${isEdit ? "Saving..." : "Adding..."}`;

  const payload = { action:"saveUser", userId:document.getElementById("smEditId").value||"", firstName, lastName, email, password, role, status, permissions:perms.join(",") };

  const res  = await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(payload) });
  const data = await res.json();

  btn.disabled = false;
  lbl.textContent = orig;

  if (data.success) {
    if (!isEdit) {
      smSendWelcomeEmail({ firstName, lastName, email, password, role, permissions:perms });
    } else {
      const old = smAllStaff.find(s => s.userId === payload.userId);
      if (old && old.status !== status) smSendStatusEmail({ firstName, email, newStatus:status });
      if (old && old.role   !== role)   smSendRoleEmail({ firstName, email, oldRole:old.role, newRole:role });
    }
    smCloseModal();
    smShowToast(isEdit ? "Staff member updated" : "Staff member added & welcome email sent", "success");
    loadStaff();
  } else {
    smShowToast(data.message || "Error saving staff member", "error");
  }
}

                <td style="padding:7px 0;font-size:14px;color:#0f172a;font-weight:600;font-family:Courier New,monospace;text-align:right;">${password}</td>

              <tr><td colspan="2" style="border-top:1px solid #e2e8f0;font-size:0;height:1px;"></td></tr>
              <tr>
                <td style="padding:7px 0;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;font-family:Arial,sans-serif;">Role</td>
                <td style="padding:7px 0;text-align:right;">
                  <span style="background-color:#dbeafe;color:#1d4ed8;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:700;font-family:Arial,sans-serif;">${role}</span>
                </td>
              </tr>
            </table>
          </td></tr>
        </table>

        ${permissions.length ? `
        <p style="margin:0 0 8px 0;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;font-family:Arial,sans-serif;">Modules Assigned (https://app.pharmdomestic.com/login)</p>
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">${moduleRows}</table>` : ""}

        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr><td align="center" style="padding:8px 0 0 0;">
            <a href="${SM_LOGIN_URL}" style="display:inline-block;background-color:#2563eb;color:#ffffff;padding:14px 36px;border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;font-family:Arial,sans-serif;mso-padding-alt:14px 36px;">Login to Your Account &#8594;</a>
          </td></tr>
        </table>
      </td></tr>
    </table>`);

  fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({ action:"sendEmail", to:email, subject:"Welcome to PharmDomestic — Your Account is Ready", body }) }).catch(()=>{});
}

function smSendStatusEmail({ firstName, email, newStatus }) {
  const isActive = newStatus === "Active";
  const accentBg = isActive ? "#dcfce7" : "#fee2e2";
  const accentTx = isActive ? "#15803d" : "#dc2626";
  const icon     = isActive ? "&#10003;" : "&#10005;";

  const body = smEmailWrapper(`
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr><td style="padding:40px 40px 32px;text-align:center;">
        <table cellpadding="0" cellspacing="0" border="0" style="margin:0 auto 20px auto;">
          <tr><td align="center" style="width:56px;height:56px;border-radius:28px;background-color:${accentBg};font-size:24px;color:${accentTx};font-family:Arial,sans-serif;font-weight:700;padding:12px;">${icon}</td></tr>
        </table>
        <h2 style="margin:0 0 10px 0;color:#0f172a;font-size:20px;font-weight:700;font-family:Arial,sans-serif;">Account ${newStatus}</h2>
        <p style="margin:0 0 28px 0;color:#64748b;font-size:14px;line-height:1.6;font-family:Arial,sans-serif;">
          Hi ${firstName}, your PharmDomestic account has been <strong>${isActive?"reactivated":"suspended"}</strong>.<br/>
          ${isActive?"You can now log in and access your assigned modules.":"Please contact an administrator if you believe this is an error."}
        </p>
        ${isActive ? `<a href="${SM_LOGIN_URL}" style="display:inline-block;background-color:#2563eb;color:#ffffff;padding:13px 32px;border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;font-family:Arial,sans-serif;">Login Now &#8594;</a>` : ""}
      </td></tr>
    </table>`);

  fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({ action:"sendEmail", to:email, subject:`PharmDomestic — Account ${newStatus}`, body }) }).catch(()=>{});
}

function smSendRoleEmail({ firstName, email, oldRole, newRole }) {
  const body = smEmailWrapper(`
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr><td style="padding:40px 40px 32px;text-align:center;">
        <h2 style="margin:0 0 10px 0;color:#0f172a;font-size:20px;font-weight:700;font-family:Arial,sans-serif;">Role Updated</h2>

        <table cellpadding="0" cellspacing="0" border="0" style="margin:0 auto 28px auto;">
          <tr>
            <td style="background-color:#fee2e2;color:#dc2626;padding:8px 18px;border-radius:4px;font-size:13px;font-weight:700;font-family:Arial,sans-serif;">${oldRole}</td>
            <td style="padding:0 14px;color:#94a3b8;font-size:18px;font-family:Arial,sans-serif;">&#8594;</td>
            <td style="background-color:#dcfce7;color:#15803d;padding:8px 18px;border-radius:4px;font-size:13px;font-weight:700;font-family:Arial,sans-serif;">${newRole}</td>
          </tr>
        </table>

        <p style="margin:0 0 28px 0;color:#64748b;font-size:13px;line-height:1.6;font-family:Arial,sans-serif;">Your module access may have been updated accordingly. Log in to see your new permissions.</p>
        <a href="${SM_LOGIN_URL}" style="display:inline-block;background-color:#2563eb;color:#ffffff;padding:13px 32px;border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;font-family:Arial,sans-serif;">Login to See Changes &#8594;</a>

  fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({ action:"sendEmail", to:email, subject:"PharmDomestic — Your Role Has Been Updated", body }) }).catch(()=>{});
}

function smRoleKey(role) {
  if (role === "Admin")       return "admin";
  if (role === "Digital Ops") return "dops";
  return "warehouse";
}

function smShowToast(msg, type) {
  let tc = document.querySelector(".pd-toast-container");
  if (!tc) {
    tc = document.createElement("div");
    tc.className = "pd-toast-container";
    tc.style.cssText = "position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;";
    document.body.appendChild(tc);
  }
  const colors = {
    success: { bg:"#f0fdf4", color:"#15803d", border:"#bbf7d0", icon:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' },
    error:   { bg:"#fef2f2", color:"#dc2626", border:"#fecaca", icon:'<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' },
    warning: { bg:"#fffbeb", color:"#b45309", border:"#fde68a", icon:'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>' },
  };
  const c = colors[type] || colors.success;
  const t = document.createElement("div");
  t.style.cssText = `display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;font-family:'Inter',system-ui,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.12);background:${c.bg};color:${c.color};border:1px solid ${c.border};pointer-events:auto;`;
  t.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${c.icon}</svg> ${msg}`;
  tc.appendChild(t);
  setTimeout(() => { t.style.transition="opacity .3s"; t.style.opacity="0"; setTimeout(()=>t.remove(),300); }, 3500);
}
