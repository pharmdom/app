<script>
(function () {
'use strict';

const CURRENT_USER = JSON.parse(sessionStorage.getItem('user') || '{}');
const IS_ADMIN = ['admin','administrator'].includes((CURRENT_USER.role||'').toLowerCase());
const API = 'https://script.google.com/macros/s/AKfycbwS9c4pGnAiXNAlhdttTKZeKNOP8b_tSONjY7S-D_DOgiicflimtvrNVaRReuX7EN3hHg/exec';

/* ══ DEPARTMENT CONFIG ══════════════════════════════════════════════════════ */
const DEPT_KEY_MAP = {
  'warehouse':'warehouse','digital ops':'digitalops','digitalops':'digitalops',
  'digital':'digitalops','admin':'admins','admins':'admins',
};
const DEPT_LABELS = { warehouse:'Warehouse', digitalops:'Digital Ops', admins:'Admins', other:'Other' };
const DEPT_ORDER_LIST = ['warehouse','digitalops','admins'];

function getDeptKey(dept) {
  if (!dept) return 'other';
  return DEPT_KEY_MAP[dept.toLowerCase().trim()] || 'other';
}
function groupEmployeesByDept(emps) {
  const groups = {};
  emps.forEach(e => { const k=getDeptKey(e.department); if(!groups[k])groups[k]=[]; groups[k].push(e); });
  const result = [];
  DEPT_ORDER_LIST.forEach(k=>{ if(groups[k]) result.push({key:k,emps:groups[k]}); });
  Object.keys(groups).forEach(k=>{ if(!DEPT_ORDER_LIST.includes(k)) result.push({key:k,emps:groups[k]}); });
  return result;
}

/* ══ TASK ICONS ═════════════════════════════════════════════════════════════ */
const TASK_ICONS = {
  'pick & pack':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  'picking':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  'packing':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
  'pre pack':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
  'cleaning':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  'full station & brush':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
  'deliveries':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
  'cardboard':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>',
  'returns':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>',
  'warehouse org':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
  'fba':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
  'holiday':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
  'trial':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  'break':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
};
function getTaskIcon(name) {
  if (!name) return '';
  return TASK_ICONS[name.toLowerCase().trim()] || '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
}

/* ══ TIME CONFIG ════════════════════════════════════════════════════════════ */
const H_START = 7, H_END = 20;
const TOTAL_MINS = (H_END - H_START) * 60;
const SLOTS = [];
for (let h = H_START; h < H_END; h++) { SLOTS.push(pad(h)+':00'); SLOTS.push(pad(h)+':30'); }
const TIME_OPTIONS = [];
for (let h = H_START; h <= H_END; h++) {
  TIME_OPTIONS.push(pad(h)+':00');
  if (h < H_END) TIME_OPTIONS.push(pad(h)+':30');
}

function pad(n) { return String(n).padStart(2,'0'); }
function pct(t) { const [h,m]=t.split(':').map(Number); return Math.max(0,Math.min(100,((h-H_START)*60+m)/TOTAL_MINS*100)); }
function dur(s,e) { const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number); return ((eh*60+em)-(sh*60+sm))/60; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d,opts) { return new Date(d+'T00:00').toLocaleDateString('en-GB',opts); }
function isoDate(d) { return d.toISOString().split('T')[0]; }

/* ══ STATE ══════════════════════════════════════════════════════════════════ */
const S = {
  employees:[], tasks:[], schedule:[], workingDays:[1,2,3,4,5],
  closedDays:[], hiddenEmployees:[],
  currentDate: isoDate(new Date()),
  view:'day', loaded:false,
  editingId:null, shiftType:'task',
  drawerEmpId:null, expandedDays:{},
  pending: new Set(), conflictIds:[],
};

/* ══ BOOT ═══════════════════════════════════════════════════════════════════ */
async function init() {
  try {
    const res = await fetch(API, { method:'POST', body: JSON.stringify({action:'getData'}), headers:{'Content-Type':'text/plain'} });
    if (!res.ok) throw new Error(res.status);
    const d = await res.json();
    S.employees   = (d.employees||[]).map(e=>({...e,id:String(e.id)}));
    S.tasks       = (d.tasks||[]).map(t=>({...t,id:String(t.id)}));
    S.schedule    = (d.schedule||[]).map(normalizeShift);
    S.workingDays = d.workingDays||[1,2,3,4,5];
    S.closedDays  = JSON.parse(localStorage.getItem('rota_closedDays')||'[]');
    S.hiddenEmployees = JSON.parse(localStorage.getItem('rota_hiddenEmps')||'[]');
    S.loaded = true;
    S.loaded = true;
    // Snap to Monday if starting in week/2weeks view
    if (S.view !== 'day') S.currentDate = snapToMonday(S.currentDate);
    renderAll();
    renderAll();
  } catch(e) {
    document.getElementById('gridContent').innerHTML = '<p style="color:#dc2626;font-size:13px;padding:40px;text-align:center">Failed to load data. Please check your connection.</p>';
  }
}

function normalizeShift(s) {
  return { ...s, id:String(s.id), employeeId:String(s.employeeId), taskId:String(s.taskId||''), date:String(s.date), start:normalizeTime(s.start), end:normalizeTime(s.end), type:s.type||'task' };
}
function normalizeTime(t) {
  if (!t) return '00:00';
  if (t instanceof Date) return pad(t.getHours())+':'+pad(t.getMinutes());
  const m = String(t).trim().match(/(\d{1,2}):(\d{2})/);
  return m ? pad(m[1])+':'+m[2] : '00:00';
}
function isDateClosed(d) { return S.closedDays.some(c=>c.date===d); }
function visibleEmployees() { return S.employees.filter(e=>!S.hiddenEmployees.includes(e.id)); }

/* ══ DATES ══════════════════════════════════════════════════════════════════ */
function getDates() {
  if (S.view === 'day') return [S.currentDate];
  const mon = new Date(snapToMonday(S.currentDate) + 'T00:00');
  const count = S.view === '2weeks' ? 14 : 7;
  const out = [];
  for (let i = 0; i < count; i++) {
    const x = new Date(mon);
    x.setDate(mon.getDate() + i);
    out.push(isoDate(x));
  }
  return out;
}

/* ══ RENDER ALL ═════════════════════════════════════════════════════════════ */
function renderAll() { updateDateLabel(); renderGrid(); }

function updateDateLabel() {
  const dates = getDates();
  const label = S.view==='day'
    ? fmtDate(S.currentDate,{weekday:'short',month:'short',day:'numeric',year:'numeric'})
    : fmtDate(dates[0],{month:'short',day:'numeric'})+' – '+fmtDate(dates[dates.length-1],{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('dateLabel').textContent = label;
}

/* ══ GRID ═══════════════════════════════════════════════════════════════════ */
function buildTaskMap() { const m={}; S.tasks.forEach(t=>{m[String(t.id)]=t;}); return m; }

function renderGrid() {
  if (!S.loaded) return;
  const dates = getDates(), tm = buildTaskMap();
  const isDayView = S.view==='day';
  const emps = visibleEmployees();
  const groups = groupEmployeesByDept(emps);
  const todayStr = isoDate(new Date());
  const f = [];

  f.push('<table class="planner-table"><thead><tr>');
  f.push('<th class="planner-th-emp">Employee</th>');
  dates.forEach(date => {
    const closed=isDateClosed(date), isToday=date===todayStr&&!isDayView;
    f.push(`<th class="planner-th-day${closed?' is-closed':''}${isToday?' is-today':''}">`);
    if (!isDayView) {
      const ci=S.closedDays.find(c=>c.date===date);
      f.push(`<div class="day-col-header">
        <div class="day-name">${fmtDate(date,{weekday:'short'})}</div>
        ${isToday?'<span class="today-dot-header"></span>':''}
        <div class="day-date">${fmtDate(date,{month:'short',day:'numeric'})}</div>
        ${closed?`<div><span class="closed-badge">🔒 ${esc(ci?.label||'Closed')}</span></div>`:''}
      </div>`);
    } else {
      f.push('<div class="time-header-row">');
      SLOTS.forEach((s,i)=>{const h=i%2===0;f.push(`<div class="time-header-slot${h?' hour':''}">${h?`<span>${s}</span>`:''}</div>`);});
      f.push('</div>');
    }
    f.push('</th>');
  });
  f.push('</tr></thead><tbody>');

  groups.forEach(group=>{
    f.push(`<tr class="dept-header-row">
      <td class="dept-header-sticky" style="position:sticky;left:0;z-index:6;background:#f2f6fa;">${DEPT_LABELS[group.key]||'Other'}</td>

          } else if (dayShifts.length>0) {

              const task=tm[shift.taskId],isBreak=shift.type==='break';

              f.push(`<div class="week-shift-pill" style="color:${color};background:${bg};border-left-color:${color}" onclick="event.stopPropagation();editShift('${esc(shift.id)}')">

          }

        }
      });
      f.push('</tr>');
    });
  });

  f.push('</tbody></table>');
  document.getElementById('gridContent').innerHTML = f.join('');
}

function trashIcon(size=9){return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`;}

function snapToMonday(dateStr) {
  const d = new Date(dateStr + 'T00:00');
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return isoDate(d);
}
  
/* ══ NAVIGATION ═════════════════════════════════════════════════════════════ */
function navigate(dir) {
  if (S.view === 'day') {
    const d = new Date(S.currentDate + 'T00:00');
    d.setDate(d.getDate() + dir);
    S.currentDate = isoDate(d);
  } else {
    const mon = new Date(snapToMonday(S.currentDate) + 'T00:00');
    const delta = S.view === '2weeks' ? 14 : 7;
    mon.setDate(mon.getDate() + dir * delta);
    S.currentDate = isoDate(mon);
  }
  updateDateLabel();
  renderGrid();
}

/* ══ CALENDAR POPUP ═════════════════════════════════════════════════════════ */
let calViewDate=new Date(), calOpen=false;

function toggleCalendar(e) {
  e.stopPropagation();
  if (calOpen){closeCalendar();return;}
  calViewDate=new Date(S.currentDate+'T00:00');
  renderCalendar();
  const popup=document.getElementById('calPopup'),rect=document.getElementById('dateLabel').getBoundingClientRect(),popW=300;
  let left=rect.left-60;
  if(left+popW>window.innerWidth-8) left=window.innerWidth-popW-8;
  if(left<8) left=8;
  popup.style.top=(rect.bottom+8)+'px'; popup.style.left=left+'px'; popup.style.width=popW+'px';
  popup.classList.add('visible'); calOpen=true;
}
function closeCalendar(){document.getElementById('calPopup').classList.remove('visible');calOpen=false;}
function calNav(dir){calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+dir,1);renderCalendar();}

function getWeekRange(dateStr){
  const d=new Date(dateStr+'T00:00'),mon=new Date(d);mon.setDate(d.getDate()-((d.getDay()+6)%7));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);return{start:isoDate(mon),end:isoDate(sun)};
}

function renderCalendar(){
  const isDayView=S.view==='day',DAYS=['Mo','Tu','We','Th','Fr','Sa','Su'];
  const y=calViewDate.getFullYear(),m=calViewDate.getMonth();
  document.getElementById('calMonthLabel').textContent=new Date(y,m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const firstDay=new Date(y,m,1),lastDay=new Date(y,m+1,0),startOffset=(firstDay.getDay()+6)%7,todayStr=isoDate(new Date());
  let rangeStart=null,rangeEnd=null;
  if(!isDayView){
    const wr=getWeekRange(S.currentDate);rangeStart=wr.start;
    if(S.view==='2weeks'){const e2=new Date(wr.end+'T00:00');e2.setDate(e2.getDate()+7);rangeEnd=isoDate(e2);}
    else rangeEnd=wr.end;
  }
  let html=DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startOffset;i++) html+='<div class="cal-day empty"></div>';
  for(let day=1;day<=lastDay.getDate();day++){
    const ds=`${y}-${pad(m+1)}-${pad(day)}`;
    let cls='cal-day';
    if(ds===todayStr) cls+=' today';
    if(isDayView){if(ds===S.currentDate) cls+=' selected';}
    else if(rangeStart&&rangeEnd){
      if(ds===rangeStart) cls+=' range-start';
      else if(ds===rangeEnd) cls+=' range-end';
      else if(ds>rangeStart&&ds<rangeEnd) cls+=' in-range';
    }
    html+=`<div class="${cls}" onclick="calSelectDate('${ds}')">${day}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  const hint=document.getElementById('calRangeHint');
  if(!isDayView){hint.style.display='block';hint.textContent='Click any day to jump to that week';}
  else hint.style.display='none';
}

function calSelectDate(dateStr){
  if(S.view==='day'){S.currentDate=dateStr;}
  else{const d=new Date(dateStr+'T00:00'),mon=new Date(d);mon.setDate(d.getDate()-((d.getDay()+6)%7));S.currentDate=isoDate(mon);}
  closeCalendar(); updateDateLabel(); renderGrid();
}
document.addEventListener('click',function(e){if(calOpen&&!document.getElementById('calPopup').contains(e.target))closeCalendar();});

/* ══ TIME PICKER ════════════════════════════════════════════════════════════ */
function renderTimeBtns(gridId, inputId, badgeId, selectedVal, isEnd) {
  const grid = document.getElementById(gridId);
  if (!grid) return;
  grid.innerHTML = TIME_OPTIONS.map(t => {
    const sel = t === selectedVal;
    const selClass = sel ? (isEnd ? ' end-selected' : ' selected') : '';
    return `<button type="button" class="time-btn${selClass}" onclick="selectTime('${gridId}','${inputId}','${badgeId}','${t}',${isEnd})">${t}</button>`;
  }).join('');
  document.getElementById(inputId).value = selectedVal || '';
  const badge = document.getElementById(badgeId);
  if (badge) {
    if (selectedVal) { badge.textContent = selectedVal; badge.style.display = 'inline-block'; }
    else badge.style.display = 'none';
  }
}

function selectTime(gridId, inputId, badgeId, val, isEnd) {
  document.getElementById(inputId).value = val;
  const grid = document.getElementById(gridId);
  grid.querySelectorAll('.time-btn').forEach(b => {
    b.className = 'time-btn';
    if (b.textContent.trim() === val) b.classList.add(isEnd ? 'end-selected' : 'selected');
  });
  const badge = document.getElementById(badgeId);
  if (badge) { badge.textContent = val; badge.style.display = 'inline-block'; }
  checkConflict();
}

/* ══ CONFLICT DETECTION ═════════════════════════════════════════════════════ */
function getConflicts(empId,date,start,end,excludeId){
  return S.schedule.filter(s=>s.employeeId===String(empId)&&s.date===date&&s.id!==String(excludeId||'')&&s.start<end&&s.end>start);
}
function checkConflict(){
  const empId=document.getElementById('empSelect').value;
  const date=document.getElementById('dateInput').value;
  const start=document.getElementById('startInput').value;
  const end=document.getElementById('endInput').value;
  const banner=document.getElementById('conflictBanner'),replaceBtn=document.getElementById('replaceShiftBtn');
  if(!empId||!date||!start||!end||start>=end){banner.classList.remove('visible');replaceBtn.style.display='none';S.conflictIds=[];return;}
  const conflicts=getConflicts(empId,date,start,end,S.editingId);
  S.conflictIds=conflicts.map(c=>c.id);
  if(conflicts.length){
    const tm=buildTaskMap();
    const names=conflicts.map(c=>{const t=tm[c.taskId];return`${c.type==='break'?'Break':(t?.name||'Task')} (${c.start}–${c.end})`;}).join(', ');
    document.getElementById('conflictBannerMsg').textContent=`Overlaps with: ${names}. Click Replace to overwrite.`;
    banner.classList.add('visible');replaceBtn.style.display='flex';
  } else {banner.classList.remove('visible');replaceBtn.style.display='none';S.conflictIds=[];}
}

function editShift(id){

function closeShiftModal(){document.getElementById('shiftModal').classList.remove('visible');S.conflictIds=[];}
function switchType(type){

  document.getElementById('btnBreak').classList.toggle('active',type==='break');
  document.getElementById('taskFieldWrap').style.display=type==='task'?'block':'none';
}
function setSaveState(loading){
  const btn=document.getElementById('saveShiftBtn');
  btn.disabled=loading;
  btn.innerHTML=loading?'<span class="spinner"></span> Saving…':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg> Save';
}

async function saveShift(replaceConflicts){
  const payload={
    id:S.editingId||('s'+Date.now()),
    employeeId:document.getElementById('empSelect').value,
    taskId:S.shiftType==='task'?document.getElementById('taskSelect').value:'',
    date:document.getElementById('dateInput').value,
    start:document.getElementById('startInput').value,
    end:document.getElementById('endInput').value,
    notes:'', type:S.shiftType,
  };
  if(!payload.employeeId||!payload.date||!payload.start||!payload.end){showToast('Please fill all required fields','error');return;}
  if(payload.start>=payload.end){showToast('End time must be after start time','error');return;}
  const liveConflicts=getConflicts(payload.employeeId,payload.date,payload.start,payload.end,S.editingId);
  if(liveConflicts.length&&!replaceConflicts){checkConflict();return;}
  const isEdit=!!S.editingId,prev=[...S.schedule];
  const removedIds=replaceConflicts?liveConflicts.map(c=>c.id):[];
  S.schedule=S.schedule.filter(s=>!removedIds.includes(s.id));
  if(isEdit){const i=S.schedule.findIndex(s=>s.id===String(payload.id));if(i>-1)S.schedule[i]=normalizeShift(payload);}
  else{S.schedule.push(normalizeShift(payload));S.pending.add(payload.id);}
  closeShiftModal(); renderGrid(); if(S.drawerEmpId)renderDrawerBody(); setSaveState(true);
  for(const rid of removedIds)fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'deleteShift',id:rid})}).catch(()=>{});
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'saveShift',data:payload})});
    if(!res.ok) throw new Error(res.status);
    const result=await res.json().catch(()=>({}));
    if(result.id&&result.id!==payload.id){const i=S.schedule.findIndex(s=>s.id===payload.id);if(i>-1)S.schedule[i].id=String(result.id);}
    S.pending.delete(payload.id); renderGrid(); if(S.drawerEmpId)renderDrawerBody();
    showToast(isEdit?'Shift updated ✓':(replaceConflicts?'Replaced & saved ✓':'Shift saved ✓'),'success');
  }catch(err){
    S.schedule=prev;S.pending.delete(payload.id);renderGrid();if(S.drawerEmpId)renderDrawerBody();showToast('Failed to save — reverted','error');
  }finally{setSaveState(false);}
}

/* ══ DELETE ═════════════════════════════════════════════════════════════════ */
let _confirmResolve=null;
function showConfirm(title,msg,okLabel,okClass){
  return new Promise(resolve=>{
    _confirmResolve=resolve;
    document.getElementById('confirmTitle').textContent=title;
    document.getElementById('confirmMsg').textContent=msg;
    const okBtn=document.getElementById('confirmOkBtn'),newBtn=okBtn.cloneNode(true);
    okBtn.parentNode.replaceChild(newBtn,okBtn);
    newBtn.textContent=okLabel||'Confirm'; newBtn.className=okClass||'confirm-btn-danger';
    newBtn.addEventListener('click',()=>{document.getElementById('confirmOverlay').classList.remove('visible');_confirmResolve=null;resolve(true);});
    document.getElementById('confirmOverlay').classList.add('visible');
  });
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('visible');if(_confirmResolve){const r=_confirmResolve;_confirmResolve=null;r(false);}}

async function deleteShift(id){
  const ok=await showConfirm('Delete this shift?','This action cannot be undone.','Delete','confirm-btn-danger');
  if(!ok) return;
  const prev=[...S.schedule]; S.schedule=S.schedule.filter(s=>s.id!==String(id));
  renderGrid(); if(S.drawerEmpId)renderDrawerBody(); showToast('Deleting…','info');
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'deleteShift',id})});
    if(!res.ok) throw new Error(res.status); showToast('Shift deleted','success');
  }catch(err){S.schedule=prev;renderGrid();if(S.drawerEmpId)renderDrawerBody();showToast('Failed to delete — reverted','error');}
}

  document.getElementById('drawerOverlay').classList.add('visible');

function renderDrawerBody(){
  const empId=S.drawerEmpId; if(!empId) return;
  const tm=buildTaskMap(),dates=getDates();
  const empShifts=S.schedule.filter(s=>String(s.employeeId)===String(empId));
  const f=[];
  if(S.view==='day'){
    const dayShifts=empShifts.filter(s=>s.date===S.currentDate).sort((a,b)=>a.start.localeCompare(b.start));
    if(!dayShifts.length) f.push('<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px 0">No shifts scheduled today</p>');
    else dayShifts.forEach(s=>f.push(shiftItemHTML(s,tm)));
  }else{
    let any=false;
    dates.forEach(date=>{
      const ds=empShifts.filter(s=>s.date===date).sort((a,b)=>a.start.localeCompare(b.start));
      if(!ds.length) return; any=true;
      const total=ds.reduce((acc,s)=>acc+dur(s.start,s.end),0),exp=S.expandedDays[date];
      f.push(`<div class="day-section">
        <div class="day-section-hdr" onclick="toggleDay('${date}')">
          <div><span class="day-section-title">${fmtDate(date,{weekday:'short',month:'short',day:'numeric'})}</span><span class="day-hours-badge">${total.toFixed(1)}h</span></div>
          <svg class="day-toggle-icon${exp?' open':''}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="day-shifts${exp?' open':''}">${ds.map(s=>shiftItemHTML(s,tm)).join('')}</div>
      </div>`);
    });
    if(!any) f.push('<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px 0">No shifts this period</p>');
  }
  document.getElementById('drawerBody').innerHTML=f.join('');
}

function shiftItemHTML(s,tm){
  const task=tm[String(s.taskId)],isBreak=s.type==='break',d=dur(s.start,s.end);
  const bg=isBreak?'#f1f5f9':(task?.lightColor||'#f8fafc');
  const border=isBreak?'#94a3b8':(task?.color||'#cbd5e1');
  const color=isBreak?'#64748b':(task?.color||'#475569');
  const taskName=isBreak?'Break':(task?.name||'Task');
  const icon=isBreak?TASK_ICONS['break']:getTaskIcon(taskName);
  return `<div class="shift-item" style="background:${bg};border-color:${border}">
    <div class="shift-bar" style="background:${color}"></div>
    <div style="flex:1;min-width:0"><div class="shift-item-name" style="color:${color}">${icon} ${esc(taskName)}</div><div class="shift-item-meta">${s.start} – ${s.end}</div></div>
    <div class="shift-item-dur">${d.toFixed(1)}h</div>
  </div>`;
}

/* ══ COPY / DUPLICATE MODAL ═════════════════════════════════════════════════ */
const COPY = { step:1, srcRange:'week', srcDate:null, destDate:null, preview:[] };

function openCopyModal() {
  COPY.step = 1;
  COPY.srcRange = S.view === '2weeks' ? '2weeks' : S.view === 'day' ? 'day' : 'week';
  COPY.srcDate = S.currentDate;
  // default destination = next period
  const d = new Date(S.currentDate+'T00:00');
  const delta = COPY.srcRange==='day'?1:COPY.srcRange==='2weeks'?14:7;
  d.setDate(d.getDate()+delta);
  COPY.destDate = isoDate(d);
  renderCopyModal();
  document.getElementById('copyModal').classList.add('visible');
}
function closeCopyModal() { document.getElementById('copyModal').classList.remove('visible'); }
document.getElementById('copyModal').addEventListener('click',function(e){if(e.target===this)closeCopyModal();});

function getCopyDates(startDate, range) {
  if (range==='day') return [startDate];
  const d=new Date(startDate+'T00:00'), mon=new Date(d);
  mon.setDate(d.getDate()-((d.getDay()+6)%7));
  const count=range==='2weeks'?14:7, out=[];
  for(let i=0;i<count;i++){const x=new Date(mon);x.setDate(mon.getDate()+i);out.push(isoDate(x));}
  return out;
}

function renderCopyModal() {
  if (COPY.step===1) renderCopyStep1();
  else renderCopyStep2();
}

function copyStepsHTML(step) {
  const s1done = step>1;
  return `<div class="copy-steps">
    <div class="copy-step ${s1done?'done':'active'}">
      <div class="copy-step-num">${s1done?'✓':'1'}</div><span>Configure</span>
    </div>
    <div class="copy-step-line ${s1done?'done':''}"></div>
    <div class="copy-step ${step===2?'active':''}">
      <div class="copy-step-num">2</div><span>Preview &amp; Confirm</span>
    </div>
  </div>`;
}

function renderCopyStep1() {
  const srcDates = getCopyDates(COPY.srcDate, COPY.srcRange);

  const srcLabel = srcDates.length===1

    : fmtDate(srcDates[0],{month:'short',day:'numeric'})+' – '+fmtDate(srcDates[srcDates.length-1],{month:'short',day:'numeric',year:'numeric'});
  const destLabel = destDates.length===1
    ? fmtDate(destDates[0],{weekday:'short',month:'short',day:'numeric',year:'numeric'})
    : fmtDate(destDates[0],{month:'short',day:'numeric'})+' – '+fmtDate(destDates[destDates.length-1],{month:'short',day:'numeric',year:'numeric'});
  const shiftsInSrc = S.schedule.filter(s=>srcDates.includes(s.date));

  document.getElementById('copyModalTitle').textContent = 'Copy Schedule';

  document.getElementById('copyModalBody').innerHTML = `

      ${['day','week','2weeks'].map(r=>`<button class="copy-range-pill${COPY.srcRange===r?' active':''}" onclick="COPY.srcRange='${r}';renderCopyModal()">${r==='day'?'Single Day':r==='week'?'1 Week':'2 Weeks'}</button>`).join('')}

      <span>Source: <strong>${srcLabel}</strong> &nbsp;→&nbsp; Paste to: <strong>${destLabel}</strong> &nbsp;—&nbsp; <strong>${shiftsInSrc.length} shift${shiftsInSrc.length!==1?'s':''}</strong> found.</span>

    </div>
    ${shiftsInSrc.length===0?`<div class="copy-warn-banner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

  document.getElementById('copyModalFooter').innerHTML = `

function buildCopyPreview() {
  const srcDates = getCopyDates(COPY.srcDate, COPY.srcRange);
  const destDates = getCopyDates(COPY.destDate, COPY.srcRange);
  const shiftsInSrc = S.schedule.filter(s=>srcDates.includes(s.date));
  COPY.preview = shiftsInSrc.map(s=>{
    const srcIdx = srcDates.indexOf(s.date);
    const destIdx = Math.min(srcIdx, destDates.length-1);
    return {
      _origId: s.id,
      id: 'cp_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      employeeId: s.employeeId,
      taskId: s.taskId,
      date: destDates[destIdx],
      start: s.start,
      end: s.end,
      notes: s.notes || '',
      type: s.type,
      _remove: false
    };
  });
  COPY.step = 2;
  renderCopyModal();
}

              <span style="opacity:.7;display:flex;align-items:center">${icon}</span>
              <span>${esc(name)}</span>
            </div>
          </td>
          <td style="color:#475569;white-space:nowrap;font-size:11px">${s.start}–${s.end}</td>

              ? `<button class="preview-restore-btn" onclick="toggleCopyRemove(${s._idx})" title="Restore"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>`
              : `<button class="preview-remove-btn" onclick="toggleCopyRemove(${s._idx})" title="Remove"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`

  document.getElementById('copyModalBody').innerHTML = `
    ${copyStepsHTML(2)}

      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span>Pasting into <strong>${destLabel}</strong> <span class="preview-count-badge">${active.length} shift${active.length!==1?'s':''} will be added</span></span>
    </div>
    <div class="copy-section-label" style="margin-bottom:10px">Remove any shifts you don't want copied, then confirm</div>
    <div class="preview-scroll">
      <table class="preview-table">
        <thead><tr><th>Employee</th><th>Date</th><th>Task</th><th>Time</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:#94a3b8;font-size:12px">All shifts removed</td></tr>'}</tbody>
      </table>
    </div>`;
  document.getElementById('copyModalFooter').innerHTML = `
    <button class="btn-copy-secondary" onclick="COPY.step=1;renderCopyModal()">← Back</button>
    <button class="btn-copy-secondary" onclick="closeCopyModal()">Cancel</button>
    <button class="btn-copy-primary" id="confirmCopyBtn" onclick="confirmCopy()" ${active.length===0?'disabled':''}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Confirm &amp; Add ${active.length} Shift${active.length!==1?'s':''}
    </button>`;
}

function toggleCopyRemove(idx) {
  COPY.preview[idx]._remove = !COPY.preview[idx]._remove;
  renderCopyStep2();
}

async function confirmCopy() {
  const toAdd = COPY.preview
    .filter(s=>!s._remove)
    .map(s=>{ const {_origId,_idx,_remove,...clean}=s; clean.id='cp_'+Date.now()+'_'+Math.random().toString(36).slice(2); return clean; });
  if(!toAdd.length){showToast('Nothing to add','warn');return;}

  toAdd.forEach(s=>{ S.schedule.push(normalizeShift(s)); S.pending.add(s.id); });
  closeCopyModal(); renderGrid(); if(S.drawerEmpId)renderDrawerBody();
  showToast(`Adding ${toAdd.length} shift${toAdd.length!==1?'s':''}…`,'info');

  let saved=0, failed=0;
  await Promise.all(toAdd.map(async s=>{
    try{
      const res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'saveShift',data:s})});
      if(!res.ok) throw new Error(res.status);
      const result=await res.json().catch(()=>({}));
      if(result.id&&result.id!==s.id){const i=S.schedule.findIndex(x=>x.id===s.id);if(i>-1)S.schedule[i].id=String(result.id);}
      S.pending.delete(s.id); saved++;
    }catch{
      S.schedule=S.schedule.filter(x=>x.id!==s.id); S.pending.delete(s.id); failed++;
    }
  }));
  renderGrid(); if(S.drawerEmpId)renderDrawerBody();
  if(failed===0) showToast(`${saved} shift${saved!==1?'s':''} copied ✓`,'success');
  else showToast(`${saved} saved, ${failed} failed`,'warn');
}

/* ══ COPY CALENDAR ══════════════════════════════════════════════════════════ */
let _copyCal_field = null, _copyCal_view = new Date(), _copyCal_open = false;

function _ensureCopyCalDOM() {
  if (document.getElementById('copyCal')) return;
  const el = document.createElement('div');
  el.className = 'cal-popup'; el.id = 'copyCal';
  el.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="copyCalNav(-1)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="cal-month-label" id="copyCalMonthLabel"></span>
      <button class="cal-nav-btn" onclick="copyCalNav(1)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="cal-grid" id="copyCalGrid"></div>`;
  document.body.appendChild(el);
}

function openCopyCalendar(field, anchorId) {
  _ensureCopyCalDOM();
  _copyCal_field = field;
  const ds = field==='src' ? COPY.srcDate : COPY.destDate;
  _copyCal_view = new Date((ds||isoDate(new Date()))+'T00:00');
  renderCopyCalendar();
  const popup = document.getElementById('copyCal');
  const anchor = document.getElementById(anchorId);
  if (!anchor) return;
  const rect = anchor.getBoundingClientRect();
  const popW = 264;
  let left = rect.left;
  if (left+popW > window.innerWidth-8) left = window.innerWidth-popW-8;
  if (left < 8) left = 8;
  let top = rect.bottom+6;
  if (top+300 > window.innerHeight) top = rect.top-310;
  popup.style.top = top+'px';
  popup.style.left = left+'px';
  popup.style.width = popW+'px';
  popup.style.zIndex = '9000';
  popup.classList.add('visible');
  _copyCal_open = true;
}

function closeCopyCalendar() {
  const p = document.getElementById('copyCal');
  if (p) p.classList.remove('visible');
  _copyCal_open = false;
}

function copyCalNav(dir) {
  _copyCal_view = new Date(_copyCal_view.getFullYear(), _copyCal_view.getMonth()+dir, 1);
  renderCopyCalendar();
}

function renderCopyCalendar() {
  const DAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const y = _copyCal_view.getFullYear(), m = _copyCal_view.getMonth();
  document.getElementById('copyCalMonthLabel').textContent = new Date(y,m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const firstDay = new Date(y,m,1), lastDay = new Date(y,m+1,0);
  const startOffset = (firstDay.getDay()+6)%7;
  const todayStr = isoDate(new Date());
  const curDate = (_copyCal_field==='src' ? COPY.srcDate : COPY.destDate) || todayStr;
  const isWeek = COPY.srcRange !== 'day';
  const count = COPY.srcRange==='2weeks' ? 14 : 7;
  let selStart = curDate, selEnd = curDate;
  if (isWeek) {
    const sd = new Date(curDate+'T00:00'), smon = new Date(sd);
    smon.setDate(sd.getDate()-((sd.getDay()+6)%7));
    selStart = isoDate(smon);
    const send = new Date(smon); send.setDate(smon.getDate()+count-1);
    selEnd = isoDate(send);
  }
  let html = DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startOffset;i++) html+='<div class="cal-day empty"></div>';
  for(let day=1;day<=lastDay.getDate();day++){
    const ds=`${y}-${pad(m+1)}-${pad(day)}`;
    let cls='cal-day';
    if(ds===todayStr) cls+=' today';
    if(isWeek){
      if(ds===selStart) cls+=' range-start';
      else if(ds===selEnd) cls+=' range-end';
      else if(ds>selStart&&ds<selEnd) cls+=' in-range';
    } else {
      if(ds===selStart) cls+=' selected';
    }
    html+=`<div class="${cls}" onclick="copyCalSelect('${ds}')">${day}</div>`;
  }
  document.getElementById('copyCalGrid').innerHTML = html;
}

function copyCalSelect(ds) {
  if (COPY.srcRange !== 'day') {
    const d = new Date(ds+'T00:00'), mon = new Date(d);
    mon.setDate(d.getDate()-((d.getDay()+6)%7));
    ds = isoDate(mon);
  }
  if (_copyCal_field==='src') COPY.srcDate = ds;
  else COPY.destDate = ds;
  closeCopyCalendar();
  renderCopyModal();
}

document.addEventListener('click', function(e){
  if (!_copyCal_open) return;
  const popup = document.getElementById('copyCal');
  if (popup && popup.contains(e.target)) return;
  if (e.target.closest && e.target.closest('.copy-date-btn')) return;
  closeCopyCalendar();
});

function showToast(msg,type){
  const c=document.getElementById('toastContainer'),el=document.createElement('div');
  el.className='toast '+(type||'');
  const icons={
    success:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    warn:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  };
  el.innerHTML=(icons[type]||'')+' '+esc(msg); c.appendChild(el);
  setTimeout(()=>{el.style.animation='toastOut .2s ease forwards';setTimeout(()=>el.remove(),220);},3200);
}
