<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Offers — FBA Product Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --border:    #e2e8f0;
  --border2:   #f1f5f9;
  --text:      #0f172a;
  --text2:     #334155;
  --text3:     #64748b;
  --text4:     #94a3b8;
  --blue:      #2563eb;
  --blue-d:    #1d4ed8;
  --blue-bg:   #eff6ff;
  --blue-bd:   #bfdbfe;
  --green:     #15803d;
  --green-bg:  #f0fdf4;
  --green-bd:  #bbf7d0;
  --amber:     #f59e0b;
  --amber-d:   #d97706;
  --amber-bg:  #fffbeb;
  --amber-bd:  #fde68a;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --red-bd:    #fecaca;
  --navy:      #0f172a;
  --navy2:     #1e293b;
}

html,body{font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{flex-shrink:0;background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07)}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-logo svg{width:15px;height:15px;color:#fff}
.topbar-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:500}
.topbar-actions{display:flex;align-items:center;gap:8px}

.page-body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:16px 20px 12px}

.toolbar{flex-shrink:0;display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── Stat chips ── */
.chip-stat{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap;cursor:default}
.chip-stat svg{width:11px;height:11px;flex-shrink:0}
.chip-slate{background:#f8fafc;color:var(--text3);border-color:var(--border)}
.chip-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.chip-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1.5px solid;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-d);border-color:var(--blue-d)}
.btn-secondary{background:#fff;border-color:var(--border);color:var(--text3)}
.btn-secondary:hover{border-color:#94a3b8;color:var(--text)}
.btn-amber{background:var(--amber);border-color:var(--amber);color:#fff}
.btn-amber:hover{background:var(--amber-d);border-color:var(--amber-d)}
.btn-danger{background:#fff;border-color:var(--red-bd);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.btn-ghost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.75)}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:#fff}

/* ── Search ── */
.search-wrap{position:relative;min-width:160px;max-width:280px;flex:1}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);width:14px;height:14px;pointer-events:none}
.search-input{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--blue)}

/* ── Cards Grid ── */
.cards-area{flex:1;overflow-y:auto;min-height:0}
.cards-area::-webkit-scrollbar{width:4px}
.cards-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding-bottom:16px}

.offer-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:box-shadow .14s,border-color .14s,transform .1s;animation:cardIn .2s ease both;user-select:none;position:relative;overflow:hidden}
.offer-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);border-radius:3px 0 0 3px;opacity:0;transition:opacity .15s}
.offer-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.09);border-color:var(--blue-bd);transform:translateY(-1px)}
.offer-card:hover::before{opacity:1}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.oc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.oc-ean{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text4);font-family:monospace;margin-bottom:3px}
.oc-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.oc-supplier{font-size:11px;color:var(--text3);margin-top:2px}
.oc-cost{flex-shrink:0;text-align:right}
.oc-cost-val{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.oc-cost-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text4)}
.oc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border2)}
.oc-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700}
.oc-badge-offer{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.oc-arrow{color:var(--text4);display:flex;align-items:center}

/* ── Empty / Loading ── */
.state-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text4);gap:10px;text-align:center;grid-column:1/-1}
.state-center p{font-size:13px;font-weight:600;color:var(--text3)}
.state-center span{font-size:12px;color:var(--text4)}
.spinner{display:inline-block;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
.spinner-sm{width:16px;height:16px}
.spinner-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:1100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;width:520px;max-width:96vw;height:100vh;background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.13);z-index:1200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.drawer.open{transform:translateX(0)}

.drawer-hero{padding:16px 20px 14px;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);flex-shrink:0;position:relative;overflow:hidden}
.drawer-hero::after{content:'';position:absolute;bottom:-30px;left:20px;width:120px;height:120px;border-radius:50%;background:rgba(37,99,235,.1)}
.drawer-hero-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:background .15s;z-index:1}
.drawer-hero-close:hover{background:rgba(255,255,255,.2);color:#fff}
.dh-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;background:rgba(37,99,235,.2);border:1px solid rgba(96,165,250,.3);color:#60a5fa;margin-bottom:5px;position:relative;z-index:1}
.dh-supplier{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:3px;position:relative;z-index:1}
.dh-name{font-size:17px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:2px;padding-right:36px;position:relative;z-index:1}
.dh-ean{font-size:11px;color:rgba(255,255,255,.4);font-family:monospace;margin-bottom:12px;position:relative;z-index:1}
.dh-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.dh-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 10px}
.dh-kpi-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);margin-bottom:2px}
.dh-kpi-val{font-size:14px;font-weight:700;color:#fff;line-height:1}

.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text4);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border2)}
.sec{margin-bottom:20px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-grid.full{grid-template-columns:1fr}
.info-cell{background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;padding:10px 12px}
.info-cell label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:5px}
.info-cell .val{font-size:13px;font-weight:600;color:var(--text2)}
.info-cell .val.mono{font-family:monospace;font-size:12px}
.info-cell .val.big{font-size:18px;font-weight:800;color:var(--text)}
.info-cell .val.green{color:var(--green)}
.info-cell .val.empty{color:var(--text4);font-weight:400;font-style:italic}

.drawer-footer{padding:10px 20px;border-top:1px solid var(--border2);display:flex;gap:8px;align-items:center;background:#fafafa;flex-shrink:0}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1050;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.18);width:100%;max-width:860px;max-height:calc(100vh - 40px);display:flex;flex-direction:column;overflow:hidden}
.modal-sm{max-width:460px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h2{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.modal-count{font-size:11px;font-weight:700;background:var(--bg);color:var(--text3);padding:2px 9px;border-radius:100px;border:1px solid var(--border)}
.modal-close{width:30px;height:30px;border:none;border-radius:8px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-toolbar{padding:12px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;min-height:0}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border2);display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-shrink:0}

/* ── Inbound table ── */
.ib-table{width:100%;border-collapse:collapse}
.ib-table thead{position:sticky;top:0;z-index:2}
.ib-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap}
.ib-table td{padding:10px 14px;border-bottom:1px solid var(--border2);color:var(--text2);font-size:13px;vertical-align:middle}
.ib-table tr{cursor:pointer;transition:background .1s}
.ib-table tbody tr:hover td{background:#fafbff}
.ib-table tbody tr.marked td{background:var(--green-bg)}
.ib-mark-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.ib-mark-btn:hover{border-color:var(--green-bd);background:var(--green-bg);color:var(--green)}
.ib-mark-btn.marked{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}

/* ── Inbound product detail panel ── */
.ib-detail{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);padding:20px}
.ib-detail.open{opacity:1;pointer-events:all}
.ib-panel{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.2);width:100%;max-width:560px;max-height:calc(100vh - 60px);display:flex;flex-direction:column;overflow:hidden}

/* ── Toast ── */
.toast-wrap{position:fixed;top:60px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:10px 14px;background:var(--navy2);color:#fff;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.18);animation:toastIn .2s ease;max-width:320px;pointer-events:auto}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.info{background:#1e40af}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Confirm overlay ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(3px)}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:#fff;border-radius:14px;padding:24px;width:360px;max-width:90vw;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
.confirm-box p{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

/* ── Skeleton loader ── */
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:400% 0}100%{background-position:-400% 0}}

/* ── Progress bar (top) ── */
.progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--blue);z-index:9998;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;opacity:0}
.progress-bar.active{opacity:1}

/* ── Refresh badge ── */
.refresh-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:600;background:var(--amber-bg);color:var(--amber-d);border:1px solid var(--amber-bd);cursor:pointer;transition:all .15s;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.refresh-badge svg{width:10px;height:10px}

/* ── Responsive ── */
@media(max-width:640px){
  html,body{overflow:auto;height:auto}
  .app{height:auto;overflow:visible}
  .page-body{padding:12px}
  .cards-area{overflow:visible}
  .cards-grid{grid-template-columns:1fr}
  .drawer{width:100%;max-width:100%}
  .dh-kpis{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .modal{max-height:calc(100vh - 30px)}
  .modal-toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{max-width:100%}
  .ib-panel{max-height:95vh}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar-left,.toolbar-right{width:100%;justify-content:space-between}
  .search-wrap{max-width:100%;min-width:0}
  .topbar-sub{display:none}
}
@media(max-width:480px){
  .ib-table th:nth-child(3),.ib-table td:nth-child(3){display:none}
  .dh-kpis{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<div class="app">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="topbar-title">Offers</div>
        <div class="topbar-sub">Product Review Pipeline</div>
      </div>
    </div>
    <div class="topbar-actions">
      <span id="lastUpdatedBadge" style="font-size:10px;color:rgba(255,255,255,.35);display:none"></span>
      <button class="btn btn-ghost btn-sm" id="refreshBtn" onclick="refreshAll()" title="Refresh">
        <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
      <button class="btn btn-amber btn-sm" onclick="openInboundModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Inbound
      </button>
    </div>
  </header>

  <!-- Page body -->
  <main class="page-body">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="chip-stat chip-slate" id="statTotal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span>Loading…</span>
        </div>
        <div class="chip-stat chip-blue" id="statSuppliers">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>—</span>
        </div>
      </div>
      <div class="toolbar-right">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search EAN, product, supplier…" oninput="renderOffers()">
        </div>
      </div>
    </div>

    <div class="cards-area">
      <div class="cards-grid" id="cardsGrid">
        <!-- Skeleton placeholders while loading -->
        <div class="offer-card" style="pointer-events:none"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px"></div><div class="skeleton" style="height:18px;width:80%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%;margin-bottom:14px"></div><div style="height:1px;background:var(--border2);margin-bottom:10px"></div><div class="skeleton" style="height:12px;width:50%"></div></div>
        <div class="offer-card" style="pointer-events:none"><div class="skeleton" style="height:14px;width:45%;margin-bottom:10px"></div><div class="skeleton" style="height:18px;width:75%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:55%;margin-bottom:14px"></div><div style="height:1px;background:var(--border2);margin-bottom:10px"></div><div class="skeleton" style="height:12px;width:40%"></div></div>
        <div class="offer-card" style="pointer-events:none"><div class="skeleton" style="height:14px;width:55%;margin-bottom:10px"></div><div class="skeleton" style="height:18px;width:85%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:35%;margin-bottom:14px"></div><div style="height:1px;background:var(--border2);margin-bottom:10px"></div><div class="skeleton" style="height:12px;width:45%"></div></div>
        <div class="offer-card" style="pointer-events:none"><div class="skeleton" style="height:14px;width:50%;margin-bottom:10px"></div><div class="skeleton" style="height:18px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:60%;margin-bottom:14px"></div><div style="height:1px;background:var(--border2);margin-bottom:10px"></div><div class="skeleton" style="height:12px;width:55%"></div></div>
        <div class="offer-card" style="pointer-events:none"><div class="skeleton" style="height:14px;width:65%;margin-bottom:10px"></div><div class="skeleton" style="height:18px;width:80%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%;margin-bottom:14px"></div><div style="height:1px;background:var(--border2);margin-bottom:10px"></div><div class="skeleton" style="height:12px;width:50%"></div></div>
        <div class="offer-card" style="pointer-events:none"><div class="skeleton" style="height:14px;width:42%;margin-bottom:10px"></div><div class="skeleton" style="height:18px;width:78%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:48%;margin-bottom:14px"></div><div style="height:1px;background:var(--border2);margin-bottom:10px"></div><div class="skeleton" style="height:12px;width:43%"></div></div>

</div>

<!-- ═══ OFFER DETAIL DRAWER ═══ -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ═══ INBOUND MODAL ═══ -->

          Move to Offers
        </button>
        <button class="btn btn-sm btn-danger" onclick="confirmArchive()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Archive All
        </button>

<!-- ═══ INBOUND PRODUCT DETAIL ═══ -->
<div class="ib-detail" id="ibDetail" onclick="closeIbDetail(event)">
  <div class="ib-panel" onclick="event.stopPropagation()">
    <div id="ibPanelHero"></div>
    <div class="drawer-body" id="ibPanelBody"></div>
    <div class="drawer-footer" id="ibPanelFooter"></div>

<!-- ═══ CONFIRM DIALOG ═══ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmMsg">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirmOkBtn" onclick="executeConfirmAction()">Confirm</button>
    </div>
  </div>
</div>

<!-- ═══ Toast ═══ -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';

/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbwt1sg2sgDxCuwZ6KOFONX6IHany8CcOZyJMLjIkHn08e3d-cVsLOhGpIW0Hj3XYigB/exec';
const POLL_INTERVAL_MS = 30000; // 30s polling for multi-user sync

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let offersData   = [];   // Offers sheet
let inboundData  = [];   // Offers/Products sheet
let markedIds    = new Set();
let drawerId     = null;
let drawerSrc    = null; // 'offer' | 'inbound'
let ibDetailId   = null;
let confirmFn    = null;
let pollTimer    = null;
let lastOffersEtag   = null;
let lastInboundEtag  = null;
let loadingOffers    = false;
let loadingInbound   = false;

/* ═══════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════ */
let _pVal = 0, _pTimer = null;
function progressStart() {
  const b = document.getElementById('progressBar');
  _pVal = 0.1;
  b.style.transform = 'scaleX(0.1)';
  b.classList.add('active');
  _pTimer = setInterval(() => {
    _pVal = Math.min(_pVal + (1 - _pVal) * 0.08, 0.92);
    b.style.transform = 'scaleX(' + _pVal + ')';
  }, 200);
}
function progressDone() {
  clearInterval(_pTimer);
  const b = document.getElementById('progressBar');
  b.style.transform = 'scaleX(1)';
  setTimeout(() => {
    b.classList.remove('active');
    b.style.transform = 'scaleX(0)';
  }, 350);
}

/* ═══════════════════════════════════════
   API
═══════════════════════════════════════ */
async function callApi(body, signal) {
  const opts = {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  };
  if (signal) opts.signal = signal;
  const res = await fetch(API_URL, opts);
  return res.json();
}

/* ═══════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════ */
async function loadOffers(silent) {
  if (loadingOffers) return;
  loadingOffers = true;
  if (!silent) progressStart();
  try {
    const result = await callApi({ action: 'getOffers' });
    if (result && result.success) {
      // Only update if etag changed (fast check)
      const etag = result.etag || JSON.stringify(result.rows).slice(0,100);
      if (etag !== lastOffersEtag) {
        lastOffersEtag = etag;
        const h = result.headers || [];
        offersData = (result.rows || []).map(r => {
          const o = {};
          h.forEach((k, i) => { o[k] = r[i] ?? ''; });
          return o;
        });
        renderOffers();
        updateStats();
        if (silent) showStaleNotice();
      }
    }
  } catch(e) {
    if (!silent) toast('Failed to load offers', 'error');
  } finally {
    loadingOffers = false;
    if (!silent) progressDone();
    updateLastUpdated();
  }
}

async function loadInbound(silent) {
  if (loadingInbound) return;
  loadingInbound = true;
  if (!silent) {
    document.getElementById('inboundBody').innerHTML =
      '<div class="state-center" style="grid-column:unset"><span class="spinner spinner-md"></span><p>Loading…</p></div>';
  }
  try {
    const result = await callApi({ action: 'getInbound' });
    if (result && result.success) {
      const etag = result.etag || JSON.stringify(result.rows).slice(0,100);
      if (etag !== lastInboundEtag || !silent) {
        lastInboundEtag = etag;
        const h = result.headers || [];
        inboundData = (result.rows || []).map(r => {
          const o = {};
          h.forEach((k, i) => { o[k] = r[i] ?? ''; });
          return o;
        });
        renderInboundTable();
        document.getElementById('inboundCount').textContent = inboundData.length;
      }
    }
  } catch(e) {
    if (!silent) toast('Failed to load inbound products', 'error');
    document.getElementById('inboundBody').innerHTML =
      '<div class="state-center" style="grid-column:unset"><p style="color:var(--red)">Failed to load — check API</p></div>';
  } finally {
    loadingInbound = false;
  }
}

async function refreshAll() {
  const icon = document.getElementById('refreshIcon');
  icon.style.animation = 'spin .7s linear infinite';
  await Promise.all([loadOffers(false), loadInbound(true)]);
  icon.style.animation = '';
}

/* ═══════════════════════════════════════
   POLLING (multi-user sync)
═══════════════════════════════════════ */
function startPolling() {
  stopPolling();
  pollTimer = setInterval(() => { loadOffers(true); }, POLL_INTERVAL_MS);
}
function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopPolling();
  else { startPolling(); loadOffers(true); }
});

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
function updateStats() {
  const total = offersData.length;
  const suppliers = new Set(offersData.map(r => r['Supplier Name'] || r['Supplier'] || '').filter(Boolean)).size;
  setChip('statTotal',     '⬡', total + ' Offer' + (total !== 1 ? 's' : ''));
  setChip('statSuppliers', '⬡', suppliers + ' Supplier' + (suppliers !== 1 ? 's' : ''));
}
function setChip(id, _icon, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + esc(text) + '</span>';
}

function updateLastUpdated() {
  const el = document.getElementById('lastUpdatedBadge');
  if (!el) return;
  el.textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  el.style.display = 'inline';
}

let _staleTimeout = null;
function showStaleNotice() {
  // Show a subtle refresh pulse somewhere if silent update found new data
  clearTimeout(_staleTimeout);
  toast('Data refreshed by another user', 'info', 2000);
}

/* ═══════════════════════════════════════
   OFFERS GRID
═══════════════════════════════════════ */
function renderOffers() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const grid = document.getElementById('cardsGrid');
  const data = offersData.filter(r => {
    if (!q) return true;
    const ean      = String(r['EAN'] || r['Ean'] || '').toLowerCase();
    const name     = String(r['Product Name'] || r['Name'] || '').toLowerCase();
    const supplier = String(r['Supplier Name'] || r['Supplier'] || '').toLowerCase();
    return ean.includes(q) || name.includes(q) || supplier.includes(q);
  });

  if (!data.length && !offersData.length) {
    grid.innerHTML = '<div class="state-center"><span class="spinner spinner-sm"></span><p>Loading offers…</p></div>';
    return;
  }
  if (!data.length) {
    grid.innerHTML = '<div class="state-center"><p>No offers found</p><span>Try a different search term</span></div>';
    return;
  }

  grid.innerHTML = data.map(row => offerCardHTML(row)).join('');
  updateStats();
}

function offerCardHTML(row) {
  const id       = esc(String(row['ID'] || ''));
  const ean      = esc(String(row['EAN'] || row['Ean'] || '—'));
  const name     = esc(String(row['Product Name'] || row['Name'] || '—'));
  const supplier = esc(String(row['Supplier Name'] || row['Supplier'] || ''));
  const cost     = row['Cost'] || row['cost'] || '';
  const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';

  return `<div class="offer-card" onclick="openDrawer('${id}','offer')">
    <div class="oc-header">
      <div>
        <div class="oc-ean">${ean}</div>
        <div class="oc-name">${name}</div>
        ${supplier ? `<div class="oc-supplier">${supplier}</div>` : ''}
      </div>
      <div class="oc-cost">
        <div class="oc-cost-val">${esc(costFmt)}</div>
        <div class="oc-cost-label">Cost</div>
      </div>
    </div>
    <div class="oc-footer">
      <span class="oc-badge oc-badge-offer">✓ Offer</span>
      <span class="oc-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════
   DRAWER
═══════════════════════════════════════ */
function openDrawer(id, src) {
  const data = src === 'offer' ? offersData : inboundData;
  const row  = data.find(r => String(r['ID']) === String(id));
  if (!row) return;
  drawerId  = id;
  drawerSrc = src;
  renderDrawer(row, src);
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('detailDrawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('detailDrawer').classList.remove('open');
  drawerId = null;
}

function renderDrawer(row, src) {
  const ean      = String(row['EAN'] || row['Ean'] || '—');
  const name     = String(row['Product Name'] || row['Name'] || '—');
  const supplier = String(row['Supplier Name'] || row['Supplier'] || '');
  const cost     = row['Cost'] || row['cost'] || '';
  const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';
  const id       = String(row['ID'] || '');

  // KPIs
  const rrp      = row['RRP'] || row['rrp'] || '';
  const margin   = row['Margin'] || row['margin'] || '';
  const roi      = row['ROI'] || row['roi'] || '';

  document.getElementById('drawerHero').innerHTML = `
    <div class="drawer-hero">
      <button class="drawer-hero-close" onclick="closeDrawer()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="dh-badge">${src === 'offer' ? '✓ Offer' : '↓ Inbound'}</div>
      ${supplier ? `<div class="dh-supplier">${esc(supplier)}</div>` : ''}
      <div class="dh-name">${esc(name)}</div>
      <div class="dh-ean">EAN: ${esc(ean)}</div>
      <div class="dh-kpis">
        ${kpi('Cost', costFmt)}
        ${kpi('RRP', rrp ? '£' + parseFloat(rrp).toFixed(2) : '—')}
        ${kpi('Margin', margin ? margin + (String(margin).includes('%') ? '' : '%') : '—')}
      </div>
    </div>`;

  // Build body from all row keys
  const skipKeys = new Set(['ID', 'EAN', 'Ean', 'Product Name', 'Name', 'Supplier Name', 'Supplier', 'Cost', 'cost', 'RRP', 'rrp', 'Margin', 'margin', 'ROI', 'roi']);
  const extraKeys = Object.keys(row).filter(k => !skipKeys.has(k) && row[k] !== '');

  let body = `
    <div class="sec"><div class="sec-label">Product Info</div>
      <div class="info-grid">
        <div class="info-cell"><label>EAN</label><div class="val mono">${esc(ean)}</div></div>
        <div class="info-cell"><label>Cost</label><div class="val big">${esc(costFmt)}</div></div>
        <div class="info-cell"><label>Product Name</label><div class="val">${esc(name)}</div></div>
        <div class="info-cell"><label>Supplier</label><div class="val">${esc(supplier || '—')}</div></div>
        ${rrp ? `<div class="info-cell"><label>RRP</label><div class="val">£${parseFloat(rrp).toFixed(2)}</div></div>` : ''}
        ${margin ? `<div class="info-cell"><label>Margin</label><div class="val green">${esc(String(margin))}${String(margin).includes('%') ? '' : '%'}</div></div>` : ''}
        ${roi ? `<div class="info-cell"><label>ROI</label><div class="val">${esc(String(roi))}</div></div>` : ''}
      </div>
    </div>`;

  if (extraKeys.length) {
    body += `<div class="sec"><div class="sec-label">Additional Details</div><div class="info-grid">`;
    extraKeys.forEach(k => {
      const v = String(row[k]);
      body += `<div class="info-cell"><label>${esc(k)}</label><div class="val ${!v ? 'empty' : ''}">${esc(v || '—')}</div></div>`;
    });
    body += `</div></div>`;
  }

  document.getElementById('drawerBody').innerHTML = body;

  const isMarked = markedIds.has(id);
  document.getElementById('drawerFooter').innerHTML = src === 'offer'
    ? `<button class="btn btn-danger btn-sm" onclick="confirmDeleteOffer('${esc(id)}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M9 6V4h6v2"/></svg>
        Remove from Offers</button>
       <div style="margin-left:auto;font-size:11px;color:var(--text4)">ID: ${esc(id)}</div>`
    : `<button class="btn btn-secondary btn-sm" onclick="closeDrawer()">Close</button>
       <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="toggleMarkFromDrawer('${esc(id)}')">
        ${isMarked ? '✓ Marked for Offers' : '+ Mark for Offers'}
       </button>`;
}

function kpi(label, val) {
  return `<div class="dh-kpi"><div class="dh-kpi-label">${label}</div><div class="dh-kpi-val">${esc(String(val))}</div></div>`;
}

/* ═══════════════════════════════════════
   INBOUND MODAL
═══════════════════════════════════════ */
function openInboundModal() {
  markedIds.clear();
  document.getElementById('inboundOverlay').classList.add('open');
  document.getElementById('inboundSearch').value = '';
  loadInbound(false);
}

function closeInboundModal(e) {
  if (e && e.target !== document.getElementById('inboundOverlay')) return;
  document.getElementById('inboundOverlay').classList.remove('open');
  markedIds.clear();
  updateMarkedCount();
}

function renderInboundTable() {
  const q = (document.getElementById('inboundSearch').value || '').toLowerCase().trim();
  const data = inboundData.filter(r => {
    if (!q) return true;
    const ean      = String(r['EAN'] || r['Ean'] || '').toLowerCase();
    const name     = String(r['Product Name'] || r['Name'] || '').toLowerCase();
    const supplier = String(r['Supplier Name'] || r['Supplier'] || '').toLowerCase();
    return ean.includes(q) || name.includes(q) || supplier.includes(q);
  });

  document.getElementById('inboundCount').textContent = inboundData.length;

  if (!data.length) {
    document.getElementById('inboundBody').innerHTML =
      '<div class="state-center" style="grid-column:unset;padding:40px 20px"><p>No products found</p></div>';
    return;
  }

  let html = `<table class="ib-table">
    <thead><tr>
      <th>EAN</th>
      <th>Product Name</th>
      <th>Supplier</th>
      <th style="text-align:right">Cost</th>
      <th></th>
    </tr></thead>
    <tbody>`;

  data.forEach(row => {
    const id       = esc(String(row['ID'] || ''));
    const ean      = esc(String(row['EAN'] || row['Ean'] || '—'));
    const name     = esc(String(row['Product Name'] || row['Name'] || '—'));
    const supplier = esc(String(row['Supplier Name'] || row['Supplier'] || '—'));
    const cost     = row['Cost'] || row['cost'] || '';
    const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';
    const isMarked = markedIds.has(String(row['ID'] || ''));

    html += `<tr class="${isMarked ? 'marked' : ''}" onclick="openIbDetail('${id}')">
      <td><span style="font-family:monospace;font-size:11px;color:var(--text3)">${ean}</span></td>
      <td style="font-weight:600;max-width:240px;overflow:hidden;text-overflow:ellipsis">${name}</td>
      <td style="color:var(--text3)">${supplier}</td>
      <td style="text-align:right;font-weight:700">${esc(costFmt)}</td>
      <td onclick="event.stopPropagation()">
        <button class="ib-mark-btn ${isMarked ? 'marked' : ''}" onclick="toggleMark('${id}',event)">
          ${isMarked
            ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked'
            : '+ Mark'}
        </button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('inboundBody').innerHTML = html;
  updateMarkedCount();
}

function toggleMark(id, e) {
  if (e) e.stopPropagation();
  if (markedIds.has(id)) markedIds.delete(id);
  else markedIds.add(id);
  renderInboundTable();
  updateMarkedCount();
}

function toggleMarkFromDrawer(id) {
  if (markedIds.has(id)) markedIds.delete(id);
  else markedIds.add(id);
  const data = drawerSrc === 'offer' ? offersData : inboundData;
  const row  = data.find(r => String(r['ID']) === String(id));
  if (row) renderDrawer(row, drawerSrc);
  updateMarkedCount();
}

function updateMarkedCount() {
  const el = document.getElementById('markedCount');
  const btn = document.getElementById('moveToOffersBtn');
  if (markedIds.size > 0) {
    el.textContent = markedIds.size + ' marked';
    el.style.display = 'inline';
    btn.style.display = 'inline-flex';
  } else {
    el.style.display = 'none';
    btn.style.display = 'none';
  }
}

/* ═══════════════════════════════════════
   INBOUND DETAIL PANEL
═══════════════════════════════════════ */
function openIbDetail(id) {
  const row = inboundData.find(r => String(r['ID']) === String(id));
  if (!row) return;
  ibDetailId = id;
  renderIbDetail(row);
  document.getElementById('ibDetail').classList.add('open');
}

function closeIbDetail(e) {
  if (e && e.target !== document.getElementById('ibDetail')) return;
  document.getElementById('ibDetail').classList.remove('open');
  ibDetailId = null;
}

function renderIbDetail(row) {
  const ean      = String(row['EAN'] || row['Ean'] || '—');
  const name     = String(row['Product Name'] || row['Name'] || '—');
  const supplier = String(row['Supplier Name'] || row['Supplier'] || '');
  const cost     = row['Cost'] || row['cost'] || '';
  const costFmt  = cost ? '£' + parseFloat(cost).toFixed(2) : '—';
  const id       = String(row['ID'] || '');
  const rrp      = row['RRP'] || row['rrp'] || '';
  const margin   = row['Margin'] || row['margin'] || '';
  const roi      = row['ROI'] || row['roi'] || '';

  document.getElementById('ibPanelHero').innerHTML = `
    <div class="drawer-hero">
      <button class="drawer-hero-close" onclick="closeIbDetail()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="dh-badge" style="background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.3);color:#fbbf24">↓ Inbound</div>
      ${supplier ? `<div class="dh-supplier">${esc(supplier)}</div>` : ''}
      <div class="dh-name">${esc(name)}</div>
      <div class="dh-ean">EAN: ${esc(ean)}</div>
      <div class="dh-kpis">
        ${kpi('Cost', costFmt)}
        ${kpi('RRP', rrp ? '£' + parseFloat(rrp).toFixed(2) : '—')}
        ${kpi('Margin', margin ? margin + (String(margin).includes('%') ? '' : '%') : '—')}
      </div>
    </div>`;

  const skipKeys = new Set(['ID', 'EAN', 'Ean', 'Product Name', 'Name', 'Supplier Name', 'Supplier', 'Cost', 'cost', 'RRP', 'rrp', 'Margin', 'margin', 'ROI', 'roi']);
  const extraKeys = Object.keys(row).filter(k => !skipKeys.has(k) && row[k] !== '');

  let body = `
    <div class="sec"><div class="sec-label">Product Info</div>
      <div class="info-grid">
        <div class="info-cell"><label>EAN</label><div class="val mono">${esc(ean)}</div></div>
        <div class="info-cell"><label>Cost</label><div class="val big">${esc(costFmt)}</div></div>
        <div class="info-cell"><label>Product Name</label><div class="val">${esc(name)}</div></div>
        <div class="info-cell"><label>Supplier</label><div class="val">${esc(supplier || '—')}</div></div>
        ${rrp ? `<div class="info-cell"><label>RRP</label><div class="val">£${parseFloat(rrp).toFixed(2)}</div></div>` : ''}
        ${margin ? `<div class="info-cell"><label>Margin</label><div class="val green">${esc(String(margin))}${String(margin).includes('%') ? '' : '%'}</div></div>` : ''}
        ${roi ? `<div class="info-cell"><label>ROI</label><div class="val">${esc(String(roi))}</div></div>` : ''}
      </div>
    </div>`;

  if (extraKeys.length) {
    body += `<div class="sec"><div class="sec-label">Additional Details</div><div class="info-grid">`;
    extraKeys.forEach(k => {
      const v = String(row[k]);
      body += `<div class="info-cell"><label>${esc(k)}</label><div class="val ${!v ? 'empty' : ''}">${esc(v || '—')}</div></div>`;
    });
    body += `</div></div>`;
  }

  document.getElementById('ibPanelBody').innerHTML = body;

  const isMarked = markedIds.has(id);
  document.getElementById('ibPanelFooter').innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="closeIbDetail()">Close</button>
    <button class="btn ${isMarked ? 'btn-primary' : 'btn-secondary'} btn-sm" style="margin-left:auto" onclick="toggleMarkFromIbPanel('${esc(id)}')">
      ${isMarked
        ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marked for Offers'
        : '+ Mark for Offers'}
    </button>`;
}

function toggleMarkFromIbPanel(id) {
  if (markedIds.has(id)) markedIds.delete(id);
  else markedIds.add(id);
  const row = inboundData.find(r => String(r['ID']) === String(id));
  if (row) renderIbDetail(row);
  renderInboundTable();
  updateMarkedCount();
}

/* ═══════════════════════════════════════
   MOVE TO OFFERS
═══════════════════════════════════════ */
async function moveMarkedToOffers() {
  if (!markedIds.size) return;
  const ids = Array.from(markedIds);
  const btn = document.getElementById('moveToOffersBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-sm" style="border-top-color:#fff"></span> Moving…';
  progressStart();
  try {
    const result = await callApi({ action: 'moveToOffers', ids });
    if (result && result.success) {
      // Optimistic: remove from inbound, add to offers
      const moved = inboundData.filter(r => ids.includes(String(r['ID'])));
      inboundData  = inboundData.filter(r => !ids.includes(String(r['ID'])));
      moved.forEach(r => { offersData.push(r); });
      markedIds.clear();
      renderInboundTable();
      renderOffers();
      updateStats();
      lastInboundEtag = null;
      lastOffersEtag  = null;
      document.getElementById('inboundCount').textContent = inboundData.length;
      toast(ids.length + ' product' + (ids.length > 1 ? 's' : '') + ' moved to Offers ✓', 'success');
    } else {
      toast(result?.message || 'Failed to move products', 'error');
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Move to Offers';
    progressDone();
    updateMarkedCount();
  }
}

/* ═══════════════════════════════════════
   ARCHIVE ALL (delete remaining inbound)
═══════════════════════════════════════ */
function confirmArchive() {
  const remaining = inboundData.length - markedIds.size;
  if (!inboundData.length) { toast('No products to archive', 'info', 2500); return; }
  openConfirm(
    'Archive All Remaining?',
    `This will permanently delete ${remaining} remaining inbound product${remaining !== 1 ? 's' : ''} that are not marked for Offers. This cannot be undone.`,
    doArchive,
    'Archive ' + remaining
  );
}

async function doArchive() {
  // Archive = delete all inbound that are NOT marked
  const idsToDelete = inboundData.filter(r => !markedIds.has(String(r['ID']))).map(r => String(r['ID']));
  if (!idsToDelete.length) { toast('Nothing to archive', 'info', 2000); return; }
  progressStart();
  closeConfirm();
  try {
    const result = await callApi({ action: 'archiveInbound', ids: idsToDelete });
    if (result && result.success) {
      inboundData = inboundData.filter(r => markedIds.has(String(r['ID'])));
      renderInboundTable();
      document.getElementById('inboundCount').textContent = inboundData.length;
      lastInboundEtag = null;
      toast(idsToDelete.length + ' products archived', 'success');
    } else {
      toast(result?.message || 'Archive failed', 'error');
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    progressDone();
  }
}

/* ═══════════════════════════════════════
   DELETE OFFER
═══════════════════════════════════════ */
function confirmDeleteOffer(id) {
  openConfirm(
    'Remove from Offers?',
    'This will permanently delete this product from the Offers sheet.',
    () => doDeleteOffer(id),
    'Delete'
  );
}

async function doDeleteOffer(id) {
  closeConfirm();
  closeDrawer();
  progressStart();
  try {
    const result = await callApi({ action: 'deleteOffer', id });
    if (result && result.success) {
      offersData = offersData.filter(r => String(r['ID']) !== String(id));
      renderOffers();
      updateStats();
      lastOffersEtag = null;
      toast('Offer removed', 'success');
    } else {
      toast('Failed to delete', 'error');
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    progressDone();
  }
}

/* ═══════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════ */
function openConfirm(title, msg, fn, confirmLabel) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent   = msg;
  document.getElementById('confirmOkBtn').textContent = confirmLabel || 'Confirm';
  document.getElementById('confirmOkBtn').className   = 'btn btn-danger btn-sm';
  confirmFn = fn;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  confirmFn = null;
}
function executeConfirmAction() {
  if (confirmFn) confirmFn();
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function toast(msg, type, duration) {
  const c = document.getElementById('toastWrap');
  if ((type === 'success' || type === 'error')) {
    c.querySelectorAll('.toast.info').forEach(t => t.remove());
  }
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<span class="spinner spinner-sm" style="border-top-color:#93c5fd"></span>'
  };
  t.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(t);
  setTimeout(() => t.remove(), duration || (type === 'info' ? 10000 : 3000));
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirmOverlay').classList.contains('open')) { closeConfirm(); return; }
    if (document.getElementById('ibDetail').classList.contains('open')) { closeIbDetail(); return; }
    if (document.getElementById('detailDrawer').classList.contains('open')) { closeDrawer(); return; }
    if (document.getElementById('inboundOverlay').classList.contains('open')) { closeInboundModal(); return; }
  }
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  loadOffers(false);
  startPolling();
});
</script>
