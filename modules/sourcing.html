
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  line-height: 1.5;
  height: 100vh;
  overflow-x: hidden;
}

.content-wrap { overflow-x: hidden; }

.page-wrapper {
  padding: 5px 10px 15px 10px;
  max-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
}
.stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: 100px;
  font-size: 12.5px; font-weight: 600; border: 1px solid transparent;
  white-space: nowrap; cursor: pointer; transition: all .15s;
}
.stat-chip:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.stat-chip.active-filter { box-shadow: 0 0 0 3px rgba(0,0,0,.15); }
.stat-chip.orange { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
.stat-chip.blue   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.stat-chip.green  { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
.stat-chip.red    { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
.stat-chip.gray   { background: #f8fafc; color: #475569; border-color: #e2e8f0; }
.stat-chip svg    { width: 13px; height: 13px; flex-shrink: 0; }

/* ── TOOLBAR ── */
.toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 15px; height: 15px; pointer-events: none; }
.search-input {
  width: 100%; padding: 8px 10px 8px 33px; border: 1.5px solid #e2e8f0; border-radius: 9px;
  font-size: 13px; font-family: inherit; background: #fff; color: #0f172a; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: #2563eb; }

/* ── FILTER BAR ── */
.filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; min-height: 0; }
.filter-toggle-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px; border: 1.5px solid #e2e8f0; border-radius: 9px;
  background: #fff; font-size: 12.5px; font-weight: 600; font-family: inherit; color: #64748b; cursor: pointer; transition: all .15s;
}
.filter-toggle-btn:hover { border-color: #2563eb; color: #2563eb; }
.filter-toggle-btn.active { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
.filter-toggle-btn svg { width: 13px; height: 13px; }
.filter-dot { width: 6px; height: 6px; border-radius: 50%; background: #2563eb; flex-shrink: 0; }
.filter-pills { display: none; align-items: center; gap: 6px; flex-wrap: wrap; }
.filter-pills.open { display: flex; }
.filter-select {
  padding: 6px 9px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 12px; font-family: inherit; color: #374151; background: #fff;
  outline: none; cursor: pointer; transition: border-color .15s; max-width: 140px; appearance: auto;
}
.filter-select:focus { border-color: #2563eb; }
.filter-select.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; font-weight: 600; }
.filter-clear-btn {
  display: none; align-items: center; gap: 4px; padding: 6px 11px; border: none; border-radius: 8px;
  background: #fee2e2; color: #dc2626; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s;
}
.filter-clear-btn.visible { display: inline-flex; }
.filter-clear-btn:hover { background: #fecaca; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 9px;
  font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s, transform .1s; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: #2563eb; color: #fff; box-shadow: 0 1px 4px rgba(37,99,235,.25); }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: #f1f5f9; color: #475569; border: none; }
.btn-ghost:hover { background: #e2e8f0; }
.btn-outline { background: #fff; color: #374151; border: 1.5px solid #e2e8f0; }
.btn-outline:hover { border-color: #94a3b8; }
.btn-success { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }
.btn-success:hover { background: #dcfce7; }
.btn-danger { background: #fff1f2; color: #be123c; border: 1.5px solid #fecdd3; }
.btn-danger:hover { background: #ffe4e6; }
.btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }
.btn-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 7px; border: 1.5px solid #e2e8f0;
  background: #fff; color: #64748b; cursor: pointer; transition: all .15s; flex-shrink: 0;
}
.btn-icon:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
.btn-icon.danger:hover { border-color: #ef4444; color: #ef4444; background: #fff1f2; }
.btn-icon svg { width: 13px; height: 13px; }

/* ── TABLE ── */
.table-card {
  background: #fff; border-radius: 14px; border: 1px solid #e2e8f0;
  overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; flex-direction: column;
  height: calc(100vh - 220px);
  min-height: 300px;
}
.table-scroll-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead tr { background: #f8fafc; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 2; }
th {
  padding: 11px 10px; text-align: left; font-size: 11px; font-weight: 700; color: #64748b;
  text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; overflow: visible;
}
tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; cursor: pointer; }
tbody tr:hover { background: #f8fafc; }
tbody tr:last-child { border-bottom: none; }
td { padding: 11px 10px; font-size: 13px; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.muted { color: #94a3b8; font-size: 12.5px; }
td.mtd { font-size: 12.5px; color: #1e293b; }
td.product-cell { font-weight: 600; max-width: 0; }

col.col-date      { width: 90px; }
col.col-product   { width: auto; }
col.col-supplier  { width: 130px; }
col.col-amtroi    { width: 90px; }
col.col-roi       { width: 72px; }
col.col-approvals { width: 90px; }
col.col-purchase  { width: 88px; }
col.col-agent     { width: 110px; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 100px; font-size: 11.5px; font-weight: 600; }
.badge-green  { background: #dcfce7; color: #15803d; }
.badge-red    { background: #fee2e2; color: #dc2626; }
.badge-gray   { background: #f1f5f9; color: #64748b; }
.badge-blue   { background: #dbeafe; color: #1d4ed8; }
.badge-orange { background: #fff7ed; color: #c2410c; }
.badge-purple { background: #f3e8ff; color: #7c3aed; }

.approval-count-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 100px;
  font-size: 12px; font-weight: 700;
}
.approval-count-pill.yes-pill { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
.approval-count-pill.no-pill  { background: #fee2e2; border: 1px solid #fecaca; color: #dc2626; }
.approval-count-pill svg { width: 11px; height: 11px; }

/* ── PAGINATION ── */
.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-top: 1px solid #f1f5f9; flex-wrap: wrap; gap: 8px;
  flex-shrink: 0; background: #fff;
}
.page-info { font-size: 12.5px; color: #64748b; }
.page-btns { display: flex; gap: 5px; }
.page-btn {
  padding: 5px 12px; border: 1.5px solid #e2e8f0; border-radius: 7px;
  background: #fff; font-size: 12.5px; font-weight: 500; font-family: inherit;
  color: #374151; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px;
}
.page-btn:hover:not(:disabled) { border-color: #2563eb; color: #2563eb; }
.page-btn:disabled { opacity: .4; cursor: default; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.3);
  z-index: 900; opacity: 0; pointer-events: none;
  transition: opacity .25s; backdrop-filter: blur(2px);
}
.drawer-overlay.visible { opacity: 1; pointer-events: all; }

/* ── DRAWER ── */
.drawer {
  position: fixed; top: 0; right: 0; width: 600px; max-width: 97vw;
  transform: translateX(100%); height: 100%; background: #fff;
  box-shadow: -8px 0 40px rgba(0,0,0,.12); z-index: 1000;
  display: flex; flex-direction: column;
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.drawer.open { transform: translateX(0); }
.drawer-header { flex-shrink: 0; }

.drawer-hero {
  padding: 18px 22px 16px;
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  position: relative; overflow: hidden;
}
.drawer-hero::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,.04);
}
.drawer-hero::after {
  content: ''; position: absolute; bottom: -20px; left: 40px;
  width: 80px; height: 80px; border-radius: 50%; background: rgba(37,99,235,.15);
}
.drawer-hero-close {
  position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border: none; border-radius: 7px;
  background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.65); transition: background .15s; z-index: 1;
}
.drawer-hero-close:hover { background: rgba(255,255,255,.2); color: #fff; }

.drawer-status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 11px; border-radius: 100px; margin-bottom: 8px;
  font-size: 11.5px; font-weight: 600; letter-spacing: .2px; position: relative; z-index: 1;
}
.drawer-status-badge.purchased { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }
.drawer-status-badge.not-purchased { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.55); }
.drawer-status-badge svg { width: 11px; height: 11px; }

.drawer-product-name {
  font-size: 17px; font-weight: 700; color: #fff;
  margin-bottom: 3px; padding-right: 40px; line-height: 1.3; position: relative; z-index: 1;
}
.drawer-product-meta { font-size: 12px; color: rgba(255,255,255,.4); margin-bottom: 14px; position: relative; z-index: 1; }

/* KPI row */
.drawer-kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; position: relative; z-index: 1; }
.drawer-kpi {
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px; padding: 9px 11px; transition: background .15s;
}
.drawer-kpi:hover { background: rgba(255,255,255,.11); }
.drawer-kpi-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.drawer-kpi-icon { display: flex; align-items: center; flex-shrink: 0; }
.drawer-kpi-icon svg { width: 14px; height: 14px; }
.drawer-kpi-label {
  font-size: 9.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .6px; color: rgba(255,255,255,.45); line-height: 1;
}
.drawer-kpi-value { font-size: 17px; font-weight: 700; color: #fff; line-height: 1; }
.drawer-kpi-value.positive { color: #4ade80; }
.drawer-kpi-value.negative { color: #f87171; }

/* Tabs */
.drawer-tabs {
  display: flex; border-bottom: 1px solid #e2e8f0; background: #fff;
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.drawer-tabs::-webkit-scrollbar { display: none; }
.drawer-tab {
  padding: 11px 15px; font-size: 12.5px; font-weight: 600; font-family: inherit;
  color: #64748b; border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap;
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
}
.drawer-tab svg { width: 13px; height: 13px; }
.drawer-tab:hover { color: #334155; }
.drawer-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #fafcff; }

.drawer-body { flex: 1; overflow-y: auto; padding: 18px 22px; }
.drawer-footer {
  padding: 8px 22px; border-top: 1px solid #e2e8f0;
  display: flex; gap: 8px; flex-shrink: 0; background: #fafafa;
}

/* ── SECTIONS ── */
.section { margin-bottom: 20px; }
.section-label {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: #94a3b8;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }

/* ── INFO CARDS ── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.info-card {
  background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 10px; padding: 10px 13px;
  transition: border-color .15s;
}
.info-card.full-width { grid-column: 1 / -1; }
.info-card:focus-within { border-color: #bfdbfe; background: #fafcff; }
.info-card label {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px;
}
.info-card label svg { width: 10px; height: 10px; flex-shrink: 0; }
.info-card .val { font-size: 13.5px; color: #1e293b; font-weight: 500; }
.info-card .val.roi-positive { color: #15803d; font-weight: 700; }
.info-card .val.roi-negative { color: #dc2626; font-weight: 700; }

.edit-input, .edit-select {
  width: 100%; padding: 5px 8px; border: 1.5px solid #bfdbfe; border-radius: 6px;
  font-size: 13px; font-family: inherit; color: #0f172a; background: #fff; outline: none; transition: border-color .15s;
}
.edit-input:focus, .edit-select:focus { border-color: #2563eb; }

.calc-badge {
  display: inline-flex; align-items: center; gap: 3px; font-size: 9.5px; font-weight: 700; color: #94a3b8;
  background: #f1f5f9; border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; text-transform: uppercase;
}

/* ── ASIN MULTI-INPUT ── */
.asin-list { display: flex; flex-direction: column; gap: 6px; }
.asin-row { display: flex; align-items: center; gap: 6px; }
.asin-row .edit-input { flex: 1; }
.asin-add-btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
  border: 1.5px dashed #bfdbfe; border-radius: 7px; background: #f8fbff;
  color: #2563eb; font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all .15s; margin-top: 6px; width: 100%; justify-content: center;
}
.asin-add-btn:hover { border-color: #2563eb; background: #eff6ff; }
.asin-add-btn svg { width: 12px; height: 12px; }

/* QTY Purchased sub-field */
.purchased-extra { margin-top: 8px; padding-top: 8px; border-top: 1px solid #e2e8f0; display: none; }
.purchased-extra.show { display: block; }
.purchased-extra label {
  font-size: 10px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px;
  display: flex; align-items: center; gap: 5px;
}

/* ── NOTES ── */
.notes-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.note-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 11px 14px; }
.note-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.note-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: #dbeafe; color: #1d4ed8;
  display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.note-author { font-size: 12.5px; font-weight: 600; color: #334155; }
.note-date { font-size: 11px; color: #94a3b8; margin-left: auto; }
.note-text { font-size: 13px; color: #475569; line-height: 1.55; }

.note-composer {
  background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px;
  overflow: hidden; transition: border-color .15s, box-shadow .15s; margin-top: 14px;
}
.note-composer:focus-within { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
.note-composer-top { padding: 10px 14px 6px; }
.note-composer-who { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.note-composer-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.note-user-select {
  flex: 1; padding: 5px 9px; border: 1.5px solid #e2e8f0; border-radius: 7px;
  font-size: 12.5px; font-family: inherit; color: #0f172a; background: #fff;
  outline: none; cursor: pointer; transition: border-color .15s;
}
.note-user-select:focus { border-color: #2563eb; }
.note-textarea {
  width: 100%; border: none; outline: none; resize: none; background: transparent;
  font-size: 13px; font-family: inherit; color: #0f172a; line-height: 1.55;
  min-height: 56px; max-height: 100px; padding: 0;
}
.note-composer-bottom {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 8px 14px 10px; border-top: 1px solid #f1f5f9; background: #fafafa; gap: 8px;
}
.note-char-hint { font-size: 11px; color: #cbd5e1; margin-right: auto; }

/* ── APPROVALS ── */
.approval-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.approval-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; }
.approval-item.approved-item { background: #f0fdf4; border: 1px solid #bbf7d0; }
.approval-item.rejected-item { background: #fff1f2; border: 1px solid #fecdd3; }
.approval-item .approval-name { font-size: 13px; font-weight: 600; }
.approval-item.approved-item .approval-name { color: #15803d; }
.approval-item.rejected-item .approval-name { color: #be123c; }
.approval-item .approval-date { font-size: 11px; margin-left: auto; }
.approval-item.approved-item .approval-date { color: #86efac; }
.approval-item.rejected-item .approval-date { color: #fda4af; }
.approval-status-tag { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
.approval-status-tag.approved { background: #dcfce7; color: #15803d; }
.approval-status-tag.rejected { background: #fee2e2; color: #dc2626; }

.approval-composer {
  background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px;
  overflow: hidden; transition: border-color .15s; margin-top: 4px;
}
.approval-composer-inner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; flex-wrap: wrap; }
.approval-composer-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.approval-user-select {
  flex: 1; min-width: 120px; padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; font-family: inherit; color: #0f172a; background: #fff;
  outline: none; cursor: pointer; transition: border-color .15s;
}
.approval-user-select:focus { border-color: #2563eb; }
.approval-action-btns { display: flex; gap: 6px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.5);
  display: none; align-items: center; justify-content: center;
  z-index: 2000; padding: 16px; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 16px; width: 640px; max-width: 100%;
  max-height: 88vh; display: flex; flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,.22); animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header {
  padding: 15px 22px 13px; border-bottom: 1px solid #e2e8f0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; background: linear-gradient(to right, #fafbff, #fff); border-radius: 16px 16px 0 0;
}
.modal-header-left { display: flex; align-items: center; gap: 10px; }
.modal-header-icon {
  width: 34px; height: 34px; border-radius: 9px; background: #eff6ff;
  display: flex; align-items: center; justify-content: center; color: #2563eb; flex-shrink: 0;
}

<script>
(function () {

/* ══ STATE ══ */
let allData = [], filtered = [], users = [], suppliers = [];
let currentPage = 1;
const perPage = 25;
let startTime, timerInterval;
let activeTab = 'overview';
let activeStatFilter = null;
let currentDrawerId = null; // track open drawer product

/* ══ INIT ══ */
async function init() {
  await Promise.all([loadData(), loadUsers(), loadSuppliers()]);
}

/* ══ DATA ══ */
async function loadData() {
  try {
    const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getSourcing' }), headers: { 'Content-Type': 'text/plain' } });
    const data = await res.json();
    allData = data.data || [];
    applyFilters();
    updateStats();
  } catch (e) {
    showToast('Failed to load data', 'error');
    document.getElementById('tableBody').innerHTML = '<tr class="loading-row"><td colspan="8" style="color:#dc2626">Failed to load. Check your connection.</td></tr>';
  }
}

async function loadUsers() {
  try {
    const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getUsers' }), headers: { 'Content-Type': 'text/plain' } });
    const data = await res.json();
    users = (data.users || []).map(u => ({ id: u.userId, name: (u.firstName + ' ' + u.lastName).trim() }));
  } catch (e) {}
}

async function loadSuppliers() {
  try {
    const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getSuppliers' }), headers: { 'Content-Type': 'text/plain' } });
    const data = await res.json();
    suppliers = data.suppliers || [];
  } catch (e) {}
}

/* ══ STATS ══ */
function updateStats() {
  const needsApproval = allData.filter(p => !p['Approved'] && !isRejected(p)).length;
  const needsPurchase = allData.filter(p => p['Approved'] && !isRejected(p) && !isBoolYes(p['Purchased'])).length;
  const rejectedCount = allData.filter(p => isRejected(p)).length;

  document.getElementById('statApproval').innerHTML =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>' + needsApproval + ' Need Approval</span>';
  document.getElementById('statPurchase').innerHTML =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>' + needsPurchase + ' To Purchase</span>';
  document.getElementById('statRejected').innerHTML =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span>' + rejectedCount + ' Rejected</span>';
  document.getElementById('statTotal').innerHTML =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>' + allData.length + ' Total</span>';
}

function isRejected(p) {
  const approvals = parseJSON(p['Approvals'], []);
  return approvals.some(a => a.status === 'rejected');
}

function isBoolYes(val) {
  return val === true || val === 'true' || String(val).toLowerCase() === 'yes';
}

/* ══ STAT CHIP FILTER ══ */
function filterByStatus(type) {
  if (activeStatFilter === type) {
    activeStatFilter = null;
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active-filter'));
    applyFilters();
    return;
  }
  activeStatFilter = type;
  document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active-filter'));
  if (type === 'needApproval') document.getElementById('statApproval').classList.add('active-filter');
  if (type === 'toPurchase')   document.getElementById('statPurchase').classList.add('active-filter');
  if (type === 'rejected')     document.getElementById('statRejected').classList.add('active-filter');
  if (type === 'all')          document.getElementById('statTotal').classList.add('active-filter');
  applyFilters();
}

/* ══ SEARCH ══ */
document.getElementById('searchInput').addEventListener('input', function () {
  currentPage = 1;
  applyFilters();
});

/* ══ FILTERS ══ */
function toggleFilters() {
  const pills = document.getElementById('filterPills');
  const btn   = document.getElementById('filterToggleBtn');
  const open  = pills.classList.toggle('open');
  btn.classList.toggle('active', open);
}

function applyFilters() {
  const q         = document.getElementById('searchInput').value.toLowerCase();
  const fPurchased= document.getElementById('fPurchased').value;
  const fApproved = document.getElementById('fApproved').value;
  const fPacking  = document.getElementById('fPacking').value;
  const fSeason   = document.getElementById('fSeasonality').value;
  const fComp     = document.getElementById('fCompetition').value;
  const fStock    = document.getElementById('fSupplierStock').value;

  filtered = allData.filter(p => {
    if (q && !((p['Product Name']||'').toLowerCase().includes(q) || (p['Supplier Name']||'').toLowerCase().includes(q) || (p['Agent']||'').toLowerCase().includes(q))) return false;
    if (fPurchased === 'yes' && !isBoolYes(p['Purchased'])) return false;
    if (fPurchased === 'no'  && (isBoolYes(p['Purchased']) || !p['Approved'])) return false;
    if (fApproved  === 'yes' && !p['Approved'])   return false;
    if (fApproved  === 'no'  &&  p['Approved'])   return false;
    if (fApproved  === 'rejected' && !isRejected(p)) return false;
    if (fPacking  && p['Packing']        !== fPacking) return false;
    if (fSeason && String(p['Seasonality']).trim() !== fSeason) return false;
    if (fComp     && p['Competition']    !== fComp)    return false;
    if (fStock    && p['Supplier Stock'] !== fStock)   return false;
    if (activeStatFilter === 'needApproval' && (p['Approved'] || isRejected(p))) return false;
    if (activeStatFilter === 'toPurchase' && (!p['Approved'] || isRejected(p) || isBoolYes(p['Purchased']))) return false;
    if (activeStatFilter === 'rejected' && !isRejected(p)) return false;
    return true;
  });

  const anyActive = fPurchased || fApproved || fPacking || fSeason || fComp || fStock;
  document.getElementById('filterDot').style.display = (anyActive || activeStatFilter) ? 'inline-block' : 'none';
  document.getElementById('filterClearBtn').classList.toggle('visible', !!(anyActive || activeStatFilter));
  ['fPurchased','fApproved','fPacking','fSeasonality','fCompetition','fSupplierStock'].forEach(id => {
    document.getElementById(id).classList.toggle('active', !!document.getElementById(id).value);
  });

  currentPage = 1;
  renderTable();
}

function clearFilters() {
  ['fPurchased','fApproved','fPacking','fSeasonality','fCompetition','fSupplierStock'].forEach(id => {
    document.getElementById(id).value = '';
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById('filterDot').style.display = 'none';
  document.getElementById('filterClearBtn').classList.remove('visible');
  activeStatFilter = null;
  document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active-filter'));
  applyFilters();
}

/* ══ TABLE ══ */
function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No products found</p></div></td></tr>';
    document.getElementById('pageInfo').textContent = '0 results';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    return;
  }

  const start    = (currentPage - 1) * perPage;
  const pageData = filtered.slice(start, start + perPage);

  tbody.innerHTML = pageData.map(row => {
    const date    = row['Created At'] ? new Date(row['Created At']).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
    const amtROIN = parseFloat(row['Amt. ROI'] || row['Amount ROI']);
    const roiN    = parseFloat(row['ROI']);
    const amtRoi  = !isNaN(amtROIN) ? '<span class="' + (amtROIN >= 0 ? 'roi-positive' : 'roi-negative') + '">£' + amtROIN.toFixed(2) + '</span>' : '<span class="muted">—</span>';
    const roi     = !isNaN(roiN)    ? '<span class="' + (roiN >= 0 ? 'roi-positive' : 'roi-negative') + '">' + (roiN * 100).toFixed(1) + '%</span>' : '<span class="muted">—</span>';

    /* ── Approvals column: count Yes (green pill) and No/Rejected (red pill) ── */
    const approvalsArr  = parseJSON(row['Approvals'], []);
    const approvedCount = approvalsArr.filter(a => a.status !== 'rejected').length;
    const rejectedCount = approvalsArr.filter(a => a.status === 'rejected').length;

    let approvalCell = '';
    if (approvedCount > 0 && rejectedCount === 0) {
      // Only approvals
      approvalCell = '<span class="approval-count-pill yes-pill">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
        + approvedCount + '</span>';
    } else if (rejectedCount > 0 && approvedCount === 0) {
      // Only rejections
      approvalCell = '<span class="approval-count-pill no-pill">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        + rejectedCount + '</span>';
    } else if (approvedCount > 0 && rejectedCount > 0) {
      // Mixed
      approvalCell = '<span class="approval-count-pill yes-pill" style="margin-right:3px">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
        + approvedCount + '</span>'
        + '<span class="approval-count-pill no-pill">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        + rejectedCount + '</span>';
    } else {
      approvalCell = '<span class="muted">—</span>';
    }

    const isPurchased = isBoolYes(row['Purchased']);
    const purchased = isPurchased
      ? '<span class="yn-yes"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Yes</span>'
      : '<span class="yn-no"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>No</span>';

    return '<tr onclick="openDrawer(\'' + escAttr(row['Opportunity ID']) + '\')">'
      + '<td class="mtd">' + date + '</td>'
      + '<td class="product-cell" title="' + escAttr(row['Product Name'] || '') + '">' + escHtml(row['Product Name'] || '—') + '</td>'
      + '<td>' + escHtml(row['Supplier Name'] || '—') + '</td>'
      + '<td>' + amtRoi + '</td>'
      + '<td>' + roi + '</td>'
      + '<td>' + approvalCell + '</td>'
      + '<td>' + purchased + '</td>'
      + '<td>' + escHtml((row['Agent'] || '—').split(' ')[0]) + '</td>'
      + '</tr>';
  }).join('');

  const total = filtered.length, pages = Math.ceil(total / perPage);
  document.getElementById('pageInfo').textContent = 'Showing ' + (start + 1) + '–' + Math.min(start + perPage, total) + ' of ' + total;
  document.getElementById('btnPrev').disabled = currentPage === 1;
  document.getElementById('btnNext').disabled = currentPage >= pages;
}

function nextPage() { if (currentPage * perPage < filtered.length) { currentPage++; renderTable(); } }
function prevPage() { if (currentPage > 1) { currentPage--; renderTable(); } }

/* ══ DRAWER ══ */
function openDrawer(id) {
  const row = allData.find(p => p['Opportunity ID'] === id);
  if (!row) return;
  currentDrawerId = id;
  activeTab = 'overview';
  renderDrawer(row);
  document.getElementById('detailDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('visible');
}

/* ── Update only the KPI cards in the hero without full re-render ── */
function updateDrawerKPIs(row) {
  const amtROIN    = parseFloat(row['Amt. ROI'] || row['Amount ROI']);
  const afterPackN = parseFloat(row['After Pack']);
  const costN      = parseFloat(row['Total Cost'] || row['Cost']);
  const roiN       = parseFloat(row['ROI']);

  const kpiEl = document.getElementById('drawerKpiRow');
  if (!kpiEl) return;

  kpiEl.innerHTML =
    kpiCard('Amt. ROI',   !isNaN(amtROIN)    ? '£' + amtROIN.toFixed(2)      : '—', !isNaN(amtROIN)    ? (amtROIN >= 0    ? 'positive' : 'negative') : '', 'amtroi')
  + kpiCard('After Pack', !isNaN(afterPackN) ? '£' + afterPackN.toFixed(2)   : '—', !isNaN(afterPackN) ? (afterPackN >= 0 ? 'positive' : 'negative') : '', 'pack')
  + kpiCard('Cost',       !isNaN(costN)      ? '£' + costN.toFixed(2)        : '—', '', 'cost')
  + kpiCard('ROI',        !isNaN(roiN)       ? (roiN * 100).toFixed(1) + '%' : '—', !isNaN(roiN)       ? (roiN >= 0       ? 'positive' : 'negative') : '', 'roi');
}

    + '<div class="drawer-product-meta">' + escHtml(row['Supplier Name'] || '') + (row['Created At'] ? ' · Added ' + new Date(row['Created At']).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '') + '</div>'
    + '<div class="drawer-kpi-row" id="drawerKpiRow">'
    + kpiCard('Amt. ROI',   !isNaN(amtROIN)    ? '£' + amtROIN.toFixed(2)      : '—', !isNaN(amtROIN)    ? (amtROIN >= 0    ? 'positive' : 'negative') : '', 'amtroi')
    + kpiCard('After Pack', !isNaN(afterPackN) ? '£' + afterPackN.toFixed(2)   : '—', !isNaN(afterPackN) ? (afterPackN >= 0 ? 'positive' : 'negative') : '', 'pack')
    + kpiCard('Cost',       !isNaN(costN)      ? '£' + costN.toFixed(2)        : '—', '', 'cost')
    + kpiCard('ROI',        !isNaN(roiN)       ? (roiN * 100).toFixed(1) + '%' : '—', !isNaN(roiN)       ? (roiN >= 0       ? 'positive' : 'negative') : '', 'roi')
    + '</div></div>'
    + '<div class="drawer-tabs">'
    + tabBtn('overview',   id, activeTab, iconGrid(),  'Overview')
    + tabBtn('financials', id, activeTab, iconMoney(), 'Financials')
    + tabBtn('attributes', id, activeTab, iconStar(),  'Attributes')
    + tabBtn('notes',      id, activeTab, iconChat(),  'Notes' + (notes.length ? ' <span class="badge badge-blue" style="font-size:10px;padding:1px 6px;">' + notes.length + '</span>' : ''))
    + tabBtn('approvals',  id, activeTab, iconCheck(), 'Approvals' + (approvedCount > 0 ? ' <span class="badge badge-green" style="font-size:10px;padding:1px 6px;">' + approvedCount + '</span>' : '') + (rejectedCount > 0 ? ' <span class="badge badge-red" style="font-size:10px;padding:1px 6px;">' + rejectedCount + '</span>' : ''))

  /* Body */
  let body = '';

    const qtyPurchased = row['QTY Purchased'] || '';

    body = section('Product Info',
      '<div class="info-grid">'

      + '</div>'
    ) + section('Supplier Details',
      '<div class="info-grid">'
      + editCard(id, 'Supplier Name',       row['Supplier Name'],       'supplier',        'Supplier Name')
      + editCard(id, 'Supplier Code',       row['Code'],                'text',            'Code')
      + editCard(id, 'Supplier Cheapest',   row['Supplier Cheapest'],   'select:Yes,No',   'Supplier Cheapest')
      + editCard(id, 'Supplier Stock',      row['Supplier Stock'],      'select:Low,Medium,High', 'Supplier Stock')
      + editCard(id, 'Primary Fulfillment', row['Primary Fulfillment'], 'select:FBM,FBA',  'Primary Fulfillment')

  if (activeTab === 'financials') {
    body = section('Input Values',

      + editCard(id, 'Cost of Sale',  fmtRaw(row['Cost of Sale']),  'number', 'Cost of Sale')
      + editCard(id, 'Net Profit',    fmtRaw(row['Net Profit']),    'number', 'Net Profit')
      + editCard(id, 'Unit Quantity', row['Unit Quantity'] || '',   'number', 'Unit Quantity')
      + '</div>'
    ) + section('Others',
      '<div class="info-grid">'
      + staticCard('% ROI', row['Percentage ROI'] ? (parseFloat(row['Percentage ROI']) * 100).toFixed(1) + '%' : '—')
      + '</div>'

  if (activeTab === 'attributes') {
    body = section('Product Attributes',
      '<div class="info-grid">'
      + editCard(id, 'Packing',     row['Packing'],     'select:Fast,Good,Medium,Large', 'Packing')
      + editCard(id, 'Seasonality', row['Seasonality'], 'select:Yes,No',                'Seasonality')
      + editCard(id, 'Competition', row['Competition'], 'select:Low,Medium,High',       'Competition')

  if (activeTab === 'notes') {
    const noteItems = notes.length
      ? notes.map(n =>
          '<div class="note-item">'
          + '<div class="note-meta">'
          + '<div class="note-avatar">' + getInitials(n.name) + '</div>'

          + '</div>'
          + '<div class="note-text">' + escHtml(n.text) + '</div>'
          + '</div>'

    body = section('Thread',

      + '<div class="note-composer">'
      + '<div class="note-composer-top">'

/* ── KPI card builder ── */
function kpiCard(label, value, cls, key) {
  const icons = {
    amtroi: '<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>',
    pack:   '<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
    cost:   '<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
    roi:    '<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>'
  };
  return '<div class="drawer-kpi">'
    + '<div class="drawer-kpi-header">'
    + '<div class="drawer-kpi-icon">' + (icons[key] || '') + '</div>'
    + '<div class="drawer-kpi-label">' + label + '</div>'
    + '</div>'
    + '<div class="drawer-kpi-value ' + cls + '">' + value + '</div>'
    + '</div>';
}

/* ── Special info cards ── */
function purchasedCard(id, isPurchased, qtyPurchased) {
  const sel = '<select class="edit-select" id="purchasedSelect_' + escAttr(id) + '" onchange="onPurchasedChange(\'' + escAttr(id) + '\', this.value)">'
    + '<option value="">—</option>'
    + '<option value="Yes"' + (isPurchased ? ' selected' : '') + '>Yes</option>'
    + '<option value="No"' + (!isPurchased ? ' selected' : '') + '>No</option>'
    + '</select>';
  const qtySection = '<div class="purchased-extra" id="purchasedExtra_' + escAttr(id) + '" style="' + (isPurchased ? 'display:block' : 'display:none') + '">'
    + '<label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="10" height="10"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>QTY Purchased</label>'
    + '<input type="number" class="edit-input" id="qtyPurchasedInput_' + escAttr(id) + '" value="' + escAttr(String(qtyPurchased)) + '" placeholder="Enter quantity…" min="0" onblur="saveField(\'' + escAttr(id) + '\', \'QTY Purchased\', this.value)">'
    + '</div>';
  return '<div class="info-card"><label>' + fieldIcon('Purchased') + 'Purchased</label>' + sel + qtySection + '</div>';
}

function asinCard(id, asinValue) {
  const asins = asinValue ? asinValue.split(',').map(a => a.trim()).filter(Boolean) : [''];
  const rows = asins.map((a, i) =>
    '<div class="asin-row" id="asinRow_' + escAttr(id) + '_' + i + '">'
    + '<input type="text" class="edit-input asin-input" data-id="' + escAttr(id) + '" value="' + escAttr(a) + '" placeholder="e.g. B08XYZ123" onblur="saveAsins(\'' + escAttr(id) + '\')">'
    + '<button class="btn-icon danger" onclick="removeAsinRow(\'' + escAttr(id) + '\',' + i + ')" title="Remove ASIN"' + (asins.length <= 1 ? ' style="opacity:.3;pointer-events:none"' : '') + '>'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
    + '</div>'
  ).join('');
  return '<div class="info-card full-width" id="asinCard_' + escAttr(id) + '"><label>' + fieldIcon('ASIN(s)') + 'ASIN(s)</label>'
    + '<div class="asin-list" id="asinList_' + escAttr(id) + '">' + rows + '</div>'
    + '<button class="asin-add-btn" onclick="addAsinRow(\'' + escAttr(id) + '\')">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add ASIN</button>'
    + '</div>';
}

function addAsinRow(id) {
  const list = document.getElementById('asinList_' + id);
  if (!list) return;
  const idx = list.children.length;
  const row = document.createElement('div');
  row.className = 'asin-row';
  row.id = 'asinRow_' + id + '_' + idx;
  row.innerHTML = '<input type="text" class="edit-input asin-input" data-id="' + escAttr(id) + '" value="" placeholder="e.g. B08XYZ123" onblur="saveAsins(\'' + escAttr(id) + '\')">'
    + '<button class="btn-icon danger" onclick="removeAsinRow(\'' + escAttr(id) + '\',' + idx + ')" title="Remove ASIN">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
  list.appendChild(row);
  row.querySelector('input').focus();
  updateAsinRemoveBtns(id);
}

function removeAsinRow(id, idx) {
  const list = document.getElementById('asinList_' + id);
  if (!list || list.children.length <= 1) return;
  const rows = Array.from(list.querySelectorAll('.asin-row'));
  if (rows[idx]) rows[idx].remove();
  updateAsinRemoveBtns(id);
  saveAsins(id);
}

function updateAsinRemoveBtns(id) {
  const list = document.getElementById('asinList_' + id);
  if (!list) return;
  const rows = list.querySelectorAll('.asin-row');
  rows.forEach(r => {
    const btn = r.querySelector('.btn-icon.danger');
    if (btn) {
      btn.style.opacity = rows.length <= 1 ? '.3' : '1';
      btn.style.pointerEvents = rows.length <= 1 ? 'none' : '';
    }
  });
}

function saveAsins(id) {
  const list = document.getElementById('asinList_' + id);
  if (!list) return;
  const inputs = list.querySelectorAll('.asin-input');
  const vals = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
  saveField(id, 'ASIN(s)', vals.join(', '));
}

function onPurchasedChange(id, value) {
  const extra = document.getElementById('purchasedExtra_' + id);
  if (extra) extra.style.display = value === 'Yes' ? 'block' : 'none';
  if (value === 'Yes') {
    const qtyInput = document.getElementById('qtyPurchasedInput_' + id);
    if (qtyInput && !qtyInput.value) qtyInput.focus();
  }
  saveField(id, 'Purchased', value);
  applyYNColors();
}

function applyYNColors() {
  document.querySelectorAll('.edit-select, .form-control').forEach(el => {
    const v = (el.value || '').toLowerCase();
    el.classList.remove('val-yes', 'val-no');
    if (v === 'yes') el.classList.add('val-yes');
    else if (v === 'no') el.classList.add('val-no');
  });
}

/* ── Editable Cards ── */
function editCard(id, label, value, type, sheetKey) {
  const disp = (value === undefined || value === null) ? '' : String(value).trim();
  const isFullWidth = label === 'Product Name';
  let inp = '';

  if (type === 'supplier') {
    const opts = suppliers.map(s => '<option value="' + escAttr(s.name) + '"' + (s.name === value ? ' selected' : '') + '>' + escHtml(s.name) + '</option>').join('');
    inp = '<select class="edit-select" onchange="saveField(\'' + escAttr(id) + '\',\'' + escAttr(sheetKey) + '\',this.value);applyYNColors()"><option value="">—</option>' + opts + '</select>';
  } else if (type === 'user') {
    const opts = users.map(u => '<option value="' + escAttr(u.name) + '"' + (u.name === value ? ' selected' : '') + '>' + escHtml(u.name) + '</option>').join('');
    inp = '<select class="edit-select" onchange="saveField(\'' + escAttr(id) + '\',\'' + escAttr(sheetKey) + '\',this.value)"><option value="">—</option>' + opts + '</select>';
  } else if (type.startsWith('select:')) {
    const options = type.replace('select:', '').split(',');
    const opts = options.map(o => '<option value="' + escAttr(o) + '"' + (o.toLowerCase() === disp.toLowerCase() ? ' selected' : '') + '>' + escHtml(o) + '</option>').join('');
    inp = '<select class="edit-select" onchange="saveField(\'' + escAttr(id) + '\',\'' + escAttr(sheetKey) + '\',this.value);applyYNColors()"><option value="">—</option>' + opts + '</select>';
  } else if (type === 'number') {
    const n = parseFloat(value);
    inp = '<input type="number" class="edit-input" value="' + (isNaN(n) ? '' : n) + '" step="0.01" onblur="saveFieldAndRefresh(\'' + escAttr(id) + '\',\'' + escAttr(sheetKey) + '\',this.value)">';
  } else {
    inp = '<input type="text" class="edit-input" value="' + escAttr(String(disp)) + '" onblur="saveField(\'' + escAttr(id) + '\',\'' + escAttr(sheetKey) + '\',this.value)">';
  }

  return '<div class="info-card' + (isFullWidth ? ' full-width' : '') + '"><label>' + fieldIcon(label) + escHtml(label) + '</label>' + inp + '</div>';
}

function staticCard(label, value, extraClass) {
  return '<div class="info-card"><label>' + fieldIcon(label) + escHtml(label) + '</label><div class="val ' + (extraClass || '') + '">' + escHtml(String(value || '—')) + '</div></div>';
}

/* ── Save field ── */
async function saveField(opportunityId, field, value) {
  const toastId = showToast('Saving…', 'loading', 0);
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateSourcing', opportunityId, field, value }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const idx = allData.findIndex(p => p['Opportunity ID'] === opportunityId);
    if (idx > -1) allData[idx][field] = value;
    removeToast(toastId);
    showToast('Saved', 'success');
    updateStats();
    applyFilters();
    renderTable();
  } catch (e) {
    removeToast(toastId);
    showToast('Failed to save', 'error');
  }
}

/* ── Save financial + refresh KPIs immediately ── */
async function saveFieldAndRefresh(opportunityId, field, value) {
  const toastId = showToast('Saving & recalculating…', 'loading', 0);
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateSourcing', opportunityId, field, value }),
      headers: { 'Content-Type': 'text/plain' }
    });

    // Fetch fresh data to get recalculated values
    const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getSourcing' }), headers: { 'Content-Type': 'text/plain' } });
    const data = await res.json();
    allData = data.data || [];

    const freshRow = allData.find(p => p['Opportunity ID'] === opportunityId);

    // Update KPI cards immediately without losing focus / re-rendering full drawer
    if (freshRow) {
      updateDrawerKPIs(freshRow);
      // Also update local financials tab static card if visible
      if (activeTab === 'financials') {
        renderDrawer(freshRow);
      }
    }

    applyFilters();
    updateStats();
    renderTable();
    removeToast(toastId);
    showToast('Saved & recalculated', 'success');
  } catch (e) {
    removeToast(toastId);
    showToast('Failed to save', 'error');
  }
}

/* ══ APPROVE / REJECT ══ */
async function decideProduct(id, decision) {
  const approvalUserEl = document.getElementById('approvalUser');
  const selectedUser   = approvalUserEl ? approvalUserEl.value : '';
  if (!selectedUser) { showToast('Please select a user', 'error'); return; }

  const row       = allData.find(p => p['Opportunity ID'] === id);
  const approvals = parseJSON(row['Approvals'], []);
  const filtered2 = approvals.filter(a => a.name !== selectedUser);
  filtered2.push({ name: selectedUser, date: new Date().toLocaleDateString('en-GB'), status: decision });

  const isApproved      = filtered2.some(a => a.status !== 'rejected');
  const isFullyRejected = filtered2.every(a => a.status === 'rejected');

  const toastId = showToast('Saving decision…', 'loading', 0);
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'updateSourcing',
        opportunityId: id,
        field: 'Approvals',
        value: JSON.stringify(filtered2),
        approvedBy: filtered2.filter(a => a.status !== 'rejected').map(a => a.name).join(', '),
        approved: isApproved && !isFullyRejected
      }),
      headers: { 'Content-Type': 'text/plain' }
    });
    row['Approvals'] = JSON.stringify(filtered2);
    row['Approved']  = isApproved && !isFullyRejected;
    removeToast(toastId);
    showToast(selectedUser + (decision === 'approved' ? ' approved' : ' rejected'), decision === 'approved' ? 'success' : 'error');
    activeTab = 'approvals';
    renderDrawer(row);
    updateStats(); renderTable();
  } catch (e) {
    removeToast(toastId);
    showToast('Failed to save decision', 'error');
  }
}

/* ══ NOTES ══ */
async function addNote(id) {
  const noteUserEl   = document.getElementById('noteUser');
  const noteInput    = document.getElementById('noteInput');
  const selectedUser = noteUserEl ? noteUserEl.value : '';
  const text         = noteInput ? noteInput.value.trim() : '';

  if (!selectedUser) { showToast('Please select a user', 'error'); return; }
  if (!text)         { showToast('Please write something', 'error'); return; }

  const row   = allData.find(p => p['Opportunity ID'] === id);
  const notes = parseJSON(row['Notes'], []);
  notes.push({ name: selectedUser, text, date: new Date().toLocaleDateString('en-GB') });

  const toastId = showToast('Adding note…', 'loading', 0);
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateSourcing', opportunityId: id, field: 'Notes', value: JSON.stringify(notes) }),
      headers: { 'Content-Type': 'text/plain' }
    });
    row['Notes'] = JSON.stringify(notes);
    removeToast(toastId);
    showToast('Note added', 'success');
    activeTab = 'notes';
    renderDrawer(row);
  } catch (e) {
    removeToast(toastId);
    showToast('Failed to add note', 'error');
  }
}

  if (!list) return;
  const row = document.createElement('div');
  row.className = 'modal-asin-row';
  row.innerHTML = '<input class="form-control asin-modal-input" type="text" placeholder="e.g. B08XYZ123">'
    + '<button type="button" class="btn-icon danger" onclick="removeModalAsin(this)">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
  list.appendChild(row);
  row.querySelector('input').focus();
  updateModalAsinRemoveBtns();
}

function removeModalAsin(btn) {
  const list = document.getElementById('modal_asinList');
  if (!list || list.children.length <= 1) return;
  btn.closest('.modal-asin-row').remove();
  updateModalAsinRemoveBtns();
}

function updateModalAsinRemoveBtns() {
  const list = document.getElementById('modal_asinList');
  if (!list) return;
  const rows = list.querySelectorAll('.modal-asin-row');
  rows.forEach(r => {
    const btn = r.querySelector('.btn-icon.danger');
    if (btn) {
      btn.style.opacity = rows.length <= 1 ? '.3' : '1';
      btn.style.pointerEvents = rows.length <= 1 ? 'none' : '';
    }
  });
}

function getModalAsins() {
  const list = document.getElementById('modal_asinList');
  if (!list) return '';
  return Array.from(list.querySelectorAll('.asin-modal-input')).map(i => i.value.trim()).filter(Boolean).join(', ');
}

function formSection(icon, title, inner) {
  return '<div class="form-section"><div class="form-section-title">' + icon + title + '</div><div class="form-grid2">' + inner + '</div></div>';
}

async function saveProduct() {
  const productName = document.getElementById('f_productName').value.trim();
  if (!productName) { showToast('Product name is required', 'error'); return; }

  const lu       = getLoggedUser();
  const notesTxt = document.getElementById('f_notes').value.trim();
  const notesArr = notesTxt ? JSON.stringify([{ name: lu, text: notesTxt, date: new Date().toLocaleDateString('en-GB') }]) : '[]';

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;margin-right:5px"></span> Saving…';

  const toastId = showToast('Saving product…', 'loading', 0);
  const seconds = Math.floor((Date.now() - startTime) / 1000);

  const payload = {
    action:             'saveSourcing',
    agent:              document.getElementById('f_agent').value,
    supplierName:       document.getElementById('f_supplierName').value,
    code:               document.getElementById('f_code').value,
    productName,
    asins:              getModalAsins(),
    costOfUnit:         document.getElementById('f_costOfUnit').value,
    costOfSale:         document.getElementById('f_costOfSale').value,
    netProfit:          document.getElementById('f_netProfit').value,
    keepa:              document.getElementById('f_keepa').value,
    primaryFulfillment: document.getElementById('f_primaryFulfillment').value,
    supplierCheapest:   document.getElementById('f_supplierCheapest').value,
    notes:              notesArr,
    unitQuantity:       document.getElementById('f_unitQuantity').value,
    packing:            document.getElementById('f_packing').value,
    seasonality:        document.getElementById('f_seasonality').value,
    competition:        document.getElementById('f_competition').value,
    supplierStock:      document.getElementById('f_supplierStock').value,
    purchased:          false,
    approved: false, approvedBy: '', approvals: '[]'
  };

  try {
    const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain' } });
    const data = await res.json();
    if (data.opportunityId) {
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'logSourcingTime', opportunityId: data.opportunityId, agent: payload.agent, supplierName: payload.supplierName, productName: payload.productName, seconds, formatted: formatTime(seconds) }), headers: { 'Content-Type': 'text/plain' } });
    }
    removeToast(toastId);
    showToast('Product saved', 'success');
    closeModal();
    await loadData();
  } catch (e) {
    removeToast(toastId);
    showToast('Failed to save', 'error');
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Save Product';
  }
}

/* ══ HELPERS ══ */
function getLoggedUser() {
  try {
    const u = JSON.parse(localStorage.getItem('user') || '{}');
    return ((u.firstName || '') + ' ' + (u.lastName || '')).trim() || '';
  } catch (e) { return ''; }
}

function parseJSON(val, fallback) {
  if (!val || val === '' || val === 'false') return fallback;
  try { return JSON.parse(val); } catch (e) { return fallback; }
}

function fmtRaw(val) {
  const n = parseFloat(val);
  return isNaN(n) ? '' : String(n);
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) {
  return String(str || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let toastCounter = 0;
function showToast(msg, type, duration) {
  const c = document.getElementById('toastContainer');
  const id = 'toast_' + (++toastCounter);
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.id = id;
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    loading: '<span class="spinner" style="width:12px;height:12px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff;margin-right:0"></span>',
    '':      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'
  };
  t.innerHTML = (icons[type || ''] || '') + escHtml(msg);
  c.appendChild(t);
  const ms = duration === undefined ? 3000 : duration;
  if (ms > 0) setTimeout(() => t.remove(), ms);
  return id;
}

function removeToast(id) {
  const t = document.getElementById(id);
  if (t) t.remove();
}
