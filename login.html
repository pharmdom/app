<!DOCTYPE html>
<html>
<head>
  <title>Login | Pharm & Dom</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    body.loaded {
      opacity: 1;
    }

    .brand {
  text-align: center;
  margin-bottom: 30px;
}

.logo {
  width: 80px;
  margin-bottom: 12px;
  transition: transform 0.3s ease;
}

.logo:hover {
  transform: scale(1.05);
}

.brand-text h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
  color: #0f172a;
}

.brand-text span {
  font-size: 13px;
  color: #64748b;
}
    .login-card {
      background: white;
      padding: 45px 40px;
      width: 380px;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      transform: translateY(20px);
      animation: floatIn 0.5s ease forwards;
    }

    @keyframes floatIn {
      to {
        transform: translateY(0);
      }
    }

    .brand {
      text-align: center;
      margin-bottom: 25px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      color: #0f172a;
    }

    .brand span {
      font-size: 13px;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      display: block;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      position: relative;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.loading {
      pointer-events: none;
      opacity: 0.85;
    }

    button.loading::after {
      content: "";
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top: 2px solid transparent;
      border-radius: 50%;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    /* Toast */

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
    }

    .toast {
      background: #ef4444;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.35s ease;
    }

    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }

  </style>
</head>

<body>

  <div class="login-card">

    <div class="brand">
  <img src="https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assests/logo_pharm_and_domestic.png" 
       alt="Pharm & Dom Logo" class="logo">

  <div class="brand-text">
    <h1>Pharm & Dom</h1>
    <span>Operations System</span>
  </div>
</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password">
    </div>

    <button id="loginBtn" onclick="login()">Login</button>

  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>

    const API_URL = "https://script.google.com/macros/s/AKfycbyaDQrxTKE9e5y6qH8HubLEK7d9z6MbIrCRp-8Cj_0gpxUHFayWSZ_7aanI1HENvD4/exec";

    window.addEventListener("load", () => {
      document.body.classList.add("loaded");
    });

    const existingSession = sessionStorage.getItem("user");
    if (existingSession) {
      window.location.href = "index.html";
    }

    function showToast(message) {

      const container = document.getElementById("toastContainer");

      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerText = message;

      container.appendChild(toast);

      setTimeout(() => toast.classList.add("show"), 10);

      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => container.removeChild(toast), 350);
      }, 3000);
    }

    async function login() {

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const button = document.getElementById("loginBtn");

      if (!email || !password) {
        showToast("Please enter email and password.");
        return;
      }

      button.classList.add("loading");
      button.innerText = "Logging in...";

      try {

        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "login",
            email,
            password
          })
        });

        const result = await response.json();

        if (result.success) {

          sessionStorage.setItem("user", JSON.stringify(result.user));

          button.innerText = "Success ✓";

          setTimeout(() => {
            window.location.href = "index.html";
          }, 400);

        } else {
          showToast(result.message || "Invalid credentials.");
        }

      } catch (error) {
        showToast("Server error. Try again.");
      }

      button.classList.remove("loading");
      button.innerText = "Login";
    }

  </script>

</body>
</html>
