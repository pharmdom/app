<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Pharm & Dom</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href__="https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png">
  <link rel="apple-touch-icon" href__="https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href__="https://fonts.googleapis.com">
  <link rel="preconnect" href__="https://fonts.gstatic.com" crossorigin>
  <link href__="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1e40af;
      --primary-light: #3b82f6;
      --primary-dark: #1e3a8a;
      --accent: #0ea5e9;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --success: #10b981;
      --error: #ef4444;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      --shadow-glow: 0 0 60px rgba(59, 130, 246, 0.15);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .bg-orb-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      bottom: -150px;
      right: -100px;
      animation-delay: -10s;
    }

    .bg-orb-3 {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #10b981 0%, var(--accent) 100%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -5s;
      opacity: 0.2;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 30px) scale(1.02); }
    }

    /* Grid pattern overlay */
    .grid-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Main container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      opacity: 0;
      transform: translateY(30px) scale(0.98);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Card styles */
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: var(--shadow-xl), var(--shadow-glow);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 200% 0; }
      50% { background-position: -200% 0; }
    }

    /* Brand section */
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .logo {
      width: 88px;
      height: 88px;
      object-fit: contain;
      position: relative;
      z-index: 2;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .logo-container:hover .logo {
      transform: scale(1.08) rotate(2deg);
    }

    .logo-glow {
      position: absolute;
      inset: -10px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      border-radius: 50%;
      opacity: 0.15;
      filter: blur(15px);
      z-index: 1;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .logo-container:hover .logo-glow {
      opacity: 0.25;
      transform: scale(1.1);
    }

    .brand-text h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .brand-text p {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Form styles */
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
      transition: color 0.3s ease;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-muted);
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--surface);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .form-group input:hover {
      border-color: var(--text-muted);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      background: var(--surface);
    }

    .form-group input:focus + svg,
    .form-group:focus-within label {
      color: var(--primary-light);
    }

    .form-group:focus-within .input-wrapper svg {
      color: var(--primary-light);
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: var(--text-secondary);
    }

    .password-toggle svg {
      position: static;
      transform: none;
    }

    /* Button styles */
    .btn-primary {
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(30, 64, 175, 0.4);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Loading state */
    .btn-primary.loading {
      pointer-events: none;
    }

    .btn-primary.loading .btn-text {
      opacity: 0;
      transform: translateY(10px);
    }

    .btn-primary .btn-text {
      transition: all 0.3s ease;
    }

    .spinner {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
    }

    .btn-primary.loading .spinner {
      opacity: 1;
      transform: scale(1);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success state */
    .btn-primary.success {
      background: linear-gradient(135deg, var(--success) 0%, #34d399 100%);
      pointer-events: none;
    }

    .btn-primary.success::before {
      opacity: 0;
    }

    .checkmark {
      position: absolute;
      opacity: 0;
      transform: scale(0);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-primary.success .checkmark {
      opacity: 1;
      transform: scale(1);
    }

    .btn-primary.success .btn-text,
    .btn-primary.success .spinner {
      opacity: 0;
      transform: scale(0);
    }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      box-shadow: var(--shadow-xl);
      transform: translateX(120%) scale(0.9);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: auto;
      max-width: 360px;
    }

    .toast.show {
      transform: translateX(0) scale(1);
      opacity: 1;
    }

    .toast.removing {
      transform: translateX(120%) scale(0.9);
      opacity: 0;
    }

    .toast-icon {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toast-icon.error {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .toast-icon.success {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    .toast-message {
      color: white;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
    }

    .toast-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      margin-left: auto;
      transition: color 0.3s ease;
    }

    .toast-close:hover {
      color: white;
    }

    /* Progress bar for toast */
    .toast-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      border-radius: 0 0 14px 14px;
      animation: progress 4s linear forwards;
    }

    @keyframes progress {
      from { width: 100%; }
      to { width: 0%; }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 32px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    .footer a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: white;
    }

    /* Input shake animation for error */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    .form-group.error input {
      border-color: var(--error);
      animation: shake 0.5s ease;
    }

    .form-group.error .input-wrapper svg {
      color: var(--error);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
        border-radius: 20px;
      }

      .logo {
        width: 72px;
        height: 72px;
      }

      .brand-text h1 {
        font-size: 22px;
      }

      .toast-container {
        left: 16px;
        right: 16px;
      }

      .toast {
        max-width: none;
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Focus visible for keyboard users */
    .btn-primary:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>

<body>
  <!-- Animated background -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="grid-pattern"></div>

  <div class="login-container">
    <div class="login-card">
      <!-- Brand -->
      <div class="brand">
        <div class="logo-container">
          <div class="logo-glow"></div>
          <img 
            src="https://raw.githubusercontent.com/pharmdom/app/refs/heads/main/assets/logo_pharm_and_domestic.png"
            alt="Pharm & Dom Logo"
            class="logo"
          >
        </div>
        <div class="brand-text">
          <h1>Pharm & Dom</h1>
          <p>Operations System</p>
        </div>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="login(event)">
        <div class="form-group" id="emailGroup">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input 
              type="email" 
              id="email" 
              placeholder="Enter your email"
              autocomplete="email"
              required
            >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
        </div>

        <div class="form-group" id="passwordGroup">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="password" 
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <div class="btn-content">
            <span class="btn-text">Sign In</span>
            <div class="spinner"></div>
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </button>
      </form>
    </div>

    <p class="footer">
      © 2024 Pharm & Dom. All rights reserved.
    </p>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyaDQrxTKE9e5y6qH8HubLEK7d9z6MbIrCRp-8Cj_0gpxUHFayWSZ_7aanI1HENvD4/exec";

    // Check existing session
    const existingSession = sessionStorage.getItem("user");
    if (existingSession) {
      routeByRole(JSON.parse(existingSession).role);
    }

    function routeByRole(role) {
      const routes = {
        "Admin": "admin/index.html",
        "Digital Ops": "digital-ops/index.html",
        "Warehouse": "warehouse/index.html"
      };
      window.location.href = routes[role] || "login.html";
    }

    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");
      
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.innerHTML = `
          <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
          <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
          <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
          <line x1="2" x2="22" y1="2" y2="22"/>
        `;
      } else {
        passwordInput.type = "password";
        eyeIcon.innerHTML = `
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    function showToast(message, type = "error") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = `
        <div class="toast-icon ${type}">
          ${type === "error" 
            ? '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
          }
        </div>
        <span class="toast-message">${message}</span>
        <button class="toast-close" onclick="this.parentElement.classList.add('removing'); setTimeout(() => this.parentElement.remove(), 400)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
        </button>
        <div class="toast-progress"></div>
      `;
      
      container.appendChild(toast);
      
      // Trigger animation
      requestAnimationFrame(() => {
        toast.classList.add("show");
      });
      
      // Auto remove
      setTimeout(() => {
        toast.classList.add("removing");
        setTimeout(() => toast.remove(), 400);
      }, 4000);
    }

    function setFieldError(groupId, hasError) {
      const group = document.getElementById(groupId);
      if (hasError) {
        group.classList.add("error");
        setTimeout(() => group.classList.remove("error"), 500);
      } else {
        group.classList.remove("error");
      }
    }

    async function login(event) {
      event.preventDefault();
      
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const button = document.getElementById("loginBtn");

      // Validation
      if (!email) {
        setFieldError("emailGroup", true);
        showToast("Please enter your email address");
        return;
      }
      
      if (!password) {
        setFieldError("passwordGroup", true);
        showToast("Please enter your password");
        return;
      }

      // Loading state
      button.classList.add("loading");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "login",
            email,
            password
          }),
          headers: {
            "Content-Type": "text/plain"
          }
        });

        const result = await response.json();

        if (result.success) {
          sessionStorage.setItem("user", JSON.stringify(result.user));
          
          // Success state
          button.classList.remove("loading");
          button.classList.add("success");
          
          showToast("Welcome back! Redirecting...", "success");

          setTimeout(() => {
            routeByRole(result.user.role);
          }, 1200);
        } else {
          button.classList.remove("loading");
          setFieldError("emailGroup", true);
          setFieldError("passwordGroup", true);
          showToast(result.message || "Invalid email or password");
        }
      } catch (error) {
        button.classList.remove("loading");
        showToast("Unable to connect. Please try again.");
      }
    }

    // Input animations - remove error state on focus
    document.querySelectorAll("input").forEach(input => {
      input.addEventListener("focus", () => {
        input.closest(".form-group").classList.remove("error");
      });
    });

    // Keyboard accessibility
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && document.activeElement.tagName !== "BUTTON") {
        document.getElementById("loginBtn").click();
      }
    });
  </script>
</body>
</html>
