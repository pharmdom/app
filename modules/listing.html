<!-- LISTING & VEEQO MODULE - KANBAN VERSION                      -->
<!-- ============================================================= -->

<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  line-height: 1.5;

  height: 100vh;
  overflow-x: hidden;
}

.content-wrap {
  overflow-x: hidden;
}
  
.page-wrapper {
  padding: 0px 10px 15px 10px;
  max-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

  
/* PAGE */

.page-title{
font-size:20px;
font-weight:600;
margin-bottom:16px;
}

/* KPI */

.kpi-row{
display:flex;
gap:12px;
margin-bottom:16px;
}

.kpi{
background:#fff;
border:1px solid #e5e7eb;
padding:12px 16px;
border-radius:8px;
min-width:160px;
}

.kpi-title{
font-size:12px;
color:#6b7280;
}

.kpi-value{
font-size:20px;
font-weight:600;
}

/* SEARCH */

.toolbar{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.search-input{
padding:6px 10px;
border:1px solid #d1d5db;
border-radius:6px;
width:260px;
}

/* BOARD */

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

/* COLUMN */

.column{
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:10px;
padding:10px;
min-height:500px;
}

.column-title{
font-size:14px;
font-weight:600;
margin-bottom:10px;
}

/* CARD */

.card{
background:#fff;
border:1px solid #e5e7eb;
border-radius:8px;
padding:10px;
margin-bottom:10px;
cursor:pointer;
transition:0.15s;
}

.card:hover{
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card-title{
font-weight:600;
font-size:13px;
margin-bottom:4px;
}

.card-sub{
font-size:12px;
color:#6b7280;
margin-bottom:6px;
}

.card-row{
font-size:12px;
display:flex;
justify-content:space-between;
margin-bottom:2px;
}

/* BADGES */

.badge{
padding:2px 6px;
border-radius:6px;
font-size:11px;
}

.badge-yes{
background:#dcfce7;
color:#166534;
}

.badge-no{
background:#f3f4f6;
color:#374151;
}

/* PAGINATION */

.pagination{
display:flex;
justify-content:center;
gap:6px;
margin-top:16px;
}

.page-btn{
padding:6px 10px;
border:1px solid #e5e7eb;
background:#fff;
border-radius:4px;
cursor:pointer;
}

/* DRAWER */

.drawer{
position:fixed;
top:0;
right:-420px;
width:420px;
height:100%;
background:#fff;
border-left:1px solid #e5e7eb;
transition:0.25s;
padding:20px;
overflow:auto;
z-index:999;
}

.drawer.open{
right:0;
}

.field{
margin-bottom:12px;
}

.field label{
font-size:12px;
color:#6b7280;
display:block;
margin-bottom:4px;
}

.field input{
width:100%;
padding:6px;
border:1px solid #d1d5db;
border-radius:4px;
}

.close-btn{
margin-top:20px;
background:#111827;
color:#fff;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

</style>


<div>

  <div class="page-wrapper">
    
<!-- KPI -->
<div class="kpi-row">

<div class="kpi">
<div class="kpi-title">Need Listing</div>
<div class="kpi-value" id="kpiNeedListing">0</div>
</div>

<div class="kpi">
<div class="kpi-title">Need Veeqo</div>
<div class="kpi-value" id="kpiNeedVeeqo">0</div>
</div>

<div class="kpi">
<div class="kpi-title">Ready to Publish</div>
<div class="kpi-value" id="kpiReady">0</div>
</div>

</div>

<!-- SEARCH -->

<div class="toolbar">
<input class="search-input" placeholder="Search product..." id="searchInput">
</div>

<!-- BOARD -->

<div class="board">

<div class="column">
<div class="column-title">Need Listing</div>
<div id="colListing"></div>
</div>

<div class="column">
<div class="column-title">Need Veeqo</div>
<div id="colVeeqo"></div>
</div>

<div class="column">
<div class="column-title">Ready to Publish</div>
<div id="colReady"></div>
</div>

</div>

<div class="pagination" id="pagination"></div>

</div>


<!-- DRAWER -->

<div class="drawer" id="drawer">

<h3 id="drawerTitle"></h3>

<div id="drawerFields"></div>

<button class="close-btn" onclick="closeDrawer()">Close</button>

</div>
</div>



<script>

(function(){

/* STATE */

let listingData=[]
let filteredData=[]
let currentPage=1
const rowsPerPage=25


/* LOAD DATA */

async function loadListing(){

const res=await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain"},
body:JSON.stringify({action:"getListing"})
})

listingData=await res.json()

filteredData=[...listingData]

updateKPIs()

renderBoard()

}


/* KPI */

function updateKPIs(){

let listing=0
let veeqo=0
let ready=0

listingData.forEach(r=>{

if(r["Warehouse"]!=="Yes") listing++

if(r["Warehouse"]==="Yes" && r["Arrived"]!=="Yes") veeqo++

if(r["Arrived"]==="Yes") ready++

})

document.getElementById("kpiNeedListing").innerText=listing
document.getElementById("kpiNeedVeeqo").innerText=veeqo
document.getElementById("kpiReady").innerText=ready

}


/* RENDER BOARD */

function renderBoard(){

const listingCol=document.getElementById("colListing")
const veeqoCol=document.getElementById("colVeeqo")
const readyCol=document.getElementById("colReady")

listingCol.innerHTML=""
veeqoCol.innerHTML=""
readyCol.innerHTML=""

const start=(currentPage-1)*rowsPerPage
const rows=filteredData.slice(start,start+rowsPerPage)

rows.forEach(row=>{

const card=createCard(row)

if(row["Warehouse"]!=="Yes") listingCol.appendChild(card)

else if(row["Warehouse"]==="Yes" && row["Arrived"]!=="Yes") veeqoCol.appendChild(card)

else readyCol.appendChild(card)

})

renderPagination()

}


/* CARD */

function createCard(row){

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="card-title">${row["Listing Name"]||""}</div>

<div class="card-sub">${row["ASINs"]||""}</div>

<div class="card-row">
<span>Cost</span>
<span>£${row["Unit Cost"]||""}</span>
</div>

<div class="card-row">
<span>Sales</span>
<span>${row["Sales"]||""}</span>
</div>

<div class="card-row">
<span>eBay & TT</span>
<span>${badge(row["eBay & TT"])}</span>
</div>

<div class="card-row">
<span>TikTok</span>
<span>${row["TikTok"]||""}</span>
</div>

`

card.onclick=()=>openDrawer(row)

return card

}


/* BADGE */

function badge(v){

if(v==="Yes") return `<span class="badge badge-yes">Yes</span>`
return `<span class="badge badge-no">No</span>`

}


/* PAGINATION */

function renderPagination(){

const total=Math.ceil(filteredData.length/rowsPerPage)

const container=document.getElementById("pagination")

container.innerHTML=""

for(let i=1;i<=total;i++){

const btn=document.createElement("button")

btn.className="page-btn"
btn.innerText=i

btn.onclick=()=>{
currentPage=i
renderBoard()
}

container.appendChild(btn)

}

}


/* SEARCH */

document.getElementById("searchInput").addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

filteredData=listingData.filter(r=>
(r["Listing Name"]||"").toLowerCase().includes(q) ||
(r["ASINs"]||"").toLowerCase().includes(q)
)

currentPage=1

renderBoard()

})


/* DRAWER */

function openDrawer(row){

const drawer=document.getElementById("drawer")

drawer.classList.add("open")

document.getElementById("drawerTitle").innerText=row["Listing Name"]

const fields=document.getElementById("drawerFields")

fields.innerHTML=""

createField(fields,row,"Warehouse")
createField(fields,row,"Arrived")
createField(fields,row,"Prime")
createField(fields,row,"P.Size eBay & TT")

}


/* FIELD */

function createField(container,row,field){

const div=document.createElement("div")
div.className="field"

div.innerHTML=`
<label>${field}</label>
<input value="${row[field]||""}">
`

const input=div.querySelector("input")

input.onchange=async()=>{

await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain"},
body:JSON.stringify({
action:"updateListingField",
opportunityId:row["Opportunity ID"],
field:field,
value:input.value
})
})

}

container.appendChild(div)

}


/* CLOSE */

window.closeDrawer=function(){

document.getElementById("drawer").classList.remove("open")

}


/* INIT */

loadListing()

})()

</script>
