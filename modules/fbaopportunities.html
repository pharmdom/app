<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef1f8;
  --surface:#ffffff;
  --surface2:#f5f7fc;
  --border:#e2e8f5;
  --border2:#ecf0f9;
  --text:#0c1526;
  --text2:#2a3a54;
  --text3:#64748b;
  --text4:#98a7bc;
  --accent:#1847d4;
  --accent-l:#2a5eed;
  --accent-bg:#eef2fd;
  --accent-bd:#c4d3f9;
  --green:#0c7a42;
  --green-bg:#ecfdf5;
  --green-bd:#86efac;
  --red:#b91c1c;
  --red-bg:#fef2f2;
  --red-bd:#fecaca;
  --navy:#0c1526;
  --navy2:#141d2e;
  --r:10px;--r-sm:7px;--r-lg:14px;--r-xl:18px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sh-sm:0 1px 3px rgba(12,21,38,.06),0 1px 2px rgba(12,21,38,.04);
  --sh:0 4px 16px rgba(12,21,38,.08),0 2px 6px rgba(12,21,38,.04);
  --sh-lg:0 20px 50px rgba(12,21,38,.14),0 6px 16px rgba(12,21,38,.07);
}
html,body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;height:100%;}
body{overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

.fba-app{
  display:flex;flex-direction:column;height:100vh;max-height:100vh;overflow:hidden;position:relative;
  background:radial-gradient(ellipse at 20% 0%,rgba(24,71,212,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(24,71,212,.03) 0%,transparent 60%),var(--bg);
}

/* TOPNAV */
.topnav{display:flex;align-items:center;gap:10px;padding:8px 18px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.tnav-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tnav-chips{display:flex;align-items:center;gap:6px}
.tnav-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:11.5px;font-weight:600;white-space:nowrap;}
.tnav-chip svg{width:11px;height:11px;flex-shrink:0}
.tnav-chip.accent{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent);}
.tnav-chip.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.tnav-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-btn svg{width:13px;height:13px;flex-shrink:0}
.nav-btn:hover{background:var(--border);color:var(--text)}
.nav-btn:disabled{opacity:.5;cursor:default}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:9px 18px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.tb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.search-box{position:relative;min-width:160px;max-width:260px;flex:1}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);width:14px;height:14px;pointer-events:none;}
.search-box input{width:100%;padding:7px 10px 7px 33px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none;transition:all .15s;}
.search-box input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(24,71,212,.07)}
.sel-wrap{position:relative;display:inline-flex;align-items:center}
.sel-wrap svg.sel-arr{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--text4);pointer-events:none;}
.fsel{padding:6px 26px 6px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:var(--font);background:var(--surface2);color:var(--text2);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:border-color .15s;max-width:160px;}
.fsel:focus{border-color:var(--accent)}

/* CONTENT */
.fba-content{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;position:relative}
.grid-outer{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 18px}
.fba-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* FBA CARD */
.fba-card{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .12s;
  display:flex;flex-direction:column;gap:8px;
  animation:fadeUp .18s ease both;box-shadow:var(--sh-sm);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fba-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);border-left-color:var(--accent);transform:translateY(-1px)}
.fba-card.profitable{border-left-color:var(--green)}
.fba-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.fba-card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.fba-profit-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.fba-profit-badge.yes{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.fba-profit-badge.no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.fba-profit-badge.unknown{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.fba-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fba-card-asin{font-family:var(--mono);font-size:10px;color:var(--text4)}
.fba-card-date{font-size:10px;color:var(--text4)}
.fba-card-sep{width:3px;height:3px;border-radius:50%;background:var(--text4);flex-shrink:0}
.fba-card-stats{display:flex;gap:14px}
.fba-stat{display:flex;flex-direction:column;gap:1px}
.fba-stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text4)}
.fba-stat-val{font-size:12.5px;font-weight:700;color:var(--text2)}
.fba-card-flags{display:flex;gap:5px;flex-wrap:wrap;padding-top:6px;border-top:1px solid var(--border2)}
.fba-flag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:9.5px;font-weight:700}
.fba-flag.yes{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.fba-flag.no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.fba-flag.na{background:var(--surface2);color:var(--text4);border:1px solid var(--border)}

/* STATES */
.state-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center;flex:1;}
.state-wrap .icon{width:52px;height:52px;border-radius:14px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text4);}
.state-wrap .icon svg{width:24px;height:24px}
.state-wrap p{font-size:14px;font-weight:700;color:var(--text2)}
.state-wrap span{font-size:12px;color:var(--text4)}
.spinner{display:inline-block;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;}
.spin-sm{width:16px;height:16px}
.spin-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROGRESS BAR */
.pbar{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#4f80f7);z-index:50;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;opacity:0;}
.pbar.active{opacity:1}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(12,21,38,.35);z-index:1250;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px);}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;width:560px;max-width:97vw;height:100vh;background:var(--surface);box-shadow:-12px 0 50px rgba(12,21,38,.15);z-index:1300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.drawer.open{transform:translateX(0)}
.drawer-hero{padding:16px 20px 14px;background:linear-gradient(140deg,var(--navy2) 0%,#0d1631 100%);position:relative;overflow:hidden;flex-shrink:0;}
.drawer-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03);}
.drawer-hero::after{content:'';position:absolute;bottom:-25px;left:30px;width:100px;height:100px;border-radius:50%;background:rgba(24,71,212,.1);}
.drw-close{position:absolute;top:13px;right:13px;width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:all .15s;z-index:2;}
.drw-close:hover{background:rgba(255,255,255,.2);color:#fff}
.drw-stage-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;margin-bottom:6px;font-size:10px;font-weight:700;letter-spacing:.2px;position:relative;z-index:1;background:rgba(24,71,212,.2);border:1px solid rgba(96,165,250,.3);color:#60a5fa;}
.drw-name{font-size:16px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:3px;padding-right:40px;position:relative;z-index:1;}
.drw-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;position:relative;z-index:1;flex-wrap:wrap}
.drw-asin{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.38)}
.drw-date{font-size:10px;color:rgba(255,255,255,.45)}
.drw-meta-sep{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.drw-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.drw-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 10px;}
.drw-kpi-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.38);margin-bottom:2px}
.drw-kpi-val{font-size:15px;font-weight:800;color:#fff}

/* DRAWER TABS */
.drawer-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.drawer-tabs::-webkit-scrollbar{display:none}
.drawer-tab{padding:9px 14px;font-size:12px;font-weight:700;font-family:var(--font);color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.drawer-tab svg{width:13px;height:13px}
.drawer-tab:hover{color:var(--text2)}
.drawer-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-bg);}

/* DRAWER BODY */
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.drawer-section{margin-bottom:20px}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text4);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border2)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;transition:border-color .15s;}
.info-card:focus-within{border-color:var(--accent-bd);background:#fff}
.info-card label{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:5px;}
.info-card label svg{width:11px;height:11px;flex-shrink:0}
.info-card .read-val{font-size:13px;font-weight:600;color:var(--text2);padding:3px 0}
.bool-select{width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-weight:600;font-family:var(--font);outline:none;cursor:pointer;transition:all .15s;appearance:auto;}
.bool-select.yes{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.bool-select.no{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}

/* FBA DETAIL BOX */
.fba-detail-box{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);margin-bottom:10px;}
.fba-detail-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fba-detail-content{flex:1}
.fba-detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:3px}
.fba-detail-val{font-size:15px;font-weight:800}
.fba-detail-sub{font-size:11px;color:var(--text4);margin-top:2px}
.fba-detail-box.green-box{border-color:var(--green-bd);background:var(--green-bg)}
.fba-detail-box.green-box .fba-detail-icon{background:#dcfce7}
.fba-detail-box.green-box .fba-detail-val{color:var(--green)}
.fba-detail-box.red-box{border-color:var(--red-bd);background:var(--red-bg)}
.fba-detail-box.red-box .fba-detail-icon{background:#fee2e2}
.fba-detail-box.red-box .fba-detail-val{color:var(--red)}
.fba-detail-box.slate-box .fba-detail-icon{background:var(--border)}
.fba-detail-box.slate-box .fba-detail-val{color:var(--text2)}

/* DRAWER FOOTER */
.drawer-foot{padding:11px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--surface2);flex-shrink:0;}

/* TOAST */
.toasts{position:fixed;top:16px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--navy2);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--sh-lg);animation:toastIn .22s ease;max-width:320px;pointer-events:auto;border-left:3px solid rgba(255,255,255,.15);}
.toast.success{background:#14532d;border-left-color:var(--green)}
.toast.error{background:#7f1d1d;border-left-color:var(--red)}
.toast.info{background:#1e3a8a;border-left-color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* RESPONSIVE */
@media(max-width:768px){
  .fba-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .toolbar{padding:8px 12px}
  .topnav{padding:7px 12px}
  .grid-outer{padding:12px}
  .tnav-chips{gap:4px}
}
@media(max-width:600px){
  .drawer{width:100%;max-width:100%}
  .drw-kpis{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .fba-grid{grid-template-columns:1fr}
  .tnav-chips{display:none}
}
</style>

<div class="pbar" id="pbar"></div>
<div class="toasts" id="toasts"></div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <div id="drawerHero"></div>
  <div class="drawer-tabs" id="drawerTabs"></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</div>

<div class="fba-app">
  <nav class="topnav">
    <div class="tnav-left">
      <div class="tnav-chips">
        <div class="tnav-chip accent" id="chipTotal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>—</span>
        </div>
        <div class="tnav-chip green" id="chipProfitable">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>—</span>
        </div>
        <div class="tnav-chip" id="chipDG">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>—</span>
        </div>
      </div>
    </div>
    <div class="tnav-actions">
      <button class="nav-btn" id="refreshBtn" onclick="refreshData()">
        <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </nav>

  <div class="toolbar">
    <div class="tb-left">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search product, ASIN, supplier…" oninput="renderView()">
      </div>
      <div class="sel-wrap">
        <select class="fsel" id="fProfitable" onchange="renderView()">
          <option value="">Profitable: All</option>
          <option value="yes">Profitable: Yes</option>
          <option value="no">Profitable: No</option>
        </select>
        <svg class="sel-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sel-wrap">
        <select class="fsel" id="fDG" onchange="renderView()">
          <option value="">DG: All</option>
          <option value="yes">DG: Yes</option>
          <option value="no">DG: No</option>
        </select>
        <svg class="sel-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="tb-right">
      <span id="filterCount" style="font-size:12px;color:var(--text4);font-weight:600"></span>
    </div>
  </div>

  <div class="fba-content" id="fbaContent">
    <div class="state-wrap">
      <span class="spinner spin-md"></span>
      <p>Loading FBA opportunities…</p>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

var API_URL = 'https://script.google.com/macros/s/AKfycby-t4NbfPTv39Rv4KxfYpnx9YInPazJbzw_4PYaFlevCydoFHPeQJ-BuEHpdPYgnkDTDw/exec';

var allData = [];
var activeTab = 'overview';
var _openId = '';

/* ════════════════ PROGRESS BAR ════════════════ */
var _pv=0,_pt=null;
function pStart(){var b=document.getElementById('pbar');clearInterval(_pt);_pv=0.1;b.style.transform='scaleX(0.1)';b.classList.add('active');_pt=setInterval(function(){_pv=Math.min(_pv+(1-_pv)*0.07,0.92);b.style.transform='scaleX('+_pv+')';},250);}
function pDone(){clearInterval(_pt);var b=document.getElementById('pbar');b.style.transform='scaleX(1)';setTimeout(function(){b.classList.remove('active');b.style.transform='scaleX(0)';},380);}

/* ════════════════ HELPERS ════════════════ */
function esc(s){return String(s!=null?s:'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toBool(v){return v===true||v==='true'||v==='Yes'||v==='yes'||v===1||v==='TRUE';}
function toBoolLabel(v){return toBool(v)?'Yes':'No';}
function fmt(v){var n=parseFloat(v);return isNaN(n)?'—':'£'+n.toFixed(2);}
function fmtNum(v){var n=parseFloat(v);return isNaN(n)?'—':String(Math.round(n));}
function fmtDate(v){if(!v)return '—';try{var d=new Date(v);return isNaN(d)?String(v):d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return String(v);}}

/* ════════════════ API ════════════════ */
async function api(body){
  var r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return r.json();
}

/* ════════════════ LOAD ════════════════ */
async function loadData(){
  pStart();
  try{
    var r=await api({action:'getFbaOpportunities'});
    if(r&&r.success){
      allData=r.data||[];
      renderView();
      updateChips();
      toast('Loaded '+allData.length+' opportunities','success');
    }else{
      showEmpty('Failed to load','Check your API connection');
      toast('Failed to load data','error');
    }
  }catch(e){
    showEmpty('Network error','Could not reach the API');
    toast('Network error','error');
  }finally{pDone();}
}

async function refreshData(){
  var ic=document.getElementById('refreshIcon');var btn=document.getElementById('refreshBtn');
  btn.disabled=true;ic.style.animation='spin .7s linear infinite';
  await loadData();
  ic.style.animation='';btn.disabled=false;
}

/* ════════════════ CHIPS ════════════════ */
function updateChips(){
  var total=allData.length;
  var profitable=allData.filter(function(r){return toBool(r['Profitable']);}).length;
  var dg=allData.filter(function(r){return toBool(r['DG']);}).length;
  setChip('chipTotal',total+' FBA Products');
  setChip('chipProfitable',profitable+' Profitable');
  setChip('chipDG',dg+' DG');
}
function setChip(id,txt){
  var el=document.getElementById(id);if(!el)return;
  var svg=el.querySelector('svg');
  el.innerHTML=(svg?svg.outerHTML:'')+'<span>'+esc(txt)+'</span>';
}

/* ════════════════ FILTER ════════════════ */
function getFiltered(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  var fp=document.getElementById('fProfitable').value;
  var fd=document.getElementById('fDG').value;
  return allData.filter(function(r){
    if(q){
      var s=(String(r['Listing Name']||'')+' '+String(r['ASINs']||'')+' '+String(r['Supplier Name']||'')).toLowerCase();
      if(!s.includes(q))return false;
    }
    if(fp==='yes'&&!toBool(r['Profitable']))return false;
    if(fp==='no'&&toBool(r['Profitable']))return false;
    if(fd==='yes'&&!toBool(r['DG']))return false;
    if(fd==='no'&&toBool(r['DG']))return false;
    return true;
  });
}

/* ════════════════ RENDER ════════════════ */
function renderView(){
  var data=getFiltered();
  var area=document.getElementById('fbaContent');
  var fc=document.getElementById('filterCount');
  if(fc)fc.textContent=data.length!==allData.length?data.length+' of '+allData.length:'';
  if(!data.length&&!allData.length){return;}
  if(!data.length){showEmpty('No results','Try adjusting your search or filters');return;}
  area.className='fba-content';area.innerHTML='';
  var outer=document.createElement('div');outer.className='grid-outer';
  var grid=document.createElement('div');grid.className='fba-grid';
  data.forEach(function(r,i){
    var card=buildCard(r);
    card.style.animationDelay=(i*0.02)+'s';
    grid.appendChild(card);
  });
  outer.appendChild(grid);area.appendChild(outer);
}

function buildCard(r){
  var card=document.createElement('div');
  var profitable=toBool(r['Profitable']);
  var dg=toBool(r['DG']);
  var competition=String(r['Competition']||'—');
  card.className='fba-card'+(profitable?' profitable':'');
  var profBadgeClass=r['Profitable']===''||r['Profitable']===undefined?'unknown':profitable?'yes':'no';
  var profBadgeText=r['Profitable']===''||r['Profitable']===undefined?'Unknown':profitable?'Profitable':'Not Profitable';
  var dateStr=fmtDate(r['Date']);
  var html='';
  html+='<div class="fba-card-top">';
  html+='<div class="fba-card-name">'+esc(r['Listing Name']||'—')+'</div>';
  html+='<span class="fba-profit-badge '+profBadgeClass+'">'+esc(profBadgeText)+'</span>';
  html+='</div>';
  html+='<div class="fba-card-meta">';
  html+='<span class="fba-card-asin">'+esc(r['ASINs']||'')+'</span>';
  if(r['ASINs']&&dateStr!=='—')html+='<span class="fba-card-sep"></span>';
  if(dateStr!=='—')html+='<span class="fba-card-date">'+esc(dateStr)+'</span>';
  html+='</div>';
  html+='<div class="fba-card-stats">';
  html+='<div class="fba-stat"><div class="fba-stat-label">QTY</div><div class="fba-stat-val">'+esc(String(r['QTY Purchased']||'—'))+'</div></div>';
  html+='<div class="fba-stat"><div class="fba-stat-label">Sales</div><div class="fba-stat-val">'+esc(fmtNum(r['Sales']))+'</div></div>';
  html+='<div class="fba-stat"><div class="fba-stat-label">FBA Fees</div><div class="fba-stat-val">'+esc(fmt(r['FBA Fees']))+'</div></div>';
  html+='</div>';
  html+='<div class="fba-card-flags">';
  if(r['DG']!==undefined&&r['DG']!=='')html+='<span class="fba-flag '+(dg?'yes':'no')+'">DG: '+esc(toBoolLabel(r['DG']))+'</span>';
  if(r['Competition']!==undefined&&r['Competition']!=='')html+='<span class="fba-flag na">Competition: '+esc(competition)+'</span>';
  if(r['Warehouse']!==undefined)html+='<span class="fba-flag '+(toBool(r['Warehouse'])?'yes':'no')+'">Warehouse</span>';
  html+='</div>';
  card.innerHTML=html;
  card.addEventListener('click',function(){openDrawer(String(r['Opportunity ID']||''));});
  return card;
}

function showEmpty(title,sub){
  document.getElementById('fbaContent').innerHTML='<div class="state-wrap"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><p>'+esc(title)+'</p><span>'+esc(sub)+'</span></div>';
}

/* ════════════════ DRAWER ════════════════ */
function openDrawer(id){
  var row=allData.find(function(r){return String(r['Opportunity ID']||'')===id;});
  if(!row)return;
  _openId=id;activeTab='overview';
  renderDrawer(row);
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('detailDrawer').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('detailDrawer').classList.remove('open');
  _openId='';
}

function switchTab(t){
  activeTab=t;
  var row=allData.find(function(r){return String(r['Opportunity ID']||'')===_openId;});
  if(row)renderDrawer(row);
}

function renderDrawer(row){
  var id=String(row['Opportunity ID']||'');
  var name=String(row['Listing Name']||'—');
  var dateStr=fmtDate(row['Date']);
  var profitable=toBool(row['Profitable']);
  var qty=String(row['QTY Purchased']||'—');
  var sales=fmtNum(row['Sales']);
  var fbaFees=fmt(row['FBA Fees']);

  // HERO
  document.getElementById('drawerHero').innerHTML=
    '<div class="drawer-hero">'
    +'<button class="drw-close" onclick="closeDrawer()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
    +'<div class="drw-stage-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>FBA Opportunity</div>'
    +'<div class="drw-name">'+esc(name)+'</div>'
    +'<div class="drw-meta-row"><span class="drw-asin">'+esc(row['ASINs']||'')+'</span>'+(dateStr!=='—'?'<span class="drw-meta-sep"></span><span class="drw-date">'+esc(dateStr)+'</span>':'')+'</div>'
    +'<div class="drw-kpis">'
    +drwKpi('QTY',qty)
    +drwKpi('Sales',sales)
    +drwKpi('FBA Fees',fbaFees)
    +'</div>'
    +'</div>';

  // TABS
  document.getElementById('drawerTabs').innerHTML=
    tabBtn('overview',id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>','Overview')
    +tabBtn('fba',id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>','FBA Form');

  // BODY
  var body='';
  if(activeTab==='overview'){
    body+=sec('Listing Info')
      +'<div class="info-grid">'
      +readCard('Supplier Name',row['Supplier Name']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"/><path d="M8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3z"/><path d="M2 20v-2a4 4 0 0 1 4-4"/><path d="M22 20v-2a4 4 0 0 0-4-4"/></svg>')
      +readCard('EAN',row['Code']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>')
      +readCard('ASINs',row['ASINs']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>')
      +boolCard('Warehouse Notified',row['Warehouse'])
      +boolCard('Delivery Received',row['Arrived'])
      +'</div></div>'
      +sec('Financials')
      +'<div class="info-grid">'
      +readCard('QTY Purchased',row['QTY Purchased']||'—','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>')
      +readCard('Sales',fmtNum(row['Sales']),'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>')
      +'</div></div>';
  }

  if(activeTab==='fba'){
    var profYes=toBool(row['Profitable']);
    var dgYes=toBool(row['DG']);
    var competition=String(row['Competition']||'—');
    var fees=fmt(row['FBA Fees']);

    body+=sec('FBA Assessment')
      // Profitable
      +'<div class="fba-detail-box '+(row['Profitable']===''||row['Profitable']===undefined?'slate-box':profYes?'green-box':'red-box')+'" style="margin-bottom:10px">'
      +'<div class="fba-detail-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="'+(profYes?'#0c7a42':'#b91c1c')+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>'
      +'<div class="fba-detail-content"><div class="fba-detail-label">Profitable</div>'
      +'<div class="fba-detail-val">'+(row['Profitable']===''||row['Profitable']===undefined?'Not set':profYes?'Yes — Profitable':'No — Not Profitable')+'</div>'
      +'<div class="fba-detail-sub">Based on FBA fees and unit cost</div>'
      +'</div></div>'
      // FBA Fees
      +'<div class="fba-detail-box slate-box" style="margin-bottom:10px">'
      +'<div class="fba-detail-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>'
      +'<div class="fba-detail-content"><div class="fba-detail-label">FBA Fees</div>'
      +'<div class="fba-detail-val" style="color:var(--text2)">'+esc(fees)+'</div>'
      +'<div class="fba-detail-sub">Amazon fulfilment fees</div>'
      +'</div></div>'
      // DG
      +'<div class="fba-detail-box '+(row['DG']===''||row['DG']===undefined?'slate-box':dgYes?'red-box':'green-box')+'" style="margin-bottom:10px">'
      +'<div class="fba-detail-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="'+(dgYes?'#b91c1c':'#0c7a42')+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>'
      +'<div class="fba-detail-content"><div class="fba-detail-label">DG (Dangerous Goods)</div>'
      +'<div class="fba-detail-val">'+(row['DG']===''||row['DG']===undefined?'Not set':dgYes?'Yes — Dangerous Goods':'No — Not DG')+'</div>'
      +'<div class="fba-detail-sub">Amazon dangerous goods classification</div>'
      +'</div></div>'
      // Competition
      +'<div class="fba-detail-box slate-box">'
      +'<div class="fba-detail-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>'
      +'<div class="fba-detail-content"><div class="fba-detail-label">Competition</div>'
      +'<div class="fba-detail-val" style="color:var(--text2)">'+esc(competition)+'</div>'
      +'<div class="fba-detail-sub">Marketplace competition level</div>'
      +'</div></div>'
      +'</div>';
  }

  document.getElementById('drawerBody').innerHTML=body;
  document.getElementById('drawerFoot').innerHTML=
    '<span style="font-size:11px;color:var(--text4)">ID: '+esc(id)+'</span>';
}

function drwKpi(lbl,val){return '<div class="drw-kpi"><div class="drw-kpi-lbl">'+esc(lbl)+'</div><div class="drw-kpi-val">'+esc(String(val))+'</div></div>';}
function tabBtn(t,id,icon,label){return '<button class="drawer-tab'+(activeTab===t?' active':'')+'" onclick="switchTab(\''+t+'\')">'+(icon||'')+esc(label)+'</button>';}
function sec(label){return '<div class="drawer-section"><div class="sec-label">'+esc(label)+'</div>';}
function readCard(label,value,iconSvg){
  return '<div class="info-card"><label>'+(iconSvg||'')+esc(label)+'</label><div class="read-val">'+esc(String(value))+'</div></div>';
}
function boolCard(label,value){
  var on=toBool(value);
  var iconColor=on?'#0c7a42':'#b91c1c';
  var icon='<svg viewBox="0 0 24 24" fill="none" stroke="'+iconColor+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
  return '<div class="info-card"><label>'+icon+esc(label)+'</label>'
    +'<div class="read-val" style="color:'+(on?'#0c7a42':'#b91c1c')+';font-weight:700">'+(on?'Yes':'No')+'</div>'
    +'</div>';
}

/* ════════════════ TOAST ════════════════ */
function toast(msg,type){
  var c=document.getElementById('toasts');
  var t=document.createElement('div');t.className='toast '+(type||'');
  var icons={
    success:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  t.innerHTML=(icons[type]||'')+esc(msg);c.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove();},3200);
}

/* ════════════════ KEYBOARD ════════════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&document.getElementById('detailDrawer').classList.contains('open'))closeDrawer();
});

/* ════════════════ GLOBALS ════════════════ */
window.closeDrawer=closeDrawer;
window.switchTab=switchTab;
window.refreshData=refreshData;
window.renderView=renderView;

/* ════════════════ INIT ════════════════ */
loadData();

})();
</script>
