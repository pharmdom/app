<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef1f8;
  --surface:#ffffff;
  --surface2:#f5f7fc;
  --border:#e2e8f5;
  --border2:#ecf0f9;
  --text:#0c1526;
  --text2:#2a3a54;
  --text3:#64748b;
  --text4:#98a7bc;
  --accent:#1847d4;
  --accent-l:#2a5eed;
  --accent-bg:#eef2fd;
  --accent-bd:#c4d3f9;
  --green:#0c7a42;
  --green-bg:#ecfdf5;
  --green-bd:#86efac;
  --red:#b91c1c;
  --red-bg:#fef2f2;
  --red-bd:#fecaca;
  --navy:#0c1526;
  --navy2:#141d2e;
  --r:10px;--r-sm:7px;--r-lg:14px;--r-xl:18px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sh-sm:0 1px 3px rgba(12,21,38,.06),0 1px 2px rgba(12,21,38,.04);
  --sh:0 4px 16px rgba(12,21,38,.08),0 2px 6px rgba(12,21,38,.04);
  --sh-lg:0 20px 50px rgba(12,21,38,.14),0 6px 16px rgba(12,21,38,.07);
}

html,body{
  font-family:var(--font);
  font-size:14px;
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  height:100%;
}

.content-wrap{overflow-x:hidden}

body{overflow:hidden}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

/* ═══ ROOT SHELL ═══ */
.offers-app{
  display:flex;
  flex-direction:column;
  height:100vh;
  max-height:100vh;
  overflow:hidden;
  position:relative;
  /* Subtle mesh background */
  background:
    radial-gradient(ellipse at 20% 0%, rgba(24,71,212,.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(24,71,212,.03) 0%, transparent 60%),
    var(--bg);
}
#tdcontent .offers-app,
.td-content .offers-app{
  height:100%;
  max-height:100%;
}

/* ═══ TOPNAV ═══ */
.topnav{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 18px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:10;
}
.tnav-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tnav-title{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px;white-space:nowrap}
.tnav-title span{color:var(--accent)}
.tnav-chips{display:flex;align-items:center;gap:6px}
.tnav-chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text3);font-size:11.5px;font-weight:600;white-space:nowrap;
  transition:all .2s;
}
.tnav-chip svg{width:11px;height:11px;flex-shrink:0}
.tnav-chip.accent{
  background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent);
}
/* Chip count-up animation */
.tnav-chip span{transition:all .3s}
.tnav-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:var(--r-sm);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:12px;font-weight:600;font-family:var(--font);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.nav-btn svg{width:13px;height:13px;flex-shrink:0}
.nav-btn:hover{background:var(--border);color:var(--text)}
.nav-btn:disabled{opacity:.5;cursor:default}

/* ═══ TOOLBAR ═══ */
.toolbar{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
  position: sticky; top: 0; z-index: 10;
}
.tb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

.search-box{position:relative;min-width:160px;max-width:260px;flex:1}
.search-box svg.search-ico{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text4);width:14px;height:14px;pointer-events:none;
}
.search-box input{
  width:100%;padding:7px 10px 7px 33px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:13px;font-family:var(--font);
  background:var(--surface2);color:var(--text);outline:none;transition:all .15s;
}
.search-box input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(24,71,212,.07)}

.sel-wrap{position:relative;display:inline-flex;align-items:center}
.sel-wrap svg.sel-arr{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;color:var(--text4);pointer-events:none;
}
.fsel{
  padding:6px 26px 6px 10px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:12px;font-weight:600;font-family:var(--font);
  background:var(--surface2);color:var(--text2);
  outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;
  transition:border-color .15s;max-width:160px;
}
.fsel:focus{border-color:var(--accent)}

.view-btns{
  display:flex;border:1.5px solid var(--border);
  border-radius:var(--r-sm);overflow:hidden;background:var(--surface2);
}
.vbtn{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:30px;border:none;background:transparent;
  cursor:pointer;color:var(--text4);transition:all .15s;
}
.vbtn+.vbtn{border-left:1px solid var(--border)}
.vbtn:hover{color:var(--text2);background:var(--surface)}
.vbtn.active{color:var(--accent);background:var(--accent-bg)}
.vbtn svg{width:14px;height:14px}

/* ═══ CONTENT BODY ═══ */
.offers-content{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;position:relative}

/* ─── Kanban ─── */
.kanban-outer{
  flex:1;overflow:hidden;min-height:0;
  padding:14px 18px;
  display:flex;flex-direction:column;
}
.kanban-wrap{
  flex:1;display:flex;gap:14px;
  overflow-x:auto;overflow-y:hidden;
  min-height:0;padding-bottom:6px;
  align-items:stretch;
}
.kanban-wrap::-webkit-scrollbar{height:5px}

.k-col{
  flex:0 0 268px;min-width:268px;
  display:flex;flex-direction:column;
  background:var(--surface);
  border-radius:var(--r-lg);
  overflow:hidden;
  height:calc(100vh - 120px);
  max-height:calc(100vh - 120px);
  box-shadow:var(--sh-sm);
  border:1px solid var(--border);
  transition:box-shadow .2s, border-color .2s;
}
.k-col:hover{
  box-shadow:var(--sh);
  border-color:var(--accent-bd);
}


.k-col-hdr{
  padding:11px 14px 10px;flex-shrink:0;
  border-bottom:1px solid var(--border2);
  background:var(--surface);
}
.k-hdr-row{display:flex;align-items:center;gap:9px}

/* Supplier avatar badge */
.k-avatar{
  width:30px;height:30px;border-radius:8px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;letter-spacing:-.3px;
  border:1.5px solid rgba(0,0,0,.06);
}

.k-sup-info{flex:1;min-width:0}
.k-sup-name{
  font-size:12px;font-weight:700;color:var(--text);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.k-sup-meta{font-size:10.5px;color:var(--text4);margin-top:1px}
.k-col-count{
  font-size:10px;font-weight:700;
  background:var(--bg);color:var(--text3);
  padding:2px 8px;border-radius:20px;border:1px solid var(--border);flex-shrink:0;
}

.k-col-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px;display:flex;flex-direction:column;gap:7px;
  min-height:0;
}
.k-col-body::-webkit-scrollbar{width:3px}

.k-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-left-width:3px; /* accent left border — set per supplier */
  border-radius:var(--r);
  padding:10px;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .12s;
  display:flex;flex-direction:column;gap:7px;
  animation:fadeUp .18s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.k-card:hover{
  box-shadow:var(--sh);
  border-color:var(--accent-bd);
  border-left-color:var(--accent-bd);
  transform:translateY(-1px);
}
.k-card.active{
  border-color:var(--accent);
  border-left-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-bg);
}

/* Image wrap */
.k-card-img-wrap{
  position:relative;width:100%;height:68px;
  border-radius:7px;overflow:hidden;background:var(--bg);flex-shrink:0;
}
.k-card-img-wrap img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .22s;
}
.k-card:hover .k-card-img-wrap img{transform:scale(1.05)}
.k-zoom-btn{
  position:absolute;top:5px;right:5px;width:22px;height:22px;
  background:rgba(12,21,38,.55);border:none;border-radius:5px;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;backdrop-filter:blur(3px);
}
.k-card:hover .k-zoom-btn{opacity:1}
.k-zoom-btn svg{width:10px;height:10px}

.k-card-name{
  font-size:12px;font-weight:700;color:var(--text);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.k-card-ean{
  font-family:var(--mono);font-size:10px;color:var(--text4);
  display:flex;align-items:center;gap:4px;
}
.k-card-ean a{color:var(--text4);text-decoration:none;transition:color .12s}
.k-card-ean a:hover{color:var(--accent)}
.k-card-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:6px;border-top:1px solid var(--border2);
}

/* Price badge — green pill */
.k-card-cost{
  font-size:12.5px;font-weight:800;
  color:var(--green);
  background:var(--green-bg);
  border:1px solid var(--green-bd);
  padding:2px 8px;border-radius:20px;
  letter-spacing:-.2px;
}
.k-card-cost.no-price{
  background:transparent;border-color:transparent;
  color:var(--text4);font-weight:600;font-size:11px;
}
.k-card-date{font-size:10px;color:var(--text4)}

/* ─── Card Grid ─── */
.card-outer{height:calc(100vh - 120px);overflow-y:auto;overflow-x:hidden;padding:14px 18px}
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:12px;
}
.c-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .12s;
  display:flex;flex-direction:column;animation:fadeUp .18s ease both;
  box-shadow:var(--sh-sm);
}
.c-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);transform:translateY(-1px)}
.c-card-img{
  position:relative;height:96px;background:var(--bg);
  overflow:hidden;flex-shrink:0;
}
.c-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.c-card:hover .c-card-img img{transform:scale(1.04)}
.c-card-zoom{
  position:absolute;top:6px;right:6px;width:24px;height:24px;
  background:rgba(12,21,38,.55);border:none;border-radius:6px;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;backdrop-filter:blur(3px);
}
.c-card:hover .c-card-zoom{opacity:1}
.c-card-zoom svg{width:11px;height:11px}
.c-body{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:4px}
.c-name{
  font-size:12.5px;font-weight:700;color:var(--text);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.c-sup{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:4px}
.c-sup svg{width:9px;height:9px;flex-shrink:0}
.c-ean{font-family:var(--mono);font-size:10px;color:var(--text4)}
.c-ean a{color:var(--text4);text-decoration:none}
.c-ean a:hover{color:var(--accent)}
.c-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:5px;padding-top:7px;border-top:1px solid var(--border2);
}
/* Price badge in card grid */
.c-cost{
  font-size:13px;font-weight:800;
  color:var(--green);
  background:var(--green-bg);
  border:1px solid var(--green-bd);
  padding:2px 9px;border-radius:20px;
}
.c-cost.no-price{background:transparent;border-color:transparent;color:var(--text4);font-weight:600;font-size:11px}
.c-date{font-size:10px;color:var(--text4)}

/* ─── Table ─── */
.tbl-outer{height:calc(100vh - 120px);overflow:auto}
.data-tbl{width:100%;border-collapse:collapse}
.data-tbl thead th{
  background:var(--surface2);padding:9px 13px;
  text-align:left;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;color:var(--text4);
  border-bottom:2px solid var(--border);white-space:nowrap;
  position:sticky;top:0;z-index:2;
}
.data-tbl td{
  padding:7px 13px;border-bottom:1px solid var(--border2);
  color:var(--text2);font-size:13px;vertical-align:middle;
}
.data-tbl tbody tr{cursor:pointer;transition:background .1s}
.data-tbl tbody tr:hover td{background:var(--accent-bg)}
.tbl-thumb{width:32px;height:32px;border-radius:7px;object-fit:cover;border:1px solid var(--border);display:block}
.ean-link{
  font-family:var(--mono);font-size:11px;color:var(--text3);
  text-decoration:none;transition:color .12s;cursor:pointer;
}
.ean-link:hover{color:var(--accent);text-decoration:underline}
/* Price pill in table */
.tbl-price{
  display:inline-flex;
  font-size:12px;font-weight:800;
  color:var(--green);background:var(--green-bg);
  border:1px solid var(--green-bd);
  padding:2px 9px;border-radius:20px;
}

/* ═══ STATES ═══ */
.state-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;gap:12px;
  text-align:center;flex:1;
}
.state-wrap .icon{
  width:52px;height:52px;border-radius:14px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text4);
}
.state-wrap .icon svg{width:24px;height:24px}
.state-wrap p{font-size:14px;font-weight:700;color:var(--text2)}
.state-wrap span{font-size:12px;color:var(--text4)}
.spinner{
  display:inline-block;border:2.5px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .65s linear infinite;
}
.spin-sm{width:16px;height:16px}
.spin-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ DRAWER ═══ */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(12,21,38,.35);
  z-index:1250;opacity:0;pointer-events:none;
  transition:opacity .25s;backdrop-filter:blur(2px);
}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;top:0;right:0;width:520px;max-width:97vw;height:100vh;
  background:var(--surface);box-shadow:-12px 0 50px rgba(12,21,38,.15);
  z-index:1300;display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;
}
.drawer.open{transform:translateX(0)}
.drawer-hero{
  padding:16px 20px 14px;
  background:linear-gradient(140deg,var(--navy2) 0%,#0d1631 100%);
  position:relative;overflow:hidden;flex-shrink:0;
}
.drawer-hero::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.03);
}
.drw-close{
  position:absolute;top:13px;right:13px;width:28px;height:28px;
  border:none;border-radius:7px;background:rgba(255,255,255,.1);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.6);transition:all .15s;z-index:2;
}
.drw-close:hover{background:rgba(255,255,255,.2);color:#fff}
.drw-img{
  position:absolute;top:15px;right:52px;width:54px;height:54px;
  border-radius:11px;overflow:hidden;
  border:2px solid rgba(255,255,255,.15);background:#1e2a42;
  z-index:2;cursor:zoom-in;
}
.drw-img img{width:100%;height:100%;object-fit:cover;display:block}
.drw-sup{font-size:11.5px;color:rgba(255,255,255,.45);margin-bottom:3px;position:relative;z-index:1}
.drw-name{
  font-size:16px;font-weight:800;color:#fff;line-height:1.3;
  margin-bottom:3px;padding-right:70px;position:relative;z-index:1;
}
.drw-ean{
  font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.38);
  margin-bottom:12px;position:relative;z-index:1;
}
.drw-ean a{color:rgba(255,255,255,.42);text-decoration:none}
.drw-ean a:hover{color:rgba(255,255,255,.7)}
.drw-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.drw-kpi{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:9px;padding:8px 10px;
}
.drw-kpi-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.38);margin-bottom:2px}
.drw-kpi-val{font-size:15px;font-weight:800;color:#fff}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-foot{
  padding:11px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;
  background:var(--surface2);flex-shrink:0;
}
.det-sec-lbl{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text4);margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.det-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.det-field{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 13px}
.det-field label{
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--text4);margin-bottom:4px;
}
.det-field label svg{width:10px;height:10px}
.det-field .dval{font-size:13.5px;font-weight:600;color:var(--text2)}
.det-field .dval.empty{color:var(--text4);font-weight:400;font-style:italic;font-size:12px}

/* ═══ CONFIRM ═══ */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(12,21,38,.5);
  z-index:1400;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(3px);
}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{
  background:var(--surface);border-radius:var(--r-xl);
  padding:24px;width:380px;max-width:92vw;box-shadow:var(--sh-lg);
}
.confirm-box h3{font-size:16px;font-weight:800;margin-bottom:8px;color:var(--text)}
.confirm-box p{font-size:13px;color:var(--text3);line-height:1.65;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

/* ═══ LIGHTBOX ═══ */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.94);
  z-index:50;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:10px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-close{
  position:absolute;top:18px;right:18px;width:40px;height:40px;
  background:rgba(255,255,255,.12);border:none;border-radius:50%;

var PALETTE = [

    for(var j=i+1;j<unique.length;j++){
      var a=unique[i],b=unique[j];
      if(jaccardSim(tokenise(a),tokenise(b))>0.5||isPrefixOf(a,b)) union(a,b);
    }
  var map={};
  unique.forEach(function(n){ map[n]=find(n); });
  return map;
}

/* ════════════════════════════════
   IMAGE RESOLVER
════════════════════════════════ */
function resolveImg(raw) {
  if (!raw) return '';
  raw = String(raw).trim();
  if (!raw || raw==='[object Object]') return '';
  var m1=raw.match(/\/d\/([a-zA-Z0-9_-]{15,})/);
  if(m1) return 'https://drive.google.com/thumbnail?id='+m1[1]+'&sz=w400';
  var m2=raw.match(/[?&]id=([a-zA-Z0-9_-]{15,})/);
  if(m2) return 'https://drive.google.com/thumbnail?id='+m2[1]+'&sz=w400';
  var m3=raw.match(/drive\.google\.com\/uc\?.*?id=([a-zA-Z0-9_-]{15,})/);
  if(m3) return 'https://drive.google.com/thumbnail?id='+m3[1]+'&sz=w400';
  if(/^[a-zA-Z0-9_-]{25,44}$/.test(raw)) return 'https://drive.google.com/thumbnail?id='+raw+'&sz=w400';
  if(raw.startsWith('http://')||raw.startsWith('https://')) return raw;
  return '';
}

/* ════════════════════════════════
   DATE / COST UTILS
════════════════════════════════ */
function fmtDate(v){if(!v)return '—';try{var d=new Date(v);return isNaN(d)?String(v):d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});}catch(e){return String(v);}}
function fmtDateSh(v){if(!v)return '—';try{var d=new Date(v);return isNaN(d)?String(v):d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return String(v);}}
function toISO(v){if(!v)return '';try{var d=new Date(v);return isNaN(d)?'':d.toISOString().split('T')[0];}catch(e){return '';}}
function fmtCost(v){if(!v&&v!==0)return '—';var n=parseFloat(v);return isNaN(n)?String(v):'£'+n.toFixed(2);}
function costHtml(v,extraClass){var f=fmtCost(v);var cls='k-card-cost'+(extraClass?' '+extraClass:'')+(f==='—'?' no-price':'');return '<span class="'+cls+'">'+esc(f)+'</span>';}
function costHtmlC(v){var f=fmtCost(v);return '<span class="c-cost'+(f==='—'?' no-price':'')+'">'+esc(f)+'</span>';}

   EAN LINK

function eanLink(ean){
  if(!ean||ean==='—') return esc(ean||'—');
  var url='https://www.google.com/search?tbm=isch&q='+encodeURIComponent(ean);
  return '<a href="'+esc(url)+'" target="_blank" rel="noopener" class="ean-link" onclick="event.stopPropagation()">'+esc(ean)+'</a>';
}

/* ════════════════════════════════
   SORT
════════════════════════════════ */
function sortDesc(arr){
  return arr.slice().sort(function(a,b){
    var da=new Date(a.Date||a.date||0),db=new Date(b.Date||b.date||0);
    if(isNaN(da))da=new Date(0);if(isNaN(db))db=new Date(0);
    return db-da;
  });
}

════════════════════════════════ */
function getRejectedOffers(){
  return offersData.filter(function(r){return (r.Approval||r.approval||'').toLowerCase()==='rejected';});
}
function animateChips(){
  var rejected=getRejectedOffers();
  var active=offersData.filter(function(r){return (r.Approval||r.approval||'').toLowerCase()!=='rejected';});
  var t=active.length;
  var rawNames=[];
  active.forEach(function(r){var s=r['Supplier Name']||r.Supplier||'';if(s&&rawNames.indexOf(s)<0)rawNames.push(s);});
  var supMap=buildSupplierMap(rawNames);
  var s=new Set(rawNames.map(function(n){return supMap[n];})).size;
  countUp('chipTotal',t,t+' Offer'+(t!==1?'s':''));
  countUp('chipSuppliers',s,s+' Supplier'+(s!==1?'s':''));
  setChip('chipRejected',rejected.length+' Rejected');
}
function countUp(id,target,finalText){
  var el=document.getElementById(id);if(!el)return;
  var svg=el.querySelector('svg');var span=el.querySelector('span');if(!span)return;
  var duration=600,startTime=null;
  function step(ts){
    if(!startTime)startTime=ts;
    var progress=Math.min((ts-startTime)/duration,1);
    var ease=1-Math.pow(1-progress,3);
    var current=Math.round(ease*target);
    span.textContent=current+(id==='chipTotal'?' Offer'+(current!==1?'s':''):' Supplier'+(current!==1?'s':''));
    if(progress<1)requestAnimationFrame(step);
    else span.textContent=finalText;
  }
  requestAnimationFrame(step);
}

function getFiltered(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();

  var dt=document.getElementById('dateFilter').value;
  var rawNames=[];
  offersData.forEach(function(r){var s=r['Supplier Name']||r.Supplier||'';if(s&&rawNames.indexOf(s)<0)rawNames.push(s);});
  var supMap=buildSupplierMap(rawNames);
  return offersData.filter(function(r){
    if((r.Approval||r.approval||'').toLowerCase()==='rejected')return false;
    if(q){var s=(String(r.EAN||'')+' '+String(r['Product Name']||'')+' '+String(r['Supplier Name']||'')).toLowerCase();if(!s.includes(q))return false;}
    if(supFilter){var c=supMap[r['Supplier Name']||r.Supplier||'']||(r['Supplier Name']||r.Supplier||'');if(c!==supFilter)return false;}
    if(dt&&toISO(r.Date||r.date||'')!==dt)return false;
    return true;
  });
}

/* ════════════════════════════════
   NEXT ITEM LOGIC (after action)
════════════════════════════════ */
function advanceAfterAction(removedId){
  // Remove from nav list
  _navItems=_navItems.filter(function(r){return String(r.ID||'')!==removedId;});

  if(_navItems.length===0){
    // No more in this supplier — check if there's another group
    var grpIdx=_navAllGroups.indexOf(_navSupplier);
    var nextGrp=null;
    for(var i=grpIdx+1;i<_navAllGroups.length;i++){
      var gKey=_navAllGroups[i];
      var gItems=getFilteredGroupItems(gKey);
      if(gItems.length){nextGrp=gKey;break;}
    }
    if(nextGrp){
      showSupTransition('Moving to '+nextGrp+'…',function(){
        var gItems=getFilteredGroupItems(nextGrp);
        openDrawerWithContext(String(gItems[0].ID||''),nextGrp,gItems);
      });
    } else {
      closeDrawer();
      toast('All offers reviewed!','success');
    }
    return;
  }

  // Stay in same group, clamp index
  if(_navIndex>=_navItems.length)_navIndex=_navItems.length-1;
  renderDrawer(_navItems[_navIndex]);
}

function getFilteredGroupItems(supplierKey){
  var allRaw=[];
  offersData.forEach(function(r){var s=r['Supplier Name']||r.Supplier||'';if(s&&allRaw.indexOf(s)<0)allRaw.push(s);});
  var supMap=buildSupplierMap(allRaw);
  return offersData.filter(function(r){
    var raw=r['Supplier Name']||r.Supplier||'Unknown';
    var canonical=supMap[raw]||raw;
    return canonical===supplierKey;
  });
}

function showSupTransition(msg, cb){
  var el=document.getElementById('supTransition');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(function(){
    el.classList.remove('show');
    setTimeout(function(){ if(cb)cb(); },250);
  },1600);
}

async function doDeleteOffer(id){

  finally{pDone();}
}

var _mergeSelected=[];

function openMergeModal(){
  _mergeSelected=[];
  var allRaw=[];
  offersData.forEach(function(r){var s=r['Supplier Name']||r.Supplier||'';if(s&&allRaw.indexOf(s)<0)allRaw.push(s);});
  var supMap=buildSupplierMap(allRaw);
  var cols={};
  offersData.forEach(function(r){
    var raw=r['Supplier Name']||r.Supplier||'Unknown';
    var canonical=supMap[raw]||raw;
    if(!cols[canonical])cols[canonical]={count:0,rawNames:new Set()};
    cols[canonical].count++;
    cols[canonical].rawNames.add(raw);
  });

  var list=document.getElementById('mergeList');
  list.innerHTML='';
  Object.keys(cols).sort().forEach(function(sup){
    var colour=getColour(sup);
    var item=document.createElement('div');item.className='merge-item';
    item.dataset.sup=sup;
    item.dataset.rawNames=Array.from(cols[sup].rawNames).join('|||');
    item.innerHTML=
      '<div class="merge-item-avatar" style="background:'+colour.bg+';color:'+colour.fg+'">'+esc(initials(sup))+'</div>'
      +'<div class="merge-item-name" title="'+esc(Array.from(cols[sup].rawNames).join(', '))+'">'+esc(sup)+'</div>'
      +'<div class="merge-item-count">'+cols[sup].count+' offers</div>'
      +'<div class="merge-badge" id="mbadge_'+esc(sup.replace(/\s/g,'_'))+'"></div>';
    item.addEventListener('click',function(){toggleMergeItem(item,sup);});
    list.appendChild(item);
  });

      document.getElementById('mergeOverlay').classList.add('open');

}

function toggleMergeItem(item,sup){
  var idx=_mergeSelected.indexOf(sup);
  if(idx>-1){
    _mergeSelected.splice(idx,1);
  }else{
    _mergeSelected.push(sup);
  }
  // Re-render selection states
  document.querySelectorAll('.merge-item').forEach(function(el){
    var s=el.dataset.sup;
    var pos=_mergeSelected.indexOf(s);
    el.classList.remove('selected-first','selected-other');
    var badge=el.querySelector('.merge-badge');
    badge.textContent='';badge.className='merge-badge';
    if(pos===0){
      el.classList.add('selected-first');
      badge.textContent='TARGET';badge.className='merge-badge target';
    }else if(pos>0){
      el.classList.add('selected-other');
      badge.textContent='→ merge';badge.className='merge-badge source';
    }
  });
  document.getElementById('mergeDoneBtn').disabled=_mergeSelected.length<2;
}

function closeMergeModal(){
  document.getElementById('mergeOverlay').classList.remove('open');
  _mergeSelected=[];
}

async function doMerge(){
  if(_mergeSelected.length<2){toast('Select at least 2 columns','error');return;}
  var targetSupplier=_mergeSelected[0];

  // Collect all raw supplier names for the source groups (not the target)
  var allRaw=[];
  offersData.forEach(function(r){var s=r['Supplier Name']||r.Supplier||'';if(s&&allRaw.indexOf(s)<0)allRaw.push(s);});
  var supMap=buildSupplierMap(allRaw);

  var sourceNames=[];
  allRaw.forEach(function(raw){
    var canonical=supMap[raw]||raw;
    if(_mergeSelected.slice(1).indexOf(canonical)>-1) sourceNames.push(raw);
  });

  if(!sourceNames.length){toast('Nothing to merge','error');return;}

  // ── Determine target email: most recent email on target supplier rows ──
  function pickMostRecentEmail(rows){
    var withEmail=rows.filter(function(r){
      return String(r['Supplier Email']||'').trim()!=='';
    });
    if(!withEmail.length) return '';
    withEmail.sort(function(a,b){
      var da=new Date(a.Date||a.date||0), db=new Date(b.Date||b.date||0);
      if(isNaN(da))da=new Date(0); if(isNaN(db))db=new Date(0);
      return db-da;
    });
    return String(withEmail[0]['Supplier Email']||'').trim();
  }

  // Find target rows
  var targetRows=offersData.filter(function(r){
    var raw=r['Supplier Name']||r.Supplier||'';
    var canonical=supMap[raw]||raw;
    return canonical===targetSupplier;
  });
  var targetEmail=pickMostRecentEmail(targetRows);

  // Fallback: if target has no email, use most recent email across the source rows
  if(!targetEmail){
    var sourceSetLower={};
    sourceNames.forEach(function(s){sourceSetLower[s.toLowerCase().trim()]=true;});
    var sourceRows=offersData.filter(function(r){
      return sourceSetLower[String(r['Supplier Name']||'').toLowerCase().trim()];
    });
    targetEmail=pickMostRecentEmail(sourceRows);
  }

  closeMergeModal();pStart();
  try{
    var r=await api({
      action:'mergeSupplier',
      targetSupplier:targetSupplier,
      sourceSuppliers:sourceNames,
      targetEmail:targetEmail   // ← NEW: backend should propagate this to all merged rows
    });
    if(r&&r.success){
      // Update local data — both Supplier Name AND Supplier Email
      var sourceSet={};
      sourceNames.forEach(function(s){sourceSet[s.toLowerCase().trim()]=true;});
      offersData.forEach(function(row){
        var rowSup=String(row['Supplier Name']||'').toLowerCase().trim();
        var isSource=sourceSet[rowSup];
        var isTarget=String(row['Supplier Name']||'').trim()===targetSupplier;
        if(isSource){
          row['Supplier Name']=targetSupplier;
          if(targetEmail) row['Supplier Email']=targetEmail;
        } else if(isTarget && targetEmail){
          // Also normalise existing target rows to the same email
          row['Supplier Email']=targetEmail;
        }
      });
      _colourMap={};
      populateFilters();renderView();updateChips();
      toast('Merged '+r.updated+' offers into "'+targetSupplier+'"'+(targetEmail?' · email unified':''),'success');
    }else{toast('Merge failed: '+(r.message||''),'error');}
  }catch(e){toast('Error','error');}
  finally{pDone();}
}

function esc(s){return String(s!=null?s:'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

════════════════════════════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.getElementById('lightbox').classList.contains('open')){closeLightbox();return;}
    if(document.getElementById('confirmOverlay').classList.contains('open')){closeConfirm();return;}
    if(document.getElementById('rejectOverlay').classList.contains('open')){closeRejectModal();return;}
    if(document.getElementById('mergeOverlay').classList.contains('open')){closeMergeModal();return;}
    if(document.getElementById('rejectedOverlay').classList.contains('open')){closeRejectedModal();return;}
    if(document.getElementById('detailDrawer').classList.contains('open')){closeDrawer();return;}
  }
  if(document.getElementById('detailDrawer').classList.contains('open')&&_navItems.length){
    if(e.key==='ArrowRight'||e.key==='ArrowDown')navDrawer(1);
    if(e.key==='ArrowLeft'||e.key==='ArrowUp')navDrawer(-1);
  }
});
