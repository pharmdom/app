
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <link rel="preconnect" href__="https://fonts.googleapis.com">
  <link rel="preconnect" href__="https://fonts.gstatic.com" crossorigin>
  <link href__="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }

    .card {
      text-align: center;
      max-width: 360px;
      padding: 0 24px;
    }

    .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    p strong {
      color: #2563eb;
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .btn:hover { background: #1d4ed8; }

    .progress-bar-wrap {
      width: 100%;
      height: 3px;
      background: #e2e8f0;
      border-radius: 100px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #2563eb;
      border-radius: 100px;
      width: 100%;
      animation: shrink 3s linear forwards;
    }

    @keyframes shrink {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon-wrap">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>

    <h1>Redirecting you…</h1>

    <p>
      You'll be taken to <strong>app.pharmdomestic.com</strong><br>
      in <strong id="countdown">3</strong> second<span id="plural">s</span>.
    </p>

    <div class="progress-bar-wrap">
      <div class="progress-bar"></div>
    </div>

    <a class="btn" href__="https://app.pharmdomestic.com/login">
      Go now
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

  <script>
    const destination = 'https://app.pharmdomestic.com/login';
    let count = 3;

    const countdownEl = document.getElementById('countdown');
    const pluralEl    = document.getElementById('plural');

    const interval = setInterval(() => {
      count--;
      countdownEl.textContent = count;
      pluralEl.textContent    = count === 1 ? '' : 's';
      if (count <= 0) {
        clearInterval(interval);
        window.location.href = destination;
      }
    }, 1000);
  </script>

</body>
</html>
