<div class="card">

  <div class="header-row">
    <h2>User Management</h2>

    <div class="header-actions">
      <input id="searchInput" placeholder="Search users..." oninput="filterUsers()">
      <button onclick="openCreateUser()" class="primary-btn">
        + Add User
      </button>
    </div>
  </div>

  <div id="usersTable" class="table-container"></div>

</div>

<!-- Modal -->
<div id="userModal" class="modal hidden">
  <div class="modal-content">

    <div class="modal-header">
      <h3 id="modalTitle">Create User</h3>
      <span class="close-btn" onclick="closeModal()">✕</span>
    </div>

    <div class="form-grid">
      <input type="hidden" id="userId">

      <div>
        <label>First Name</label>
        <input id="firstName">
      </div>

      <div>
        <label>Last Name</label>
        <input id="lastName">
      </div>

      <div>
        <label>Email</label>
        <input id="email">
      </div>

      <div>
        <label>Password</label>
        <input id="password" type="password">
      </div>

      <div>
        <label>Role</label>
        <select id="role">
          <option>Admin</option>
          <option>Digital Ops</option>
          <option>Warehouse</option>
        </select>
      </div>

      <div>
        <label>Status</label>
        <select id="status">
          <option>Active</option>
          <option>Suspended</option>
        </select>
      </div>
    </div>

    <h4 style="margin-top:20px;">Modules</h4>

    <div class="permissions">
      <label><input type="checkbox" value="sourcing"> Sourcing</label>
      <label><input type="checkbox" value="listing"> Listing</label>
      <label><input type="checkbox" value="inventory"> Inventory</label>
      <label><input type="checkbox" value="analytics"> Analytics</label>
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="saveUser()" class="primary-btn">Save</button>
    </div>

  </div>
</div>

<style>

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-actions {
  display: flex;
  gap: 12px;
}

#searchInput {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.primary-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
}

.table-container {
  margin-top: 20px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 12px;
  background: #f1f5f9;
  font-size: 13px;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

tr:hover {
  background: #f9fafb;
  cursor: pointer;
}

.badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.badge.active {
  background: #dcfce7;
  color: #166534;
}

.badge.suspended {
  background: #fee2e2;
  color: #991b1b;
}

.permission-pill {
  background: #e0e7ff;
  color: #3730a3;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  margin-right: 4px;
  display: inline-block;
}

/* Modal */

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s ease;
}

.modal.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 14px;
  width: 650px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.2s ease;
}

@keyframes slideUp {
  from { transform: translateY(15px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.close-btn {
  cursor: pointer;
  font-size: 18px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.form-grid input, select {
  width: 100%;
  padding: 8px;
}

.permissions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.modal-actions {
  margin-top: 20px;
  text-align: right;
}

</style>

<script>

let allUsers = [];

async function loadUsers() {

  document.getElementById("usersTable").innerHTML = "Loading...";

  const response = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "getUsers" })
  });

  const result = await response.json();

  if (!result.success) return;

  allUsers = result.users;
  renderUsers(allUsers);
}

function renderUsers(users) {

  let html = `
    <table>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Modules</th>
      </tr>
  `;

  users.forEach(user => {

    const badgeClass = user.status === "Active"
      ? "badge active"
      : "badge suspended";

    const permissionsHtml = user.permissions
      .map(p => `<span class="permission-pill">${p}</span>`)
      .join("");

    html += `
      <tr onclick='editUser(${JSON.stringify(user)})'>
        <td>${user.firstName} ${user.lastName}</td>
        <td>${user.email}</td>
        <td>${user.role}</td>
        <td><span class="${badgeClass}">${user.status}</span></td>
        <td>${permissionsHtml}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("usersTable").innerHTML = html;
}

function filterUsers() {
  const value = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allUsers.filter(user =>
    user.firstName.toLowerCase().includes(value) ||
    user.lastName.toLowerCase().includes(value) ||
    user.email.toLowerCase().includes(value)
  );

  renderUsers(filtered);
}

function openCreateUser() {

  document.getElementById("modalTitle").innerText = "Create User";
  document.getElementById("userId").value = "";
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.querySelectorAll(".permissions input").forEach(cb => cb.checked = false);

  document.getElementById("userModal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("userModal").classList.add("hidden");
}

function editUser(user) {

  document.getElementById("modalTitle").innerText = "Edit User";

  document.getElementById("userId").value = user.userId;
  document.getElementById("firstName").value = user.firstName;
  document.getElementById("lastName").value = user.lastName;
  document.getElementById("email").value = user.email;
  document.getElementById("role").value = user.role;
  document.getElementById("status").value = user.status;

  document.querySelectorAll(".permissions input").forEach(cb => {
    cb.checked = user.permissions.includes(cb.value);
  });

  document.getElementById("userModal").classList.remove("hidden");
}

async function saveUser() {

  const permissions = Array.from(
    document.querySelectorAll(".permissions input:checked")
  ).map(cb => cb.value);

  const payload = {
    action: "saveUser",
    userId: document.getElementById("userId").value,
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: document.getElementById("role").value,
    status: document.getElementById("status").value,
    permissions: permissions.join(",")
  };

  const response = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  });

  const result = await response.json();

  if (result.success) {
    closeModal();
    loadUsers();
  }
}

loadUsers();

</script>
