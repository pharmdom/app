<style>
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f8fafc;
    padding: 16px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .title {
    font-size: 18px;
    font-weight: 700;
  }

  .add-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  .table-wrap {
    background: #fff;
    border-radius: 12px;
    overflow: auto;
    border: 1px solid #e2e8f0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #f1f5f9;
    text-align: left;
    white-space: nowrap;
  }

  th {
    background: #f8fafc;
    font-weight: 600;
  }

  tr:hover {
    background: #f8fafc;
  }

  .chip {
    padding: 4px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }

  .yes { background: #dcfce7; color: #15803d; }
  .no  { background: #fee2e2; color: #b91c1c; }

  .actions button {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 12px;
    color: #2563eb;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-box {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    width: 500px;
    max-width: 95%;
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  input {
    padding: 8px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    width: 100%;
  }

  .modal-actions {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
</style>

<div class="header">
  <div class="title">FBA (Warehouse)</div>
  <button class="add-btn" onclick="openModal()">+ Add Product</button>
</div>

<div class="table-wrap">
  <table id="fbaTable">
    <thead>
      <tr>
        <th>Label</th>
        <th>Brand</th>
        <th>Product</th>
        <th>ASIN</th>
        <th>Units</th>
        <th>Completed</th>
        <th>DG</th>
        <th>Box</th>
        <th>UPS</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 style="margin-bottom:10px;">Product</h3>

    <div class="modal-grid">
      <input id="labelCode" placeholder="Label Code">
      <input id="brand" placeholder="Brand">
      <input id="productLine" placeholder="Product">
      <input id="asin" placeholder="ASIN">
      <input id="unitsRequired" type="number" placeholder="Units Required">
      <input id="unitsCompleted" type="number" placeholder="Units Completed">
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="add-btn" onclick="save()">Save</button>
    </div>
  </div>
</div>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbxkRLJRiIjyd43DAems0QnmNZvN-cwonwwl--6yH03wi_R-Iw63X8vw1-_ATzIsXEok/exec';

let data = [];
let editingId = null;

/* LOAD */
async function load(){
  try {
    const res = await fetch(API_URL,{
      method:'POST',
      body: JSON.stringify({action:'getFBA'}),
      headers: { 'Content-Type': 'text/plain' } // 🔥 FIXED
    });

    const json = await res.json();
    data = json.rows || [];
    render();

  } catch (e){
    console.error('Load error:', e);
  }
}

/* RENDER */
function render(){
  const tbody = document.querySelector("#fbaTable tbody");

  const yesNo = v => `<span class="chip ${v==='Yes'?'yes':'no'}">${v||'No'}</span>`;

  tbody.innerHTML = data.map(r=>`
    <tr>
      <td>${r[3]||''}</td>
      <td>${r[4]||''}</td>
      <td>${r[5]||''}</td>
      <td>${r[6]||''}</td>
      <td>${r[14]||0}</td>
      <td>${r[16]||0}</td>
      <td>${yesNo(r[9])}</td>
      <td>${yesNo(r[13])}</td>
      <td>${yesNo(r[17])}</td>
      <td class="actions">
        <button onclick="edit('${r[0]}')">Edit</button>
        <button onclick="del('${r[0]}')">Delete</button>
      </td>
    </tr>
  `).join('');
}

/* MODAL */
function openModal(){
  editingId = null;
  document.getElementById("modal").style.display='flex';
}

function closeModal(){
  document.getElementById("modal").style.display='none';
}

/* EDIT */
function edit(id){
  const r = data.find(x=>x[0]===id);
  if (!r) return;

  editingId = id;

  labelCode.value = r[3];
  brand.value = r[4];
  productLine.value = r[5];
  asin.value = r[6];
  unitsRequired.value = r[14];
  unitsCompleted.value = r[16];

  openModal();
}

/* SAVE */
async function save(){

  const payload = {
    id: editingId,
    labelCode: labelCode.value,
    brand: brand.value,
    productLine: productLine.value,
    asin: asin.value,
    unitsRequired: unitsRequired.value,
    unitsCompleted: unitsCompleted.value,
    dgLabel: "No",
    polyBag: "No",
    warningLabel: "No",
    barcode: "No",
    box: "No",
    veeqoAdjusted: "No",
    upsCollected: "No",
    bundle:"",
    prepInstructions:""
  };

  await fetch(API_URL,{
    method:'POST',
    body: JSON.stringify({action:'saveFBA', data:payload}),
    headers: { 'Content-Type': 'text/plain' } // 🔥 FIXED
  });

  closeModal();
  load();
}

/* DELETE */
async function del(id){
  if(!confirm("Delete?")) return;

  await fetch(API_URL,{
    method:'POST',
    body: JSON.stringify({action:'deleteFBA', id}),
    headers: { 'Content-Type': 'text/plain' } // 🔥 FIXED
  });

  load();
}

load();

</script>
