
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f3f9;
  --surface:#fff;
  --surface2:#f7f9fc;
  --border:#e3e9f4;
  --border2:#edf1f8;
  --text:#0c1526;
  --text2:#2a3a54;
  --text3:#64748b;
  --text4:#98a7bc;
  --accent:#1847d4;
  --accent-l:#2a5eed;
  --accent-bg:#eef2fd;
  --accent-bd:#c4d3f9;
  --green:#0c7a42;
  --green-bg:#ecfdf5;
  --green-bd:#86efac;
  --red:#b91c1c;
  --red-bg:#fef2f2;
  --red-bd:#fecaca;
  --navy:#0c1526;
  --navy2:#141d2e;
  --r:10px;--r-sm:7px;--r-lg:14px;--r-xl:18px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sh-sm:0 1px 3px rgba(12,21,38,.06),0 1px 2px rgba(12,21,38,.04);
  --sh:0 4px 16px rgba(12,21,38,.08),0 2px 6px rgba(12,21,38,.04);
  --sh-lg:0 20px 50px rgba(12,21,38,.14),0 6px 16px rgba(12,21,38,.07);
}

html,body{
  font-family:var(--font);
  font-size:14px;
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  height:100%;
  /* When embedded in shell, inherit height properly */
}

/* When served standalone */
body{overflow:hidden}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

/* ═══ ROOT SHELL ═══
   Works both standalone (100vh) and embedded in a parent shell
   that already controls height via #tdcontent or similar */
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  max-height:100vh;
  overflow:hidden;
}
/* If parent shell provides height via a wrapper */
#tdcontent .app,
.td-content .app{
  height:100%;
}

/* ═══ TOPNAV ═══ */
.topnav{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 18px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:100;
}
.tnav-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tnav-title{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px;white-space:nowrap}
.tnav-title span{color:var(--accent)}
.tnav-chips{display:flex;align-items:center;gap:6px}
.tnav-chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:7px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text3);font-size:11.5px;font-weight:600;white-space:nowrap;
}
.tnav-chip svg{width:11px;height:11px;flex-shrink:0}
.tnav-chip.accent{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.tnav-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:var(--r-sm);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:12px;font-weight:600;font-family:var(--font);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.nav-btn svg{width:13px;height:13px;flex-shrink:0}
.nav-btn:hover{background:var(--border);color:var(--text)}

/* ═══ TOOLBAR ═══ */
.toolbar{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
  position:sticky;top:0;z-index:50;
}
.tb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Search */
.search-box{position:relative;min-width:160px;max-width:260px;flex:1}
.search-box svg.search-ico{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text4);width:14px;height:14px;pointer-events:none;
}
.search-box input{
  width:100%;padding:7px 10px 7px 33px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:13px;font-family:var(--font);
  background:var(--surface2);color:var(--text);outline:none;transition:all .15s;
}
.search-box input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(24,71,212,.07)}

/* Selects */
.sel-wrap{position:relative;display:inline-flex;align-items:center}
.sel-wrap svg.sel-arr{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;color:var(--text4);pointer-events:none;
}
.fsel{
  padding:6px 26px 6px 10px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:12px;font-weight:600;font-family:var(--font);
  background:var(--surface2);color:var(--text2);
  outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;
  transition:border-color .15s;max-width:160px;
}
.fsel:focus{border-color:var(--accent)}

/* View toggle */
.view-btns{
  display:flex;border:1.5px solid var(--border);
  border-radius:var(--r-sm);overflow:hidden;background:var(--surface2);
}
.vbtn{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:30px;border:none;background:transparent;
  cursor:pointer;color:var(--text4);transition:all .15s;
}
.vbtn+.vbtn{border-left:1px solid var(--border)}
.vbtn:hover{color:var(--text2);background:var(--surface)}
.vbtn.active{color:var(--accent);background:var(--accent-bg)}
.vbtn svg{width:14px;height:14px}

/* ═══ CONTENT BODY ═══ */
.dt-content{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column}

/* ─── Kanban ─── */
.kanban-outer{
  flex:1;overflow:hidden;min-height:0;
  padding:14px 18px;
  display:flex;flex-direction:column;
}
.kanban-wrap{
  flex:1;display:flex;gap:14px;
  overflow-x:auto;overflow-y:hidden;
  min-height:0;padding-bottom:6px;
  align-items:stretch;
}
.kanban-wrap::-webkit-scrollbar{height:5px}

.k-col{
  flex:0 0 268px;min-width:268px;
  display:flex;flex-direction:column;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  /* Fixed height — content scrolls inside */
  height:100%;
}
.k-col-hdr{
  padding:11px 14px 10px;flex-shrink:0;
  border-bottom:1px solid var(--border2);
  background:var(--surface);
}
.k-hdr-row{display:flex;align-items:center;gap:9px}
.k-sup-info{flex:1;min-width:0}
.k-sup-name{
  font-size:12px;font-weight:700;color:var(--text);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.k-sup-meta{font-size:10.5px;color:var(--text4);margin-top:1px}
.k-col-count{
  font-size:10px;font-weight:700;
  background:var(--bg);color:var(--text3);
  padding:2px 8px;border-radius:20px;border:1px solid var(--border);flex-shrink:0;
}
.k-col-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px;display:flex;flex-direction:column;gap:7px;
  min-height:0;
}
.k-col-body::-webkit-scrollbar{width:3px}

.k-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:10px;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .12s;
  display:flex;flex-direction:column;gap:7px;
  animation:fadeUp .18s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.k-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);transform:translateY(-1px)}

/* Product image on card — only shown when image exists */
.k-card-img-wrap{
  position:relative;width:100%;height:68px;
  border-radius:7px;overflow:hidden;background:var(--bg);flex-shrink:0;
}
.k-card-img-wrap img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .22s;
}
.k-card:hover .k-card-img-wrap img{transform:scale(1.05)}
.k-zoom-btn{
  position:absolute;top:5px;right:5px;width:22px;height:22px;
  background:rgba(12,21,38,.55);border:none;border-radius:5px;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;backdrop-filter:blur(3px);
}
.k-card:hover .k-zoom-btn{opacity:1}
.k-zoom-btn svg{width:10px;height:10px}

.k-card-name{
  font-size:12px;font-weight:700;color:var(--text);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.k-card-ean{
  font-family:var(--mono);font-size:10px;color:var(--text4);
  display:flex;align-items:center;gap:4px;
}
.k-card-ean a{color:var(--text4);text-decoration:none;transition:color .12s}
.k-card-ean a:hover{color:var(--accent)}
.k-card-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:6px;border-top:1px solid var(--border2);
}
.k-card-cost{font-size:14px;font-weight:800;color:var(--text)}
.k-card-date{font-size:10px;color:var(--text4)}

/* ─── Card Grid ─── */
.card-outer{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;padding:14px 18px}
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:12px;
}

.c-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .12s;
  display:flex;flex-direction:column;animation:fadeUp .18s ease both;
}
.c-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);transform:translateY(-1px)}
.c-card-img{
  position:relative;height:96px;background:var(--bg);
  overflow:hidden;flex-shrink:0;
}
.c-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.c-card:hover .c-card-img img{transform:scale(1.04)}
.c-card-zoom{
  position:absolute;top:6px;right:6px;width:24px;height:24px;
  background:rgba(12,21,38,.55);border:none;border-radius:6px;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;backdrop-filter:blur(3px);
}
.c-card:hover .c-card-zoom{opacity:1}
.c-card-zoom svg{width:11px;height:11px}
.c-body{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:4px}
.c-name{
  font-size:12.5px;font-weight:700;color:var(--text);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.c-sup{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:4px}
.c-sup svg{width:9px;height:9px;flex-shrink:0}
.c-ean{font-family:var(--mono);font-size:10px;color:var(--text4)}
.c-ean a{color:var(--text4);text-decoration:none}
.c-ean a:hover{color:var(--accent)}
.c-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:5px;padding-top:7px;border-top:1px solid var(--border2);
}
.c-cost{font-size:14px;font-weight:800;color:var(--text)}
.c-date{font-size:10px;color:var(--text4)}

/* ─── Table ─── */
.tbl-outer{flex:1;overflow:auto;min-height:0}
.data-tbl{width:100%;border-collapse:collapse}
.data-tbl thead th{
  background:var(--surface2);padding:9px 13px;
  text-align:left;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;color:var(--text4);
  border-bottom:2px solid var(--border);white-space:nowrap;
  position:sticky;top:0;z-index:2;
}
.data-tbl td{
  padding:7px 13px;border-bottom:1px solid var(--border2);
  color:var(--text2);font-size:13px;vertical-align:middle;
}
.data-tbl tbody tr{cursor:pointer;transition:background .1s}
.data-tbl tbody tr:hover td{background:var(--accent-bg)}
.tbl-thumb{width:32px;height:32px;border-radius:7px;object-fit:cover;border:1px solid var(--border);display:block}
.ean-link{
  font-family:var(--mono);font-size:11px;color:var(--text3);
  text-decoration:none;transition:color .12s;cursor:pointer;
}
.ean-link:hover{color:var(--accent);text-decoration:underline}

/* ═══ STATES ═══ */
.state-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;gap:12px;
  text-align:center;flex:1;
}
.state-wrap .icon{
  width:52px;height:52px;border-radius:14px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text4);
}
.state-wrap .icon svg{width:24px;height:24px}
.state-wrap p{font-size:14px;font-weight:700;color:var(--text2)}
.state-wrap span{font-size:12px;color:var(--text4)}
.spinner{
  display:inline-block;border:2.5px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .65s linear infinite;
}
.spin-sm{width:16px;height:16px}
.spin-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ DRAWER ═══ */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(12,21,38,.35);
  z-index:800;opacity:0;pointer-events:none;
  transition:opacity .25s;backdrop-filter:blur(2px);
}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;top:0;right:0;width:520px;max-width:97vw;height:100vh;
  background:var(--surface);box-shadow:-12px 0 50px rgba(12,21,38,.15);
  z-index:900;display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;
}
.drawer.open{transform:translateX(0)}
.drawer-hero{
  padding:16px 20px 14px;
  background:linear-gradient(140deg,var(--navy2) 0%,#0d1631 100%);
  position:relative;overflow:hidden;flex-shrink:0;
}
.drawer-hero::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.03);
}
.drw-close{
  position:absolute;top:13px;right:13px;width:28px;height:28px;
  border:none;border-radius:7px;background:rgba(255,255,255,.1);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.6);transition:all .15s;z-index:2;
}
.drw-close:hover{background:rgba(255,255,255,.2);color:#fff}
.drw-img{
  position:absolute;top:15px;right:52px;width:54px;height:54px;
  border-radius:11px;overflow:hidden;
  border:2px solid rgba(255,255,255,.15);background:#1e2a42;
  z-index:2;cursor:zoom-in;
}
.drw-img img{width:100%;height:100%;object-fit:cover;display:block}
.drw-sup{font-size:11.5px;color:rgba(255,255,255,.45);margin-bottom:3px;position:relative;z-index:1}
.drw-name{
  font-size:16px;font-weight:800;color:#fff;line-height:1.3;
  margin-bottom:3px;padding-right:70px;position:relative;z-index:1;
}
.drw-ean{
  font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.38);
  margin-bottom:12px;position:relative;z-index:1;
}
.drw-ean a{color:rgba(255,255,255,.42);text-decoration:none}
.drw-ean a:hover{color:rgba(255,255,255,.7)}
.drw-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.drw-kpi{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:9px;padding:8px 10px;
}
.drw-kpi-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.38);margin-bottom:2px}
.drw-kpi-val{font-size:15px;font-weight:800;color:#fff}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-foot{
  padding:11px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;
  background:var(--surface2);flex-shrink:0;
}
.det-sec-lbl{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text4);margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.det-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.det-field{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 13px}
.det-field label{
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--text4);margin-bottom:4px;
}
.det-field label svg{width:10px;height:10px}
.det-field .dval{font-size:13.5px;font-weight:600;color:var(--text2)}
.det-field .dval.empty{color:var(--text4);font-weight:400;font-style:italic;font-size:12px}

/* ═══ CONFIRM ═══ */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(12,21,38,.5);
  z-index:1200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(3px);
}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{
  background:var(--surface);border-radius:var(--r-xl);
  padding:24px;width:380px;max-width:92vw;box-shadow:var(--sh-lg);
}
.confirm-box h3{font-size:16px;font-weight:800;margin-bottom:8px;color:var(--text)}
.confirm-box p{font-size:13px;color:var(--text3);line-height:1.65;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

/* ═══ LIGHTBOX ═══ */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.94);
  z-index:9000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:10px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-close{
  position:absolute;top:18px;right:18px;width:40px;height:40px;
  background:rgba(255,255,255,.12);border:none;border-radius:50%;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;font-size:18px;
}
.lb-close:hover{background:rgba(255,255,255,.22)}

/* ═══ TOAST ═══ */
.toasts{
  position:fixed;top:16px;right:18px;z-index:9999;
  display:flex;flex-direction:column;gap:7px;pointer-events:none;
}
.toast{
  display:flex;align-items:center;gap:9px;padding:11px 15px;
  background:var(--navy2);color:#fff;border-radius:var(--r);
  font-size:13px;font-weight:600;box-shadow:var(--sh-lg);
  animation:toastIn .22s ease;max-width:320px;pointer-events:auto;
  border-left:3px solid rgba(255,255,255,.15);
}
.toast.success{background:#14532d;border-left-color:var(--green)}
.toast.error{background:#7f1d1d;border-left-color:var(--red)}
.toast.info{background:#1e3a8a;border-left-color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══ PROGRESS BAR ═══ */
.pbar{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:var(--accent);z-index:9998;
  transform:scaleX(0);transform-origin:left;
  transition:transform .3s ease;opacity:0;
}
.pbar.active{opacity:1}

/* ═══ BUTTONS ═══ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:var(--r-sm);border:1.5px solid;
  font-size:12.5px;font-weight:700;font-family:var(--font);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-l);border-color:var(--accent-l)}
.btn-secondary{background:var(--surface);border-color:var(--border);color:var(--text3)}
.btn-secondary:hover{border-color:var(--text4);color:var(--text)}
.btn-danger{background:var(--surface);border-color:var(--red-bd);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}

<script>
(function(){
'use strict';

/* ════════════════════════════════
   CONFIG
════════════════════════════════ */
var API_URL = 'https://script.google.com/macros/s/AKfycbwt1sg2sgDxCuwZ6KOFONX6IHany8CcOZyJMLjIkHn08e3d-cVsLOhGpIW0Hj3XYigB/exec';

/* ════════════════════════════════
   STATE
════════════════════════════════ */
var offersData = [];
var currentView = 'kanban';
var confirmFn = null;

/* ════════════════════════════════
   SMART SUPPLIER GROUPING
   Uses fuzzy/token matching to group similar supplier names
════════════════════════════════ */

// Tokenise a supplier name into meaningful words (strips Ltd, Limited, etc.)
function tokenise(name) {
  return name
    .toLowerCase()
    .replace(/\b(ltd|limited|llc|inc|co|plc|trading|group|uk|the)\b/g, '')
    .replace(/[^a-z0-9\s]/g, '')
    .split(/\s+/)
    .filter(function(t){ return t.length > 1; });
}

// Compute Jaccard similarity between two token sets
function jaccardSim(a, b) {
  if (!a.length || !b.length) return 0;
  var setA = new Set(a), setB = new Set(b);
  var inter = 0;
  setA.forEach(function(t){ if(setB.has(t)) inter++; });
  var union = new Set([...setA, ...setB]).size;
  return union === 0 ? 0 : inter / union;
}

// Check if one name starts with or is a prefix of another
function isPrefixOf(shorter, longer) {
  var s = shorter.toLowerCase().trim();
  var l = longer.toLowerCase().trim();
  return l.startsWith(s) || s.startsWith(l);
}

// Given an array of raw supplier names, return a map:
// rawName → canonicalName (the most "full" representative name for the group)
function buildSupplierMap(names) {
  var unique = [];
  names.forEach(function(n){ if(unique.indexOf(n) < 0) unique.push(n); });

  // Union-find grouping
  var parent = {};
  unique.forEach(function(n){ parent[n] = n; });

  function find(x) {
    while(parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; }
    return x;
  }
  function union(a, b) {
    var ra = find(a), rb = find(b);
    if (ra === rb) return;
    // Keep the longer name as root (more descriptive)
    if (ra.length >= rb.length) parent[rb] = ra;
    else parent[ra] = rb;
  }

  // Pairwise comparison — only O(n²) but supplier count is small
  for (var i = 0; i < unique.length; i++) {
    for (var j = i + 1; j < unique.length; j++) {
      var a = unique[i], b = unique[j];
      var tokA = tokenise(a), tokB = tokenise(b);
      var sim = jaccardSim(tokA, tokB);
      var prefix = isPrefixOf(a, b);
      // Merge if similarity > 0.5 OR one is prefix of other
      if (sim > 0.5 || prefix) {
        union(a, b);
      }
    }
  }

  // Build map: rawName → canonical (the root with longest name in group)
  var map = {};
  unique.forEach(function(n){ map[n] = find(n); });
  return map;
}

/* ════════════════════════════════
   IMAGE RESOLVER
   Drive links may be restricted — use thumbnail API
════════════════════════════════ */
function resolveImg(raw) {
  if (!raw) return '';
  raw = String(raw).trim();
  if (!raw || raw === '[object Object]') return '';

  // /d/FILE_ID pattern (view, edit, open links)
  var m1 = raw.match(/\/d\/([a-zA-Z0-9_-]{15,})/);
  if (m1) return 'https://drive.google.com/thumbnail?id=' + m1[1] + '&sz=w400';

  // ?id= or &id= pattern
  var m2 = raw.match(/[?&]id=([a-zA-Z0-9_-]{15,})/);
  if (m2) return 'https://drive.google.com/thumbnail?id=' + m2[1] + '&sz=w400';

  // drive.google.com/uc? pattern
  var m3 = raw.match(/drive\.google\.com\/uc\?.*?id=([a-zA-Z0-9_-]{15,})/);
  if (m3) return 'https://drive.google.com/thumbnail?id=' + m3[1] + '&sz=w400';

  // Raw Drive file ID (25-44 chars, alphanumeric + _ -)
  if (/^[a-zA-Z0-9_-]{25,44}$/.test(raw)) {
    return 'https://drive.google.com/thumbnail?id=' + raw + '&sz=w400';
  }

  // Already a URL
  if (raw.startsWith('http://') || raw.startsWith('https://')) return raw;

  return '';
}

/* ════════════════════════════════
   DATE UTILS
════════════════════════════════ */
function fmtDate(v) {
  if (!v) return '—';
  try {
    var d = new Date(v);
    if (isNaN(d)) return String(v);
    return d.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
  } catch(e) { return String(v); }
}
function fmtDateSh(v) {
  if (!v) return '—';
  try {
    var d = new Date(v);
    if (isNaN(d)) return String(v);
    return d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
  } catch(e) { return String(v); }
}
function toISO(v) {
  if (!v) return '';
  try { var d = new Date(v); return isNaN(d) ? '' : d.toISOString().split('T')[0]; }
  catch(e) { return ''; }
}

/* ════════════════════════════════
   COST FORMATTING
════════════════════════════════ */
function fmtCost(v) {
  if (!v && v !== 0) return '—';
  var n = parseFloat(v);
  return isNaN(n) ? String(v) : '£' + n.toFixed(2);
}

/* ════════════════════════════════
   EAN LINK — Google Image Search
════════════════════════════════ */
function eanLink(ean) {
  if (!ean || ean === '—') return esc(ean || '—');
  var url = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(ean);
  return '<a href="' + esc(url) + '" target="_blank" rel="noopener" class="ean-link"'
    + ' onclick="event.stopPropagation()" title="Search images for ' + esc(ean) + '">'
    + esc(ean) + '</a>';
}

/* ════════════════════════════════
   SORT
════════════════════════════════ */
function sortDesc(arr) {
  return arr.slice().sort(function(a, b) {
    var da = new Date(a.Date || a.date || 0);
    var db = new Date(b.Date || b.date || 0);
    if (isNaN(da)) da = new Date(0);
    if (isNaN(db)) db = new Date(0);
    return db - da;
  });
}

/* ════════════════════════════════
   PROGRESS BAR
════════════════════════════════ */
var _pv = 0, _pt = null;
function pStart() {
  var b = document.getElementById('pbar');
  clearInterval(_pt); _pv = 0.1;
  b.style.transform = 'scaleX(0.1)'; b.classList.add('active');
  _pt = setInterval(function() {
    _pv = Math.min(_pv + (1 - _pv) * 0.07, 0.92);
    b.style.transform = 'scaleX(' + _pv + ')';
  }, 250);
}
function pDone() {
  clearInterval(_pt);
  var b = document.getElementById('pbar');
  b.style.transform = 'scaleX(1)';
  setTimeout(function() { b.classList.remove('active'); b.style.transform = 'scaleX(0)'; }, 380);
}

/* ════════════════════════════════
   API
════════════════════════════════ */
async function api(body) {
  var r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return r.json();
}

/* ════════════════════════════════
   LOAD
════════════════════════════════ */
async function loadOffers() {
  pStart();
  try {
    var r = await api({ action: 'getOffers' });
    if (r && r.success) {
      var h = r.headers || [];
      offersData = sortDesc((r.rows || []).map(function(row) {
        var o = {};
        h.forEach(function(k, i) { o[k] = row[i] != null ? row[i] : ''; });
        return o;
      }));
      populateFilters();
      renderView();
      updateChips();
    } else {
      toast('Failed to load offers', 'error');
      showEmpty('Failed to load', 'Check your API connection');
    }
  } catch(e) {
    toast('Network error', 'error');
    showEmpty('Network error', 'Could not reach the API');
  }
  finally { pDone(); }
}

async function refreshData() {
  var ic = document.getElementById('refreshIcon');
  var btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  ic.style.animation = 'spin .7s linear infinite';
  await loadOffers();
  ic.style.animation = '';
  btn.disabled = false;
}

/* ════════════════════════════════
   FILTERS
════════════════════════════════ */
function populateFilters() {
  var sel = document.getElementById('supFilter');
  var prev = sel.value;

  // Get canonical supplier names for the dropdown
  var rawNames = [];
  offersData.forEach(function(r) {
    var s = r['Supplier Name'] || r.Supplier || '';
    if (s && rawNames.indexOf(s) < 0) rawNames.push(s);
  });

  var supMap = buildSupplierMap(rawNames);

  // Collect unique canonical names
  var canonicals = [];
  rawNames.forEach(function(n) {
    var c = supMap[n];
    if (canonicals.indexOf(c) < 0) canonicals.push(c);
  });
  canonicals.sort();

  sel.innerHTML = '<option value="">All Suppliers</option>';
  canonicals.forEach(function(c) {
    sel.innerHTML += '<option value="' + esc(c) + '">' + esc(c) + '</option>';
  });

  if (prev) sel.value = prev;
}

function getFiltered() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var supFilter = document.getElementById('supFilter').value;
  var dt = document.getElementById('dateFilter').value;

  // Build supplier map for filtering
  var rawNames = [];
  offersData.forEach(function(r) {
    var s = r['Supplier Name'] || r.Supplier || '';
    if (s && rawNames.indexOf(s) < 0) rawNames.push(s);
  });
  var supMap = buildSupplierMap(rawNames);

  return offersData.filter(function(r) {
    if (q) {
      var s = (
        String(r.EAN || r.Ean || '') + ' ' +
        String(r['Product Name'] || r.Name || '') + ' ' +
        String(r['Supplier Name'] || r.Supplier || '')
      ).toLowerCase();
      if (!s.includes(q)) return false;
    }
    if (supFilter) {
      var rawSup = r['Supplier Name'] || r.Supplier || '';
      var canonical = supMap[rawSup] || rawSup;
      if (canonical !== supFilter) return false;
    }
    if (dt && toISO(r.Date || r.date || '') !== dt) return false;
    return true;
  });
}

/* ════════════════════════════════
   CHIPS
════════════════════════════════ */
function updateChips() {
  var t = offersData.length;

  // Count unique canonical suppliers
  var rawNames = [];
  offersData.forEach(function(r) {
    var s = r['Supplier Name'] || r.Supplier || '';
    if (s && rawNames.indexOf(s) < 0) rawNames.push(s);
  });
  var supMap = buildSupplierMap(rawNames);
  var canonicals = new Set(rawNames.map(function(n){ return supMap[n]; }));
  var s = canonicals.size;

  setChip('chipTotal', t + ' Offer' + (t !== 1 ? 's' : ''));
  setChip('chipSuppliers', s + ' Supplier' + (s !== 1 ? 's' : ''));
}
function setChip(id, txt) {
  var el = document.getElementById(id); if (!el) return;
  var svg = el.querySelector('svg');
  el.innerHTML = (svg ? svg.outerHTML : '') + '<span>' + esc(txt) + '</span>';
}

/* ════════════════════════════════
   VIEW SWITCHING
════════════════════════════════ */
function setView(v) {
  currentView = v;
  ['kanban', 'card', 'table'].forEach(function(t) {
    var id = 'vbtn' + t.charAt(0).toUpperCase() + t.slice(1);
    document.getElementById(id).classList.toggle('active', t === v);
  });
  renderView();
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
function renderView() {
  var data = getFiltered();
  var area = document.getElementById('contentArea');

  if (!data.length && !offersData.length) {
    showLoading(); return;
  }
  if (!data.length) {
    showEmpty('No offers found', 'Try adjusting your search or filters'); return;
  }

  if (currentView === 'kanban') renderKanban(data, area);
  else if (currentView === 'card') renderCards(data, area);
  else renderTable(data, area);
}

function showLoading() {
  document.getElementById('contentArea').innerHTML =
    '<div class="state-wrap"><span class="spinner spin-md"></span><p>Loading offers…</p></div>';
}
function showEmpty(title, sub) {
  document.getElementById('contentArea').innerHTML =
    '<div class="state-wrap">'
    + '<div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>'
    + '<p>' + esc(title) + '</p><span>' + esc(sub) + '</span>'
    + '</div>';
}

/* ─── KANBAN ─── */
function renderKanban(data, area) {
  // Group by canonical supplier name
  var rawNames = data.map(function(r){ return r['Supplier Name'] || r.Supplier || 'Unknown'; });
  var allRaw = [];
  offersData.forEach(function(r){ var s = r['Supplier Name']||r.Supplier||''; if(s && allRaw.indexOf(s)<0) allRaw.push(s); });
  var supMap = buildSupplierMap(allRaw);

  var cols = {};
  data.forEach(function(r) {
    var raw = r['Supplier Name'] || r.Supplier || 'Unknown';
    var canonical = supMap[raw] || raw;
    if (!cols[canonical]) cols[canonical] = [];
    cols[canonical].push(r);
  });

  area.className = '';
  area.innerHTML = '';

  var outer = document.createElement('div');
  outer.className = 'kanban-outer';

  var wrap = document.createElement('div');
  wrap.className = 'kanban-wrap';

  Object.keys(cols).sort().forEach(function(sup) {
    var items = cols[sup];
    var col = document.createElement('div');
    col.className = 'k-col';

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'k-col-hdr';
    hdr.innerHTML =
      '<div class="k-hdr-row">'
      + '<div class="k-sup-info">'
        + '<div class="k-sup-name" title="' + esc(sup) + '">' + esc(sup) + '</div>'
        + '<div class="k-sup-meta">' + items.length + ' offer' + (items.length !== 1 ? 's' : '') + '</div>'
      + '</div>'
      + '<span class="k-col-count">' + items.length + '</span>'
      + '</div>';
    col.appendChild(hdr);

    // Body (scrollable)
    var body = document.createElement('div');
    body.className = 'k-col-body';
    items.forEach(function(r) {
      body.appendChild(buildKanbanCard(r));
    });
    col.appendChild(body);
    wrap.appendChild(col);
  });

  outer.appendChild(wrap);
  area.appendChild(outer);
}

function buildKanbanCard(r) {
  var card = document.createElement('div');
  card.className = 'k-card';

  var img = resolveImg(r['Product Image'] || r.product_image || '');
  var ean = r.EAN || r.Ean || '';
  var cost = fmtCost(r.Cost || r.cost);
  var date = fmtDateSh(r.Date || r.date);
  var pname = r['Product Name'] || r.Name || '—';

  var html = '';

  // Only show image section if image URL exists
  if (img) {
    html += '<div class="k-card-img-wrap">'
      + '<img src="' + esc(img) + '" alt="" loading="lazy"'
      + ' onerror="this.closest(\'.k-card-img-wrap\').style.display=\'none\'">'
      + '<button class="k-zoom-btn" onclick="event.stopPropagation();openLightbox(\'' + esc(img) + '\')" title="View image">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
      + '</button></div>';
  }

  html += '<div class="k-card-name" title="' + esc(pname) + '">' + esc(pname) + '</div>';

  if (ean) {
    html += '<div class="k-card-ean">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px;flex-shrink:0"><rect x="2" y="4" width="3" height="15"/><rect x="7" y="4" width="2" height="15"/><rect x="11" y="4" width="4" height="15"/><rect x="17" y="4" width="2" height="15"/><rect x="21" y="4" width="2" height="15"/></svg>'
      + eanLink(ean) + '</div>';
  }

  html += '<div class="k-card-foot">'
    + '<span class="k-card-cost">' + esc(cost) + '</span>'
    + '<span class="k-card-date">' + esc(date) + '</span>'
    + '</div>';

  card.innerHTML = html;
  card.addEventListener('click', function() {
    openDrawer(String(r.ID || ''));
  });
  return card;
}

/* ─── CARDS ─── */
function renderCards(data, area) {
  area.className = '';
  area.innerHTML = '';

  var outer = document.createElement('div');
  outer.className = 'card-outer';

  var grid = document.createElement('div');
  grid.className = 'card-grid';

  data.forEach(function(r) {
    var card = document.createElement('div');
    card.className = 'c-card';

    var img = resolveImg(r['Product Image'] || r.product_image || '');
    var pname = r['Product Name'] || r.Name || '—';
    var ean = r.EAN || r.Ean || '';
    var cost = fmtCost(r.Cost || r.cost);
    var date = fmtDateSh(r.Date || r.date);
    var sup = r['Supplier Name'] || r.Supplier || '';

    var html = '';

    if (img) {
      html += '<div class="c-card-img">'
        + '<img src="' + esc(img) + '" alt="" loading="lazy"'
        + ' onerror="this.closest(\'.c-card-img\').style.display=\'none\'">'
        + '<button class="c-card-zoom" onclick="event.stopPropagation();openLightbox(\'' + esc(img) + '\')">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
        + '</button></div>';
    }

    html += '<div class="c-body">'
      + '<div class="c-name">' + esc(pname) + '</div>';
    if (sup) {
      html += '<div class="c-sup">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>'
        + esc(sup) + '</div>';
    }
    if (ean) html += '<div class="c-ean">' + eanLink(ean) + '</div>';
    html += '<div class="c-foot"><span class="c-cost">' + esc(cost) + '</span><span class="c-date">' + esc(date) + '</span></div>'
      + '</div>';

    card.innerHTML = html;
    card.addEventListener('click', function() { openDrawer(String(r.ID || '')); });
    grid.appendChild(card);
  });

  outer.appendChild(grid);
  area.appendChild(outer);
}

/* ─── TABLE ─── */
function renderTable(data, area) {
  area.className = '';
  area.innerHTML = '';

  var outer = document.createElement('div');
  outer.className = 'tbl-outer';

  var tbl = '<table class="data-tbl"><thead><tr>'
    + '<th style="width:50px"></th>'
    + '<th>EAN</th><th>Product Name</th><th>Supplier</th><th>Cost</th><th>Date</th>'
    + '</tr></thead><tbody>';

  data.forEach(function(r) {
    var img = resolveImg(r['Product Image'] || r.product_image || '');
    var pname = r['Product Name'] || r.Name || '—';
    var ean = r.EAN || r.Ean || '';
    var id = esc(String(r.ID || ''));

    tbl += '<tr onclick="openDrawer(\'' + id + '\')">';
    tbl += '<td>';
    if (img) {
      tbl += '<img class="tbl-thumb" src="' + esc(img) + '" alt=""'
        + ' onerror="this.style.display=\'none\'">';
    }
    tbl += '</td>';
    tbl += '<td>' + eanLink(ean) + '</td>';
    tbl += '<td style="font-weight:600">' + esc(pname) + '</td>';
    tbl += '<td style="color:var(--text3);font-size:12px">' + esc(r['Supplier Name'] || r.Supplier || '') + '</td>';
    tbl += '<td style="font-weight:700">' + esc(fmtCost(r.Cost || r.cost)) + '</td>';
    tbl += '<td style="color:var(--text4);font-size:12px">' + esc(fmtDateSh(r.Date || r.date)) + '</td>';
    tbl += '</tr>';
  });

  tbl += '</tbody></table>';
  outer.innerHTML = tbl;
  area.appendChild(outer);
}

/* ════════════════════════════════
   DRAWER
════════════════════════════════ */
function openDrawer(id) {
  var row = offersData.find(function(r) { return String(r.ID || '') === id; });
  if (!row) return;
  renderDrawer(row);
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('detailDrawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('detailDrawer').classList.remove('open');
}

function renderDrawer(row) {
  var ean = String(row.EAN || row.Ean || '—');
  var name = String(row['Product Name'] || row.Name || '—');
  var sup = String(row['Supplier Name'] || row.Supplier || '');
  var cost = fmtCost(row.Cost || row.cost);
  var id = String(row.ID || '');
  var img = resolveImg(row['Product Image'] || row.product_image || '');
  var date = fmtDate(row.Date || row.date);

  var imgHtml = img
    ? '<div class="drw-img" onclick="openLightbox(\'' + esc(img) + '\')" title="View full image">'
      + '<img src="' + esc(img) + '" alt="" onerror="this.closest(\'.drw-img\').style.display=\'none\'">'
      + '</div>'
    : '';

  document.getElementById('drawerHero').innerHTML =
    '<div class="drawer-hero">'
    + '<button class="drw-close" onclick="closeDrawer()">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    + '</button>'
    + imgHtml
    + (sup ? '<div class="drw-sup">' + esc(sup) + '</div>' : '')
    + '<div class="drw-name">' + esc(name) + '</div>'
    + '<div class="drw-ean">EAN: ' + eanLink(ean) + '</div>'
    + '<div class="drw-kpis">'
    + kpi('Cost', cost)
    + kpi('Date', fmtDateSh(row.Date || row.date) || '—')
    + kpi('Case', String(row.Case || row.case || '—'))
    + '</div></div>';

  var skip = new Set(['ID','EAN','Ean','Product Name','Name','Supplier Name','Supplier',
    'Cost','cost','Product Image','product_image','Date','date','Case','case']);
  var body = '<div><div class="det-sec-lbl">Product Details</div><div class="det-grid">';

  if (row.Code || row.code)
    body += df('SKU / Code', String(row.Code || row.code || ''));
  if (row.Barcode || row.barcode)
    body += df('Barcode', String(row.Barcode || row.barcode || ''));
  if (row['Supplier Email'])
    body += df('Supplier Email', String(row['Supplier Email']));
  if (row['Email Subject'])
    body += df('Email Subject', String(row['Email Subject']));
  if (row.Category || row.category)
    body += df('Category', String(row.Category || row.category || ''));

  Object.keys(row).forEach(function(k) {
    if (!skip.has(k) && String(row[k]).trim() !== '' && !body.includes(esc(k))) {
      body += df(k, String(row[k]));
    }
  });

  body += '</div></div>';
  document.getElementById('drawerBody').innerHTML = body;
  document.getElementById('drawerFoot').innerHTML =
    '<button class="btn btn-danger btn-sm" onclick="confirmDeleteOffer(\'' + esc(id) + '\')">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
    + 'Delete</button>'
    + '<div style="margin-left:auto;font-size:11px;color:var(--text4)">Added ' + esc(fmtDateSh(row.Date || row.date)) + '</div>';
}

function kpi(lbl, val) {
  return '<div class="drw-kpi"><div class="drw-kpi-lbl">' + lbl + '</div><div class="drw-kpi-val">' + esc(String(val)) + '</div></div>';
}
function df(lbl, val) {
  return '<div class="det-field"><label>' + esc(lbl) + '</label>'
    + '<div class="dval' + (val ? '' : ' empty') + '">' + esc(val || '—') + '</div></div>';
}

/* ════════════════════════════════
   DELETE
════════════════════════════════ */
function confirmDeleteOffer(id) {
  openConfirm('Delete Offer?',
    'This product will be permanently removed from the Offers sheet.',
    function() { doDeleteOffer(id); }, 'Delete');
}
async function doDeleteOffer(id) {
  closeConfirm(); closeDrawer(); pStart();
  try {
    var r = await api({ action: 'deleteOffer', id: id });
    if (r && r.success) {
      offersData = offersData.filter(function(x) { return String(x.ID || '') !== id; });
      populateFilters(); renderView(); updateChips();
      toast('Offer deleted', 'success');
    } else { toast('Failed to delete', 'error'); }
  } catch(e) { toast('Error', 'error'); }
  finally { pDone(); }
}

/* ════════════════════════════════
   LIGHTBOX
════════════════════════════════ */
function openLightbox(url) {
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbImg').src = '';
}

/* ════════════════════════════════
   CONFIRM
════════════════════════════════ */
function openConfirm(title, msg, fn, lbl) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOkBtn').textContent = lbl || 'Confirm';
  confirmFn = fn;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  confirmFn = null;
}
function doConfirm() { if (confirmFn) confirmFn(); }

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
function toast(msg, type) {
  var c = document.getElementById('toasts');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  var icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  t.innerHTML = (icons[type] || '') + esc(msg);
  c.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.remove(); }, 3400);
}

/* ════════════════════════════════
   ESCAPE
════════════════════════════════ */
function esc(s) {
  return String(s != null ? s : '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ════════════════════════════════
   KEYBOARD
════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) { closeLightbox(); return; }
    if (document.getElementById('confirmOverlay').classList.contains('open')) { closeConfirm(); return; }
    if (document.getElementById('detailDrawer').classList.contains('open')) { closeDrawer(); return; }
  }
});

/* ════════════════════════════════
   SHELL HEIGHT FIX
   When embedded in a Google Sheets shell (#tdcontent),
   override body overflow and set app height to fill parent
════════════════════════════════ */
(function() {
  var shell = document.getElementById('tdcontent') || document.querySelector('.td-content');
  if (shell) {
    document.body.style.overflow = 'hidden';
    document.body.style.height = '100%';
    var app = document.getElementById('app');
    if (app) {
      app.style.height = '100%';
    }
  }
})();

/* ════════════════════════════════
   GLOBALS (for inline handlers)
════════════════════════════════ */
window.refreshData = refreshData;
window.setView = setView;
window.renderView = renderView;
window.openDrawer = openDrawer;
window.closeDrawer = closeDrawer;
window.openLightbox = openLightbox;
window.closeLightbox = closeLightbox;
window.confirmDeleteOffer = confirmDeleteOffer;
window.closeConfirm = closeConfirm;
window.doConfirm = doConfirm;

/* ════════════════════════════════
   INIT
════════════════════════════════ */
loadOffers();

})();
</script>
