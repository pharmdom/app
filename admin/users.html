<!-- ═══════════════════════════════════════════
     STAFF MANAGEMENT — PharmDomestic
     Assumes: API_URL is defined in your main
     layout/script (pointing to your Apps Script)
     Your sheet columns: userId | firstName | lastName | email | password | role | status | permissions | lastLogin
═══════════════════════════════════════════ -->
<div class="ov-page">
     
<div id="staffApp">

  <!-- HEADER -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
    <div>
      <h2 style="font-size:18px;font-weight:700;color:#0f172a;letter-spacing:-0.3px;margin:0;"></h2>
      <p style="font-size:12px;color:#94a3b8;margin:3px 0 0;">Manage team members, roles &amp; module access</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="pd-btn pd-btn-ghost pd-btn-sm" onclick="loadStaff()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
      <button class="pd-btn pd-btn-primary pd-btn-sm" onclick="smOpenAddModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Staff
      </button>
    </div>
  </div>

  <!-- STAT CHIPS -->
  <div id="smStatChips" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>

  <!-- SEARCH -->
  <div style="margin-bottom:18px;">
    <div style="position:relative;max-width:320px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="smSearch" class="pd-input" placeholder="Search by name or email..." oninput="smRenderCards()" style="padding-left:34px;width:100%;box-sizing:border-box;">
    </div>
  </div>

  <!-- LOADING -->
  <div id="smLoading" style="display:none;text-align:center;padding:60px 20px;color:#94a3b8;font-size:13px;">
    <div class="pd-spinner" style="display:inline-block;margin-right:8px;vertical-align:middle;"></div>
    Loading staff...
  </div>

  <!-- EMPTY STATE -->
  <div id="smEmpty" style="display:none;text-align:center;padding:60px 20px;">
    <div style="width:56px;height:56px;border-radius:14px;background:#f1f5f9;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <h3 id="smEmptyTitle" style="font-size:15px;font-weight:600;color:#475569;margin:0 0 4px;">No staff members yet</h3>
    <p id="smEmptySub" style="font-size:13px;color:#94a3b8;margin:0;">Add your first team member to get started</p>
  </div>

  <!-- STAFF GRID -->
  <div id="smGrid" style="display:none;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;"></div>

</div>



<!-- ═══════════════════ DRAWER ═══════════════════ -->
<div id="smDrawerOverlay" onclick="smCloseDrawer()" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.3);backdrop-filter:blur(4px);z-index:1000;opacity:0;transition:opacity .25s;"></div>

<div id="smDrawer" style="position:fixed;top:0;right:0;width:520px;max-width:97vw;height:100%;background:#fff;box-shadow:-4px 0 40px rgba(0,0,0,0.12);z-index:1001;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);">

  <!-- Drawer Hero -->
  <div style="background:linear-gradient(135deg,#1e293b,#0f172a);padding:24px;position:relative;overflow:hidden;flex-shrink:0;">
    <div style="position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);"></div>
    <div style="position:absolute;bottom:-20px;left:20px;width:60px;height:60px;border-radius:50%;background:rgba(59,130,246,0.08);"></div>
    <button onclick="smCloseDrawer()" style="position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);transition:all .15s;z-index:2;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div style="display:flex;align-items:flex-start;gap:16px;position:relative;z-index:1;">
      <div id="smDrawerAvatar" style="width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;padding-top:4px;">
        <div id="smDrawerStatus" style="margin-bottom:6px;"></div>
        <div id="smDrawerName" style="font-size:17px;font-weight:700;color:#fff;"></div>
        <div id="smDrawerEmail" style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px;"></div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
          <div id="smDrawerRole" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;"></div>
          <div id="smDrawerJoined" style="padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.45);font-size:11px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Drawer Body -->
  <div id="smDrawerBody" style="flex:1;overflow-y:auto;padding:20px 24px;"></div>

  <!-- Drawer Footer -->
  <div id="smDrawerFooter" style="padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;background:#fafafa;flex-shrink:0;"></div>

</div>


<!-- ═══════════════════ MODAL ═══════════════════ -->
<div id="smModal" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);backdrop-filter:blur(4px);z-index:1002;align-items:center;justify-content:center;padding:16px;">
  <div style="background:#fff;border-radius:18px;width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.15);overflow:hidden;">

    <!-- Modal Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9;background:linear-gradient(to right,#f8fafc,#fff);flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:36px;height:36px;border-radius:10px;background:#eff6ff;display:flex;align-items:center;justify-content:center;color:#2563eb;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </div>
        <div>
          <div id="smModalTitle" style="font-size:14px;font-weight:700;color:#0f172a;">Add New Staff</div>
          <div id="smModalSub" style="font-size:11px;color:#94a3b8;margin-top:1px;">A welcome email will be sent with login credentials</div>
        </div>
      </div>
      <button onclick="smCloseModal()" style="width:28px;height:28px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#94a3b8;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div style="flex:1;overflow-y:auto;padding:20px;">
      <input type="hidden" id="smEditId">

      <!-- Personal Info -->
      <div class="sm-form-section">
        <div class="sm-section-label">Personal Information</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label class="sm-label">First Name *</label>
            <input id="smFN" class="pd-input" placeholder="John">
          </div>
          <div>
            <label class="sm-label">Last Name *</label>
            <input id="smLN" class="pd-input" placeholder="Smith">
          </div>
        </div>
      </div>

      <!-- Credentials -->
      <div class="sm-form-section">
        <div class="sm-section-label">Login Credentials</div>
        <div style="display:grid;gap:12px;">
          <div>
            <label class="sm-label">Email *</label>
            <input id="smEmail" class="pd-input" type="email" placeholder="john@pharmdomestic.com">
          </div>
          <div>
            <label id="smPwdLabel" class="sm-label">Password *</label>
            <input id="smPwd" class="pd-input" type="password" placeholder="••••••••">
          </div>
        </div>
      </div>

      <!-- Role & Status -->
      <div class="sm-form-section">
        <div class="sm-section-label">Role &amp; Status</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label class="sm-label">Role *</label>
            <select id="smRole" class="pd-input pd-select">
              <option value="Admin">Admin</option>
              <option value="Digital Ops" selected>Digital Ops</option>
              <option value="Warehouse">Warehouse</option>
            </select>
          </div>
          <div>
            <label class="sm-label">Status</label>
            <select id="smStatus" class="pd-input pd-select">
              <option value="Active">Active</option>
              <option value="Suspended">Suspended</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Modules -->
      <div class="sm-form-section">
        <div class="sm-section-label">Module Access</div>
        <div id="smModuleGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div>
      </div>
    </div>

    <!-- Modal Footer -->
    <div style="padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:8px;background:#fafafa;flex-shrink:0;">
      <button class="pd-btn pd-btn-ghost pd-btn-sm" onclick="smCloseModal()">Cancel</button>
      <button id="smSaveBtn" class="pd-btn pd-btn-primary pd-btn-sm" onclick="smSaveStaff()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        <span id="smSaveLbl">Add Staff Member</span>
      </button>
    </div>

  </div>
</div>

     
</div>

<style>

  padding: 5px 10px 1px 10px;

  display: flex; flex-direction: column; overflow: hidden;
}

<!-- ═══════════════════ SCRIPT ═══════════════════ -->
<script>

(function () {
     
// ─────────────────────────────────────
// CONFIG — adjust to match your sheet
// ─────────────────────────────────────
// API_URL should already be defined globally in your main layout.
// If not, uncomment and set it:
// const API_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

const SM_MODULES = ["sourcing", "listing", "suppliers", "rota", "inventory", "analytics"];
let smAllStaff = [];
let smFilter = "all";
let smCurrentStaff = null;

// ─────────────────────────────────────
// INIT
// ─────────────────────────────────────
loadStaff();
smBuildModuleGrid();

// ─────────────────────────────────────
// LOAD DATA
// ─────────────────────────────────────
async function loadStaff() {
  document.getElementById("smLoading").style.display = "block";
  document.getElementById("smGrid").style.display = "none";
  document.getElementById("smEmpty").style.display = "none";

  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "getUsers" })
  });
  const data = await res.json();

  document.getElementById("smLoading").style.display = "none";

  if (data.success) {
    smAllStaff = data.users;
    smRenderChips();
    smRenderCards();
  }
}

// ─────────────────────────────────────
// STAT CHIPS
// ─────────────────────────────────────
function smRenderChips() {
  const total   = smAllStaff.length;
  const admins  = smAllStaff.filter(s => s.role === "Admin").length;
  const dops    = smAllStaff.filter(s => s.role === "Digital Ops").length;
  const wh      = smAllStaff.filter(s => s.role === "Warehouse").length;
  const susp    = smAllStaff.filter(s => s.status === "Suspended").length;

  const chips = [
    { key:"all",         label:"All Staff",   count:total,  cls:"gray"   },
    { key:"Admin",       label:"Admin",        count:admins, cls:"blue"   },
    { key:"Digital Ops", label:"Digital Ops",  count:dops,   cls:"purple" },
    { key:"Warehouse",   label:"Warehouse",    count:wh,     cls:"amber"  },
    { key:"Suspended",   label:"Suspended",    count:susp,   cls:"red"    },

  document.getElementById("smStatChips").innerHTML = chips.map(c => `

function smRenderCards() {
  const q = (document.getElementById("smSearch").value || "").toLowerCase().trim();
  let list = smAllStaff;

  if (smFilter === "Suspended")      list = list.filter(s => s.status === "Suspended");
  else if (smFilter !== "all")       list = list.filter(s => s.role === smFilter);
  if (q) list = list.filter(s =>
    (s.firstName + " " + s.lastName).toLowerCase().includes(q) ||
    s.email.toLowerCase().includes(q)
  );

  const grid  = document.getElementById("smGrid");
  const empty = document.getElementById("smEmpty");

  if (!list.length) {
    grid.style.display = "none";
    empty.style.display = "block";
    document.getElementById("smEmptyTitle").textContent = (q || smFilter !== "all") ? "No staff match your search" : "No staff members yet";
    document.getElementById("smEmptySub").textContent   = (q || smFilter !== "all") ? "Try adjusting your search or filters" : "Add your first team member to get started";
    return;
  }

  empty.style.display = "none";
  grid.style.display  = "grid";

  grid.innerHTML = list.map((s, i) => {
    const initials = ((s.firstName||"")[0]||"") + ((s.lastName||"")[0]||"");
    const rKey     = smRoleKey(s.role);

    const perms    = (s.permissions || []).slice(0,3).map(p => `<span class="sm-perm-pill">${p}</span>`).join("");
    const extra    = (s.permissions||[]).length > 3 ? `<span style="font-size:10px;color:#94a3b8;font-weight:500;">+${s.permissions.length-3}</span>` : "";

    return `
      <div class="sm-card" style="animation-delay:${i*0.04}s;" onclick='smOpenDrawer(${JSON.stringify(s).replace(/'/g,"&apos;")})'>
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div class="sm-avatar ${rKey}">${initials.toUpperCase()}</div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#0f172a;">
              ${s.firstName} ${s.lastName}
              <span class="sm-status-dot ${sKey}"></span>
            </div>
            <div style="display:flex;align-items:center;gap:4px;font-size:12px;color:#94a3b8;margin-top:2px;">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.email}</span>
            </div>
          </div>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px;transition:color .15s;" class="sm-card-chevron"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:12px;">
          <span class="sm-role-badge ${rKey}">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ${s.role}

  }).join("");

  document.querySelectorAll(".sm-mod-btn").forEach(b => b.classList.toggle("active", perms.includes(b.dataset.mod)));

async function smSaveStaff() {
  const isEdit   = !!document.getElementById("smEditId").value;
  const firstName = document.getElementById("smFN").value.trim();
  const lastName  = document.getElementById("smLN").value.trim();
  const email     = document.getElementById("smEmail").value.trim();
  const password  = document.getElementById("smPwd").value.trim();
  const role      = document.getElementById("smRole").value;
  const status    = document.getElementById("smStatus").value;
  const perms     = Array.from(document.querySelectorAll(".sm-mod-btn.active")).map(b => b.dataset.mod);

  // Validate
  let valid = true;
  [["smFN",firstName],["smLN",lastName],["smEmail",email]].forEach(([id,val]) => {
    if (!val) { document.getElementById(id).classList.add("error"); valid = false; }
    else document.getElementById(id).classList.remove("error");
  });
  if (!isEdit && !password) { document.getElementById("smPwd").classList.add("error"); valid = false; }
  else document.getElementById("smPwd").classList.remove("error");
  if (!valid) return;

  // Disable button
  const btn = document.getElementById("smSaveBtn");
  const lbl = document.getElementById("smSaveLbl");
  const orig = lbl.textContent;
  btn.disabled = true;
  lbl.innerHTML = `<span class="pd-spinner"></span> ${isEdit ? "Saving..." : "Adding..."}`;

  const payload = {
    action: "saveUser",
    userId: document.getElementById("smEditId").value || "",
    firstName, lastName, email, password, role, status,
    permissions: perms.join(",")
  };

  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();

  btn.disabled = false;
  lbl.textContent = orig;

  if (data.success) {
    // Send welcome email for new staff
    if (!isEdit) {
      smSendWelcomeEmail({ firstName, lastName, email, password, role, permissions: perms });
    } else {
      // Status / role change emails
      const oldStaff = smAllStaff.find(s => s.userId === payload.userId);
      if (oldStaff && oldStaff.status !== status) smSendStatusEmail({ firstName, email, newStatus: status });
      if (oldStaff && oldStaff.role !== role)     smSendRoleEmail({ firstName, email, oldRole: oldStaff.role, newRole: role });
    }
    smCloseModal();
    smShowToast(isEdit ? "Staff member updated" : "Staff member added & welcome email sent", "success");
    loadStaff();
  } else {
    smShowToast(data.message || "Error saving staff member", "error");
  }
}

function smRoleKey(role) {
  if (role === "Admin") return "admin";
  if (role === "Digital Ops") return "dops";
  return "warehouse";
}

function smShowToast(msg, type) {
  let tc = document.querySelector(".pd-toast-container");
  if (!tc) {
    tc = document.createElement("div");
    tc.className = "pd-toast-container";
    tc.style.cssText = "position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;";
    document.body.appendChild(tc);
  }
  const t = document.createElement("div");
  t.style.cssText = `display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;font-family:'Inter',system-ui,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.12);animation:smCardIn .2s ease;background:${type==="success"?"#f0fdf4":type==="error"?"#fef2f2":"#f8fafc"};color:${type==="success"?"#15803d":type==="error"?"#dc2626":"#334155"};border:1px solid ${type==="success"?"#bbf7d0":type==="error"?"#fecaca":"#e2e8f0"};`;
  t.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${type==="success"?'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>':'<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'}</svg> ${msg}`;
  tc.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(() => t.remove(), 300); }, 3500);
}

})();
</script>
