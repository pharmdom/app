<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paycheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-wrapper {
      padding: 5px 10px 30px 10px;
      max-width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
    }

    .stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 100px;
      font-size: 12.5px; font-weight: 600; border: 1px solid transparent;
      white-space: nowrap; cursor: pointer; transition: all .15s;
    }
    .stat-chip:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.1); }
    .stat-chip.active-filter { box-shadow: 0 0 0 3px rgba(0,0,0,.15); }
    .stat-chip.orange { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .stat-chip.blue   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .stat-chip.green  { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .stat-chip.red    { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
    .stat-chip svg    { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 15px; height: 15px; pointer-events: none; }
    .search-input {
      width: 100%; padding: 8px 10px 8px 33px; border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: 13px; font-family: inherit; background: #fff; color: #0f172a; outline: none; transition: border-color .15s;
    }
    .search-input:focus { border-color: #2563eb; }
    .filter-select {
      padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: 13px; font-family: inherit; color: #374151; background: #fff;
      outline: none; cursor: pointer; transition: border-color .15s; appearance: auto;
    }
    .filter-select:focus { border-color: #2563eb; }
    .filter-select.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; font-weight: 600; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 9px;
      font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: background .15s, transform .1s; white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #2563eb; color: #fff; box-shadow: 0 1px 4px rgba(37,99,235,.25); }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-ghost  { background: #f1f5f9; color: #475569; }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn-success { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }
    .btn-success:hover { background: #dcfce7; }
    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }

    /* ── SUMMARY BANNER ── */
    .summary-banner {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 14px; padding: 16px 20px;
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; margin-bottom: 20px; position: relative; overflow: hidden;
    }
    .summary-banner::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,.04);
    }
    .summary-banner::after {
      content: ''; position: absolute; bottom: -30px; left: 60px;
      width: 100px; height: 100px; border-radius: 50%; background: rgba(37,99,235,.12);
    }
    .summary-kpi { padding: 8px 16px; position: relative; z-index: 1; }
    .summary-kpi + .summary-kpi { border-left: 1px solid rgba(255,255,255,.08); }
    .summary-kpi-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: rgba(255,255,255,.45); margin-bottom: 4px; }
    .summary-kpi-value { font-size: 22px; font-weight: 700; color: #fff; }
    .summary-kpi-value.green  { color: #4ade80; }
    .summary-kpi-value.yellow { color: #fbbf24; }

    /* ── EMPLOYEE CARDS GRID ── */
    .emp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .emp-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      cursor: pointer;
      transition: box-shadow .18s, border-color .18s, transform .18s;
      position: relative;
      overflow: hidden;
    }
    .emp-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .emp-card.has-pending::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .emp-card.all-paid::before    { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .emp-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      border-color: #cbd5e1;
      transform: translateY(-2px);
    }

    .emp-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .emp-avatar {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .emp-name { font-size: 14px; font-weight: 700; color: #0f172a; }
    .emp-id   { font-size: 11px; color: #94a3b8; margin-top: 1px; }
    .emp-badge {
      margin-left: auto; display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 100px; font-size: 11px; font-weight: 600;
    }
    .emp-badge.pending { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .emp-badge.allpaid { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

    .emp-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 14px;
    }
    .emp-stat {
      background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 10px; padding: 9px 11px;
    }
    .emp-stat-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #94a3b8; margin-bottom: 3px; }
    .emp-stat-value { font-size: 15px; font-weight: 700; color: #0f172a; }
    .emp-stat-value.green  { color: #15803d; }
    .emp-stat-value.yellow { color: #b45309; }

    .emp-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid #f1f5f9;
      font-size: 12px; color: #94a3b8;
    }
    .emp-card-footer strong { color: #334155; font-weight: 600; }

    .view-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11.5px; font-weight: 600; color: #2563eb;
      background: #eff6ff; border: 1px solid #bfdbfe;
      padding: 4px 10px; border-radius: 7px; cursor: pointer; transition: background .15s;
    }
    .view-btn:hover { background: #dbeafe; }
    .view-btn svg { width: 11px; height: 11px; }

    /* ── DRAWER OVERLAY ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.35);
      z-index: 900; opacity: 0; pointer-events: none;
      transition: opacity .25s; backdrop-filter: blur(3px);
    }
    .drawer-overlay.visible { opacity: 1; pointer-events: all; }

    /* ── DRAWER ── */
    .drawer {
      position: fixed; top: 0; right: 0; width: 560px; max-width: 97vw;
      transform: translateX(100%); height: 100%; background: #fff;
      box-shadow: -8px 0 40px rgba(0,0,0,.14); z-index: 1000;
      display: flex; flex-direction: column;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { transform: translateX(0); }

    /* Drawer Hero */
    .drawer-hero {
      padding: 20px 24px 18px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .drawer-hero::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,.04);
    }
    .drawer-hero::after {
      content: ''; position: absolute; bottom: -20px; left: 40px;
      width: 80px; height: 80px; border-radius: 50%; background: rgba(37,99,235,.15);
    }
    .drawer-close-btn {
      position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border: none; border-radius: 7px;
      background: rgba(255,255,255,.1); cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,.65); transition: background .15s; z-index: 1;
    }
    .drawer-close-btn:hover { background: rgba(255,255,255,.2); color: #fff; }

    .drawer-hero-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; position: relative; z-index: 1;
    }
    .drawer-avatar {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.2);
    }
    .drawer-emp-name { font-size: 17px; font-weight: 700; color: #fff; }
    .drawer-emp-id   { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 2px; }

    .drawer-kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; position: relative; z-index: 1; }
    .drawer-kpi {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 10px 12px;
    }
    .drawer-kpi-label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: rgba(255,255,255,.45); margin-bottom: 4px; }
    .drawer-kpi-value { font-size: 18px; font-weight: 700; color: #fff; }
    .drawer-kpi-value.green  { color: #4ade80; }
    .drawer-kpi-value.yellow { color: #fbbf24; }

    /* Drawer filter bar */
    .drawer-filter-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-bottom: 1px solid #f1f5f9;
      background: #fafafa; flex-shrink: 0; flex-wrap: wrap;
    }
    .drawer-filter-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
    .drawer-tab-btn {
      padding: 5px 13px; border-radius: 100px; border: 1.5px solid #e2e8f0;
      font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
      background: #fff; color: #64748b; transition: all .15s;
    }
    .drawer-tab-btn:hover { border-color: #94a3b8; color: #334155; }
    .drawer-tab-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
    .drawer-tab-btn.green.active  { background: #15803d; border-color: #15803d; }
    .drawer-tab-btn.yellow.active { background: #b45309; border-color: #b45309; }

    /* Drawer body */
    .drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

    /* Section headers */
    .section-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px; padding-bottom: 8px;
    }
    .section-title {
      font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: #94a3b8;
    }
    .section-line { flex: 1; height: 1px; background: #f1f5f9; }
    .section-count {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 100px;
    }
    .section-count.pending { background: #fef3c7; color: #92400e; }
    .section-count.paid    { background: #dcfce7; color: #15803d; }

    /* Payment row cards */
    .payment-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .payment-row {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      transition: box-shadow .15s, border-color .15s;
      position: relative; overflow: hidden;
    }
    .payment-row.pending-row { border-left: 3px solid #f59e0b; }
    .payment-row.paid-row    { border-left: 3px solid #22c55e; }
    .payment-row:hover { box-shadow: 0 3px 12px rgba(0,0,0,.07); border-color: #cbd5e1; }

    .payment-date-box {
      background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 9px;
      padding: 7px 10px; text-align: center; flex-shrink: 0; min-width: 52px;
    }
    .payment-date-day   { font-size: 17px; font-weight: 700; color: #0f172a; line-height: 1; }
    .payment-date-month { font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-top: 2px; }

    .payment-info { flex: 1; min-width: 0; }
    .payment-hours-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .payment-hours { font-size: 13.5px; font-weight: 700; color: #0f172a; }
    .payment-rate  { font-size: 11px; color: #94a3b8; }
    .payment-amount { font-size: 13px; font-weight: 700; }
    .payment-amount.pending { color: #b45309; }
    .payment-amount.paid    { color: #15803d; }

    .payment-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .mark-paid-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; font-family: inherit;
      transition: all .15s;
    }
    .mark-paid-btn.do-pay {
      background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0;
    }
    .mark-paid-btn.do-pay:hover { background: #dcfce7; }
    .mark-paid-btn.undo-pay {
      background: #fef3c7; color: #92400e; border: 1.5px solid #fde68a;
    }
    .mark-paid-btn.undo-pay:hover { background: #fde68a; }
    .mark-paid-btn svg { width: 11px; height: 11px; }
    .mark-paid-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* row overlay */
    .row-saving {
      position: absolute; inset: 0; background: rgba(255,255,255,.8);
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px; opacity: 0; pointer-events: none; transition: opacity .15s;
    }
    .row-saving.visible { opacity: 1; pointer-events: all; }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; color: #94a3b8; gap: 10px;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
    }
    .empty-state p { font-size: 13.5px; }
    .empty-state-hint { font-size: 12px; color: #cbd5e1; }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2.5px solid #e2e8f0; border-top-color: #2563eb;
      border-radius: 50%; animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; }
    .toast {
      display: flex; align-items: center; gap: 9px; padding: 11px 16px; background: #0f172a; color: #fff;
      border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.18);
      animation: toastIn .2s ease; max-width: 320px;
    }
    .toast.success { background: #15803d; }
    .toast.error   { background: #dc2626; }
    .toast.loading { background: #1e40af; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      .page-wrapper { padding: 12px; }
      .stats-row { gap: 5px; }
      .stat-chip { font-size: 11.5px; padding: 5px 10px; }
      .emp-grid  { grid-template-columns: 1fr; }
      .drawer    { width: 100%; max-width: 100%; }
      .drawer-kpi-row { grid-template-columns: 1fr 1fr; }
      .summary-banner { grid-template-columns: 1fr; gap: 12px; }
      .summary-kpi + .summary-kpi { border-left: none; border-top: 1px solid rgba(255,255,255,.08); }
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- Header -->
  <div class="page-header">
    <div class="stats-row">
      <div class="stat-chip green" id="statPaid" onclick="filterByStatus('paid')" title="Click to filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="statPaidText">Loading…</span>
      </div>
      <div class="stat-chip orange" id="statBalance" onclick="filterByStatus('unpaid')" title="Click to filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="statBalanceText">Loading…</span>
      </div>
      <div class="stat-chip red" id="statPending" onclick="filterByStatus('pending')" title="Click to filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span id="statPendingText">Loading…</span>
      </div>
      <div class="stat-chip blue" id="statAll" onclick="filterByStatus('all')" title="Show all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span id="statAllText">Loading…</span>
      </div>
    </div>

    <button class="btn btn-primary" id="generateBtn" onclick="generatePaycheck()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Regenerate
    </button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search employee…" oninput="applyFilters()">
    </div>
    <select class="filter-select" id="fPaid" onchange="applyFilters()">
      <option value="">All Employees</option>
      <option value="has_pending">Has Pending</option>
      <option value="all_paid">Fully Paid</option>
    </select>
  </div>

  <!-- Summary Banner -->
  <div class="summary-banner" id="summaryBanner" style="display:none">
    <div class="summary-kpi">
      <div class="summary-kpi-label">Total Payroll</div>
      <div class="summary-kpi-value" id="bannerTotal">£0</div>
    </div>
    <div class="summary-kpi">
      <div class="summary-kpi-label">Total Paid</div>
      <div class="summary-kpi-value green" id="bannerPaid">£0</div>
    </div>
    <div class="summary-kpi">
      <div class="summary-kpi-label">Balance Pending</div>
      <div class="summary-kpi-value yellow" id="bannerPending">£0</div>
    </div>
  </div>

  <!-- Cards -->
  <div id="cardsArea">
    <div style="display:flex;align-items:center;justify-content:center;padding:60px 0;gap:10px;color:#94a3b8">
      <div class="spinner"></div>
      <span style="font-size:13.5px">Loading paycheck data…</span>
    </div>
  </div>

</div>

<!-- Drawer Overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Employee Drawer -->
<div class="drawer" id="empDrawer">
  <div id="drawerHero"></div>
  <div class="drawer-filter-bar" id="drawerFilterBar"></div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
(function () {

  const API_URL = 'https://script.google.com/macros/s/AKfycbwS9c4pGnAiXNAlhdttTKZeKNOP8b_tSONjY7S-D_DOgiicflimtvrNVaRReuX7EN3hHg/exec';

  const AVATAR_COLORS = [
    '#6366f1','#ef4444','#10b981','#f59e0b',
    '#3b82f6','#8b5cf6','#ec4899','#14b8a6'
  ];

  // allData: flat rows from sheet
  let allData = [];
  // employees: grouped by employeeId
  let employees = {};
  let filteredEmps = [];
  let activeStatFilter = null;
  let drawerEmpId = null;
  let drawerFilter = 'all'; // 'all' | 'pending' | 'paid'
  let avatarColorMap = {};
  let colorIdx = 0;

  /* ══ INIT ══ */
  async function init() {
    await loadData();
  }

  /* ══ LOAD DATA ══ */
  async function loadData() {
    showPageLoading();
    try {
      const res  = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getPaycheck' }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.message || 'Server error');

      allData = (data.rows || []).map(r => ({
        date:         String(r[0] || '').trim(),
        employeeId:   String(r[1] || '').trim(),
        employeeName: String(r[2] || '').trim(),
        totalHours:   parseFloat(r[3]) || 0,
        hourlyRate:   parseFloat(r[4]) || 0,
        totalPay:     parseFloat(r[5]) || 0,
        paid:         String(r[6] || 'No').trim()
      }));

      buildEmployeeMap();
      applyFilters();
    } catch (e) {
      document.getElementById('cardsArea').innerHTML =
        '<div class="empty-state">' +
        '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '<p style="color:#dc2626">Failed to load data</p>' +
        '<p class="empty-state-hint">Check connection or try regenerating</p></div>';
    }
  }

  function showPageLoading() {
    document.getElementById('cardsArea').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;padding:60px 0;gap:10px;color:#94a3b8">' +
      '<div class="spinner"></div><span style="font-size:13.5px">Loading paycheck data…</span></div>';
  }

  /* ══ BUILD EMPLOYEE MAP ══ */
  function buildEmployeeMap() {
    employees = {};
    allData.forEach(r => {
      if (!r.employeeId) return;
      if (!employees[r.employeeId]) {
        employees[r.employeeId] = {
          id:   r.employeeId,
          name: r.employeeName,
          records: []
        };
      }
      employees[r.employeeId].records.push(r);
    });
  }

  /* ══ GET AVATAR COLOR ══ */
  function getColor(empId) {
    if (!avatarColorMap[empId]) {
      avatarColorMap[empId] = AVATAR_COLORS[colorIdx % AVATAR_COLORS.length];
      colorIdx++;
    }
    return avatarColorMap[empId];
  }

  /* ══ STATS ══ */
  function updateStats() {
    const paidTotal    = allData.filter(r => r.paid === 'Yes').reduce((s,r) => s + r.totalPay, 0);
    const pendingTotal = allData.filter(r => r.paid !== 'Yes').reduce((s,r) => s + r.totalPay, 0);
    const pendingCount = allData.filter(r => r.paid !== 'Yes').length;
    const totalAll     = allData.length;
    const totalPay     = allData.reduce((s,r) => s + r.totalPay, 0);

    document.getElementById('statPaidText').textContent    = allData.filter(r=>r.paid==='Yes').length + ' Paid (£' + fmt(paidTotal) + ')';
    document.getElementById('statBalanceText').textContent = '£' + fmt(pendingTotal) + ' Balance';
    document.getElementById('statPendingText').textContent = pendingCount + ' Payment Pending';
    document.getElementById('statAllText').textContent     = totalAll + ' Total Records';

    document.getElementById('bannerTotal').textContent   = '£' + fmt(totalPay);
    document.getElementById('bannerPaid').textContent    = '£' + fmt(paidTotal);
    document.getElementById('bannerPending').textContent = '£' + fmt(pendingTotal);
    document.getElementById('summaryBanner').style.display = allData.length ? 'grid' : 'none';
  }

  /* ══ STAT CHIP FILTER ══ */
  function filterByStatus(type) {
    if (activeStatFilter === type && type !== 'all') {
      activeStatFilter = null;
      document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active-filter'));
      applyFilters(); return;
    }
    activeStatFilter = (type === 'all') ? null : type;
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active-filter'));
    const map = { paid:'statPaid', unpaid:'statBalance', pending:'statPending', all:'statAll' };
    if (map[type]) document.getElementById(map[type]).classList.add('active-filter');
    applyFilters();
  }
  window.filterByStatus = filterByStatus;

  /* ══ FILTERS ══ */
  function applyFilters() {
    const q    = document.getElementById('searchInput').value.toLowerCase();
    const fPaid= document.getElementById('fPaid').value;

    const empList = Object.values(employees);

    filteredEmps = empList.filter(emp => {
      if (q && !emp.name.toLowerCase().includes(q) && !emp.id.toLowerCase().includes(q)) return false;

      const hasPending = emp.records.some(r => r.paid !== 'Yes');
      const allPaid    = emp.records.every(r => r.paid === 'Yes');

      if (fPaid === 'has_pending' && !hasPending) return false;
      if (fPaid === 'all_paid'    && !allPaid)    return false;

      if (activeStatFilter === 'paid')    { if (!emp.records.some(r => r.paid === 'Yes')) return false; }
      if (activeStatFilter === 'unpaid')  { if (!hasPending) return false; }
      if (activeStatFilter === 'pending') { if (!hasPending) return false; }

      return true;
    });

    document.getElementById('fPaid').classList.toggle('active', !!fPaid);

    updateStats();
    renderCards();
  }
  window.applyFilters = applyFilters;

  /* ══ RENDER EMPLOYEE CARDS ══ */
  function renderCards() {
    const area = document.getElementById('cardsArea');

    if (!filteredEmps.length) {
      area.innerHTML =
        '<div class="empty-state">' +
        '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<p>No employees found</p><p class="empty-state-hint">Try adjusting your filters or regenerating</p></div>';
      return;
    }

    // Sort: employees with pending first
    const sorted = [...filteredEmps].sort((a, b) => {
      const aPend = a.records.some(r => r.paid !== 'Yes') ? 0 : 1;
      const bPend = b.records.some(r => r.paid !== 'Yes') ? 0 : 1;
      return aPend - bPend;
    });

    area.innerHTML = '<div class="emp-grid">' + sorted.map(emp => empCard(emp)).join('') + '</div>';
  }

  function empCard(emp) {
    const totalPay    = emp.records.reduce((s,r) => s + r.totalPay, 0);
    const totalPaid   = emp.records.filter(r => r.paid === 'Yes').reduce((s,r) => s + r.totalPay, 0);
    const totalPend   = totalPay - totalPaid;
    const totalHours  = emp.records.reduce((s,r) => s + r.totalHours, 0);
    const hasPending  = emp.records.some(r => r.paid !== 'Yes');
    const color       = getColor(emp.id);
    const initials    = getInitials(emp.name);

    const badge = hasPending
      ? '<span class="emp-badge pending"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Pending</span>'
      : '<span class="emp-badge allpaid"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>All Paid</span>';

    return '<div class="emp-card ' + (hasPending ? 'has-pending' : 'all-paid') + '" onclick="openDrawer(\'' + escAttr(emp.id) + '\')">' +
      '<div class="emp-card-header">' +
        '<div class="emp-avatar" style="background:' + color + '">' + initials + '</div>' +
        '<div><div class="emp-name">' + escHtml(emp.name) + '</div><div class="emp-id">' + escHtml(emp.id) + '</div></div>' +
        badge +
      '</div>' +
      '<div class="emp-stats">' +
        '<div class="emp-stat"><div class="emp-stat-label">Total Pay</div><div class="emp-stat-value">£' + fmt(totalPay) + '</div></div>' +
        '<div class="emp-stat"><div class="emp-stat-label">Total Hours</div><div class="emp-stat-value">' + totalHours.toFixed(1) + 'h</div></div>' +
        '<div class="emp-stat"><div class="emp-stat-label">Paid</div><div class="emp-stat-value green">£' + fmt(totalPaid) + '</div></div>' +
        '<div class="emp-stat"><div class="emp-stat-label">Balance Due</div><div class="emp-stat-value ' + (totalPend > 0 ? 'yellow' : 'green') + '">£' + fmt(totalPend) + '</div></div>' +
      '</div>' +
      '<div class="emp-card-footer">' +
        '<span>' + emp.records.length + ' record' + (emp.records.length !== 1 ? 's' : '') + '</span>' +
        '<span class="view-btn">' +
          'View Details ' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</span>' +
      '</div>' +
    '</div>';
  }

  /* ══ DRAWER ══ */
  function openDrawer(empId) {
    drawerEmpId   = empId;
    drawerFilter  = 'all';
    renderDrawer();
    document.getElementById('empDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('visible');
  }
  window.openDrawer = openDrawer;

  function closeDrawer() {
    document.getElementById('empDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('visible');
    drawerEmpId  = null;
    drawerFilter = 'all';
  }
  window.closeDrawer = closeDrawer;

  function setDrawerFilter(f) {
    drawerFilter = f;
    renderDrawer();
  }
  window.setDrawerFilter = setDrawerFilter;

  function renderDrawer() {
    const emp = employees[drawerEmpId];
    if (!emp) return;

    const color      = getColor(emp.id);
    const initials   = getInitials(emp.name);
    const totalPay   = emp.records.reduce((s,r) => s + r.totalPay, 0);
    const totalPaid  = emp.records.filter(r => r.paid === 'Yes').reduce((s,r) => s + r.totalPay, 0);
    const totalPend  = totalPay - totalPaid;
    const totalHours = emp.records.reduce((s,r) => s + r.totalHours, 0);
    const pendCount  = emp.records.filter(r => r.paid !== 'Yes').length;
    const paidCount  = emp.records.filter(r => r.paid === 'Yes').length;

    // Hero
    document.getElementById('drawerHero').innerHTML =
      '<div class="drawer-hero">' +
        '<button class="drawer-close-btn" onclick="closeDrawer()">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>' +
        '<div class="drawer-hero-top">' +
          '<div class="drawer-avatar" style="background:' + color + '">' + initials + '</div>' +
          '<div>' +
            '<div class="drawer-emp-name">' + escHtml(emp.name) + '</div>' +
            '<div class="drawer-emp-id">' + escHtml(emp.id) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="drawer-kpi-row">' +
          '<div class="drawer-kpi"><div class="drawer-kpi-label">Total Pay</div><div class="drawer-kpi-value">£' + fmt(totalPay) + '</div></div>' +
          '<div class="drawer-kpi"><div class="drawer-kpi-label">Paid</div><div class="drawer-kpi-value green">£' + fmt(totalPaid) + '</div></div>' +
          '<div class="drawer-kpi"><div class="drawer-kpi-label">Balance Due</div><div class="drawer-kpi-value ' + (totalPend > 0 ? 'yellow' : 'green') + '">£' + fmt(totalPend) + '</div></div>' +
        '</div>' +
      '</div>';

    // Filter bar
    document.getElementById('drawerFilterBar').innerHTML =
      '<span class="drawer-filter-label">Filter</span>' +
      '<button class="drawer-tab-btn ' + (drawerFilter === 'all' ? 'active' : '') + '" onclick="setDrawerFilter(\'all\')">All (' + emp.records.length + ')</button>' +
      '<button class="drawer-tab-btn yellow ' + (drawerFilter === 'pending' ? 'active' : '') + '" onclick="setDrawerFilter(\'pending\')">Pending (' + pendCount + ')</button>' +
      '<button class="drawer-tab-btn green ' + (drawerFilter === 'paid' ? 'active' : '') + '" onclick="setDrawerFilter(\'paid\')">Paid (' + paidCount + ')</button>';

    // Body
    const records = emp.records
      .filter(r => {
        if (drawerFilter === 'pending') return r.paid !== 'Yes';
        if (drawerFilter === 'paid')    return r.paid === 'Yes';
        return true;
      })
      .sort((a,b) => b.date.localeCompare(a.date));

    // Split into pending and paid groups (only when showing all)
    if (drawerFilter === 'all') {
      const pendingRecs = records.filter(r => r.paid !== 'Yes');
      const paidRecs    = records.filter(r => r.paid === 'Yes');

      let html = '';

      if (pendingRecs.length) {
        html +=
          '<div class="section-header">' +
            '<span class="section-title">Pending</span>' +
            '<span class="section-count pending">' + pendingRecs.length + '</span>' +
            '<span class="section-line"></span>' +
            '<span style="font-size:11px;font-weight:700;color:#b45309">£' + fmt(pendingRecs.reduce((s,r)=>s+r.totalPay,0)) + '</span>' +
          '</div>' +
          '<div class="payment-rows">' + pendingRecs.map(r => paymentRow(r, emp.id)).join('') + '</div>';
      }

      if (paidRecs.length) {
        html +=
          '<div class="section-header" style="margin-top:' + (pendingRecs.length ? '8px' : '0') + '">' +
            '<span class="section-title">Paid</span>' +
            '<span class="section-count paid">' + paidRecs.length + '</span>' +
            '<span class="section-line"></span>' +
            '<span style="font-size:11px;font-weight:700;color:#15803d">£' + fmt(paidRecs.reduce((s,r)=>s+r.totalPay,0)) + '</span>' +
          '</div>' +
          '<div class="payment-rows">' + paidRecs.map(r => paymentRow(r, emp.id)).join('') + '</div>';
      }

      if (!html) html = '<p style="font-size:13px;color:#94a3b8;text-align:center;padding:30px 0">No records</p>';
      document.getElementById('drawerBody').innerHTML = html;
    } else {
      const label = drawerFilter === 'pending' ? 'Pending' : 'Paid';
      const countClass = drawerFilter === 'pending' ? 'pending' : 'paid';
      const totalAmt = records.reduce((s,r) => s + r.totalPay, 0);
      let html =
        '<div class="section-header">' +
          '<span class="section-title">' + label + '</span>' +
          '<span class="section-count ' + countClass + '">' + records.length + '</span>' +
          '<span class="section-line"></span>' +
          '<span style="font-size:11px;font-weight:700;color:' + (drawerFilter === 'pending' ? '#b45309' : '#15803d') + '">£' + fmt(totalAmt) + '</span>' +
        '</div>';

      if (records.length) {
        html += '<div class="payment-rows">' + records.map(r => paymentRow(r, emp.id)).join('') + '</div>';
      } else {
        html += '<p style="font-size:13px;color:#94a3b8;text-align:center;padding:30px 0">No ' + label.toLowerCase() + ' records</p>';
      }
      document.getElementById('drawerBody').innerHTML = html;
    }
  }

  function paymentRow(r, empId) {
    const isPaid   = r.paid === 'Yes';
    const rowKey   = escAttr(empId + '_' + r.date);
    const dateParts = parseDate(r.date);

    const actionBtn = isPaid
      ? '<button class="mark-paid-btn undo-pay" id="btn_' + rowKey + '" onclick="togglePaid(\'' + escAttr(empId) + '\', \'' + escAttr(r.date) + '\', \'No\')">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Undo' +
        '</button>'
      : '<button class="mark-paid-btn do-pay" id="btn_' + rowKey + '" onclick="togglePaid(\'' + escAttr(empId) + '\', \'' + escAttr(r.date) + '\', \'Yes\')">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Mark Paid' +
        '</button>';

    return '<div class="payment-row ' + (isPaid ? 'paid-row' : 'pending-row') + '" id="row_' + rowKey + '">' +
      '<div class="row-saving" id="saving_' + rowKey + '"><div class="spinner"></div></div>' +

      '<div class="payment-date-box">' +
        '<div class="payment-date-day">' + dateParts.day + '</div>' +
        '<div class="payment-date-month">' + dateParts.month + '</div>' +
      '</div>' +

      '<div class="payment-info">' +
        '<div class="payment-hours-row">' +
          '<span class="payment-hours">' + r.totalHours.toFixed(1) + 'h</span>' +
          '<span class="payment-rate">@ £' + fmt(r.hourlyRate) + '/hr</span>' +
        '</div>' +
        '<div class="payment-amount ' + (isPaid ? 'paid' : 'pending') + '">£' + fmt(r.totalPay) + '</div>' +
      '</div>' +

      '<div class="payment-actions">' + actionBtn + '</div>' +
    '</div>';
  }

  /* ══ TOGGLE PAID ══ */
  async function togglePaid(empId, date, newValue) {
    const rowKey = empId + '_' + date;
    const saving = document.getElementById('saving_' + rowKey);
    const btn    = document.getElementById('btn_' + rowKey);
    if (saving) saving.classList.add('visible');
    if (btn)    btn.disabled = true;

    try {
      const res  = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'updatePaycheck', employeeId: empId, date, value: newValue }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.message || 'Error');

      // Update local data
      const record = allData.find(r => r.employeeId === empId && r.date === date);
      if (record) record.paid = newValue;
      // Rebuild employees map
      buildEmployeeMap();

      showToast(newValue === 'Yes' ? 'Marked as Paid ✓' : 'Marked as Pending', newValue === 'Yes' ? 'success' : '');

      // Re-render both drawer and cards
      updateStats();
      renderCards();
      if (drawerEmpId === empId) renderDrawer();

    } catch (e) {
      showToast('Failed to update: ' + e.message, 'error');
      if (saving) saving.classList.remove('visible');
      if (btn)    btn.disabled = false;
    }
  }
  window.togglePaid = togglePaid;

  /* ══ GENERATE PAYCHECK ══ */
  async function generatePaycheck() {
    const btn     = document.getElementById('generateBtn');
    btn.disabled  = true;
    btn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> Generating…';
    const toastId = showToast('Generating paycheck…', 'loading', 0);

    try {
      const res  = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'generatePaycheck' }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.message || 'Failed');

      removeToast(toastId);
      const count = Array.isArray(data.rows) ? data.rows.length : (data.rows || 0);
      showToast('Paycheck generated (' + count + ' records)', 'success');
      await loadData();
    } catch (e) {
      removeToast(toastId);
      showToast('Failed: ' + e.message, 'error');
    } finally {
      btn.disabled  = false;
      btn.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>' +
        'Regenerate';
    }
  }
  window.generatePaycheck = generatePaycheck;

  /* ══ HELPERS ══ */
  function parseDate(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const parts  = String(d || '').split('-');
    if (parts.length !== 3) return { day: '?', month: '???' };
    return { day: parseInt(parts[2]), month: months[parseInt(parts[1]) - 1] || '???' };
  }

  function fmt(n) {
    const num = parseFloat(n) || 0;
    return num % 1 === 0 ? num.toString() : num.toFixed(2);
  }

  function getInitials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(str) {
    return String(str || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  let toastCounter = 0;
  function showToast(msg, type, duration) {
    const c  = document.getElementById('toastContainer');
    const id = 'toast_' + (++toastCounter);
    const t  = document.createElement('div');
    t.className = 'toast ' + (type || '');
    t.id = id;
    const icons = {
      success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
      error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
      loading: '<div class="spinner" style="width:12px;height:12px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff"></div>',
    };
    t.innerHTML = (icons[type] || '') + '<span>' + escHtml(msg) + '</span>';
    c.appendChild(t);
    if (duration !== 0) setTimeout(() => t.remove(), duration || 3000);
    return id;
  }

  function removeToast(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  /* ══ BOOT ══ */
  init();

})();
</script>
</body>
</html>
