<!DOCTYPE html>
<html>
<head>
  <title>Login | Product Ops</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-card {
      background: white;
      padding: 40px;
      width: 360px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 22px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #007bff;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #0069d9;
    }

    .error {
      margin-top: 12px;
      font-size: 13px;
      color: red;
      text-align: center;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h1>Product Ops Login</h1>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <button onclick="login()">Login</button>

    <div id="errorMessage" class="error"></div>
  </div>

  <script>

    // 🔁 Replace with your deployed Apps Script Web App URL
    const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";

    // Prevent logged-in users from accessing login page again
    const existingSession = sessionStorage.getItem("user");
    if (existingSession) {
      window.location.href = "index.html";
    }

    async function login() {

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMessage = document.getElementById("errorMessage");

      errorMessage.innerText = "";

      if (!email || !password) {
        errorMessage.innerText = "Please enter email and password.";
        return;
      }

      const button = document.querySelector("button");
      button.classList.add("loading");
      button.innerText = "Logging in...";

      try {

        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "login",
            email: email,
            password: password
          })
        });

        const result = await response.json();

        if (result.success) {

          sessionStorage.setItem("user", JSON.stringify(result.user));

          window.location.href = "index.html";

        } else {
          errorMessage.innerText = result.message || "Login failed.";
        }

      } catch (error) {
        errorMessage.innerText = "Server error. Try again.";
      }

      button.classList.remove("loading");
      button.innerText = "Login";
    }

  </script>

</body>
</html>
