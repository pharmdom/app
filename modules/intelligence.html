<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
body { background: #f1f5f9; color: #0f172a; min-height: 100vh; line-height: 1.5; }

.page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
@media (max-width: 600px) { .page { padding: 18px 14px 48px; } }

/* ── HEADER ── */
.header { margin-bottom: 24px; }
.header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #3b82f6; margin-bottom: 3px; }
.header h1 { font-size: 22px; font-weight: 900; color: #0f172a; letter-spacing: -0.5px; line-height: 1.2; }
.header-date { font-size: 12px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

/* ── METRICS ROW ── */
.metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
@media (max-width: 640px) { .metrics-row { grid-template-columns: 1fr; gap: 10px; } }

.m-card {
  background: #fff; border: 1px solid #e8ecf2; border-radius: 16px;
  padding: 18px 18px 14px; position: relative; overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease;
}
.m-card:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(15,23,42,.07); }
.m-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 16px 16px 0 0;
}
.m-card.blue::before   { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.m-card.emerald::before { background: linear-gradient(90deg, #10b981, #34d399); }
.m-card.violet::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }

.m-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.m-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.m-icon.blue { background: #eff6ff; } .m-icon.emerald { background: #ecfdf5; } .m-icon.violet { background: #f5f3ff; }
.m-icon svg { width: 17px; height: 17px; }
.m-icon.blue svg { color: #3b82f6; } .m-icon.emerald svg { color: #10b981; } .m-icon.violet svg { color: #8b5cf6; }
.m-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: #94a3b8; margin-bottom: 4px; }
.m-value { font-size: 30px; font-weight: 900; color: #0f172a; line-height: 1; letter-spacing: -1px; }
.m-sub { font-size: 11px; color: #94a3b8; font-weight: 500; margin-top: 3px; }
.m-trend { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; margin-top: 10px; padding: 3px 8px; border-radius: 100px; }
.m-trend.up { background: #ecfdf5; color: #059669; } .m-trend.down { background: #fef2f2; color: #dc2626; }
.m-trend svg { width: 11px; height: 11px; }
.m-sparkline { margin-top: 12px; }
.m-sparkline canvas { width: 100%; height: 38px; display: block; }
.m-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: #64748b; background: #f1f5f9; padding: 2px 7px; border-radius: 100px; margin-bottom: 4px; }

/* ── CHART CARD ── */
.chart-card { background: #fff; border: 1px solid #e8ecf2; border-radius: 16px; padding: 20px 20px 16px; margin-bottom: 16px; }
.chart-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.chart-title { font-size: 14px; font-weight: 800; color: #0f172a; letter-spacing: -0.2px; }
.chart-subtitle { font-size: 11px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

.date-range-group { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
.dr-pill {
  font-size: 11px; font-weight: 600; color: #64748b;
  padding: 4px 11px; border-radius: 100px; border: 1px solid #e2e8f0;
  background: #fff; cursor: pointer; transition: all .15s ease; white-space: nowrap;
  appearance: none;
}
.dr-pill:hover { border-color: #3b82f6; color: #3b82f6; }
.dr-pill.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

.chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: #64748b; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.chart-canvas-wrap { position: relative; width: 100%; overflow: hidden; }
.chart-canvas-wrap canvas { width: 100% !important; display: block; }

.chart-tooltip {
  position: absolute; pointer-events: none;
  background: #0f172a; color: #fff; font-size: 11px; font-weight: 600;
  padding: 8px 12px; border-radius: 10px; line-height: 1.7;
  white-space: nowrap; opacity: 0; transition: opacity .12s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,.2); z-index: 10;
}
.chart-tooltip.visible { opacity: 1; }

/* ── STAFF CARD ── */
.staff-card { background: #fff; border: 1px solid #e8ecf2; border-radius: 16px; padding: 18px 20px; }
.staff-card-title { font-size: 12px; font-weight: 700; color: #0f172a; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
.staff-card-title svg { width: 14px; height: 14px; color: #3b82f6; flex-shrink: 0; }

.staff-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media (max-width: 500px) { .staff-grid { grid-template-columns: 1fr; } }
@media (min-width: 900px) { .staff-grid { grid-template-columns: repeat(4, 1fr); } }

.staff-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 12px; background: #f8f9fc;
  transition: background .2s ease;
}
.staff-row:hover { background: #f1f4f9; }
.staff-avatar {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.staff-info { flex: 1; min-width: 0; }
.staff-name { font-size: 12px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.staff-task { font-size: 10px; font-weight: 500; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.staff-right { text-align: right; flex-shrink: 0; }
.staff-hours { font-size: 13px; font-weight: 800; color: #0f172a; }
.staff-hrs-label { font-size: 10px; font-weight: 500; color: #94a3b8; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; flex-shrink: 0; }

/* ── EMPTY STATE ── */
.empty-state { padding: 40px 20px; text-align: center; color: #94a3b8; font-size: 13px; font-weight: 500; }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; background: #f1f5f9;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; transition: opacity .4s ease;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loader { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 12px; font-size: 12px; font-weight: 600; color: #94a3b8; }

/* ── FADE UP ── */
.fade-up { opacity: 0; transform: translateY(12px); animation: fadeUp .45s ease forwards; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.d1 { animation-delay: .08s; } .d2 { animation-delay: .16s; } .d3 { animation-delay: .24s; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text">Loading…</div>
</div>

<div class="page" id="mainPage" style="visibility:hidden">

  <div class="header fade-up">
    <div class="header-eyebrow">Dashboard</div>
    <h1>Business Intelligence</h1>
    <div class="header-date" id="headerDate">—</div>
  </div>

  <!-- METRICS -->
  <div class="metrics-row fade-up d1">
    <div class="m-card blue">
      <div class="m-top">
        <div>
          <div class="m-badge">All time</div>
          <div class="m-label">Total Hours</div>
          <div class="m-value" id="metricTotalHours">—</div>
          <div class="m-sub" id="metricTotalHoursSub">—</div>
        </div>
        <div class="m-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
      </div>
      <div class="m-trend up" id="metricTotalHoursTrend" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 2 17"/></svg>
        <span id="metricTotalHoursTrendText"></span>
      </div>
      <div class="m-sparkline"><canvas id="sparkTotalHours"></canvas></div>
    </div>

    <div class="m-card emerald">
      <div class="m-top">
        <div>
          <div class="m-badge">All time</div>
          <div class="m-label">Active Staff</div>
          <div class="m-value" id="metricActiveStaff">—</div>
          <div class="m-sub" id="metricActiveStaffSub">—</div>
        </div>
        <div class="m-icon emerald">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
      </div>
      <div class="m-trend up" id="metricActiveStaffTrend" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="metricActiveStaffTrendText"></span>
      </div>
      <div class="m-sparkline"><canvas id="sparkActiveStaff"></canvas></div>
    </div>

    <div class="m-card violet">
      <div class="m-top">
        <div>
          <div class="m-badge">All time</div>
          <div class="m-label">Efficiency Score</div>
          <div class="m-value" id="metricEfficiency">—</div>
          <div class="m-sub">Avg utilization rate</div>
        </div>
        <div class="m-icon violet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
      </div>
      <div class="m-trend up" id="metricEfficiencyTrend" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 2 17"/></svg>
        <span id="metricEfficiencyTrendText"></span>
      </div>
    </div>
  </div>

  <!-- TASK DISTRIBUTION CHART -->
  <div class="chart-card fade-up d2">
    <div class="chart-header">
      <div>
        <div class="chart-title">Task Distribution</div>
        <div class="chart-subtitle">Hours per task · <span id="chartRangeLabel">Last 7 days</span></div>
      </div>
      <div class="date-range-group" id="dateRangeGroup">
        <button class="dr-pill" data-range="today">Today</button>
        <button class="dr-pill active" data-range="7d">7 days</button>
        <button class="dr-pill" data-range="14d">14 days</button>
        <button class="dr-pill" data-range="30d">30 days</button>
        <button class="dr-pill" data-range="thismonth">This month</button>
      </div>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="trendChart"></canvas>
      <div class="chart-tooltip" id="trendTooltip"></div>
    </div>
    <div class="chart-legend" id="trendLegend"></div>
  </div>

  <!-- STAFF BREAKDOWN -->
  <div class="staff-card fade-up d3">
    <div class="staff-card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Staff Breakdown — Today
    </div>
    <div class="staff-grid" id="staffList"></div>
  </div>

</div>

<script>
(function () {

/* ── CONFIG ── */
const API_URL = 'https://script.google.com/macros/s/AKfycbwS9c4pGnAiXNAlhdttTKZeKNOP8b_tSONjY7S-D_DOgiicflimtvrNVaRReuX7EN3hHg/exec';
const TASK_COLORS = {
  'pick-pack':'#EF4444','packing':'#EC4899','pre-pack':'#8B5CF6',
  'fba-prep':'#10B981','warehouse-org':'#F97316','deliveries':'#3B82F6',
  'returns':'#6366F1','cleaning':'#64748B','fill-station':'#0EA5E9',
};
const AVATAR_COLORS = ['#3b82f6','#10b981','#8b5cf6','#f97316','#ec4899','#ef4444','#06b6d4','#f59e0b'];

let employees = [], tasks = [], allSchedule = [];
let chartRange = '7d';

/* ── HELPERS ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function todayStr() { return new Date().toISOString().slice(0,10); }

function normalizeTime(t){
  if(!t) return '00:00'
  const m = String(t).match(/(\d{1,2}):(\d{2})/)
  return m ? m[1].padStart(2,'0') + ':' + m[2] : '00:00'
}
  
function getDuration(s,e) {
  s = normalizeTime(s)
  e = normalizeTime(e)

  const [sh,sm] = s.split(':').map(Number)
  const [eh,em] = e.split(':').map(Number)

  if(isNaN(sh) || isNaN(eh)) return 0

  return Math.max(0,(eh*60+em-sh*60-sm)/60)
}

function mkDay(d) {
  return {
    date: d.toISOString().slice(0,10),
    label: d.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'}),
    short: d.toLocaleDateString('en',{weekday:'short'}),
    dayNum: d.toLocaleDateString('en',{day:'numeric',month:'short'})
  };
}

function getDaysInRange(range) {
  const today = new Date(); const days = [];
  if (range === 'today') {
    days.push({ date: todayStr(), label: today.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'}), short: 'Today', dayNum: 'Today' });
  } else if (range === '7d') {
    for (let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(mkDay(d));}
  } else if (range === '14d') {
    for (let i=13;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(mkDay(d));}
  } else if (range === '30d') {
    for (let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(mkDay(d));}
  } else if (range === 'thismonth') {
    const start=new Date(today.getFullYear(),today.getMonth(),1),cur=new Date(start);
    while(cur<=today){days.push(mkDay(new Date(cur)));cur.setDate(cur.getDate()+1);}
  }
  return days;
}

const LAST_7 = getDaysInRange('7d');

function todaySched()   { return allSchedule.filter(s=>s.date===todayStr()); }

/* ── LOAD DATA ── */
async function loadData() {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getData' })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    employees    = Array.isArray(data.employees) ? data.employees : [];
    tasks        = Array.isArray(data.tasks)     ? data.tasks     : [];
    allSchedule  = (Array.isArray(data.schedule) ? data.schedule : []).map(s => ({
      ...s,
      start: normalizeTime(s.start) || '00:00',
      end:   normalizeTime(s.end)   || '00:00',
    }));
  } catch(err) {
    console.warn('API unavailable, using demo data:', err.message);
    loadDemoData();
  }
  renderAll();
}

function loadDemoData() {
  tasks = [
    {id:'pick-pack',  name:'Pick & Pack',   shortName:'Pick & Pack', color:'#EF4444'},
    {id:'packing',    name:'Packing',        shortName:'Packing',     color:'#EC4899'},
    {id:'fba-prep',   name:'FBA Prep',       shortName:'FBA Prep',    color:'#10B981'},
    {id:'warehouse-org',name:'Warehouse Org',shortName:'Warehouse',   color:'#F97316'},
    {id:'deliveries', name:'Deliveries',     shortName:'Deliveries',  color:'#3B82F6'},
    {id:'returns',    name:'Returns',        shortName:'Returns',     color:'#6366F1'},
  ];
  employees = ['Sarah M.','James K.','Priya D.','Carlos R.','Emma T.','Liam W.','Nina S.','Oliver B.']
    .map((n,i)=>({id:'e'+i, name:n, initials:n.split(' ').map(x=>x[0]).join('')}));
  allSchedule = [];
  getDaysInRange('30d').forEach(day => {
    employees.forEach(emp => {
      const ti = Math.floor(Math.random()*tasks.length);
      const sh = 8+Math.floor(Math.random()*2);
      const eh = Math.min(18, sh+4+Math.floor(Math.random()*5));
      allSchedule.push({employeeId:emp.id,taskId:tasks[ti].id,date:day.date,
        start:String(sh).padStart(2,'0')+':00',end:String(eh).padStart(2,'0')+':00'});
      if (Math.random()>.55) {
        const t2 = tasks[(ti+1+Math.floor(Math.random()*3))%tasks.length];
        allSchedule.push({employeeId:emp.id,taskId:t2.id,date:day.date,
          start:String(sh+2).padStart(2,'0')+':00',end:String(Math.min(sh+5,18)).padStart(2,'0')+':00'});
      }
    });
  });
}

/* ── RENDER ALL ── */
function renderAll() {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const ts = todaySched();
  renderMetrics(ts);
  renderTrendChart(chartRange);
  renderStaffList(ts);
  document.getElementById('mainPage').style.visibility = 'visible';
  document.getElementById('loadingOverlay').classList.add('hidden');
}

/* ── METRICS ── */
function renderMetrics(ts) {
  const as = allSchedule;

  // Total Hours (all-time)
  const totalHrsAllTime = as.reduce((a,s)=>a+getDuration(s.start,s.end),0);
  document.getElementById('metricTotalHours').textContent = Math.round(totalHrsAllTime)+'h';
  document.getElementById('metricTotalHoursSub').textContent = as.length+' shifts recorded';

  const weekHrs = LAST_7.map(d=>as.filter(s=>s.date===d.date).reduce((a,s)=>a+getDuration(s.start,s.end),0));
  const todayH=weekHrs[weekHrs.length-1], prevH=weekHrs[weekHrs.length-2]||0;
  if (prevH>0) {
    const pct=Math.round(((todayH-prevH)/prevH)*100);
    const el=document.getElementById('metricTotalHoursTrend');
    el.style.display='inline-flex'; el.className='m-trend '+(pct>=0?'up':'down');
    document.getElementById('metricTotalHoursTrendText').textContent=(pct>=0?'+':'')+pct+'% vs yesterday';
  }
  drawSparkline('sparkTotalHours', weekHrs, '#3b82f6');

  // Active Staff (all-time unique)
  const uniqueStaff = new Set(as.map(s=>s.employeeId)).size;
  document.getElementById('metricActiveStaff').textContent = uniqueStaff || employees.length;
  document.getElementById('metricActiveStaffSub').textContent = employees.length+' on roster';
  const todayActive = new Set(ts.map(s=>s.employeeId)).size;
  const trendStaff = document.getElementById('metricActiveStaffTrend');
  trendStaff.style.display='inline-flex';
  trendStaff.className='m-trend '+(todayActive>=employees.length&&employees.length>0?'up':'down');
  document.getElementById('metricActiveStaffTrendText').textContent =
    employees.length>0&&todayActive>=employees.length?'Full coverage today':todayActive+' active today';
  const weekStaff = LAST_7.map(d=>new Set(as.filter(s=>s.date===d.date).map(s=>s.employeeId)).size);
  drawSparkline('sparkActiveStaff', weekStaff, '#10b981');

  // Efficiency (all-time)
  const dayTotals={};
  as.forEach(s=>{dayTotals[s.date]=(dayTotals[s.date]||0)+getDuration(s.start,s.end);});
  const vals=Object.values(dayTotals), maxPerDay=employees.length*10;
  const avgUtil = vals.length&&maxPerDay>0
    ? Math.round(vals.reduce((a,v)=>a+Math.min(v,maxPerDay),0)/(vals.length*maxPerDay)*100) : 0;
  document.getElementById('metricEfficiency').textContent = avgUtil+'%';
  const trendEff=document.getElementById('metricEfficiencyTrend');
  trendEff.style.display='inline-flex'; trendEff.className='m-trend '+(avgUtil>=70?'up':'down');
  document.getElementById('metricEfficiencyTrendText').textContent = avgUtil>=70?'Healthy':'Below target';
}

/* ── SPARKLINE ── */
function drawSparkline(id, data, color) {
  const canvas = document.getElementById(id);
  if (!canvas || !data.length) return;
  const dpr=window.devicePixelRatio||1, h=38;
  // Use offsetParent width for accuracy
  const w = canvas.closest('.m-card').clientWidth - 36 || 200;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width='100%'; canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const max=Math.max(...data)||1, min=Math.min(...data), range=max-min||1, pad=4;
  const pts=data.map((v,i)=>({
    x: data.length>1 ? pad+(i/(data.length-1))*(w-pad*2) : w/2,
    y: pad+(1-(v-min)/range)*(h-pad*2)
  }));
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,color+'28'); grad.addColorStop(1,color+'00');
  ctx.beginPath(); ctx.moveTo(pts[0].x,h);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,h); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
  const last=pts[pts.length-1];
  ctx.beginPath(); ctx.arc(last.x,last.y,3,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
}

/* ── TREND CHART ── */
function renderTrendChart(range) {
  chartRange = range;
  const rangeDays = getDaysInRange(range);
  const usedTasks = tasks.filter(t=>allSchedule.some(s=>s.taskId===t.id));

  const labels={'today':'Today','7d':'Last 7 days','14d':'Last 14 days','30d':'Last 30 days','thismonth':'This month'};
  document.getElementById('chartRangeLabel').textContent = labels[range]||range;

  const canvas=document.getElementById('trendChart');
  const tooltip=document.getElementById('trendTooltip');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth||600;
  const h=Math.min(240, Math.max(160, 160+(rangeDays.length>7?40:0)));
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);

  if (!usedTasks.length) {
    ctx.fillStyle='#94a3b8'; ctx.font='13px Inter,system-ui'; ctx.textAlign='center';
    ctx.fillText('No task data available', w/2, h/2);
    document.getElementById('trendLegend').innerHTML='';
    return;
  }

  const pad={top:14,right:14,bottom:34,left:42};
  const cw=w-pad.left-pad.right, ch=h-pad.top-pad.bottom;

  const dayData=rangeDays.map(d=>{
    const ds=allSchedule.filter(s=>s.date===d.date);
    const taskHours={};
    usedTasks.forEach(t=>{ taskHours[t.id]=ds.filter(s=>s.taskId===t.id).reduce((a,s)=>a+getDuration(s.start,s.end),0); });
    return {...d,taskHours};
  });

  const stacked=dayData.map(d=>{
    let cum=0;
    return usedTasks.map(t=>{
      const val=d.taskHours[t.id]||0; cum+=val;
      return {taskId:t.id,bottom:cum-val,top:cum,val};
    });
  });
  const maxY=Math.max(...stacked.map(s=>s.length?s[s.length-1].top:0),1);

  const xScale=i=>pad.left+(rangeDays.length>1?(i/(dayData.length-1))*cw:cw/2);
  const yScale=v=>pad.top+(1-v/maxY)*ch;

  // Grid
  ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1;
  [0,1,2,3,4].forEach(i=>{
    const y=pad.top+(i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(w-pad.right,y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='500 10px Inter,system-ui'; ctx.textAlign='right';
    ctx.fillText(Math.round(maxY-(i/4)*maxY)+'h',pad.left-6,y+3.5);
  });

  // X labels
  ctx.textAlign='center'; ctx.fillStyle='#94a3b8'; ctx.font='600 10px Inter,system-ui';
  const skip=rangeDays.length>14?Math.ceil(rangeDays.length/10):1;
  dayData.forEach((d,i)=>{
    if(i%skip!==0&&i!==dayData.length-1) return;
    ctx.fillText(rangeDays.length<=7?d.short:d.dayNum, xScale(i), h-pad.bottom+14);
  });

  // Areas & lines
  usedTasks.forEach((task,ti)=>{
    const color=task.color||TASK_COLORS[task.id]||'#94a3b8';
    ctx.beginPath();
    for(let i=0;i<dayData.length;i++){const x=xScale(i),y=yScale(stacked[i][ti].top);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    for(let i=dayData.length-1;i>=0;i--){ctx.lineTo(xScale(i),yScale(stacked[i][ti].bottom));}
    ctx.closePath(); ctx.fillStyle=color+'28'; ctx.fill();
    ctx.beginPath();
    for(let i=0;i<dayData.length;i++){const x=xScale(i),y=yScale(stacked[i][ti].top);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.stroke();
  });

  // Dots (≤14 days only)
  if(rangeDays.length<=14){
    dayData.forEach((_,i)=>{
      usedTasks.forEach((task,ti)=>{
        const color=task.color||TASK_COLORS[task.id]||'#94a3b8';
        ctx.beginPath(); ctx.arc(xScale(i),yScale(stacked[i][ti].top),2.5,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
      });
    });
  }

  // Legend
  document.getElementById('trendLegend').innerHTML=usedTasks.map(t=>{
    const c=t.color||TASK_COLORS[t.id]||'#94a3b8';
    return `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${esc(t.shortName||t.name)}</div>`;
  }).join('');

  // Mouse tooltip
  function showTooltip(mx, my) {
    let ni=0,nd=Infinity;
    dayData.forEach((_,i)=>{const d=Math.abs(xScale(i)-mx);if(d<nd){nd=d;ni=i;}});
    if(nd>50){tooltip.classList.remove('visible');return;}
    const day=dayData[ni];
    let html=`<strong>${day.label}</strong><br>`;
    usedTasks.forEach((t,ti)=>{
      const val=stacked[ni][ti].val;
      if(val>0){const c=t.color||TASK_COLORS[t.id]||'#94a3b8';html+=`<span style="color:${c}">●</span> ${esc(t.shortName||t.name)}: ${val.toFixed(1)}h<br>`;}
    });
    tooltip.innerHTML=html; tooltip.classList.add('visible');
    const tx=Math.min(w-190,Math.max(6,xScale(ni)-80));
    tooltip.style.left=tx+'px'; tooltip.style.top=Math.max(6,(my||10)-75)+'px';
  }
  canvas.onmousemove=e=>{const r=canvas.getBoundingClientRect();showTooltip(e.clientX-r.left,e.clientY-r.top);};
  canvas.onmouseleave=()=>tooltip.classList.remove('visible');
  canvas.ontouchmove=e=>{if(e.touches.length!==1)return;e.preventDefault();const r=canvas.getBoundingClientRect();showTooltip(e.touches[0].clientX-r.left,null);};
  canvas.ontouchend=()=>tooltip.classList.remove('visible');
}

/* ── STAFF LIST ── */
function renderStaffList(sched) {
  if (!employees.length) {
    document.getElementById('staffList').innerHTML='<div class="empty-state">No staff data available</div>';
    return;
  }
  const staffData=employees.map((emp,i)=>{
    const es=sched.filter(s=>s.employeeId===emp.id);
    const hours=es.reduce((a,s)=>a+getDuration(s.start,s.end),0);
    const taskNames=[...new Set(es.map(s=>s.taskId))].map(tid=>{
      const t=tasks.find(t=>t.id===tid); return t?(t.shortName||t.name):tid;
    });
    return {...emp,hours,taskNames,color:AVATAR_COLORS[i%AVATAR_COLORS.length],isActive:hours>0};
  }).sort((a,b)=>b.hours-a.hours);

  document.getElementById('staffList').innerHTML=staffData.map(s=>`
    <div class="staff-row">
      <div class="staff-avatar" style="background:${s.color}">${esc(s.initials||s.name.split(' ').map(x=>x[0]).join(''))}</div>
      <div class="staff-info">
        <div class="staff-name">${esc(s.name)}</div>
        <div class="staff-task">${s.taskNames.length?esc(s.taskNames.join(', ')):'No tasks today'}</div>
      </div>
      ${s.isActive?'<div class="pulse-dot"></div>':''}
      <div class="staff-right">
        <div class="staff-hours">${s.hours.toFixed(1)}</div>
        <div class="staff-hrs-label">hrs</div>
      </div>
    </div>`).join('');
}

/* ── DATE RANGE PILLS ── */
document.getElementById('dateRangeGroup').addEventListener('click',e=>{
  const pill=e.target.closest('.dr-pill'); if(!pill) return;
  document.querySelectorAll('.dr-pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  renderTrendChart(pill.dataset.range);
});

/* ── RESIZE ── */
let rt;
window.addEventListener('resize',()=>{
  clearTimeout(rt); rt=setTimeout(()=>{
    const ts=todaySched();
    const weekHrs=LAST_7.map(d=>allSchedule.filter(s=>s.date===d.date).reduce((a,s)=>a+getDuration(s.start,s.end),0));
    const weekStaff=LAST_7.map(d=>new Set(allSchedule.filter(s=>s.date===d.date).map(s=>s.employeeId)).size);
    drawSparkline('sparkTotalHours',weekHrs,'#3b82f6');
    drawSparkline('sparkActiveStaff',weekStaff,'#10b981');
    renderTrendChart(chartRange);
  },150);
});

/* ── INIT ── */
loadData();
setInterval(loadData,30000);

})();
