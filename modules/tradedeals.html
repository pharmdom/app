
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;
  --surface:#ffffff;
  --surface2:#f7f9fc;
  --border:#e4e9f2;
  --border2:#eef1f8;
  --text:#0b1120;
  --text2:#2c3a52;
  --text3:#6b7a96;
  --text4:#a0adbe;
  --accent:#1847d4;
  --accent-d:#1238b0;
  --accent-l:#2a5eed;
  --accent-bg:#eef2fd;
  --accent-bd:#c4d3f9;
  --green:#0c7a42;
  --green-bg:#ecfdf5;
  --green-bd:#86efac;
  --amber:#b45309;
  --amber-bg:#fffbeb;
  --amber-bd:#fde68a;
  --red:#b91c1c;
  --red-bg:#fef2f2;
  --red-bd:#fecaca;
  --navy:#0b1120;
  --navy2:#141d2e;
  --purple:#6d28d9;
  --purple-bg:#f5f3ff;
  --r:10px;--r-sm:7px;--r-lg:14px;--r-xl:18px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sh-sm:0 1px 3px rgba(11,17,32,.06),0 1px 2px rgba(11,17,32,.04);
  --sh:0 4px 16px rgba(11,17,32,.08),0 2px 6px rgba(11,17,32,.04);
  --sh-lg:0 20px 50px rgba(11,17,32,.14),0 6px 16px rgba(11,17,32,.07);
}
html,body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

/* ═══ LAYOUT ═══ */
.app{display:flex;flex-direction:column;height:100vh}

/* ═══ TOPNAV ═══ */
.topnav{display:flex;align-items:center;gap:10px;padding:6px 18px;flex-shrink:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border)}
.tnav-logo{display:flex;align-items:center;gap:9px;margin-right:6px;flex-shrink:0}
.tnav-logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#4f80f7);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(24,71,212,.4)}
.tnav-logo-mark svg{width:17px;height:17px;color:#fff}
.tnav-brand{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px;white-space:nowrap}
.tnav-brand span{color:#4f80f7}
.tnav-divider{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 2px}

/* Mode toggle */
.mode-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:3px;gap:2px}
.mode-btn{display:flex;align-items:center;gap:6px;padding:5px 16px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-size:12.5px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:-.1px}
.mode-btn svg{width:13px;height:13px;flex-shrink:0}
.mode-btn.active{color:var(--navy);box-shadow:var(--sh-sm)}
.mode-btn.offers-btn.active{background:var(--accent-bg);color:var(--accent)}
.mode-btn.catalog-btn.active{background:linear-gradient(135deg,#2a5eed,#1847d4);color:#fff}

.tnav-spacer{flex:1}
.tnav-stats{display:flex;align-items:center;gap:6px}
.tnav-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);color:var(--text3);font-size:11.5px;font-weight:600;white-space:nowrap}
.tnav-chip svg{width:11px;height:11px}
.tnav-chip.accent{background:rgba(79,128,247,.15);border-color:var(--accent);color:#7aa3f9}
.tnav-actions{display:flex;align-items:center;gap:6px}
.nav-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-sm);background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);color:var(--text2);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn svg{width:13px;height:13px}
.nav-btn:hover{background:rgba(255,255,255,.16);color:#fff}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-btn.primary:hover{background:var(--accent-l)}

/* ═══ CONTENT AREA ═══ */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* ═══════════════════════
   OFFERS VIEW
═══════════════════════ */
.offers-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.offers-toolbar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.otb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.otb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

.search-box{position:relative;min-width:170px;max-width:260px;flex:1}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);width:14px;height:14px;pointer-events:none;flex-shrink:0}
.search-box input{width:100%;padding:7px 10px 7px 33px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none;transition:all .15s}
.search-box input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(24,71,212,.07)}

.fsel-wrap{position:relative;display:inline-flex;align-items:center}
.fsel-wrap svg.fsel-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--text4);pointer-events:none}
.fsel{padding:6px 26px 6px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:var(--font);background:var(--surface2);color:var(--text2);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:border-color .15s;max-width:160px}
.fsel:focus{border-color:var(--accent)}

.view-btns{display:flex;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--surface2)}
.vbtn{display:flex;align-items:center;justify-content:center;width:32px;height:30px;border:none;background:transparent;cursor:pointer;color:var(--text4);transition:all .15s}
.vbtn+.vbtn{border-left:1px solid var(--border)}
.vbtn:hover{color:var(--text2);background:#fff}
.vbtn.active{color:var(--accent);background:var(--accent-bg)}
.vbtn svg{width:14px;height:14px}

/* ── Kanban ── */
.offers-body{flex:1;overflow:hidden;min-height:0;padding:14px 18px;display:flex;flex-direction:column}
.kanban-wrap{flex:1;display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;min-height:0;padding-bottom:6px}
.kanban-wrap::-webkit-scrollbar{height:5px}

.k-col{flex:0 0 260px;min-width:260px;max-width:280px;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.k-col-hdr{padding:12px 14px 10px;flex-shrink:0;border-bottom:1px solid var(--border2)}
.k-hdr-top{display:flex;align-items:center;gap:9px;margin-bottom:0}
.k-avatar{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;overflow:hidden;letter-spacing:-.5px}
.k-avatar img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.k-sup-info{flex:1;min-width:0}
.k-sup-name{font-size:12px;font-weight:700;color:var(--text);truncate:ellipsis;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.k-sup-meta{font-size:10.5px;color:var(--text4);margin-top:1px}
.k-col-count{font-size:10px;font-weight:700;background:var(--bg);color:var(--text3);padding:2px 8px;border-radius:20px;border:1px solid var(--border);flex-shrink:0}

.k-col-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;display:flex;flex-direction:column;gap:7px;min-height:0}
.k-col-body::-webkit-scrollbar{width:3px}

.k-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .12s;display:flex;flex-direction:column;gap:7px;animation:fadeUp .18s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.k-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);transform:translateY(-1px)}
.k-card-img-wrap{position:relative;width:100%;height:70px;border-radius:7px;overflow:hidden;background:var(--bg);flex-shrink:0}
.k-card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .22s}
.k-card:hover .k-card-img-wrap img{transform:scale(1.05)}
.k-card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;letter-spacing:-1px}
.k-zoom-btn{position:absolute;top:5px;right:5px;width:22px;height:22px;background:rgba(11,17,32,.55);border:none;border-radius:5px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;backdrop-filter:blur(3px)}
.k-card:hover .k-zoom-btn{opacity:1}
.k-zoom-btn svg{width:10px;height:10px}
.k-card-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.k-card-ean{font-family:var(--mono);font-size:10px;color:var(--text4);display:flex;align-items:center;gap:4px}
.k-card-ean a{color:var(--text4);text-decoration:none;transition:color .12s}
.k-card-ean a:hover{color:var(--accent)}
.k-card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border2)}
.k-card-cost{font-size:14px;font-weight:800;color:var(--text)}
.k-card-date{font-size:10px;color:var(--text4)}

/* Card view grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;overflow-y:auto;flex:1;padding-bottom:6px}
.c-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .12s;display:flex;flex-direction:column;animation:fadeUp .18s ease both}
.c-card:hover{box-shadow:var(--sh);border-color:var(--accent-bd);transform:translateY(-1px)}
.c-card-img{position:relative;height:100px;background:var(--bg);overflow:hidden;flex-shrink:0}
.c-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.c-card:hover .c-card-img img{transform:scale(1.04)}
.c-card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;letter-spacing:-1px}
.c-card-zoom{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(11,17,32,.55);border:none;border-radius:6px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;backdrop-filter:blur(3px)}
.c-card:hover .c-card-zoom{opacity:1}
.c-card-zoom svg{width:11px;height:11px}
.c-body{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:4px}
.c-name{font-size:12.5px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-sup{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:4px}
.c-sup svg{width:9px;height:9px;flex-shrink:0}
.c-ean{font-family:var(--mono);font-size:10px;color:var(--text4)}
.c-ean a{color:var(--text4);text-decoration:none}
.c-ean a:hover{color:var(--accent)}
.c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:5px;padding-top:7px;border-top:1px solid var(--border2)}
.c-cost{font-size:14px;font-weight:800;color:var(--text)}
.c-date{font-size:10px;color:var(--text4)}

/* Table view */
.tbl-wrap{flex:1;overflow:auto}
.data-tbl{width:100%;border-collapse:collapse}
.data-tbl thead th{background:var(--surface2);padding:9px 13px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
.data-tbl td{padding:7px 13px;border-bottom:1px solid var(--border2);color:var(--text2);font-size:13px;vertical-align:middle}
.data-tbl tbody tr{cursor:pointer;transition:background .1s}
.data-tbl tbody tr:hover td{background:var(--accent-bg)}
.tbl-thumb{width:32px;height:32px;border-radius:7px;object-fit:cover;border:1px solid var(--border);display:block}
.tbl-thumb-ph{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.ean-link{font-family:var(--mono);font-size:11px;color:var(--text3);text-decoration:none;transition:color .12s;cursor:pointer}
.ean-link:hover{color:var(--accent);text-decoration:underline}

/* empty/loading states */
.state-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center;flex:1}
.state-empty .icon{width:52px;height:52px;border-radius:14px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text4)}
.state-empty .icon svg{width:24px;height:24px}
.state-empty p{font-size:14px;font-weight:700;color:var(--text2)}
.state-empty span{font-size:12px;color:var(--text4)}
.spinner{display:inline-block;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
.spin-sm{width:16px;height:16px}
.spin-md{width:28px;height:28px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════
   CATALOG VIEW
═══════════════════════ */
.catalog-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.catalog-toolbar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ctb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.ctb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

.cat-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* Left panel - list */
.cat-list-panel{width:420px;min-width:280px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);overflow:hidden}
.cat-list-hdr{padding:10px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.cat-list-count{font-size:11.5px;font-weight:700;color:var(--text3)}
.cat-bulk-bar{display:flex;align-items:center;gap:6px}
.bulk-check-all{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.cat-list-scroll{flex:1;overflow-y:auto;min-height:0}

.cat-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s;position:relative}
.cat-row:hover{background:var(--surface2)}
.cat-row.active{background:var(--accent-bg);border-left:3px solid var(--accent)}
.cat-row.active .cat-row-inner{margin-left:-3px}
.cat-row.selected{background:#f0fdf4}
.cat-row.cheapest .cat-row-cost{color:var(--green);font-weight:800}
.cat-row.cheapest::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}
.cat-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.cat-row-img{width:44px;height:44px;border-radius:8px;flex-shrink:0;overflow:hidden;background:var(--bg);border:1px solid var(--border2)}
.cat-row-img img{width:100%;height:100%;object-fit:cover;display:block}
.cat-row-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.cat-row-info{flex:1;min-width:0}
.cat-row-name{font-size:12.5px;font-weight:700;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cat-row-sub{display:flex;align-items:center;gap:8px;margin-top:2px}
.cat-row-sup{font-size:11px;color:var(--text3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:120px}
.cat-row-ean{font-family:var(--mono);font-size:10px;color:var(--text4)}
.cat-row-cost{font-size:13px;font-weight:700;color:var(--text);flex-shrink:0}
.cheapest-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);border-radius:5px;padding:1px 5px;margin-left:4px;flex-shrink:0}
.cheapest-badge svg{width:8px;height:8px}

/* Right panel - detail */
.cat-detail-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--surface2)}
.cat-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text4);padding:40px}
.cat-detail-empty .big-icon{width:60px;height:60px;border-radius:16px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.cat-detail-empty .big-icon svg{width:28px;height:28px;color:var(--text4)}
.cat-detail-empty p{font-size:14px;font-weight:600;color:var(--text3)}
.cat-detail-empty span{font-size:12px;color:var(--text4);text-align:center}

.cat-detail-scroll{flex:1;overflow-y:auto;min-height:0}
.cat-detail-hero{background:linear-gradient(140deg,var(--navy2) 0%,#0d1631 100%);padding:20px;position:relative;overflow:hidden;flex-shrink:0}
.cat-detail-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(79,128,247,.07)}
.cat-detail-hero::after{content:'';position:absolute;bottom:-40px;left:20px;width:120px;height:120px;border-radius:50%;background:rgba(24,71,212,.1)}
.cdh-img{width:72px;height:72px;border-radius:14px;border:2px solid rgba(255,255,255,.15);overflow:hidden;background:#1e2a42;cursor:zoom-in;flex-shrink:0;position:relative;z-index:1}
.cdh-img img{width:100%;height:100%;object-fit:cover;display:block}
.cdh-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;letter-spacing:-1px}
.cdh-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;position:relative;z-index:1}
.cdh-info{flex:1;min-width:0}
.cdh-sup{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:3px}
.cdh-name{font-size:17px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:3px}
.cdh-ean{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.4)}
.cdh-ean a{color:rgba(255,255,255,.45);text-decoration:none;transition:color .12s}
.cdh-ean a:hover{color:rgba(255,255,255,.75)}
.cdh-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}
.cdh-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 11px}
.cdh-kpi-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.38);margin-bottom:3px}
.cdh-kpi-val{font-size:16px;font-weight:800;color:#fff;line-height:1}

.cat-detail-body{padding:18px 20px;display:flex;flex-direction:column;gap:18px}
.det-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text4);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.det-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.det-field{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:10px 13px}
.det-field label{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:4px}
.det-field label svg{width:10px;height:10px}
.det-field .dval{font-size:13.5px;font-weight:600;color:var(--text2)}
.det-field .dval.empty{color:var(--text4);font-weight:400;font-style:italic;font-size:12px}

/* Same EAN section */
.same-ean-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.same-ean-hdr{padding:11px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px;background:var(--surface2)}
.same-ean-hdr svg{width:14px;height:14px;color:var(--accent);flex-shrink:0}
.same-ean-hdr span{font-size:12px;font-weight:700;color:var(--text2);flex:1}
.same-ean-hdr .cnt{font-size:10px;font-weight:700;background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:20px;border:1px solid var(--accent-bd)}
.same-ean-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .12s}

.ser-img{width:36px;height:36px;border-radius:7px;flex-shrink:0;overflow:hidden;background:var(--bg);border:1px solid var(--border2)}
.ser-img img{width:100%;height:100%;object-fit:cover;display:block}
.ser-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.ser-info{flex:1;min-width:0}
.ser-sup{font-size:12px;font-weight:700;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ser-date{font-size:10px;color:var(--text4)}
.ser-cost{font-size:13px;font-weight:800;color:var(--text);flex-shrink:0}

/* ═══ DETAIL DRAWER (Offers) ═══ */
.drawer-overlay{position:fixed;inset:0;background:rgba(11,17,32,.35);z-index:800;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;width:520px;max-width:97vw;height:100vh;background:var(--surface);box-shadow:-12px 0 50px rgba(11,17,32,.15);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-hero{padding:16px 20px 14px;background:linear-gradient(140deg,var(--navy2) 0%,#0d1631 100%);position:relative;overflow:hidden;flex-shrink:0}
.drawer-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03)}
.drw-close{position:absolute;top:13px;right:13px;width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:all .15s;z-index:2}
.drw-close:hover{background:rgba(255,255,255,.2);color:#fff}
.drw-img{position:absolute;top:15px;right:52px;width:54px;height:54px;border-radius:11px;overflow:hidden;border:2px solid rgba(255,255,255,.15);background:#1e2a42;z-index:2;cursor:zoom-in}
.drw-img img{width:100%;height:100%;object-fit:cover;display:block}
.drw-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;letter-spacing:-1px}
.drw-sup{font-size:11.5px;color:rgba(255,255,255,.45);margin-bottom:3px;position:relative;z-index:1}
.drw-name{font-size:16px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:3px;padding-right:70px;position:relative;z-index:1}
.drw-ean{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.38);margin-bottom:12px;position:relative;z-index:1}
.drw-ean a{color:rgba(255,255,255,.42);text-decoration:none}
.drw-ean a:hover{color:rgba(255,255,255,.7)}
.drw-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;position:relative;z-index:1}
.drw-kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 10px}
.drw-kpi-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.38);margin-bottom:2px}
.drw-kpi-val{font-size:15px;font-weight:800;color:#fff}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.drawer-foot{padding:11px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--surface2);flex-shrink:0}

/* ═══ MODALS / OVERLAYS ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(11,17,32,.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--sh-lg);width:100%;max-width:440px;overflow:hidden}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:15px;font-weight:800;color:var(--text)}
.modal-hdr-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-body{padding:18px 20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);border:1.5px solid;font-size:12.5px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-l);border-color:var(--accent-l)}
.btn-secondary{background:var(--surface);border-color:var(--border);color:var(--text3)}
.btn-secondary:hover{border-color:var(--text4);color:var(--text)}
.btn-danger{background:var(--surface);border-color:var(--red-bd);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-ghost{background:var(--surface2);border-color:var(--surface2);color:var(--text3)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-green:hover{background:#0a6a38}
.btn-sm{padding:5px 11px;font-size:11.5px;border-radius:var(--r-sm)}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:6px}

/* ═══ CONFIRM ═══ */
.confirm-overlay{position:fixed;inset:0;background:rgba(11,17,32,.5);z-index:1200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(3px)}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface);border-radius:var(--r-xl);padding:24px;width:380px;max-width:92vw;box-shadow:var(--sh-lg)}
.confirm-box h3{font-size:16px;font-weight:800;margin-bottom:8px;color:var(--text)}
.confirm-box p{font-size:13px;color:var(--text3);line-height:1.65;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

/* ═══ LIGHTBOX ═══ */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:10px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-close{position:absolute;top:18px;right:18px;width:40px;height:40px;background:rgba(255,255,255,.12);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;font-size:18px}
.lb-close:hover{background:rgba(255,255,255,.22)}

/* ═══ TOAST ═══ */
.toasts{position:fixed;top:16px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--navy2);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--sh-lg);animation:toastIn .22s ease;max-width:320px;pointer-events:auto;border-left:3px solid rgba(255,255,255,.15)}
.toast.success{background:#14532d;border-left-color:var(--green)}
.toast.error{background:#7f1d1d;border-left-color:var(--red)}
.toast.info{background:#1e3a8a;border-left-color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══ PROGRESS BAR ═══ */
.pbar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--accent);z-index:9998;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;opacity:0}
.pbar.active{opacity:1}

/* ═══ SKELETON ═══ */
.skel{background:linear-gradient(90deg,var(--border2) 25%,var(--border) 50%,var(--border2) 75%);background-size:400% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:400% 0}100%{background-position:-400% 0}}

/* ═══ BULK ACTIONS BAR ═══ */
.bulk-bar{display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--accent-bg);border-bottom:1px solid var(--accent-bd);flex-shrink:0}
.bulk-bar.visible{display:flex}
.bulk-bar-info{font-size:12.5px;font-weight:700;color:var(--accent);flex:1}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .cat-list-panel{width:340px}
}
@media(max-width:768px){
  .tnav-stats{display:none}
  .mode-btn{padding:5px 11px;font-size:12px}

  .cat-detail-panel.mobile-hidden{display:none}
  .cat-list-panel.mobile-hidden{display:none}
  .mobile-back{display:flex!important}
}
@media(max-width:600px){
  .topnav{padding:0 12px;gap:7px}
  .tnav-brand{display:none}
  .offers-toolbar,.catalog-toolbar{padding:8px 12px}

  .card-grid{grid-template-columns:repeat(2,1fr);gap:8px}

  .det-grid{grid-template-columns:1fr}
  .cdh-kpis{grid-template-columns:repeat(2,1fr)}
}

}
.mobile-back{display:none;align-items:center;gap:6px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;cursor:pointer;font-size:13px;font-weight:600;color:var(--accent)}
.mobile-back svg{width:14px;height:14px}
</style>

function getColor(name) {
  if (!_colorMap[name]) {
    var idx = name.split('').reduce(function(a,c){return a+c.charCodeAt(0);},0) % COLORS.length;
    _colorMap[name] = COLORS[idx];
  }
  return _colorMap[name];
}
function initials(str) {
  if (!str) return '?';
  var parts = str.trim().split(/\s+/).filter(Boolean);
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

/* ══════════════════════════════
   IMAGE RESOLVER
══════════════════════════════ */
function resolveImg(raw) {
  if (!raw) return '';
  raw = String(raw).trim();
  if (!raw || raw === '[object Object]') return '';
  var m = raw.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
  if (m) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w400';
  var m2 = raw.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if (m2) return 'https://drive.google.com/thumbnail?id='+m2[1]+'&sz=w400';
  if (raw.startsWith('http')) return raw;
  if (/^[a-zA-Z0-9_-]{25,44}$/.test(raw)) return 'https://drive.google.com/thumbnail?id='+raw+'&sz=w400';
  return '';
}

/* ══════════════════════════════
   DATE FORMATTING
══════════════════════════════ */
function fmtDate(v) {
  if (!v) return '—';
  try {
    var d = new Date(v);
    if (isNaN(d)) return String(v);
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  } catch(e) { return String(v); }
}
function fmtDateSh(v) {
  if (!v) return '—';
  try {
    var d = new Date(v);
    if (isNaN(d)) return String(v);
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  } catch(e) { return String(v); }
}
function toISO(v) {
  if (!v) return '';
  try { var d=new Date(v); return isNaN(d)?'':d.toISOString().split('T')[0]; } catch(e) { return ''; }
}

/* ══════════════════════════════
   COST FORMATTING
══════════════════════════════ */
function fmtCost(v) {
  if (!v && v !== 0) return '—';
  var n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return '£' + n.toFixed(2);
}

/* ══════════════════════════════
   EAN LINK
══════════════════════════════ */
function eanLink(ean) {
  if (!ean || ean === '—') return esc(ean||'—');
  var url = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(ean);
  return '<a href="'+esc(url)+'" target="_blank" rel="noopener" class="ean-link" onclick="event.stopPropagation()" title="Search images for EAN '+esc(ean)+'">'+esc(ean)+'</a>';
}

/* ══════════════════════════════
   SORT
══════════════════════════════ */
function sortDesc(arr) {
  return arr.slice().sort(function(a,b){
    var da=new Date(a.Date||a.date||0), db=new Date(b.Date||b.date||0);
    return (isNaN(db)?0:db)-(isNaN(da)?0:da);
  });
}

/* ══════════════════════════════
   PROGRESS BAR
══════════════════════════════ */
var _pv=0,_pt=null;
function pStart(){
  var b=document.getElementById('pbar');
  clearInterval(_pt); _pv=0.1;
  b.style.transform='scaleX(0.1)'; b.classList.add('active');
  _pt=setInterval(function(){_pv=Math.min(_pv+(1-_pv)*0.07,0.92);b.style.transform='scaleX('+_pv+')';},250);
}
function pDone(){
  clearInterval(_pt);
  var b=document.getElementById('pbar');
  b.style.transform='scaleX(1)';
  setTimeout(function(){b.classList.remove('active');b.style.transform='scaleX(0)';},380);
}

/* ══════════════════════════════
   API
══════════════════════════════ */
async function api(body) {
  var r = await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return r.json();
}

/* ══════════════════════════════
   LOAD DATA
══════════════════════════════ */
async function loadOffers() {
  pStart();
  try {
    var r = await api({action:'getOffers'});
    if (r && r.success) {
      var h = r.headers||[];
      offersData = sortDesc((r.rows||[]).map(function(row){
        var o={}; h.forEach(function(k,i){o[k]=row[i]!=null?row[i]:'';});return o;
      }));
      populateOfferFilters();
      renderOffers();
      updateChips();
    }
  } catch(e) { toast('Failed to load offers','error'); }
  finally { pDone(); }
}

async function loadCatalog() {
  pStart();
  var scroll = document.getElementById('catListScroll');
  scroll.innerHTML = '<div class="state-empty"><span class="spinner spin-md"></span><p>Loading catalog…</p></div>';
  try {
    var r = await api({action:'getCatalog'});
    if (r && r.success) {
      var h = r.headers||[];
      catalogData = sortDesc((r.rows||[]).map(function(row){
        var o={}; h.forEach(function(k,i){o[k]=row[i]!=null?row[i]:'';});return o;
      }));
      populateCatalogFilters();
      renderCatalog();
      updateChips();
    }
  } catch(e) {
    toast('Failed to load catalog','error');
    scroll.innerHTML='<div class="state-empty"><p style="color:var(--red)">Failed to load — check API</p></div>';
  }
  finally { pDone(); }
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(function(b){
    b.classList.toggle('active', b.classList.contains(mode+'-btn'));
  });
  document.getElementById('offersView').style.display = mode==='offers'?'flex':'none';

}

/* ══════════════════════════════
   OFFERS FILTERS
══════════════════════════════ */
function populateOfferFilters() {
  var sel=document.getElementById('offersSupFilter'), prev=sel.value;
  var sups=[];
  offersData.forEach(function(r){var s=r['Supplier Name']||r.Supplier||'';if(s&&!sups.includes(s))sups.push(s);});
  sups.sort();
  sel.innerHTML='<option value="">All Suppliers</option>';
  sups.forEach(function(s){sel.innerHTML+='<option value="'+esc(s)+'">'+esc(s)+'</option>';});
  if(prev)sel.value=prev;
}

function getFilteredOffers() {
  var q=(document.getElementById('offersSearch').value||'').toLowerCase().trim();
  var sup=document.getElementById('offersSupFilter').value;
  var dt=document.getElementById('offersDateFilter').value;
  return offersData.filter(function(r){
    if(q){var s=(String(r['EAN']||'')+' '+String(r['Product Name']||'')+' '+String(r['Supplier Name']||'')).toLowerCase(); if(!s.includes(q))return false;}
    if(sup&&(r['Supplier Name']||r.Supplier||'')!==sup)return false;
    if(dt&&toISO(r.Date||r.date||'')!==dt)return false;
    return true;
  });
}

/* ══════════════════════════════
   OFFER DRAWER
══════════════════════════════ */
function openOfferDrawer(id) {
  var row = offersData.find(function(r){return String(r.ID||'')===id;});
  if (!row) return;
  activeOffer = id;
  renderOfferDrawer(row);
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('detailDrawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('detailDrawer').classList.remove('open');
  activeOffer=null;
}
function renderOfferDrawer(row) {
  var ean=String(row.EAN||row.Ean||'—');
  var name=String(row['Product Name']||row.Name||'—');
  var sup=String(row['Supplier Name']||row.Supplier||'');
  var cost=fmtCost(row.Cost||row.cost);
  var id=String(row.ID||'');
  var img=resolveImg(row['Product Image']||row.product_image||'');
  var date=fmtDate(row.Date||row.date);
  var c=getColor(name); var iname=initials(name);

  var imgHtml=img
    ?'<div class="drw-img" onclick="openLightbox(\''+esc(img)+'\')" title="View full image"><img src="'+esc(img)+'" alt=""></div>'
    :'<div class="drw-img"><div class="drw-img-ph" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)">'+esc(iname)+'</div></div>';

  document.getElementById('drawerHero').innerHTML=
    '<div class="drawer-hero">'
    +'<button class="drw-close" onclick="closeDrawer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
    +imgHtml
    +(sup?'<div class="drw-sup">'+esc(sup)+'</div>':'')

    +'<div class="drw-ean">EAN: '+eanLink(ean)+'</div>'
    +'<div class="drw-kpis">'
    +drwKpi('Cost',cost)+drwKpi('Date',date!=='—'?fmtDateSh(row.Date||row.date):'—')+drwKpi('Case',String(row.Case||row.case||'—'))
    +'</div></div>';

  var skip=new Set(['ID','EAN','Ean','Product Name','Name','Supplier Name','Supplier','Cost','cost','Product Image','product_image','Date','date']);
  var extras=Object.keys(row).filter(function(k){return !skip.has(k)&&String(row[k]).trim()!=='';});

  if(row.Barcode||row.barcode) body+=detField('Barcode',String(row.Barcode||row.barcode||''),'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="3" height="15"/><rect x="7" y="4" width="2" height="15"/></svg>');
  if(row['Supplier Email']) body+=detField('Supplier Email',String(row['Supplier Email']),'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>');
  if(row['Email Subject']) body+=detField('Subject',String(row['Email Subject']),'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>');
  extras.forEach(function(k){body+=detField(k,String(row[k]));});

    +'<div style="margin-left:auto;font-size:11px;color:var(--text4)">Added '+esc(date)+'</div>';

function drwKpi(lbl,val){return '<div class="drw-kpi"><div class="drw-kpi-lbl">'+lbl+'</div><div class="drw-kpi-val">'+esc(String(val))+'</div></div>';}
function detField(lbl,val,icon){return '<div class="det-field"><label>'+(icon||'')+''+esc(lbl)+'</label><div class="dval'+(val?'':' empty')+'">'+esc(val||'—')+'</div></div>';}

function confirmDeleteOffer(id) {
  openConfirm('Delete Offer?','This product will be permanently removed from the Offers sheet.',function(){doDeleteOffer(id);},'Delete');
}
async function doDeleteOffer(id) {
  closeConfirm(); closeDrawer(); pStart();
  try {
    var r=await api({action:'deleteOffer',id:id});
    if(r&&r.success){
      offersData=offersData.filter(function(x){return String(x.ID||'')!==id;});
      renderOffers(); updateChips();
      toast('Offer deleted','success');
    } else toast('Failed to delete','error');
  } catch(e){toast('Error','error');}
  finally{pDone();}
}

  sups.sort(); cats.sort();
  supSel.innerHTML='<option value="">All Suppliers</option>';
  sups.forEach(function(s){supSel.innerHTML+='<option value="'+esc(s)+'">'+esc(s)+'</option>';});
  if(prevSup)supSel.value=prevSup;
  catSel.innerHTML='<option value="">All Categories</option>';
  cats.forEach(function(c){catSel.innerHTML+='<option value="'+esc(c)+'">'+esc(c)+'</option>';});
  if(prevCat)catSel.value=prevCat;
}

function getFilteredCatalog() {
  var q=(document.getElementById('catalogSearch').value||'').toLowerCase().trim();
  var sup=document.getElementById('catalogSupFilter').value;
  var cat=document.getElementById('catalogCatFilter').value;
  return catalogData.filter(function(r){
    if(q){var s=(String(r.EAN||'')+' '+String(r['Product Name']||'')+' '+String(r['Supplier Name']||'')).toLowerCase(); if(!s.includes(q))return false;}
    if(sup&&(r['Supplier Name']||r.Supplier||'')!==sup)return false;
    if(cat&&(r.Category||r.category||'')!==cat)return false;
    return true;
  });
}

/* ══════════════════════════════
   RENDER CATALOG
══════════════════════════════ */
function renderCatalog() {
  var data = getFilteredCatalog();
  var scroll = document.getElementById('catListScroll');
  document.getElementById('catListCount').textContent = data.length + ' product' + (data.length!==1?'s':'');

  if (!data.length) {
    scroll.innerHTML='<div class="state-empty"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><p>No products found</p><span>Adjust filters to see products</span></div>';
    return;
  }

  // Find cheapest per EAN
  var cheapestByEan={};
  data.forEach(function(r){
    var ean=String(r.EAN||r.Ean||''); if(!ean)return;
    var cost=parseFloat(r.Cost||r.cost||99999);
    if(!cheapestByEan[ean]||cost<cheapestByEan[ean].cost) cheapestByEan[ean]={id:String(r.ID||''),cost:cost};
  });

  var frag=document.createDocumentFragment();
  data.forEach(function(r){
    var id=String(r.ID||'');
    var ean=String(r.EAN||r.Ean||'');
    var pname=r['Product Name']||r.Name||'—';
    var sup=r['Supplier Name']||r.Supplier||'';
    var cost=fmtCost(r.Cost||r.cost);
    var img=resolveImg(r['Product Image']||r.product_image||'');
    var pc=getColor(pname); var pbg=pc[0]; var pfg=pc[1];
    var iname=initials(pname);
    var isCheapest=ean&&cheapestByEan[ean]&&cheapestByEan[ean].id===id;

    var row=document.createElement('div');
    row.className='cat-row'+(id===activeCatId?' active':'')+(isCheapest?' cheapest':'');
    row.dataset.id=id;

    var cbHtml='<input type="checkbox" class="cat-cb" data-id="'+esc(id)+'" onclick="event.stopPropagation();toggleCatSelect(\''+esc(id)+'\')" '+(selectedCat.has(id)?'checked':'')+'>';
    var imgHtml=img
      ?'<div class="cat-row-img"><img src="'+esc(img)+'" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=\\\"cat-row-img-ph\\\" style=\\\"background:'+pbg+';color:'+pfg+'\\\">'+esc(iname)+'</div>\'"></div>'
      :'<div class="cat-row-img"><div class="cat-row-img-ph" style="background:'+pbg+';color:'+pfg+'">'+esc(iname)+'</div></div>';
    var cheapBadge=isCheapest?'<span class="cheapest-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Cheapest</span>':'';

    row.innerHTML=cbHtml+imgHtml
      +'<div class="cat-row-info">'
        +'<div class="cat-row-name" title="'+esc(pname)+'">'+esc(pname)+'</div>'
        +'<div class="cat-row-sub">'
          +'<span class="cat-row-sup">'+esc(sup)+'</span>'
          +(ean?'<span class="cat-row-ean">'+eanLink(ean)+'</span>':'')
        +'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">'
        +'<span class="cat-row-cost">'+esc(cost)+'</span>'
        +cheapBadge
      +'</div>';

    row.addEventListener('click',function(e){
      if(e.target.classList.contains('cat-cb')||e.target.closest('.cat-cb')) return;
      if(e.target.tagName==='A') return;
      openCatDetail(id);
    });
    frag.appendChild(row);
  });
  scroll.innerHTML=''; scroll.appendChild(frag);
}

/* ══════════════════════════════
   CATALOG BULK SELECT
══════════════════════════════ */
function toggleCatSelect(id) {
  if(selectedCat.has(id)) selectedCat.delete(id); else selectedCat.add(id);
  var btn=document.getElementById('bulkDeleteBtn');
  btn.style.display=selectedCat.size>0?'inline-flex':'none';
  if(selectedCat.size>0) btn.textContent='Delete '+selectedCat.size+' Selected';
  var allCbs=document.querySelectorAll('.cat-cb[data-id]');
  var ca=document.getElementById('checkAll');
  if(ca) ca.checked=allCbs.length>0&&Array.from(allCbs).every(function(c){return selectedCat.has(c.dataset.id);});
}
function toggleCheckAll(checked) {
  var allCbs=document.querySelectorAll('.cat-cb[data-id]');
  allCbs.forEach(function(cb){
    if(checked) selectedCat.add(cb.dataset.id); else selectedCat.delete(cb.dataset.id);
    cb.checked=checked;
  });
  var btn=document.getElementById('bulkDeleteBtn');
  btn.style.display=selectedCat.size>0?'inline-flex':'none';
  if(selectedCat.size>0) btn.textContent='Delete '+selectedCat.size+' Selected';
}
function confirmBulkDelete() {
  if(!selectedCat.size) return;
  openConfirm('Delete '+selectedCat.size+' Products?','This will permanently remove the selected products from the Catalog sheet.',doBulkDelete,'Delete All');
}
async function doBulkDelete() {
  var ids=Array.from(selectedCat);
  closeConfirm(); pStart();
  try {
    var r=await api({action:'bulkDeleteCatalog',ids:ids});
    if(r&&r.success){
      catalogData=catalogData.filter(function(x){return !ids.includes(String(x.ID||''));});
      selectedCat.clear();
      if(ids.includes(activeCatId)){activeCatId=null;showCatEmpty();}
      populateCatalogFilters(); renderCatalog(); updateChips();
      toast(ids.length+' products deleted','success');
      document.getElementById('bulkDeleteBtn').style.display='none';
    } else toast('Delete failed','error');
  } catch(e){toast('Error','error');}
  finally{pDone();}
}

/* ══════════════════════════════
   CATALOG DETAIL
══════════════════════════════ */
function openCatDetail(id) {
  activeCatId = id;
  var row = catalogData.find(function(r){return String(r.ID||'')===id;});
  if (!row) return;
  // Update active row highlight
  document.querySelectorAll('.cat-row').forEach(function(el){
    el.classList.toggle('active', el.dataset.id===id);
  });
  renderCatDetail(row);
  // Mobile: hide list, show detail
  document.getElementById('catListPanel').classList.add('mobile-hidden');
  document.getElementById('catDetailPanel').classList.remove('mobile-hidden');
}
function showCatList() {
  document.getElementById('catListPanel').classList.remove('mobile-hidden');
  document.getElementById('catDetailPanel').classList.add('mobile-hidden');
}
function showCatEmpty() {
  document.getElementById('catDetailEmpty').style.display='flex';
  document.getElementById('catDetailContent').style.display='none';
}
function renderCatDetail(row) {
  document.getElementById('catDetailEmpty').style.display='none';
  var content=document.getElementById('catDetailContent');
  content.style.display='block';
  var ean=String(row.EAN||row.Ean||'—');
  var name=String(row['Product Name']||row.Name||'—');
  var sup=String(row['Supplier Name']||row.Supplier||'');
  var cost=fmtCost(row.Cost||row.cost);
  var img=resolveImg(row['Product Image']||row.product_image||'');
  var date=fmtDate(row.Date||row.date);
  var c=getColor(name); var iname=initials(name);
  var id=String(row.ID||'');

  var imgHtml=img
    ?'<div class="cdh-img" onclick="openLightbox(\''+esc(img)+'\')" title="View full image"><img src="'+esc(img)+'" alt=""></div>'
    :'<div class="cdh-img"><div class="cdh-img-ph" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.55)">'+esc(iname)+'</div></div>';

  // Find same EAN from other suppliers
  var eanStr=String(row.EAN||row.Ean||'');
  var sameEan=eanStr?catalogData.filter(function(r){
    return String(r.EAN||r.Ean||'')===eanStr && String(r.ID||'')!==id;
  }):[];
  var cheapestCost=parseFloat(row.Cost||row.cost||99999);
  sameEan.forEach(function(r){var c2=parseFloat(r.Cost||r.cost||99999);if(c2<cheapestCost)cheapestCost=c2;});

  var sameEanHtml='';
  if(sameEan.length>0){
    sameEanHtml='<div class="same-ean-section"><div class="same-ean-hdr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Same EAN — Other Suppliers</span><span class="cnt">'+sameEan.length+'</span></div>';
    sameEan.forEach(function(r2){
      var r2img=resolveImg(r2['Product Image']||r2.product_image||'');
      var r2sup=String(r2['Supplier Name']||r2.Supplier||'');
      var r2cost=parseFloat(r2.Cost||r2.cost||99999);
      var r2costFmt=fmtCost(r2.Cost||r2.cost);
      var r2pc=getColor(r2sup); var r2iname=initials(r2sup);
      var isCheapAlt=r2cost<=cheapestCost;
      sameEanHtml+='<div class="same-ean-row'+(isCheapAlt?' cheapest-alt':'')+'" onclick="openCatDetail(\''+esc(String(r2.ID||''))+'\')">'
        +(r2img?'<div class="ser-img"><img src="'+esc(r2img)+'" alt="" onerror="this.parentElement.innerHTML=\'<div class=\\\"ser-img-ph\\\" style=\\\"background:'+r2pc[0]+';color:'+r2pc[1]+'\\\">'+esc(r2iname)+'</div>\'"></div>'
        :'<div class="ser-img"><div class="ser-img-ph" style="background:'+r2pc[0]+';color:'+r2pc[1]+'">'+esc(r2iname)+'</div></div>')
        +'<div class="ser-info"><div class="ser-sup">'+esc(r2sup)+'</div><div class="ser-date">'+esc(fmtDateSh(r2.Date||r2.date))+'</div></div>'
        +(isCheapAlt?'<span class="cheapest-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Cheapest</span>':'')
        +'<span class="ser-cost">'+esc(r2costFmt)+'</span>'
        +'</div>';
    });
    sameEanHtml+='</div>';
  }

  content.innerHTML=
    '<div class="cat-detail-hero">'
    +'<div class="cdh-top">'+imgHtml
    +'<div class="cdh-info">'
    +(sup?'<div class="cdh-sup">'+esc(sup)+'</div>':'')
    +'<div class="cdh-name">'+esc(name)+'</div>'
    +'<div class="cdh-ean">EAN: '+eanLink(ean)+'</div>'
    +'</div>'
    +'<button onclick="confirmDeleteCatRow(\''+esc(id)+'\')" style="position:absolute;top:0;right:0;z-index:2;width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.55);transition:all .15s" title="Delete product" onmouseover="this.style.background=\'rgba(220,38,38,.3)\'" onmouseout="this.style.background=\'rgba(255,255,255,.1)\'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>'
    +'</div>'
    +'<div class="cdh-kpis">'
    +cdhKpi('Cost',cost)+cdhKpi('Date',fmtDateSh(row.Date||row.date)||'—')+cdhKpi('Case',String(row.Case||row.case||'—'))
    +'</div></div>'
    +'<div class="cat-detail-body">'
    +'<div><div class="det-sec-lbl">Product Details</div><div class="det-grid">'
    +detField('Supplier',sup,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>')
    +detField('Category',String(row.Category||row.category||''),'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>')
    +(row.Code||row.code?detField('SKU/Code',String(row.Code||row.code||'')):'')
    +(row.Barcode||row.barcode?detField('Barcode',String(row.Barcode||row.barcode||'')):'')
    +(row['Supplier Email']?detField('Supplier Email',String(row['Supplier Email'])):'')
    +(row['Email Subject']?detField('Email Subject',String(row['Email Subject'])):'')
    +'</div></div>'
    +(sameEanHtml?sameEanHtml:'')
    +'</div>';
}
function cdhKpi(lbl,val){return '<div class="cdh-kpi"><div class="cdh-kpi-lbl">'+lbl+'</div><div class="cdh-kpi-val">'+esc(String(val))+'</div></div>';}
function confirmDeleteCatRow(id) {
  openConfirm('Delete Product?','This will permanently remove this product from the Catalog.',function(){doDeleteCatRow(id);},'Delete');
}
async function doDeleteCatRow(id) {
  closeConfirm(); pStart();
  try {
    var r=await api({action:'deleteCatalog',id:id});
    if(r&&r.success){
      catalogData=catalogData.filter(function(x){return String(x.ID||'')!==id;});
      if(activeCatId===id){activeCatId=null;showCatEmpty();}
      populateCatalogFilters(); renderCatalog(); updateChips();
      toast('Product deleted','success');
    } else toast('Failed to delete','error');
  } catch(e){toast('Error','error');}
  finally{pDone();}
}

function openLightbox(url){document.getElementById('lbImg').src=url;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.getElementById('lbImg').src='';}

/* ══════════════════════════════
   CONFIRM
══════════════════════════════ */
function openConfirm(title,msg,fn,lbl){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmOkBtn').textContent=lbl||'Confirm';
  confirmFn=fn;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');confirmFn=null;}
function doConfirm(){if(confirmFn)confirmFn();}

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
function toast(msg,type){
  var c=document.getElementById('toasts');
  var t=document.createElement('div');
  t.className='toast '+(type||'');
  var icons={success:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',error:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',info:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'};
  t.innerHTML=(icons[type]||'')+esc(msg);
  c.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove();},3400);
}

/* ══════════════════════════════
   HELPERS
══════════════════════════════ */
function esc(s){return String(s!=null?s:'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function makeDomFromHTML(html){var d=document.createElement('div');d.innerHTML=html;return d.firstElementChild;}

   KEYBOARD
══════════════════════════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.getElementById('lightbox').classList.contains('open')){closeLightbox();return;}
    if(document.getElementById('confirmOverlay').classList.contains('open')){closeConfirm();return;}
    if(document.getElementById('detailDrawer').classList.contains('open')){closeDrawer();return;}
  }
});
